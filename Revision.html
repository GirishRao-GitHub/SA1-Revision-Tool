<script>
// Patch: when h4 is the divider, keep h3 nodes inline (as section sub-headers)
// instead of silently discarding them. Fixes AFI 2024 tab in IRDA Regulations
// where multiple h3 sub-sections exist within an h4-divided topic.
document.addEventListener('DOMContentLoaded', function() {
  const _orig = FrameworkParser.groupIntoSubtopics.bind(FrameworkParser);
  FrameworkParser.groupIntoSubtopics = function(content) {
    if (!content || !Array.isArray(content)) return [];
    const divider = this.detectDividerType(content);
    if (divider !== 'h4') return _orig(content);
    const subtopics = [];
    let current = null;
    content.forEach(node => {
      if (node.type === 'h4') {
        current = { title: node.text || '', nodes: [] };
        subtopics.push(current);
      } else if (node.type === 'h3') {
        // Keep h3 as an inline node (renders as .fwp-h3 section header)
        if (!current) { current = { title: 'Overview', nodes: [] }; subtopics.push(current); }
        current.nodes.push(node);
      } else {
        if (!current) { current = { title: 'Overview', nodes: [] }; subtopics.push(current); }
        current.nodes.push(node);
      }
    });
    return subtopics;
  };
});
</script>
<style>

<script>
const SA1_KEYWORDS = ["Solvency II","SCR","Best Estimate","Risk Margin","PMI","Income Protection","Morbidity","Mortality","Lapse","Anti-selection","Moral Hazard","Diversification","Technical Provisions","Capital","Underwriting","Claims Management","Product Design","Pricing","Expenses","Taxation","Regulation","State Provision","Reinsurance","Social Care","Long Term Care","Critical Illness","IP","CI","LTC","IRDAI","PMJAY","Treating Customers Fairly","Genetic Testing","Yield Curve","Asset Liability","QALYs","Value at Risk","Run-off","Bornhuetter","IBNR"];
function highlightKeywords(text) {
  SA1_KEYWORDS.forEach(kw => {
    const re = new RegExp('\\b(' + kw.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')\\b','g');
    text = text.replace(re,'<span style="font-weight:700;color:#fff;text-decoration:underline;text-decoration-color:var(--accent);text-underline-offset:2px;">$1</span>');
  });
  return text;
}

function parseSrcTags(rawText) {
  const match = rawText.match(/\[src:([^\]]+)\]\s*$/);
  if (!match) return { cleanText: rawText, badgesHtml: '' };
  const cleanText = rawText.slice(0, match.index).trimEnd();
  const codes = match[1].split(',').map(s => s.trim()).filter(Boolean);
  const badges = codes.map(code => {
    const m = code.match(/^(IAI|IFoA)_(\d{2})(\d{2})$/i);
    if (!m) return '';
    const org = m[1].toUpperCase() === 'IFOA' ? 'IFoA' : 'IAI';
    const cls = org === 'IFoA' ? 'ifoa' : 'iai';
    return '<span class="src-badge ' + cls + '" title="' + org + ' ' + m[2] + '/' + m[3] + '">' + org + '\u00a0' + m[2] + '/' + m[3] + '</span>';
  }).join('');
  return { cleanText, badgesHtml: badges ? '<span class="src-badges-wrap">' + badges + '</span>' : '' };
}
function bulletMatchesSrc(line, srcFilter) {
  if (srcFilter === 'ALL') return true;
  const m = line.match(/\[src:([^\]]+)\]/);
  if (!m) return false;
  return m[1].split(',').some(c => c.trim().toUpperCase().startsWith(srcFilter.toUpperCase() + '_'));
}

// State
let TOPIC_FRAMEWORKS = {}, GROUPS = {};
let currentPillarFilter = 'ALL', currentSrcFilter = 'ALL';
let currentGroup = null, currentTopic = null, currentSubtopicIdx = null;
let currentFrameworkData = null;
let checkboxState = {};
let recallLeft = false, recallMid = false, leftPaneCollapsed = false;
let VALIDATION = {};

const PILLAR_COLORS = { P1:'#f87171', P2:'#fbbf24', P3:'#34d399', P4:'#60a5fa', P5:'#a78bfa', P6:'#f472b6' };

// Boot
window.onload = async function() {
  recallLeft = localStorage.getItem('rv_recall_left') === 'true';
  recallMid  = localStorage.getItem('rv_recall_mid')  === 'true';
  leftPaneCollapsed = localStorage.getItem('rv_left_collapsed') === 'true';
  applyRecallLeftUI(); applyRecallMidUI(); applySrcFilterUI();
  if (leftPaneCollapsed) { document.getElementById('fw-left-pane').classList.add('collapsed'); document.getElementById('collapse-btn').textContent = '›'; document.getElementById('left-pane-label').style.display = 'none'; }

  let loaded = false;
  for (const p of ['data/Topic_Frameworks.json','Topic_Frameworks.json']) {
    try { const res = await fetch(p+'?t='+Date.now()); if (res.ok) { TOPIC_FRAMEWORKS = await res.json(); loaded = true; break; } } catch(e) {}
  }
  document.getElementById('loading-overlay').style.display = 'none';
  if (!loaded || !Object.keys(TOPIC_FRAMEWORKS).length) {
    document.getElementById('fw-content').innerHTML = '<div style="color:var(--text3);text-align:center;margin-top:80px;font-size:13px;">⚠️ Could not load Topic_Frameworks.json.<br><br>Serve via local server (e.g. python -m http.server 8080).</div>';
    return;
  }
  GROUPS = TOPIC_FRAMEWORKS['_groups'] || {};
  validateAllEntries();
  renderGroupList();
  startLiveClock();
};

function startLiveClock() { updateClock(); setInterval(updateClock,1000); }
function updateClock() {
  const now = new Date();
  const el = document.getElementById('live-clock');
  if (!el) return;
  const days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'], months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  el.textContent = days[now.getDay()]+', '+now.getDate()+' '+months[now.getMonth()]+' '+String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0')+':'+String(now.getSeconds()).padStart(2,'0');
}

function validateAllEntries() {
  VALIDATION = {};
  Object.entries(TOPIC_FRAMEWORKS).forEach(([key,entry]) => {
    if (key === '_groups') return;
    const content = entry.content || [], reasons = [];
    if (!content.length) { reasons.push({level:'error',msg:'No content array.'}); VALIDATION[key]={status:'error',reasons}; return; }
    const h4 = content.filter(n=>n.type==='h4'), pts = content.filter(n=>['point','sub','numbered','text'].includes(n.type));
    if (!h4.length && pts.length>=4) reasons.push({level:'warn',msg:'No h4 subtopics; defaults to Overview.'});
    VALIDATION[key] = { status: reasons.some(r=>r.level==='error')?'error':reasons.some(r=>r.level==='warn')?'warn':'ok', reasons };
  });
}

// Pillar filter
function filterPillar(p) {
  currentPillarFilter = p;
  document.querySelectorAll('.p-btn').forEach(btn => {
    const txt = btn.textContent.trim(), isActive = (p==='ALL'&&txt==='ALL')||txt===p;
    btn.classList.toggle('active', isActive);
    if (!isActive) { btn.style.color=PILLAR_COLORS[txt]||''; btn.style.background=''; btn.style.borderColor=''; }
    else btn.style.color='';
  });
  renderGroupList();
}

// Src filter
function filterSrc(s) { currentSrcFilter=s; applySrcFilterUI(); renderGroupList(); }
function applySrcFilterUI() {
  document.querySelectorAll('.src-btn').forEach(btn => {
    const val=btn.dataset.src, isActive=val===currentSrcFilter;
    btn.classList.toggle('active',isActive);
    if (!isActive) { btn.style.color=val==='IAI'?'#34d399':val==='IFoA'?'#60a5fa':'var(--text2)'; btn.style.background=''; btn.style.borderColor=''; }
  });
}

// Left pane collapse
function toggleLeftPane() {
  leftPaneCollapsed = !leftPaneCollapsed;
  localStorage.setItem('rv_left_collapsed', leftPaneCollapsed);
  const pane=document.getElementById('fw-left-pane'), btn=document.getElementById('collapse-btn'), label=document.getElementById('left-pane-label');
  pane.classList.toggle('collapsed', leftPaneCollapsed);
  btn.textContent = leftPaneCollapsed ? '›' : '‹';
  label.style.display = leftPaneCollapsed ? 'none' : '';
  leftPaneCollapsed ? renderCollapsedTags() : renderGroupList();
}

function renderCollapsedTags() {
  const list=document.getElementById('fw-groups-list'); list.innerHTML='';
  getFilteredGroups().forEach(([name,gdata]) => {
    const pillar=gdata.pillar, color=pillar?(PILLAR_COLORS[pillar]||'var(--text3)'):'var(--text3)', label=pillar||'—';
    const el=document.createElement('div'); el.className='collapsed-tag'; el.title=name; el.textContent=label;
    el.style.cssText='color:'+color+';border-color:'+color+';background:'+color+'18;';
    if (name===currentGroup) { el.style.background=color; el.style.color='#fff'; }
    el.onclick=()=>{ leftPaneCollapsed=false; localStorage.setItem('rv_left_collapsed',false); toggleLeftPane(); selectGroup(name); };
    list.appendChild(el);
  });
}

function getFilteredGroups() {
  return Object.entries(GROUPS).filter(([name,gdata]) => {
    if (currentPillarFilter!=='ALL' && gdata.pillar!==currentPillarFilter) return false;
    if (currentSrcFilter!=='ALL') {
      return (gdata.topics||[]).some(t => {
        const entry=TOPIC_FRAMEWORKS[t]; if (!entry) return false;
        return (entry.content||[]).some(n=>bulletMatchesSrc((n.text||'')+(n.bold||''),currentSrcFilter));
      });
    }
    return true;
  });
}

function renderGroupList() {
  if (leftPaneCollapsed) { renderCollapsedTags(); return; }
  const list=document.getElementById('fw-groups-list'); list.innerHTML='';
  const filtered=getFilteredGroups();
  if (!filtered.length) { list.innerHTML='<div style="color:var(--text3);font-size:12px;text-align:center;margin-top:30px;">No groups for this filter.</div>'; return; }
  filtered.forEach(([name,gdata]) => {
    const pillar=gdata.pillar, icon=gdata.icon||'';
    const el=document.createElement('div'); el.className='group-item'+(name===currentGroup?' active':'');
    el.innerHTML='<span class="group-item-label">'+icon+' '+name+'</span>'+(pillar?'<span class="ptag '+pillar.toLowerCase()+'">'+pillar+'</span>':'');
    el.onclick=()=>selectGroup(name);
    list.appendChild(el);
  });
}

function selectGroup(name) {
  currentGroup=name; currentTopic=null; currentSubtopicIdx=null; currentFrameworkData=null;
  renderGroupList(); renderTopicList(name);
  document.getElementById('fw-subtopic-strip').innerHTML='<div style="color:var(--text3);font-size:12px;">Select a topic</div>';
  document.getElementById('fw-content').innerHTML='<div style="color:var(--text3);text-align:center;margin-top:80px;font-size:13px;">Select a topic from the middle pane</div>';
  document.getElementById('fw-progress-wrap').style.display='none';
  setBreadcrumb(name,null,null);
}

function renderTopicList(groupName) {
  const list=document.getElementById('fw-topics-list'), titleEl=document.getElementById('fw-mid-title');
  const gdata=GROUPS[groupName]; if (!gdata) { list.innerHTML=''; return; }
  titleEl.textContent=(gdata.icon||'')+' '+groupName;
  const topics=(gdata.topics||[]).filter(t => {
    if (currentSrcFilter==='ALL') return true;
    const entry=TOPIC_FRAMEWORKS[t]; if (!entry) return false;
    return (entry.content||[]).some(n=>bulletMatchesSrc((n.text||'')+(n.bold||''),currentSrcFilter));
  });
  list.innerHTML='';
  if (!topics.length) { list.innerHTML='<div style="color:var(--text3);font-size:12px;text-align:center;margin-top:30px;">No topics for this filter.</div>'; return; }
  topics.forEach(t => {
    const entry=TOPIC_FRAMEWORKS[t], icon2=entry&&entry._meta&&entry._meta.icon?entry._meta.icon:'';
    const vResult=VALIDATION[t]; let vBadge='';
    if (vResult&&vResult.status!=='ok') { const vTip=vResult.reasons.map(r=>r.msg).join('&#10;'); vBadge='<span class="v-badge '+vResult.status+'" title="'+vTip+'">'+(vResult.status==='error'?'⚠ ERR':'⚠')+'</span>'; }
    const el=document.createElement('div'); el.className='topic-item'+(t===currentTopic?' active':'');
    el.innerHTML='<span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+(recallLeft?'—':(icon2+' '+t))+'</span>'+vBadge;
    el.onclick=()=>{ if (!recallLeft) selectTopic(t); };
    list.appendChild(el);
  });
}

function selectTopic(topicKey) {
  currentTopic=topicKey; currentSubtopicIdx=null;
  document.querySelectorAll('.topic-item').forEach(el=>{ el.classList.toggle('active', el.querySelector('span') && el.querySelector('span').textContent.includes(topicKey)); });
  const entry=TOPIC_FRAMEWORKS[topicKey]; if (!entry) return;
  const subtopics=FrameworkParser.groupIntoSubtopics(entry.content||[]);
  currentFrameworkData=subtopics;
  if (!checkboxState[topicKey]) checkboxState[topicKey]={};
  renderSubtopicStrip(topicKey,subtopics);
  setBreadcrumb(currentGroup,topicKey,null);
  renderProgress(topicKey,subtopics);
  document.getElementById('fw-content').innerHTML='<div style="color:var(--text3);text-align:center;margin-top:80px;font-size:13px;">Select a subtopic above</div>';
}

function renderSubtopicStrip(topicKey,subtopics) {
  const strip=document.getElementById('fw-subtopic-strip'); strip.innerHTML='';
  if (!subtopics||!subtopics.length) { strip.innerHTML='<div style="color:var(--text3);font-size:12px;">No subtopics found.</div>'; return; }
  let rendered=0;
  subtopics.forEach((st,idx) => {
    if (currentSrcFilter!=='ALL') { const has=st.nodes.some(n=>bulletMatchesSrc((n.text||'')+(n.bold||''),currentSrcFilter)); if (!has) return; }
    const ptCount=FrameworkParser.countPoints(st.nodes);
    const btn=document.createElement('button'); btn.className='st-btn'+(idx===currentSubtopicIdx?' active':'');
    btn.innerHTML=st.title+(ptCount?' <span class="st-btn-count">· '+ptCount+'</span>':'');
    btn.onclick=()=>selectSubtopic(topicKey,idx);
    strip.appendChild(btn); rendered++;
  });
  if (!rendered) strip.innerHTML='<div style="color:var(--text3);font-size:12px;">No subtopics for this filter.</div>';
}

function selectSubtopic(topicKey,idx) {
  currentSubtopicIdx=idx;
  document.querySelectorAll('.st-btn').forEach((b,i)=>b.classList.toggle('active',i===idx));
  if (currentFrameworkData&&currentFrameworkData[idx]) setBreadcrumb(currentGroup,topicKey,currentFrameworkData[idx].title);
  renderRightContent(topicKey,idx);
}

function renderRightContent(topicKey,idx) {
  const cEl=document.getElementById('fw-content');
  if (!currentFrameworkData||!currentFrameworkData[idx]) return;
  const st=currentFrameworkData[idx];
  const nodes=(st.nodes||[]).filter(n=>currentSrcFilter==='ALL'||bulletMatchesSrc((n.text||'')+(n.bold||''),currentSrcFilter));
  const ptCount=FrameworkParser.countPoints(nodes);

  let html='<div class="fw-bullets-container" id="fw-bullets-container">';
  if (recallMid) {
    html+='<div class="recall-overlay">Mental challenge: can you recall the '+ptCount+' key points for <strong>'+st.title+'</strong>?</div>';
    html+='<div class="recall-reveal-wrap"><span class="recall-reveal-label">Reveal '+ptCount+' points</span><input type="checkbox" onchange="document.getElementById(\'reveal-box\').style.display=this.checked?\'block\':\'none\';" style="width:15px;height:15px;cursor:pointer;accent-color:var(--accent);"></div>';
    html+='<div id="reveal-box" style="display:none;animation:reveal-pulse 0.4s ease-out;">';
  } else {
    html+='<div id="reveal-box">';
  }
  html+=FrameworkParser.render(nodes,{query:''});
  html+='</div></div>';
  cEl.innerHTML=html;

  const pointEls=cEl.querySelectorAll('.fwp-point-content, .fwp-sub-content, .fwp-num-content');
  const savedState=(checkboxState[topicKey]&&checkboxState[topicKey][idx])||{};
  pointEls.forEach((pEl,bIdx) => {
    const cb=document.createElement('input'); cb.type='checkbox'; cb.autocomplete='off';
    cb.style.cssText='width:11px;height:11px;flex-shrink:0;margin-left:6px;cursor:pointer;accent-color:var(--accent);opacity:0.4;vertical-align:middle;position:relative;top:-1px;';
    cb.checked=savedState[bIdx]||false; cb.style.opacity=cb.checked?'1':'0.4';
    cb.onchange=()=>{ cb.style.opacity=cb.checked?'1':'0.4'; if(!checkboxState[topicKey])checkboxState[topicKey]={}; if(!checkboxState[topicKey][idx])checkboxState[topicKey][idx]={}; checkboxState[topicKey][idx][bIdx]=cb.checked; renderProgress(topicKey,currentFrameworkData); };
    pEl.appendChild(cb);
  });
  renderProgress(topicKey,currentFrameworkData);
}

function renderProgress(topicKey,subtopics) {
  const wrap=document.getElementById('fw-progress-wrap'), dotsEl=document.getElementById('fw-prog-dots'), fracEl=document.getElementById('fw-prog-frac');
  if (!subtopics||!subtopics.length) { wrap.style.display='none'; return; }
  wrap.style.display='flex'; dotsEl.innerHTML='';
  let done=0;
  subtopics.forEach((st,idx) => {
    const saved=(checkboxState[topicKey]&&checkboxState[topicKey][idx])||{};
    const ptCount=FrameworkParser.countPoints(st.nodes);
    const isDone=ptCount>0&&Object.values(saved).filter(Boolean).length>=ptCount;
    if (isDone) done++;
    const dot=document.createElement('div'); dot.className='prog-dot'+(isDone?' done':''); dot.title=st.title;
    dotsEl.appendChild(dot);
  });
  fracEl.textContent=done+'/'+subtopics.length;
}

function setBreadcrumb(group,topic,subtopic) {
  document.getElementById('bc-group').textContent=group||'—';
  document.getElementById('bc-topic').textContent=topic||'—';
  document.getElementById('bc-subtopic').textContent=subtopic||'—';
}

function toggleRecallLeft() {
  recallLeft=!recallLeft; localStorage.setItem('rv_recall_left',recallLeft); applyRecallLeftUI();
  if (recallLeft&&!recallMid) { recallMid=true; localStorage.setItem('rv_recall_mid',recallMid); applyRecallMidUI(); }
  if (currentGroup) renderTopicList(currentGroup);
  if (recallLeft) { currentSubtopicIdx=null; document.getElementById('fw-content').innerHTML='<div style="color:var(--text3);text-align:center;margin-top:80px;font-size:13px;">Select a subtopic to view details</div>'; }
}
function applyRecallLeftUI() { const btn=document.getElementById('btn-recall-left'); if (!btn) return; btn.textContent=recallLeft?'Recall: ON':'Recall: OFF'; btn.classList.toggle('on',recallLeft); }

function toggleRecallMid() {
  recallMid=!recallMid; localStorage.setItem('rv_recall_mid',recallMid); applyRecallMidUI();
  if (currentTopic&&currentSubtopicIdx!==null) renderRightContent(currentTopic,currentSubtopicIdx);
}
function applyRecallMidUI() { const btn=document.getElementById('btn-recall-mid'); if (!btn) return; btn.textContent=recallMid?'Recall: ON':'Recall: OFF'; btn.classList.toggle('on',recallMid); }

function showTooltip(el,tag,desc) {
  const tt=document.getElementById('fw-tooltip');
  document.getElementById('fw-tooltip-tag').textContent=tag;
  document.getElementById('fw-tooltip-desc').textContent=desc;
  document.getElementById('fw-tooltip-tag').style.color=PILLAR_COLORS[tag]||'var(--accent)';
  const rect=el.getBoundingClientRect(); tt.style.left=rect.left+'px'; tt.style.top=(rect.bottom+8)+'px'; tt.classList.add('visible');
}
function hideTooltip() { document.getElementById('fw-tooltip').classList.remove('visible'); }
function toggleFullscreen() { if (!document.fullscreenElement) document.documentElement.requestFullscreen&&document.documentElement.requestFullscreen(); else document.exitFullscreen&&document.exitFullscreen(); }
</script>
</body>
</html>
