<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Risks · SA1ity Check</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');

:root {
  --bg: #0d0f14;
  --surface: #151923;
  --surface2: #1c2230;
  --surface3: #242b3d;
  --border: #2a324b;
  --border2: #363f5f;
  --text: #e2e4ed;
  --text2: #949ebf;
  --text3: #565f80;
  --accent: #8b5cf6;
  --accentbg: #221a3a;
  --red: #e74c3c;
  --redbg: #2a0f0f;
  --amber: #f1c40f;
  --amberbg: #2a1f00;
  --green: #2ecc71;
  --greenbg: #0a2a1a;
  --blue: #3b82f6;
  --bluebg: #0a1628;
  --cyan: #06b6d4;
  --cyanbg: #051a20;
  --orange: #f97316;
  --orangebg: #2a1000;
  --pink: #ec4899;
  --pinkbg: #2a0a18;
  --teal: #14b8a6;
  --tealbg: #051a18;
  --indigo: #6366f1;
  --indigobg: #0f1030;
  --radius: 6px;
  --radius2: 10px;
  --mono: 'IBM Plex Mono', monospace;
  --sans: 'IBM Plex Sans', sans-serif;
}

*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;}

/* TOPBAR */
.topbar{position:fixed;top:0;left:0;width:100%;background:var(--surface);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;gap:16px;z-index:100;}
.logo{font-family:var(--mono);font-weight:600;font-size:15px;color:var(--accent);letter-spacing:.05em;}
.logo span{color:var(--text3);}
.tagline{font-size:12px;color:var(--text3);font-family:var(--mono);}
.back-btn{margin-left:auto;font-family:var(--mono);font-size:11px;font-weight:600;padding:4px 12px;border-radius:4px;cursor:pointer;background:var(--surface2);border:1px solid var(--border);color:var(--text2);transition:all .2s;text-decoration:none;}
.back-btn:hover{background:var(--surface3);color:var(--text);}
#clock{font-family:var(--mono);font-size:11px;color:var(--text3);}

/* LAYOUT */
.main{padding:80px 24px 48px;max-width:1400px;margin:0 auto;}

/* HEADER */
.page-header{margin-bottom:28px;}
.page-title{font-family:var(--mono);font-size:20px;font-weight:700;color:var(--accent);letter-spacing:.04em;margin-bottom:6px;}
.page-sub{font-size:13px;color:var(--text2);line-height:1.6;}

/* FILTER BAR */
.filter-bar{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:28px;align-items:center;}
.filter-label{font-family:var(--mono);font-size:11px;color:var(--text3);margin-right:4px;}
.filter-btn{font-family:var(--mono);font-size:11px;font-weight:600;padding:4px 12px;border-radius:4px;cursor:pointer;background:var(--surface2);border:1px solid var(--border);color:var(--text2);transition:all .2s;}
.filter-btn:hover{background:var(--surface3);color:var(--text);}
.filter-btn.active{color:#fff;border-color:transparent;}
.search-box{font-family:var(--mono);font-size:12px;padding:5px 12px;border-radius:4px;background:var(--surface2);border:1px solid var(--border);color:var(--text);outline:none;width:220px;margin-left:auto;}
.search-box::placeholder{color:var(--text3);}
.search-box:focus{border-color:var(--border2);}

/* RISK GRID */
.risk-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:18px;}

/* RISK CARD */
.risk-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius2);overflow:hidden;transition:border-color .2s,box-shadow .2s,opacity .3s;display:flex;flex-direction:column;}
.risk-card:hover{border-color:var(--border2);box-shadow:0 4px 24px rgba(0,0,0,.3);}
.risk-card.hidden{display:none;}

/* Ghost placeholder — holds grid space while card is flying */
.card-ghost{border-radius:var(--radius2);background:var(--surface2);border:1px dashed var(--border);opacity:.35;flex-shrink:0;}

/* The overlay backdrop */
#cardOverlay{
  display:none;position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,0);
  transition:background .35s ease;
  cursor:pointer;
}
#cardOverlay.visible{display:block;background:rgba(0,0,0,.65);}

/* Card in flying/expanded state — pulled out of flow into fixed position */
.risk-card.flying{
  position:fixed;
  z-index:300;
  overflow-y:auto;
  max-height:82vh;
  cursor:default;
  box-shadow:0 24px 80px rgba(0,0,0,.7);
}

.card-header{padding:14px 16px 12px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:12px;cursor:pointer;user-select:none;}
.card-icon{font-size:20px;flex-shrink:0;margin-top:1px;}
.card-title-block{flex:1;}
.card-category{font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px;}
.card-title{font-size:14px;font-weight:600;color:var(--text);line-height:1.3;}
.card-badge{font-family:var(--mono);font-size:10px;padding:2px 8px;border-radius:3px;white-space:nowrap;flex-shrink:0;align-self:flex-start;margin-top:2px;}
.toggle-arrow{font-size:11px;color:var(--text3);flex-shrink:0;align-self:center;transition:transform .4s;}
.risk-card.flying .toggle-arrow{transform:rotate(180deg);}

.card-body{padding:0 16px;max-height:0;overflow:hidden;transition:max-height .4s ease,padding .2s;}
.risk-card.flying .card-body{max-height:2000px;padding:14px 16px 16px;}

.bullet-list{list-style:none;display:flex;flex-direction:column;gap:9px;}
.bullet-item{font-size:12.5px;line-height:1.65;color:var(--text2);padding-left:14px;position:relative;}
.bullet-item::before{content:"›";position:absolute;left:0;color:var(--text3);}
.bullet-item strong{color:var(--text);font-weight:600;}

.source-tag{display:inline-block;font-family:var(--mono);font-size:10px;padding:2px 8px;border-radius:3px;background:var(--surface2);border:1px solid var(--border);color:var(--text3);margin-top:12px;}

/* Dim non-expanded cards while one is flying */
.risk-grid.has-expanded .risk-card:not(.flying){opacity:.3;pointer-events:none;}

/* SUMMARY ROW */
.summary-row{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:24px;}
.summary-pill{display:flex;align-items:center;gap:7px;padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--surface);font-size:12px;color:var(--text2);}
.summary-pill .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}

/* EMPTY STATE */
.empty-state{grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--text3);font-family:var(--mono);font-size:13px;}

/* COLOR THEMES PER CATEGORY */
.theme-insurance .card-category{color:var(--red);}
.theme-insurance .card-badge{background:var(--redbg);color:var(--red);border:1px solid var(--red);}
.theme-insurance.risk-card:hover{border-color:var(--red);box-shadow:0 4px 24px rgba(231,76,60,.1);}

.theme-market .card-category{color:var(--blue);}
.theme-market .card-badge{background:var(--bluebg);color:var(--blue);border:1px solid var(--blue);}
.theme-market.risk-card:hover{border-color:var(--blue);box-shadow:0 4px 24px rgba(59,130,246,.1);}

.theme-credit .card-category{color:var(--amber);}
.theme-credit .card-badge{background:var(--amberbg);color:var(--amber);border:1px solid var(--amber);}
.theme-credit.risk-card:hover{border-color:var(--amber);box-shadow:0 4px 24px rgba(241,196,15,.1);}

.theme-operational .card-category{color:var(--orange);}
.theme-operational .card-badge{background:var(--orangebg);color:var(--orange);border:1px solid var(--orange);}
.theme-operational.risk-card:hover{border-color:var(--orange);box-shadow:0 4px 24px rgba(249,115,22,.1);}

.theme-liquidity .card-category{color:var(--cyan);}
.theme-liquidity .card-badge{background:var(--cyanbg);color:var(--cyan);border:1px solid var(--cyan);}
.theme-liquidity.risk-card:hover{border-color:var(--cyan);box-shadow:0 4px 24px rgba(6,182,212,.1);}

.theme-regulatory .card-category{color:var(--green);}
.theme-regulatory .card-badge{background:var(--greenbg);color:var(--green);border:1px solid var(--green);}
.theme-regulatory.risk-card:hover{border-color:var(--green);box-shadow:0 4px 24px rgba(46,204,113,.1);}

.theme-reputational .card-category{color:var(--pink);}
.theme-reputational .card-badge{background:var(--pinkbg);color:var(--pink);border:1px solid var(--pink);}
.theme-reputational.risk-card:hover{border-color:var(--pink);box-shadow:0 4px 24px rgba(236,72,153,.1);}

.theme-catastrophe .card-category{color:var(--accent);}
.theme-catastrophe .card-badge{background:var(--accentbg);color:var(--accent);border:1px solid var(--accent);}
.theme-catastrophe.risk-card:hover{border-color:var(--accent);box-shadow:0 4px 24px rgba(139,92,246,.1);}

.theme-model .card-category{color:var(--teal);}
.theme-model .card-badge{background:var(--tealbg);color:var(--teal);border:1px solid var(--teal);}
.theme-model.risk-card:hover{border-color:var(--teal);box-shadow:0 4px 24px rgba(20,184,166,.1);}

.theme-persistency .card-category{color:var(--indigo);}
.theme-persistency .card-badge{background:var(--indigobg);color:var(--indigo);border:1px solid var(--indigo);}
.theme-persistency.risk-card:hover{border-color:var(--indigo);box-shadow:0 4px 24px rgba(99,102,241,.1);}
</style>
</head>
<body>

<div id="cardOverlay" onclick="collapseCard()"></div>

<div class="topbar">
  <div>
    <div class="logo">Risks <span>//</span> SA1ity Check</div>
    <div class="tagline">Risk Taxonomy · Topic Frameworks</div>
  </div>
  <span id="clock"></span>
  <a class="back-btn" href="SA1ity_Check.html">← Back to Main</a>
</div>

<div class="main">
  <div class="page-header">
    <div class="page-title">⚠️ Risk Taxonomy</div>
    <div class="page-sub">SA1 exam topics organised by risk category. Click any card to expand its bullet points. Use filters to focus by category.</div>
  </div>

  <div class="summary-row" id="summaryRow"></div>

  <div class="filter-bar">
    <span class="filter-label">Filter:</span>
    <button class="filter-btn active" data-cat="all" onclick="filterCards('all',this)">All</button>
    <button class="filter-btn" data-cat="insurance" onclick="filterCards('insurance',this)" style="color:var(--red)">Insurance</button>
    <button class="filter-btn" data-cat="market" onclick="filterCards('market',this)" style="color:var(--blue)">Market / Investment</button>
    <button class="filter-btn" data-cat="credit" onclick="filterCards('credit',this)" style="color:var(--amber)">Credit / Default</button>
    <button class="filter-btn" data-cat="operational" onclick="filterCards('operational',this)" style="color:var(--orange)">Operational</button>
    <button class="filter-btn" data-cat="liquidity" onclick="filterCards('liquidity',this)" style="color:var(--cyan)">Liquidity</button>
    <button class="filter-btn" data-cat="regulatory" onclick="filterCards('regulatory',this)" style="color:var(--green)">Regulatory</button>
    <button class="filter-btn" data-cat="reputational" onclick="filterCards('reputational',this)" style="color:var(--pink)">Reputational</button>
    <button class="filter-btn" data-cat="catastrophe" onclick="filterCards('catastrophe',this)" style="color:var(--accent)">Catastrophe</button>
    <button class="filter-btn" data-cat="model" onclick="filterCards('model',this)" style="color:var(--teal)">Model</button>
    <button class="filter-btn" data-cat="persistency" onclick="filterCards('persistency',this)" style="color:var(--indigo)">Persistency</button>
    <input class="search-box" id="searchBox" placeholder="Search risks…" oninput="searchCards(this.value)"/>
  </div>

  <div class="risk-grid" id="riskGrid"></div>
</div>

<script>
// ─── DYNAMIC DATA LOADER ─────────────────────────────────────────────────
// Risk cards are now driven by Topic_Frameworks.json.
// 1. The "Risks" topic entry provides the master SA1 risk taxonomy bullets.
// 2. Every topic's _meta.risk_categories determines which risk themes it touches.
// A curated RISK_CATALOG maps theme → { label, icon, color } for display.

const RISK_CATALOG = {
  insurance:    { label: 'Insurance Risk',          icon: '🏥', color: 'insurance' },
  market:       { label: 'Market / Investment Risk', icon: '📈', color: 'market' },
  credit:       { label: 'Credit / Default Risk',   icon: '🏦', color: 'credit' },
  operational:  { label: 'Operational Risk',         icon: '⚙️', color: 'operational' },
  liquidity:    { label: 'Liquidity Risk',           icon: '💧', color: 'liquidity' },
  regulatory:   { label: 'Regulatory Risk',          icon: '⚖️', color: 'regulatory' },
  reputational: { label: 'Reputational Risk',        icon: '📣', color: 'reputational' },
  catastrophe:  { label: 'Catastrophe Risk',         icon: '🌪️', color: 'catastrophe' },
  model:        { label: 'Model Risk',               icon: '🧮', color: 'model' },
  persistency:  { label: 'Persistency Risk',         icon: '📉', color: 'persistency' },
};

let RISK_DATA = []; // populated from JSON

function loadRiskData(frameworks) {
  RISK_DATA = [];
  // Group topics by their risk_categories
  const categoryTopics = {}; // theme -> [{topicKey, entry}]
  Object.keys(frameworks).forEach(topicKey => {
    const entry = frameworks[topicKey];
    const cats = (entry && entry._meta && entry._meta.risk_categories) ? entry._meta.risk_categories : [];
    cats.forEach(cat => {
      if (!categoryTopics[cat]) categoryTopics[cat] = [];
      categoryTopics[cat].push({ topicKey, entry });
    });
  });

  // One card per topic per risk category it belongs to
  // But to avoid explosion, create one card per topic showing ALL its risk categories
  const seen = new Set();
  Object.keys(frameworks).forEach(topicKey => {
    const entry = frameworks[topicKey];
    const cats = (entry && entry._meta && entry._meta.risk_categories) ? entry._meta.risk_categories : [];
    if (!cats.length) return;
    if (seen.has(topicKey)) return;
    seen.add(topicKey);

    const primaryCat = cats[0];
    const catalog = RISK_CATALOG[primaryCat] || { label: primaryCat, icon: '⚠️', color: 'insurance' };
    const icon = (entry._meta && entry._meta.icon) ? entry._meta.icon : catalog.icon;
    const lines = entry.bullets || [];
    
    // Extract bullet points
    const bullets = [];
    lines.forEach(line => {
      if (line.startsWith('- **')) {
        const m = line.match(/^- \*\*(.*?)\*\*\s*(?::\s*)?(.*)$/);
        if (m) {
          const title = m[1].trim();
          const detail = m[2].trim();
          bullets.push(`<strong>${title}:</strong> ${detail}`);
        }
      }
    });

    // Category display: show all risk categories for this topic
    const catLabels = cats.map(c => (RISK_CATALOG[c] || { label: c }).label).join(' · ');

    RISK_DATA.push({
      id: `risk-${topicKey.replace(/[^a-zA-Z0-9]/g, '_')}`,
      category: catLabels,
      theme: primaryCat,
      icon: icon,
      title: topicKey,
      badge: catalog.label,
      source: topicKey,
      bullets: bullets.length ? bullets : ['No bullet data available — check Topic_Frameworks.json']
    });
  });

  // Also add a dedicated "Risks Master List" card from the Risks topic
  const risksEntry = frameworks['Risks'];
  if (risksEntry && risksEntry.bullets) {
    // Already included above as a normal topic — remove the generic version and re-add enriched
  }
}

// ─── CATEGORY METADATA ────────────────────────────────────────────────────
const CAT_META = {
  insurance:    { color: "var(--red)",    dot: "#e74c3c" },
  market:       { color: "var(--blue)",   dot: "#3b82f6" },
  credit:       { color: "var(--amber)",  dot: "#f1c40f" },
  operational:  { color: "var(--orange)", dot: "#f97316" },
  liquidity:    { color: "var(--cyan)",   dot: "#06b6d4" },
  regulatory:   { color: "var(--green)",  dot: "#2ecc71" },
  reputational: { color: "var(--pink)",   dot: "#ec4899" },
  catastrophe:  { color: "var(--accent)", dot: "#8b5cf6" },
  model:        { color: "var(--teal)",   dot: "#14b8a6" },
  persistency:  { color: "var(--indigo)", dot: "#6366f1" },
};

// ─── RENDER ───────────────────────────────────────────────────────────────
function renderCards(data) {
  const grid = document.getElementById("riskGrid");
  grid.innerHTML = "";
  if (!data.length) {
    grid.innerHTML = '<div class="empty-state">No risks match this filter.</div>';
    return;
  }
  data.forEach(card => {
    const li = card.bullets.map(b => `<li class="bullet-item">${b}</li>`).join("");
    grid.insertAdjacentHTML("beforeend", `
      <div class="risk-card theme-${card.theme}" id="${card.id}" data-cat="${card.theme}">
        <div class="card-header" onclick="toggleCard('${card.id}')">
          <div class="card-icon">${card.icon}</div>
          <div class="card-title-block">
            <div class="card-category">${card.category}</div>
            <div class="card-title">${card.title}</div>
          </div>
          <div class="card-badge">${card.badge}</div>
          <div class="toggle-arrow">▼</div>
        </div>
        <div class="card-body">
          <ul class="bullet-list">${li}</ul>
          <div class="source-tag">📂 ${card.source}</div>
        </div>
      </div>
    `);
  });
}

function buildSummary() {
  const counts = {};
  RISK_DATA.forEach(c => { counts[c.theme] = (counts[c.theme] || 0) + 1; });
  const row = document.getElementById("summaryRow");
  row.innerHTML = "";
  Object.entries(counts).forEach(([theme, n]) => {
    const m = CAT_META[theme];
    row.insertAdjacentHTML("beforeend", `
      <div class="summary-pill">
        <span class="dot" style="background:${m.dot}"></span>
        <span style="color:${m.color};font-weight:600">${n}</span>
        <span>${theme.charAt(0).toUpperCase()+theme.slice(1)}</span>
      </div>
    `);
  });
  row.insertAdjacentHTML("beforeend", `
    <div class="summary-pill" style="margin-left:auto">
      <span style="font-family:var(--mono);font-size:11px;color:var(--text3)">${RISK_DATA.length} total risk cards</span>
    </div>
  `);
}

// ─── FLY-TO-CENTER EXPAND ENGINE ─────────────────────────────────────────
let activeCard = null;   // currently expanded card element
let ghostEl   = null;   // placeholder holding grid space
let isAnimating = false;

function toggleCard(id) {
  if (isAnimating) return;
  const card = document.getElementById(id);
  if (activeCard && activeCard !== card) {
    // Another card is open — collapse it first, then open this one
    collapseCard(() => expandCard(card));
    return;
  }
  if (activeCard === card) {
    collapseCard();
  } else {
    expandCard(card);
  }
}

function expandCard(card) {
  isAnimating = true;

  // 1. Snapshot card's current position & size in viewport
  const rect = card.getBoundingClientRect();

  // 2. Insert a ghost div in the grid to preserve layout space
  ghostEl = document.createElement("div");
  ghostEl.className = "card-ghost";
  ghostEl.style.width  = rect.width  + "px";
  ghostEl.style.height = rect.height + "px";
  card.parentNode.insertBefore(ghostEl, card);

  // 3. Set card to fixed at its current position (no visual jump)
  card.style.left   = rect.left + "px";
  card.style.top    = rect.top  + "px";
  card.style.width  = rect.width + "px";
  card.style.height = rect.height + "px";
  card.classList.add("flying");

  // 4. Dim overlay + other cards
  const overlay = document.getElementById("cardOverlay");
  overlay.style.display = "block";
  requestAnimationFrame(() => {
    overlay.classList.add("visible");
    document.getElementById("riskGrid").classList.add("has-expanded");
  });

  // 5. Calculate target: center of viewport, capped width
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  const targetW = Math.min(640, vw - 48);
  const targetLeft = (vw - targetW) / 2;
  const targetTop  = vh * 0.08;   // 8% from top

  // 6. Animate to center using CSS transition on explicit props
  card.style.transition = "left .38s cubic-bezier(.4,0,.2,1), top .38s cubic-bezier(.4,0,.2,1), width .38s cubic-bezier(.4,0,.2,1), box-shadow .38s, border-color .38s";
  requestAnimationFrame(() => requestAnimationFrame(() => {
    card.style.left  = targetLeft + "px";
    card.style.top   = targetTop  + "px";
    card.style.width = targetW    + "px";
    card.style.height = "";  // let height expand naturally
  }));

  // 7. After position animation, open the body
  setTimeout(() => {
    card.querySelector(".card-body").style.maxHeight = "2000px";
    card.querySelector(".card-body").style.padding   = "14px 16px 16px";
    activeCard   = card;
    isAnimating  = false;
  }, 380);
}

function collapseCard(callback) {
  if (!activeCard) { if (callback) callback(); return; }
  isAnimating = true;
  const card = activeCard;

  // 1. Close body first
  card.querySelector(".card-body").style.maxHeight = "0";
  card.querySelector(".card-body").style.padding   = "0 16px";

  // 2. Read where the ghost is (its current viewport position = card's home)
  const ghostRect = ghostEl.getBoundingClientRect();

  // 3. Animate card back to ghost's position
  card.style.transition = "left .35s cubic-bezier(.4,0,.2,1), top .35s cubic-bezier(.4,0,.2,1), width .35s cubic-bezier(.4,0,.2,1), box-shadow .35s";
  card.style.left  = ghostRect.left  + "px";
  card.style.top   = ghostRect.top   + "px";
  card.style.width = ghostRect.width + "px";

  // 4. Fade overlay
  document.getElementById("cardOverlay").classList.remove("visible");
  document.getElementById("riskGrid").classList.remove("has-expanded");

  setTimeout(() => {
    // 5. Restore card to normal flow
    card.classList.remove("flying");
    card.style.left = card.style.top = card.style.width = card.style.height = card.style.transition = "";
    card.querySelector(".card-body").style.maxHeight = "";
    card.querySelector(".card-body").style.padding   = "";

    // 6. Remove ghost
    if (ghostEl && ghostEl.parentNode) ghostEl.parentNode.removeChild(ghostEl);
    ghostEl     = null;
    activeCard  = null;
    isAnimating = false;

    document.getElementById("cardOverlay").style.display = "none";
    if (callback) callback();
  }, 360);
}

// ESC key to close
document.addEventListener("keydown", e => { if (e.key === "Escape") collapseCard(); });

let activeFilter = "all";
let searchTerm = "";

function filterCards(cat, btn) {
  collapseCard(() => {
    activeFilter = cat;
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    applyFilters();
  });
}

function searchCards(val) {
  searchTerm = val.toLowerCase();
  if (activeCard) collapseCard(() => applyFilters());
  else applyFilters();
}

function applyFilters() {
  document.querySelectorAll(".risk-card").forEach(card => {
    const catMatch = activeFilter === "all" || card.dataset.cat === activeFilter;
    const text = card.textContent.toLowerCase();
    const searchMatch = !searchTerm || text.includes(searchTerm);
    card.classList.toggle("hidden", !(catMatch && searchMatch));
  });
  // show empty state if all hidden
  const grid = document.getElementById("riskGrid");
  const visible = [...grid.querySelectorAll(".risk-card:not(.hidden)")];
  let empty = grid.querySelector(".empty-state");
  if (!visible.length) {
    if (!empty) grid.insertAdjacentHTML("beforeend", '<div class="empty-state">No risks match this filter.</div>');
  } else {
    if (empty) empty.remove();
  }
}

// ─── CLOCK ────────────────────────────────────────────────────────────────
function updateClock() {
  const now = new Date();
  document.getElementById("clock").textContent =
    now.toLocaleTimeString("en-GB", { hour: "2-digit", minute: "2-digit", second: "2-digit" });
}
setInterval(updateClock, 1000);
updateClock();

// ─── INIT ─────────────────────────────────────────────────────────────────
async function init() {
  try {
    let fw = {};
    try {
      const res = await fetch('data/Topic_Frameworks.json?t=' + Date.now());
      if (res.ok) fw = await res.json();
    } catch {
      const res2 = await fetch('Topic_Frameworks.json?t=' + Date.now());
      if (res2.ok) fw = await res2.json();
    }
    loadRiskData(fw);
  } catch(e) {
    console.warn('Risks: could not load Topic_Frameworks.json, using built-in data', e);
    // RISK_DATA stays empty — renderCards will show empty state
  }
  renderCards(RISK_DATA);
  buildSummary();
}
init();
</script>
