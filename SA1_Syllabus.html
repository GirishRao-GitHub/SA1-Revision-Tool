<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SA1 Master Syllabus Explorer</title>
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap');

        :root {
            --bg: #05070a;
            --sidebar-bg: rgba(13, 17, 23, 0.8);
            --header-bg: rgba(13, 17, 23, 0.9);
            --canvas-bg: #05070a;
            --surface: #161b22;
            --surface-hover: #21262d;
            --border: rgba(255, 255, 255, 0.1);
            --accent: #58a6ff;
            --accent-glow: rgba(88, 166, 255, 0.15);
            --synthesis-iai: #ff7b72;
            --synthesis-ifoa: #d2a8ff;
            --text: #c9d1d9;
            --text-dim: #8b949e;
            --text-bright: #f0f6fc;
            --mono: 'IBM Plex Mono', monospace;
            --sans: 'IBM Plex Sans', sans-serif;
            --glass: blur(12px) saturate(180%);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: var(--sans); background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        header {
            height: 64px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 24px;
            background: var(--header-bg);
            backdrop-filter: var(--glass);
            z-index: 1000;
            gap: 20px;
        }
        .logo { font-weight: 700; font-size: 14px; color: var(--accent); letter-spacing: 0.1em; text-transform: uppercase; margin-right: 20px; }

        /* Topic Selectors */
        .topic-selectors { display: flex; gap: 8px; overflow-x: auto; flex: 1; padding: 4px 0; }
        .topic-selectors::-webkit-scrollbar { height: 0px; }
        .topic-btn {
            padding: 6px 14px;
            border-radius: 6px;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            color: var(--text-dim);
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .topic-btn:hover { background: var(--surface); color: var(--text-bright); border-color: var(--text-dim); }
        .topic-btn.active { color: var(--accent); background: var(--accent-glow); border-color: var(--accent); box-shadow: 0 0 15px var(--accent-glow); }

        /* Source Filters */
        .source-filters { display: flex; gap: 10px; padding-left: 20px; border-left: 1px solid var(--border); }
        .src-btn {
            padding: 6px 16px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 700;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text-dim);
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .src-btn.active { border-color: var(--accent); color: var(--text-bright); background: rgba(88, 166, 255, 0.1); }
        .src-btn.active[data-src="iai"] { border-color: var(--synthesis_iai); color: var(--synthesis-iai); }
        .src-btn.active[data-src="ifoa"] { border-color: var(--synthesis-ifoa); color: var(--synthesis-ifoa); }

        .workspace { display: flex; flex: 1; overflow: hidden; }

        /* Sidebar */
        .sidebar {
            width: 340px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            backdrop-filter: var(--glass);
        }
        .pane-title {
            font-size: 11px; font-weight: 700; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.12em;
            padding: 24px 20px 12px; position: sticky; top: 0; background: var(--sidebar-bg); z-index: 10;
        }
        
        .chapter-node { border-bottom: 1px solid rgba(255,255,255,0.03); }
        .chapter-header { padding: 16px 20px; cursor: pointer; display: flex; align-items: flex-start; justify-content: space-between; transition: background 0.2s; }
        .chapter-header:hover { background: var(--surface); }
        .chapter-header.active { background: var(--accent-glow); }
        .ch-info { display: flex; flex-direction: column; gap: 2px; }
        .ch-id { font-family: var(--mono); font-size: 10px; color: var(--accent); font-weight: 600; opacity: 0.8; }
        .ch-title { font-size: 13.5px; font-weight: 600; color: var(--text-bright); line-height: 1.4; }
        .ch-chevron { font-size: 14px; color: var(--text-dim); margin-top: 4px; transition: transform 0.3s; }
        .chapter-node.open .ch-chevron { transform: rotate(90deg); color: var(--accent); }

        .sections-list { display: none; padding-bottom: 8px; }
        .chapter-node.open .sections-list { display: block; }
        .section-node { padding: 8px 20px 8px 24px; cursor: pointer; font-size: 12px; color: var(--text-dim); transition: 0.2s; position: relative; }
        .section-node:hover { color: var(--text-bright); background: rgba(255,255,255,0.04); }
        .section-node.active { color: var(--accent); background: var(--accent-glow); }
        .section-node.active::before { content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--accent); }
        .section-node.type-h3 { padding-left: 28px; font-weight: 600; border-top: 1px solid rgba(255,255,255,0.02); margin-top: 4px; padding-top: 12px; }
        .section-node.type-h4 { padding-left: 44px; opacity: 0.8; font-size: 11.5px; }

        /* Canvas */
        .canvas { flex: 1; background: var(--canvas-bg); overflow-y: auto; scroll-behavior: smooth; }
        .canvas-inner { max-width: 900px; margin: 0 auto; padding: 60px 40px 120px; }
        
        .canvas-header { margin-bottom: 60px; border-bottom: 1px solid var(--border); padding-bottom: 40px; }
        .canvas-header .ch-id { font-size: 12px; letter-spacing: 0.2em; margin-bottom: 12px; }
        .canvas-title { font-size: 42px; font-weight: 800; color: var(--text-bright); letter-spacing: -0.02em; line-height: 1.1; }
        
        /* Node Styling */
        .node-h3 { font-size: 28px; font-weight: 700; color: var(--text-bright); margin-top: 70px; margin-bottom: 30px; border-left: 4px solid var(--accent); padding-left: 20px; }
        .node-h4 { font-size: 20px; font-weight: 600; color: var(--accent); margin-top: 50px; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 12px; }
        
        .node-point { display: flex; gap: 16px; margin-bottom: 16px; line-height: 1.75; color: var(--text); font-size: 16px; }
        .node-point::before { content: "•"; color: var(--accent); font-size: 20px; flex-shrink: 0; opacity: 0.6; }
        .node-bold { font-weight: 700; color: var(--text-bright); margin-right: 6px; }

        /* Synthesis Callout Styles */
        .synthesis-callout {
            margin: 30px 0;
            padding: 24px;
            border-radius: 12px;
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
        }
        .synthesis-callout::before {
            content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 4px;
        }
        .synthesis-callout[data-src="iai"] { border-color: rgba(255, 123, 114, 0.2); }
        .synthesis-callout[data-src="iai"]::before { background: var(--synthesis-iai); }
        .synthesis-callout[data-src="ifoa"] { border-color: rgba(210, 168, 255, 0.2); }
        .synthesis-callout[data-src="ifoa"]::before { background: var(--synthesis-ifoa); }

        .synthesis-header {
            display: flex; align-items: center; gap: 10px; margin-bottom: 16px;
            font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em;
        }
        .synthesis-header[data-src="iai"] { color: var(--synthesis-iai); }
        .synthesis-header[data-src="ifoa"] { color: var(--synthesis-ifoa); }
        
        .mermaid { background: rgba(255,255,255,0.02); padding: 20px; border-radius: 8px; border: 1px solid var(--border); margin: 30px 0; }

        .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--text-dim); }
        .hidden-node { display: none !important; }
        
        /* Utility */
        .top-nav-btn { color: var(--text-dim); text-decoration: none; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; transition: 0.2s; }
        .top-nav-btn:hover { color: var(--text-bright); }

        @media (max-width: 1024px) {
            .sidebar { width: 280px; }
            .canvas-inner { padding: 40px 20px; }
        }
    </style>
</head>
<body>

    <header>
        <a href="SA1ity_Check.html" class="top-nav-btn">⟵ Back</a>
        <div class="logo">SA1 Syllabus Explorer</div>
        <div class="topic-selectors" id="topic-bar"></div>
        <div class="source-filters">
            <button class="src-btn active" data-src="acted" onclick="toggleSource('acted')">ActEd</button>
            <button class="src-btn active" data-src="iai" onclick="toggleSource('iai')">IAI Synthesis</button>
            <button class="src-btn active" data-src="ifoa" onclick="toggleSource('ifoa')">IFoA Synthesis</button>
        </div>
    </header>

    <div class="workspace">
        <div class="sidebar">
            <div class="pane-title">Syllabus Structure</div>
            <div id="tree-container"></div>
        </div>

        <div class="canvas" id="canvas">
            <div id="canvas-inner" class="canvas-inner" style="display:none;"></div>
            <div id="canvas-placeholder" class="empty-state">
                <div style="font-size:48px; filter: grayscale(1) opacity(0.2);">📚</div>
                <div style="font-size:14px; margin-top:20px; font-weight:500; letter-spacing: 0.05em; text-transform: uppercase;">Select a chapter to explore</div>
            </div>
        </div>
    </div>

    <script>
        const PARTS = [
            { id: 1, name: "Products & Env", range: [1, 6] },
            { id: 2, name: "Pricing & Reg", range: [7, 10] },
            { id: 3, name: "Valuation", range: [11, 14] },
            { id: 4, name: "Capital & Re", range: [15, 18] },
            { id: 5, name: "Monitoring", range: [19, 20] },
            { id: 6, name: "Strategy", range: [21, 27] }
        ];

        let unifiedData = null;
        let activePart = null;
        let activeChapter = null;
        let activeSectionIdx = null;
        let activeSources = { acted: true, iai: true, ifoa: true };

        async function init() {
            try {
                const res = await fetch('data/Unified_Syllabus.json?t=' + Date.now());
                unifiedData = await res.json();
                renderTopicBar();
                renderHierarchy();
                mermaid.initialize({ startOnLoad: false, theme: 'dark', securityLevel: 'loose' });
            } catch (e) { console.error(e); }
        }

        function renderTopicBar() {
            const bar = document.getElementById('topic-bar');
            bar.innerHTML = PARTS.map(pt => `
                <button class="topic-btn ${activePart === pt.id ? 'active' : ''}" onclick="filterByPart(${pt.id})">
                    P${pt.id}: ${pt.name}
                </button>
            `).join('') + `<button class="topic-btn ${!activePart ? 'active' : ''}" onclick="filterByPart(null)">All Chapters</button>`;
        }

        function toggleSource(src) {
            activeSources[src] = !activeSources[src];
            document.querySelectorAll(`.src-btn[data-src="${src}"]`).forEach(btn => btn.classList.toggle('active', activeSources[src]));
            applyFilters();
        }

        function filterByPart(id) {
            activePart = id;
            renderTopicBar();
            renderHierarchy();
        }

        function renderHierarchy() {
            const container = document.getElementById('tree-container');
            let html = '';
            // We'll iterate through existing chapters in unifiedData or a fixed list
            for(let i=1; i<=27; i++) {
                const id = "Ch" + i;
                const data = unifiedData.Chapters[id];
                const actualPart = (i <= 6 ? 1 : i <= 10 ? 2 : i <= 14 ? 3 : i <= 18 ? 4 : i <= 20 ? 5 : 6);
                if (activePart && actualPart !== activePart) continue;

                const isOpen = activeChapter === id;
                html += `
                    <div class="chapter-node ${isOpen ? 'open' : ''}">
                        <div class="chapter-header ${isOpen ? 'active' : ''}" onclick="toggleChapter('${id}')">
                            <div class="ch-info">
                                <span class="ch-id">CHAPTER ${i}</span>
                                <span class="ch-title">${data ? data.title : 'Content Pending'}</span>
                            </div>
                            <span class="ch-chevron">›</span>
                        </div>
                        <div class="sections-list">
                            ${data ? data.content.map((node, idx) => {
                                if (node.type === "h3" || node.type === "h4") {
                                    const typeClass = node.type === "h3" ? "type-h3" : "type-h4";
                                    return `<div class="section-node ${typeClass} ${activeSectionIdx === idx ? 'active' : ''}" 
                                                 onclick="selectSection('${id}', ${idx}, '${node.text}')">${node.text}</div>`;
                                }
                                return '';
                            }).join('') : ''}
                        </div>
                    </div>
                `;
            }
            container.innerHTML = html;
        }

        function toggleChapter(id) {
            if (!unifiedData.Chapters[id]) return;
            activeChapter = (activeChapter === id) ? null : id;
            if (activeChapter) renderCanvas(unifiedData.Chapters[id]);
            else document.getElementById('canvas-inner').style.display = 'none', document.getElementById('canvas-placeholder').style.display = 'flex';
            renderHierarchy();
        }

        function selectSection(chId, idx, text) {
            activeSectionIdx = idx;
            renderHierarchy();
            const safeId = "sec-" + text.replace(/\s+/g, '_').replace(/[^\w-]/g, '');
            const el = document.getElementById(safeId);
            if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function renderCanvas(data) {
            document.getElementById('canvas-placeholder').style.display = 'none';
            const container = document.getElementById('canvas-inner');
            container.style.display = 'block';

            let html = `<div class="canvas-header">
                            <div class="ch-id">${activeChapter.toUpperCase()} SYLLABUS</div>
                            <div class="canvas-title">${data.title}</div>
                        </div>`;
            
            let inCallout = false;
            let calloutSrc = null;

            data.content.forEach((node, idx) => {
                const type = node.type;
                const text = node.text || "";
                const bold = node.bold || "";
                
                // Identify source tags
                let srcTag = 'acted';
                if (text.includes('[src:IAI') || bold.includes('[src:IAI')) srcTag = 'iai';
                else if (text.includes('[src:IFoA') || bold.includes('[src:IFoA')) srcTag = 'ifoa';
                
                // Synthesis Callout Logic: If it starts with ***, start or end a callout
                if (type === "text" && text.startsWith("***")) {
                    if (inCallout) html += `</div>`; // Close previous
                    
                    inCallout = true;
                    calloutSrc = text.toLowerCase().includes("iai") ? "iai" : "ifoa";
                    const label = text.split("***")[1].split("[")[0].trim();
                    
                    html += `<div class="synthesis-callout" data-src="${calloutSrc}">
                                <div class="synthesis-header" data-src="${calloutSrc}">
                                    <span>✦</span> ${label.toUpperCase()}
                                </div>`;
                    return;
                }

                let cleanText = text.replace(/\[src:.*?\]/g, '').trim();
                let cleanBold = bold.replace(/\[src:.*?\]/g, '').trim();

                const commonAttrs = `data-src="${srcTag}" data-node-idx="${idx}"`;

                if (type === "h3" || type === "h4") {
                    if (inCallout) { html += `</div>`; inCallout = false; }
                    html += `<div class="node-${type}" ${commonAttrs} id="sec-${cleanText.replace(/\s+/g, '_').replace(/[^\w-]/g, '')}">${cleanText}</div>`;
                } else if (type === "point") {
                    html += `<div class="node-point" ${commonAttrs}>
                                <span>
                                    ${cleanBold ? `<span class="node-bold">${cleanBold}:</span>` : ''}${cleanText}
                                </span>
                             </div>`;
                } else if (type === "mermaid") {
                    html += `<div class="mermaid" ${commonAttrs}>${text}</div>`;
                } else if (type === "text") {
                    html += `<div ${commonAttrs} style="margin:20px 0; line-height:1.7; font-size:15px; color:var(--text-dim);">${cleanText}</div>`;
                }
            });
            
            if (inCallout) html += `</div>`;
            
            container.innerHTML = html;
            applyFilters();
            setTimeout(() => {
                try { mermaid.run(); } catch(e) {}
            }, 100);
        }

        function applyFilters() {
            document.querySelectorAll('[data-src]').forEach(el => {
                const src = el.getAttribute('data-src');
                const isVisible = activeSources[src];
                el.classList.toggle('hidden-node', !isVisible);
            });
            // Also handle callouts - if all children are hidden, hide callout
            document.querySelectorAll('.synthesis-callout').forEach(co => {
                const nodes = co.querySelectorAll('[data-src]');
                const anyVisible = Array.from(nodes).some(n => !n.classList.contains('hidden-node'));
                co.classList.toggle('hidden-node', !anyVisible);
            });
        }

        window.onload = init;
    </script>
</body>
</html>
