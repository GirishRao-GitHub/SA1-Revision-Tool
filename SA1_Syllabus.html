<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SA1 Master Syllabus Explorer</title>
    <link rel="stylesheet" href="index.css">
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
</head>
<body>

    <div class="scroll-progress" id="scroll-progress"></div>

    <header>
        <div class="logo-group">
            <a href="SA1ity_Check.html" class="src-btn" style="text-decoration:none;">⟵</a>
            <div class="logo">SA1 <span>Syllabus Explorer</span></div>
        </div>
        
        <div class="topic-selectors" id="topic-bar"></div>
        
        <div class="source-filters">
            <button class="src-btn active" data-src="acted" onclick="toggleSource('acted')">Course Notes</button>
            <button class="src-btn active" data-src="iai" onclick="toggleSource('iai')">IAI</button>
            <button class="src-btn active" data-src="ifoa" onclick="toggleSource('ifoa')">IFoA</button>
            <button class="src-btn active" data-src="notes" onclick="toggleSource('notes')">Synthesis</button>
        </div>
    </header>

    <div class="workspace">
        <div class="sidebar">
            <div class="search-container">
                <div class="search-box">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    <input type="text" id="search-input" placeholder="Search chapters or sections..." oninput="handleSearch()">
                </div>
            </div>
            <div class="tree-container" id="tree-container"></div>
        </div>

        <div class="canvas" id="canvas" onscroll="handleScroll()">
            <div id="canvas-inner" class="canvas-inner" style="display:none;"></div>
            <div id="canvas-placeholder" class="empty-state">
                <div style="font-size:64px; margin-bottom: 24px;">🔭</div>
                <h2 style="color: var(--text-bright); margin-bottom: 12px;">Welcome to the SA1 Explorer</h2>
                <p style="max-width: 300px; line-height: 1.6;">Select a chapter from the sidebar to begin your deep-dive revision.</p>
            </div>
        </div>
    </div>

    <div class="floating-actions">
        <button class="fab" onclick="scrollToTop()" title="Scroll to Top">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 10l7-7m0 0l7 7m-7-7v18"></path></svg>
        </button>
    </div>

    <script>
        const PARTS = [
            { id: 1, name: "Products & Env", range: [1, 6] },
            { id: 2, name: "Pricing & Reg", range: [7, 10] },
            { id: 3, name: "Valuation", range: [11, 14] },
            { id: 4, name: "Capital & Re", range: [15, 18] },
            { id: 5, name: "Monitoring", range: [19, 20] },
            { id: 6, name: "Strategy", range: [21, 27] }
        ];

        let unifiedData = null;
        let activePart = null;
        let activeChapter = null;
        let activeSectionIdx = null;
        let activeSources = { acted: true, iai: true, ifoa: true, notes: true };
        let searchQuery = "";

        async function init() {
            try {
                const res = await fetch('data/Unified_Syllabus.json?t=' + Date.now());
                unifiedData = await res.json();
                renderTopicBar();
                renderHierarchy();
                mermaid.initialize({ startOnLoad: false, theme: 'dark', securityLevel: 'loose' });
            } catch (e) { 
                console.error("Failed to load syllabus data:", e);
                document.getElementById('tree-container').innerHTML = `<div style="padding:20px; color:var(--synthesis-iai); font-size:12px;">Error loading data. Ensure Unified_Syllabus.json exists.</div>`;
            }
        }

        function renderTopicBar() {
            const bar = document.getElementById('topic-bar');
            bar.innerHTML = PARTS.map(pt => `
                <button class="topic-btn ${activePart === pt.id ? 'active' : ''}" onclick="filterByPart(${pt.id})">
                    Part ${pt.id}: ${pt.name}
                </button>
            `).join('') + `<button class="topic-btn ${!activePart ? 'active' : ''}" onclick="filterByPart(null)">All Chapters</button>`;
        }

        function filterByPart(id) {
            activePart = id;
            renderTopicBar();
            renderHierarchy();
        }

        function handleSearch() {
            searchQuery = document.getElementById('search-input').value.toLowerCase();
            renderHierarchy();
        }

        function renderHierarchy() {
            const container = document.getElementById('tree-container');
            let html = '';
            
            for(let i=1; i<=27; i++) {
                const id = "Ch" + i;
                const data = unifiedData.Chapters[id];
                if (!data && !searchQuery) continue; // Skip missing unless searching

                const actualPart = (i <= 6 ? 1 : i <= 10 ? 2 : i <= 14 ? 3 : i <= 18 ? 4 : i <= 20 ? 5 : 6);
                if (activePart && actualPart !== activePart && !searchQuery) continue;

                // Search Filter
                const titleMatch = data && data.title.toLowerCase().includes(searchQuery);
                const sectionMatches = data ? data.content.filter(n => (n.type === "h3" || n.type === "h4") && n.text.toLowerCase().includes(searchQuery)) : [];
                
                if (searchQuery && !titleMatch && sectionMatches.length === 0) continue;

                const isOpen = activeChapter === id || (searchQuery && sectionMatches.length > 0);
                
                html += `
                    <div class="chapter-node ${isOpen ? 'open' : ''}" id="node-${id}">
                        <div class="chapter-header ${activeChapter === id ? 'active' : ''}" onclick="toggleChapter('${id}')">
                            <div class="ch-info">
                                <span class="ch-id">CHAPTER ${i}</span>
                                <span class="ch-title">${data ? data.title : 'Pending Integration'}</span>
                            </div>
                            <svg class="ch-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                        </div>
                        <div class="sections-list">
                            ${data ? data.content.map((node, idx) => {
                                if (node.type === "h3" || node.type === "h4") {
                                    const matchClass = searchQuery && node.text.toLowerCase().includes(searchQuery) ? 'search-match' : '';
                                    if (searchQuery && !node.text.toLowerCase().includes(searchQuery)) return '';
                                    
                                    const typeClass = node.type === "h3" ? "type-h3" : "type-h4";
                                    return `<div class="section-node ${typeClass} ${activeSectionIdx === idx ? 'active' : ''} ${matchClass}" 
                                                 onclick="selectSection('${id}', ${idx}, '${node.text}')">${node.text}</div>`;
                                }
                                return '';
                            }).join('') : ''}
                        </div>
                    </div>
                `;
            }
            container.innerHTML = html || `<div class="empty-state" style="padding-top:40px;">No matches found</div>`;
        }

        function toggleChapter(id) {
            if (!unifiedData.Chapters[id]) return;
            activeChapter = (activeChapter === id) ? null : id;
            if (activeChapter) renderCanvas(unifiedData.Chapters[id]);
            else {
                document.getElementById('canvas-inner').style.display = 'none';
                document.getElementById('canvas-placeholder').style.display = 'flex';
            }
            renderHierarchy();
        }

        function renderCanvas(data) {
            const container = document.getElementById('canvas-inner');
            document.getElementById('canvas-placeholder').style.display = 'none';
            container.style.display = 'block';

            let html = `<div class="canvas-header">
                            <div class="ch-id">${activeChapter.toUpperCase()} • CORE SYLLABUS</div>
                            <div class="canvas-title">${data.title}</div>
                        </div>`;
            
            let inCallout = false;
            let calloutSrc = null;

            data.content.forEach((node, idx) => {
                const type = node.type;
                const text = node.text || "";
                const bold = node.bold || "";
                
                let srcTag = 'acted';
                if (text.includes('[src:IAI') || bold.includes('[src:IAI')) srcTag = 'iai';
                else if (text.includes('[src:IFoA') || bold.includes('[src:IFoA')) srcTag = 'ifoa';
                else if (text.includes('[src:Notes') || bold.includes('[src:Notes')) srcTag = 'notes';
                
                if (type === "text" && text.startsWith("***")) {
                    if (inCallout) html += `</div>`;
                    inCallout = true;
                    calloutSrc = text.toLowerCase().includes("iai") ? "iai" : text.toLowerCase().includes("ifoa") ? "ifoa" : "notes";
                    const label = text.split("***")[1].split("[")[0].trim();
                    html += `<div class="synthesis-callout" data-src="${calloutSrc}">
                                <div class="synthesis-header" data-src="${calloutSrc}">
                                    <span>✦</span> ${label.toUpperCase()}
                                </div>`;
                    return;
                }

                let cleanText = text.replace(/\[src:.*?\]/g, '').trim();
                let cleanBold = bold.replace(/\[src:.*?\]/g, '').trim();
                const commonAttrs = `data-src="${srcTag}" data-node-idx="${idx}"`;

                if (type === "h3" || type === "h4") {
                    if (inCallout) { html += `</div>`; inCallout = false; }
                    html += `<div class="node-${type}" ${commonAttrs} id="sec-${cleanText.replace(/\s+/g, '_').replace(/[^\w-]/g, '')}">${cleanText}</div>`;
                } else if (type === "point") {
                    html += `<div class="node-point" ${commonAttrs}>
                                <span>${cleanBold ? `<span class="node-bold">${cleanBold}</span>` : ''}${cleanText}</span>
                             </div>`;
                } else if (type === "mermaid") {
                    html += `<div class="mermaid" ${commonAttrs}>${text}</div>`;
                } else if (type === "text") {
                    html += `<div ${commonAttrs} style="margin:24px 0; color:var(--text-dim); font-size:15px;">${cleanText}</div>`;
                }
            });
            
            if (inCallout) html += `</div>`;
            container.innerHTML = html;
            applyFilters();
            
            setTimeout(() => {
                try { mermaid.run(); } catch(e) {}
            }, 100);
            
            document.getElementById('canvas').scrollTop = 0;
        }

        function toggleSource(src) {
            activeSources[src] = !activeSources[src];
            document.querySelectorAll(`.src-btn[data-src="${src}"]`).forEach(btn => btn.classList.toggle('active', activeSources[src]));
            applyFilters();
        }

        function applyFilters() {
            document.querySelectorAll('[data-src]').forEach(el => {
                const src = el.getAttribute('data-src');
                el.classList.toggle('hidden-node', !activeSources[src]);
            });
            document.querySelectorAll('.synthesis-callout').forEach(co => {
                const nodes = co.querySelectorAll('[data-src]');
                const anyVisible = Array.from(nodes).some(n => !n.classList.contains('hidden-node'));
                co.classList.toggle('hidden-node', !anyVisible);
            });
        }

        function handleScroll() {
            const canvas = document.getElementById('canvas');
            const total = canvas.scrollHeight - canvas.clientHeight;
            const progress = (canvas.scrollTop / total) * 100;
            document.getElementById('scroll-progress').style.width = progress + "%";
        }

        function selectSection(chId, idx, text) {
            activeSectionIdx = idx;
            renderHierarchy();
            const safeId = "sec-" + text.replace(/\s+/g, '_').replace(/[^\w-]/g, '');
            const el = document.getElementById(safeId);
            if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function scrollToTop() {
            document.getElementById('canvas').scrollTo({ top: 0, behavior: 'smooth' });
        }

        window.onload = init;
    </script>
</body>
</html>
