<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SA1 Master Syllabus Explorer</title>
    <script src="js/FrameworkParser.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap');

        :root {
            --bg: #0a0c10;
            --sidebar-bg: #11141b;
            --canvas-bg: #0f1117;
            --header-bg: #11141b;
            --surface: #1e2430;
            --surface-hover: #293142;
            --border: rgba(255, 255, 255, 0.08);
            --border-active: rgba(139, 92, 246, 0.5);
            --text: #f0f2f5;
            --text-dim: #94a3b8;
            --accent: #8b5cf6;
            --accent-glow: rgba(139, 92, 246, 0.2);
            --mono: 'JetBrains Mono', monospace;
            --sans: 'Inter', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: var(--sans); background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        header {
            height: 70px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 24px;
            background: var(--header-bg);
            z-index: 1000;
            gap: 24px;
        }
        .logo { font-weight: 700; font-size: 16px; color: var(--accent); white-space: nowrap; margin-right: 12px; }

        /* Topic Selectors (Top Bar) */
        .topic-selectors { display: flex; gap: 4px; overflow-x: auto; flex: 1; }
        .topic-btn {
            padding: 6px 12px;
            border-radius: 6px;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-dim);
            font-size: 10px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
            text-transform: uppercase;
        }
        .topic-btn:hover { color: var(--text); border-color: var(--text-dim); }
        .topic-btn.active { color: var(--accent); background: var(--accent-glow); border-color: var(--accent); }

        /* Source Filters (Top Right) */
        .source-filters { display: flex; gap: 8px; margin-left: auto; border-left: 1px solid var(--border); padding-left: 24px; }
        .src-btn {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 700;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text-dim);
            cursor: pointer;
            transition: all 0.2s;
            display: flex; align-items: center; gap: 6px;
        }
        .src-btn::before { content: ""; width: 6px; height: 6px; border-radius: 50%; background: currentColor; opacity: 0.3; }
        .src-btn.active { border-color: var(--accent); color: #fff; background: var(--accent); }
        .src-btn.active::before { opacity: 1; background: #fff; }

        .workspace { display: flex; flex: 1; overflow: hidden; }

        /* Pane 1: Hierarchy Sidebar */
        .sidebar {
            width: 320px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }
        .pane-title {
            font-size: 10px; font-weight: 700; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.15em;
            padding: 24px 20px 12px; background: var(--sidebar-bg); position: sticky; top: 0; z-index: 100;
        }
        
        .chapter-node { border-bottom: 1px solid rgba(255,255,255,0.03); }
        .chapter-header { padding: 14px 20px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; }
        .chapter-header:hover { background: var(--surface); }
        .chapter-header.active { background: var(--accent-glow); border-left: 3px solid var(--accent); }
        .ch-id { font-family: var(--mono); font-size: 10px; color: var(--accent); font-weight: 600; }
        .ch-title { font-size: 13px; font-weight: 600; margin-top: 2px; }
        .ch-chevron { font-size: 12px; color: var(--text-dim); transition: transform 0.3s; }
        .chapter-node.open .ch-chevron { transform: rotate(90deg); }

        .sections-list { display: none; background: rgba(0,0,0,0.15); }
        .chapter-node.open .sections-list { display: block; }
        .section-node { padding: 6px 20px 6px 24px; cursor: pointer; font-size: 11.5px; color: var(--text-dim); border-left: 2px solid transparent; }
        .section-node.type-h3 { padding-left: 28px; font-weight: 500; color: #fff; }
        .section-node.type-h4 { padding-left: 40px; font-size: 11px; }
        .section-node:hover { color: #fff; background: rgba(255,255,255,0.03); }
        .section-node.active { color: var(--accent); border-left-color: var(--accent); background: rgba(139, 92, 246, 0.05); }

        /* Pane 2: Reading Canvas */
        .canvas { flex: 1; background: var(--canvas-bg); overflow-y: auto; padding: 50px 6%; scroll-behavior: smooth; }
        .canvas-header { margin-bottom: 50px; border-bottom: 1px solid var(--border); padding-bottom: 30px; }
        .canvas-title { font-size: 40px; font-weight: 800; letter-spacing: -0.03em; margin-bottom: 8px; }
        
        /* Node Styling */
        .node-h3 { font-size: 26px; font-weight: 700; color: #fff; margin-top: 60px; margin-bottom: 24px; }
        .node-h4 { font-size: 18px; font-weight: 600; color: var(--accent); margin-top: 40px; margin-bottom: 16px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 8px; }
        .node-point { display: flex; gap: 14px; margin-bottom: 12px; line-height: 1.7; color: #cbd5e1; font-size: 16px; }
        .node-point::before { content: "•"; color: var(--accent); font-size: 20px; flex-shrink: 0; }
        .node-bold { font-weight: 700; color: #fff; margin-right: 4px; }
        
        .synthesis-tag { font-size: 10px; font-weight: 700; text-transform: uppercase; color: var(--accent); background: var(--accent-glow); padding: 2px 6px; border-radius: 4px; margin-right: 8px; }

        .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--text-dim); opacity: 0.3; }
        
        /* Hidden class for source filtering */
        .hidden-node { display: none !important; }
    </style>
</head>
<body>

    <header>
        <div class="logo">SA1 SYLLABUS</div>
        <div class="topic-selectors" id="topic-bar"></div>
        <div class="source-filters">
            <button class="src-btn active" onclick="toggleSource('acted')">ActEd</button>
            <button class="src-btn active" onclick="toggleSource('iai')">IAI</button>
            <button class="src-btn active" onclick="toggleSource('ifoa')">IFoA</button>
        </div>
    </header>

    <div class="workspace">
        <div class="sidebar">
            <div class="pane-title" id="chapter-pane-title">All Chapters</div>
            <div id="tree-container"></div>
        </div>

        <div class="canvas" id="canvas">
            <div id="canvas-content" style="display:none;"></div>
            <div id="canvas-placeholder" class="empty-state">
                <div style="font-size:48px;">📚</div>
                <div style="font-size:16px; margin-top:12px;">Select a chapter to begin your study session</div>
            </div>
        </div>
    </div>

    <script>
        const PARTS = [
            { id: 1, name: "Products & Env", range: [1, 6] },
            { id: 2, name: "Pricing & Reg", range: [7, 10] },
            { id: 3, name: "Valuation & Solvency", range: [11, 14] },
            { id: 4, name: "Capital & Reinsurance", range: [15, 18] },
            { id: 5, name: "Monitoring", range: [19, 20] },
            { id: 6, name: "Strategy & Management", range: [21, 27] }
        ];

        let unifiedData = null;
        let activePart = null;
        let activeChapter = null;
        let activeSectionIdx = null;
        let activeSources = { acted: true, iai: true, ifoa: true };

        async function init() {
            try {
                const res = await fetch('data/Unified_Syllabus.json?t=' + Date.now());
                unifiedData = await res.json();
                renderTopicBar();
                renderHierarchy();
                mermaid.initialize({ startOnLoad: false, theme: 'dark' });
            } catch (e) { console.error(e); }
        }

        function renderTopicBar() {
            const bar = document.getElementById('topic-bar');
            bar.innerHTML = PARTS.map(pt => `
                <button class="topic-btn ${activePart === pt.id ? 'active' : ''}" onclick="filterByPart(${pt.id})">
                    P${pt.id}: ${pt.name}
                </button>
            `).join('') + `<button class="topic-btn ${!activePart ? 'active' : ''}" onclick="filterByPart(null)">All</button>`;
        }

        function toggleSource(src) {
            activeSources[src] = !activeSources[src];
            // Update UI
            document.querySelectorAll('.src-btn').forEach(btn => {
                if (btn.textContent.toLowerCase() === src) btn.classList.toggle('active', activeSources[src]);
            });
            // Apply filtering to canvas
            applyFilters();
        }

        function filterByPart(id) {
            activePart = id;
            renderTopicBar();
            renderHierarchy();
        }

        function renderHierarchy() {
            const container = document.getElementById('tree-container');
            let html = '';
            for(let i=1; i<=27; i++) {
                const id = "Ch" + i;
                const data = unifiedData.Chapters[id];
                const actualPart = (i <= 6 ? 1 : i <= 10 ? 2 : i <= 14 ? 3 : i <= 18 ? 4 : i <= 20 ? 5 : 6);
                if (activePart && actualPart !== activePart) continue;

                const isOpen = activeChapter === id;
                html += `
                    <div class="chapter-node ${isOpen ? 'open' : ''} ${!data ? 'locked' : ''}" style="${!data ? 'opacity:0.3;pointer-events:none;' : ''}">
                        <div class="chapter-header ${isOpen ? 'active' : ''}" onclick="toggleChapter('${id}')">
                            <div class="ch-info">
                                <span class="ch-id">CHAPTER ${i}</span>
                                <span class="ch-title">${data ? data.title : 'Pending...'}</span>
                            </div>
                            <span class="ch-chevron">›</span>
                        </div>
                        <div class="sections-list">
                            ${data ? data.content.map((node, idx) => {
                                if (node.type === "h3" || node.type === "h4") {
                                    const typeClass = node.type === "h3" ? "type-h3" : "type-h4";
                                    return `<div class="section-node ${typeClass} ${activeSectionIdx === idx ? 'active' : ''}" 
                                                 onclick="selectSection('${id}', ${idx}, '${node.text}')">${node.text}</div>`;
                                }
                                return '';
                            }).join('') : ''}
                        </div>
                    </div>
                `;
            }
            container.innerHTML = html;
        }

        function toggleChapter(id) {
            activeChapter = (activeChapter === id) ? null : id;
            if (activeChapter) renderCanvas(unifiedData.Chapters[id]);
            renderHierarchy();
        }

        function selectSection(chId, idx, text) {
            activeSectionIdx = idx;
            renderHierarchy();
            const safeId = "sec-" + text.replace(/\s+/g, '_').replace(/[^\w-]/g, '');
            const el = document.getElementById(safeId);
            if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function renderCanvas(data) {
            document.getElementById('canvas-placeholder').style.display = 'none';
            const container = document.getElementById('canvas-content');
            container.style.display = 'block';

            let html = `<div class="canvas-header"><div class="ch-id">${activeChapter.toUpperCase()}</div><div class="canvas-title">${data.title}</div></div>`;
            data.content.forEach(node => {
                const type = node.type;
                const text = node.text || "";
                const bold = node.bold || "";
                
                // Identify source tags
                let srcTag = 'acted';
                if (text.includes('[src:IAI') || bold.includes('[src:IAI')) srcTag = 'iai';
                if (text.includes('[src:IFoA') || bold.includes('[src:IFoA')) srcTag = 'ifoa';
                
                let cleanText = text.replace(/\[src:.*?\]/g, '').trim();
                let cleanBold = bold.replace(/\[src:.*?\]/g, '').trim();

                if (type === "h3" || type === "h4") {
                    html += `<div class="node-${type}" data-src="${srcTag}" id="sec-${cleanText.replace(/\s+/g, '_').replace(/[^\w-]/g, '')}">${cleanText}</div>`;
                } else if (type === "point") {
                    const isSyn = srcTag !== 'acted';
                    html += `<div class="node-point" data-src="${srcTag}">
                                <span>
                                    ${isSyn ? `<span class="synthesis-tag">${srcTag.toUpperCase()} Insight</span>` : ''}
                                    ${cleanBold ? `<span class="node-bold">${cleanBold}:</span>` : ''}${cleanText}
                                </span>
                             </div>`;
                } else if (type === "mermaid") {
                    html += `<div class="mermaid" data-src="${srcTag}">${text}</div>`;
                } else if (type === "text" && !text.includes("***")) {
                    html += `<div data-src="${srcTag}" style="margin:16px 0;line-height:1.6;font-size:15px;color:var(--text-dim);">${text}</div>`;
                }
            });
            container.innerHTML = html;
            applyFilters();
            setTimeout(() => mermaid.run(), 50);
        }

        function applyFilters() {
            document.querySelectorAll('[data-src]').forEach(el => {
                const src = el.getAttribute('data-src');
                const isVisible = activeSources[src];
                el.classList.toggle('hidden-node', !isVisible);
            });
        }

        window.onload = init;
    </script>
</body>
</html>
