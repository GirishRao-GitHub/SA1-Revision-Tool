<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SA1 · Revision Notes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #0e0f13;
    --surface:   #14161c;
    --border:    #242630;
    --border-hi: #343646;
    --text:      #c8cad4;
    --text-dim:  #686c80;
    --text-hi:   #eceef6;
    --accent:    #e8a030;
    --accent-lo: rgba(232,160,48,.12);
    --accent-md: rgba(232,160,48,.22);
    --green:     #4ec994;
    --green-lo:  rgba(78,201,148,.12);
    --blue:      #5a9cf8;
    --blue-lo:   rgba(90,156,248,.12);
    --red:       #f07070;
    --red-lo:    rgba(240,112,112,.12);
    --radius:    8px;
    --mono:      'IBM Plex Mono', monospace;
    --sans:      'IBM Plex Sans', sans-serif;
    --serif:     'Playfair Display', serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    line-height: 1.7;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── TOP BAR ── */
  header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 0 16px;
    height: 52px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
    z-index: 10;
  }

  /* ── BACK BUTTON ── */
  .back-btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    color: var(--text-dim);
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 4px 10px;
    cursor: pointer;
    text-decoration: none;
    transition: all .15s;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .back-btn:hover {
    color: var(--accent);
    border-color: var(--accent);
    background: var(--accent-lo);
  }
  .back-btn svg { width: 12px; height: 12px; }

  .logo {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 500;
    color: var(--accent);
    letter-spacing: .04em;
    white-space: nowrap;
  }
  .logo span { color: var(--text-dim); font-weight: 400; }
  .header-sep { width: 1px; height: 20px; background: var(--border); flex-shrink: 0; }
  .chapter-title {
    font-family: var(--serif);
    font-size: 14px;
    color: var(--text-hi);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
    min-width: 0;
  }
  .view-tabs { display: flex; gap: 4px; margin-left: auto; flex-shrink: 0; }
  .view-tab {
    font-family: var(--mono);
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    transition: all .15s;
    letter-spacing: .03em;
  }
  .view-tab:hover { border-color: var(--border-hi); color: var(--text); }
  .view-tab.active { background: var(--accent-lo); border-color: var(--accent); color: var(--accent); }

  /* ── LAYOUT ── */
  .workspace { display: flex; flex: 1; overflow: hidden; }

  /* ── SIDEBAR ── */
  .sidebar {
    width: 260px;
    min-width: 260px;
    border-right: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .sidebar-search {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-search input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 6px 10px;
    font-family: var(--sans);
    font-size: 12px;
    color: var(--text);
    outline: none;
    transition: border-color .15s;
  }
  .sidebar-search input:focus { border-color: var(--accent); }
  .sidebar-search input::placeholder { color: var(--text-dim); }

  .nav-tree { overflow-y: auto; flex: 1; padding: 6px 0; }
  .nav-tree::-webkit-scrollbar { width: 4px; }
  .nav-tree::-webkit-scrollbar-track { background: transparent; }
  .nav-tree::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 2px; }

  /* Part group label */
  .nav-part-label {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--text-dim);
    padding: 12px 14px 4px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .nav-part-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* Chapter row (top level) */
  .nav-chapter {
    margin-bottom: 1px;
  }
  .nav-chapter-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 12px;
    cursor: pointer;
    color: var(--text);
    font-size: 11.5px;
    font-weight: 500;
    user-select: none;
    transition: background .12s;
  }
  .nav-chapter-header:hover { background: var(--bg); }
  .nav-chapter-header.active { color: var(--accent); }
  .nav-ch-num {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--accent);
    background: var(--accent-lo);
    padding: 1px 5px;
    border-radius: 3px;
    min-width: 28px;
    text-align: center;
    flex-shrink: 0;
  }
  .nav-ch-num.no-data {
    color: var(--text-dim);
    background: var(--border);
  }
  .nav-ch-title {
    flex: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .nav-chevron {
    margin-left: auto;
    width: 11px;
    height: 11px;
    color: var(--text-dim);
    transition: transform .2s;
    flex-shrink: 0;
  }
  .nav-chapter.open .nav-chevron { transform: rotate(90deg); }
  .nav-subsections { display: none; }
  .nav-chapter.open .nav-subsections { display: block; }

  /* Subsection rows */
  .nav-sub {
    padding: 4px 12px 4px 44px;
    font-size: 11px;
    color: var(--text-dim);
    cursor: pointer;
    transition: all .12s;
    border-left: 2px solid transparent;
    margin-left: 12px;
    line-height: 1.4;
  }
  .nav-sub:hover { color: var(--text); background: var(--bg); }
  .nav-sub.active { color: var(--accent); border-left-color: var(--accent); background: var(--accent-lo); }

  /* Upload hint row */
  .nav-upload-hint {
    padding: 6px 12px 6px 44px;
    font-size: 10.5px;
    color: var(--text-dim);
    font-style: italic;
    margin-left: 12px;
    opacity: .7;
  }

  /* ── CANVAS ── */
  .canvas {
    flex: 1;
    overflow-y: auto;
    padding: 32px 40px;
    position: relative;
  }
  .canvas::-webkit-scrollbar { width: 6px; }
  .canvas::-webkit-scrollbar-track { background: transparent; }
  .canvas::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 3px; }

  /* ── PROGRESS BAR ── */
  .progress-bar {
    position: fixed;
    top: 52px;
    left: 260px;
    right: 0;
    height: 2px;
    background: var(--border);
    z-index: 20;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width .1s;
  }

  /* ── CONTENT ── */
  .content-empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 70vh;
    text-align: center;
    gap: 12px;
    color: var(--text-dim);
  }
  .content-empty .icon { font-size: 48px; }
  .content-empty h2 { font-family: var(--serif); font-size: 22px; color: var(--text); }
  .content-empty p { font-size: 13px; max-width: 300px; line-height: 1.6; }

  /* Welcome state — chapter index cards */
  .welcome-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 10px;
    margin-top: 24px;
  }
  .welcome-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    transition: border-color .15s, background .15s;
  }
  .welcome-card:hover { border-color: var(--accent); background: var(--accent-lo); }
  .welcome-card.no-data { opacity: .45; cursor: default; }
  .welcome-card.no-data:hover { border-color: var(--border); background: var(--surface); }
  .wc-num {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--accent);
    background: var(--accent-lo);
    border-radius: 4px;
    padding: 2px 6px;
    min-width: 30px;
    text-align: center;
    flex-shrink: 0;
  }
  .wc-num.no-data { color: var(--text-dim); background: var(--border); }
  .wc-title { font-size: 12px; color: var(--text); line-height: 1.4; }
  .wc-badge {
    margin-left: auto;
    font-family: var(--mono);
    font-size: 9px;
    color: var(--green);
    background: var(--green-lo);
    border-radius: 3px;
    padding: 1px 5px;
    flex-shrink: 0;
  }

  .section-hero {
    margin-bottom: 36px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }
  .section-eyebrow {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 8px;
  }
  .section-name {
    font-family: var(--serif);
    font-size: 26px;
    color: var(--text-hi);
    line-height: 1.25;
    margin-bottom: 10px;
  }
  .syllabus-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .tag {
    font-family: var(--mono);
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 3px;
    border: 1px solid;
    letter-spacing: .04em;
  }
  .tag-syllabus { border-color: var(--blue); color: var(--blue); background: var(--blue-lo); }
  .tag-product  { border-color: var(--accent); color: var(--accent); background: var(--accent-lo); }
  .tag-pages    { border-color: var(--border-hi); color: var(--text-dim); background: transparent; }

  /* subsection block */
  .subsection-block {
    margin-bottom: 32px;
    scroll-margin-top: 20px;
    animation: fadeUp .25s ease both;
  }
  .subsection-block:nth-child(2) { animation-delay: .05s; }
  .subsection-block:nth-child(3) { animation-delay: .1s; }

  .subsection-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
  }
  .sub-id {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    background: var(--border);
    padding: 2px 7px;
    border-radius: 4px;
  }
  .sub-title {
    font-family: var(--serif);
    font-size: 17px;
    color: var(--text-hi);
  }

  /* bullet list */
  .bullets-list { display: flex; flex-direction: column; gap: 5px; margin-bottom: 18px; }
  .bullet-item {
    display: flex;
    gap: 10px;
    padding: 8px 12px;
    border-radius: var(--radius);
    background: var(--surface);
    border: 1px solid var(--border);
    font-size: 13px;
    line-height: 1.6;
    color: var(--text);
    transition: border-color .15s, background .15s;
  }
  .bullet-item:hover { border-color: var(--border-hi); background: #191b22; }
  .bullet-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    flex-shrink: 0;
    margin-top: 7px;
  }

  /* key terms */
  .terms-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 8px;
    margin-bottom: 18px;
  }
  .term-card {
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 12px;
    background: var(--surface);
    transition: border-color .15s;
  }
  .term-card:hover { border-color: var(--green); }
  .term-name {
    font-family: var(--mono);
    font-size: 11.5px;
    font-weight: 500;
    color: var(--green);
    margin-bottom: 4px;
  }
  .term-def { font-size: 12.5px; color: var(--text-dim); line-height: 1.5; }

  /* Q&A */
  .qa-block {
    border: 1px solid var(--border);
    border-left: 3px solid var(--blue);
    border-radius: var(--radius);
    overflow: hidden;
    margin-bottom: 8px;
    background: var(--surface);
  }
  .qa-question {
    padding: 10px 14px;
    font-size: 13px;
    font-weight: 500;
    color: var(--blue);
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 8px;
    user-select: none;
    transition: background .12s;
  }
  .qa-question:hover { background: var(--blue-lo); }
  .qa-toggle {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
    flex-shrink: 0;
    margin-top: 2px;
  }
  .qa-toggle::after { content: '▼'; }
  .qa-answer {
    display: none;
    padding: 10px 14px 12px;
    border-top: 1px solid var(--border);
    font-size: 13px;
    color: var(--text);
    line-height: 1.65;
    background: var(--blue-lo);
  }
  .qa-block.open .qa-answer { display: block; }
  .qa-block.open .qa-toggle::after { content: '▲'; }

  /* section label rows */
  .row-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 8px;
    margin-top: 20px;
    padding-left: 2px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .row-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* ── FLASH CARD VIEW ── */
  .flashcard-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 12px;
  }
  .flashcard {
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    padding: 16px;
    cursor: pointer;
    min-height: 120px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    transition: border-color .15s, transform .1s;
    position: relative;
    overflow: hidden;
  }
  .flashcard:hover { border-color: var(--accent); transform: translateY(-1px); }
  .flashcard.flipped .card-front { display: none; }
  .flashcard.flipped .card-back { display: flex; }
  .card-back { display: none; flex-direction: column; justify-content: center; height: 100%; }
  .card-front { display: flex; flex-direction: column; justify-content: space-between; height: 100%; }
  .card-src {
    font-family: var(--mono);
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: .1em;
    color: var(--text-dim);
    margin-bottom: 8px;
  }
  .card-q { font-size: 13px; color: var(--text-hi); font-weight: 500; flex: 1; }
  .card-hint { font-size: 11px; color: var(--text-dim); margin-top: 8px; }
  .card-a { font-size: 12.5px; color: var(--text); line-height: 1.6; }
  .card-flip-icon {
    position: absolute;
    bottom: 10px; right: 10px;
    font-size: 10px;
    color: var(--text-dim);
    font-family: var(--mono);
  }

  /* ── GLOSSARY VIEW ── */
  .glossary-list { display: flex; flex-direction: column; gap: 1px; }
  .glossary-item {
    display: grid;
    grid-template-columns: 180px 1fr;
    gap: 16px;
    padding: 10px 14px;
    border-radius: 4px;
    background: var(--surface);
    border: 1px solid var(--border);
    transition: border-color .12s;
  }
  .glossary-item:hover { border-color: var(--green); }
  .glossary-term {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 500;
    color: var(--green);
    align-self: center;
  }
  .glossary-def { font-size: 13px; color: var(--text); line-height: 1.5; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .hidden { display: none !important; }
  strong { color: var(--text-hi); font-weight: 500; }
</style>
</head>
<body>

<header>
  <a class="back-btn" href="SA1ity_Check.html" title="Back to SA1ity Check">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <path d="M15 18l-6-6 6-6"/>
    </svg>
    SA1ity Check
  </a>
  <div class="header-sep"></div>
  <div class="logo">SA1 <span>·</span> REVISION NOTES</div>

  <div class="view-tabs">
    <button class="view-tab active" onclick="setView('notes')" id="tab-notes">Notes</button>
    <button class="view-tab" onclick="setView('flashcards')" id="tab-flashcards">Flashcards</button>
    <button class="view-tab" onclick="setView('glossary')" id="tab-glossary">Glossary</button>
  </div>
</header>

<div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>

<div class="workspace">
  <aside class="sidebar">
    <div class="sidebar-search">
      <input type="text" placeholder="Search chapters & topics…" id="search-input" oninput="handleSearch()">
    </div>
    <nav class="nav-tree" id="nav-tree"></nav>
  </aside>

  <main class="canvas" id="canvas" onscroll="handleScroll()">
    <div id="content-area"></div>
  </main>
</div>

<script>
// ── CHAPTER MANIFEST ─────────────────────────────────────
// Full SA1 syllabus — 27 chapters across 4 parts
// Data for chapters is loaded from CHAPTER_DATA below.
// Chapters with no data yet show an "upload pending" state.

const PART_LABELS = {

  3: "Part 3 · Regulation, Solvency & Capital",
  4: "Part 4 · ALM, Strategy & Practice",

// ── CHAPTER DATA ─────────────────────────────────────────
// Each uploaded chapter JSON is registered here.
// Key = chapter number (as string). Value = the chapter data object.
// To add a chapter: CHAPTER_DATA["1"] = { ...json... };
// Ch3 is pre-loaded as the example chapter.

const CHAPTER_DATA = {
  "2": {
    "exam": "SA1",
    "chapter": "Ch2",
    "title": "Short-term Health & Care Insurance Products",
    "syllabus_refs": ["1.1.1", "1.1.2"],

    "sections": [
      {
        "id": "1",
        "title": "Private Medical Insurance (PMI)",
        "subsections": [
          {
            "id": "1.1",
            "title": "Benefits and Features",
            "bullets": [
              "PMI reimburses policyholders for medical treatment costs; level of cover depends on what the State provides.",

              "PPO: preferred list of providers — insurer has negotiated preferential rates, reducing costs for both parties.",
              "High/unexpected claim rates managed by: excluding pre-existing conditions, underwriting, GP referrals as gatekeepers.",
              "Excesses, coinsurance, and no-claims discounts reduce small claim frequency and drive down premiums.",
              "ACA (USA): individual mandate ensured younger/healthier lives entered the risk pool; also capped annual out-of-pocket expenses.",

            ],
            "key_terms": [
              { "term": "HMO", "definition": "Health Maintenance Organisation — care only provided within the network." },
              { "term": "PPO", "definition": "Preferred Provider Organisation — insurer-approved list with negotiated rates." },
              { "term": "Anti-selection", "definition": "Higher-risk individuals being more likely to take out or retain cover." },

};

// ── HOW TO ADD A NEW CHAPTER ──────────────────────────────
// 1. Prepare a JSON file in the same format as above (exam, chapter, title,
//    syllabus_refs, products_covered, sections[{id, title, subsections[
//    {id, title, bullets[], key_terms[], exam_qa[]}]}])
// 2. In this <script> block, add:
//    CHAPTER_DATA["N"] = <paste JSON object here>;
//    where N is the chapter number (e.g. "1", "3", "4" …)
// ─────────────────────────────────────────────────────────

// ── STATE ────────────────────────────────────────────────
let activeView      = 'notes';
let activeChapterNum = null;  // number
let activeSectionId  = null;
let activeSubId      = null;
let searchQuery      = '';

// ── INIT ─────────────────────────────────────────────────
renderNav();
showWelcome();

// ── NAV RENDERING ────────────────────────────────────────
function renderNav() {
  const tree = document.getElementById('nav-tree');
  const q = searchQuery.toLowerCase();
  let html = '';
  let lastPart = 'NONE';

  CHAPTERS.forEach(ch => {
    const data = CHAPTER_DATA[String(ch.num)];
    const chLabel = ch.num === 0 ? 'Ch 0' : `Ch ${ch.num}`;

    // Part separator
    const partKey = ch.part === null ? (ch.num === 26 ? 'GLOSS' : 'INTRO') : ch.part;
    if (partKey !== lastPart) {
      if (ch.part !== null) {
        html += `<div class="nav-part-label">${PART_LABELS[ch.part]}</div>`;
      } else if (ch.num === 26) {
        html += `<div class="nav-part-label">Reference</div>`;
      }
      lastPart = partKey;
    }

    // Filter by search
    if (q) {
      const titleMatch = ch.title.toLowerCase().includes(q);
      const sectionMatch = data && data.sections && data.sections.some(s =>
        s.title.toLowerCase().includes(q) ||
        (s.subsections && s.subsections.some(sub => sub.title.toLowerCase().includes(q)))
      );
      if (!titleMatch && !sectionMatch) return;
    }

    const isOpen   = activeChapterNum === ch.num || (q && data);
    const isActive = activeChapterNum === ch.num;
    const hasData  = !!data;

    html += `<div class="nav-chapter ${isOpen ? 'open' : ''}" id="nav-ch-${ch.num}">
      <div class="nav-chapter-header ${isActive ? 'active' : ''}" onclick="toggleChapter(${ch.num})">
        <span class="nav-ch-num ${!hasData ? 'no-data' : ''}">${chLabel}</span>
        <span class="nav-ch-title">${ch.title}</span>
        ${hasData ? `<svg class="nav-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>` : ''}
      </div>
      <div class="nav-subsections">`;

    if (hasData) {
      data.sections.forEach(sec => {
        const secMatch = !q || sec.title.toLowerCase().includes(q);
        sec.subsections.forEach(sub => {
          if (q && !secMatch && !sub.title.toLowerCase().includes(q)) return;
          const isSubActive = activeChapterNum === ch.num && activeSubId === sub.id;
          html += `<div class="nav-sub ${isSubActive ? 'active' : ''}" onclick="selectSub(${ch.num}, '${sec.id}', '${sub.id}')">${sub.id} · ${sub.title}</div>`;
        });
      });
    } else {
      html += `<div class="nav-upload-hint">Notes not yet uploaded</div>`;
    }

    html += `</div></div>`;
  });

  tree.innerHTML = html;
}

function toggleChapter(num) {
  if (activeChapterNum === num) {
    activeChapterNum = null;
    activeSectionId  = null;
    activeSubId      = null;
    renderNav();
    showWelcome();
    document.getElementById('header-chapter-title').textContent = 'Health and Care · All Chapters';
    return;
  }
  activeChapterNum = num;
  activeSectionId  = null;
  activeSubId      = null;
  renderNav();

  const data = CHAPTER_DATA[String(num)];
  const ch   = CHAPTERS.find(c => c.num === num);
  if (data) {
    document.getElementById('header-chapter-title').textContent = `Ch ${num} · ${data.title}`;
    renderChapterOverview(num);
  } else {
    document.getElementById('header-chapter-title').textContent = `Ch ${num} · ${ch.title}`;
    showNoData(ch);
  }
}

function selectSub(chNum, secId, subId) {
  activeChapterNum = chNum;
  activeSectionId  = secId;
  activeSubId      = subId;
  renderNav();
  const data = CHAPTER_DATA[String(chNum)];
  if (data) renderSection(data, secId, subId);
}

function handleSearch() {
  searchQuery = document.getElementById('search-input').value;
  renderNav();
}

function handleScroll() {
  const canvas = document.getElementById('canvas');
  const fill   = document.getElementById('progress-fill');
  const total  = canvas.scrollHeight - canvas.clientHeight;
  fill.style.width = total > 0 ? (canvas.scrollTop / total * 100) + '%' : '0%';
}

// ── VIEW SWITCHING ────────────────────────────────────────
function setView(v) {
  activeView = v;
  ['notes','flashcards','glossary'].forEach(id => {
    document.getElementById('tab-' + id).classList.toggle('active', id === v);
  });
  if (activeChapterNum !== null) {
    const data = CHAPTER_DATA[String(activeChapterNum)];
    if (data) {
      if (activeSectionId) {
        renderSection(data, activeSectionId, activeSubId);
      } else {
        if (v === 'notes') renderChapterOverview(activeChapterNum);
        else renderGlobalView(v, data);
      }
    }
  } else {
    showWelcome();
  }
}

// ── WELCOME / CHAPTER INDEX ───────────────────────────────
function showWelcome() {
  const loadedNums = Object.keys(CHAPTER_DATA).map(Number);
  let html = `
    <div style="max-width:800px;margin:0 auto;">
      <div class="section-hero">
        <div class="section-eyebrow">SA1 · Health and Care · Advanced</div>
        <div class="section-name">Revision Notes</div>
        <p style="font-size:13px;color:var(--text-dim);line-height:1.7;margin-top:8px;">
          All 27 chapters of the SA1 course. Chapters with notes loaded are highlighted —
          select any chapter to begin revising. Upload additional chapter JSON files to expand your notes.
        </p>
      </div>`;

  // Stats row
  const totalPages = CHAPTERS.reduce((s, c) => s + c.pages, 0);
  html += `<div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:28px;">
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px 16px;display:flex;align-items:center;gap:10px;">
      <span style="font-family:var(--mono);font-size:20px;font-weight:700;color:var(--accent);">${CHAPTERS.length}</span>
      <span style="font-size:11px;color:var(--text-dim);">Chapters</span>
    </div>
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px 16px;display:flex;align-items:center;gap:10px;">
      <span style="font-family:var(--mono);font-size:20px;font-weight:700;color:var(--green);">${loadedNums.length}</span>
      <span style="font-size:11px;color:var(--text-dim);">Loaded</span>
    </div>
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px 16px;display:flex;align-items:center;gap:10px;">
      <span style="font-family:var(--mono);font-size:20px;font-weight:700;color:var(--blue);">${totalPages}</span>
      <span style="font-size:11px;color:var(--text-dim);">Total pages</span>
    </div>
  </div>`;

  // Chapter grid by part
  let lastPart = 'NONE';
  html += `<div class="welcome-grid">`;

  CHAPTERS.forEach(ch => {
    const hasData = !!CHAPTER_DATA[String(ch.num)];
    const chLabel = ch.num === 0 ? 'Ch 0' : `Ch ${ch.num}`;
    html += `<div class="welcome-card ${!hasData ? 'no-data' : ''}" onclick="${hasData ? `toggleChapter(${ch.num})` : ''}">
      <span class="wc-num ${!hasData ? 'no-data' : ''}">${chLabel}</span>
      <span class="wc-title">${ch.title}</span>
      ${hasData ? `<span class="wc-badge">✓ loaded</span>` : `<span style="font-family:var(--mono);font-size:9px;color:var(--border-hi);margin-left:auto;flex-shrink:0;">${ch.pages}pp</span>`}
    </div>`;
  });

  html += `</div></div>`;
  document.getElementById('content-area').innerHTML = html;
  document.getElementById('canvas').scrollTop = 0;
}

function showNoData(ch) {
  document.getElementById('content-area').innerHTML = `
    <div class="content-empty">
      <div class="icon">📂</div>
      <h2>Ch ${ch.num} · ${ch.title}</h2>
      <p>Notes for this chapter haven't been uploaded yet.<br>
      Add the chapter JSON to <code style="font-family:var(--mono);font-size:11px;color:var(--accent);">CHAPTER_DATA["${ch.num}"]</code> in the script to enable it.<br><br>
      <span style="color:var(--text-dim);">${ch.pages} pages · ${ch.part ? `Part ${ch.part}` : 'Reference'}</span></p>
    </div>`;
}

// ── CHAPTER OVERVIEW (notes view, no sub selected) ────────
function renderChapterOverview(chNum) {
  const data = CHAPTER_DATA[String(chNum)];
  if (!data) return;
  const ch = CHAPTERS.find(c => c.num === chNum);

  if (activeView === 'flashcards') { renderGlobalView('flashcards', data); return; }
  if (activeView === 'glossary')   { renderGlobalView('glossary', data);   return; }

  let html = `<div class="section-hero">
    <div class="section-eyebrow">SA1 · Chapter ${chNum}${ch && ch.part ? ` · Part ${ch.part}` : ''}</div>
    <div class="section-name">${data.title}</div>
    <div class="syllabus-tags">
      ${(data.syllabus_refs || []).map(r => `<span class="tag tag-syllabus">${r}</span>`).join('')}
      ${ch ? `<span class="tag tag-pages">${ch.pages} pages</span>` : ''}
      ${(data.products_covered || []).map(p => `<span class="tag tag-product">${p}</span>`).join('')}
    </div>
  </div>`;

  // Section overview cards
  html += `<div style="display:flex;flex-direction:column;gap:8px;">`;
  data.sections.forEach(sec => {
    html += `<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 18px;cursor:pointer;transition:border-color .15s;" onmouseover="this.style.borderColor='var(--border-hi)'" onmouseout="this.style.borderColor='var(--border)'" onclick="selectSub(${chNum}, '${sec.id}', '${sec.subsections[0].id}')">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px;">
        <span style="font-family:var(--mono);font-size:10px;color:var(--accent);background:var(--accent-lo);padding:1px 6px;border-radius:3px;">${sec.id}</span>
        <span style="font-family:var(--serif);font-size:16px;color:var(--text-hi);">${sec.title}</span>
      </div>
      <div style="display:flex;gap:12px;font-size:11px;color:var(--text-dim);">
        <span>${sec.subsections.length} subsections</span>
        <span>·</span>
        <span>${sec.subsections.reduce((s,sub) => s + sub.bullets.length, 0)} key points</span>
        <span>·</span>
        <span>${sec.subsections.reduce((s,sub) => s + (sub.key_terms||[]).length, 0)} terms</span>
      </div>
    </div>`;
  });
  html += `</div>`;

  document.getElementById('content-area').innerHTML = html;
  document.getElementById('canvas').scrollTop = 0;
}

// ── RENDER SECTION ────────────────────────────────────────
function renderSection(data, secId, scrollToSubId) {
  const sec = data.sections.find(s => s.id === secId);
  if (!sec) return;

  if (activeView === 'flashcards') { renderFlashcards(sec, data.chapter); return; }
  if (activeView === 'glossary')   { renderGlossary(sec, data.chapter);   return; }

  let html = `<div class="section-hero">
    <div class="section-eyebrow">${data.chapter} · Section ${sec.id}</div>
    <div class="section-name">${sec.title}</div>
    <div class="syllabus-tags">
      ${(data.syllabus_refs || []).map(r => `<span class="tag tag-syllabus">${r}</span>`).join('')}
      <span class="tag tag-product">${sec.title}</span>
    </div>
  </div>`;

  sec.subsections.forEach(sub => {
    const allTerms = sub.key_terms || [];
    const allQA    = sub.exam_qa   || [];

    html += `<div class="subsection-block" id="sub-${sub.id}">
      <div class="subsection-header">
        <span class="sub-id">${sub.id}</span>
        <span class="sub-title">${sub.title}</span>
      </div>`;

    html += `<div class="row-label">Key Points</div>
      <div class="bullets-list">
        ${sub.bullets.map(b => `
          <div class="bullet-item">
            <div class="bullet-dot"></div>
            <span>${b}</span>
          </div>`).join('')}
      </div>`;

    if (allTerms.length) {
      html += `<div class="row-label">Key Terms</div>
        <div class="terms-grid">
          ${allTerms.map(t => `
            <div class="term-card">
              <div class="term-name">${t.term}</div>
              <div class="term-def">${t.definition}</div>
            </div>`).join('')}
        </div>`;
    }

    if (allQA.length) {
      html += `<div class="row-label">Exam Q&amp;A</div>
        ${allQA.map((qa, i) => `
          <div class="qa-block" id="qa-${sub.id}-${i}" onclick="toggleQA('qa-${sub.id}-${i}')">
            <div class="qa-question">
              <span>${qa.q}</span>
              <span class="qa-toggle"></span>
            </div>
            <div class="qa-answer">${qa.a}</div>
          </div>`).join('')}`;
    }

    html += `</div>`;
  });

  document.getElementById('content-area').innerHTML = html;
  document.getElementById('canvas').scrollTop = 0;

  if (scrollToSubId) {
    setTimeout(() => {
      const el = document.getElementById('sub-' + scrollToSubId);
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 50);
  }
}

function toggleQA(id) {
  document.getElementById(id).classList.toggle('open');
}

// ── FLASHCARDS ────────────────────────────────────────────
function renderFlashcards(sec, chapterLabel) {
  const cards = [];
  sec.subsections.forEach(sub => {
    (sub.key_terms || []).forEach(t => {
      cards.push({ src: sub.id + ' · ' + sub.title, q: t.term, a: t.definition });
    });
    (sub.exam_qa || []).forEach(qa => {
      cards.push({ src: sub.id + ' · ' + sub.title, q: qa.q, a: qa.a });
    });
    sub.bullets.filter((_, i) => i % 3 === 0).forEach(b => {
      const parts = b.split('—');
      if (parts.length > 1) {
        cards.push({ src: sub.id + ' · ' + sub.title, q: parts[0].trim() + ' — ?', a: parts[1].trim() });
      }
    });
  });

  if (cards.length === 0) {
    document.getElementById('content-area').innerHTML = `<div class="content-empty"><div class="icon">🃏</div><h2>No flashcards yet</h2><p>Add key terms or exam Q&A to this section to generate cards.</p></div>`;
    return;
  }

  document.getElementById('content-area').innerHTML = `
    <div class="section-hero">
      <div class="section-eyebrow">Flashcards · ${sec.title}</div>
      <div class="section-name">${cards.length} cards</div>
    </div>
    <div class="flashcard-grid">
      ${cards.map((c, i) => `
        <div class="flashcard" id="fc-${i}" onclick="flipCard('fc-${i}')">
          <div class="card-front">
            <div>
              <div class="card-src">${c.src}</div>
              <div class="card-q">${c.q}</div>
            </div>
            <div class="card-hint">tap to reveal</div>
          </div>
          <div class="card-back">
            <div class="card-src">${c.src}</div>
            <div class="card-a">${c.a}</div>
          </div>
          <div class="card-flip-icon">↻</div>
        </div>`).join('')}
    </div>`;
}

function flipCard(id) {
  document.getElementById(id).classList.toggle('flipped');
}

// ── GLOSSARY ──────────────────────────────────────────────
function renderGlossary(sec, chapterLabel) {
  const terms = sec.subsections.flatMap(sub => sub.key_terms || []);

  if (!terms.length) {
    document.getElementById('content-area').innerHTML = `<div class="content-empty"><div class="icon">📚</div><h2>No terms defined</h2><p>This section has no key terms yet.</p></div>`;
    return;
  }

  document.getElementById('content-area').innerHTML = `
    <div class="section-hero">
      <div class="section-eyebrow">Glossary · ${sec.title}</div>
      <div class="section-name">${terms.length} terms</div>
    </div>
    <div class="glossary-list">
      ${terms.map(t => `
        <div class="glossary-item">
          <div class="glossary-term">${t.term}</div>
          <div class="glossary-def">${t.definition}</div>
        </div>`).join('')}
    </div>`;
}

function renderGlobalView(v, data) {
  const fakeAll = { title: 'All Sections', subsections: data.sections.flatMap(s => s.subsections) };
  if (v === 'flashcards') renderFlashcards(fakeAll, data.chapter);
  else                    renderGlossary(fakeAll, data.chapter);
}
</script>
