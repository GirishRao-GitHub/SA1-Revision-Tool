<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SA1 Master Syllabus Explorer</title>
    <script src="js/FrameworkParser.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap');

        :root {
            --bg: #0a0c10;
            --pane1-bg: #11141b;
            --pane2-bg: #161a23;
            --canvas-bg: #0f1117;
            --surface: #1c212c;
            --surface-hover: #252b39;
            --border: rgba(255, 255, 255, 0.08);
            --border-active: rgba(139, 92, 246, 0.5);
            --text: #f0f2f5;
            --text-dim: #94a3b8;
            --accent: #8b5cf6;
            --accent-glow: rgba(139, 92, 246, 0.3);
            --mono: 'JetBrains Mono', monospace;
            --sans: 'Inter', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: var(--sans); background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        header {
            height: 60px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 24px;
            background: var(--pane1-bg);
            z-index: 100;
        }
        .logo { font-weight: 700; font-size: 18px; color: var(--accent); }
        .top-nav-btn {
            margin-left: auto;
            padding: 6px 12px;
            border-radius: 6px;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text-dim);
            font-size: 11px;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .workspace { display: flex; flex: 1; overflow: hidden; }

        /* Pane 1: Chapters (Left) */
        .chapters-pane {
            width: 240px;
            background: var(--pane1-bg);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }
        .pane-title {
            font-size: 10px;
            font-weight: 700;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.12em;
            padding: 24px 20px 12px;
            position: sticky;
            top: 0;
            background: var(--pane1-bg);
            z-index: 10;
        }
        .chapter-item {
            padding: 10px 20px;
            cursor: pointer;
            transition: all 0.2s;
            border-left: 3px solid transparent;
        }
        .chapter-item:hover { background: var(--surface); }
        .chapter-item.active { background: var(--accent-glow); border-left-color: var(--accent); }
        .chapter-item.locked { opacity: 0.3; pointer-events: none; }
        .ch-id { font-family: var(--mono); font-size: 10px; color: var(--accent); margin-bottom: 2px; }
        .ch-name { font-size: 13px; font-weight: 500; line-height: 1.4; }

        /* Pane 2: Sections (Middle) */
        .sections-pane {
            width: 300px;
            background: var(--pane2-bg);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }
        .section-item {
            padding: 12px 20px;
            cursor: pointer;
            border-bottom: 1px solid var(--border);
            transition: all 0.2s;
        }
        .section-item:hover { background: var(--surface); }
        .section-item.active { background: var(--surface-hover); border-right: 2px solid var(--accent); }
        .sec-id { font-family: var(--mono); font-size: 11px; color: var(--text-dim); margin-bottom: 4px; }
        .sec-name { font-size: 13px; font-weight: 500; display: block; }
        .sec-sub { font-size: 11px; color: var(--text-dim); margin-top: 4px; }

        /* Pane 3: Canvas (Right) */
        .canvas {
            flex: 1;
            background: var(--canvas-bg);
            overflow-y: auto;
            padding: 40px 10%;
            scroll-behavior: smooth;
        }
        .canvas-header { margin-bottom: 40px; border-bottom: 1px solid var(--border); padding-bottom: 24px; }
        .canvas-title { font-size: 32px; font-weight: 700; margin-bottom: 12px; }
        
        /* Content Node Styles */
        .node-h3 { 
            font-size: 22px; 
            font-weight: 700; 
            color: var(--accent); 
            margin-top: 48px; 
            margin-bottom: 20px; 
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border);
        }
        .node-h4 { font-size: 17px; font-weight: 600; color: #fff; margin-top: 32px; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
        .node-point { display: flex; gap: 12px; line-height: 1.6; font-size: 15px; color: #cbd5e1; margin-bottom: 10px; }
        .node-point::before { content: "○"; color: var(--accent); flex-shrink: 0; font-weight: 900; }
        .node-bold { font-weight: 700; color: #fff; margin-right: 4px; }
        
        .synthesis-block {
            margin: 24px 0;
            padding: 20px;
            background: rgba(139, 92, 246, 0.04);
            border-radius: 12px;
            border: 1px solid rgba(139, 92, 246, 0.15);
        }
        .synthesis-tag {
            display: inline-block;
            background: var(--accent);
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 12px;
        }

        .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; text-align: center; color: var(--text-dim); }
        .empty-icon { font-size: 40px; margin-bottom: 16px; opacity: 0.2; }
    </style>
</head>
<body>

    <header>
        <div class="logo">SA1 MASTER SYLLABUS</div>
        <a href="SA1ity_Check.html" class="top-nav-btn">Back to Tracker</a>
    </header>

    <div class="workspace">
        <!-- Pane 1: Chronological Chapters -->
        <div class="chapters-pane">
            <div class="pane-title">Syllabus Chapters</div>
            <div id="chapter-list"></div>
        </div>

        <!-- Pane 2: Chapter Sections -->
        <div class="sections-pane">
            <div class="pane-title" id="sec-pane-title">Sections</div>
            <div id="section-list">
                <div class="empty-state">
                    <div class="empty-icon">📂</div>
                    <div style="font-size:12px;">Select a chapter<br/>to browse sections</div>
                </div>
            </div>
        </div>

        <!-- Pane 3: Deep Reading Canvas -->
        <div class="canvas" id="canvas">
            <div class="empty-state" id="canvas-placeholder">
                <div class="empty-icon">📖</div>
                <div style="font-size:14px;">Select a section to begin studying</div>
            </div>
            <div id="canvas-content" style="display:none;"></div>
        </div>
    </div>

    <script>
        let unifiedData = null;
        let activeChapter = null;

        async function init() {
            try {
                const res = await fetch('data/Unified_Syllabus.json?t=' + Date.now());
                unifiedData = await res.json();
                renderChapters();
                mermaid.initialize({ startOnLoad: false, theme: 'dark', securityLevel: 'loose' });
            } catch (e) { console.error(e); }
        }

        function renderChapters() {
            const list = document.getElementById('chapter-list');
            // Mocking the full 27 for navigation placeholders
            let html = '';
            for(let i=1; i<=27; i++) {
                const id = "Ch" + i;
                const data = unifiedData.Chapters[id];
                const isLocked = !data;
                html += `
                    <div class="chapter-item ${activeChapter === id ? 'active' : ''} ${isLocked ? 'locked' : ''}" 
                         onclick="selectChapter('${id}')">
                        <div class="ch-id">CHAPTER ${i}</div>
                        <div class="ch-name">${data ? data.title : "Pending Ingestion"}</div>
                    </div>
                `;
            }
            list.innerHTML = html;
        }

        function selectChapter(id) {
            activeChapter = id;
            renderChapters();
            renderSections();
            
            // Auto-render the whole chapter content in the canvas
            const data = unifiedData.Chapters[id];
            renderCanvas(data);
        }

        function renderSections() {
            const list = document.getElementById('section-list');
            const data = unifiedData.Chapters[activeChapter];
            if (!data) return;

            document.getElementById('sec-pane-title').textContent = activeChapter.toUpperCase() + " SECTIONS";

            // Extract sections (h3 and h4 nodes)
            let sections = [];
            data.content.forEach((node, idx) => {
                if (node.type === "h3" || node.type === "h4") {
                    sections.push({ ...node, index: idx });
                }
            });

            list.innerHTML = sections.map(sec => `
                <div class="section-item" onclick="scrollToSection('${sec.text}')">
                    <span class="sec-name">${sec.text}</span>
                </div>
            `).join('');
        }

        function renderCanvas(data) {
            document.getElementById('canvas-placeholder').style.display = 'none';
            const container = document.getElementById('canvas-content');
            container.style.display = 'block';

            let html = `
                <div class="canvas-header">
                    <div class="ch-id" style="font-size:14px;">Master Syllabus Stream</div>
                    <div class="canvas-title">${data.title}</div>
                </div>
                <div class="content-body">
            `;

            let inSynthesis = false;

            data.content.forEach(node => {
                const type = node.type;
                const text = node.text || "";
                const bold = node.bold || "";

                // Synthesis Detection
                if (type === "text" && text.includes("***Expert Synthesis***")) {
                    if (inSynthesis) html += `</div>`; // Close previous
                    html += `<div class="synthesis-block"><span class="synthesis-tag">Expert Synthesis</span>`;
                    inSynthesis = true;
                    return;
                }

                if (inSynthesis && (type === "h3" || type === "h4")) {
                    html += `</div>`; // Close synthesis on new header
                    inSynthesis = false;
                }

                // Render based on type
                if (type === "h3") {
                    html += `<div class="node-h3" id="sec-${text.replace(/\s+/g, '_')}">${text}</div>`;
                } else if (type === "h4") {
                    html += `<div class="node-h4" id="sec-${text.replace(/\s+/g, '_')}">${text}</div>`;
                } else if (type === "mermaid") {
                    html += `<div class="mermaid">${text}</div>`;
                } else if (type === "point") {
                    html += `<div class="node-point"><span>${bold ? `<span class="node-bold">${bold}:</span>` : ''}${text}</span></div>`;
                }
            });

            if (inSynthesis) html += `</div>`;
            html += `</div>`;
            container.innerHTML = html;

            setTimeout(() => { mermaid.run(); }, 100);
        }

        function scrollToSection(text) {
            const id = "sec-" + text.replace(/\s+/g, '_');
            const el = document.getElementById(id);
            if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
            
            // Highlight active section in middle pane
            document.querySelectorAll('.section-item').forEach(item => {
                item.classList.toggle('active', item.textContent.trim() === text);
            });
        }

        window.onload = init;
    </script>
</body>
</html>
