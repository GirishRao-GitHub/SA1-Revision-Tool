<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SA1 · Ch3 Revision</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #0e0f13;
    --surface:   #14161c;
    --border:    #242630;
    --border-hi: #343646;
    --text:      #c8cad4;
    --text-dim:  #686c80;
    --text-hi:   #eceef6;
    --accent:    #e8a030;
    --accent-lo: rgba(232,160,48,.12);
    --accent-md: rgba(232,160,48,.22);
    --green:     #4ec994;
    --green-lo:  rgba(78,201,148,.12);
    --blue:      #5a9cf8;
    --blue-lo:   rgba(90,156,248,.12);
    --red:       #f07070;
    --red-lo:    rgba(240,112,112,.12);
    --radius:    8px;
    --mono:      'IBM Plex Mono', monospace;
    --sans:      'IBM Plex Sans', sans-serif;
    --serif:     'Playfair Display', serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    line-height: 1.7;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── TOP BAR ── */
  header {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 0 20px;
    height: 52px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
    z-index: 10;
  }
  .logo {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 500;
    color: var(--accent);
    letter-spacing: .04em;
    white-space: nowrap;
  }
  .logo span { color: var(--text-dim); font-weight: 400; }
  .header-sep { width: 1px; height: 20px; background: var(--border); }
  .chapter-title {
    font-family: var(--serif);
    font-size: 15px;
    color: var(--text-hi);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
  }
  .view-tabs { display: flex; gap: 4px; margin-left: auto; }
  .view-tab {
    font-family: var(--mono);
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    transition: all .15s;
    letter-spacing: .03em;
  }
  .view-tab:hover { border-color: var(--border-hi); color: var(--text); }
  .view-tab.active { background: var(--accent-lo); border-color: var(--accent); color: var(--accent); }

  /* ── LAYOUT ── */
  .workspace { display: flex; flex: 1; overflow: hidden; }

  /* ── SIDEBAR ── */
  .sidebar {
    width: 240px;
    min-width: 240px;
    border-right: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .sidebar-search {
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-search input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 6px 10px;
    font-family: var(--sans);
    font-size: 12px;
    color: var(--text);
    outline: none;
    transition: border-color .15s;
  }
  .sidebar-search input:focus { border-color: var(--accent); }
  .sidebar-search input::placeholder { color: var(--text-dim); }
  .nav-tree { overflow-y: auto; flex: 1; padding: 8px 0; }
  .nav-tree::-webkit-scrollbar { width: 4px; }
  .nav-tree::-webkit-scrollbar-track { background: transparent; }
  .nav-tree::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 2px; }

  .nav-section {
    margin-bottom: 2px;
  }
  .nav-section-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 14px;
    cursor: pointer;
    color: var(--text);
    font-size: 12px;
    font-weight: 500;
    user-select: none;
    transition: background .12s;
    border-radius: 0;
  }
  .nav-section-header:hover { background: var(--bg); }
  .nav-section-header.active { color: var(--accent); }
  .nav-num {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--accent);
    background: var(--accent-lo);
    padding: 1px 5px;
    border-radius: 3px;
    min-width: 22px;
    text-align: center;
  }
  .nav-chevron {
    margin-left: auto;
    width: 12px;
    height: 12px;
    color: var(--text-dim);
    transition: transform .2s;
    flex-shrink: 0;
  }
  .nav-section.open .nav-chevron { transform: rotate(90deg); }
  .nav-subsections { display: none; }
  .nav-section.open .nav-subsections { display: block; }
  .nav-sub {
    padding: 5px 14px 5px 38px;
    font-size: 11.5px;
    color: var(--text-dim);
    cursor: pointer;
    transition: all .12s;
    border-left: 2px solid transparent;
    margin-left: 14px;
  }
  .nav-sub:hover { color: var(--text); background: var(--bg); }
  .nav-sub.active { color: var(--accent); border-left-color: var(--accent); background: var(--accent-lo); }

  /* ── CANVAS ── */
  .canvas {
    flex: 1;
    overflow-y: auto;
    padding: 32px 40px;
    position: relative;
  }
  .canvas::-webkit-scrollbar { width: 6px; }
  .canvas::-webkit-scrollbar-track { background: transparent; }
  .canvas::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 3px; }

  /* ── PROGRESS BAR ── */
  .progress-bar {
    position: fixed;
    top: 52px;
    left: 240px;
    right: 0;
    height: 2px;
    background: var(--border);
    z-index: 20;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width .1s;
  }

  /* ── CONTENT ── */
  .content-empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 70vh;
    text-align: center;
    gap: 12px;
    color: var(--text-dim);
  }
  .content-empty .icon { font-size: 48px; }
  .content-empty h2 { font-family: var(--serif); font-size: 22px; color: var(--text); }
  .content-empty p { font-size: 13px; max-width: 280px; }

  .section-hero {
    margin-bottom: 36px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }
  .section-eyebrow {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 8px;
  }
  .section-name {
    font-family: var(--serif);
    font-size: 26px;
    color: var(--text-hi);
    line-height: 1.25;
    margin-bottom: 10px;
  }
  .syllabus-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .tag {
    font-family: var(--mono);
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 3px;
    border: 1px solid;
    letter-spacing: .04em;
  }
  .tag-syllabus { border-color: var(--blue); color: var(--blue); background: var(--blue-lo); }
  .tag-product  { border-color: var(--accent); color: var(--accent); background: var(--accent-lo); }

  /* subsection block */
  .subsection-block {
    margin-bottom: 32px;
    scroll-margin-top: 20px;
  }
  .subsection-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
  }
  .sub-id {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    background: var(--border);
    padding: 2px 7px;
    border-radius: 4px;
  }
  .sub-title {
    font-family: var(--serif);
    font-size: 17px;
    color: var(--text-hi);
  }

  /* bullet list */
  .bullets-list { display: flex; flex-direction: column; gap: 5px; margin-bottom: 18px; }
  .bullet-item {
    display: flex;
    gap: 10px;
    padding: 8px 12px;
    border-radius: var(--radius);
    background: var(--surface);
    border: 1px solid var(--border);
    font-size: 13px;
    line-height: 1.6;
    color: var(--text);
    transition: border-color .15s, background .15s;
  }
  .bullet-item:hover { border-color: var(--border-hi); background: #191b22; }
  .bullet-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    flex-shrink: 0;
    margin-top: 7px;
  }

  /* key terms */
  .terms-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 8px;
    margin-bottom: 18px;
  }
  .term-card {
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 12px;
    background: var(--surface);
    transition: border-color .15s;
  }
  .term-card:hover { border-color: var(--green); }
  .term-name {
    font-family: var(--mono);
    font-size: 11.5px;
    font-weight: 500;
    color: var(--green);
    margin-bottom: 4px;
  }
  .term-def { font-size: 12.5px; color: var(--text-dim); line-height: 1.5; }

  /* Q&A */
  .qa-block {
    border: 1px solid var(--border);
    border-left: 3px solid var(--blue);
    border-radius: var(--radius);
    overflow: hidden;
    margin-bottom: 8px;
    background: var(--surface);
  }
  .qa-question {
    padding: 10px 14px;
    font-size: 13px;
    font-weight: 500;
    color: var(--blue);
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 8px;
    user-select: none;
    transition: background .12s;
  }
  .qa-question:hover { background: var(--blue-lo); }
  .qa-toggle {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
    flex-shrink: 0;
    margin-top: 2px;
  }
  .qa-answer {
    display: none;
    padding: 10px 14px 12px;
    border-top: 1px solid var(--border);
    font-size: 13px;
    color: var(--text);
    line-height: 1.65;
    background: var(--blue-lo);
  }
  .qa-block.open .qa-answer { display: block; }
  .qa-block.open .qa-toggle::after { content: '▲'; }
  .qa-toggle::after { content: '▼'; }

  /* section label rows */
  .row-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 8px;
    margin-top: 20px;
    padding-left: 2px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .row-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* ── FLASH CARD VIEW ── */
  .flashcard-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 12px;
  }
  .flashcard {
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    padding: 16px;
    cursor: pointer;
    min-height: 120px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    transition: border-color .15s, transform .1s;
    position: relative;
    overflow: hidden;
  }
  .flashcard:hover { border-color: var(--accent); transform: translateY(-1px); }
  .flashcard.flipped .card-front { display: none; }
  .flashcard.flipped .card-back { display: flex; }
  .card-back { display: none; flex-direction: column; justify-content: center; height: 100%; }
  .card-front { display: flex; flex-direction: column; justify-content: space-between; height: 100%; }
  .card-src {
    font-family: var(--mono);
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: .1em;
    color: var(--text-dim);
    margin-bottom: 8px;
  }
  .card-q { font-size: 13px; color: var(--text-hi); font-weight: 500; flex: 1; }
  .card-hint { font-size: 11px; color: var(--text-dim); margin-top: 8px; }
  .card-a { font-size: 12.5px; color: var(--text); line-height: 1.6; }
  .card-flip-icon {
    position: absolute;
    bottom: 10px; right: 10px;
    font-size: 10px;
    color: var(--text-dim);
    font-family: var(--mono);
  }

  /* ── GLOSSARY VIEW ── */
  .glossary-list { display: flex; flex-direction: column; gap: 1px; }
  .glossary-item {
    display: grid;
    grid-template-columns: 180px 1fr;
    gap: 16px;
    padding: 10px 14px;
    border-radius: 4px;
    background: var(--surface);
    border: 1px solid var(--border);
    transition: border-color .12s;
  }
  .glossary-item:hover { border-color: var(--green); }
  .glossary-term {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 500;
    color: var(--green);
    align-self: center;
  }
  .glossary-def { font-size: 13px; color: var(--text); line-height: 1.5; }

  /* scroll fade-in */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .subsection-block { animation: fadeUp .25s ease both; }
  .subsection-block:nth-child(2) { animation-delay: .05s; }
  .subsection-block:nth-child(3) { animation-delay: .1s; }

  /* utility */
  .hidden { display: none !important; }
  strong { color: var(--text-hi); font-weight: 500; }
</style>
</head>
<body>

<header>
  <div class="logo">SA1 <span>·</span> REVISION</div>
  <div class="header-sep"></div>
  <div class="chapter-title" id="header-chapter-title">Loading…</div>
  <div class="view-tabs">
    <button class="view-tab active" onclick="setView('notes')" id="tab-notes">Notes</button>
    <button class="view-tab" onclick="setView('flashcards')" id="tab-flashcards">Flashcards</button>
    <button class="view-tab" onclick="setView('glossary')" id="tab-glossary">Glossary</button>
  </div>
</header>

<div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>

<div class="workspace">
  <aside class="sidebar">
    <div class="sidebar-search">
      <input type="text" placeholder="Search…" id="search-input" oninput="handleSearch()">
    </div>

  </aside>

  <main class="canvas" id="canvas" onscroll="handleScroll()">

        <div class="icon">📖</div>
        <h2>Select a section</h2>
        <p>Choose a product section from the sidebar to begin revising.</p>
      </div>
    </div>
  </main>
</div>

// ── STATE ────────────────────────────────────────────────
let activeView = 'notes';
let activeSectionId = null;
let activeSubsectionId = null;
let searchQuery = '';

// ── INIT ─────────────────────────────────────────────────
document.getElementById('header-chapter-title').textContent =
  `Ch${DATA.chapter.replace('Ch','')} · ${DATA.title}`;

renderNav();

function renderNav() {
  const tree = document.getElementById('nav-tree');
  const q = searchQuery.toLowerCase();
  let html = '';

  DATA.sections.forEach(sec => {
    const subs = sec.subsections.filter(sub =>
      !q || sub.title.toLowerCase().includes(q) || sec.title.toLowerCase().includes(q)
    );
    if (q && subs.length === 0) return;

    const isOpen = activeSectionId === sec.id || (q && subs.length > 0);
    const isActive = activeSectionId === sec.id;

    html += `<div class="nav-section ${isOpen ? 'open' : ''}" id="nav-sec-${sec.id}">
      <div class="nav-section-header ${isActive ? 'active' : ''}" onclick="toggleNavSection('${sec.id}')">
        <span class="nav-num">${sec.id}</span>
        <span>${sec.title}</span>
        <svg class="nav-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 18l6-6-6-6"/>
        </svg>
      </div>
      <div class="nav-subsections">`;

    sec.subsections.forEach(sub => {
      if (q && !sub.title.toLowerCase().includes(q) && !sec.title.toLowerCase().includes(q)) return;
      const isSubActive = activeSubsectionId === sub.id;
      html += `<div class="nav-sub ${isSubActive ? 'active' : ''}" onclick="selectSubsection('${sec.id}', '${sub.id}')">${sub.id} · ${sub.title}</div>`;
    });

    html += `</div></div>`;
  });

  tree.innerHTML = html;
}

function toggleNavSection(id) {
  activeSectionId = activeSectionId === id ? null : id;
  activeSubsectionId = null;
  renderNav();
  if (activeSectionId) renderSection(activeSectionId);
  else showEmpty();
}

function selectSubsection(secId, subId) {
  activeSectionId = secId;
  activeSubsectionId = subId;
  renderNav();
  renderSection(secId, subId);
}

function handleSearch() {
  searchQuery = document.getElementById('search-input').value;
  renderNav();
}

function handleScroll() {
  const canvas = document.getElementById('canvas');
  const fill = document.getElementById('progress-fill');
  const total = canvas.scrollHeight - canvas.clientHeight;
  fill.style.width = total > 0 ? (canvas.scrollTop / total * 100) + '%' : '0%';
}

// ── VIEW SWITCHING ────────────────────────────────────────
function setView(v) {
  activeView = v;
  ['notes','flashcards','glossary'].forEach(id => {
    document.getElementById('tab-' + id).classList.toggle('active', id === v);
  });
  if (activeSectionId) renderSection(activeSectionId, activeSubsectionId);
  else if (v !== 'notes') renderGlobalView(v);
  else showEmpty();
}

function showEmpty() {
  document.getElementById('content-area').innerHTML = `
    <div class="content-empty">
      <div class="icon">📖</div>
      <h2>Select a section</h2>
      <p>Choose a product section from the sidebar to begin revising.</p>
    </div>`;
}

// ── RENDER SECTION ────────────────────────────────────────
function renderSection(secId, scrollToSubId) {
  const sec = DATA.sections.find(s => s.id === secId);
  if (!sec) return;

  if (activeView === 'flashcards') { renderFlashcards(sec); return; }
  if (activeView === 'glossary')   { renderGlossary(sec);    return; }

  let html = `
    <div class="section-hero">
      <div class="section-eyebrow">SA1 · Chapter 3 · Section ${sec.id}</div>
      <div class="section-name">${sec.title}</div>
      <div class="syllabus-tags">
        ${DATA.syllabus_refs.map(r => `<span class="tag tag-syllabus">${r}</span>`).join('')}
        <span class="tag tag-product">${sec.title.replace(' (PMI)', '')}</span>
      </div>
    </div>`;

  sec.subsections.forEach(sub => {
    const allTerms = sub.key_terms || [];
    const allQA    = sub.exam_qa   || [];

    html += `<div class="subsection-block" id="sub-${sub.id}">
      <div class="subsection-header">
        <span class="sub-id">${sub.id}</span>
        <span class="sub-title">${sub.title}</span>
      </div>`;

    // bullets
    html += `<div class="row-label">Key Points</div>
      <div class="bullets-list">
        ${sub.bullets.map(b => `
          <div class="bullet-item">
            <div class="bullet-dot"></div>
            <span>${b}</span>
          </div>`).join('')}
      </div>`;

    // terms
    if (allTerms.length) {
      html += `<div class="row-label">Key Terms</div>
        <div class="terms-grid">
          ${allTerms.map(t => `
            <div class="term-card">
              <div class="term-name">${t.term}</div>
              <div class="term-def">${t.definition}</div>
            </div>`).join('')}
        </div>`;
    }

    // Q&A
    if (allQA.length) {
      html += `<div class="row-label">Exam Q&amp;A</div>
        ${allQA.map((qa, i) => `
          <div class="qa-block" id="qa-${sub.id}-${i}" onclick="toggleQA('qa-${sub.id}-${i}')">
            <div class="qa-question">
              <span>${qa.q}</span>
              <span class="qa-toggle"></span>
            </div>
            <div class="qa-answer">${qa.a}</div>
          </div>`).join('')}`;
    }

    html += `</div>`;
  });

  document.getElementById('content-area').innerHTML = html;
  document.getElementById('canvas').scrollTop = 0;

  if (scrollToSubId) {
    setTimeout(() => {
      const el = document.getElementById('sub-' + scrollToSubId);
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 50);
  }
}

function toggleQA(id) {
  document.getElementById(id).classList.toggle('open');
}

// ── FLASHCARDS ────────────────────────────────────────────
function renderFlashcards(sec) {
  const cards = [];

  sec.subsections.forEach(sub => {
    // terms as cards
    (sub.key_terms || []).forEach(t => {
      cards.push({ type: 'term', src: sub.id + ' · ' + sub.title, q: t.term, a: t.definition });
    });
    // Q&A cards
    (sub.exam_qa || []).forEach(qa => {
      cards.push({ type: 'qa', src: sub.id + ' · ' + sub.title, q: qa.q, a: qa.a });
    });
    // random bullet cards (every 3rd bullet)
    sub.bullets.filter((_, i) => i % 3 === 0).forEach(b => {
      const parts = b.split('—');
      if (parts.length > 1) {
        cards.push({ type: 'point', src: sub.id + ' · ' + sub.title, q: parts[0].trim() + ' — ?', a: parts[1].trim() });
      }
    });
  });

  if (cards.length === 0) {
    document.getElementById('content-area').innerHTML = `<div class="content-empty"><div class="icon">🃏</div><h2>No flashcards yet</h2><p>Add key terms or Q&A to this section.</p></div>`;
    return;
  }

  document.getElementById('content-area').innerHTML = `
    <div class="section-hero">
      <div class="section-eyebrow">Flashcards · ${sec.title}</div>
      <div class="section-name">${cards.length} cards</div>
    </div>
    <div class="flashcard-grid">
      ${cards.map((c, i) => `
        <div class="flashcard" id="fc-${i}" onclick="flipCard('fc-${i}')">
          <div class="card-front">
            <div>
              <div class="card-src">${c.src}</div>
              <div class="card-q">${c.q}</div>
            </div>
            <div class="card-hint">tap to reveal</div>
          </div>
          <div class="card-back">
            <div class="card-src">${c.src}</div>
            <div class="card-a">${c.a}</div>
          </div>
          <div class="card-flip-icon">↻</div>
        </div>`).join('')}
    </div>`;
}

function flipCard(id) {
  document.getElementById(id).classList.toggle('flipped');
}

// ── GLOSSARY ──────────────────────────────────────────────
function renderGlossary(sec) {
  const terms = sec.subsections.flatMap(sub => sub.key_terms || []);

  if (!terms.length) {
    document.getElementById('content-area').innerHTML = `<div class="content-empty"><div class="icon">📚</div><h2>No terms defined</h2><p>This section has no key terms yet.</p></div>`;
    return;
  }

  document.getElementById('content-area').innerHTML = `
    <div class="section-hero">
      <div class="section-eyebrow">Glossary · ${sec.title}</div>
      <div class="section-name">${terms.length} terms</div>
    </div>
    <div class="glossary-list">
      ${terms.map(t => `
        <div class="glossary-item">
          <div class="glossary-term">${t.term}</div>
          <div class="glossary-def">${t.definition}</div>
        </div>`).join('')}
    </div>`;
}

function renderGlobalView(v) {
  if (v === 'flashcards') {
    const fakeAll = { title: 'All Sections', subsections: DATA.sections.flatMap(s => s.subsections) };
    renderFlashcards(fakeAll);
  } else {
    const fakeAll = { title: 'All Sections', subsections: DATA.sections.flatMap(s => s.subsections) };
    renderGlossary(fakeAll);
  }
}
</script>
