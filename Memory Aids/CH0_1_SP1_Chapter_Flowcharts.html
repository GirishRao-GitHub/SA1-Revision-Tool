<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SP1 Revision — Chapter Flowcharts</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0d1b2a;
    --ink: #1a2e45;
    --teal: #0e7c7b;
    --teal-light: #12a39e;
    --amber: #e07b39;
    --amber-light: #f2a56a;
    --cream: #f5f0e8;
    --paper: #faf8f4;
    --muted: #8a9ab5;
    --border: #ddd8cc;
    --section-bg: #edf6f6;
    --section-border: #0e7c7b;
    --sub-bg: #fff;
    --sub-border: #c8e6e6;
    --connector: #0e7c7b;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--navy);
    color: var(--ink);
    min-height: 100vh;
  }

  /* ─── SIDEBAR COLLAPSE ─── */
  .sidebar {
    transition: width .25s ease;
  }
  .sidebar-collapsed .sidebar {
    width: 0;
    min-width: 0;
    overflow: hidden;
    border-right: none;
  }

  /* Header toggle button */
  .sidebar-toggle-btn {
    display: inline-flex;
    align-items: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: rgba(255,255,255,0.45);
    background: transparent;
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 5px;
    padding: 4px 8px;
    cursor: pointer;
    transition: all .15s;
    flex-shrink: 0;
    line-height: 1;
    align-self: center;
  }
  .sidebar-toggle-btn:hover {
    color: var(--teal-light);
    border-color: var(--teal);
    background: rgba(14,124,123,0.15);
  }

  /* Sidebar edge tab */
  .sidebar-edge-tab {
    position: fixed;
    top: 50%;
    left: 240px;
    transform: translateY(-50%);
    width: 14px;
    height: 52px;
    background: #0b1623;
    border: 1px solid rgba(255,255,255,0.08);
    border-left: none;
    border-radius: 0 6px 6px 0;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 30;
    transition: left .25s ease, background .15s, border-color .15s, color .15s;
    color: rgba(255,255,255,0.35);
    font-size: 9px;
    font-family: 'JetBrains Mono', monospace;
    user-select: none;
  }
  .sidebar-edge-tab:hover {
    background: rgba(14,124,123,0.2);
    border-color: var(--teal);
    color: var(--teal-light);
  }
  .sidebar-collapsed .sidebar-edge-tab {
    left: 0;
    border-left: 1px solid rgba(255,255,255,0.08);
    border-radius: 0 6px 6px 0;
  }
  .sidebar-collapsed .sidebar-edge-tab:hover {
    border-color: var(--teal);
  }

  /* ─── HEADER ─── */
  header {
    background: var(--navy);
    padding: 28px 40px 20px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    display: flex;
    align-items: baseline;
    gap: 16px;
    flex-wrap: wrap;
  }
  header h1 {
    font-family: 'DM Serif Display', serif;
    color: #fff;
    font-size: 28px;
    letter-spacing: -0.5px;
  }
  header .subtitle {
    color: var(--muted);
    font-size: 14px;
    font-weight: 300;
    letter-spacing: 0.5px;
  }
  header .badge {
    margin-left: auto;
    background: var(--teal);
    color: #fff;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 20px;
    letter-spacing: 0.5px;
  }

  /* ─── LAYOUT ─── */
  .layout {
    display: flex;
    min-height: calc(100vh - 77px);
  }

  /* ─── SIDEBAR ─── */
  .sidebar {
    width: 240px;
    flex-shrink: 0;
    background: #0b1623;
    border-right: 1px solid rgba(255,255,255,0.06);
    overflow-y: auto;
    max-height: calc(100vh - 77px);
    position: sticky;
    top: 0;
  }
  .sidebar-inner { padding: 12px 0; }
  .sidebar-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--muted);
    padding: 12px 20px 6px;
    text-transform: uppercase;
  }
  .ch-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    padding: 8px 20px;
    background: none;
    border: none;
    cursor: pointer;
    text-align: left;
    transition: background 0.15s;
    color: rgba(255,255,255,0.55);
    font-family: 'DM Sans', sans-serif;
    font-size: 12.5px;
    font-weight: 400;
    line-height: 1.3;
  }
  .ch-btn:hover { background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.85); }
  .ch-btn.active {
    background: rgba(14,124,123,0.18);
    color: #7ee8e8;
    font-weight: 500;
  }
  .ch-btn .tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--teal-light);
    flex-shrink: 0;
    min-width: 30px;
    opacity: 0.8;
  }
  .ch-btn.active .tag { opacity: 1; }

  /* ─── CONTENT ─── */
  .content {
    flex: 1;
    background: var(--paper);
    overflow-y: auto;
    padding: 40px 48px 60px;
  }

  .chapter-panel {
    display: block;
    margin-bottom: 56px;
    padding-bottom: 48px;
    border-bottom: 1px solid var(--border);
  }
  .chapter-panel:last-child {
    border-bottom: none;
    margin-bottom: 0;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ─── CHAPTER HEADER BOX ─── */
  .ch-header {
    background: var(--navy);
    border-radius: 12px;
    padding: 22px 32px;
    margin-bottom: 32px;
    display: flex;
    align-items: center;
    gap: 20px;
    box-shadow: 0 4px 20px rgba(13,27,42,0.18);
  }
  .ch-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--teal-light);
    background: rgba(14,124,123,0.2);
    padding: 6px 12px;
    border-radius: 6px;
    flex-shrink: 0;
    letter-spacing: 1px;
  }
  .ch-title-text {
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    color: #fff;
    letter-spacing: -0.3px;
    line-height: 1.25;
  }
  .ch-meta {
    margin-left: auto;
    text-align: right;
    flex-shrink: 0;
  }
  .ch-meta .count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.5px;
  }

  /* ─── FLOW CONNECTOR ─── */
  .flow-arrow {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 28px;
    margin-bottom: 4px;
  }
  .flow-arrow svg { display: block; }

  /* ─── SECTIONS GRID ─── */
  .sections-row {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 20px;
  }

  /* ─── SECTION CARD ─── */
  .section-card {
    background: #fff;
    border-radius: 10px;
    border: 1.5px solid var(--border);
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    transition: box-shadow 0.2s, border-color 0.2s;
  }
  .section-card:hover {
    box-shadow: 0 6px 20px rgba(14,124,123,0.12);
    border-color: var(--teal-light);
  }
  .section-head {
    background: linear-gradient(135deg, var(--teal) 0%, #0a6160 100%);
    padding: 12px 16px;
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }
  .section-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    background: rgba(255,255,255,0.15);
    color: #fff;
    padding: 2px 7px;
    border-radius: 4px;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .section-title {
    font-size: 13px;
    font-weight: 600;
    color: #fff;
    line-height: 1.35;
    letter-spacing: -0.1px;
  }
  .section-body { padding: 0; }

  /* ─── SUBSECTION ITEMS ─── */
  .sub-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 9px 16px;
    border-bottom: 1px solid #f0ebe2;
    transition: background 0.12s;
  }
  .sub-item:last-child { border-bottom: none; }
  .sub-item:hover { background: #f5fafa; }
  .sub-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--amber);
    flex-shrink: 0;
    margin-top: 6px;
  }
  .sub-id {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    flex-shrink: 0;
    min-width: 30px;
    margin-top: 2px;
  }
  .sub-name {
    font-size: 12.5px;
    color: var(--ink);
    line-height: 1.4;
    font-weight: 400;
  }

  /* ─── EMPTY STATE ─── */
  .empty {
    text-align: center;
    padding: 40px;
    color: var(--muted);
    font-size: 13px;
  }

  /* ─── SCROLLBAR ─── */
  .sidebar::-webkit-scrollbar,
  .content::-webkit-scrollbar { width: 5px; }
  .sidebar::-webkit-scrollbar-track { background: transparent; }
  .sidebar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
  .content::-webkit-scrollbar-track { background: transparent; }
  .content::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.12); border-radius: 4px; }

  @media (max-width: 700px) {
    .layout { flex-direction: column; }
    .sidebar { width: 100%; max-height: 220px; position: relative; }
    .content { padding: 24px 20px 40px; }
    .sections-row { grid-template-columns: 1fr; }
    .ch-header { flex-wrap: wrap; }
  }
</style>
</head>
<body>

<header>
  <button class="sidebar-toggle-btn" onclick="toggleSidebar()" title="Toggle sidebar" id="header-toggle-btn">◀</button>
  <h1>SP1 Revision Notes</h1>
  <span class="subtitle">Chapter Structure Flowcharts</span>
  <span class="badge">32 Chapters</span>
</header>

<div class="layout">
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-inner" id="sidebarInner"></div>
  </nav>
  <div class="sidebar-edge-tab" onclick="toggleSidebar()" id="edge-tab" title="Toggle sidebar">◀</div>
  <main class="content" id="content"></main>
</div>

  const collapsed = document.body.classList.toggle('sidebar-collapsed');
  const icon = collapsed ? '▶' : '◀';
  document.getElementById('header-toggle-btn').textContent = icon;
  document.getElementById('edge-tab').textContent = icon;
}

function totalSubs(ch) {
  return ch.sections.reduce((a, s) => a + s.subsections.length, 0);
}

function buildSidebar() {
  const inner = document.getElementById('sidebarInner');
  inner.innerHTML = '<div class="sidebar-label">Chapters</div>';
  DATA.forEach((ch, i) => {
    const btn = document.createElement('button');
    btn.className = 'ch-btn' + (i === 0 ? ' active' : '');
    btn.dataset.idx = i;
    btn.innerHTML = `<span class="tag">${ch.chapter}</span><span>${ch.title}</span>`;
    btn.addEventListener('click', () => switchChapter(i));
    inner.appendChild(btn);
  });
}

function buildPanels() {
  const content = document.getElementById('content');
  DATA.forEach((ch, i) => {
    const panel = document.createElement('div');
    panel.className = 'chapter-panel';
    panel.id = `panel-${i}`;

    const totalSubsCount = totalSubs(ch);
    const sectCount = ch.sections.length;

    // Chapter header
    panel.innerHTML = `
      <div class="ch-header">
        <span class="ch-num">${ch.chapter}</span>
        <span class="ch-title-text">${ch.title}</span>
        <div class="ch-meta">
          <div class="count">${sectCount} section${sectCount !== 1 ? 's' : ''}</div>
          <div class="count">${totalSubsCount} subsection${totalSubsCount !== 1 ? 's' : ''}</div>
        </div>
      </div>
      <div class="flow-arrow">
        <svg width="2" height="28" viewBox="0 0 2 28"><line x1="1" y1="0" x2="1" y2="20" stroke="#0e7c7b" stroke-width="2"/><polygon points="1,28 -3,18 5,18" fill="#0e7c7b"/></svg>
      </div>
    `;

    // Sections grid
    const grid = document.createElement('div');
    grid.className = 'sections-row';

    ch.sections.forEach(sec => {
      const card = document.createElement('div');
      card.className = 'section-card';

      const head = document.createElement('div');
      head.className = 'section-head';
      head.innerHTML = `<span class="section-num">§${sec.id}</span><span class="section-title">${sec.title}</span>`;

      const body = document.createElement('div');
      body.className = 'section-body';

      sec.subsections.forEach(sub => {
        const item = document.createElement('div');
        item.className = 'sub-item';
        item.innerHTML = `<span class="sub-dot"></span><span class="sub-id">${sub.id}</span><span class="sub-name">${sub.title}</span>`;
        body.appendChild(item);
      });

      card.appendChild(head);
      card.appendChild(body);
      grid.appendChild(card);
    });

    panel.appendChild(grid);
    content.appendChild(panel);
  });
}

function switchChapter(idx) {
  const panel = document.getElementById(`panel-${idx}`);
  if (panel) {
    const content = document.getElementById('content');
    content.scrollTo({ top: panel.offsetTop - 24, behavior: 'smooth' });
  }
  document.querySelectorAll('.ch-btn').forEach((b, i) => {
    b.classList.toggle('active', i === idx);
  });
}

// Scroll spy: highlight sidebar item matching the chapter currently in view
(function setupScrollSpy() {
  const content = document.getElementById('content');
  content.addEventListener('scroll', () => {
    const panels = document.querySelectorAll('.chapter-panel');
    const scrollTop = content.scrollTop;
    let activeIdx = 0;
    panels.forEach((panel, i) => {
      if (panel.offsetTop - 60 <= scrollTop) activeIdx = i;
    });
    document.querySelectorAll('.ch-btn').forEach((b, i) => {
      b.classList.toggle('active', i === activeIdx);
    });
  });
})();

buildSidebar();
buildPanels();
</script>
</body>
