<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Experience Analysis — Quiz · Flashcards · Mnemonics</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Syne:wght@400;500;600;700&display=swap');

:root {
  --navy: #0a1020;
  --card: #111827;
  --card2: #172035;
  --card3: #1c2840;
  --purple: #7c6fe0;
  --purple-light: #a89ef0;
  --purple-dim: rgba(124,111,224,0.18);
  --teal: #3eb8a0;
  --teal-dim: rgba(62,184,160,0.15);
  --amber: #e8a94a;
  --amber-dim: rgba(232,169,74,0.12);
  --pink: #e06fa0;
  --red: #e07070;
  --green: #6abf8a;
  --text: #c8d0e8;
  --text-dim: #6a74a0;
  --text-mid: #9098bc;
  --border: rgba(124,111,224,0.2);
  --border2: rgba(255,255,255,0.06);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Syne', system-ui, sans-serif;
  background: var(--navy);
  color: var(--text);
  font-size: 14px;
  line-height: 1.6;
  min-height: 100vh;
}

/* ── HEADER ── */
.hdr {
  background: linear-gradient(135deg, #111827 0%, #0f1a2e 100%);
  border-bottom: 1px solid var(--border);
  padding: 1.1rem 1.4rem 1rem;
  position: sticky;
  top: 0;
  z-index: 100;
}
.hdr-inner { max-width: 860px; margin: 0 auto; }
.hdr-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; }
.hdr h1 { font-size: 14px; font-weight: 600; color: var(--purple-light); letter-spacing: .03em; }
.hdr p { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
.src-badge {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9.5px;
  background: rgba(62,184,160,0.12);
  border: 1px solid rgba(62,184,160,0.25);
  color: var(--teal);
  padding: 3px 9px;
  border-radius: 4px;
  white-space: nowrap;
  flex-shrink: 0;
}

/* ── TABS ── */
.tabs-wrap { max-width: 860px; margin: 0 auto; padding: .8rem 1.4rem 0; }
.tabs { display: flex; gap: 5px; border-bottom: 1px solid var(--border2); padding-bottom: 0; }
.tab {
  padding: 7px 16px 8px;
  border: none;
  background: transparent;
  color: var(--text-dim);
  font-size: 12px;
  font-family: 'Syne', sans-serif;
  font-weight: 500;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  transition: all .2s;
  letter-spacing: .02em;
}
.tab.active { color: var(--purple-light); border-bottom-color: var(--purple); }
.tab:hover:not(.active) { color: var(--text-mid); }

/* ── MAIN ── */
.main { max-width: 860px; margin: 0 auto; padding: 1rem 1.4rem 2rem; }
.panel { display: none; }
.panel.active { display: block; }

/* ── QUIZ ── */
.quiz-meta {
  display: flex; align-items: center; gap: 10px; margin-bottom: 1rem;
  font-size: 11px; color: var(--text-dim);
}
.score-bar {
  height: 4px; background: var(--card3); border-radius: 2px;
  flex: 1; overflow: hidden;
}
.score-fill {
  height: 100%; background: var(--purple);
  border-radius: 2px; transition: width .4s ease;
  width: 0%;
}
.q-counter { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--text-dim); }
.score-label { font-family: 'IBM Plex Mono', monospace; font-size: 11px; }

.q-card {
  background: var(--card);
  border: 1px solid var(--border2);
  border-radius: 12px;
  padding: 1.2rem 1.3rem;
  margin-bottom: .8rem;
}
.q-source {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  color: var(--text-dim);
  margin-bottom: .7rem;
  display: flex; align-items: center; gap: 8px;
}
.q-source .sitting {
  background: var(--purple-dim);
  border: 1px solid var(--border);
  color: var(--purple-light);
  padding: 2px 8px;
  border-radius: 4px;
}
.q-marks {
  background: rgba(232,169,74,.1);
  border: 1px solid rgba(232,169,74,.2);
  color: var(--amber);
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 10px;
}
.q-text {
  font-size: 13.5px;
  color: #dde4f8;
  font-weight: 500;
  margin-bottom: 1rem;
  line-height: 1.55;
}

.options { display: flex; flex-direction: column; gap: 6px; }
.opt {
  display: flex; align-items: flex-start; gap: 10px;
  background: var(--card2);
  border: 1px solid var(--border2);
  border-radius: 8px;
  padding: 9px 12px;
  cursor: pointer;
  transition: all .15s;
  font-size: 12.5px;
  color: var(--text);
  line-height: 1.45;
}
.opt:hover:not(.disabled) {
  border-color: rgba(124,111,224,.4);
  background: var(--card3);
}
.opt-key {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  font-weight: 500;
  color: var(--text-dim);
  width: 18px;
  flex-shrink: 0;
  padding-top: 1px;
}
.opt.correct { border-color: rgba(106,191,138,.5); background: rgba(106,191,138,.08); }
.opt.correct .opt-key { color: var(--green); }
.opt.wrong { border-color: rgba(224,112,112,.4); background: rgba(224,112,112,.07); }
.opt.wrong .opt-key { color: var(--red); }
.opt.disabled { cursor: default; }

.q-feedback {
  margin-top: .9rem;
  padding: .75rem 1rem;
  border-radius: 8px;
  font-size: 12px;
  line-height: 1.5;
  display: none;
}
.q-feedback.correct {
  background: rgba(106,191,138,.08);
  border: 1px solid rgba(106,191,138,.25);
  color: #8fd4a8;
  display: block;
}
.q-feedback.wrong {
  background: rgba(224,112,112,.07);
  border: 1px solid rgba(224,112,112,.2);
  color: #e09090;
  display: block;
}
.q-feedback strong { font-weight: 600; }

.quiz-nav {
  display: flex; align-items: center; justify-content: space-between;
  margin-top: .9rem;
}
.btn {
  padding: 8px 20px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--purple-light);
  font-size: 12px;
  font-family: 'Syne', sans-serif;
  font-weight: 500;
  cursor: pointer;
  transition: all .2s;
}
.btn:hover { background: var(--purple-dim); border-color: var(--purple); }
.btn.primary { background: var(--purple); border-color: var(--purple); color: #fff; }
.btn.primary:hover { background: #9080f0; }
.btn:disabled { opacity: .35; cursor: default; pointer-events: none; }

.quiz-results {
  background: var(--card);
  border: 1px solid var(--border2);
  border-radius: 12px;
  padding: 2rem;
  text-align: center;
  display: none;
}
.results-score {
  font-size: 48px;
  font-weight: 700;
  color: var(--purple-light);
  line-height: 1;
  margin-bottom: .4rem;
}
.results-label { font-size: 13px; color: var(--text-dim); margin-bottom: 1.2rem; }
.results-breakdown {
  display: flex; gap: 12px; justify-content: center; margin-bottom: 1.3rem;
}
.rb-item {
  background: var(--card2);
  border: 1px solid var(--border2);
  border-radius: 8px;
  padding: 10px 20px;
  text-align: center;
}
.rb-n { font-size: 22px; font-weight: 600; }
.rb-l { font-size: 11px; color: var(--text-dim); margin-top: 2px; }

/* ── FLASHCARDS ── */
.fc-meta { display: flex; align-items: center; gap: 10px; margin-bottom: 1rem; font-size: 11px; color: var(--text-dim); }
.fc-nav-dots { display: flex; gap: 5px; flex: 1; justify-content: center; }
.fc-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--card3); border: 1px solid var(--border2);
  transition: all .2s; cursor: pointer;
}
.fc-dot.active { background: var(--purple); border-color: var(--purple); }
.fc-dot.seen { background: var(--purple-dim); border-color: var(--border); }

.fc-scene {
  perspective: 1200px;
  height: 280px;
  margin-bottom: 1rem;
  cursor: pointer;
}
.fc-inner {
  position: relative;
  width: 100%; height: 100%;
  transform-style: preserve-3d;
  transition: transform .5s cubic-bezier(.4,0,.2,1);
}
.fc-inner.flipped { transform: rotateY(180deg); }
.fc-face {
  position: absolute;
  width: 100%; height: 100%;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  border-radius: 12px;
  padding: 1.4rem;
  display: flex;
  flex-direction: column;
}
.fc-front {
  background: linear-gradient(135deg, var(--card) 0%, var(--card3) 100%);
  border: 1px solid var(--border);
}
.fc-back {
  background: linear-gradient(135deg, #0d1c35 0%, #0a1628 100%);
  border: 1px solid rgba(62,184,160,0.3);
  transform: rotateY(180deg);
}

.fc-label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: .08em;
  margin-bottom: .8rem;
  display: flex; align-items: center; gap: 8px;
}
.fc-label .sit {
  color: var(--purple-light);
  background: var(--purple-dim);
  border: 1px solid var(--border);
  padding: 2px 7px;
  border-radius: 3px;
}
.fc-label .mk {
  color: var(--amber);
  background: rgba(232,169,74,.1);
  border: 1px solid rgba(232,169,74,.2);
  padding: 2px 7px;
  border-radius: 3px;
}
.fc-q {
  font-size: 14px;
  font-weight: 600;
  color: #e0e8ff;
  flex: 1;
  line-height: 1.55;
}
.fc-hint {
  font-size: 11px;
  color: var(--text-dim);
  margin-top: auto;
  text-align: center;
  padding-top: .5rem;
}
.fc-back .fc-label { color: var(--teal); }
.fc-bullets {
  flex: 1;
  overflow-y: auto;
}
.fc-bullets ul {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 5px;
}
.fc-bullets li {
  font-size: 12px;
  color: var(--text);
  padding-left: 14px;
  position: relative;
  line-height: 1.4;
}
.fc-bullets li::before {
  content: '›';
  position: absolute;
  left: 0;
  color: var(--teal);
  font-weight: 600;
}
.fc-bullets li strong { color: #a0e0d0; font-weight: 600; }
.fc-bullets .sub {
  font-size: 11px;
  color: var(--amber);
  font-weight: 600;
  padding-left: 0;
  margin-top: 6px;
  margin-bottom: 2px;
  letter-spacing: .04em;
  text-transform: uppercase;
  font-size: 10px;
}
.fc-bullets .sub::before { display: none; }

.fc-controls {
  display: flex; align-items: center; justify-content: space-between; gap: 10px;
}
.fc-flip-hint {
  font-size: 11px;
  color: var(--text-dim);
  text-align: center;
}

/* ── MNEMONICS ── */
.mn-grid { display: flex; flex-direction: column; gap: .8rem; }
.mn-card {
  background: var(--card);
  border: 1px solid var(--border2);
  border-radius: 12px;
  overflow: hidden;
}
.mn-hdr {
  padding: .9rem 1.1rem;
  display: flex; align-items: flex-start; gap: 12px;
  cursor: pointer;
  transition: background .15s;
}
.mn-hdr:hover { background: var(--card2); }
.mn-acro {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 18px;
  font-weight: 500;
  color: var(--purple-light);
  min-width: 80px;
  letter-spacing: .08em;
}
.mn-info { flex: 1; }
.mn-title {
  font-size: 13px;
  font-weight: 600;
  color: #dde4f8;
  margin-bottom: 2px;
}
.mn-sub {
  font-size: 11px;
  color: var(--text-dim);
}
.mn-src {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9.5px;
  color: var(--text-dim);
  background: var(--card3);
  border: 1px solid var(--border2);
  padding: 2px 7px;
  border-radius: 3px;
  align-self: flex-start;
  white-space: nowrap;
}
.mn-chev { color: var(--text-dim); font-size: 10px; transition: transform .2s; align-self: center; }
.mn-card.open .mn-chev { transform: rotate(180deg); }
.mn-body { display: none; padding: 0 1.1rem 1.1rem 1.1rem; }
.mn-card.open .mn-body { display: block; }

.mn-phrase-box {
  background: linear-gradient(135deg, rgba(124,111,224,.12), rgba(62,184,160,.08));
  border: 1px solid rgba(124,111,224,.25);
  border-radius: 8px;
  padding: .75rem 1rem;
  margin-bottom: .9rem;
  font-size: 12px;
  font-style: italic;
  color: var(--text-mid);
}
.mn-phrase-box strong { color: var(--purple-light); font-style: normal; }

.mn-rows { display: flex; flex-direction: column; gap: 5px; }
.mn-row {
  display: flex; align-items: flex-start; gap: 10px;
  background: var(--card2);
  border: 1px solid var(--border2);
  border-radius: 7px;
  padding: 8px 11px;
}
.mn-letter {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 16px;
  font-weight: 500;
  width: 26px;
  flex-shrink: 0;
  line-height: 1;
  padding-top: 2px;
}
.mn-row-content { flex: 1; }
.mn-row-key {
  font-size: 12.5px;
  font-weight: 600;
  color: #dde4f8;
  margin-bottom: 2px;
}
.mn-row-detail {
  font-size: 11px;
  color: var(--text-dim);
  line-height: 1.4;
}
.mn-row-detail em { color: var(--text-mid); font-style: normal; }

.mn-notes {
  margin-top: .8rem;
  padding: .65rem .9rem;
  background: rgba(232,169,74,.07);
  border: 1px solid rgba(232,169,74,.2);
  border-radius: 7px;
  font-size: 11px;
  color: #b89060;
  line-height: 1.5;
}
.mn-notes strong { color: var(--amber); font-weight: 600; }

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* ── ANIMATIONS ── */
@keyframes fadeUp {
  from { opacity:0; transform:translateY(8px); }
  to { opacity:1; transform:translateY(0); }
}
.q-card { animation: fadeUp .25s ease; }
.mn-card { animation: fadeUp .2s ease both; }
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-inner">
    <div class="hdr-top">
      <div>
        <h1>Experience Analysis — Quiz · Flashcards · Mnemonics</h1>
        <p>SA1 · IP · CI · PMI · LTCI · Microinsurance · IFoA 2019–2025</p>
      </div>
      <div class="src-badge">IFoA JSON only</div>
    </div>
  </div>
</div>

<div class="tabs-wrap">
  <div class="tabs">
    <button class="tab active" onclick="showPanel('quiz',this)">📝 Quiz (15 Qs)</button>
    <button class="tab" onclick="showPanel('flash',this)">🃏 Flashcards (12)</button>
    <button class="tab" onclick="showPanel('mnemo',this)">🧠 Mnemonics (5)</button>
  </div>
</div>

<div class="main">

<!-- ═══════════════════════════════════════════════
     PANEL: QUIZ
═══════════════════════════════════════════════ -->
<div id="panel-quiz" class="panel active">

  <div class="quiz-meta">
    <span class="q-counter" id="q-counter">Q 1 / 15</span>
    <div class="score-bar"><div class="score-fill" id="score-fill"></div></div>
    <span class="score-label" id="score-label" style="color:var(--text-dim)">0 / 0</span>
  </div>

  <div id="q-area"></div>

  <div class="quiz-nav">
    <button class="btn" id="btn-prev" onclick="prevQ()" disabled>← Prev</button>
    <div style="font-size:11px;color:var(--text-dim)" id="q-status"></div>
    <button class="btn primary" id="btn-next" onclick="nextQ()" disabled>Next →</button>
  </div>

  <div class="quiz-results" id="quiz-results">
    <div class="results-score" id="results-pct">—</div>
    <div class="results-label" id="results-label">—</div>
    <div class="results-breakdown">
      <div class="rb-item">
        <div class="rb-n" style="color:var(--green)" id="res-correct">0</div>
        <div class="rb-l">Correct</div>
      </div>
      <div class="rb-item">
        <div class="rb-n" style="color:var(--red)" id="res-wrong">0</div>
        <div class="rb-l">Incorrect</div>
      </div>
      <div class="rb-item">
        <div class="rb-n" style="color:var(--purple-light)" id="res-total">15</div>
        <div class="rb-l">Total</div>
      </div>
    </div>
    <button class="btn primary" onclick="restartQuiz()">Restart Quiz</button>
  </div>

</div>

<!-- ═══════════════════════════════════════════════
     PANEL: FLASHCARDS
═══════════════════════════════════════════════ -->
<div id="panel-flash" class="panel">

  <div class="fc-meta">
    <button class="btn" id="fc-prev" onclick="prevFC()">← Prev</button>
    <div class="fc-nav-dots" id="fc-dots"></div>
    <button class="btn" id="fc-next" onclick="nextFC()">Next →</button>
  </div>

  <div class="fc-scene" onclick="flipCard()">
    <div class="fc-inner" id="fc-inner">
      <div class="fc-face fc-front" id="fc-front-face"></div>
      <div class="fc-face fc-back" id="fc-back-face"></div>
    </div>
  </div>

  <div class="fc-controls">
    <div style="font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text-dim)" id="fc-counter">1 / 12</div>
    <div class="fc-flip-hint">Click card to reveal answer</div>
    <button class="btn" onclick="shuffleFC()" style="font-size:11px">Shuffle</button>
  </div>

</div>

<!-- ═══════════════════════════════════════════════
     PANEL: MNEMONICS
═══════════════════════════════════════════════ -->
<div id="panel-mnemo" class="panel">
  <div class="mn-grid" id="mn-grid"></div>
</div>

</div><!-- .main -->

<script>
/* ════════════════════════════════════════════
   DATA — all content derived from IFoA JSON
   2019–2025 examiner solution bullets only
════════════════════════════════════════════ */

const QUIZ = [
  {
    sitting: "IFoA Sep 2024 Q3(i)",
    marks: "10m",
    q: "When investigating an increase in the IP loss ratio, which combination of reasons does the IFoA mark scheme explicitly list as the four main components?",
    opts: [
      "Higher claims inception rates, lower recovery rates, higher claim amounts, lower premium income",
      "Higher claims inception rates, worse data quality, expense overruns, lower reserves",
      "Lower premium income, increased reinsurance costs, higher claims inflation, tax changes",
      "Higher claim amounts, provider cost increases, system failures, increased competition"
    ],
    correct: 0,
    feedback: "Sep 2024 Q3(i) mark scheme states the loss ratio may be higher due to: 'Higher claims inception rates [½] / Lower recovery rates [½] / Higher claim amounts [½] / Lower premium income [½]'. Each awarded ½ mark."
  },
  {
    sitting: "IFoA Apr 2021 Q3(ii)",
    marks: "10m",
    q: "In the LTCI experience analysis question, what is specifically noted about geographical analysis in Country B — a small country?",
    opts: [
      "Geographic analysis may not be material given the small size of the country",
      "Geographic analysis must be done at postcode level",
      "Geographic variation is the primary risk driver for LTCI",
      "Geographic analysis requires external data from state providers"
    ],
    correct: 0,
    feedback: "Apr 2021 Q3(ii): 'But as County B is small, it may not be material [½]'. Geographical variation data could be analysed by region, but materiality must be considered."
  },
  {
    sitting: "IFoA Sep 2020 Q3(iii)",
    marks: "15m",
    q: "Per Sep 2020 Q3(iii), which of these is explicitly stated as a sub-division criterion when splitting CI business into homogeneous groups for an experience investigation?",
    opts: [
      "Product type — such as standalone and accelerated business",
      "Gender of the policyholder",
      "Policy currency",
      "Investment strategy of the fund"
    ],
    correct: 0,
    feedback: "Sep 2020 Q3(iii): 'Split existing policies into homogeneous groups. This should be by product types such as standalone and accelerated business. [½] And then further sub-divided based on pricing series and premium rates. [½]'."
  },
  {
    sitting: "IFoA Apr 2021 Q3(iii)",
    marks: "10m",
    q: "Apr 2021 Q3(iii) identifies a factor related to claim eligibility as a cause of worsening LTCI experience. What is the specific example given?",
    opts: [
      "Changes to medical definitions used for functional tests like ADLs",
      "Changes to reinsurance retention treaties",
      "Changes to investment return assumptions",
      "Changes to expense loading in premium rates"
    ],
    correct: 0,
    feedback: "Apr 2021 Q3(iii): 'Claims eligibility could have weakened [½] e.g. due to changes to the medical definitions used for functional test like ADLs [½]'. This is explicitly listed under the 'Claims eligibility' sub-heading."
  },
  {
    sitting: "IFoA Apr 2022 Q2(i)",
    marks: "8m",
    q: "Apr 2022 Q2(i) asks what could cause PMI claims to be worse than expected. Which of these is explicitly listed as a direct example of a change in business mix?",
    opts: [
      "Older lives",
      "New reinsurance arrangements",
      "Increased deductibles applied",
      "Change in investment strategy"
    ],
    correct: 0,
    feedback: "Apr 2022 Q2(i): 'The mix of business may differ to the expected mix [½] For example: Older lives [½] / Occupation category [½] / Selling through new distributors with a different mix of lives [½]'. Older lives is explicitly given as an example."
  },
  {
    sitting: "IFoA Sep 2023 Q3(iv)",
    marks: "6m",
    q: "Sep 2023 Q3(iv) on IP underwriting review identifies which type of claims as 'particularly useful' for assessing anti-selection?",
    opts: [
      "Early claims",
      "Large claims",
      "Recurring claims",
      "Long-duration claims"

let qIdx = 0;
let answers = new Array(QUIZ.length).fill(null);
let score = 0;

function renderQuestion() {
  const q = QUIZ[qIdx];
  const area = document.getElementById('q-area');
  const chosen = answers[qIdx];

  let optsHtml = q.opts.map((o, i) => {
    let cls = 'opt';
    if (chosen !== null) {
      cls += ' disabled';
      if (i === q.correct) cls += ' correct';
      else if (i === chosen) cls += ' wrong';
    }
    const keys = ['A','B','C','D'];
    return `<div class="${cls}" onclick="chooseOpt(${i})">
      <span class="opt-key">${keys[i]}</span>
      <span>${o}</span>
    </div>`;
  }).join('');

  let fbHtml = '';
  if (chosen !== null) {
    const ok = chosen === q.correct;
    fbHtml = `<div class="q-feedback ${ok?'correct':'wrong'}">
      <strong>${ok ? '✓ Correct' : '✗ Incorrect'}</strong> — ${q.feedback}
    </div>`;
  }

  area.innerHTML = `
    <div class="q-card">
      <div class="q-source">
        <span class="sitting">${q.sitting}</span>
        <span class="q-marks">${q.marks}</span>
      </div>
      <div class="q-text">${q.q}</div>
      <div class="options">${optsHtml}</div>
      ${fbHtml}
    </div>`;

  // update meta
  const total = answers.filter(a => a !== null).length;
  const correct = answers.reduce((acc, a, i) => acc + (a === QUIZ[i].correct ? 1 : 0), 0);
  document.getElementById('q-counter').textContent = `Q ${qIdx+1} / ${QUIZ.length}`;
  document.getElementById('score-fill').style.width = (total/QUIZ.length*100) + '%';
  document.getElementById('score-label').textContent = `${correct} / ${total}`;
  document.getElementById('score-label').style.color = total === 0 ? 'var(--text-dim)' : correct/total >= 0.7 ? 'var(--green)' : 'var(--red)';

  document.getElementById('btn-prev').disabled = qIdx === 0;
  document.getElementById('btn-next').disabled = chosen === null;

  // status
  const remaining = QUIZ.filter((_,i) => answers[i] === null).length;
  document.getElementById('q-status').textContent = remaining + ' unanswered';
}

function chooseOpt(i) {
  if (answers[qIdx] !== null) return;
  answers[qIdx] = i;
  renderQuestion();

  // check if all answered
  if (answers.every(a => a !== null)) {
    setTimeout(showResults, 400);
  }
}

function prevQ() { qIdx = Math.max(0, qIdx-1); renderQuestion(); }
function nextQ() {
  if (qIdx < QUIZ.length - 1) { qIdx++; renderQuestion(); }
  else showResults();
}

function showResults() {
  document.getElementById('q-area').style.display = 'none';
  document.querySelector('.quiz-nav').style.display = 'none';
  document.querySelector('.quiz-meta').style.display = 'none';
  const correct = answers.reduce((acc,a,i) => acc+(a===QUIZ[i].correct?1:0), 0);
  const pct = Math.round(correct/QUIZ.length*100);
  const res = document.getElementById('quiz-results');
  res.style.display = 'block';
  document.getElementById('results-pct').textContent = pct+'%';
  document.getElementById('results-label').textContent =
    pct >= 80 ? '🎉 Excellent — strong EA recall' :
    pct >= 60 ? '📖 Good — a few mark scheme details to revisit' :
    '🔁 Review needed — focus on DISC framework and exact mark scheme wording';
  document.getElementById('res-correct').textContent = correct;
  document.getElementById('res-wrong').textContent = QUIZ.length - correct;
  document.getElementById('res-total').textContent = QUIZ.length;
}

function restartQuiz() {
  qIdx = 0;
  answers = new Array(QUIZ.length).fill(null);
  document.getElementById('q-area').style.display = 'block';
  document.querySelector('.quiz-nav').style.display = 'flex';
  document.querySelector('.quiz-meta').style.display = 'flex';
  document.getElementById('quiz-results').style.display = 'none';
  renderQuestion();
}

/* ════════════════════════════════════════════
   FLASHCARD LOGIC
════════════════════════════════════════════ */
let fcIdx = 0;
let fcOrder = FLASHCARDS.map((_,i) => i);
let fcSeen = new Set();

function buildFCDots() {
  const dots = document.getElementById('fc-dots');
  dots.innerHTML = fcOrder.map((_, i) => 
    `<div class="fc-dot${i===fcIdx?' active':''}${fcSeen.has(i)&&i!==fcIdx?' seen':''}" onclick="goFC(${i})"></div>`
  ).join('');
}

function renderFC() {
  const card = FLASHCARDS[fcOrder[fcIdx]];
  const inner = document.getElementById('fc-inner');
  inner.classList.remove('flipped');

  // front
  document.getElementById('fc-front-face').innerHTML = `
    <div class="fc-label">
      <span class="sit">${card.sitting}</span>
      <span class="mk">${card.marks}</span>
      <span style="margin-left:auto;font-size:10px;color:var(--text-dim)">QUESTION</span>
    </div>
    <div class="fc-q">${card.front}</div>
    <div class="fc-hint">↕ Click to reveal mark scheme answer</div>
  `;

  // back
  const bulletHtml = card.bullets.map(b => {
    if (b.type === 'sub') return `<li class="sub">${b.text}</li>`;
    return `<li>${b.text}</li>`;
  }).join('');

  document.getElementById('fc-back-face').innerHTML = `
    <div class="fc-label">
      <span style="color:var(--teal)">ANSWER</span>
      <span style="margin-left:6px;color:var(--text-dim);font-style:italic">${card.backTitle}</span>
    </div>
    <div class="fc-bullets"><ul>${bulletHtml}</ul></div>
  `;

  document.getElementById('fc-counter').textContent = `${fcIdx+1} / ${FLASHCARDS.length}`;
  document.getElementById('fc-prev').disabled = fcIdx === 0;
  document.getElementById('fc-next').disabled = fcIdx === fcOrder.length - 1;
  fcSeen.add(fcIdx);
  buildFCDots();
}

function flipCard() {
  document.getElementById('fc-inner').classList.toggle('flipped');
}

function prevFC() { if (fcIdx > 0) { fcIdx--; renderFC(); } }
function nextFC() { if (fcIdx < fcOrder.length-1) { fcIdx++; renderFC(); } }
function goFC(i) { fcIdx = i; renderFC(); }

function shuffleFC() {
  for (let i = fcOrder.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [fcOrder[i], fcOrder[j]] = [fcOrder[j], fcOrder[i]];
  }
  fcIdx = 0;
  fcSeen = new Set();
  renderFC();
}

/* ════════════════════════════════════════════
   MNEMONICS
════════════════════════════════════════════ */
const colors = {
  "#a89ef0": "rgba(168,158,240,0.15)",
  "#3eb8a0": "rgba(62,184,160,0.15)",
  "#e8a94a": "rgba(232,169,74,0.12)",
  "#e06fa0": "rgba(224,111,160,0.13)",
  "#6abf8a": "rgba(106,191,138,0.13)"
};

function buildMnemonics() {
  const grid = document.getElementById('mn-grid');
  grid.innerHTML = MNEMONICS.map((mn, mi) => {
    const rows = mn.rows.map(r => `
      <div class="mn-row">
        <div class="mn-letter" style="color:${r.color};background:${colors[r.color]||'rgba(124,111,224,0.12)'};border-radius:6px;text-align:center;line-height:26px;height:26px;">${r.letter}</div>
        <div class="mn-row-content">
          <div class="mn-row-key">${r.key}</div>
          <div class="mn-row-detail">${r.detail}</div>
        </div>
      </div>`).join('');

    return `
      <div class="mn-card" id="mn-${mi}">
        <div class="mn-hdr" onclick="toggleMn(${mi})">
          <div class="mn-acro">${mn.acro}</div>
          <div class="mn-info">
            <div class="mn-title">${mn.title}</div>
            <div class="mn-sub">${mn.subtitle}</div>
          </div>
          <div class="mn-src">${mn.src}</div>
          <div class="mn-chev">▼</div>
        </div>
        <div class="mn-body">
          <div class="mn-phrase-box">${mn.phrase}</div>
          <div class="mn-rows">${rows}</div>
          <div class="mn-notes">${mn.note}</div>
        </div>
      </div>`;
  }).join('');
}

function toggleMn(i) {
  document.getElementById('mn-'+i).classList.toggle('open');
}

/* ════════════════════════════════════════════
   PANEL SWITCHING
════════════════════════════════════════════ */
function showPanel(name, btn) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('panel-'+name).classList.add('active');
  btn.classList.add('active');
}

/* ════════════════════════════════════════════
   INIT
════════════════════════════════════════════ */
renderQuestion();
renderFC();
buildMnemonics();
// Open first mnemonic by default
document.getElementById('mn-0').classList.add('open');
</script>
