<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SA1 Revision Notes — Chapter Flowcharts</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0b0f1a;
    --surface: #131929;
    --surface2: #1a2235;
    --border: #243050;
    --accent1: #4f8ef7;
    --accent2: #7c5cfc;
    --accent3: #2dd9b4;
    --accent4: #f7934f;
    --text-primary: #e8edf8;
    --text-secondary: #8a9bc2;
    --text-muted: #4e5f80;
    --chapter-glow: rgba(79, 142, 247, 0.15);
    --section-glow: rgba(124, 92, 252, 0.12);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text-primary);
    font-family: 'Outfit', sans-serif;
    min-height: 100vh;
    padding: 0;
    overflow-x: hidden;
  }

  /* Header */
  .page-header {
    background: linear-gradient(135deg, #0d1525 0%, #111c35 50%, #0d1525 100%);
    border-bottom: 1px solid var(--border);
    padding: 48px 40px 36px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .page-header::before {
    content: '';
    position: absolute;
    top: -60px; left: 50%; transform: translateX(-50%);
    width: 600px; height: 200px;
    background: radial-gradient(ellipse, rgba(79,142,247,0.18) 0%, transparent 70%);
    pointer-events: none;
  }
  .page-header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(28px, 4vw, 48px);
    font-weight: 400;
    letter-spacing: -0.02em;
    background: linear-gradient(135deg, #a8c4ff 0%, #7c9ef5 40%, #c4b0ff 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 10px;
  }
  .page-header p {
    font-size: 15px;
    color: var(--text-secondary);
    font-weight: 300;
    letter-spacing: 0.04em;
  }
  .chapter-count {
    display: inline-block;
    margin-top: 18px;
    background: rgba(79,142,247,0.12);
    border: 1px solid rgba(79,142,247,0.25);
    border-radius: 100px;
    padding: 6px 20px;
    font-size: 13px;
    color: var(--accent1);
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.06em;
  }

  /* TOC nav */
  .toc-bar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 40px;
    display: flex;
    align-items: center;
    gap: 6px;
    overflow-x: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .toc-bar::-webkit-scrollbar { height: 3px; }
  .toc-bar::-webkit-scrollbar-track { background: transparent; }
  .toc-bar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .toc-pill {
    display: inline-block;
    padding: 10px 14px;
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    font-weight: 500;
    color: var(--text-muted);
    text-decoration: none;
    white-space: nowrap;
    border-bottom: 2px solid transparent;
    transition: color 0.2s, border-color 0.2s;
    cursor: pointer;
  }
  .toc-pill:hover {
    color: var(--accent1);
    border-bottom-color: var(--accent1);
  }

  /* Main content */
  .content {
    max-width: 1400px;
    margin: 0 auto;
    padding: 60px 40px 100px;
    display: flex;
    flex-direction: column;
    gap: 80px;
  }

  /* Chapter block */
  .chapter-block {
    position: relative;
    animation: fadeUp 0.5s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Chapter header box */
  .chapter-header {
    background: linear-gradient(135deg, rgba(79,142,247,0.12) 0%, rgba(124,92,252,0.08) 100%);
    border: 1px solid rgba(79,142,247,0.3);
    border-radius: 16px 16px 0 0;
    padding: 24px 32px;
    position: relative;
    overflow: hidden;
  }
  .chapter-header::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: linear-gradient(90deg, rgba(79,142,247,0.05) 0%, transparent 100%);
    pointer-events: none;
  }
  .chapter-tag {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent1);
    margin-bottom: 6px;
    opacity: 0.85;
  }
  .chapter-title {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(18px, 2.5vw, 26px);
    font-weight: 400;
    color: var(--text-primary);
    letter-spacing: -0.01em;
    line-height: 1.2;
  }

  /* Connector line from chapter to sections */
  .connector-trunk {
    width: 2px;
    height: 32px;
    background: linear-gradient(to bottom, rgba(79,142,247,0.5), rgba(79,142,247,0.15));
    margin: 0 auto;
  }

  /* Sections grid */
  .sections-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 20px;
    position: relative;
  }

  /* Section card */
  .section-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    transition: border-color 0.25s, transform 0.25s, box-shadow 0.25s;
    position: relative;
  }
  .section-card:hover {
    border-color: rgba(124,92,252,0.5);
    transform: translateY(-3px);
    box-shadow: 0 12px 40px rgba(0,0,0,0.3), 0 0 0 1px rgba(124,92,252,0.15);
  }
  .section-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--accent2), var(--accent1));
    opacity: 0;
    transition: opacity 0.25s;
  }
  .section-card:hover::before { opacity: 1; }

  .section-header {
    padding: 16px 18px 12px;
    border-bottom: 1px solid var(--border);
    background: rgba(255,255,255,0.02);
  }
  .section-name {
    font-size: 13.5px;
    font-weight: 600;
    color: #c5d0ef;
    line-height: 1.35;
    letter-spacing: 0.01em;
  }

  /* Subsections list */
  .subsections-list {
    padding: 10px 18px 14px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .subsection-item {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    font-size: 12.5px;
    color: var(--text-secondary);
    font-weight: 400;
    line-height: 1.4;
    padding: 4px 0;
    border-bottom: 1px solid rgba(255,255,255,0.03);
    transition: color 0.2s;
  }
  .subsection-item:last-child { border-bottom: none; }
  .subsection-item:hover { color: #c0ccee; }
  .sub-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--accent3);
    flex-shrink: 0;
    margin-top: 5px;
    opacity: 0.7;
  }

  /* Connector lines between chapter and sections row */
  .section-connector-row {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-bottom: 0;
    position: relative;
    padding: 0 10px;
  }

  /* Responsive */
  @media (max-width: 768px) {
    .content { padding: 40px 20px 80px; gap: 60px; }
    .toc-bar { padding: 0 20px; }
    .page-header { padding: 36px 20px 28px; }
    .chapter-header { padding: 18px 20px; }
    .sections-grid { grid-template-columns: 1fr; gap: 14px; }
  }
</style>
</head>

// Build TOC
const tocBar = document.getElementById('tocBar');
CHAPTERS.forEach(ch => {
  const a = document.createElement('a');
  a.className = 'toc-pill';
  a.textContent = ch.chapter;
  a.href = '#' + ch.chapter;
  tocBar.appendChild(a);
});

// Update count
document.getElementById('chapterCount').textContent = `${CHAPTERS.length} Chapters`;

// Build content
const content = document.getElementById('mainContent');

CHAPTERS.forEach((ch, idx) => {
  const block = document.createElement('div');
  block.className = 'chapter-block';
  block.id = ch.chapter;
  block.style.animationDelay = (idx * 0.04) + 's';

  // Chapter header
  const header = document.createElement('div');
  header.className = 'chapter-header';
  header.innerHTML = `
    <div class="chapter-tag">${ch.chapter}</div>
    <div class="chapter-title">${ch.title}</div>
  `;
  block.appendChild(header);

  // Trunk connector
  const trunk = document.createElement('div');
  trunk.className = 'connector-trunk';
  block.appendChild(trunk);

  // Sections grid
  const grid = document.createElement('div');
  grid.className = 'sections-grid';

  ch.sections.forEach(sec => {
    const card = document.createElement('div');
    card.className = 'section-card';

    const secHeader = document.createElement('div');
    secHeader.className = 'section-header';
    secHeader.innerHTML = `<div class="section-name">${sec.title}</div>`;
    card.appendChild(secHeader);

    const subList = document.createElement('div');
    subList.className = 'subsections-list';
    sec.subsections.forEach(sub => {
      const item = document.createElement('div');
      item.className = 'subsection-item';
      item.innerHTML = `<span class="sub-dot"></span><span>${sub}</span>`;
      subList.appendChild(item);
    });
    card.appendChild(subList);
    grid.appendChild(card);
  });

  block.appendChild(grid);
  content.appendChild(block);
});
