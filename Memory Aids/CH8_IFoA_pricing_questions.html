ution", "text": "The information that is available about the potential impacts of climate change on claims frequency / amounts appears to be quite limited which will make it very difficult to estimate the additional capital requirements due to increased flood risk. [1]"}, {"section": "Solution", "text": "Consideration will need to be given to both the impact of a general increase in claim amounts / frequency and the impact of extreme flooding events on the additional capital requirement from increased flood risk. [1]"}, {"section": "Solution", "text": "The impact of flooding may impact a range of different assumptions in the capital calculations such as mortality, morbidity, lapses, expenses. Determining the impact accurately may be difficult to do. [1]"}, {"section": "Solution", "text": "A 99.5% VaR approach is looking at the 0.5% most adverse scenario when determining the capital to be held. Assessing the risk in the tail of the most adverse scenarios accurately is likely to be particularly difficult given the limited information available. [1]"}, {"section": "Solution", "text": "As adverse flooding only takes place infrequently it will take many years to build up a clear picture of the most adverse scenarios due to increased flood risk. [1]"}, {"section": "Solution", "text": "ABC\u2019s initial estimate of capital may be very imprecise as the initial estimate of additional capital requirements due to increased flood risk. [1]"}, {"section": "Solution", "text": "The amount of additional capital held for flood risk may need to be revised over time as new information becomes available. [1]"}, {"section": "Solution", "text": "ABC will also need to carefully consider whether changes in flood risk will impact the correlation of different risks in its regulatory capital calculation. [1]"}, {"section": "Solution", "text": "ABC may not have sufficient internal expertise to accurately assess the impacts of flood risk on its business and may therefore need to get external expertise to help determine the amount of additional capital to be held. [1]"}, {"section": "Solution", "text": "Developing a model which can accurately determine the additional capital required for flooding may be extremely complex [1]"}, {"section": "Solution", "text": "and possibly beyond the skills of the individuals in the company. [\u00bd]"}]}, {"id": "202309_Q2(i)", "sitting": "September 2023", "yymmkey": "202309", "ref": "Q2(i)", "marks": 5, "all_themes": ["Critical Illness", "Income Protection", "Pricing", "Private Medical Insurance (PMI)"], "products": ["Critical Illness", "Income Protection", "Private Medical Insurance (PMI)"], "question_text": "Outline the parents\u2019 personal financial needs to cover themselves and their dependants.", "scenario": "In Country A:\n\uf0b7 there is no state-funded provision of long term care for the elderly. There is only private provision of care (e.g. self-funded placements in an old persons home or self-funded at home assistance with trained nurses).\n\uf0b7 the state provides universal health care to all citizens and it is free at the point at which care is required, covering all treatments, services and pharmaceuticals.\nThere is no private health care provision.\n\uf0b7 the state provides a basic level of disability and u", "bullets": [{"section": "Solution", "text": "The family will have regular outgoings that will need to be met. For example: Daily living expenses for themselves and their dependants. [\u00bd]"}, {"section": "Solution", "text": "Food [\u00bd]"}, {"section": "Solution", "text": "Utilities [\u00bd]"}, {"section": "Solution", "text": "Rent [\u00bd]"}, {"section": "Solution", "text": "Other reasonable example [\u00bd]"}, {"section": "Solution", "text": "Other regular costs such as: School fees [\u00bd]"}, {"section": "Solution", "text": "Pension contributions [\u00bd]"}, {"section": "Solution", "text": "Insurance premiums [\u00bd]"}, {"section": "Solution", "text": "Other reasonable example [\u00bd]"}, {"section": "Solution", "text": "The parents may also need to pay for daily living expenses for the grandparents [\u00bd]"}, {"section": "Solution", "text": "which could include care costs. [\u00bd]"}, {"section": "Solution", "text": "The family may also need to cover non-regular or unforeseen expenditure such as: Holidays [\u00bd]"}, {"section": "Solution", "text": "Home / Car maintenance [\u00bd]"}, {"section": "Solution", "text": "Other reasonable example [\u00bd]"}, {"section": "Solution", "text": "The family may need to service Mortgage repayments [\u00bd]"}, {"section": "Solution", "text": "and any other debt they have such as: Credit card repayments [\u00bd]"}, {"section": "Solution", "text": "Personal Loans [\u00bd]"}, {"section": "Solution", "text": "Other reasonable example [\u00bd]"}, {"section": "Solution", "text": "The parents will need a regular income or savings to cover these outgoings. [\u00bd]"}, {"section": "Solution", "text": "The grandparents will also need a regular income or savings to cover their outgo, or potentially they may need to rely on the parents. [\u00bd]"}, {"section": "Solution", "text": "[Mark available 10, maximum 5]"}]}, {"id": "202309_Q2(ii)", "sitting": "September 2023", "yymmkey": "202309", "ref": "Q2(ii)", "marks": 12, "all_themes": ["Claims Management", "Critical Illness", "Income Protection", "Pricing", "Private Medical Insurance (PMI)"], "products": ["Private Medical Insurance (PMI)", "Critical Illness", "Income Protection"], "question_text": "Discuss the suitability of the following types of health and care insurance products to meet the parents\u2019 financial needs identified in part (i):\n\uf0b7 major medical expenses \uf0b7 critical illness \uf0b7 income protection.", "scenario": "In Country A:\n\uf0b7 there is no state-funded provision of long term care for the elderly. There is only private provision of care (e.g. self-funded placements in an old persons home or self-funded at home assistance with trained nurses).\n\uf0b7 the state provides universal health care to all citizens and it is free at the point at which care is required, covering all treatments, services and pharmaceuticals.\nThere is no private health care provision.\n\uf0b7 the state provides a basic level of disability and u", "bullets": [{"section": "Solution", "text": "Major Medical Expenses (MME): The state will already cover surgery or major event costs under the country\u2019s universal health care system [\u00bd]"}, {"section": "Solution", "text": "which would suggest MME is not suitable to meet the parents' or dependants' financial needs. [\u00bd]"}, {"section": "Solution", "text": "However, there may be costs incurred associated with a major medical event which could be covered by MME. [\u00bd]"}, {"section": "Solution", "text": "Those costs could be incurred during the major medical event or during the period of recovery from the event. [\u00bd]"}, {"section": "Solution", "text": "There may also be costs incurred while on a waiting list for accessing state health care or for each day in hospital which could be covered by MME. [\u00bd]"}, {"section": "Solution", "text": "If the MME policy covers the parents or child then in the event of a major medical event the costs could include: [\u00bd]"}, {"section": "Solution", "text": "Transportation costs to and from hospital [\u00bd]"}, {"section": "Solution", "text": "Accommodation near the hospital for the family [\u00bd]"}, {"section": "Solution", "text": "Domestic support e.g., cooking, cleaning [\u00bd]"}, {"section": "Solution", "text": "Other reasonable example [\u00bd]"}, {"section": "Solution", "text": "MME could provide cash and so enable the family to continue to meet its personal financial needs while experiencing the disruption to daily life associated with health treatment and services. [\u00bd]"}, {"section": "Solution", "text": "The sum insured for MME is likely to be quite low, so it is only likely to meet short- lived disruptions. [\u00bd]"}, {"section": "Solution", "text": "So MME may be suitable to cover some of the family personal financial needs. [\u00bd]"}, {"section": "Solution", "text": "Critical Illness (CI): Although there is free health care, a critical illness diagnosis can be associated with potentially significant additional financial needs for the family. [\u00bd]"}, {"section": "Solution", "text": "The CI benefit provides a lump sum which could be used to meet a wide range of the family\u2019s financial needs [\u00bd]"}, {"section": "Solution", "text": "So CI is potentially suitable to meet a wide range of the family\u2019s personal financial needs. [\u00bd]"}, {"section": "Solution", "text": "The CI benefit could be used to replace lost income of the parent [\u00bd]"}, {"section": "Solution", "text": "because they are too ill to work [\u00bd]"}, {"section": "Solution", "text": "or because they can\u2019t work as they need to care for a sick child [\u00bd]"}, {"section": "Solution", "text": "The CI benefit could also be used to complement any limited state disability benefit. [\u00bd]"}, {"section": "Solution", "text": "CI could be used to meet whatever the outgoings of the family were at the time the event occurs such as: Daily living costs - food/clothing etc [\u00bd]"}, {"section": "Solution", "text": "Unforeseen costs such as: [\u00bd]"}, {"section": "Solution", "text": "Accommodation for major life changes associated with CI diagnosis. [\u00bd]"}, {"section": "Solution", "text": "Rehabilitation costs [\u00bd]"}, {"section": "Solution", "text": "Pay for psychological support for family [\u00bd]"}, {"section": "Solution", "text": "Servicing debt costs such as: Paying the mortgage or other debt costs in the event of a loss of income. [\u00bd]"}, {"section": "Solution", "text": "Other reasonable examples (up to 1 mark) [\u00bd]"}, {"section": "Solution", "text": "If the product is written on an accelerated basis then it will provide mortality cover for the dependents [\u00bd]"}, {"section": "Solution", "text": "which could be used to meet additional costs such as funeral costs. [\u00bd]"}, {"section": "Solution", "text": "If a CI event occurs to a grandparent: Parents may wish to stop working to care for a parent during a CI diagnosis. [\u00bd]"}, {"section": "Solution", "text": "Parents may wish to pay for at home support during diagnosis or recovery for the grandparent to enable them to continue working. [\u00bd]"}, {"section": "Solution", "text": "There may be an insurance need; however critical illness can be very expensive at older ages so it may not be affordable. [\u00bd]"}, {"section": "Solution", "text": "Critical illness may have a maximum age of coverage of 60 (state retirement age) so the product may not be suitable for a grandparent. [\u00bd]"}, {"section": "Solution", "text": "Income Protection (IP): IP would provide an income to enable the family to continue to meet its personal financial needs while experiencing disruption associated with loss of income. [\u00bd]"}, {"section": "Solution", "text": "Although there is basic support for disability and unemployment provided by the state for citizens of working age, this may not be adequate to meet the financial needs of the parents and their dependants. [\u00bd]"}, {"section": "Solution", "text": "IP could supplement or complement the limited state disability benefit. [\u00bd]"}, {"section": "Solution", "text": "Therefore, IP is potentially a suitable product for the parents as it will cover some of the parents financial needs during a period of lost income [\u00bd]"}, {"section": "Solution", "text": "For example, during a period where they are unable to work. [\u00bd]"}, {"section": "Solution", "text": "Parents will need the replacement income if they are unable to work due to own illness, or a child\u2019s, or a grandparents, to cover the financial needs when they are unable to work e.g. regular expenditure, savings, servicing debt. [\u00bd]"}, {"section": "Solution", "text": "IP does not pay out in the event of unemployment, but the government pays unemployment benefits so this is not a financial need for the parents. [\u00bd]"}, {"section": "Solution", "text": "Children do not have an income so would not need income protection. [\u00bd]"}, {"section": "Solution", "text": "Grandparents may no longer be working in which case they would not require income protection as state and self-funded pension would still be payable. [\u00bd]"}, {"section": "Solution", "text": "Overall IP is potentially a very suitable product for the parents. [\u00bd]"}, {"section": "Solution", "text": "IP may have a maximum age of coverage of 60 (state retirement age) so the product may not be suitable for the grandparents depending on their age. [\u00bd]"}]}, {"id": "202309_Q2(iii)", "sitting": "September 2023", "yymmkey": "202309", "ref": "Q2(iii)", "marks": 4, "all_themes": ["Claims Management", "Critical Illness", "Income Protection", "Pricing", "Private Medical Insurance (PMI)", "Underwriting"], "products": ["Private Medical Insurance (PMI)", "Critical Illness", "Income Protection"], "question_text": "Various types of health and care benefits are included in the parents\u2019 employment benefit packages that cover events where the parents or their children become sick.\nThe parents have sought advice from a financial advisor who proposed that they take out Long Term Care (LTC) insurance.\nDescribe the main benefit features of LTC insurance.", "scenario": "In Country A:\n\uf0b7 there is no state-funded provision of long term care for the elderly. There is only private provision of care (e.g. self-funded placements in an old persons home or self-funded at home assistance with trained nurses).\n\uf0b7 the state provides universal health care to all citizens and it is free at the point at which care is required, covering all treatments, services and pharmaceuticals.\nThere is no private health care provision.\n\uf0b7 the state provides a basic level of disability and u", "bullets": [{"section": "Solution", "text": "Benefits: The benefits aim to cover needs / costs associated with LTC including: Domestic support e.g., qualified professional visits home regularly [\u00bd]"}, {"section": "Solution", "text": "Live in care e.g., as condition deteriorates have professional carer live at own home [\u00bd]"}, {"section": "Solution", "text": "Residential care e.g., move to old persons home with increased support [\u00bd]"}, {"section": "Solution", "text": "Medical care e.g., provision of medical treatment in care setting [\u00bd]"}, {"section": "Solution", "text": "Assistive devices (e.g., wheelchair or stair lifts) [\u00bd]"}, {"section": "Solution", "text": "The benefits can also assist the life covered or their next of kin with support and advice to navigate the provision of care [\u00bd]"}, {"section": "Solution", "text": "Benefit may be severity linked such that the amount of benefit increases with the need for care e.g., linked to activities of daily living [\u00bd]"}, {"section": "Solution", "text": "The product can be on an indemnity basis which will keep up with the costs of care which can be beneficial as care may be required for a long time [\u00bd]"}, {"section": "Solution", "text": "The product can be on a cash basis. [\u00bd]"}, {"section": "Solution", "text": "Either by lump sum where the individual needs to manage the fund to cover expenses as they fall due [\u00bd]"}, {"section": "Solution", "text": "Or by regular payment where the individual receives an annuity payment while meeting the claim trigger [\u00bd]"}, {"section": "Solution", "text": "Benefit payment increases may be nil, fixed or index-linked increasing. Inflation index may have minimum and maximums. [\u00bd]"}, {"section": "Solution", "text": "Benefits may increase before and after the point of claim. [\u00bd]"}, {"section": "Solution", "text": "Benefits are generally paid for life but may be for a term (e.g., 10 years) [\u00bd]"}, {"section": "Solution", "text": "After purchasing prefunded LTC, there may be a waiting period where the person is not entitled to benefits to remove anti-selection risk [\u00bd]"}, {"section": "Solution", "text": "There may be a surrender benefit on a pre-funded plan prior to a claim incepting. [\u00bd]"}, {"section": "Solution", "text": "Claims triggers: For immediate needs, the initial underwriting process establishes the need before the product is bought [\u00bd]"}, {"section": "Solution", "text": "For prefunded LTC, the claim trigger can be based on activities of daily living (ADLs) [\u00bd]"}, {"section": "Solution", "text": "Or on a mental impairment trigger [\u00bd]"}, {"section": "Solution", "text": "There may be a deferred period where the need for care is assessed to ensure it is indeed a long-term care need (not short term) [\u00bd]"}, {"section": "Solution", "text": "Options/Guarantees: If the insured life dies within a certain period, a return of premium may be provided i.e., death benefit [\u00bd]"}, {"section": "Solution", "text": "A premium waiver option could be added following certain events [\u00bd]"}, {"section": "Solution", "text": "Group considerations: There is no established group provision of LTC insurance [\u00bd]"}]}, {"id": "202309_Q2(iv)", "sitting": "September 2023", "yymmkey": "202309", "ref": "Q2(iv)", "marks": 10, "all_themes": ["Critical Illness", "Income Protection", "Investments", "Pricing", "Private Medical Insurance (PMI)", "Regulation", "Reserving & Valuation", "Risk Management & Capital", "Underwriting"], "products": ["Private Medical Insurance (PMI)", "Critical Illness", "Income Protection"], "question_text": "\u20134 The grandparents are not currently in need of long term care. The financial advisor has suggested a pre-funded LTC product for each grandparent.\nThe parents both work from home. There is sufficient space in the home to accommodate the elderly grandparents if they were to need care. The parents have asked the financial advisor if it would be appropriate to self-fund and self-provide any future care needs for the grandparents.\nContrast the options below, with regard to how each assists the parents in meeting their and the grandparents\u2019 needs by managing a wide array of risks and meeting personal preferences:\n(a) A pre-funded LTC policy for each grandparent\n(b) Self-funded and self-provided care for the grandparents.", "scenario": "In Country A:\n\uf0b7 there is no state-funded provision of long term care for the elderly. There is only private provision of care (e.g. self-funded placements in an old persons home or self-funded at home assistance with trained nurses).\n\uf0b7 the state provides universal health care to all citizens and it is free at the point at which care is required, covering all treatments, services and pharmaceuticals.\nThere is no private health care provision.\n\uf0b7 the state provides a basic level of disability and u", "bullets": [{"section": "Solution", "text": "Meeting the parents / children\u2019s needs: The more the parents can save on the cost of meeting the grandparents needs the more they could save into the children\u2019s current or future needs or their own [\u00bd]"}, {"section": "Solution", "text": "Option B may be preferred if the parents have a personal preference which allows for higher risk tolerance [\u00bd]"}, {"section": "Solution", "text": "However, paying premiums under A may be a stable and known amount and timing which allows the couple to better plan to meet their financial needs than the unknown quantity required under B. [\u00bd]"}, {"section": "Solution", "text": "Option A may be preferred if the parents have a personal preference for risk aversion [\u00bd]"}, {"section": "Solution", "text": "Option B provides the family with liquidity and fungibility of funds to meet needs as they arise [\u00bd]"}, {"section": "Solution", "text": "Although money may not be available when required [\u00bd]"}, {"section": "Solution", "text": "Option A may remove the temptation to use funds to meet more immediate needs/ family expenses [\u00bd]"}, {"section": "Solution", "text": "Meeting the grandparents needs General and personal preferences: Option B would not include a profit margin [\u00bd]"}, {"section": "Solution", "text": "Option B would not benefit from competitive downward pressure on costs [\u00bd]"}, {"section": "Solution", "text": "Option A may include an insurance premium tax, tax on dividends, capital gains, and interest [\u00bd]"}, {"section": "Solution", "text": "Option B may also incur tax such as capital gains tax, income tax. [\u00bd]"}, {"section": "Solution", "text": "However, Option A may also offer tax advantages [\u00bd]"}, {"section": "Solution", "text": "Option B may not include the required expertise [\u00bd]"}, {"section": "Solution", "text": "e.g., the parents may not have sufficient expertise to self-care for an individual with complex care needs e.g., dementia [\u00bd]"}, {"section": "Solution", "text": "Debatable - Quality of care: It is not clear which option would provide a higher quality of care [\u00bd]"}, {"section": "Solution", "text": "Option B may be higher quality of care - if care homes and services do not provide personalised care to the individual [\u00bd]"}, {"section": "Solution", "text": "Option A may enable a professional carer to be sourced that allows for care needs to be better met [\u00bd]"}, {"section": "Solution", "text": "Option B may enable care from a loved one which may better protect dignity in older age [\u00bd]"}, {"section": "Solution", "text": "Option A may enable care from an independent person which may better protect dignity in older age [\u00bd]"}, {"section": "Solution", "text": "Cultural: Option B allows for a cultural norm for a family to have intergenerational living and / or family to have children and parents assist in the long-term care needs of elderly grandparents [\u00bd]"}, {"section": "Solution", "text": "Option A allows for a cultural norm of career progression / fulfilment without sacrifice for elderly care provision as parents may need to go part time or go in to the office in the future [\u00bd]"}, {"section": "Solution", "text": "Burden of care: Option B leaves the parents and children open to the burden of care which might affect the mental and physical wellbeing of the carer [\u00bd]"}, {"section": "Solution", "text": "Option A removes the burden of care [\u00bd]"}, {"section": "Solution", "text": "But exposes the grandparents to the risk of poor quality care [\u00bd]"}, {"section": "Solution", "text": "Option A allows care to be provided where a grandparent does not live close enough for the parent to provide self-care [\u00bd]"}, {"section": "Solution", "text": "Economies of scale: There may be duplication of costs and expenses under Option A and as such Option B may allow a cost saving with economies of scale over the three grandparents [\u00bd]"}, {"section": "Solution", "text": "Joint-life considerations: It may be that the two grandparents still living may be a couple, and one can care for the other (if in good health) such that only two grandparents may be liable for option B from the parents\u2019 perspective [\u00bd]"}, {"section": "Solution", "text": "Wide array of risks Rates Mortality / Longevity risk: Option A has the disadvantage of losing funds if a grandparent dies without the need for care beforehand, although this is minimised if a death benefit is included [\u00bd]"}, {"section": "Solution", "text": "Option B would enable additional funds to be put toward the care of other grandparents, including any expense deductions lost when the death benefit is paid [\u00bd]"}, {"section": "Solution", "text": "Morbidity / Healthy Life Expectancy (HLE) risk: Option B would be better if HLE is long e.g., if the grandparents live a long period of time without needing care, then the family can use the funds toward other costs [\u00bd]"}, {"section": "Solution", "text": "However, if the single grandparent or the remaining grandparent in the other set experience poor health early (a short HLE) then option A would better help the parents manage their financial needs [\u00bd]"}, {"section": "Solution", "text": "Option B would be suitable if the morbidity in older age does not require such technical or specialised care [\u00bd]"}, {"section": "Solution", "text": "Option A would be suitable if the morbidity in older age can be accommodated with informal care [\u00bd]"}, {"section": "Solution", "text": "The parents do not know the type of care required as all grandparents are currently healthy therefore it may come down to their risk preference [\u00bd]"}, {"section": "Solution", "text": "Care cost risk: Accommodation costs [\u00bd]"}, {"section": "Solution", "text": "Option B has the benefit of economies of scale as the house is already being paid for as are food and utilities. [\u00bd]"}, {"section": "Solution", "text": "Under Option A the parents would be paying for these to be provided for each grandparent potentially in different settings (close to where grandparents originally lived) [\u00bd]"}, {"section": "Solution", "text": "in some settings the accommodation costs may be lower than under option B due to geography and the economies of scale in care industry provision. [\u00bd]"}, {"section": "Solution", "text": "Medical services at home For Option A medical care is included at home but would need to be met by the universal health care system under Option B. [\u00bd]"}, {"section": "Solution", "text": "Option B therefore may cause more disruption to the parents\u2019 ability to meet financial needs and increase costs e.g., transportation to hospital and wait for treatment with grandparent [\u00bd]"}, {"section": "Solution", "text": "Care provision The need required may be more intensive than the parents can self-provide for e.g., more than 1- or 2-person job if full time care required [\u00bd]"}, {"section": "Solution", "text": "This may require the parents to outsource to pay privately for live in care. Therefore, minimising the cost saving. [\u00bd]"}, {"section": "Solution", "text": "Especially as they are both working so any care during the night may to be externally sourced. [\u00bd]"}, {"section": "Solution", "text": "Inflation risk: Medical inflation [\u00bd]"}, {"section": "Solution", "text": "Option B may initially meet costs; these may increase at a rate higher than the parents can keep up with. In addition, the horizon of exposure may be increased with increased life expectancy in ill health [\u00bd]"}, {"section": "Solution", "text": "Under Option A this risk is transferred to the insurer but may be passed on in terms of reviewable premiums. The parents could minimize this by selecting guaranteed premiums although this may impinge on their ability to meet other financial needs as so expensive. [\u00bd]"}, {"section": "Solution", "text": "Salary inflation: Option A the parents may not be able to meet the reviewable premiums with the salary increases awarded. [\u00bd]"}, {"section": "Solution", "text": "Option B the parents are exposed to their salary inflation not meeting price inflation [\u00bd]"}, {"section": "Solution", "text": "General inflation Option B leaves parents exposed to the cost of general inflation but potential more exposed to some elements such as utilities costs e.g., need heating on all day or electricity for breathing assistance [\u00bd]"}, {"section": "Solution", "text": "Investment risk: Pre-funded policy is generally cheaper than immediate because there is some investment return [\u00bd]"}, {"section": "Solution", "text": "Although all grandparents are currently not in need of care, they are all above retirement age so the term over which pre-funded policy can accumulate growth is limited [\u00bd]"}, {"section": "Solution", "text": "The funds set aside under B may underperform to meet the expected cost of care for the grandparents [\u00bd]"}, {"section": "Solution", "text": "This may be due to inappropriate fund selection. Option A is more likely to have better investment matching ability due to the law of large numbers. [\u00bd]"}, {"section": "Solution", "text": "Option B may see the parents disinvesting at an inopportune time to meet grandparents needs [\u00bd]"}, {"section": "Solution", "text": "Option B could take advantage of good investment returns to help meet the costs of care [\u00bd]"}, {"section": "Solution", "text": "Option A would benefit from reduced investment costs but only if self-managed, it may be outsourced to a wealth advisor who would charge fees [\u00bd]"}, {"section": "Solution", "text": "Expense risk: Option B has no contribution to overheads such as office, staff, etc [\u00bd]"}, {"section": "Solution", "text": "Option B has no protection to increasing cost of administering own self-care such as medical paperwork, arranging appointments etc. [\u00bd]"}, {"section": "Solution", "text": "Underwriting/Selection risk: Option A may allow the parents to benefit from anti-selection where they have more information about the likely health of grandparents in the future than the insurer is asking as part of the underwriting [\u00bd]"}, {"section": "Solution", "text": "Option B may allow the parents to benefit from improved understanding of the risk categorisation than the insurer is able to price on e.g., previous history of poor health in the family was caused by external factors such as occupation but grandparents were not exposed to this risk [\u00bd]"}, {"section": "Solution", "text": "Physical risk: Option B leaves the parents exposed to having to make any adjustments to the home or having to move the grandparents in to suitable temporary accommodation if there was for example a flood [\u00bd]"}, {"section": "Solution", "text": "This is covered under Option A who would have a sufficient recovery plan and assets to meet the needs e.g., alternative homes [\u00bd]"}, {"section": "Solution", "text": "Counterparty risk: Option A exposes the parents to much more counterparty risk including the insurance provider and the care facility [\u00bd]"}, {"section": "Solution", "text": "Option B includes counterparty risk on investment providers but so does Option A (though this is second hand) [\u00bd]"}, {"section": "Solution", "text": "Regulatory or fiscal developments / State benefits: Option A would not allow the parents to take advantage of any future changes in insurance developments or state benefits without sacrificing a withdrawal penalty [\u00bd]"}, {"section": "Solution", "text": "Option B may leave the parents open to the risk of a change in working practices such as no longer being able to work from home [\u00bd]"}]}, {"id": "202309_Q2(vi)", "sitting": "September 2023", "yymmkey": "202309", "ref": "Q2(vi)", "marks": 7, "all_themes": ["Critical Illness", "Income Protection", "Investments", "Pricing", "Private Medical Insurance (PMI)", "Regulation"], "products": ["Private Medical Insurance (PMI)", "Critical Illness", "Income Protection"], "question_text": "The opposing political party in Country A has suggested that if a pre-funded LTC insurance product is bought for an elderly parent it should be an income tax deductible expense and that no insurance premium tax should be charged.\nSuggest possible reasons for the opposition political party\u2019s suggestion.", "scenario": "In Country A:\n\uf0b7 there is no state-funded provision of long term care for the elderly. There is only private provision of care (e.g. self-funded placements in an old persons home or self-funded at home assistance with trained nurses).\n\uf0b7 the state provides universal health care to all citizens and it is free at the point at which care is required, covering all treatments, services and pharmaceuticals.\nThere is no private health care provision.\n\uf0b7 the state provides a basic level of disability and u", "bullets": [{"section": "Solution", "text": "Social, political, or cultural promises: This may have been a political promise of what they would do if they came in to power [\u00bd]"}, {"section": "Solution", "text": "This option is better for the insurance and care industry who may have lobbied the opposing party [\u00bd]"}, {"section": "Solution", "text": "This party may want to see a change in society to reduce the burden of care to be more community based and so implementing such policies to incentivize change [\u00bd]"}, {"section": "Solution", "text": "Protecting the nation\u2019s health: Removes the burden of care on the carer\u2019s physical and mental wellbeing - so protecting working age population\u2019s health [1]"}, {"section": "Solution", "text": "Higher quality of care provided as uses professionally trained carers - so protecting elderly health [\u00bd]"}, {"section": "Solution", "text": "The creation of more care facilities through investment due to increased LTC products will create infrastructure for the benefit of current and future generations [\u00bd]"}, {"section": "Solution", "text": "Reduce costs of care, if promotion in the industry creates additional supply of care labour and infrastructure. This may benefit those people who need to self-fund as cannot afford LTC. [1]"}, {"section": "Solution", "text": "May better look after financial needs of the parents and children as premiums are known amount which can be budgeted for [\u00bd]"}, {"section": "Solution", "text": "Facilitating care may reduce the burden on the health system where older individuals use hospital beds as no appropriate care is accessible [\u00bd]"}, {"section": "Solution", "text": "Remove over reliance on health care system if services can be provided within the care setting such as GP appointments, nurse appointments, dressings, pharmaceutical reviews [\u00bd]"}, {"section": "Solution", "text": "Increased corporation tax revenues from insurance and care industry may be put toward funding the universal health care system or employment benefits [\u00bd]"}, {"section": "Solution", "text": "Promote economic activity / grow GDP: People who cannot work from home have a reduced incentive to leave the workforce [\u00bd]"}, {"section": "Solution", "text": "In turn, this would retain income tax on those individuals [\u00bd]"}, {"section": "Solution", "text": "Boost the financial industry through the promotion of insurance products [\u00bd]"}, {"section": "Solution", "text": "Create jobs in the insurance industry [\u00bd]"}, {"section": "Solution", "text": "Promote the economy around care industry [\u00bd]"}, {"section": "Solution", "text": "Create jobs in the care industry [\u00bd]"}, {"section": "Solution", "text": "Building care homes [\u00bd]"}, {"section": "Solution", "text": "Training care staff [\u00bd]"}, {"section": "Solution", "text": "Balancing the budget: The income tax revenue lost may be lower, if the premium expense is less than the at home provision of tax relief i.e., it is a fiscally better policy for the country than the government\u2019s proposal [\u00bd]"}, {"section": "Solution", "text": "Increased economic activity and growth of GDP may help balance the budget through corporation tax [\u00bd]"}, {"section": "Solution", "text": "Alternative to state provision of care: The opposing political party may consider the state provision of LTC as unaffordable in the long term and as such is looking for a private provision solution. [\u00bd]"}, {"section": "Solution", "text": "This opposing party may be looking to move toward state and private sector care co- existing in future: [\u00bd]"}, {"section": "Solution", "text": "As a compulsory alternative - state may provide under a certain income threshold and private if beyond that [\u00bd]"}, {"section": "Solution", "text": "As compulsory complement - state may provide care but limited to medical care (as already supplied in health care provision) but all other areas of care costs are mandatory to have insurance [\u00bd]"}, {"section": "Solution", "text": "Other This option may have knock on benefits to other such as: Declining fertility trend. There may be a significant number of working age people or older people with no children. Therefore an insurance product is required as there is no one to self-provide for them. [\u00bd]"}, {"section": "Solution", "text": "(Marks can be awarded for other appropriate examples but should only be awarded for reasons why the opposing party would suggest this policy)"}]}, {"id": "202309_Q3(i)", "sitting": "September 2023", "yymmkey": "202309", "ref": "Q3(i)", "marks": 8, "all_themes": ["Claims Management", "Group Products", "Income Protection", "Pricing", "Pricing & Rating", "Regulation", "Underwriting"], "products": ["Income Protection", "Group Products"], "question_text": "Discuss the possible risks that the company is exposed to by not regularly reviewing its underwriting policy.", "scenario": "Company A is a large health and care insurance company with a substantial book of income protection business. The income protection business is evenly split between group and individual business.\nThe group income protection business provides insurance cover to large employer groups and cover is provided on an annually renewable basis.\nThe group business includes an option for employees who leave the company to take out an individual income protection policy at the standard premium rates applying", "bullets": [{"section": "Solution", "text": "This could lead to a greater risk of over-insurance, leading to excessive claims [\u00bd]"}, {"section": "Solution", "text": "And a higher risk of fraudulent claims occurring [\u00bd]"}, {"section": "Solution", "text": "The existing policy may lead to a concentration of a particular segment of the market [\u00bd]"}, {"section": "Solution", "text": "and the risk of catastrophic claims [\u00bd]"}, {"section": "Solution", "text": "For example, at a single employer, geography or occupation segment [\u00bd]"}, {"section": "Solution", "text": "The underwriting policy may no longer be competitive, for example [\u00bd]"}, {"section": "Solution", "text": "If the financial underwriting policy has not been updated, inflation may have eroded limits, making the policy uncompetitive [\u00bd]"}, {"section": "Solution", "text": "Or if medical limits are no longer aligned with market practice [\u00bd]"}, {"section": "Solution", "text": "Or competitors may be providing support to occupations previously excluded [\u00bd]"}, {"section": "Solution", "text": "Leading to a loss of support from brokers / IFAs [\u00bd]"}, {"section": "Solution", "text": "Which may impact new business volumes for this and other product categories [\u00bd]"}, {"section": "Solution", "text": "Leading to expense risk associated with lower business volumes [\u00bd]"}, {"section": "Solution", "text": "The company may be exposed to anti-selection [\u00bd]"}, {"section": "Solution", "text": "e.g. as a result of policies being out of line with the market [\u00bd]"}, {"section": "Solution", "text": "or new medical developments [\u00bd]"}, {"section": "Solution", "text": "Leading to the risk of higher than anticipated claims [\u00bd]"}, {"section": "Solution", "text": "Leading to the product having lower levels of profitability than anticipated. [\u00bd]"}, {"section": "Solution", "text": "New policy benefits may have been introduced [\u00bd]"}, {"section": "Solution", "text": "Leading to the risk pricing and underwriting policy no longer being aligned [\u00bd]"}, {"section": "Solution", "text": "May not be following current regulations or be in line with current legislation [\u00bd]"}, {"section": "Solution", "text": "For example, access for those with mental health problems [\u00bd]"}, {"section": "Solution", "text": "Out of date underwriting approach could mean underwriting costs are higher than they should be if a more modern approach to underwriting was taken. [\u00bd]"}]}, {"id": "202309_Q3(ii)", "sitting": "September 2023", "yymmkey": "202309", "ref": "Q3(ii)", "marks": 4, "all_themes": ["Claims Management", "Group Products", "Income Protection", "Pricing & Rating", "Product Design", "Underwriting"], "products": ["Income Protection", "Group Products"], "question_text": "Company B is also a large health and care insurance company that sells group and individual income protection business. Company B is a direct competitor of Company A.\nCompany B has recently removed initial medical underwriting requirements and instead relies on pre-existing conditions exclusions for both group and individual income protection business.\nDiscuss how Company B\u2019s change in underwriting approach could affect the business mix of Company A.", "scenario": "Company A is a large health and care insurance company with a substantial book of income protection business. The income protection business is evenly split between group and individual business.\nThe group income protection business provides insurance cover to large employer groups and cover is provided on an annually renewable basis.\nThe group business includes an option for employees who leave the company to take out an individual income protection policy at the standard premium rates applying", "bullets": [{"section": "Solution", "text": "Individual: Take-up of individual policies following an exit from the group scheme is unlikely to be affected given the option provided to employees [\u00bd]"}, {"section": "Solution", "text": "Insurer A may be able to offer better terms to lives who do undergo underwriting [\u00bd]"}, {"section": "Solution", "text": "Leading to the business mix being dominated by healthier lives [\u00bd]"}, {"section": "Solution", "text": "and potentially higher value policies [\u00bd]"}, {"section": "Solution", "text": "Company A may be able to reduce claims underwriting which may be attractive to certain clients [\u00bd]"}, {"section": "Solution", "text": "May provide benefit certainty which may be attractive to certain clients (e.g. those with pre-existing conditions) [\u00bd]"}, {"section": "Solution", "text": "Group business: May be relatively unaffected depending on the level of any free cover limits applied [\u00bd]"}, {"section": "Solution", "text": "It is not clear what Insurer B\u2019s policy on industry/occupation and financial underwriting is [\u00bd]"}, {"section": "Solution", "text": "If restrictions have also been removed then groups which include occupations that would be loaded/declined may now favour Insurer B [\u00bd]"}, {"section": "Solution", "text": "Leading to a decline in new business volume for Insurer A [\u00bd]"}, {"section": "Solution", "text": "And a concentration in industry/occupation groups which do not attract loadings [\u00bd]"}, {"section": "Solution", "text": "Insurer A may be able to offer better terms to these groups compared to Insurer B who may cross-subsidise experience across groups [\u00bd]"}]}, {"id": "202309_Q3(iii)", "sitting": "September 2023", "yymmkey": "202309", "ref": "Q3(iii)", "marks": 2, "all_themes": ["Income Protection", "Pricing & Rating", "Underwriting"], "products": ["Income Protection"], "question_text": "Suggest, with reasons, two possible actions Company A could take to limit the impact of Company B\u2019s change in underwriting approach on Company A\u2019s business.", "scenario": "Company A is a large health and care insurance company with a substantial book of income protection business. The income protection business is evenly split between group and individual business.\nThe group income protection business provides insurance cover to large employer groups and cover is provided on an annually renewable basis.\nThe group business includes an option for employees who leave the company to take out an individual income protection policy at the standard premium rates applying", "bullets": [{"section": "Solution", "text": "The insurer could match the policy of removing medical underwriting [\u00bd]"}, {"section": "Solution", "text": "This would allow the company to compete on the same terms. [\u00bd]"}, {"section": "Solution", "text": "This insurer could introduce medical underwriting at lower limits / potentially increase underwriting requirements [\u00bd]"}, {"section": "Solution", "text": "This could allow the insurer to offer schemes / healthy lives lower prices [\u00bd]"}, {"section": "Solution", "text": "(Other suitable actions/reasons) [1]"}]}, {"id": "202309_Q3(iv)", "sitting": "September 2023", "yymmkey": "202309", "ref": "Q3(iv)", "marks": 6, "all_themes": ["Claims Management", "Data", "Income Protection", "Pricing & Rating", "Regulation", "Underwriting"], "products": ["Income Protection"], "question_text": "Company A is now considering possible changes to its underwriting approach and is carrying out a review of its underwriting policy. The review will include a number of investigations to support any recommended changes in its underwriting policy.\nSuggest, with reasons, what investigations Company A could carry out.", "scenario": "Company A is a large health and care insurance company with a substantial book of income protection business. The income protection business is evenly split between group and individual business.\nThe group income protection business provides insurance cover to large employer groups and cover is provided on an annually renewable basis.\nThe group business includes an option for employees who leave the company to take out an individual income protection policy at the standard premium rates applying", "bullets": [{"section": "Solution", "text": "Investigate how the current underwriting practice is being implemented (for example how often are doctor\u2019s reports used) [\u00bd]"}, {"section": "Solution", "text": "Carry out a cost / benefit analysis of the current underwriting policy [\u00bd]"}, {"section": "Solution", "text": "A claims investigation would be required [\u00bd]"}, {"section": "Solution", "text": "Early claims may be particularly useful to understand to assess anti-selection, impact of waiting periods [\u00bd]"}, {"section": "Solution", "text": "Claims relative to underwriting category or loading would be useful to assess whether the current policy is effective [\u00bd]"}, {"section": "Solution", "text": "Declined claims would also provide information; for example, this may show where the underwriting policy is unclear and impacting customer experience [\u00bd]"}, {"section": "Solution", "text": "An investigation of exposure data would be useful [\u00bd]"}, {"section": "Solution", "text": "To understand if there are specific market segments that are under / over represented [\u00bd]"}, {"section": "Solution", "text": "Including by age, geographic location, occupation or industry category [\u00bd]"}, {"section": "Solution", "text": "A market investigation will be useful to understand competitor practice [\u00bd]"}, {"section": "Solution", "text": "and ensure that Company A\u2019s underwriting practice is not out of line with [\u00bd]"}, {"section": "Solution", "text": "market practice. and industry data may be available with policy statistics to evaluate experience [\u00bd]"}, {"section": "Solution", "text": "Reinsurers or consultants may have market data available [\u00bd]"}, {"section": "Solution", "text": "Medical practitioners may be useful to understand trends in diagnosis and treatment [\u00bd]"}, {"section": "Solution", "text": "Similarly, HR practitioners may be useful to understand new industry / job categories or descriptions [\u00bd]"}, {"section": "Solution", "text": "And provide information on current salary and future inflation expectations for financial underwriting [\u00bd]"}, {"section": "Solution", "text": "Investigate lapse experience and likely effects of changing underwriting [\u00bd]"}, {"section": "Solution", "text": "Investigate distributors' opinions [\u00bd]"}]}, {"id": "202404_Q1(i)", "sitting": "April 2024", "yymmkey": "202404", "ref": "Q1(i)", "marks": 5, "all_themes": ["Claims Management", "Income Protection", "Legislation & Taxation", "Pricing", "Reserving & Valuation", "Underwriting"], "products": ["Income Protection"], "question_text": "Assess the suitability of this underwriting approach for income protection business.", "scenario": "XYZ Health is a health and care insurance company operating in Country B. Country B has a large mature health and care insurance market. XYZ Health has been selling individual income protection business via financial advisors for many years.\nXYZ Health\u2019s current approach for underwriting new income protection business is to collect detailed information about the applicant\u2019s health, family history, occupation and lifestyle via a telephone interview with the applicant. This information is then ass", "bullets": [{"section": "Solution", "text": "When underwriting IP insurance risk, the insurer will want to be able to assess the likelihood that a person will take prolonged time off work in future due to sickness. [1]"}, {"section": "Solution", "text": "And in particular identify applicants who could have a substantially higher risk of being off work than assumed in the insurer's standard premium rates [\u00bd]"}, {"section": "Solution", "text": "IP is a complex product and is potentially more complex than other types of heath and care product to underwrite as there could be many different reasons which could keep people off work, such as back pain and stress-related incapacity which are not relevant for other types of health and care product. [1]"}, {"section": "Solution", "text": "XYZ therefore needs sufficient information from applicants for IP to determine a complete picture of the applicant\u2019s health and lifestyle [1]"}, {"section": "Solution", "text": "and to establish the likelihood of a claim being made to ascertain whether they are able to offer IP cover and what the premium should be [1]"}, {"section": "Solution", "text": "The current underwriting approach gives the insurer a wide range of information that is directly relevant to assessing the policyholder\u2019s likelihood of being unable to work [\u00bd]"}, {"section": "Solution", "text": "and this will allow XYZ to get a full picture of the risk of the applicant, and will allow the insurer to decide whether to accept or decline an individual [\u00bd]"}, {"section": "Solution", "text": "and sufficient information to classify the applicants into broadly homogeneous risk groups [\u00bd]"}, {"section": "Solution", "text": "so that an appropriate price can be charged to the policyholder that reflects the risks taken by XYZ. [\u00bd]"}, {"section": "Solution", "text": "and detailed upfront underwriting process reduces the scope for anti-selection. [\u00bd]"}, {"section": "Solution", "text": "The current underwriting approach will also allow the insurer to take a nuanced approach to assessing applications [\u00bd]"}, {"section": "Solution", "text": "and will allow the insurer to decline the fewest possible number of people. [\u00bd]"}, {"section": "Solution", "text": "Accurate underwriting assessment of policyholder potentially allows for more accurate reserving for policies. [\u00bd]"}, {"section": "Solution", "text": "Accurate upfront underwriting assessment will also make claim management processes simpler and easier. [\u00bd]"}, {"section": "Solution", "text": "However, this is potentially a time-consuming process, requiring a lot of human intervention [\u00bd]"}, {"section": "Solution", "text": "which is potentially expensive for the insurer [\u00bd]"}, {"section": "Solution", "text": "and possibly prone to error. [\u00bd]"}, {"section": "Solution", "text": "Overall, the current underwriting approach is suitable for IP business [\u00bd]"}]}, {"id": "202404_Q1(ii)", "sitting": "April 2024", "yymmkey": "202404", "ref": "Q1(ii)", "marks": 5, "all_themes": ["Claims Management", "Income Protection", "Legislation & Taxation", "Pricing", "Underwriting"], "products": ["Income Protection"], "question_text": "Discuss the advantages and disadvantages of this underwriting approach from the perspective of XYZ Health\u2019s customers.", "scenario": "XYZ Health is a health and care insurance company operating in Country B. Country B has a large mature health and care insurance market. XYZ Health has been selling individual income protection business via financial advisors for many years.\nXYZ Health\u2019s current approach for underwriting new income protection business is to collect detailed information about the applicant\u2019s health, family history, occupation and lifestyle via a telephone interview with the applicant. This information is then ass", "bullets": [{"section": "Solution", "text": "Advantages An initial telephone interview approach may be easier to complete for policyholders than requiring the individual to fill out a long complex form. [\u00bd]"}, {"section": "Solution", "text": "This approach allows the insurer to accurately assess the risk of the applicant; therefore the policyholder should pay a fair premium given their personal circumstances [1]"}, {"section": "Solution", "text": "and allows the insurer to offer cover that reflects the actual health of the applicant so the applicant should know from the outset what they can and cannot claim for [\u00bd]"}, {"section": "Solution", "text": "potentially giving the policyholder greater confidence that if they make a claim XYZ will pay the claim. [\u00bd]"}, {"section": "Solution", "text": "The insurer should be able to accept lives in good health very quickly [\u00bd]"}, {"section": "Solution", "text": "making the process relatively straightforward and quick for customers in good health. [\u00bd]"}, {"section": "Solution", "text": "As underwriting is done up front there should be fewer disputes for the policyholder if they subsequently claim on the policy which should make the claim process quicker for the policyholder if they subsequently make a claim [\u00bd]"}, {"section": "Solution", "text": "The insurers risk assessment process should be transparent to the policyholder. [\u00bd]"}, {"section": "Solution", "text": "and therefore the underwriting process should be seen as treating the customer fairly. [\u00bd]"}, {"section": "Solution", "text": "Disadvantages The underwriting process could take many weeks for more complex cases and could potentially be a very long process for the applicant. [1]"}, {"section": "Solution", "text": "At the end of the underwriting process the applicant could still be rejected for cover [\u00bd]"}, {"section": "Solution", "text": "or they may have to pay much more for cover than standard lives. [\u00bd]"}, {"section": "Solution", "text": "The applicant may need to disclose more personal information during the underwriting process than they would prefer to. [\u00bd]"}, {"section": "Solution", "text": "The applicant may need to have further investigations which they may prefer not to have. [\u00bd]"}, {"section": "Solution", "text": "The applicant may have difficulty providing the information requested by the insurer over the phone [\u00bd]"}, {"section": "Solution", "text": "or they may have difficulty understanding what is being asked by the insurer. [\u00bd]"}, {"section": "Solution", "text": "There is a risk that the underwriting decision by the insurer could be made on incomplete or incorrect information. [\u00bd]"}]}, {"id": "202404_Q1(iii)", "sitting": "April 2024", "yymmkey": "202404", "ref": "Q1(iii)", "marks": 10, "all_themes": ["Claims Management", "Data", "Income Protection", "Legislation & Taxation", "Pricing", "Regulation", "Underwriting"], "products": ["Income Protection"], "question_text": "XYZ Health has been approached by a specialist underwriting company (AutoUW).\nAutoUW has developed an automated underwriting system that uses machine learning and artificial intelligence algorithms to underwrite individual risks. AutoUW will use a range of different data sources in the underwriting process. AutoUW has said that all underwriting decisions are taken in seconds and its automated underwriting system does not require any human intervention once it is operational. AutoUW has stated that their system has been successfully implemented by health and care insurance companies in other countries.\nAutoUW has stated that by introducing its automated underwriting system for income protection business, XYZ Health would significantly improve the speed and consistency of XYZ Health\u2019s underwriting. The reduction in human processing would also reduce XYZ Health\u2019s underwriting costs.\nXYZ Health\u2019s board has asked for further information about AutoUW\u2019s automated underwriting system.\nOutline the additional information that should be obtained about AutoUW\u2019s automated underwriting system.", "scenario": "XYZ Health is a health and care insurance company operating in Country B. Country B has a large mature health and care insurance market. XYZ Health has been selling individual income protection business via financial advisors for many years.\nXYZ Health\u2019s current approach for underwriting new income protection business is to collect detailed information about the applicant\u2019s health, family history, occupation and lifestyle via a telephone interview with the applicant. This information is then ass", "bullets": [{"section": "Solution", "text": "AutoUW Underwriting - Use in other countries In what countries does AutoUW operate its automated underwriting system? [\u00bd]"}, {"section": "Solution", "text": "What health and care insurance companies have implemented AutoUW\u2019s system? [\u00bd]"}, {"section": "Solution", "text": "What types of health and care insurance product has the underwriting system been used for? [\u00bd]"}, {"section": "Solution", "text": "In particular has AutoUW\u2019s underwriting system been used to underwrite income protection business? [\u00bd]"}, {"section": "Solution", "text": "Can XYZ speak to other companies that have implemented AutoUw\u2019s system to understand how they have implemented the system and any issues arising? [\u00bd]"}, {"section": "Solution", "text": "What is the regulatory / legislative environment like in the countries that AutoUW has implemented its underwriting system in? [\u00bd]"}, {"section": "Solution", "text": "AutoUW Underwriting - Implementation What is the process for implementing the automated system? [\u00bd]"}, {"section": "Solution", "text": "What are the costs for implementation likely to be? [\u00bd]"}, {"section": "Solution", "text": "What other additional implementation costs are there likely to be? [\u00bd]"}, {"section": "Solution", "text": "E.g. staff training costs [\u00bd]"}, {"section": "Solution", "text": "How does AutoUW charge? [\u00bd]"}, {"section": "Solution", "text": "For example: is there a charge per case? [\u00bd]"}, {"section": "Solution", "text": "is the charge premium based? [\u00bd]"}, {"section": "Solution", "text": "a flat monetary charge? [\u00bd]"}, {"section": "Solution", "text": "is there a license fee? [\u00bd]"}, {"section": "Solution", "text": "Underwriting system - Data What data sources are going to be used by the underwriting system? [\u00bd]"}, {"section": "Solution", "text": "What risk factors will the underwriting system use? [\u00bd]"}, {"section": "Solution", "text": "How does AutoUW check that no risk factors used are prohibited in Country B? [\u00bd]"}, {"section": "Solution", "text": "What checks are done on the data to ensure the data is correct, error free etc? [\u00bd]"}, {"section": "Solution", "text": "Where is the data kept in terms of jurisdiction? [\u00bd]"}, {"section": "Solution", "text": "What limitations are there on the transfer of data between jurisdictions? [\u00bd]"}, {"section": "Solution", "text": "What data security controls does AutoUW have in place? [\u00bd]"}, {"section": "Solution", "text": "How does AutoUW protect against cyber risk? [\u00bd]"}, {"section": "Solution", "text": "How does AutoUW ensure that it complies with local data laws? [\u00bd]"}, {"section": "Solution", "text": "Underwriting system - Operational How is the underwriting done - by AutoUW or by the insurer? [\u00bd]"}, {"section": "Solution", "text": "Can AutoUW provide an explanation of how the algorithms will work in practice? [\u00bd]"}, {"section": "Solution", "text": "Is it possible to see examples of how the system will work for a set of sample clients? [\u00bd]"}, {"section": "Solution", "text": "How does AutoUW ensure consistency between underwriting individual cases? [\u00bd]"}, {"section": "Solution", "text": "How will the risk classification work? [\u00bd]"}, {"section": "Solution", "text": "Will applicants either be accepted or declined? [\u00bd]"}, {"section": "Solution", "text": "Will the system apply ratings to lives where appropriate? [\u00bd]"}, {"section": "Solution", "text": "If so, how will the rating system work? [\u00bd]"}, {"section": "Solution", "text": "How does AutoUW ensure there is no bias or discrimination in its operation? [\u00bd]"}, {"section": "Solution", "text": "How does AutoUW ensure that it complies with any relevant local laws - e.g. on discrimination. [\u00bd]"}, {"section": "Solution", "text": "Are there any areas of the system that can specifically be tailored for XYZ\u2019s products. [\u00bd]"}, {"section": "Solution", "text": "What support does AutoUW provide to XYZ once the automated underwriting systems are operating? [\u00bd]"}, {"section": "Solution", "text": "As the automated underwriting system is underwriting IP business how will it assess the likelihood that a person will take prolonged time off work in future due to sickness. [\u00bd]"}, {"section": "Solution", "text": "How will the automated system take into account factors relevant to income protection claims which are not relevant for other types of health and care product but are relevant for IP business? [1]"}, {"section": "Solution", "text": "E.g. back pain [\u00bd]"}, {"section": "Solution", "text": "stress-related incapacity [\u00bd]"}, {"section": "Solution", "text": "Do AutoUW change or update the system and, if so, how frequently is this done? [\u00bd]"}, {"section": "Solution", "text": "Does Auto UW provide ongoing training and support in the operation of their system? If so, what support is provided? [\u00bd]"}, {"section": "Solution", "text": "Does the underwriting system provide ongoing information for management to understand how the underwriting system is working? [\u00bd]"}, {"section": "Solution", "text": "Can AutoUW provide sufficient information to enable the insurer to do a cost versus benefit analysis of implementing the new system? [\u00bd]"}, {"section": "Solution", "text": "AutoUW Underwriting - Regulator Has AutoUW had any regulatory issues with respect to the operation of its underwriting system issues in the countries in which it operates? [\u00bd]"}, {"section": "Solution", "text": "If so what were the issues? [\u00bd]"}, {"section": "Solution", "text": "And how were these issues resolved? [\u00bd]"}]}, {"id": "202404_Q1(iv)", "sitting": "April 2024", "yymmkey": "202404", "ref": "Q1(iv)", "marks": 15, "all_themes": ["Claims Management", "Data", "Income Protection", "Legislation & Taxation", "Models", "Pricing", "Product Design", "Reserving & Valuation", "Risk Management & Capital", "Underwriting"], "products": ["Income Protection"], "question_text": "The board of XYZ Health also want to understand the possible impact on XYZ Health\u2019s business of implementing AutoUW\u2019s underwriting system for income protection business.\nDiscuss the possible impact on XYZ Health\u2019s business of implementing AutoUW\u2019s underwriting system for income protection business.", "scenario": "XYZ Health is a health and care insurance company operating in Country B. Country B has a large mature health and care insurance market. XYZ Health has been selling individual income protection business via financial advisors for many years.\nXYZ Health\u2019s current approach for underwriting new income protection business is to collect detailed information about the applicant\u2019s health, family history, occupation and lifestyle via a telephone interview with the applicant. This information is then ass", "bullets": [{"section": "Solution", "text": "Data The existing claims data that XYZ Health has built up will potentially not be representative of future claims experience. [1]"}, {"section": "Solution", "text": "Risk Classification It is possible that underwriting automation could allow more accurate risk assessments than the current underwriting approach. [1]"}, {"section": "Solution", "text": "Which could allow better classification of risks in the future. [\u00bd]"}, {"section": "Solution", "text": "However human underwriters may be able to offer additional insights, expertise, and judgment in assessing risks that an AI-based programs may not be able to provide [1]"}, {"section": "Solution", "text": "Human expertise will be lost in the future as there is not going to be any intervention from underwriters in the future. [\u00bd]"}, {"section": "Solution", "text": "Moving to automated underwriting could potentially reduce the risk of human bias in underwriting decision making [\u00bd]"}, {"section": "Solution", "text": "although the new automated system could introduce new bias. [\u00bd]"}, {"section": "Solution", "text": "Business volumes / mix Business volumes/mix could change but this will depend on how the new underwriting system will operate. [\u00bd]"}, {"section": "Solution", "text": "If only applicants in good health are accepted by the new underwriting system and applicants that need to be rated or have exclusions are not then this could lead to a significant change in business mix [1]"}, {"section": "Solution", "text": "and potentially a fall in new business. [\u00bd]"}, {"section": "Solution", "text": "Alternatively, if the new underwriting processes are seen as efficient and quick then financial advisors could be more willing to use XYZ, possibly increasing business volumes. [\u00bd]"}, {"section": "Solution", "text": "Customers may be more willing to take out IP business with XYZ if the underwriting requirements from the new underwriting system are perceived as being less onerous. [\u00bd]"}, {"section": "Solution", "text": "Claims Outgo The change in underwriting approach could lead to a significant change in claims experience in the future. [\u00bd]"}, {"section": "Solution", "text": "Claims experience could improve if more business taken on is in respect of \u2018standard\u2019 lives. [\u00bd]"}, {"section": "Solution", "text": "It may take a number of years to build up credible claims experience for pricing/reserving due to the changes in underwriting approach [1]"}, {"section": "Solution", "text": "Expenses The new automated underwriting system could potentially lead to lower underwriting costs\u2026 [\u00bd]"}, {"section": "Solution", "text": "as the insurer will potentially not need underwriters anymore. [\u00bd]"}, {"section": "Solution", "text": "which could lead to lower per policy expenses. [\u00bd]"}, {"section": "Solution", "text": "However, the level of reduction could depend on the level and form of any AutoUW charge. [\u00bd]"}, {"section": "Solution", "text": "It may be that AutoUW could charge per case and this will need to be factored into the expense assumptions. [\u00bd]"}, {"section": "Solution", "text": "XYZ may be reluctant to make all of the underwriters redundant immediately so the level of expense reduction will depend on how many underwriters XYZ decides to keep. [1]"}, {"section": "Solution", "text": "There will be an upfront development cost of implementing the new underwriting system [\u00bd]"}, {"section": "Solution", "text": "the cost of which may need to be spread over new business for a number of years. [\u00bd]"}, {"section": "Solution", "text": "XYZ will need to consider how any development costs will be allocated to new business [\u00bd]"}, {"section": "Solution", "text": "and the period over which any development costs will be spread. [\u00bd]"}, {"section": "Solution", "text": "Overheads could be spread over a smaller number of policies if more applicants are rejected under the new underwriting system [\u00bd]"}, {"section": "Solution", "text": "which could lead to an increase in per policy expenses. [\u00bd]"}, {"section": "Solution", "text": "Profitability impact As outlined above there could be significant changes (both positive and negative) caused by the new underwriting systems to: Business mix Business volumes Experience Expense allocation (\u00bd mark per example; max 1 mark) [1]"}, {"section": "Solution", "text": "The changes could have a significant impact on product profitability for XYZ\u2019s new income protection business. [1]"}, {"section": "Solution", "text": "XYZ should model this to understand the impact. [\u00bd]"}, {"section": "Solution", "text": "Reserves / Capital The increased uncertainty on XYZ\u2019s business may mean that it should increase the margins for prudence in its reserves and capital calculation [\u00bd]"}, {"section": "Solution", "text": "Which could lead to an increase in both reserves and capital. [\u00bd]"}, {"section": "Solution", "text": "Reinsurer XYZ Health should discuss the implications of the new underwriting system with its reinsurer to understand the reinsurer's view about the proposed change in underwriting process. [\u00bd]"}, {"section": "Solution", "text": "and whether it had any concerns [\u00bd]"}, {"section": "Solution", "text": "or advice about how to implement an automated underwriting system [\u00bd]"}, {"section": "Solution", "text": "Competition A new, faster underwriting system could offer a competitive advantage in the market [\u00bd]"}, {"section": "Solution", "text": "Potentially financial advisors will prefer the new faster underwriting system, which could see XYZ receive more new business. [\u00bd]"}, {"section": "Solution", "text": "If so, can the new underwriting system cope with the increased volumes of business? [\u00bd]"}, {"section": "Solution", "text": "However, if many more cases are declined than was previously the case, this could make life difficult for financial advisors and applicants, which could make them less likely to use XYZ. [\u00bd]"}, {"section": "Solution", "text": "It is possible that XYZ could be forced to implement an automated underwriting system if its current underwriting system is seen as out of date relative to its competitors [\u00bd]"}, {"section": "Solution", "text": "Reputation Faster, more consistent underwriting times could improve XYZ Health\u2019s reputation with customers and financial advisors. [\u00bd]"}, {"section": "Solution", "text": "Although problems with the new system such as inconsistent or obviously incorrect underwriting decisions could lead to reputational damage. [\u00bd]"}, {"section": "Solution", "text": "Similarly underwriting systems that were deemed unlawful (e.g. due to bias or discrimination) could lead to significant reputational damage. [\u00bd]"}, {"section": "Solution", "text": "Some potential customers may not be happy if they cannot get income protection cover now under the new under system, where previously they would have been able to get cover but been rated or had exclusions. [\u00bd]"}, {"section": "Solution", "text": "Dependence The company will be completely dependent on the new underwriting system. [\u00bd]"}, {"section": "Solution", "text": "Need to consider the possible effects if AutoUW cease to trade or its underwriting system did not work as expected. [\u00bd]"}, {"section": "Solution", "text": "If things go wrong and the insurer has got rid of its trained underwriting staff it may not have sufficiently trained staff available to take the underwriting back in house. [1]"}, {"section": "Solution", "text": "Staff XYZ will need to train staff in the use of the new underwriting system. [\u00bd]"}, {"section": "Solution", "text": "XYZ will need to consider the effects on staff, particularly underwriters. Can they be redeployed within the company or will they be made redundant [\u00bd]"}, {"section": "Solution", "text": "Implementation of new system could lead to an increase in staff dissatisfaction. [\u00bd]"}, {"section": "Solution", "text": "Impact on the customer Some customers may not be happy with no human interaction [\u00bd]"}, {"section": "Solution", "text": "Other Will need to review marketing literature, terms and conditions etc and revise as [\u00bd]"}, {"section": "Solution", "text": "required. If successful, there may be a demand to extend this type of underwriting to other product lines. [\u00bd]"}]}, {"id": "202404_Q1(v)", "sitting": "April 2024", "yymmkey": "202404", "ref": "Q1(v)", "marks": 5, "all_themes": ["Data", "Income Protection", "Legislation & Taxation", "Models", "Pricing", "Regulation", "Underwriting"], "products": ["Income Protection"], "question_text": "\u20133 XYZ Health has had an initial discussion with its financial regulator about introducing an automated underwriting system. The financial regulator has expressed some initial concerns about the potential impact of the automated underwriting system on the consumer.\nSuggest possible concerns the financial regulator may have with AutoUW\u2019s underwriting system.", "scenario": "XYZ Health is a health and care insurance company operating in Country B. Country B has a large mature health and care insurance market. XYZ Health has been selling individual income protection business via financial advisors for many years.\nXYZ Health\u2019s current approach for underwriting new income protection business is to collect detailed information about the applicant\u2019s health, family history, occupation and lifestyle via a telephone interview with the applicant. This information is then ass", "bullets": [{"section": "Solution", "text": "The potential for unfair discrimination if a prohibited characteristic, such as gender, is used in the underwriting process. [1]"}, {"section": "Solution", "text": "Even if a protected characteristic is not specifically used, there is a risk that an automated underwriting system may use data sources which could be a proxy for prohibited characteristics [1]"}, {"section": "Solution", "text": "The results of the automated underwriting system could be biased. [\u00bd]"}, {"section": "Solution", "text": "The potential for the insurer to unethically use the data it has accumulated [\u00bd]"}, {"section": "Solution", "text": "For example, data could originally have been accumulated about an individual for a different purpose, not related to underwriting; [\u00bd]"}, {"section": "Solution", "text": "the individual may not have given their permission for the data to be used in this way. [\u00bd]"}, {"section": "Solution", "text": "Where an insurer uses non-standard data sources then an applicant may not have consented for their data to be used in this way. [\u00bd]"}, {"section": "Solution", "text": "Increased risk of unfair discrimination against protected classes because some of the factors used may be inaccurate or reflect historical and systemic biases [\u00bd]"}, {"section": "Solution", "text": "The lack of human intervention in the underwriting process could lead to unfair or inaccurate decisions not being identified sufficiently quickly [\u00bd]"}, {"section": "Solution", "text": "which may be a particular issue for people with more complex or unusual applications. [\u00bd]"}, {"section": "Solution", "text": "The lack of transparency in the underwriting system may make it difficult for insurers to identify and correct errors or biases in the system. [\u00bd]"}, {"section": "Solution", "text": "A lack of transparency in the underwriting system may also make it more difficult to understand and explain the model\u2019s actual workings and output. [\u00bd]"}, {"section": "Solution", "text": "Automated underwriting may not accurately consider the nuanced factors impacting an individual\u2019s risk profile for income protection. [\u00bd]"}, {"section": "Solution", "text": "Data quality could be poor with data errors, incomplete data sets, or biased data which could lead to incorrect conclusions and unfair outcomes from underwriting automation. [\u00bd]"}, {"section": "Solution", "text": "The insurer may not accurately understand how the automated underwriting system is working in practice. [\u00bd]"}, {"section": "Solution", "text": "Poor quality underwriting could ultimately lead to adverse impacts on the insurers profitability and possibly even its solvency. [\u00bd]"}, {"section": "Solution", "text": "Over-reliance on third party technology could increase overall risk for insurer (e.g. failure of AutoUW). [\u00bd]"}, {"section": "Solution", "text": "The regulator could be worried if there are no back up underwriting processes in place. [\u00bd]"}]}, {"id": "202404_Q2(i)", "sitting": "April 2024", "yymmkey": "202404", "ref": "Q2(i)", "marks": 20, "all_themes": ["Claims Management", "Group Products", "Legislation & Taxation", "Pricing", "Private Medical Insurance (PMI)", "Regulation", "Reserving & Valuation", "State Healthcare & Demographics", "Underwriting"], "products": ["Private Medical Insurance (PMI)", "Group Products"], "question_text": "Comment on the proposal from the perspective of:\n(a) the government.\n(b) the medical insurance industry.\n(c) a medical practitioner.\n(d) citizens of country A.", "scenario": "Country A is a developing country with independent public and private health care systems.\nThe public health care system in Country A is funded through general taxation and services are provided to citizens of Country A for free. Health care services are provided via local clinics and large regional hospitals, which are both staffed by nurses and doctors. The quality of care provided by the public health care system is low and waiting times for care are long.\nIn addition, there are a range of pr", "bullets": [{"section": "Solution", "text": "(a) Government Could be part of political promises to extend quality healthcare to all [\u00bd]"}, {"section": "Solution", "text": "which could lead to increased support from voters at the next election. [\u00bd]"}, {"section": "Solution", "text": "The system may be viewed as fair as all citizens will have access to the same care. [\u00bd]"}, {"section": "Solution", "text": "And it could help equalise any gaps in the market in terms of the quality of health care received by the rich and the poor. [\u00bd]"}, {"section": "Solution", "text": "This can in turn have positive economic outcomes in terms of improving productivity, [\u00bd]"}, {"section": "Solution", "text": "reducing preventable illnesses and deaths, [\u00bd]"}, {"section": "Solution", "text": "and boosting public morale. [\u00bd]"}, {"section": "Solution", "text": "The government may believe that the proposal will unlock additional funding for healthcare [\u00bd]"}, {"section": "Solution", "text": "If current spending on private healthcare can be redirected to the social insurance fund. [\u00bd]"}, {"section": "Solution", "text": "However, this could create strain on the general tax revenue, which may not be sustainable in the long run, and could escalate faster than expected. [\u00bd]"}, {"section": "Solution", "text": "The government may believe that they will be able to create efficiencies [\u00bd]"}, {"section": "Solution", "text": "and/or negotiate better rates with providers [\u00bd]"}, {"section": "Solution", "text": "which could lead to lower cost for healthcare. [\u00bd]"}, {"section": "Solution", "text": "The government will need to consider how the new scheme should be funded. [\u00bd]"}, {"section": "Solution", "text": "The government will need to take policy decisions and introduce any necessary legislation, regulations etc to set up the new scheme. [\u00bd]"}, {"section": "Solution", "text": "The government will need to set up a body to carry out the administration of
