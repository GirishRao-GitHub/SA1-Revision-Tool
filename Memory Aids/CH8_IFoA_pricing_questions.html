 Design", "Regulation", "Reinsurance", "Reserving & Valuation", "Risk Management & Capital", "Underwriting"], "products": ["Long-Term Care (LTC)"], "question_text": "To improve the marketability of the LTCI product the Marketing Director has asked for the product to offer a surrender value at any time that is not guaranteed, for both pre-claim and when a claim is being paid. The insurer will calculate individual policy reserves and is considering setting the surrender value of a policy by adjusting its policy reserve value.\nExplain the risks to the insurer that the addition of this benefit would introduce.", "scenario": "A health and care insurance company operates in a country in which the Solvency II regulatory regime applies. The company is considering entering the long-term care market by launching a non-linked, pre-funded, long-term care insurance (LTCI)\nproduct. No other insurer in the market currently offers pre-funded long-term care insurance.", "bullets": [{"section": "Solution", "text": "New business volumes - may increase sales leading to admin/capital strain. [\u00bd]"}, {"section": "Solution", "text": "May change new business mix \u2013 may be more attractive to healthier lives. [\u00bd]"}, {"section": "Solution", "text": "In the pre-funding phase individuals who are likely to die soon may request a surrender value. As the product does not offer a payment on death the assumed mortality gain during prefunding may be released. [1]"}, {"section": "Solution", "text": "There may be self selection from healthier lives leaving the insurer with a worse pool of risks. [\u00bd]"}, {"section": "Solution", "text": "In claim phase, people who are likely to have very short life expectancy will likely ask for a surrender value. Risk is that the insurer\u2019s mortality assumptions are undermined and that the remaining portfolio has greater life expectancy than before. [1]"}, {"section": "Solution", "text": "If the surrender value basis is not on a neutral basis or profitable for the insurer the surrender value may be greater than the policy asset share, particularly for early surrenders. [\u00bd]"}, {"section": "Solution", "text": "Lapse risk would require changing \u2026 [\u00bd]"}, {"section": "Solution", "text": "\u2026 and the product may no longer be profitable. [\u00bd]"}, {"section": "Solution", "text": "Liquidity risk if many policyholders ask to surrender at the same time. [\u00bd]"}, {"section": "Solution", "text": "Operational risk if the number of surrenders is too high over a short period of time. [\u00bd]"}, {"section": "Solution", "text": "TCF risk if the surrender value appears poor value to policyholder. [\u00bd]"}, {"section": "Solution", "text": "Political risk \u2013 state provisions may become more generous, creating an increase in surrender values sought. [\u00bd]"}, {"section": "Solution", "text": "All the above risks result in increased capital requirements and in extreme insolvency. [\u00bd]"}, {"section": "Solution", "text": "May affect availability and cost of reinsurance. [\u00bd]"}]}, {"id": "201909_Q1(vi)", "sitting": "September 2019", "yymmkey": "201909", "ref": "Q1(vi)", "marks": 5, "all_themes": ["Capital & Solvency", "Long-Term Care (LTC)", "Pricing", "Product Design", "Reserving & Valuation", "Underwriting"], "products": ["Long-Term Care (LTC)"], "question_text": "Describe adaptations to the policy reserve basis that would be suitable to create the surrender value basis.", "scenario": "A health and care insurance company operates in a country in which the Solvency II regulatory regime applies. The company is considering entering the long-term care market by launching a non-linked, pre-funded, long-term care insurance (LTCI)\nproduct. No other insurer in the market currently offers pre-funded long-term care insurance.", "bullets": [{"section": "Solution", "text": "The transfer basis should differ depending on whether the policy is in claim stage or in the pre-claim stage. [\u00bd]"}, {"section": "Solution", "text": "Under both stages an adjustment may be made for the cost of the surrender. [\u00bd]"}, {"section": "Solution", "text": "In claim stage (i.e. LTC payments are being paid) The income is contingent on survival and continuance of the incapacity. [1]"}, {"section": "Solution", "text": "The reason for surrender is important because the reason for surrender is potentially anti selective so the basis should allow for this. [\u00bd]"}, {"section": "Solution", "text": "Insurance company established a reserve as present value of future benefit payments. Need to adjust the reserve to remove prudence margins. [\u00bd]"}, {"section": "Solution", "text": "Being disabled, a specific mortality assumption is needed for each surrender value calculation. [\u00bd]"}, {"section": "Solution", "text": "\u2026.. and the individual\u2019s medically assessed estimate of the policies future claim payments will be required. [1]"}, {"section": "Solution", "text": "Reduce surrender value for costs of medical assessment and other admin costs. [\u00bd]"}, {"section": "Solution", "text": "The interest rate in the reserve may need adjusting as there could be changes in market yields since the valuation. [\u00bd]"}, {"section": "Solution", "text": "The company may use a higher yield to value the future liability so reduce the need to monitor and adjust for interest rate changes in the market. [\u00bd]"}, {"section": "Solution", "text": "Pre-claim stage Future income is contingent on survival and continuance of the incapacity. [\u00bd]"}, {"section": "Solution", "text": "In this scenario policyholder health is likely to be more in line with the reserve with any mortality and incapacity prudence margins removed. [\u00bd]"}, {"section": "Solution", "text": "The surrender value in the pre-claim stage needs to value the probability that the policy in the future meets the claim trigger. [\u00bd]"}, {"section": "Solution", "text": "As the policyholder is selecting to surrender then need to allow for anti-selection by assuming the probability is significantly lower than assumed in the reserving. [\u00bd]"}, {"section": "Solution", "text": "The reserve also needs to be adjusted for the revised probability of future claim. [\u00bd]"}, {"section": "Solution", "text": "The interest rate in the reserve may need adjusting as there could be changes in market yields since the valuation. [\u00bd]"}, {"section": "Solution", "text": "The company may use a higher yield to value the future liability so reduce the need to monitor and adjust for interest rate changes in the market. [\u00bd]"}, {"section": "Solution", "text": "Adjustments may be made to the surrender value to recover initial expenses that are not covered by product margins. [\u00bd]"}, {"section": "Solution", "text": "This adjustment could be a decreasing function based on the duration elapsed. [\u00bd]"}]}, {"id": "201909_Q1(vii)", "sitting": "September 2019", "yymmkey": "201909", "ref": "Q1(vii)", "marks": 4, "all_themes": ["Capital & Solvency", "Claims Management", "Investments", "Long-Term Care (LTC)", "Regulation", "Reinsurance", "Reserving & Valuation", "Risk Management & Capital"], "products": ["Long-Term Care (LTC)"], "question_text": "After several years, a large block of this LTCI business has been written. The Investment Director has suggested that a substantial proportion of the backing assets should be invested in equities to maximise the return. Currently the backing assets are all fixed interest assets, government bonds and highly rated corporate bonds that reasonably match the liabilities.\nDescribe the factors that may influence the insurer\u2019s decision to adopt a less matched position.", "scenario": "A health and care insurance company operates in a country in which the Solvency II regulatory regime applies. The company is considering entering the long-term care market by launching a non-linked, pre-funded, long-term care insurance (LTCI)\nproduct. No other insurer in the market currently offers pre-funded long-term care insurance.", "bullets": [{"section": "Solution", "text": "The level of free assets enables the insure to withstand adverse experience in market movements [1]"}, {"section": "Solution", "text": "Or meet the additional capital requirements that might be needed if a less matched approach were taken. [\u00bd]"}, {"section": "Solution", "text": "The size of the insurer in terms of policies in-force or reserves. More reliable claims experience so less unexpected volatility in experience, so can hold lower margins for prudence. [\u00bd]"}, {"section": "Solution", "text": "The extent to which there are margins for prudence held in the liabilities. [\u00bd]"}, {"section": "Solution", "text": "The potential impact of the volatility of equities on solvency. [\u00bd]"}, {"section": "Solution", "text": "Equities may provide a partial hedge against inflation (medical/salary). [\u00bd]"}, {"section": "Solution", "text": "Insurer\u2019s risk appetite, if more risk adverse follow more close matching. [\u00bd]"}, {"section": "Solution", "text": "The greater number of products the more diversification of risks which may enable the insurer to follow a less matched position. [\u00bd]"}, {"section": "Solution", "text": "The level of reinsurance; the greater the use of reinsurance the less volatile the claims experience. [\u00bd]"}, {"section": "Solution", "text": "The use of hedging or derivatives may protect the insurer from adverse market movements. [\u00bd]"}, {"section": "Solution", "text": "The insurer\u2019s investment objectives as set out in any product disclosures. [\u00bd]"}, {"section": "Solution", "text": "The insurer\u2019s new business plans; may require free assets to support its new business. [\u00bd]"}, {"section": "Solution", "text": "The insurer\u2019s future strategy \u2013 acquisitions, merger as it will require free assets to achieve the strategy. [\u00bd]"}, {"section": "Solution", "text": "Liquidity constraints on the insurer from its in-force business. [\u00bd]"}, {"section": "Solution", "text": "Regulatory constraints restricting mismatched positions . [\u00bd]"}, {"section": "Solution", "text": "Views of credit rating agencies as the credit agencies may downgrade the insurer. [\u00bd]"}, {"section": "Solution", "text": "Views of market commentators and analysts, changes may adversely affect stock price. [\u00bd]"}, {"section": "Solution", "text": "The availability of suitable equities. [\u00bd]"}, {"section": "Solution", "text": "Cost of buying and selling assets. [\u00bd]"}, {"section": "Solution", "text": "Use ALM to assess if the return is sufficient for the additional risk. [\u00bd]"}, {"section": "Solution", "text": "Views of creditors of the company who may become concerned by significant mismatches. [\u00bd]"}, {"section": "Solution", "text": "There may be shareholder pressure to increase returns. [\u00bd]"}]}, {"id": "201909_Q2(ii)", "sitting": "September 2019", "yymmkey": "201909", "ref": "Q2(ii)", "marks": 8, "all_themes": ["Capital & Solvency", "Data", "Legislation & Taxation", "Models", "Pricing", "Professional Guidance", "Regulation", "Reinsurance", "Reserving & Valuation", "Risk Management & Capital", "Underwriting"], "products": ["General/Mixed"], "question_text": "Describe the typical responsibilities of the statutory roles of actuaries in a country or countries where these already exist.", "scenario": "The financial regulator in Country A wants to improve the standards of the health and care insurance industry in Country A and to protect policyholders. The regulator is considering introducing some statutory roles for actuaries to help with these aims.", "bullets": [{"section": "Solution", "text": "To ensure premium rates are calculated correctly [\u00bd]"}, {"section": "Solution", "text": "And are adequate for the liabilities taken on by the insurer. [\u00bd]"}, {"section": "Solution", "text": "Ensure that actuarial work is appropriately reviewed by an external suitably experienced actuary. [\u00bd]"}, {"section": "Solution", "text": "To co-ordinate the calculation of the technical provisions. [\u00bd]"}, {"section": "Solution", "text": "To ensure the appropriateness of the methodologies and underlying models used. [\u00bd]"}, {"section": "Solution", "text": "To ensure the appropriateness of the assumptions made in the calculation of technical provisions. [\u00bd]"}, {"section": "Solution", "text": "To assess the sufficiency and adequacy of the data used to calculate the technical provisions. [\u00bd]"}, {"section": "Solution", "text": "To ensure the adequacy of technical provisions. [\u00bd]"}, {"section": "Solution", "text": "To express an opinion on the adequacy of reinsurance arrangements. [\u00bd]"}, {"section": "Solution", "text": "To compare the best estimate assumptions and actual results against experience; [\u00bd]"}, {"section": "Solution", "text": "To inform the insurer\u2019s governing body of the reliability and adequacy of the calculation of technical provisions. [\u00bd]"}, {"section": "Solution", "text": "To express an opinion on the overall underwriting policy. [\u00bd]"}, {"section": "Solution", "text": "To express an opinion on the adequacy of reinsurance arrangements. [\u00bd]"}, {"section": "Solution", "text": "To contribute to the effective implementation of the risk management system; [\u00bd]"}, {"section": "Solution", "text": "With particular regard to risk modelling by the firm. [\u00bd]"}, {"section": "Solution", "text": "Adhere to other professional guidance To understand, and adhere to if necessary, all professional guidance in relation to their role [\u00bd]"}, {"section": "Solution", "text": "E.g. in the UK, there are Actuarial Professional Standards (APS\u2019s): [\u00bd]"}, {"section": "Solution", "text": "Those who are appointed, or who provide support, to Chief Actuaries, Actuarial Function Holders, With-Profits Actuaries, Appropriate Actuaries, and Reviewing Actuaries, appointed by or in respect of UK authorised insurance companies and friendly societies writing long-term insurance business should adhere to APS L1: Duties and Responsibilities of Life Assurance Actuaries. [\u00bd]"}, {"section": "Solution", "text": "Actuarial Function Holders and With-Profits Actuaries appointed by or in respect of UK unauthorised insurance companies and Appropriate Actuaries of Friendly Societies should adhere to APS L2: The Financial Services and Markets Act 2000 (Communications by Actuaries) Regulations 2003. [\u00bd]"}, {"section": "Solution", "text": "E.g. In the UK, there are also Technical Actuarial Standards (TAS\u2019s), issued by the Financial Reporting Council, which should be followed. [\u00bd]"}, {"section": "Solution", "text": "Be the focal point for actuarial matters when engaging with the regulator. [\u00bd]"}, {"section": "Solution", "text": "There may be guidance issued by other professional bodies (actuarial and other financial services organisations) that apply to specific jurisdictions. [\u00bd]"}, {"section": "Solution", "text": "In some jurisdictions, the regulator may require that a new product is preapproved in advance, prior to being sold to consumers, and there could be a requirement for an actuary to have reviewed the application. [\u00bd]"}, {"section": "Solution", "text": "Even if strict pre-approval is not required, the regulator may still expect that an insurer has discussed any new product features, particularly if they introduce new elements of risk for policyholders. [\u00bd]"}, {"section": "Solution", "text": "The holders of statutory roles are usually not allowed to fulfil other roles within a firm that would cause a conflict of interest, or if they do then the firm is required to declare these roles to the regulator. [\u00bd]"}, {"section": "Solution", "text": "Therefore the individual actuary should ensure that he/she does not accept another role that would cause a conflict of interest with the duties of his/her statutory role. [\u00bd]"}, {"section": "Solution", "text": "For example, in the European Union under Solvency II there is a statutory requirement to have a Chief Actuary. [\u00bd]"}, {"section": "Solution", "text": "In other jurisdictions there is a requirement for an insurer to have an Actuarial Function Holder, Appropriate Actuary or Appointed Actuary. [\u00bd]"}, {"section": "Solution", "text": "E.g. in South Africa under the SAM (Solvency Assessment and Management framework), the Head of Actuarial Function for an insurer has responsibilities similar to those under the EU\u2019s Solvency II framework. [\u00bd]"}]}, {"id": "201909_Q2(iv)", "sitting": "September 2019", "yymmkey": "201909", "ref": "Q2(iv)", "marks": 10, "all_themes": ["Capital & Solvency", "Data", "Group Products", "Legislation & Taxation", "Models", "Pricing", "Professional Guidance", "Regulation", "Reinsurance", "Reserving & Valuation", "Risk Management & Capital", "Underwriting"], "products": ["Group Products"], "question_text": "Suggest principles, processes and controls that an actuary, who holds a statutory role, could implement to ensure they meet those responsibilities.\n[Total 28]", "scenario": "The financial regulator in Country A wants to improve the standards of the health and care insurance industry in Country A and to protect policyholders. The regulator is considering introducing some statutory roles for actuaries to help with these aims.", "bullets": [{"section": "Solution", "text": "Principles Adhere to the Code of Conduct of the actuarial profession within the country [\u00bd]"}, {"section": "Solution", "text": "and maintain evidence that this is being done. [\u00bd]"}, {"section": "Solution", "text": "This is likely to include principals around the themes such as Impartiality; Integrity; Competence and Care; Communications; Compliance. [\u00bd]"}, {"section": "Solution", "text": "Produce and maintain documentation as evidence for any areas of judgement. [1]"}, {"section": "Solution", "text": "Consider the needs of the recipients of their advice and/or services being provided. [\u00bd]"}, {"section": "Solution", "text": "Actions and decisions are based on the advice of persons with an appropriate level of relevant knowledge and skill. [\u00bd]"}, {"section": "Solution", "text": "Consider whether advice from other professionals and other specialists is necessary to assure the relevance and quality of their work. [\u00bd]"}, {"section": "Solution", "text": "Take care that the advice or services they deliver are appropriate to the instructions and needs of the client \u2026. [\u00bd]"}, {"section": "Solution", "text": "\u2026. including the legal and other rules which may govern the matter. [\u00bd]"}, {"section": "Solution", "text": "Have due regard to others, such as the policyholders of an insurer, or any analogous persons whose interests are affected by the work of the actuary. [\u00bd]"}, {"section": "Solution", "text": "Agree with the client (both internal and external) the scope and nature of any appointment or instruction. [\u00bd]"}, {"section": "Solution", "text": "The actuary will keep their competence up to date. [\u00bd]"}, {"section": "Solution", "text": "This includes, but is not necessarily limited to, undertaking an appropriate level of Continual Professional Development activities. [\u00bd]"}, {"section": "Solution", "text": "The actuary will not allow bias, conflict of interest, or the undue influence of others to override their professional judgement. [\u00bd]"}, {"section": "Solution", "text": "The actuary will take reasonable steps to ensure that they are aware of any relevant interest, including income, of their firm. [\u00bd]"}, {"section": "Solution", "text": "The actuary will record in writing any steps they have taken, or propose to take, to reconcile any actual or reasonably foreseeable conflict of interest. [\u00bd]"}, {"section": "Solution", "text": "The actuary will not act where there is a conflict of interest that has not been reconciled. [\u00bd]"}, {"section": "Solution", "text": "The actuary will comply with all relevant legal, regulatory and professional requirements. [\u00bd]"}, {"section": "Solution", "text": "They will take reasonable steps to ensure they are not placed in a position where they are unable to comply. [\u00bd]"}, {"section": "Solution", "text": "They will challenge non-compliance by others. [\u00bd]"}, {"section": "Solution", "text": "The actuary will speak up to their employer if they believe, or have reasonable cause to believe, that a course of action is unlawful, unethical or improper. [\u00bd]"}, {"section": "Solution", "text": "The actuary will fulfil any obligations to report information to relevant regulatory authorities. [\u00bd]"}, {"section": "Solution", "text": "The actuary will report behaviour that they have reasonable cause to believe is unlawful, unethical or improper, to regulators or other relevant authorities. [\u00bd]"}, {"section": "Solution", "text": "The actuary will promptly report any matter which appears to constitute misconduct or a material breach of any relevant legal, regulatory or professional requirements. [\u00bd]"}, {"section": "Solution", "text": "The actuary will ensure that their communication, whether written or oral, is clear (indicating how any further explanation can be obtained) and timely, and that their method of communication is appropriate. [\u00bd]"}, {"section": "Solution", "text": "Communications will have regard to the intended audience; [\u00bd]"}, {"section": "Solution", "text": "The purpose of the communication; [\u00bd]"}, {"section": "Solution", "text": "The significance of the communication to its intended audience; [\u00bd]"}, {"section": "Solution", "text": "The fact that the actuary is performing a statutory role. [\u00bd]"}, {"section": "Solution", "text": "The actuary will, in communicating their professional findings, show clearly that they take responsibility for them. [\u00bd]"}, {"section": "Solution", "text": "The actuary will take such steps as are sufficient and available to them to ensure that any communication with which they are associated is accurate and not misleading; [\u00bd]"}, {"section": "Solution", "text": "And contains sufficient information to enable its subject matter to be put in proper context. [\u00bd]"}, {"section": "Solution", "text": "Processes and Controls Governance: ensure that data, assumptions and methods for calculating technical provisions are reviewed and approved at an appropriate level of seniority. [\u00bd]"}, {"section": "Solution", "text": "Regular attendance at Board meetings with all outcomes documented in minutes from these meetings. [\u00bd]"}, {"section": "Solution", "text": "Maintain and encourage good record keeping around all work [\u00bd]"}, {"section": "Solution", "text": "Set up suitable risk management processes, e.g. [\u00bd]"}, {"section": "Solution", "text": "Appropriate training of staff. [\u00bd]"}, {"section": "Solution", "text": "Data: ensure that data checks are performed on all data extracts that are used in the calculation of technical provisions [\u00bd]"}, {"section": "Solution", "text": "E.g. For regular data extracts (e.g. for monthly reserving calculations), create a series of checks that can be performed automatically on the extract to test criteria such as the number of data items, total premiums received for each product line. [\u00bd]"}, {"section": "Solution", "text": "Assumptions: ensure that assumptions are set based on best available evidence. [\u00bd]"}, {"section": "Solution", "text": "Ensure there is a robust process for reviewing and approving the assumptions to be used in the calculations for pricing, reserving and valuation [\u00bd]"}, {"section": "Solution", "text": "E.g. Ensure there is a team to perform experience investigations and make recommendations for assumption setting; [\u00bd]"}, {"section": "Solution", "text": "coupled with a review by senior colleagues (e.g. Finance Director, Chief Actuary/Actuarial Function Holder). [\u00bd]"}, {"section": "Solution", "text": "Ensure that the assumption setting process is clearly documented. [\u00bd]"}, {"section": "Solution", "text": "Models: ensure that models are developed in a systematic way with a clear programme of development and release of new versions/updates [\u00bd]"}, {"section": "Solution", "text": "and that there is sufficient testing before models go live, including user acceptance testing. [\u00bd]"}, {"section": "Solution", "text": "Ensure that the model development process is clearly documented. [\u00bd]"}, {"section": "Solution", "text": "Reinsurance arrangements: ensure there is a regular (e.g. quarterly, annually, every time a reinsurance premium is due to be paid) review of the reinsurance premiums [\u00bd]"}, {"section": "Solution", "text": "and regular review of the reinsured sum at risk. [\u00bd]"}, {"section": "Solution", "text": "Perform assessments of the underwriting process and principals to ensure that the targeted risk profiles of accepted insured lives for each product matches the profiles assumed in the pricing bases. [\u00bd]"}, {"section": "Solution", "text": "Follow professional guidance (issued either by professional actuarial associations or by other reputable industry bodies) [\u00bd]"}, {"section": "Solution", "text": "E.g. TASs \u2013 Technical Actuarial Standards in the UK \u2013 issued by the Financial Reporting Council. [\u00bd]"}, {"section": "Solution", "text": "Maintain documentation as evidence that they have complied with professional guidance. [\u00bd]"}, {"section": "Solution", "text": "Official documents such as valuation reports could have comments to say which technical standards or guidance has been followed during the preparation of the document. [\u00bd]"}]}, {"id": "201909_Q3(i)", "sitting": "September 2019", "yymmkey": "201909", "ref": "Q3(i)", "marks": 10, "all_themes": ["Claims Management", "Data", "Pricing", "Private Medical Insurance (PMI)", "State Healthcare & Demographics", "Underwriting"], "products": ["Private Medical Insurance (PMI)"], "question_text": "Discuss how Insurer XYZ would use underwriting at the policy application stage.", "scenario": "In Country A, there is a single organisation, ABC, that provides all health care services for individuals with Private Medical Insurance (PMI) cover. These services include consultations with general practitioners (family doctors), hospitals (including emergency treatment as well as planned surgical procedures) and mental health and social care services.\nInsurer XYZ is one of many health insurers in Country A which writes PMI business.", "bullets": [{"section": "Solution", "text": "Aims of underwriting By underwriting, the insurer attempts to classify the applicants into homogeneous risk groups [\u00bd]"}, {"section": "Solution", "text": "And identify substandard risks [\u00bd]"}, {"section": "Solution", "text": "So that an appropriate price can be placed on each of the groups commensurate with the risks undertaken. [\u00bd]"}, {"section": "Solution", "text": "The insurer aims to refuse cover to the fewest possible number of people, generally where the applicant is in such poor health that the risk becomes impossible to quantify. [1]"}, {"section": "Solution", "text": "Insurers use underwriting to assess the propensity to claim. [\u00bd]"}, {"section": "Solution", "text": "To reduce anti-selection. [\u00bd]"}, {"section": "Solution", "text": "To ensure the mix of insured lives is similar to that assumed in the pricing basis. [\u00bd]"}, {"section": "Solution", "text": "To identify pre-existing conditions, if these are allowed to be excluded from cover. [\u00bd]"}, {"section": "Solution", "text": "To identify high-risk applicants. [\u00bd]"}, {"section": "Solution", "text": "This could also be defined for subcategories of the benefits. [\u00bd]"}, {"section": "Solution", "text": "Different levels of medical underwriting are possible e.g full medical underwriting, [\u00bd]"}, {"section": "Solution", "text": "Limited medical underwriting with follow up questions, if needed [\u00bd]"}, {"section": "Solution", "text": "Where the level of underwriting needs to be appropriate for the risks the insurer is taking on. [\u00bd]"}, {"section": "Solution", "text": "Underwriting may include the following: At the proposal stage an applicant normally completes a fact-find to measure his/her healthcare needs against the benefits in the policy [\u00bd]"}, {"section": "Solution", "text": "Financial underwriting might be undertaken to identify his/her continuing ability to pay premiums [\u00bd]"}, {"section": "Solution", "text": "And reduce the chances of fraud [\u00bd]"}, {"section": "Solution", "text": "And ensure that there is no over insurance. [\u00bd]"}, {"section": "Solution", "text": "New technology could be used to enhance underwriting \u2013 some insurers are considering new data sources (although these are relatively unproven in health and care insurance) to improve the underwriting process. [\u00bd]"}, {"section": "Solution", "text": "For example, using data from third parties to help assess health risks. [\u00bd]"}, {"section": "Solution", "text": "A questionnaire for the applicant to complete, which will contain questions on the following topics: [\u00bd]"}, {"section": "Solution", "text": "Demographic profile (e.g. age, gender, marital status) ; [\u00bd]"}, {"section": "Solution", "text": "Health status (e.g. list the visits to hospital in the last 12 months; medication currently taking); [\u00bd]"}, {"section": "Solution", "text": "Personal medical history (illness diagnoses during their lifetime; all hospital visits during their lifetime); [\u00bd]"}, {"section": "Solution", "text": "Family medical history (e.g. parents or siblings with serious health conditions such as cancer or Alzheimer\u2019s Disease); [\u00bd]"}, {"section": "Solution", "text": "Lifestyle and behaviour (e.g. alcohol consumption, smoker status, frequency and level of physical activity; participation in extreme sports such as sky diving). [\u00bd]"}, {"section": "Solution", "text": "There may also be requirements to get additional reports focussing on specific issues from their doctor and/or dentist about their medical history. [\u00bd]"}, {"section": "Solution", "text": "The insurer may require the applicant to attend specific medical tests. [\u00bd]"}, {"section": "Solution", "text": "There may be limitations on what can be asked in certain jurisdictions. E.g. questions about results from genetic tests are prohibited in the UK. [\u00bd]"}, {"section": "Solution", "text": "If the premium consists of defined components for different areas of health services (e.g. outpatient, inpatient, dental services), the underwriting may consider the risk of the applicant in respect of each of these areas separately. [\u00bd]"}, {"section": "Solution", "text": "Alternatively, if the office premium is not built up this way then the underwriting will generate a risk score based on the overall expected claims from the applicant. [\u00bd]"}, {"section": "Solution", "text": "The outcomes of the initial underwriting will be one of the following: Accept the applicant on standard product terms and premium. [\u00bd]"}, {"section": "Solution", "text": "Accept the applicant on standard product terms and but add a loading to the premium to reflect the higher risk of that individual. [\u00bd]"}, {"section": "Solution", "text": "Accept the applicant on standard premium but exclude some particular benefits (e.g. no claims paid on treatments relating to existing chronic conditions). [\u00bd]"}, {"section": "Solution", "text": "Accept the applicant but apply a risk loading to the premium and exclude some particular benefits.. [\u00bd]"}, {"section": "Solution", "text": "Deferral of a decision/instigation of a waiting period. [\u00bd]"}, {"section": "Solution", "text": "Refuse to cover the applicant altogether. [\u00bd]"}]}, {"id": "201909_Q3(ii)", "sitting": "September 2019", "yymmkey": "201909", "ref": "Q3(ii)", "marks": 10, "all_themes": ["Claims Management", "Pricing", "Private Medical Insurance (PMI)", "Product Design", "Regulation", "Reinsurance", "Risk Management & Capital", "State Healthcare & Demographics", "Underwriting"], "products": ["Private Medical Insurance (PMI)"], "question_text": "Insurer XYZ has an agreed list of fixed prices for services offered by the provider organisation. Insurer XYZ wants to reduce the total claims amount that it pays out. The Commercial Director of XYZ has suggested that it could engage with the provider organisation to help it plan its services and identify opportunities for reducing its costs.\nExplain how Insurer XYZ could use the information gathered during the initial underwriting, along with subsequent experience investigations, to improve its risk management.", "scenario": "In Country A, there is a single organisation, ABC, that provides all health care services for individuals with Private Medical Insurance (PMI) cover. These services include consultations with general practitioners (family doctors), hospitals (including emergency treatment as well as planned surgical procedures) and mental health and social care services.\nInsurer XYZ is one of many health insurers in Country A which writes PMI business.", "bullets": [{"section": "Solution", "text": "Part of the strategy to increase/restore the profitability of any line of insurance will consider improving the risk environment in which the cover operates. [\u00bd]"}, {"section": "Solution", "text": "The experience can be split into credible homogenous groups [\u00bd]"}, {"section": "Solution", "text": "and the claims experience analysed (frequency and class) by class to determine the areas leading to the highest levels of claims [\u00bd]"}, {"section": "Solution", "text": "And highlight where action needs to be taken. [\u00bd]"}, {"section": "Solution", "text": "Analysis could also assess how accurate initial underwriting assessment was [\u00bd]"}, {"section": "Solution", "text": "And the lapse assumptions. [\u00bd]"}, {"section": "Solution", "text": "There are a range of possible actions to take Redesign the product. [\u00bd]"}, {"section": "Solution", "text": "Use excesses or coinsurance to reduce claims costs and discourage smaller claims. [\u00bd]"}, {"section": "Solution", "text": "Offer no claims discounts. [\u00bd]"}, {"section": "Solution", "text": "Don\u2019t offer indemnity products but apply monetary limits on claim amounts (or number of treatments) . [\u00bd]"}, {"section": "Solution", "text": "Restrict the hospitals covered (e.g. not covering those in the centre of a capital city). [\u00bd]"}, {"section": "Solution", "text": "Exclude particular conditions from the standard product if there are conditions which generate high claims (either as a result of high frequency of claim or the individual claims are rare but the amounts are very high) . [\u00bd]"}, {"section": "Solution", "text": "Changes to underwriting practices Change the underwriting approach. [\u00bd]"}, {"section": "Solution", "text": "Medical underwriting procedures can be tightened by raising the levels of management status at which policies can be accepted. [\u00bd]"}, {"section": "Solution", "text": "Thus, instead of the front-line junior underwriter approving everything that is deemed to be standard, a higher level of authority must double-check. [\u00bd]"}, {"section": "Solution", "text": "Equally, it could be deemed appropriate to let applications for particular lines of healthcare insurance business be accepted at the point of sale. [\u00bd]"}, {"section": "Solution", "text": "The argument here would be that the volumes accepted by this customer-friendly approach and the administrative costs saved would more than outweigh the extra risk undertaken. [\u00bd]"}, {"section": "Solution", "text": "The vetting of applications at point of sale, however, still needs to be at least as good as by referring all applications to head office. [\u00bd]"}, {"section": "Solution", "text": "The point of sale system would let the \u2018clean\u2019 cases through quickly but would still refer others to medical underwriters so that the overall quality of the underwriting is not compromised. [\u00bd]"}, {"section": "Solution", "text": "Change the underwriting process to accept more applicants from lower risk groups [\u00bd]"}, {"section": "Solution", "text": "Information obtained from the underwriting process combined with the insurer\u2019s experience investigations would help to define the lower risk groups. [\u00bd]"}, {"section": "Solution", "text": "Change the underwriting process to accept fewer applicants from higher risk groups [\u00bd]"}, {"section": "Solution", "text": "Information obtained from the underwriting process combined with the insurer\u2019s experience investigations would help to define the higher risk groups. [\u00bd]"}, {"section": "Solution", "text": "Change the mix of business. [\u00bd]"}, {"section": "Solution", "text": "Change the sales/distribution process to target a lower risk segment of the population. [\u00bd]"}, {"section": "Solution", "text": "The definition of the target population would be based on results from the underwriting. [\u00bd]"}, {"section": "Solution", "text": "Incentivise brokers/intermediaries/advisors to promote and sell the product to lower risk segments of the population. [\u00bd]"}, {"section": "Solution", "text": "A health insurer will set the filter for the business that it wishes to accept by establishing the medical underwriting criteria for cases accepted at ordinary rates, accepted with loaded premiums, accepted with exclusions or declined. [\u00bd]"}, {"section": "Solution", "text": "The recommendations following an analysis of experience might be to alter these criteria in order to expand the portfolio by accepting more business on standard terms. [\u00bd]"}, {"section": "Solution", "text": "The actuary will be aware that this can only be done if there is sufficient margin in the current rates being charged for the risk. [\u00bd]"}, {"section": "Solution", "text": "Alternatively, if the current risk premiums are not adequately covering the claims outgo, the medical underwriting criteria might be tightened so that the body of lives accepted for new business are, on average, healthier. [\u00bd]"}, {"section": "Solution", "text": "Controlling claims costs For PMI, claims control has two dimensions \u2014 the acceptance of the validity of the claim and the agreement over the amount of the claim. [\u00bd]"}, {"section": "Solution", "text": "Even in circumstances where the policyholder is entitled to receive his/her treatment without restriction (subject to the \u2018usual and customary\u2019 qualification), the insurer may seek to negotiate with the provider for the cost of services billed. [\u00bd]"}, {"section": "Solution", "text": "Such negotiation may happen before the event e.g. in agreeing schedules of customary charges with a particular hospital chain or after the treatment has taken place, to clarify the amounts in the account for particular procedures and accommodation. [\u00bd]"}, {"section": "Solution", "text": "In other circumstances, the insurer may require that all medical treatment which is to be indemnified under the insurance contract be pre-authorised. [\u00bd]"}, {"section": "Solution", "text": "Finally, the insurer may review protocols with Provider ABC and its consultants, to ensure that procedures can be deemed appropriate and medically necessary to treat a particular condition. [\u00bd]"}, {"section": "Solution", "text": "This review and other case management strategies will help to keep an insurer\u2019s claims frequency and average claims costs closer to the amounts estimated in their premium assessment. [\u00bd]"}, {"section": "Solution", "text": "Other actions Support public health initiatives to encourage healthier lifestyles amongst the population [\u00bd]"}, {"section": "Solution", "text": "E.g. contribute to funds for anti-smoking campaigns or smoking cessation programmes. [\u00bd]"}, {"section": "Solution", "text": "Encourage its existing policyholders to lead healthier lifestyles by targeting segments identified through the results from the underwriting process [\u00bd]"}, {"section": "Solution", "text": "E.g. policyholder identified as being overweight could be offered dietary advice. Support initiatives of Provider ABC to encourage healthier lifestyles amongst the population. [\u00bd]"}, {"section": "Solution", "text": "Negotiate tariffs with Provider ABC that vary for different risk segments of the population so that services for policyholders which could have been avoided will receive a lower tariff. [\u00bd]"}, {"section": "Solution", "text": "Take action to reduce surrenders. [\u00bd]"}, {"section": "Solution", "text": "Free health checks Possibly as part of the overall product package, or maybe as a benefit to existing policyholders, the insurer might offer free health checks. [\u00bd]"}, {"section": "Solution", "text": "The advantage to the insurer is that the customer is getting expert analysis on their state of health, so that any particular impairment might be identified and put right at an earlier (and less expensive) stage. [\u00bd]"}, {"section": "Solution", "text": "The customer will not, however, be under any compulsion to undertake treatments as a result of these findings. [\u00bd]"}, {"section": "Solution", "text": "Additionally, the availability of these check-ups on a regular basis may encourage a healthier lifestyle and they will include advice in this regard. [\u00bd]"}, {"section": "Solution", "text": "However, an insurer that offers free health checks may find that claims increase as a result of identifying more illnesses and impairments. [\u00bd]"}, {"section": "Solution", "text": "Therefore, this risk of increase in claims must be weighed against the potential reduction in average claims costs from earlier detection and treatment of illness. [\u00bd]"}, {"section": "Solution", "text": "In some jurisdictions health and care insurers are offering customers other benefits to encourage customers to follow a healthier lifestyle such as discounted cost gym memberships, or wearable technology. [\u00bd]"}, {"section": "Solution", "text": "Within its experience investigations of existing business, split the analysis according to the policyholders within each category of underwriting, i.e. [\u00bd]"}, {"section": "Solution", "text": "Policyholders accepted on standard product terms and premium [\u00bd]"}, {"section": "Solution", "text": "Policyholders accepted on standard product terms but with a loading on the premium [\u00bd]"}, {"section": "Solution", "text": "Policyholders accepted on standard premium but with some particular benefits excluded [\u00bd]"}, {"section": "Solution", "text": "Policyholders accepted with a risk loading on the premium and some particular benefits excluded. [\u00bd]"}, {"section": "Solution", "text": "The information could be used to introduce reinsurance or to amend current reinsurance terms. [\u00bd]"}]}, {"id": "201909_Q3(iii)", "sitting": "September 2019", "yymmkey": "201909", "ref": "Q3(iii)", "marks": 6, "all_themes": ["Claims Management", "Data", "Pricing", "Private Medical Insurance (PMI)", "State Healthcare & Demographics", "Underwriting"], "products": ["Private Medical Insurance (PMI)"], "question_text": "Recommend ways in which the provider organisation could use the information gathered by Insurer XYZ\u2019s underwriting to support its organisational planning, and align health and care services with the needs of the population.\n[Total 26]\nEND OF PAPER", "scenario": "In Country A, there is a single organisation, ABC, that provides all health care services for individuals with Private Medical Insurance (PMI) cover. These services include consultations with general practitioners (family doctors), hospitals (including emergency treatment as well as planned surgical procedures) and mental health and social care services.\nInsurer XYZ is one of many health insurers in Country A which writes PMI business.", "bullets": [{"section": "Solution", "text": "Health care providers are interested in the propensity of individuals to seek health and care services in order to plan their businesses. [\u00bd]"}, {"section": "Solution", "text": "Health and care risks are complex and the propensity to seek health and care services is a function of many factors including: [\u00bd]"}, {"section": "Solution", "text": "current state of health; \u2022 personal medical history; \u2022 family medical history; \u2022 occupation; \u2022 area of residence; \u2022 pastimes/leisure activities; and \u2022 benefits covered. [Half mark awarded for each relevant example, maximum 1.5 marks] The ability to elicit such information from individuals is likely to be difficult for Provider ABC. [\u00bd]"}, {"section": "Solution", "text": "Provider ABC may not have much information about the population which it serves; [\u00bd]"}, {"section": "Solution", "text": "Provider ABC will have information about patients they have treated, in terms of the treatments provided [\u00bd]"}, {"section": "Solution", "text": "And some demographic data (age, sex), but not lifestyle information [\u00bd]"}, {"section": "Solution", "text": "e.g policyholder\u2019s lifestyle (marital status, habitation status, occupation, exercise, diet, alcohol consumption, smoking, hobbies). [\u00bd]"}, {"section": "Solution", "text": "It will have little or no information for the policyholders who have not sought services from Provider ABC before. [\u00bd]"}, {"section": "Solution", "text": "Hence, there would be much information from the insurer\u2019s underwriting process which Provider ABC would not have had previously [\u00bd]"}, {"section": "Solution", "text": "Even for individuals who have received services from Provider ABC. [\u00bd]"}, {"section": "Solution", "text": "The new information for Provider ABC could be: policyholder\u2019s lifestyle; family medical history; results of specific medical if these were done by a different provider. [\u00bd]"}, {"section": "Solution", "text": "The underwriting process will generate medical, health and lifestyle information at the level of individual patients. [\u00bd]"}, {"section": "Solution", "text": "Combining the underwriting data with the data of patients treated by Provider ABC could generate insights into the high risk segments of the population. [\u00bd]"}, {"section": "Solution", "text": "It could help with specifying the most useful/meaningful definitions of risk segments. [\u00bd]"}, {"section": "Solution", "text": "Further classification of the high risk segments could identify segments who could be offered preventative services. [\u00bd]"}, {"section": "Solution", "text": "This could lead to an overall reduction in the number of patients seeking services from Provider ABC. [\u00bd]"}, {"section": "Solution", "text": "The underwriting process will identify policyholders with particular diseases or at high risk of contracting particular diseases. [\u00bd]"}, {"section": "Solution", "text": "If it becomes known there is a higher health risk in general for the population than previously thought, Provider ABC could plan to recruit or train more staff (including clinicians). [\u00bd]"}, {"section": "Solution", "text": "If it is known there is a high risk of particular diseases for the population, Provider ABC could plan to recruit or train more specialist clinicians for that disease. [\u00bd]"}, {"section": "Solution", "text": "It could invest in developing new technologies to diagnose and/or treat particular diseases/conditions. [\u00bd]"}, {"section": "Solution", "text": "It could help to plan which medicines to stockpile. [\u00bd]"}, {"section": "Solution", "text": "It could also initiate preventative and public health measures to improve the risk profile of the population [\u00bd]"}, {"section": "Solution", "text": "e.g. target dietary advice programmes at segments with a high risk of contracting diabetes. [\u00bd]"}, {"section": "Solution", "text": "Provider ABC could use the information to identify individuals who may require non standard support / additional health and care resources. [\u00bd]"}, {"section": "Solution", "text": "This could allow Provider ABC to target these individuals with early interventions whilst the disease/condition is still treatable [\u00bd]"}, {"section": "Solution", "text": "And/or which could halt the disease/condition before it becomes too serious. [\u00bd]"}, {"section": "Solution", "text": "It could use data on locations of those insured to plan where to build future medical facilities to ensure they are easily accessible to a large number of customers. [\u00bd]"}, {"section": "Solution", "text": "Data on claim types could be used to ensure it has sufficient screening and treatment facilities and staff to meet the demand. [\u00bd]"}, {"section": "Solution", "text": "It could also help prioritise areas for future research and development. [\u00bd]"}, {"section": "Solution", "text": "It could also use the data from the insurer to help plan educational events to raise awareness of health issues based on demographics [\u00bd]"}, {"section": "Solution", "text": "For example targeting sporting injuries, ante-natal care. [\u00bd]"}, {"section": "Solution", "text": "The Provider could also use the data to support lobbying for policy change. [\u00bd]"}]}, {"id": "202004_Q1(i)", "sitting": "April 2020", "yymmkey": "202004", "ref": "Q1(i)", "marks": 4, "all_themes": ["Investments", "Pricing & Rating", "Private Medical Insurance (PMI)", "Regulation", "Reserving & Valuation", "Risk Management & Capital"], "products": ["Private Medical Insurance (PMI)"], "question_text": "Outline each pillar of the three \u2018pillars\u2019 approach under the Solvency II framework.", "scenario": "Group A is a global insurance group specialising in Private Medical Insurance (PMI)\nbusiness.  It has insurance companies in a number of countries and territories across Europe, Africa, Asia, North America and South America.  Group A\u2019s head office is in Europe and group reporting is subject to the European Union\u2019s Solvency II requirements.  Each insurance company is also required to report locally to their regulators under the corresponding local solvency regulation.", "bullets": [{"section": "Solution", "text": "Pillar 1 \u2022 Pillar 1 sets out the minimum capital requirements that firms are required to meet. [\u00bd]"}, {"section": "Solution", "text": "It specifies valuation methodologies for assets and liabilities (\u2018technical provisions\u2019), based on market-consistent principles. [\u00bd]"}, {"section": "Solution", "text": "Under Pillar 1 there are two distinct capital requirements: \u2022 the Solvency Capital Requirement (SCR); and [\u00bd]"}, {"section": "Solution", "text": "the Minimum Capital Requirement (MCR). [\u00bd]"}, {"section": "Solution", "text": "The MCR can be calculated by a simple factor-based linear formula which is targeted at a Value at Risk measure over one year with 85% confidence. [\u00bd]"}, {"section": "Solution", "text": "The MCR has a floor of 25% and a cap of 45% of the SCR, and this may bite for a significant number of health and care insurance companies. [\u00bd]"}, {"section": "Solution", "text": "There is an absolute minimum capital requirement of \u20ac3.7m for long-term insurance companies and \u20ac2.5m for short-term insurance companies [\u00bd]"}, {"section": "Solution", "text": "The SCR can be calculated using a prescribed standard formula approach, or by using a company-specific internal model, which has to be approved by the national regulator. [\u00bd]"}, {"section": "Solution", "text": "The SCR and MCR both represent capital requirements that must be held in addition to the technical provisions. [\u00bd]"}, {"section": "Solution", "text": "Supervisors may decide that a firm should hold additional capital (as a capital add-on) against risks that are either not covered or are inadequately modelled for the calculation of the SCR. [\u00bd]"}, {"section": "Solution", "text": "The SCR is a Value at Risk measure based on a 99.5% confidence interval of the variation over one year of the amount of \u2018basic own funds\u2019 (broadly assets minus technical provisions) [\u00bd]"}, {"section": "Solution", "text": "Pillar 2 \u2022 Pillar 2 includes the supervisory review process, systems of governance and risk management. [\u00bd]"}, {"section": "Solution", "text": "Also under Pillar 2, each insurance company is required to carry out an Own Risk and Solvency Assessment (ORSA). [\u00bd]"}, {"section": "Solution", "text": "The ORSA requires each insurer to identify the risks to which it is exposed, including those not covered under Pillar 1, [\u00bd]"}, {"section": "Solution", "text": "To identify the risk management processes and controls in place [\u00bd]"}, {"section": "Solution", "text": "And to quantify its ongoing ability to continue to meet the MCR and SCR. [\u00bd]"}, {"section": "Solution", "text": "Pillar 3 \u2022 Pillar 3 is the disclosure and supervisory reporting regime, under which defined reports to regulators and the public are required to be made. [\u00bd]"}, {"section": "Solution", "text": "The Solvency II structure has been designed to deliver a transparent and secure prudential regulatory system through the combination of: [\u00bd]"}, {"section": "Solution", "text": "minimum capital standards; [\u00bd]"}, {"section": "Solution", "text": "qualitative risk management requirements; [\u00bd]"}, {"section": "Solution", "text": "a well-defined and rigorous review process of companies\u2019 solvency by supervisors; and [\u00bd]"}, {"section": "Solution", "text": "prescribed disclosures to supervisors, policyholders and investors. [\u00bd]"}]}, {"id": "202004_Q1(ii)", "sitting": "April 2020", "yymmkey": "202004", "ref": "Q1(ii)", "marks": 5, "all_themes": ["Investments", "Pricing & Rating", "Private Medical Insurance (PMI)", "Regulation", "Reinsurance", "Reserving & Valuation", "Risk Management & Capital"], "products": ["Private Medical Insurance (PMI)"], "question_text": "Outline, in respect of Group reporting under Solvency II:\n(a) Group reporting requirements.\n(b) Third country equivalence.", "scenario": "Group A is a global insurance group specialising in Private Medical Insurance (PMI)\nbusiness.  It has insurance companies in a number of countries and territories across Europe, Africa, Asia, North America and South America.  Group A\u2019s head office is in Europe and group reporting is subject to the European Union\u2019s Solvency II requirements.  Each insurance company is also required to report locally to their regulators under the corresponding local solvency regulation.", "bullets": [{"section": "Solution", "text": "Group reporting requirements \u2022 Solvency II aims to enable insurance groups to be supervised more efficiently through a \u2018group supervisor\u2019 in the home country, co-operating with other relevant national supervisors. [\u00bd]"}, {"section": "Solution", "text": "This ensures that group-wide risks are not overlooked and should enable groups to operate more effectively, whilst continuing to provide policyholder protection. [\u00bd]"}, {"section": "Solution", "text": "It also aims to address the double use of capital within an insurance group (for example, where regulated entities make subordinated loans to each other), [\u00bd]"}, {"section": "Solution", "text": "And double leverage (where a parent raises debt which is then used to fund an investment in a regulated subsidiary, improving the solo capital position of the regulated entity). [\u00bd]"}, {"section": "Solution", "text": "The insurance group must cover its overall group SCR (which allows for diversification benefits across the group), [\u00bd]"}, {"section": "Solution", "text": "as well as its group solvency floor (which is calculated as the sum of MCRs, or local equivalent, for each insurance or reinsurance entity within the group) [\u00bd]"}, {"section": "Solution", "text": "Each insurance subsidiary needs to cover its own SCR and MCR. [\u00bd]"}, {"section": "Solution", "text": "Group supervision would normally be carried out at the top level company, which may be within the European Economic Area (EEA) or in a \u2018third country\u2019, i.e. non- EEA. [\u00bd]"}, {"section": "Solution", "text": "Solvency II requires that where there is a third country parent, EEA supervisors must assess whether the third country parent is subject to \u2018equivalent\u2019 group supervision. [\u00bd]"}, {"section": "Solution", "text": "Depending on this assessment there may be further requirements imposed, which could include establishing an EEA-based holding company. [\u00bd]"}, {"section": "Solution", "text": "Third country equivalence \u2022 If an aspect of a third country regulatory regime is considered to be broadly compliant with Solvency II, then that aspect of the regime can be said to be \u2018equivalent\u2019. [\u00bd]"}, {"section": "Solution", "text": "This \u2018equivalence\u2019 can be granted in three different situations: \u2022 The solo solvency regime in the third country is equivalent. [\u00bd]"}, {"section": "Solution", "text": "The group supervision regime in the third country is equivalent. [\u00bd]"}, {"section": "Solution", "text": "The solvency regime as applied to reinsurance activities is equivalent. [\u00bd]"}, {"section": "Solution", "text": "Equivalence can be \u2018full\u2019 (granted for an indefinite period), [\u00bd]"}, {"section": "Solution", "text": "\u2018temporary\u2019 (granted for a limited period that will end on 31 December 2020 or on the date on which the prudential regime of the third country is deemed equivalent, whichever is earlier), [\u00bd]"}, {"section": "Solution", "text": "or \u2018provisional\u2019 (granted for a ten year period with possible extension for further ten year periods). [\u00bd]"}, {"section": "Solution", "text": "For example, Bermuda and Switzerland have been granted full equivalence. [\u00bd]"}, {"section": "Solution", "text": "Japan, Australia, Brazil, Canada, Mexico and the USA have been granted temporary equivalence. [\u00bd]"}]}, {"id": "202004_Q1(iii)", "sitting": "April 2020", "yymmkey": "202004", "ref": "Q1(iii)", "marks": 1, "all_themes": ["Claims Management", "Pricing", "Pricing & Rating", "Private Medical Insurance (PMI)", "Regulation", "Reserving & Valuation"], "products": ["Private Medical Insurance (PMI)"], "question_text": "Group A is considering expanding its business into a new territory, Country X.  Unlike other jurisdictions in which Group A currently operates, Country X\u2019s PMI is based on a system of Community Rating and Risk Equalisation.\nDefine Community Rating.", "scenario": "Group A is a global insurance group specialising in Private Medical Insurance (PMI)\nbusiness.  It has insurance companies in a number of countries and territories across Europe, Africa, Asia, North America and South America.  Group A\u2019s head office is in Europe and group reporting is subject to the European Union\u2019s Solvency II requirements.  Each insurance company is also required to report locally to their regulators under the corresponding local solvency regulation.", "bullets": [{"section": "Solution", "text": "Community Rating \u2022 Community rating most often refers to the practice of charging all policyholders (or a significant subset of the persons insured) the same premium rate irrespective of rating factors such as age, gender and medical history. [1]"}, {"section": "Solution", "text": "Community rating sometimes refers to the process of applying tabular rates to applicants irrespective of claims history. [\u00bd]"}]}, {"id": "202004_Q1(iv)", "sitting": "April 2020", "yymmkey": "202004", "ref": "Q1(iv)", "marks": 4, "all_themes": ["Claims Management", "Group Products", "Pricing", "Pricing & Rating", "Private Medical Insurance (PMI)", "Regulation", "Reserving & Valuation", "Underwriting"], "products": ["Group Products", "Private Medical Insurance (PMI)"], "question_text": "Discuss the advantages and disadvantages of this system.", "scenario": "Group A is a global insurance group specialising in Private Medical Insurance (PMI)\nbusiness.  It has insurance companies in a number of countries and territories across Europe, Africa, Asia, North America and South America.  Group A\u2019s head office is in Europe and group reporting is subject to the European Union\u2019s Solvency II requirements.  Each insurance company is also required to report locally to their regulators under the corresponding local solvency regulation.", "bullets": [{"section": "Solution", "text": "Advantages \u2022 This system prevents health insurers from discriminating between people on the basis of their health, gender, age, etc. [1]"}, {"section": "Solution", "text": "It may therefore be viewed as \u2018fair\u2019 by policyholders which may attract business [\u00bd]"}, {"section": "Solution", "text": "It prevents those people who are genetically at a higher risk for adverse health events from paying higher premiums and being priced out of the market, and [\u00bd]"}, {"section": "Solution", "text": "Makes insurance accessible and affordable to those who are most vulnerable in the society. [\u00bd]"}, {"section": "Solution", "text": "Community rating means that everyone is entitled to buy the same product, at the same price, and is guaranteed the right to renew their policy. [\u00bd]"}, {"section": "Solution", "text": "Could help compliance with local regulation (e.g. by avoiding discrimination) [\u00bd]"}, {"section": "Solution", "text": "Provides simplicity in terms of explanation to the customer [\u00bd]"}, {"section": "Solution", "text": "And in terms of the company\u2019s operations / processes [\u00bd]"}, {"section": "Solution", "text": "Simplicity could mean reduced cost of operations [\u00bd]"}, {"section": "Solution", "text": "Some policyholder subgroups will like this approach, particularly if they are charged less than the true cost of their benefits. [\u00bd]"}, {"section": "Solution", "text": "It is particularly useful for group schemes to help keep costs low. [\u00bd]"}, {"section": "Solution", "text": "Disadvantages \u2022 On the other hand, this system increases the costs of those who are better risks. [1]"}, {"section": "Solution", "text": "Some policyholder subgroups will not like this approach, particularly if they are charged more than the true cost of their benefits. [\u00bd]"}, {"section": "Solution", "text": "Moral hazard - this system may encourage people to engage in risky or costly behaviour because they will not be rewarded financially for having better health. [1]"}, {"section": "Solution", "text": "In order to be affordable, community rated health insurance requires both high participation rates and some form of risk equalisation. [1]"}, {"section": "Solution", "text": "If private medical insurance is not mandatory in a community rating system, better risks may choose not to purchase insurance at all. [\u00bd]"}, {"section": "Solution", "text": "Leading to a risk of anti-selection [\u00bd]"}, {"section": "Solution", "text": "This could lead to high costs to those who choose to purchase private medical insurance, who are likely to be the less healthy and/or older age groups. [\u00bd]"}, {"section": "Solution", "text": "The mix of business may be different to that expected and so the cross-subsidies between healthy and less healthy lives assumed may not be met. [\u00bd]"}, {"section": "Solution", "text": "If only people with high expected claims costs decided to insure, premiums would be unaffordable regardless of how claims are shared between insurers. [\u00bd]"}, {"section": "Solution", "text": "The company cannot charge accurate premium for policyholders\u2026 [\u00bd]"}, {"section": "Solution", "text": "\u2026. Therefore it may need to hold higher margins of prudence in pricing / reserving to allow for uncertainty of future claims experience. [\u00bd]"}]}, {"id": "202004_Q1(v)", "sitting": "April 2020", "yymmkey": "202004", "ref": "Q1(v)", "marks": 2, "all_themes": ["Claims Management", "Pricing", "Pricing & Rating", "Private Medical Insurance (PMI)", "Reserving & Valuation"], "products": ["Private Medical Insurance (PMI)"], "question_text": "Describe Risk Equalisation.", "scenario": "Group A is a global insurance group specialising in Private Medical Insurance (PMI)\nbusiness.  It has insurance companies in a number of countries and territories across Europe, Africa, Asia, North America and South America.  Group A\u2019s head office is in Europe and group reporting is subject to the European Union\u2019s Solvency II requirements.  Each insurance company is also required to report locally to their regulators under the corresponding local solvency regulation.", "bullets": [{"section": "Solution", "text": "Risk Equalisation \u2022 Risk equalisation applies in some markets whereby the profits or losses on specified policies or risks are pooled and reapportioned among participating insurers so that each shares in the average market experience. [1]"}, {"section": "Solution", "text": "It is a mechanism by which the cost of health care for higher risk individuals (primarily age based) is shared among the private medical insurance industry. [1]"}, {"section": "Solution", "text": "Risk equalisation supports community rating by redistributing costs between risk groups. [1]"}, {"section": "Solution", "text": "It aims to ensure that health insurers who have a higher risk (primarily age based) profile of policyholders are not adversely affected by large medical claims for higher risk policyholders. [1]"}]}, {"id": "202004_Q1(vi)", "sitting": "April 2020", "yymmkey": "202004", "ref": "Q1(vi)", "marks": 12, "all_themes": ["Claims Management", "Data", "Pricing", "Pricing & Rating", "Private Medical Insurance (PMI)", "Professional Guidance", "Regulation", "Reinsurance", "Reserving & Valuation", "Risk Management & Capital", "Underwriting"], "products": ["Private Medical Insurance (PMI)"], "question_text": "Discuss the advantages and disadvantages of each of the following approaches from Group A\u2019s perspective as a means of entering the health insurance market in Country X:\n(a) Purchase an existing health insurer in Country\n(b) Enter into a joint venture with a local insurer in Country X that does not currently write health insurance business, where Group A will underwrite the PMI policies with the local insurer fronting the product sales\n(c) Set up a new company in Country X.", "scenario": "Group A is a global insurance group specialising in Private Medical Insurance (PMI)\nbusiness.  It has insurance companies in a number of countries and territories across Europe, Africa, Asia, North America and South America.  Group A\u2019s head office is in Europe and group reporting is subject to the European Union\u2019s Solvency II requirements.  Each insurance company is also required to report locally to their regulators under the corresponding local solvency regulation.", "bullets": [{"section": "Solution", "text": "Purchasing a local health insurer Advantages \u2022 The target could be an established health insurer, with good brand name & reputation, and [\u00bd]"}, {"section": "Solution", "text": "significant market share. [\u00bd]"}, {"section": "Solution", "text": "The target will have local knowledge and expertise in the private medical insurance market. [\u00bd]"}, {"section": "Solution", "text": "There is already an established workforce, and [\u00bd]"}, {"section": "Solution", "text": "Office premises and equipment. [\u00bd]"}, {"section": "Solution", "text": "There will be a portfolio of in-force business from day 1 post the takeover. [\u00bd]"}, {"section": "Solution", "text": "Retention / Policy renewals could be high if the target has good customer satisfaction records. [\u00bd]"}, {"section": "Solution", "text": "All the systems, processes and arrangements are already in place, which include: [\u00bd]"}, {"section": "Solution", "text": "IT and policy systems [\u00bd]"}, {"section": "Solution", "text": "Data and historical experience analysis [\u00bd]"}, {"section": "Solution", "text": "Underwriting systems and processes [\u00bd]"}, {"section": "Solution", "text": "Pricing systems and processes [\u00bd]"}, {"section": "Solution", "text": "Reserving and solvency capital systems and processes [\u00bd]"}, {"section": "Solution", "text": "Claims management systems and processes [\u00bd]"}, {"section": "Solution", "text": "Arrangements with third party healthcare providers and hospitals [\u00bd]"}, {"section": "Solution", "text": "Reinsurance arrangements [\u00bd]"}, {"section": "Solution", "text": "Distribution channels [\u00bd]"}, {"section": "Solution", "text": "Disadvantages \u2022 It may be difficult to find a suitable target. [\u00bd]"}, {"section": "Solution", "text": "The target company and Group A may not fit culturally. [\u00bd]"}, {"section": "Solution", "text": "The purchase price could be too high, due to competition. [\u00bd]"}, {"section": "Solution", "text": "A change in brand name post takeover could have adverse effects on policy retention / renewals. [\u00bd]"}, {"section": "Solution", "text": "There could be legacy issues. e.g. mis-selling, pension deficit. [\u00bd]"}, {"section": "Solution", "text": "Systems and processes could be out-of-date, inefficient and ineffective. [\u00bd]"}, {"section": "Solution", "text": "Upfront costs of reserving and capital requirement, both locally and at the group level, could be high. [\u00bd]"}, {"section": "Solution", "text": "There is the risk of losing key staff post takeover. [\u00bd]"}, {"section": "Solution", "text": "Initial pricing and underwriting strategies could be heavily driven by the target\u2019s existing practices. [\u00bd]"}, {"section": "Solution", "text": "Joint venture with a local insurer Advantages \u2022 Local partners will have local knowledge and expertise of Country X. [\u00bd]"}, {"section": "Solution", "text": "Access to the local insurer\u2019s distribution network. [\u00bd]"}, {"section": "Solution", "text": "Reduced set-up costs compared to setting up a new company. [\u00bd]"}, {"section": "Solution", "text": "Sharing of risks and rewards with the local partner. [\u00bd]"}, {"section": "Solution", "text": "May be easier to obtain regulatory approval. [\u00bd]"}, {"section": "Solution", "text": "Group A can focus on the technical aspects (underwriting, pricing) while the local partner handles sales and admin. [\u00bd]"}, {"section": "Solution", "text": "Disadvantages \u2022 Potential for conflict between the partners over strategy, management, profit-sharing. [\u00bd]"}, {"section": "Solution", "text": "Brand risk if the local partner\u2019s brand is damaged. [\u00bd]"}, {"section": "Solution", "text": "Complexity in management and communication. [\u00bd]"}, {"section": "Solution", "text": "Risk that the local partner does not have the necessary skills or resources. [\u00bd]"}, {"section": "Solution", "text": "Limited control over the business compared to full ownership. [\u00bd]"}, {"section": "Solution", "text": "Profit is shared between partners. [\u00bd]"}, {"section": "Solution", "text": "Set up a new company Advantages \u2022 Full control over the strategy, operations, and culture of the new company. [\u00bd]"}, {"section": "Solution", "text": "No legacy issues from existing companies. [\u00bd]"}, {"section": "Solution", "text": "Ability to implement the group\u2019s modern IT systems and processes from the outset. [\u00bd]"}, {"section": "Solution", "text": "Opportunity to build a brand name from scratch. [\u00bd]"}, {"section": "Solution", "text": "Can tailor the products specifically to the local market needs as seen by Group A. [\u00bd]"}, {"section": "Solution", "text": "Disadvantages \u2022 High initial setup costs and long time to market. [\u00bd]"}, {"section": "Solution", "text": "Difficult to attract a workforce with the right skills and local knowledge. [\u00bd]"}, {"section": "Solution", "text": "High marketing spend required to build brand awareness. [\u00bd]"}, {"section": "Solution", "text": "No in-force business from day 1, leading to initial losses and capital strain. [\u00bd]"}, {"section": "Solution", "text": "Risk of low sales volumes if the brand name is not accepted. [\u00bd]"}, {"section": "Solution", "text": "Need to establish own distribution network and arrangements with providers. [\u00bd]"}, {"section": "Solution", "text": "Regulatory approval for a new company may take time. [\u00bd]"}]}, {"id": "202004_Q1(vii)", "sitting": "April 2020", "yymmkey": "202004", "ref": "Q1(vii)", "marks": 20, "all_themes": ["Data", "Investments", "Pricing", "Pricing & Rating", "Private Medical Insurance (PMI)", "Regulation", "Reserving & Valuation", "Risk Management & Capital"], "products": ["Private Medical Insurance (PMI)"], "question_text": "Group A has decided that the most appropriate approach is to purchase an existing health insurer in Country X.  Company B is a local health insurer operating in Country X. It is the subsidiary of Group C, one of Group A\u2019s key competitors.\nCompany B\u2019s business growth has been static over the last few years. Although the overall profits disclosed in its published financial statements over these years have been declining, the business remains profitable. Group C has recently decided to put Company B up for sale, and Group A is one of the companies that has been invited to enter a bid to purchase Company B.\nOutline the factors that Group A would need to consider before entering a bid for Company B.\n[Total 48]", "scenario": "Group A is a global insurance group specialising in Private Medical Insurance (PMI)\nbusiness.  It has insurance companies in a number of countries and territories across Europe, Africa, Asia, North America and South America.  Group A\u2019s head office is in Europe and group reporting is subject to the European Union\u2019s Solvency II requirements.  Each insurance company is also required to report locally to their regulators under the corresponding local solvency regulation.", "bullets": [{"section": "Solution", "text": "Strategic Fit: \u2022 How does Company B fit into Group A\u2019s overall strategy. [1]"}, {"section": "Solution", "text": "Synergy benefits (cost and revenue synergies). [1]"}, {"section": "Solution", "text": "Diversification benefits. [1]"}, {"section": "Solution", "text": "Financial Performance: \u2022 Current and past profitability of Company B. [1]"}, {"section": "Solution", "text": "Accuracy of the financial statements. [1]"}, {"section": "Solution", "text": "Quality of the assets and liabilities. [1]"}, {"section": "Solution", "text": "Capital requirements and solvency position. [1]"}, {"section": "Solution", "text": "Embedded value or appraisal value. [1]"}, {"section": "Solution", "text": "Operational Factors: \u2022 Quality and experience of the management and staff. [1]"}, {"section": "Solution", "text": "Culture of Company B. [1]"}, {"section": "Solution", "text": "Effectiveness of its IT systems and processes. [1]"}, {"section": "Solution", "text": "Quality of its data and experience analysis. [1]"}, {"section": "Solution", "text": "Market Position: \u2022 Market share and brand reputation. [1]"}, {"section": "Solution", "text": "Strength of its distribution channels. [1]"}, {"section": "Solution", "text": "Arrangements with healthcare providers. [1]"}, {"section": "Solution", "text": "Retention rates and customer satisfaction. [1]"}, {"section": "Solution", "text": "Regulatory and Legal: \u2022 Regulatory standing and relationship with the regulator in Country X. [1]"}, {"section": "Solution", "text": "Compliance with local regulations. [1]"}, {"section": "Solution", "text": "Any legacy legal issues or potential liabilities. [1]"}, {"section": "Solution", "text": "Due Diligence: \u2022 Extent of access to internal records during the bidding process. [1]"}, {"section": "Solution", "text": "Risk of \"winners curse\" (overpaying). [1]"}, {"section": "Solution", "text": "Price and Funding: \u2022 Availability of capital to fund the purchase. [1]"}, {"section": "Solution", "text": "Impact on the Group\u2019s solvency position. [1]"}, {"section": "Solution", "text": "Alternative investment opportunities. [1]"}]}, {"id": "202004_Q2(ii)", "sitting": "April 2020", "yymmkey": "202004", "ref": "Q2(ii)", "marks": 10, "all_themes": ["Capital & Solvency", "Investments", "Legislation & Taxation", "Regulation", "Reserving & Valuation", "Risk Management & Capital"], "products": ["General/Mixed"], "question_text": "Country Y is a stable, developed country with an excellent credit rating.\nFor many years, Country Y has been a member of an association of countries that has had the power to make rules that apply to every country in the association.\nBefore joining the association, Country Y had a developed health and care insurance market and set flexible, pragmatic insurance regulation, in consultation with its insurance companies and actuaries.  After joining the association, Country Y had to comply with the insurance regulations set by the association.\nMany of the other countries in the association are less stable and have lower levels of credit rating.\nThe rules of this association allow the individual countries to issue sovereign debt (gilts) with coupon rates that reflect their individual level of creditworthiness.\nHowever, the reserving regulations of the association require any insurance company operating in any of the association\u2019s countries to assume that all sovereign debt is equivalent.  As a result, insurers have to assume that the same credit, liquidity, etc., margins will apply to the sovereign debt of every association country.\nCountry Y is going to leave the association.  This is expected to increase the creditworthiness of gilts issued by Country Y.  Country Y will also be able to set its own insurance regulations; in particular, it will expect margins on investments to reflect the actual risk of that investment.\nDiscuss the effects that leaving the association will have on the reserves and capital that the health insurer will hold.", "scenario": "", "bullets": [{"section": "Solution", "text": "Impact of leaving the association: Reserves: \u2022 Use of Country Y\u2019s own yield curves for discounting. [1]"}, {"section": "Solution", "text": "Improved creditworthiness of Country Y\u2019s gilts will lead to lower yields. [1]"}, {"section": "Solution", "text": "This will increase the present value of the liabilities (reserves). [1]"}, {"section": "Solution", "text": "Removal of the requirement to treat all association debt as equivalent. [1]"}, {"section": "Solution", "text": "Margins will now reflect actual risk, which may reduce reserves for Country Y gilts. [1]"}, {"section": "Solution", "text": "However, reserves for other association debt will increase due to higher risk margins. [1]"}, {"section": "Solution", "text": "Capital: \u2022 Change in the SCR calculation based on Country Y\u2019s own regulations. [1]"}, {"section": "Solution", "text": "Lower asset yields may increase capital requirements if assets are not fully matched. [1]"}, {"section": "Solution", "text": "Reduced risk from association-wide contagion. [1]"}, {"section": "Solution", "text": "Flexibility to hold lower capital for Country Y\u2019s own low-risk sovereign debt. [1]"}, {"section": "Solution", "text": "Overall impact on solvency position depends on the new regulatory framework. [1]"}]}, {"id": "202004_Q2(iii)", "sitting": "April 2020", "yymmkey": "202004", "ref": "Q2(iii)", "marks": 20, "all_themes": ["Capital & Solv
