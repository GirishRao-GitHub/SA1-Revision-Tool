ings happening to the student? i.e. it is not trying to indemnify. [\u00bd]"}, {"section": "Solution", "text": "To provide cash Cash benefit may be used for any purpose (to meet immediate care needs, recuperation, rehabilitation) [\u00bd]"}, {"section": "Solution", "text": "To fund a change in lifestyle (e.g. moving to a ground floor accommodation, adaptive technology to suit needs) [\u00bd]"}, {"section": "Solution", "text": "Student will need to choose the amount of benefits [\u00bd]"}, {"section": "Solution", "text": "(balanced with affordability of premiums) [\u00bd]"}, {"section": "Solution", "text": "To provide peace of mind Main concern will be the inability to provide for self (could have dependents) and finance outgoings [\u00bd]"}, {"section": "Solution", "text": "State benefits may not provide for those not paying into the state system with student status [\u00bd]"}, {"section": "Solution", "text": "Alleviate financial concerns arising from the diagnosis of condition [\u00bd]"}, {"section": "Solution", "text": "May allow for quicker access to medical treatment than if not insured [\u00bd]"}, {"section": "Solution", "text": "Simplicity and Clarity Keep the product simple as students may not be financial sophisticated yet [\u00bd]"}, {"section": "Solution", "text": "Benefit is simple as not linked to a salary [\u00bd]"}, {"section": "Solution", "text": "Provides a fixed income that is equal to the cost of living for an average student [\u00bd]"}, {"section": "Solution", "text": "Could simplify by not including inflation if maximum term is 3-4 years [\u00bd]"}, {"section": "Solution", "text": "Underwriting could be kept simple, with an age limit for usual student ages, given most in the age range are in good health [\u00bd]"}, {"section": "Solution", "text": "Definition of claim is simply a set schedule of conditions that require diagnosis by medical professional [\u00bd]"}, {"section": "Solution", "text": "Sales and distribution Ensure product literature is suitably clear and free from jargon and appropriate for students [\u00bd]"}, {"section": "Solution", "text": "Could distribute through a body that students regard as being credible [\u00bd]"}, {"section": "Solution", "text": "Guarantees and reviewability of premiums and benefits Premiums could be paid upfront [\u00bd]"}, {"section": "Solution", "text": "Premiums could be set for the term of the stay at university [\u00bd]"}, {"section": "Solution", "text": "But there is likely to be selective lapsing toward the end of the final term [\u00bd]"}, {"section": "Solution", "text": "Reviewable premiums unlikely to be offered due to complication of explaining these and undertaking reviews [\u00bd]"}, {"section": "Solution", "text": "The limited term would mean a risk of writing guaranteed premiums is minimised [\u00bd]"}, {"section": "Solution", "text": "Will the product always pay out a lump sum and a regular income regardless of the condition as long as the condition is one of the ones listed on the product terms and conditions? [\u00bd]"}, {"section": "Solution", "text": "Would the benefit level be fixed for the whole duration of the degree or would it be increased to allow for inflation, tuition fees and other increases in living costs (such as moving from university provided accommodation to private rental accommodation)? [\u00bd]"}, {"section": "Solution", "text": "Given students are unlikely to have much spare cash the product will need to be low cost, with no additional features or options [\u00bd]"}, {"section": "Solution", "text": "Consider whether changes would be allowed once cover is taken out; e.g. students extending to a 4-year degree or doing a year in industry as part of their course [\u00bd]"}, {"section": "Solution", "text": "Claims payments Decisions on claims would need to be made quickly in order to ensure students can benefit from the product [\u00bd]"}, {"section": "Solution", "text": "Payments would also need to be made quickly [\u00bd]"}]}, {"id": "202109_Q2(ii)", "sitting": "September 2021", "yymmkey": "202109", "ref": "Q2(ii)", "marks": 5, "all_themes": ["Capital & Solvency", "Claims Management", "Pricing", "Pricing & Rating", "Product Design", "Reserving & Valuation", "Underwriting"], "products": ["General/Mixed"], "question_text": "The market research suggested that the undergraduate student population has little awareness of household insurer names and has low financial sophistication.\nThe insurer has approached a national body of student representatives to be a distributor of the product. During the first week of university, when students and parents arrive, these representatives welcome and answer questions on the insurance offering using hand-held internet accessible devices. At this time, sale and payment could be taken by the representative using this device.\nAssess whether the features of this distribution channel are suitable for the product and target market.", "scenario": "A health and care insurance company, Company X, is looking to launch a new product. The product will provide both:\n\uf0b7 a fixed cash lump sum \uf0b7 a regular monthly income to university students who are diagnosed with any one of a list of medical conditions while they are studying for a university degree. Initial market research of current students and their parents suggests a perceived need for insurance cover:\n\uf0b7 for immediate adaptation to facilitate continued presence at university \uf0b7 to cover the s", "bullets": [{"section": "Solution", "text": "Face-to-face sales Suitable for those with a low awareness of availability of insurance by brand name [\u00bd]"}, {"section": "Solution", "text": "Allows the sale to be initiated by the distributor rather than relying on the student to approach the insurer [\u00bd]"}, {"section": "Solution", "text": "The level of underwriting for this population may be low as generally healthy so suitable for face-to-face sales [\u00bd]"}, {"section": "Solution", "text": "However, arriving at university is likely to be a busy time for students and their parents so distributors may struggle to make sales [\u00bd]"}, {"section": "Solution", "text": "Student representatives Knowledgeable of the student population [\u00bd]"}, {"section": "Solution", "text": "May help overcome the low level of financial sophistication to explain the product [\u00bd]"}, {"section": "Solution", "text": "Can explain the complexities of the product in terms that relate to the students [\u00bd]"}, {"section": "Solution", "text": "This distributor can create an awareness of the need by explaining what might go wrong if the student falls ill [\u00bd]"}, {"section": "Solution", "text": "The remuneration (type/level) may not be high as the staff are already present on the day and may already have the device to use [\u00bd]"}, {"section": "Solution", "text": "Income levels for student representatives may not need to be high to make it an appealing job [\u00bd]"}, {"section": "Solution", "text": "Student representatives could act more ethically than specialist salesman, if they are not looking to make huge profits [\u00bd]"}, {"section": "Solution", "text": "However, student representatives may not be sufficiently knowledgeable to fully explain the benefits/risks of the product to the students [\u00bd]"}, {"section": "Solution", "text": "Which could deter sales [\u00bd]"}, {"section": "Solution", "text": "Or which could lead to claims of mis-selling from students [\u00bd]"}, {"section": "Solution", "text": "Or those purchasing cover thinking it covers a wider range of costs/illnesses than it does [\u00bd]"}, {"section": "Solution", "text": "Mis-selling could lead to significant reputational risk for the insurer [\u00bd]"}, {"section": "Solution", "text": "Student representatives may not be particularly financially knowledgeable themselves [\u00bd]"}, {"section": "Solution", "text": "So the insurer will need to ensure the student representatives are suitably trained [\u00bd]"}, {"section": "Solution", "text": "And have processes in place to ensure sales from student representatives are appropriately policed to prevent mis-selling [\u00bd]"}, {"section": "Solution", "text": "Making the sale when parents are present May help improve lapse experience as parents see the value in the product [\u00bd]"}, {"section": "Solution", "text": "Competitiveness of premiums may be less as may be only product offering [\u00bd]"}, {"section": "Solution", "text": "The size of premium /contract must be kept low for this low-income group [\u00bd]"}, {"section": "Solution", "text": "However, sensitivity to price may be dampened as parents may pay the premium [\u00bd]"}, {"section": "Solution", "text": "Benefits to insurer The insurer may still have adequate control if they set the online sales portal, questions and take payment directly [\u00bd]"}, {"section": "Solution", "text": "The insurer may audit some sales to check there is not mis-selling. [\u00bd]"}, {"section": "Solution", "text": "The insurer could make an adjustment to the final commission paid to distributors to reflect a quality audit of the sales process [\u00bd]"}, {"section": "Solution", "text": "Being able to complete the application and take payment immediately should ensure the sales process is quick and easy (assuming the underwriting does not add any additional time) which should increase new business [\u00bd]"}, {"section": "Solution", "text": "Being able to sell to a large number of lives with similar characteristics enables risk premium to be reduced because of greater homogeneity [\u00bd]"}, {"section": "Solution", "text": "There are expense savings, especially if the union collect the premiums [\u00bd]"}, {"section": "Solution", "text": "However, average premium size could be small and other admin costs need to be met, so there is a limit to potential expense savings) [\u00bd]"}, {"section": "Solution", "text": "There does not appear to be any opportunity to sign up at a later date, potentially missing sales during the student year [\u00bd]"}]}, {"id": "202109_Q2(iii)", "sitting": "September 2021", "yymmkey": "202109", "ref": "Q2(iii)", "marks": 6, "all_themes": ["Capital & Solvency", "Claims Management", "Data", "Group Products", "Pricing", "Pricing & Rating", "Product Design", "Professional Guidance", "Regulation", "Reserving & Valuation", "Risk Management & Capital", "Underwriting"], "products": ["Group Products"], "question_text": "Company X recognises that it will need to focus its attention on sales and that it does not have sufficient in-house expertise to price this product. To address this, it is considering the use of a badging arrangement with an external specialist health and care insurer. Under this arrangement:\n\uf0b7 Company X would organise sales and establish a customer base.\n\uf0b7 the specialist insurer would undertake pricing, underwriting and the management, payments and administration of claims.\nDiscuss the advantages and disadvantages of the badging arrangement from the perspective of Company X.", "scenario": "A health and care insurance company, Company X, is looking to launch a new product. The product will provide both:\n\uf0b7 a fixed cash lump sum \uf0b7 a regular monthly income to university students who are diagnosed with any one of a list of medical conditions while they are studying for a university degree. Initial market research of current students and their parents suggests a perceived need for insurance cover:\n\uf0b7 for immediate adaptation to facilitate continued presence at university \uf0b7 to cover the s", "bullets": [{"section": "Solution", "text": "Advantages from the perspective of Company X Allows Company X to concentrate on the sales, distribution and establishing a customer base - important because of the niche target market [\u00bd]"}, {"section": "Solution", "text": "Company X can gain access to the expertise it lacks in pricing this product [\u00bd]"}, {"section": "Solution", "text": "Company X may have knowledge in medical underwriting and claims management but not for IP related products [\u00bd]"}, {"section": "Solution", "text": "As good management is particularly important for IP claims Company X will benefit from the specialist insurer expertise through reduced margins and improved claims experience [\u00bd]"}, {"section": "Solution", "text": "The insurer has no expertise to price these products, therefore likely does not have access to experience data. This arrangement enables Company X to benefit from the specialist insurer\u2019s data insights [\u00bd]"}, {"section": "Solution", "text": "Improved certainty in pricing will reduce margins, increasing affordability and so sales [\u00bd]"}, {"section": "Solution", "text": "The specialist insurer may have systems and processes that enable cheaper operations [\u00bd]"}, {"section": "Solution", "text": "Hence, lowering the expense margin, making the product more affordable, increasing sales, and so potentially profits overall [\u00bd]"}, {"section": "Solution", "text": "For example, an online underwriting platform that can be accessed on hand-held device [\u00bd]"}, {"section": "Solution", "text": "The sales window is at the start of the academic year; therefore, a quicker launch is beneficial so as not to delay sales by a full academic year [\u00bd]"}, {"section": "Solution", "text": "A profit-sharing arrangement may be possible [\u00bd]"}, {"section": "Solution", "text": "The specialist insurer may not offer a wider range of products. Company X may have an opportunity to cross-sell other life products to the specialist insurers customer base [\u00bd]"}, {"section": "Solution", "text": "Disadvantages from the perspective of Company X Additional time and resources associated with any lack of synergies with Company X\u2019s internal operating procedures [\u00bd]"}, {"section": "Solution", "text": "Administrative burden and expense caused by difficulties linking Company X\u2019s systems to the specialist insurer\u2019s systems [\u00bd]"}, {"section": "Solution", "text": "IT and legal issues where the specialist insurer has different data controls and regulations to Company X [\u00bd]"}, {"section": "Solution", "text": "Loss of control over policy process and claims administration, which may result in reputational risk that may affect Company X\u2019s performance in its focus on sales [\u00bd]"}, {"section": "Solution", "text": "As Company X does not have sufficient control over pricing, the long-term return on capital may not meet its shareholders requirements [\u00bd]"}, {"section": "Solution", "text": "Company X may not be able to spread the cost of its pricing, underwriting, claims teams over the new book of business resulting in a loss of economies of scale [\u00bd]"}, {"section": "Solution", "text": "Legal costs may be high as carefully worded service level agreements will be required and there may be other contract issues [\u00bd]"}, {"section": "Solution", "text": "Increased expense loading may reduce affordability and hence sales [\u00bd]"}, {"section": "Solution", "text": "Company X will not gain expertise in pricing this product or experience data, making it hard to take more control in the future [\u00bd]"}, {"section": "Solution", "text": "With sales staff and underwriting working in different companies with potentially different cultures and procedures, the feedback loop in the actuarial control cycle is less effective [\u00bd]"}, {"section": "Solution", "text": "There may be mis-selling risk if there is a breakdown in communication between sales and claims management [\u00bd]"}, {"section": "Solution", "text": "The capital requirements may be higher under the arrangement for counterparty risk e.g. the specialist insurer may default [\u00bd]"}, {"section": "Solution", "text": "The specialist insurer will want to ensure it meets its own profit requirements so it is likely the company will be passing a material share of the profits on the business written to the specialist insurer [\u00bd]"}, {"section": "Solution", "text": "Operationally, the arrangement may be cumbersome [\u00bd]"}, {"section": "Solution", "text": "For example, it may be more difficult to resolve problems when they occur across two companies [\u00bd]"}]}, {"id": "202109_Q2(iv)", "sitting": "September 2021", "yymmkey": "202109", "ref": "Q2(iv)", "marks": 9, "all_themes": ["Capital & Solvency", "Investments", "Pricing & Rating", "Regulation", "Reserving & Valuation", "Risk Management & Capital", "Underwriting"], "products": ["General/Mixed"], "question_text": "Company X is subject to the Solvency II regulatory regime and calculates its Solvency Capital Requirement (SCR) using the standard formula approach.\nA Board member of Company X has expressed concerns about the impact of the new product and the proposed badging arrangement on the company\u2019s SCR.\nDiscuss the potential implications of launching the new product with a badging arrangement on each of the risk modules of Company X\u2019s Solvency II SCR.\n[Total 32]\n\u20135", "scenario": "A health and care insurance company, Company X, is looking to launch a new product. The product will provide both:\n\uf0b7 a fixed cash lump sum \uf0b7 a regular monthly income to university students who are diagnosed with any one of a list of medical conditions while they are studying for a university degree. Initial market research of current students and their parents suggests a perceived need for insurance cover:\n\uf0b7 for immediate adaptation to facilitate continued presence at university \uf0b7 to cover the s", "bullets": [{"section": "Solution", "text": "Need to consider the potential implications on all the risk groups that the SCR has to cover: Non-life underwriting risk Life underwriting risk Health underwriting risk Market risk Counterparty default risk Operational risk [\u00bd mark awarded for any two relevant risks, 1 mark for any four relevant risk]"}]}, {"id": "202109_Q3(i)", "sitting": "September 2021", "yymmkey": "202109", "ref": "Q3(i)", "marks": 3, "all_themes": ["Capital & Solvency", "Group Products", "Income Protection", "Pricing", "Private Medical Insurance (PMI)"], "products": ["Private Medical Insurance (PMI)", "Income Protection", "Group Products"], "question_text": "Describe how the current arrangements may increase health inequalities in Country B.", "scenario": "Following the widespread outbreak of a new disease in some countries around the globe, an international health promotion body is emphasising the need for countries to provide health coverage:\n\uf0b7 to everyone in the population.\n\uf0b7 at an affordable cost, so everyone can access healthcare without being pushed into poverty.\n\uf0b7 with sufficient availability of services to improve the population\u2019s health.\nThe only healthcare provision in Country B comprises:\nA voluntary group cover:\n\uf0b7 for employees of priv", "bullets": [{"section": "Solution", "text": "Coverage in society It is not clear that children are covered in society [\u00bd]"}, {"section": "Solution", "text": "Or other unemployed e.g. spouses who are not poor adult qualified [\u00bd]"}, {"section": "Solution", "text": "Or the retired population [\u00bd]"}, {"section": "Solution", "text": "Are there any employers that are non-private and non-government? [\u00bd]"}, {"section": "Solution", "text": "At an affordable cost Those employed by private companies may be better able to afford the provision [\u00bd]"}, {"section": "Solution", "text": "The unemployed may still end up in poverty if they face large medical bills for treatment if the cash payments do not fully cover the cost of treatment [\u00bd]"}, {"section": "Solution", "text": "The poor only have some costs covered, not all. Co-insurance may drive this group into poverty [\u00bd]"}, {"section": "Solution", "text": "Government staff may have the same level of benefits as private staff but are required to pay more; this may be in combination with lower salaries [\u00bd]"}, {"section": "Solution", "text": "Private employer staff need to pay for premiums after tax which in affect makes them more expensive than pre-tax (as seen for government staff) [\u00bd]"}, {"section": "Solution", "text": "The cost of cover for lower paid employees may be a much higher proportion of income than would be the case for higher paid [\u00bd]"}, {"section": "Solution", "text": "The lowest paid employees may not be able to afford the premiums for the voluntary group cover and could be forced to opt out [\u00bd]"}, {"section": "Solution", "text": "Access to services Those employed have greater access than the poor unemployed adults [\u00bd]"}, {"section": "Solution", "text": "There is no access to cancer services for private employees [\u00bd]"}, {"section": "Solution", "text": "So they could face large bills if they have cancer which would not be the case for the government staff. [\u00bd]"}]}, {"id": "202109_Q3(ii)", "sitting": "September 2021", "yymmkey": "202109", "ref": "Q3(ii)", "marks": 3, "all_themes": ["Capital & Solvency", "Income Protection", "Pricing", "Private Medical Insurance (PMI)"], "products": ["Income Protection", "Private Medical Insurance (PMI)"], "question_text": "The government in Country B has decided that the international body\u2019s criteria should be met. A state healthcare provision will be created, delivered and be operating within\n18 months\u2019 time. The next election is in 12 months\u2019 time.\nDescribe the objectives the government may be trying to achieve following the outbreak of the new disease.", "scenario": "Following the widespread outbreak of a new disease in some countries around the globe, an international health promotion body is emphasising the need for countries to provide health coverage:\n\uf0b7 to everyone in the population.\n\uf0b7 at an affordable cost, so everyone can access healthcare without being pushed into poverty.\n\uf0b7 with sufficient availability of services to improve the population\u2019s health.\nThe only healthcare provision in Country B comprises:\nA voluntary group cover:\n\uf0b7 for employees of priv", "bullets": [{"section": "Solution", "text": "Protect the nation\u2019s health Following a shock to mortality and morbidity with the outbreak [\u00bd]"}, {"section": "Solution", "text": "A healthy population are more productive [\u00bd]"}, {"section": "Solution", "text": "This may help increase GDP and tax revenues after the outbreak [\u00bd]"}, {"section": "Solution", "text": "Social, political and cultural promises Given the election there may be a push to retain voters, after the economic impact of a global outbreak [\u00bd]"}, {"section": "Solution", "text": "The government may be trying to fulfil an election promise made at the last election [\u00bd]"}, {"section": "Solution", "text": "It may be a norm in other countries to provide cover so the country is aiming to attain global standards [\u00bd]"}, {"section": "Solution", "text": "To be aligned to the international organisation\u2019s objectives, for favourable terms if funding is available [\u00bd]"}, {"section": "Solution", "text": "Redistribution of wealth Seeking to reduce health inequalities [\u00bd]"}, {"section": "Solution", "text": "The government may be seeking to reduce poverty in the population [\u00bd]"}, {"section": "Solution", "text": "And to protect/subsidise the poor [\u00bd]"}]}, {"id": "202109_Q3(iii)", "sitting": "September 2021", "yymmkey": "202109", "ref": "Q3(iii)", "marks": 6, "all_themes": ["Capital & Solvency", "Income Protection", "Pricing", "Private Medical Insurance (PMI)", "Regulation"], "products": ["Private Medical Insurance (PMI)", "Income Protection"], "question_text": "\u20136 The government has now decided to extend provision C (the comprehensive medical insurance cover system) to cover all members of the population. The enhanced system will be a \u2018pay-as-you-go\u2019 system funded through general income tax revenue.\nDescribe the stages the government will need to go through to establish the funding of this system.", "scenario": "Following the widespread outbreak of a new disease in some countries around the globe, an international health promotion body is emphasising the need for countries to provide health coverage:\n\uf0b7 to everyone in the population.\n\uf0b7 at an affordable cost, so everyone can access healthcare without being pushed into poverty.\n\uf0b7 with sufficient availability of services to improve the population\u2019s health.\nThe only healthcare provision in Country B comprises:\nA voluntary group cover:\n\uf0b7 for employees of priv", "bullets": [{"section": "Solution", "text": "Establish degree of state subsidy Will the state fund the scheme for all in the population or all paying tax (i.e. will the unemployed, children and the elderly be covered) [\u00bd]"}, {"section": "Solution", "text": "Does general taxation include corporate and individual income tax [\u00bd]"}, {"section": "Solution", "text": "The cost will depend on what services will be subsidised [\u00bd]"}, {"section": "Solution", "text": "E.g. will it be the same as the current provision for government employees [\u00bd]"}, {"section": "Solution", "text": "Estimate coming years\u2019 outgo Use previous years\u2019 utilisation to estimate the coming years\u2019 outgo [\u00bd]"}, {"section": "Solution", "text": "With adjustments for more recent changes [\u00bd]"}, {"section": "Solution", "text": "If there has been an outbreak the morbidity rates may be higher leading to increased demand [\u00bd]"}, {"section": "Solution", "text": "If the increased mortality of the outbreak may have biased the survivor profile of the population to healthier [\u00bd]"}, {"section": "Solution", "text": "Estimate coming year\u2019s tax revenue Use previous years\u2019 tax revenues to estimate the coming years\u2019 tax revenue [\u00bd]"}, {"section": "Solution", "text": "Alter for the worsening economic conditions which may be reducing employment levels [\u00bd]"}, {"section": "Solution", "text": "There may be a nationwide reduction in pay, which will reduce income levels and so taxation [\u00bd]"}, {"section": "Solution", "text": "Adjust the tax structure to cover the expected outgo to the extent desired Not all people in society will be paying tax, so the tax rates charged to some will need to be sufficient to cover the health costs for all [\u00bd]"}, {"section": "Solution", "text": "The government may decide to charge wealthier individuals a greater rate of tax to redistribute wealth [\u00bd]"}, {"section": "Solution", "text": "And reduce health inequalities [\u00bd]"}, {"section": "Solution", "text": "The government will need to look at the affordability of the scheme to the government and the individual [\u00bd]"}, {"section": "Solution", "text": "If scheme is not affordable for the government it may require additional contributions from some/all individuals in the scheme [\u00bd]"}, {"section": "Solution", "text": "But could offer tax incentives on contributions [\u00bd]"}, {"section": "Solution", "text": "If the cost of the scheme is unaffordable to the individual then the government could consider reducing some of the benefits [\u00bd]"}, {"section": "Solution", "text": "The government may need to go through a number of iterations to get the right overall level of cost/benefits for the scheme [\u00bd]"}]}, {"id": "202109_Q3(iv)", "sitting": "September 2021", "yymmkey": "202109", "ref": "Q3(iv)", "marks": 21, "all_themes": ["Capital & Solvency", "Claims Management", "Data", "Group Products", "Income Protection", "Investments", "Models", "Pricing", "Private Medical Insurance (PMI)", "Product Design", "Regulation", "Reinsurance", "Reserving & Valuation", "Risk Management & Capital", "Underwriting"], "products": ["Private Medical Insurance (PMI)", "Income Protection", "Group Products"], "question_text": "A leading insurer for provision A (voluntary group cover) has decided to abandon the sale of new group private medical insurance business and replace this by offering group income protection.\nOutline the changes that will be experienced by each department in the insurance company resulting from this change in the group product offering.\n[Total 33]\nEND OF PAPER", "scenario": "Following the widespread outbreak of a new disease in some countries around the globe, an international health promotion body is emphasising the need for countries to provide health coverage:\n\uf0b7 to everyone in the population.\n\uf0b7 at an affordable cost, so everyone can access healthcare without being pushed into poverty.\n\uf0b7 with sufficient availability of services to improve the population\u2019s health.\nThe only healthcare provision in Country B comprises:\nA voluntary group cover:\n\uf0b7 for employees of priv", "bullets": [{"section": "Solution", "text": "Claims Different type of claim [\u00bd]"}, {"section": "Solution", "text": "Different type of fraud risk [\u00bd]"}, {"section": "Solution", "text": "No longer dealing with providers as income is paid direct to the policyholder [\u00bd]"}, {"section": "Solution", "text": "However still medical based triggers [\u00bd]"}, {"section": "Solution", "text": "But now triggers of claim are such as ADLs rather than medical service provision [\u00bd]"}, {"section": "Solution", "text": "There will no longer be an excess to minimise claims payments [\u00bd]"}, {"section": "Solution", "text": "Marketing Need to retrain to understand the different risk from the customer\u2019s point of view [\u00bd]"}, {"section": "Solution", "text": "More effort to sell the product as need to establish a need compared to PMI [\u00bd]"}, {"section": "Solution", "text": "Still marketing to employers [\u00bd]"}, {"section": "Solution", "text": "There may be demand from government employers on group IP; previously these were not interested in group PMI [\u00bd]"}, {"section": "Solution", "text": "Sales May require more work to establish \u2018the need\u2019 for insurance in the customers\u2019 mind [\u00bd]"}, {"section": "Solution", "text": "Still selling direct to employers [\u00bd]"}, {"section": "Solution", "text": "Have relationship with the employers in the country [\u00bd]"}, {"section": "Solution", "text": "There is no other provision in the market so employers are likely to be interested [\u00bd]"}, {"section": "Solution", "text": "Could still have sales as part of a flexi-benefit package [\u00bd]"}, {"section": "Solution", "text": "IT Need to set up new systems, e.g. to allow for repeated payments to policyholders [\u00bd]"}, {"section": "Solution", "text": "Leverage infrastructure to share data from employers [\u00bd]"}, {"section": "Solution", "text": "Product design/pricing There will a lot of work to set up the product design [\u00bd]"}, {"section": "Solution", "text": "The pricing team will be accustomed to setting group premiums [\u00bd]"}, {"section": "Solution", "text": "Need to gather new data on employment levels [\u00bd]"}, {"section": "Solution", "text": "And also on duration of sicknesses [\u00bd]"}, {"section": "Solution", "text": "Will need to set the product claim definitions such as ADLs, FATs [\u00bd]"}, {"section": "Solution", "text": "Will need to set the benefit terms (as no longer indemnity) e.g. fixed or increasing [\u00bd]"}, {"section": "Solution", "text": "If increasing, with which index [\u00bd]"}, {"section": "Solution", "text": "Claims will be long-term, leading to additional considerations such as regular checks on claims eligibility [\u00bd]"}, {"section": "Solution", "text": "Understand the product variants, not previously experienced, including: [\u00bd]"}, {"section": "Solution", "text": "Replacement ratio [\u00bd]"}, {"section": "Solution", "text": "Deferred period [\u00bd]"}, {"section": "Solution", "text": "Linked-claims period [\u00bd]"}, {"section": "Solution", "text": "Partial/proportional benefits [\u00bd]"}, {"section": "Solution", "text": "Understand the product variants, altered or no longer applicable to PMI, including: [\u00bd]"}, {"section": "Solution", "text": "Claim notification period \u2013 similar concept to PMI but PMI might have been pre- approval which will not apply to IP [\u00bd]"}, {"section": "Solution", "text": "Excesses and NCD are no longer an appropriate feature [\u00bd]"}, {"section": "Solution", "text": "The pricing team may be familiar with continuation of cover pricing as a similar benefit can be provided on group PMI [\u00bd]"}, {"section": "Solution", "text": "Just as there are some basic variation of PMI, they may want to consider creating a basic IP that covers accidents only [\u00bd]"}, {"section": "Solution", "text": "Reserving Different claims payment profile over the year [\u00bd]"}, {"section": "Solution", "text": "Still short-term liabilities (non-episodic, now continuous) [\u00bd]"}, {"section": "Solution", "text": "There are more options on IP, such as waiver of premium, which may increase the reserves [\u00bd]"}, {"section": "Solution", "text": "Customer services Need to retrain for the new product [\u00bd]"}, {"section": "Solution", "text": "Still related to health [\u00bd]"}, {"section": "Solution", "text": "Need to know more about pre/post tax benefit payments as no longer indemnity product [\u00bd]"}, {"section": "Solution", "text": "More ongoing customer interaction for those in claim as no longer indemnity [\u00bd]"}, {"section": "Solution", "text": "No longer provide list of approved providers [\u00bd]"}, {"section": "Solution", "text": "May provide rehabilitation benefit [\u00bd]"}, {"section": "Solution", "text": "Accounting/finance The nature of the claims may be longer term so accounting disclosures may vary [\u00bd]"}, {"section": "Solution", "text": "Underwriting Need to learn how to undertake financial underwriting on IP [\u00bd]"}, {"section": "Solution", "text": "Still interested on pre-existing conditions [\u00bd]"}, {"section": "Solution", "text": "Still apply knowledge of medical based underwriting for pre-existing conditions [\u00bd]"}, {"section": "Solution", "text": "More underwriting at claims stage [\u00bd]"}, {"section": "Solution", "text": "Less underwriting at points of sales [\u00bd]"}, {"section": "Solution", "text": "Actuarial Still set premiums on annual basis at group level [\u00bd]"}, {"section": "Solution", "text": "May need to seek technical expertise from the reinsurer [\u00bd]"}, {"section": "Solution", "text": "Need to negotiate reinsurance for group IP [\u00bd]"}, {"section": "Solution", "text": "Need to unwind reinsurance treaties for group PMI [\u00bd]"}, {"section": "Solution", "text": "Need to set all assumptions for the product [\u00bd]"}, {"section": "Solution", "text": "Need to calculate the claims reserves for those in claim, likely to be more material than PMI [\u00bd]"}, {"section": "Solution", "text": "The capital model will need to be adjusted to determine the new capital requirements [\u00bd]"}, {"section": "Solution", "text": "These may be different e.g. as more similar to a life insurance product than PMI so different techniques may be required to be used [\u00bd]"}, {"section": "Solution", "text": "Compliance Seek approval from the regulator to sell a different product [\u00bd]"}, {"section": "Solution", "text": "Ensure that TCF is considered [\u00bd]"}, {"section": "Solution", "text": "Legal Draft changes to policy terms and conditions [\u00bd]"}, {"section": "Solution", "text": "Assess new reinsurance treaties [\u00bd]"}, {"section": "Solution", "text": "Review the application to the regulator for a new product [\u00bd]"}, {"section": "Solution", "text": "Internal audit Need to review proposals for pricing, claims, underwriting etc to ensure they are satisfactory and appropriate [\u00bd]"}, {"section": "Solution", "text": "Risk management Operation risks will be high given the level of changes [\u00bd]"}, {"section": "Solution", "text": "Need to set up new reinsurance treaty [\u00bd]"}, {"section": "Solution", "text": "Investment May not experience much difference as both are group policies so short-term liabilities [\u00bd]"}, {"section": "Solution", "text": "However, if a claim starts, it could be long-term so there will be a need for longer-term assets [\u00bd]"}, {"section": "Solution", "text": "The development costs may require a disinvestment from longer term assets [\u00bd]"}, {"section": "Solution", "text": "A review of the investment policy will be required [\u00bd]"}, {"section": "Solution", "text": "Board/senior management May need to find new Non-executive directors with experience in IP [\u00bd]"}, {"section": "Solution", "text": "There may be a change to the risk appetite given the change to the risks held and that these are new [\u00bd]"}, {"section": "Solution", "text": "Set a new business strategy and profitability criteria [\u00bd]"}]}, {"id": "202204_Q1(i)", "sitting": "April 2022", "yymmkey": "202204", "ref": "Q1(i)", "marks": 5, "all_themes": ["Capital & Solvency", "Claims Management", "Critical Illness", "Group Products", "Pricing", "Product Design", "Regulation", "Reinsurance", "Risk Management & Capital", "Underwriting"], "products": ["Critical Illness", "Group Products"], "question_text": "Discuss how an increase in lapses could adversely affect the insurance company.", "scenario": "A health and care insurance company sells group and individual Critical Illness (CI)\nbusiness in Country A. The insurance company\u2019s customer helpline has been experiencing a large increase in calls from policyholders looking to lapse their individual CI policies. The most common reason given for lapsing is uncertainty over future employment and income levels due to a recent economic recession. Many policyholders are therefore looking to save money by stopping paying the premiums on their CI poli", "bullets": [{"section": "Solution", "text": "Anti-selection will be a significant concern [\u00bd]"}, {"section": "Solution", "text": "When considering lapse behaviour, anti-selection is considered in terms of selective lapsing [\u00bd]"}, {"section": "Solution", "text": "Those policyholders less likely to experience, and so claim, for critical illness may lapse [\u00bd]"}, {"section": "Solution", "text": "Leaving a pool of lives who would have worse claims experience than that priced for [\u00bd]"}, {"section": "Solution", "text": "Leading to lower profits [\u00bd]"}, {"section": "Solution", "text": "or increased losses [\u00bd]"}, {"section": "Solution", "text": "Policyholders may lapse early before the H&C insurer has had a chance to recoup the initial costs in setting up the policy (i.e. initial expenses and commission payments) [\u00bd]"}, {"section": "Solution", "text": "If the size of the in force business reduces, the insurer may not be able to cover its fixed costs which will be spread over all its business [\u00bd]"}, {"section": "Solution", "text": "Having a smaller number of policies in force also reduces scope for economies of scale, e.g. spreading the fixed costs of IT systems. [\u00bd]"}, {"section": "Solution", "text": "There may be an increase in admin expenses in processing lapses [\u00bd]"}, {"section": "Solution", "text": "Lapse and re-entry: Some policyholders may lapse to take out cheaper policies which may be less profitable [\u00bd]"}, {"section": "Solution", "text": "If distributors encourage churning, there may be an increase in administrative expenses [\u00bd]"}, {"section": "Solution", "text": "And may also lead to extra commission payments [\u00bd]"}, {"section": "Solution", "text": "However, if the commission structure includes a return of a proportion of the commission, then this impact may be minimised [\u00bd]"}, {"section": "Solution", "text": "If many lapses occur, distributors may lose income. This may put strain on the distributors, causing pressures to increase sales or mis-sell which could cause reputational damage to the insurer [\u00bd]"}, {"section": "Solution", "text": "Large scale lapsing may lead to reputational issues where these cannot be processed in time [\u00bd]"}, {"section": "Solution", "text": "Large scale lapsing could result in increased scrutiny from the regulator [\u00bd]"}, {"section": "Solution", "text": "Overall, the increased lapses may lead to a higher risk of insolvency for the insurer [\u00bd]"}, {"section": "Solution", "text": "With less policies in the book, reinsurance premiums may reduce which would lessen the impact on profit [\u00bd]"}, {"section": "Solution", "text": "However, the reinsurer is likely to consider the selective lapsing so the reinsurance premium could become more expensive per policy [\u00bd]"}, {"section": "Solution", "text": "Increased lapses may mean a profit cannot be made from these policies [\u00bd]"}, {"section": "Solution", "text": "If the insurer needed to increase its volume of business, it may involve diverting capital to marketing spend [\u00bd]"}, {"section": "Solution", "text": "Companies could end up winding up their group policies voluntarily or through bankruptcy [\u00bd]"}, {"section": "Solution", "text": "which depending on the size of the group policy could be significant for the insurer. [\u00bd]"}, {"section": "Solution", "text": "The insurer may need to increase premiums to reflect the poorer lives remaining, this may put pressure on those who retain their policies to also lapse [\u00bd]"}, {"section": "Solution", "text": "This would be a negative downward cycle each time premiums are set [\u00bd]"}, {"section": "Solution", "text": "This would not impact guaranteed premiums to the same extent, so the impact on the insurer will depend how many premiums are reviewable vs guaranteed [\u00bd]"}, {"section": "Solution", "text": "The insurer may have to dis-invest some assets if there is any surrender value on the individual CI business [\u00bd]"}, {"section": "Solution", "text": "The insurer may need to dis-invest assets with the reduced premium income affecting short-term asset availability [\u00bd]"}, {"section": "Solution", "text": "These may not be at favourable rates given the economic downturn is likely to affect asset prices, this would impact the insurers profitability further [\u00bd]"}, {"section": "Solution", "text": "The insurer may need to re-train staff to work in retention teams, this will involve an expense [\u00bd]"}, {"section": "Solution", "text": "Redeployment of staff may have an opportunity cost if taken away from say they sales teams [\u00bd]"}, {"section": "Solution", "text": "The insurer will need to monitor the lapse behaviour for risk management purposes more frequently, taken staff time away from other areas like product development [\u00bd]"}, {"section": "Solution", "text": "Systems may not be robust to a large number of lapses, such as long call waiting times, causing reputational damage [\u00bd]"}, {"section": "Solution", "text": "Administration of policies may be outsourced to a third party and so may require additional fees for additional service levels [\u00bd]"}, {"section": "Solution", "text": "If the lapsing behaviour is similar across all competitors, the impact may be similar to other insurers [\u00bd]"}, {"section": "Solution", "text": "However, if the lapsing behaviour is worse for this insurer, it will be detrimental to their performance after the recession [\u00bd]"}, {"section": "Solution", "text": "Other insurers may be able to withstand a downward pressure on premium better. Perhaps by having a parent company that resides outside of Country A. [\u00bd]"}]}, {"id": "202204_Q1(ii)", "sitting": "April 2022", "yymmkey": "202204", "ref": "Q1(ii)", "marks": 9, "all_themes": ["Capital & Solvency", "Critical Illness", "Group Products", "Pricing", "Product Design", "Professional Guidance", "Regulation", "Underwriting"], "products": ["Critical Illness", "Group Products"], "question_text": "Suggest possible actions the insurance company could take to minimise the incidence and the impact of adverse lapse behaviour for:\n(a) the existing policies.\n(b) new policies.", "scenario": "A health and care insurance company sells group and individual Critical Illness (CI)\nbusiness in Country A. The insurance company\u2019s customer helpline has been experiencing a large increase in calls from policyholders looking to lapse their individual CI policies. The most common reason given for lapsing is uncertainty over future employment and income levels due to a recent economic recession. Many policyholders are therefore looking to save money by stopping paying the premiums on their CI poli", "bullets": [{"section": "Solution", "text": "On existing policies Ensure the company has a customer retention strategy in place for existing business. [\u00bd]"}, {"section": "Solution", "text": "Train and increase effectiveness of the retention team [\u00bd]"}, {"section": "Solution", "text": "Regular monitoring of business mix and experience [\u00bd]"}, {"section": "Solution", "text": "Write to all policyholders outlining the benefits their policy provides to the policyholder [\u00bd]"}, {"section": "Solution", "text": "Could offer incentives to the most profitable subgroups [\u00bd]"}, {"section": "Solution", "text": "Provide more flexible options to younger policyholders [\u00bd]"}, {"section": "Solution", "text": "Provide more flexible options based on duration of policy (shorter duration policies cancelling will impact profitability more) [\u00bd]"}, {"section": "Solution", "text": "If economic recovery expected to occur shortly may be able to offer reduction in premiums (or delay) for a short period [\u00bd]"}, {"section": "Solution", "text": "Approach distributors to minimise pressures to churn business [\u00bd]"}, {"section": "Solution", "text": "Could add benefits like child cover, tiered payments, TPD, or terminal illness [\u00bd]"}, {"section": "Solution", "text": "Could offer to amend inflationary/increasing benefits for fixed benefits to reduce the premium [\u00bd]"}, {"section": "Solution", "text": "In some cases the additional premium paid to date may \u2018pay-up\u2019 the policy in full on a fixed basis [\u00bd]"}, {"section": "Solution", "text": "Could reduce the sum assured to reduce the premium [\u00bd]"}, {"section": "Solution", "text": "In some cases the additional premium paid to date may \u2018pay-up\u2019 the policy in full on a lower sum assured [\u00bd]"}, {"section": "Solution", "text": "Could aim to reduce expenses (e.g. by outsourcing). [\u00bd]"}, {"section": "Solution", "text": "On new policies Improve pricing such that the level of anti-selection is reduced [\u00bd]"}, {"section": "Solution", "text": "Alter pricing to allow for increased lapse risk and the associated costs [\u00bd]"}, {"section": "Solution", "text": "Consider reviewable premiums [\u00bd]"}, {"section": "Solution", "text": "Carry out regular monitoring of business and mix experience. [\u00bd]"}, {"section": "Solution", "text": "Alter commission terms to reduce lapses through churning by distributors. [\u00bd]"}, {"section": "Solution", "text": "Reduce commission to reduce expenses and lower premiums. [\u00bd]"}, {"section": "Solution", "text": "Ensure appropriate sales training with own staff and distributors such that policyholders are happier with the product long term. [\u00bd]"}, {"section": "Solution", "text": "Stop selling to advisors that have unacceptable lapse rates. [\u00bd]"}, {"section": "Solution", "text": "Add in additional benefits that may be cheap to provide but valued by potential customers (e.g. tests, screening). [\u00bd]"}, {"section": "Solution", "text": "Change or reduce the range of illnesses covered, other than those that might be required by regulation, to reduce premiums. [\u00bd]"}, {"section": "Solution", "text": "Consider a marketing campaign to promote advantages of CI cover, particularly if there are little or no state benefits payable. [\u00bd]"}, {"section": "Solution", "text": "Target employers and individuals working in areas less affected by the recession. [\u00bd]"}, {"section": "Solution", "text": "For group cover offer some form of profit sharing. [\u00bd]"}, {"section": "Solution", "text": "Reduce or remove surrender benefits, to minimise incentives for lapsing. [\u00bd]"}, {"section": "Solution", "text": "Price in a payment holiday option in the product design. [\u00bd]"}, {"section": "Solution", "text": "Regularly check competitors\u2019 equivalent products to make sure insurer\u2019s terms and premiums are not out of line with the market. [\u00bd]"}, {"section": "Solution", "text": "[Max marks for this part 5]"}]}, {"id": "202204_Q1(iii)", "sitting": "April 2022", "yymmkey": "202204", "ref": "Q1(iii)", "marks": 5, "all_themes": ["Capital & Solvency", "Critical Illness", "Pricing", "Underwriting"], "products": ["Critical Illness"], "question_text": "For individual CI policies, the only option currently available to policyholders who wish to stop paying their CI premiums is to lapse their policy. The insurance company\u2019s Board has asked the Chief Actuary to consider the implications of its proposal to introduce the following two alternative options for individual policyholders:\nOption A:\nA premium holiday \u2013 where premiums cease for a period, with no later collection of any premiums missed by the policyholder.\nOption B:\nA delay to premiums \u2013 where premiums cease for a period, but the policyholder will be required to pay any missing premiums at a later date.\nOutline the advantages and disadvantages to the insurance company of each of the two proposed options compared to the current option to lapse.", "scenario": "A health and care insurance company sells group and individual Critical Illness (CI)\nbusiness in Country A. The insurance company\u2019s customer helpline has been experiencing a large increase in calls from policyholders looking to lapse their individual CI policies. The most common reason given for lapsing is uncertainty over future employment and income levels due to a recent economic recession. Many policyholders are therefore looking to save money by stopping paying the premiums on their CI poli", "bullets": [{"section": "Solution", "text": "Proposed options Advantages Longer term implications of a lapse are not felt [\u00bd]"}, {"section": "Solution", "text": "Retain customer base [\u00bd]"}, {"section": "Solution", "text": "Maintain good public relations [\u00bd]"}, {"section": "Solution", "text": "No need to market to resell policies after the holiday [\u00bd]"}, {"section": "Solution", "text": "Specific to B premium income to meet expense will be recouped but at a later point [\u00bd]"}]}, {"id": "202204_Q1(iv)", "sitting": "April 2022", "yymmkey": "202204", "ref": "Q1(iv)", "marks": 5, "all_themes": ["Capital & Solvency", "Critical Illness", "Pricing", "Underwriting"], "products": ["Critical Illness"], "question_text": "The insurance company\u2019s Chief Actuary has stated that they have a professional duty to act in the public interest, and that there are many stakeholders affected by the Board\u2019s proposal.\nOutline, for each of the following stakeholders, why they have an interest in the options available:\n(a) the insurance company\u2019s shareholders\n(b) the individual policyholders\n(c) the government\n(d) distributors (e)\nthe insurance company\u2019s staff.", "scenario": "A health and care insurance company sells group and individual Critical Illness (CI)\nbusiness in Country A. The insurance company\u2019s customer helpline has been experiencing a large increase in calls from policyholders looking to lapse their individual CI policies. The most common reason given for lapsing is uncertainty over future employment and income levels due to a recent economic recession. Many policyholders are therefore looking to save money by stopping paying the premiums on their CI poli", "bullets": [{"section": "Solution", "text": "Insurer\u2019s shareholders Shareholders are the investors in the business interest. They will want the insurer to be profitable [\u00bd]"}, {"section": "Solution", "text": "They will want profitability on the existing book [\u00bd]"}, {"section": "Solution", "text": "They will want continued profitability in the future with more sales [\u00bd]"}, {"section": "Solution", "text": "Some options may affect returns short term but less so longer term [\u00bd]"}, {"section": "Solution", "text": "Mass lapse may worsen experience of the portfolio reducing shareholder return [\u00bd]"}]}, {"id": "202204_Q1(v)", "sitting": "April 2022", "yymmkey": "202204", "ref": "Q1(v)", "marks": 4, "all_themes": ["Capital & Solvency", "Critical Illness", "Group Products", "Pricing", "Regulation", "Underwriting"], "products": ["Critical Illness", "Group Products"], "question_text": "\u20133 For group CI policies sold to employers, there is no option to lapse during the policy year. The insurance company will adjust the premiums paid on each group policy to reflect changes in the risk exposure during the policy year. The premium adjustment for a group CI policy over a policy year works as follows:\n\uf0b7 A premium is agreed at the start of the policy year and paid by the employer, either in advance or monthly.\n\uf0b7 At the end of the policy year, the employer provides the insurance company with a count of its employees and a summary of their demographic profile.\n\uf0b7 The insurance company makes an assumption that employees joined or left employment at a uniform rate throughout the policy year.\n\uf0b7 The insurance company then calculates an updated risk exposure for the policy year.\n\uf0b7 The insurance company determines the premium adjustment given the updated risk exposure, and this adjustment is applied, either as a return of premium or increase in premium, to the next policy year\u2019s premium.\nDue to the economic recession, a high number of redundancies are occurring in Country A. The Head of Underwriting has suggested that the risk underlying many group CI policies may change significantly during the next policy year. The Chief Actuary has stated that the existing method of adjusting premiums is generally considered appropriate but has suggested further consideration given the unusual conditions this year.\nOutline the factors that should be considered when assessing the amount of the return of the premium by:\n(a) the insurance company.\n(b) the employer.", "scenario": "A health and care insurance company sells group and individual Critical Illness (CI)\nbusiness in Country A. The insurance company\u2019s customer helpline has been experiencing a large increase in calls from policyholders looking to lapse their individual CI policies. The most common reason given for lapsing is uncertainty over future employment and income levels due to a recent economic recession. Many policyholders are therefore looking to save money by stopping paying the premiums on their CI poli", "bullets": [{"section": "Solution", "text": "The insurer Return of premiums Will need to account for adverse selection in redundancy. [\u00bd]"}, {"section": "Solution", "text": "i.e. younger/healthier people more likely to be kept on [\u00bd]"}, {"section": "Solution", "text": "How affected is the company by economic down turn in the short, medium and longer term. [\u00bd]"}, {"section": "Solution", "text": "The opportunity to increases sales in sectors less affected by economic downturn. [\u00bd]"}, {"section": "Solution", "text": "Will need to consider the update to the business mix, e.g. multi-morbidity, ethnicity/race, socioeconomics, gender, age. [\u00bd]"}, {"section": "Solution", "text": "How many months into the annual group policy did the redundancies occur. [\u00bd]"}, {"section": "Solution", "text": "Need to consider the existing contract terms. [\u00bd]"}, {"section": "Solution", "text": "Need to take account of the reinsurers view. [\u00bd]"}, {"section": "Solution", "text": "And any regulatory requirements. [\u00bd]"}, {"section": "Solution", "text": "Treating customers fairly. [\u00bd]"}, {"section": "Solution", "text": "Will need to consider any industry standards on calculation methodology. [\u00bd]"}, {"section": "Solution", "text": "Could consider how its own methodology compares to competitors. [\u00bd]"}]}, {"id": "202204_Q1(vi)", "sitting": "April 2022", "yymmkey": "202204", "ref": "Q1(vi)", "marks": 8, "all_themes": ["Capital & Solvency", "Critical Illness", "Data", "Group Products", "Pricing", "Underwriting"], "products": ["Critical Illness", "Group Products"], "question_text": "Discuss the factors that should be considered when negotiating next year's group CI policy premium by:\n(a) the insurance company.\n(b) the employer.", "scenario": "A health and care insurance company sells group and individual Critical Illness (CI)\nbusiness in Country A. The insurance company\u2019s customer helpline has been experiencing a large increase in calls from policyholders looking to lapse their individual CI policies. The most common reason given for lapsing is uncertainty over future employment and income levels due to a recent economic recession. Many policyholders are therefore looking to save money by stopping paying the premiums on their CI poli", "bullets": [{"section": "Solution", "text": "The insurer Negotiating next year\u2019s premium. The insurer will want to retain profitable business. [\u00bd]"}, {"section": "Solution", "text": "Even if the business is less profitable, the insurer may seek to keep the business for diversification benefits or to increase accumulation of data for pricing. [\u00bd]"}, {"section": "Solution", "text": "In addition, it may be cheaper to retain existing business than locate new sales. [\u00bd]"}, {"section": "Solution", "text": "Need to consider the experience of this employer when negotiating the new premium. [\u00bd]"}, {"section": "Solution", "text": "If this book has poor experience, then less room for negotiation on price and benefits. [\u00bd]"}, {"section": "Solution", "text": "If this book has good experience, then more room for negotiation on price and benefits [\u00bd]"}, {"section": "Solution", "text": "Should they try to keep the business at normal rates or alter. [\u00bd]"}, {"section": "Solution", "text": "The willingness of the employer to shop around; some may be more price sensitive than others. [\u00bd]"}, {"section": "Solution", "text": "Consider the general direction of competitors pricing for this business. [\u00bd]"}, {"section": "Solution", "text": "Which benefits can be adjusted without affecting profitability. [\u00bd]"}, {"section": "Solution", "text": "Are these additional benefits perceived as beneficial to the employer and employees. [\u00bd]"}, {"section": "Solution", "text": "Alter the method for return of premium to better reflect the risk exposure over the year. [\u00bd]"}, {"section": "Solution", "text": "What are the take-up rates of the benefit with this employer and could they be improved to reduce adverse selection . [\u00bd]"}, {"section": "Solution", "text": "Increase underwriting beyond \u2018active in work\u2019 terms, if there is considered to be selective redundancies. [\u00bd]"}]}, {"id": "202204_Q1(vii)", "sitting": "April 2022", "yymmkey": "202204", "ref": "Q1(vii)", "marks": 2, "all_themes": ["Capital & Solvency", "Claims Management", "Critical Illness", "Investments", "Pricing", "Underwriting"], "products": ["Critical Illness"], "question_text": "The insurance company's Board has raised concerns that, with reduced premium income from the individual CI business, there may be a need to raise short-term liquidity by selling assets.\nList four short-term liabilities the insurance company could normally meet with premium income.", "scenario": "A health and care insurance company sells group and individual Critical Illness (CI)\nbusiness in Country A. The insurance company\u2019s customer helpline has been experiencing a large increase in calls from policyholders looking to lapse their individual CI policies. The most common reason given for lapsing is uncertainty over future employment and income levels due to a recent economic recession. Many policyholders are therefore looking to save money by stopping paying the premiums on their CI poli", "bullets": [{"section": "Solution", "text": "Claims payments [\u00bd]"}, {"section": "Solution", "text": "Claims expenses [\u00bd]"}, {"section": "Solution", "text": "Salary payments [\u00bd]"}, {"section": "Solution", "text": "Rents [\u00bd]"}, {"section": "Solution", "text": "Commission [\u00bd]"}, {"section": "Solution", "text": "Underwriting costs [\u00bd]"}, {"section": "Solution", "text": "Credit awarded for other relevant examples"}]}, {"id": "202204_Q1(viii)", "sitting": "April 2022", "yymmkey": "202204", "ref": "Q1(viii)", "marks": 3, "all_themes": ["Capital & Solvency", "Critical Illness", "Investments", "Pricing", "Reserving & Valuation", "Underwriting"], "products": ["Critical Illness"], "question_text": "With the ongoing economic uncertainty, the financial markets in Country A have been increasingly volatile. A number of investors in Country A have moved to hold \u2018safe- haven\u2019 assets such as gold, government-backed assets such as gilts and also cash-like instruments. There has been a corresponding increase in the price of these assets.\nDescribe the likely implications of increasing gilt prices on the value of the insurance company\u2019s liabilities.", "scenario": "A health and care insurance company sells group and individual Critical Illness (CI)\nbusiness in Country A. The insurance company\u2019s customer helpline has been experiencing a large increase in calls from policyholders looking to lapse their individual CI policies. The most common reason given for lapsing is uncertainty over future employment and income levels due to a recent economic recession. Many policyholders are therefore looking to save money by stopping paying the premiums on their CI poli", "bullets": [{"section": "Solution", "text": "The value of the liabilities will be affected by the discount rate used. [\u00bd]"}, {"section": "Solution", "text": "If a discount rate is derived based on the assets held, the impact will vary depending on the asset mix and the amount of gilts held. [\u00bd]"}, {"section": "Solution", "text": "If a market rate is used, the discount rate will be affected by the value of gilts. [\u00bd]"}, {"section": "Solution", "text": "Increasing gilt prices acts to reduce gilt yields. [\u00bd]"}, {"section": "Solution", "text": "Reduced gilt yields act to reduce the discount rate. [\u00bd]"}, {"section": "Solution", "text": "Reduced discount rates act to increase liabilities. [\u00bd]"}, {"section": "Solution", "text": "If the insurer mismatches its assets and liabilities, it may not be heavily affected by the change in bond yields. [\u00bd]"}, {"section": "Solution", "text": "Group CI is a short-term liability so fluctuating yields will have less impact on the value of group liabilities. [\u00bd]"}, {"section": "Solution", "text": "The liability value of long-term individual CI policies will be increase with decreasing long-term yields. [\u00bd]"}, {"section": "Solution", "text": "The effect on the value of the liabilities will be based on the duration to term of the policy. [\u00bd]"}, {"section": "Solution", "text": "Investment expenses may be linked to value of assets so may increase if holding \u2018safe-haven\u2019. [\u00bd]"}, {"section": "Solution", "text": "May be less likely to match assets to liabilities if price is too high, so then mismatch liability increases. [\u00bd]"}]}, {"id": "202204_Q1(ix)", "sitting": "April 2022", "yymmkey": "202204", "ref": "Q1(ix)", "marks": 7, "all_themes": ["Capital & Solvency", "Critical Illness", "Group Products", "Investments", "Pricing", "Regulation", "Reserving & Valuation", "Underwriting"], "products": ["Critical Illness", "Group Products"], "question_text": "Given the economic climate, and the anticipated change to the insurance company\u2019s cashflows, the Head of Investment is reviewing the insurance company\u2019s investment policy.\nDiscuss how the investment policy may need to be changed.", "scenario": "A health and care insurance company sells group and individual Critical Illness (CI)\nbusiness in Country A. The insurance company\u2019s customer helpline has been experiencing a large increase in calls from policyholders looking to lapse their individual CI policies. The most common reason given for lapsing is uncertainty over future employment and income levels due to a recent economic recession. Many policyholders are therefore looking to save money by stopping paying the premiums on their CI poli", "bullets": [{"section": "Solution", "text": "Cashflow = premium income - claim outgo - expense outgo + commission repayment - commission payment Premium income may reduce [\u00bd]"}, {"section": "Solution", "text": "Claim outgo - expectation may increase if selective lapse behaviour, less so if lapses minimised [\u00bd]"}, {"section": "Solution", "text": "Expenses - may increase on the administration of the policies [\u00bd]"}, {"section": "Solution", "text": "Commission repayment may come in if there are lapses [\u00bd]"}, {"section": "Solution", "text": "Any changes in investment policy should be considered with the Investment principles in mind [\u00bd]"}, {"section": "Solution", "text": "Nature The nature of the benefits has not changed [\u00bd]"}, {"section": "Solution", "text": "There may be a bias in the lapse behaviour [\u00bd]"}, {"section": "Solution", "text": "There are more standalone policy lapses than accelerated [\u00bd]"}, {"section": "Solution", "text": "There may be more fixed benefit policies remaining as the premiums are cheaper [\u00bd]"}, {"section": "Solution", "text": "Term Short-term assets may need to de-risk [\u00bd]"}, {"section": "Solution", "text": "Longer duration policies may be less likely to lapse. This would mean they are nearer the end of their term. More need for short-term assets which may be more volatile. [\u00bd]"}, {"section": "Solution", "text": "The longer-duration liabilities are more likely to cancel (new policies). This reduces the need for longer term assets. [\u00bd]"}, {"section": "Solution", "text": "Currency If only domestic investments are affected could diversify into assets in other countries [\u00bd]"}, {"section": "Solution", "text": "Liquidity Short term liquidity may be key without premium income. [\u00bd]"}, {"section": "Solution", "text": "The insurer may be forced to sell at inopportune time. [\u00bd]"}, {"section": "Solution", "text": "Review any triggers for selling in the policy e.g. down grading of bonds. [\u00bd]"}, {"section": "Solution", "text": "The above nature, term and currency considerations will need to be balanced with a desire to maximise the overall return on the assets. [\u00bd]"}, {"section": "Solution", "text": "This balance will depend, among other things, on the extent of the company\u2019s free assets and the company\u2019s appetite for risk. [\u00bd]"}, {"section": "Solution", "text": "The extent of the free assets may have changed, if the value of the liabilities has changed. [\u00bd]"}, {"section": "Solution", "text": "The company\u2019s appetite for risk may have changed during an increasingly volatile market. [\u00bd]"}, {"section": "Solution", "text": "Matching With a large number of policies cancelling, it may affect the duration of the liabilities and alter the duration of the matching assets. [\u00bd]"}, {"section": "Solution", "text": "If investing overseas to diversify away from Country A, this will have implications on the currency match. [\u00bd]"}, {"section": "Solution", "text": "Qualifying assets If there is a certain type of asset that qualifies under reserves, reserves are increasing but \u2018safe-haven\u2019 assets are in short supply, the qualifying assets may need to be reassessed [\u00bd]"}, {"section": "Solution", "text": "This may not be possible if set by regulation. [\u00bd]"}, {"section": "Solution", "text": "Free assets and appetite for risk There may be reduced appetite for risk in these uncertain times, meaning that the investment policy may become more risk averse. [\u00bd]"}, {"section": "Solution", "text": "If the reserves have increased, the level of free assets will have reduced. [\u00bd]"}, {"section": "Solution", "text": "This will work to increase matching, away from increasing returns. [\u00bd]"}]}, {"id": "202204_Q2(ii)", "sitting": "April 2022", "yymmkey": "202204", "ref": "Q2(ii)", "marks": 8, "all_themes": ["Capital & Solvency", "Claims Management", "Data", "Pricing", "Private Medical Insurance (PMI)", "Product Design", "Regulation", "Reinsurance", "Underwriting"], "products": ["Private Medical Insurance (PMI)"], "question_text": "Suggest possible actions that Company X could take to reduce the difference between actual and expected claims experience.", "scenario": "Country B has a private healthcare sector characterised by a small number of large hospital groups, of which Hospital A is one. Company X specialises in Private Medical Insurance (PMI) and is one of several health and care insurance companies that provide PMI cover in Country B.\nCompany X has recently carried out its annual experience review. The results show that the claims experience over the last 12 months has been worse than expected.", "bullets": [{"section": "Solution", "text": "Include margin in pricing for anti-selection [\u00bd]"}, {"section": "Solution", "text": "Or take actions aimed at reducing claim incidence [\u00bd]"}, {"section": "Solution", "text": "Or reducing the cost per claim [\u00bd]"}, {"section": "Solution", "text": "Could improve claim management processes, e.g. ensuring general practitioner referrals are in place [\u00bd]"}, {"section": "Solution", "text": "The insurer could conduct a review of benefit utilisation [\u00bd]"}, {"section": "Solution", "text": "And adjust the product design [\u00bd]"}, {"section": "Solution", "text": "For example: may need to limit number of physiotherapy visits [\u00bd]"}, {"section": "Solution", "text": "Or introduce higher deductibles [\u00bd]"}, {"section": "Solution", "text": "Or co-payments; [\u00bd]"}, {"section": "Solution", "text": "In the extreme, may remove benefits [\u00bd]"}, {"section": "Solution", "text": "The insurer could diversify the new business mix, e.g. by age, gender, location, distribution channel, individual/group etc [\u00bd]"}, {"section": "Solution", "text": "And target healthier groups [\u00bd]"}, {"section": "Solution", "text": "And introduce more stringent underwriting criteria [\u00bd]"}, {"section": "Solution", "text": "The insurer could incentivise policyholders to improve health [\u00bd]"}, {"section": "Solution", "text": "For example, through the provision of wearable devices which track exercise [\u00bd]"}, {"section": "Solution", "text": "The insurer could adopt a managed care approach for higher risk or chronically ill patients in order to reduce the overall cost of claim [\u00bd]"}, {"section": "Solution", "text": "The insurer could negotiate a fixed fee schedule with providers to limit experience variance and reduce inflation risk [\u00bd]"}, {"section": "Solution", "text": "Depending on the size and market share of Insurer X, it may have the power to determine market prices [\u00bd]"}, {"section": "Solution", "text": "Introducing a waiting list plan to reduce claims where State services may be able to be used. [\u00bd]"}, {"section": "Solution", "text": "Insurer X could review its policy wording regarding claims processes [\u00bd]"}, {"section": "Solution", "text": "And benefit definitions [\u00bd]"}, {"section": "Solution", "text": "To ensure these are in line with the market [\u00bd]"}, {"section": "Solution", "text": "And limit anti-selection [\u00bd]"}, {"section": "Solution", "text": "Ensure policy wording is suitably tight to avoid unexpected claims [\u00bd]"}, {"section": "Solution", "text": "Ensure all data is correct by carrying out data checks [\u00bd]"}, {"section": "Solution", "text": "Introduce reinsurance, if affordable [\u00bd]"}]}, {"id": "202204_Q2(iii)", "sitting": "April 2022", "yymmkey": "202204", "ref": "Q2(iii)", "marks": 4, "all_themes": ["Capital & Solvency", "Claims Management", "Data", "Models", "Pricing", "Private Medical Insurance (PMI)", "Reserving & Valuation"], "products": ["Private Medical Insurance (PMI)"], "question_text": "Company X is investigating whether minor surgeries could be performed in day clinics rather than in hospital settings. The product development team believes that this could deliver substantial cost savings.\nIn response, Hospital A has approached Company X and proposed a capitation arrangement as an alternative to the fee-for-service model currently offered. Under the capitation arrangement, Company X will pay Hospital A an annual upfront amount in respect of each policyholder, rather than having to pay for Hospital A\u2019s medical fees in the event of a claim. Hospital A will then provide the necessary medical care, including both inpatient and outpatient services, to the policyholders of Company X as and when claims occur.\nSuggest possible reasons for Hospital A\u2019s proposal.", "scenario": "Country B has a private healthcare sector characterised by a small number of large hospital groups, of which Hospital A is one. Company X specialises in Private Medical Insurance (PMI) and is one of several health and care insurance companies that provide PMI cover in Country B.\nCompany X has recently carried out its annual experience review. The results show that the claims experience over the last 12 months has been worse than expected.", "bullets": [{"section": "Solution", "text": "In order to be considering this, Hospital A must believe that the income will be sufficient to cover the expected claims from Company X. [\u00bd]"}, {"section": "Solution", "text": "Hospital A may face lower utilisation rates if insurer X directs policyholders away from hospital settings and towards clinics [1]"}, {"section": "Solution", "text": "Other insurers may follow insurer X\u2019s example [\u00bd]"}, {"section": "Solution", "text": "Which would compound the issue of lower utilisation [\u00bd]"}, {"section": "Solution", "text": "Hospital A may prefer a stable income with limited volatility [\u00bd]"}, {"section": "Solution", "text": "And may be able to assist with data for pricing the arrangement [\u00bd]"}, {"section": "Solution", "text": "This may give Hospital A a competitive advantage over other hospital groups [\u00bd]"}, {"section": "Solution", "text": "as it will mean that it will service insurer X\u2019s policyholders [\u00bd]"}, {"section": "Solution", "text": "And the partnership may differentiate it in the market [\u00bd]"}, {"section": "Solution", "text": "It may already have the systems in place to service a capitation model [\u00bd]"}, {"section": "Solution", "text": "If it offers this to other insurers [\u00bd]"}, {"section": "Solution", "text": "May improve cashflow [\u00bd]"}, {"section": "Solution", "text": "Easier to collect payment for service [\u00bd]"}, {"section": "Solution", "text": "Stable payment may make it easier to invest in improving facilities, planning staffing or other reasonable point. [\u00bd]"}]}, {"id": "202204_Q2(v)", "sitting": "April 2022", "yymmkey": "202204", "ref": "Q2(v)", "marks": 3, "all_themes": ["Capital & Solvency", "Claims Management", "Data", "Investments", "Pricing", "Private Medical Insurance (PMI)"], "products": ["Private Medical Insurance (PMI)"], "question_text": "Suggest possible actions Hospital A could take to mitigate the risks in part (iv).", "scenario": "Country B has a private healthcare sector characterised by a small number of large hospital groups, of which Hospital A is one. Company X specialises in Private Medical Insurance (PMI) and is one of several health and care insurance companies that provide PMI cover in Country B.\nCompany X has recently carried out its annual experience review. The results show that the claims experience over the last 12 months has been worse than expected.", "bullets": [{"section": "Solution", "text": "Mitigating Risks: Fee for service Ensure that pricing means that profit increases as utilisation increases [\u00bd]"}, {"section": "Solution", "text": "Consider capitation arrangements [\u00bd]"}, {"section": "Solution", "text": "Regularly conduct market comparisons [\u00bd]"}, {"section": "Solution", "text": "Regularly review pricing [\u00bd]"}, {"section": "Solution", "text": "Hospital A should try and maintain close links with several insurers to try and ensure it meets the required utilisation rates [\u00bd]"}, {"section": "Solution", "text": "This could include negotiating preferred provider deals with several insurers to try and improve its utilisation rates. [\u00bd]"}, {"section": "Solution", "text": "Mitigate Risks: Capitation Include provisions in the agreement to allow for changes in business mix [\u00bd]"}, {"section": "Solution", "text": "Carve out high cost treatment [\u00bd]"}, {"section": "Solution", "text": "Or new protocols where there may be a lack of data for pricing [\u00bd]"}, {"section": "Solution", "text": "Ensure that the capitation basis is reviewed regularly [\u00bd]"}, {"section": "Solution", "text": "And the contract allows for regular rate updates [\u00bd]"}, {"section": "Solution", "text": "Include utilisation provisions in the contract - effectively an upper limit on service [\u00bd]"}, {"section": "Solution", "text": "Investment risk could be reduced through monthly fees instead of annual fees. [\u00bd]"}]}, {"id": "202204_Q2(vi)", "sitting": "April 2022", "yymmkey": "202204", "ref": "Q2(vi)", "marks": 3, "all_themes": ["Capital & Solvency", "Claims Management", "Data", "Models", "Pricing", "Private Medical Insurance (PMI)"], "products": ["Private Medical Insurance (PMI)"], "question_text": "Outline the risks that Company X could face by introducing a capitation arrangement with Hospital A.", "scenario": "Country B has a private healthcare sector characterised by a small number of large hospital groups, of which Hospital A is one. Company X specialises in Private Medical Insurance (PMI) and is one of several health and care insurance companies that provide PMI cover in Country B.\nCompany X has recently carried out its annual experience review. The results show that the claims experience over the last 12 months has been worse than expected.", "bullets": [{"section": "Solution", "text": "Hospital A may suffer from reputation issues which could reflect poorly on Company X [\u00bd]"}, {"section": "Solution", "text": "Other hospitals may have better equipment for certain procedures [\u00bd]"}, {"section": "Solution", "text": "Policyholders may want to have the choice of which hospital to use [\u00bd]"}, {"section": "Solution", "text": "Insurer X may receive poor quality data from Hospital A [\u00bd]"}, {"section": "Solution", "text": "This could negatively impact the ability to design and price products in future [\u00bd]"}, {"section": "Solution", "text": "Regulator may be opposed to the arrangement or view it as uncompetitive [\u00bd]"}, {"section": "Solution", "text": "There is a counterparty risk [\u00bd]"}, {"section": "Solution", "text": "Hospital A can\u2019t offer a particular required procedure, either because high demand has used its capacity, or because it doesn\u2019t have the relevant specialist required for a procedure [\u00bd]"}, {"section": "Solution", "text": "Insurer would still have to meet the claims [\u00bd]"}, {"section": "Solution", "text": "The reputational issues could lead to reduced new business volumes and/or lower renewals [\u00bd]"}, {"section": "Solution", "text": "The capitation arrangement may pass profit to Hospital A, leading to unhappy shareholders. [\u00bd]"}, {"sectio
