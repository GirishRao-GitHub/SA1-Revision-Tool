 processes [\u00bd]"}]}, {"id": "202209_Q3(vii)", "sitting": "September 2022", "yymmkey": "202209", "ref": "Q3(vii)", "marks": 4, "all_themes": ["Claims Management", "Data", "Group Products", "Pricing", "Product Design", "Reserving & Valuation", "State Healthcare & Demographics", "Underwriting"], "products": ["Group Products"], "question_text": "The chief actuary has suggested that an outpatient benefit be added to the product.\nThis benefit would provide a fixed cash sum to the policyholder in the event that they were required to visit an outpatient facility, clinic or doctor. Company C\u2019s board has responded to this by suggesting adding a deductible or coinsurance payment to the benefit.\nDiscuss the implications of introducing an outpatient benefit for Company C for both the insurance company and the customers.\n[Total 39]\nEND OF PAPER", "scenario": "Company C operates in a country where the majority of the population earns a very low income and have variable and irregular income streams. Company C is considering launching a new microinsurance product to the market. One of the objectives of microinsurance is to provide a social benefit and, as a result, benefits paid out to policyholders will be a key metric in evaluating the success of the product.\nThe new microinsurance product will offer a fixed cash benefit payable in the event of hospit", "bullets": [{"section": "Solution", "text": "Company: The deductible/co-insurance payment could act as a deterrent in the event of moral hazard or fraud [\u00bd]"}, {"section": "Solution", "text": "Data to price the addition might not be readily available [\u00bd]"}, {"section": "Solution", "text": "Administering a deductible or co-insurance payment may be problematic given the likely low benefit levels [\u00bd]"}, {"section": "Solution", "text": "And will increase the cost of claim administration [\u00bd]"}, {"section": "Solution", "text": "A net benefit could be paid to reduce transaction costs, but this may not have the intended impact of the deductible/coinsurance payment [\u00bd]"}, {"section": "Solution", "text": "It is unlikely to be viable from the insurer\u2019s perspective [\u00bd]"}, {"section": "Solution", "text": "Customer: Adding an outpatient benefit makes the contract more comprehensive and so better at meeting customer\u2019s needs [\u00bd]"}, {"section": "Solution", "text": "This might help to increase sales enabling the insurer to spread its costs over more policies [\u00bd]"}, {"section": "Solution", "text": "However, the premium is likely to increase, which may make the contract unaffordable and will reduce sales [\u00bd]"}, {"section": "Solution", "text": "This may add a level of complexity to the product and may not be well understood. [\u00bd]"}, {"section": "Solution", "text": "Adding an outpatient benefit may reduce complaints as the policyholder is covered to some extent even if they are not hospitalised for 3 days [\u00bd]"}, {"section": "Solution", "text": "If the benefit level is low, as is likely with microinsurance, this will reduce the benefit level further which will reduce customer relevance [\u00bd]"}, {"section": "Solution", "text": "Given the target market, customers may not have money available for coinsurance payments [\u00bd]"}, {"section": "Solution", "text": "Introducing a deductible may reduce the ability of the contract to meet its social benefit aim [\u00bd]"}, {"section": "Solution", "text": "It is unlikely to be viable from the customer\u2019s perspective [\u00bd]"}]}, {"id": "202304_Q1(i)", "sitting": "April 2023", "yymmkey": "202304", "ref": "Q1(i)", "marks": 5, "all_themes": ["Capital & Solvency", "Critical Illness", "Pricing", "Private Medical Insurance (PMI)", "Regulation"], "products": ["Private Medical Insurance (PMI)", "Critical Illness"], "question_text": "Suggest possible reasons for the low consumer take-up of private health and care insurance in Country A.", "scenario": "Country A is a large, rapidly developing country. There is significant variation between regions in Country A in terms of population size and the level of personal wealth of its citizens.\nHistorically, the government of Country A has provided limited health and care benefits to its citizens in the form of a universal healthcare system. The universal healthcare system meets the cost of medical treatment for its citizens, but there are limits on both the type and cost of treatment provided.\nThe pr", "bullets": [{"section": "Solution", "text": "Many consumers in country A may not be financially sophisticated and therefore may not fully appreciate or understand the benefits of private health and care products and be reluctant to buy it [\u00bd]"}, {"section": "Solution", "text": "Consumers may not fully understand the limitations of the existing universal health care arrangements in Country A [\u00bd]"}, {"section": "Solution", "text": "Although limited, the coverage may meet the needs of a large proportion of the population [\u00bd]"}, {"section": "Solution", "text": "There may be a culture in Country A to rely on the State for healthcare treatment [\u00bd]"}, {"section": "Solution", "text": "Consumers may lack awareness about the need for private health insurance [\u00bd]"}, {"section": "Solution", "text": "The H&C companies may not adequately market H&C products so consumers may not adequately understand the benefits [\u00bd]"}, {"section": "Solution", "text": "Consumers may be concerned about the solvency of private health and care insurance companies in country A [\u00bd]"}, {"section": "Solution", "text": "The H&C products currently offered may be too costly for many consumers to afford [\u00bd]"}, {"section": "Solution", "text": "e.g. the population is relatively high risk compared to other countries (e.g. because of poor health or diet or a high prevalence of disease) [\u00bd]"}, {"section": "Solution", "text": "or there has been high inflation of costs in the country/sector recently [\u00bd[ (Maximum 1 mark for 2 relevant examples) H&C products are not seen as good value for money by consumers [\u00bd]"}, {"section": "Solution", "text": "The H&C products currently offered may not adequately meet the needs of consumers [\u00bd]"}, {"section": "Solution", "text": "The H&C products on the market may be seen as excessively complex for the target consumer [\u00bd]"}, {"section": "Solution", "text": "The reputation of the health and care insurance industry in country A may be poor [\u00bd]"}, {"section": "Solution", "text": "Consumers may feel that health and care insurance companies in country A have not treated consumers fairly in the past [\u00bd]"}, {"section": "Solution", "text": "Many consumers in Country A may not have access to good quality sales advice. [\u00bd]"}, {"section": "Solution", "text": "Previous mis-selling could mean that many consumers may not trust insurance salespeople [\u00bd]"}, {"section": "Solution", "text": "It may be difficult for some citizens to buy the products - for example if health and care insurance is primarily sold online but many citizens in Country A do not have internet access [\u00bd]"}, {"section": "Solution", "text": "The health and care insurance companies in country A may only target the wealthiest clients as they are the most profitable [\u00bd]"}, {"section": "Solution", "text": "Or only certain regions so some areas may have low sales (e.g. rural areas) [\u00bd]"}, {"section": "Solution", "text": "There may only be a small number of insurance companies so there might be insufficient capacity in the market [\u00bd]"}]}, {"id": "202304_Q1(ii)", "sitting": "April 2023", "yymmkey": "202304", "ref": "Q1(ii)", "marks": 5, "all_themes": ["Capital & Solvency", "Critical Illness", "Group Products", "Pricing", "Private Medical Insurance (PMI)", "Regulation", "Reserving & Valuation", "Risk Management & Capital"], "products": ["Private Medical Insurance (PMI)", "Critical Illness", "Group Products"], "question_text": "The government of Country A is aiming to increase levels of private health and care insurance in Country A.\nSuggest possible actions the government could take to achieve its aim.", "scenario": "Country A is a large, rapidly developing country. There is significant variation between regions in Country A in terms of population size and the level of personal wealth of its citizens.\nHistorically, the government of Country A has provided limited health and care benefits to its citizens in the form of a universal healthcare system. The universal healthcare system meets the cost of medical treatment for its citizens, but there are limits on both the type and cost of treatment provided.\nThe pr", "bullets": [{"section": "Solution", "text": "State: The State could restrict the benefits it offers, means test them or require a contribution towards the cost of treatment [\u00bd]"}, {"section": "Solution", "text": "Taxation: The government could offer taxation benefits for individuals on health and care product premiums and benefits [\u00bd]"}, {"section": "Solution", "text": "The government could offer taxation benefits for health and care insurance companies on health and care products [\u00bd]"}, {"section": "Solution", "text": "The government could encourage employers to take out group health and care products [\u00bd]"}, {"section": "Solution", "text": "This could be through offering tax advantages on employer contributions [\u00bd]"}, {"section": "Solution", "text": "Education: The government could have campaigns to educate consumers on the benefits of health and care insurance [\u00bd]"}, {"section": "Solution", "text": "The government could make sure citizens of country A fully understand the limitations of the existing universal health care system [\u00bd]"}, {"section": "Solution", "text": "Regulation: The government could ensure there is sufficiently robust regulation to deal with companies that mis-sell to consumers in Country A [\u00bd]"}, {"section": "Solution", "text": "The government could ensure that health and care insurance companies treat customers fairly [\u00bd]"}, {"section": "Solution", "text": "Consumers should be allowed to complain to the regulator or ombudsman if they are not dealt with fairly by health and care insurance companies [\u00bd]"}, {"section": "Solution", "text": "Any regulator or ombudsman should have the power to compel the insurance company to deal fairly with the consumer [\u00bd]"}, {"section": "Solution", "text": "Regulation should be in place to ensure that health and care insurance companies have adequate reserves and capital for the liabilities they have taken on [\u00bd]"}, {"section": "Solution", "text": "Could require companies to provide H&C insurance to their employees [\u00bd]"}, {"section": "Solution", "text": "Government could act as reinsurer for H&C to share the risks in respect of any H&C sold [\u00bd]"}, {"section": "Solution", "text": "Government could introduce a Statement of Best Practice by insurers to increase consumer confidence in the section [\u00bd]"}, {"section": "Solution", "text": "Could introduce caps or limits on maximum premiums that can be charged for cover [\u00bd]"}, {"section": "Solution", "text": "Competition: The government could encourage greater competition in the health and care sector [\u00bd]"}, {"section": "Solution", "text": "The government could allow overseas insurance companies to sell in country either directly or via a joint venture [\u00bd]"}, {"section": "Solution", "text": "The government could offer subsidies H&C insurance companies to sell more business in Country A [\u00bd]"}, {"section": "Solution", "text": "Government could launch its own insurance company offering low-cost H&C insurance [\u00bd]"}]}, {"id": "202304_Q1(iii)", "sitting": "April 2023", "yymmkey": "202304", "ref": "Q1(iii)", "marks": 5, "all_themes": ["Capital & Solvency", "Critical Illness", "Investments", "Pricing", "Private Medical Insurance (PMI)", "Product Design", "Regulation"], "products": ["Private Medical Insurance (PMI)", "Critical Illness"], "question_text": "The government is now proposing to permit, for the first time, health and care insurance companies based overseas, to sell into Country A.\nDiscuss the advantages and disadvantages of this proposal from the perspective of the government.", "scenario": "Country A is a large, rapidly developing country. There is significant variation between regions in Country A in terms of population size and the level of personal wealth of its citizens.\nHistorically, the government of Country A has provided limited health and care benefits to its citizens in the form of a universal healthcare system. The universal healthcare system meets the cost of medical treatment for its citizens, but there are limits on both the type and cost of treatment provided.\nThe pr", "bullets": [{"section": "Solution", "text": "Advantages: Allowing non-domestic insurers into the market could stimulate competition [\u00bd]"}, {"section": "Solution", "text": "and product innovation in the market [\u00bd]"}, {"section": "Solution", "text": "This could improve consumer choice [\u00bd]"}, {"section": "Solution", "text": "This could reduce the overall cost of health and care insurance [\u00bd]"}, {"section": "Solution", "text": "Non-domestic health and care insurance companies may be able to bring in experience and expertise which will benefit the local domestic health and care insurance companies [\u00bd]"}, {"section": "Solution", "text": "This will allow domestic insurance companies to develop their own expertise over time [\u00bd]"}, {"section": "Solution", "text": "It will also allow domestic insurers to understand current best practice [\u00bd]"}, {"section": "Solution", "text": "In the long-term domestic health and care insurance companies may be able to take over [\u00bd]"}, {"section": "Solution", "text": "More new H&C business sold could mean higher tax revenues for the government [\u00bd]"}, {"section": "Solution", "text": "Disadvantages: There is a risk that non-domestic health and care insurers could end up dominating the market in country A [\u00bd]"}, {"section": "Solution", "text": "This could reduce profits for domestic companies and reduce tax revenues for the state. [\u00bd]"}, {"section": "Solution", "text": "This could result in domestic health and care insurers closing to new business as they cannot compete with domestic insurance companies [\u00bd]"}, {"section": "Solution", "text": "May not be popular, impacting the government\u2019s political popularity [\u00bd]"}, {"section": "Solution", "text": "Tax benefits may not materialise depending on where the overseas insurers end up paying tax [\u00bd]"}, {"section": "Solution", "text": "There is a risk that the products sold by the joint venture may not be appropriate for the target market in country A: [\u00bd]"}, {"section": "Solution", "text": "Products could be too expensive [\u00bd]"}, {"section": "Solution", "text": "Products could be too complex [\u00bd]"}, {"section": "Solution", "text": "Products could be mis-sold [\u00bd]"}]}, {"id": "202304_Q1(iv)", "sitting": "April 2023", "yymmkey": "202304", "ref": "Q1(iv)", "marks": 20, "all_themes": ["Capital & Solvency", "Claims Management", "Critical Illness", "Data", "Group Products", "Models", "Pricing", "Private Medical Insurance (PMI)", "Regulation", "Reinsurance", "Reserving & Valuation", "Risk Management & Capital", "Underwriting"], "products": ["Private Medical Insurance (PMI)", "Critical Illness", "Group Products"], "question_text": "Following feedback from a wide range of stakeholders, the government has decided to allow private health and care insurance companies in Country A to set up joint ventures with health and care insurance companies based overseas. The joint ventures will initially be subject to additional regulatory restrictions, which include the following:\n\uf0b7 There will be additional scrutiny to ensure products sold are appropriate for consumers in Country A.\n\uf0b7 Joint ventures will initially only be allowed to sell accelerated critical illness and major medical expenses insurance products in Country A.\n\uf0b7 The initial term of any joint venture agreement will be 10 years. At the end of\n10 years, there will be an option for both parties to extend the venture for a further\n10 years. If either party does not wish to extend the venture, the domestic insurer will take over the overseas company\u2019s share of the joint venture liabilities in return for a buyout payment.\n\u20133 Company XYZ is a large multi-national health and care insurance company based outside of Country A. Company XYZ is currently considering whether to enter into a joint venture agreement with Company W, a health and care insurance company based in a particular region of Country A.\nDiscuss the factors that Company XYZ should consider before deciding to enter into the proposed joint venture.", "scenario": "Country A is a large, rapidly developing country. There is significant variation between regions in Country A in terms of population size and the level of personal wealth of its citizens.\nHistorically, the government of Country A has provided limited health and care benefits to its citizens in the form of a universal healthcare system. The universal healthcare system meets the cost of medical treatment for its citizens, but there are limits on both the type and cost of treatment provided.\nThe pr", "bullets": [{"section": "Solution", "text": "Details on Joint Venture Partner: Due diligence should be carried out on the joint venture partner to understand whether the joint venture partner is a suitable partner for XYZ [\u00bd]"}, {"section": "Solution", "text": "Does the joint venture partner have a good reputation? Has it had any mis-selling issues or treating customers fairly issues in the past? [\u00bd]"}, {"section": "Solution", "text": "Need to understand what they sell, who they sell to, how much they sell, and how they sell? [\u00bd]"}, {"section": "Solution", "text": "How is the domestic insurer perceived in the market? This will impact consumer\u2019s perception of the joint venture [\u00bd]"}, {"section": "Solution", "text": "What region is the domestic insurer based in? [\u00bd]"}, {"section": "Solution", "text": "What is the quality of management of the domestic insurer? Do they sufficiently understand their market? [\u00bd]"}, {"section": "Solution", "text": "Are there any regulatory issues with the domestic insurer? [\u00bd]"}, {"section": "Solution", "text": "Are the two companies complementary in terms of culture, approach, etc? [\u00bd]"}, {"section": "Solution", "text": "Credit rating and financial strength of domestic insurer [\u00bd]"}, {"section": "Solution", "text": "Understand the market: XYZ will need to consider the main features of the business written by the domestic insurer in country A [\u00bd]"}, {"section": "Solution", "text": "Is this experience relevant and credible for the products that the joint venture will sell? [\u00bd]"}, {"section": "Solution", "text": "Country A is large and is developing quickly so: A developing country may have a higher proportion of younger citizens than a more developed country [\u00bd]"}, {"section": "Solution", "text": "There are likely to be a wide range of different citizen sub-groups with different health and care needs [\u00bd]"}, {"section": "Solution", "text": "There may be significant variation in consumer\u2019s income levels and wealth [\u00bd]"}, {"section": "Solution", "text": "The average income may be lower than for a more developed country which means product affordability may be an issue for consumers [\u00bd]"}, {"section": "Solution", "text": "Are these all relevant for the particular region of Country A? [\u00bd]"}, {"section": "Solution", "text": "Consideration will need to be given to the demand for accelerated CI and major medical expenses in the particular region of country A [\u00bd]"}, {"section": "Solution", "text": "Consideration will need to be given to the extent that consumers in the region will be able to afford the proposed products? [\u00bd]"}, {"section": "Solution", "text": "Consideration will need to be given to the financial sophistication of consumers in the region [\u00bd]"}, {"section": "Solution", "text": "Consideration will need to be given to the business mix in terms of age, premium size etc for the region [\u00bd]"}, {"section": "Solution", "text": "Are there any cultural issues or sensitivities that need to be considered? [\u00bd]"}, {"section": "Solution", "text": "Are there any issues with language barriers? [\u00bd]"}, {"section": "Solution", "text": "What is the current economic environment in Country A - is it growing or shrinking? [\u00bd]"}, {"section": "Solution", "text": "How politically stable is Country A (might the government change and remove the joint venture system)? [\u00bd]"}, {"section": "Solution", "text": "How volatile is the exchange rate between country A and the domestic country? [\u00bd]"}, {"section": "Solution", "text": "State benefits: The state provides limited healthcare benefits to its citizens. It is very unlikely that these limited benefits would meet the healthcare needs of most citizens [\u00bd]"}, {"section": "Solution", "text": "This means most sub-groups of citizens will want health and care insurance which will meet the cost of medical treatments [\u00bd]"}, {"section": "Solution", "text": "Split of Joint venture: How will the profits and losses, ongoing costs etc be split for the joint venture. For example, is everything split 50/50? [1]"}, {"section": "Solution", "text": "Control: Which company has overall control of the arrangement - for example in terms of deciding which products will be sold, how they will be designed? [\u00bd]"}, {"section": "Solution", "text": "How any partnership issues will be resolved [\u00bd]"}, {"section": "Solution", "text": "Pricing / Profit: XYZ will ultimately want to make profits on the joint venture [\u00bd]"}, {"section": "Solution", "text": "Consideration will need to be given to the overall volumes, business mix, and product mix to assess whether XYZ will make profits on the joint venture [\u00bd]"}, {"section": "Solution", "text": "XYZ should model the expected future profits on a range of plausible scenarios to assess whether it will meet the desired profitably criteria [\u00bd]"}, {"section": "Solution", "text": "XYZ may need to adjust its corporate profit criteria for the joint venture to be competitive in the market [\u00bd]"}, {"section": "Solution", "text": "XYZ will need to consider the payback period for covering the cost of any development costs [\u00bd]"}, {"section": "Solution", "text": "If the joint venture only lasts for 10 years will XYZ be able to recoup its development costs? [\u00bd]"}, {"section": "Solution", "text": "If the joint venture stops after 10 years on what terms will the domestic insurer buyout XYZ\u2019s share of the joint venture? [\u00bd]"}, {"section": "Solution", "text": "Products: Initially there is no choice on the type of products that the joint venture sells. [\u00bd]"}, {"section": "Solution", "text": "Is there a possibility that longer term the joint venture could sell a wider range of possibly more profitable products? [\u00bd]"}, {"section": "Solution", "text": "Does XYZ have any experience of selling the products that the joint venture will sell? It probably sells CI business, but does it sell major medical expenses? [\u00bd]"}, {"section": "Solution", "text": "Marketability, competition and sales: What is the potential overall size of the health and care market in country A and split region? [\u00bd]"}, {"section": "Solution", "text": "Are some regions not viable in terms of potential for sales? [\u00bd]"}, {"section": "Solution", "text": "Given that domestic insurers in Country A predominantly sell business in the region that they are based, the level of competition will depend on whether there are any other insurers in the region [\u00bd]"}, {"section": "Solution", "text": "Need to understand how business is sold in Country A? e.g. is it sold via brokers or some other distribution channel such as online? [\u00bd]"}, {"section": "Solution", "text": "Are there any trends in the market that should be considered? [\u00bd]"}, {"section": "Solution", "text": "Risks: The insurer will need to consider the potential risks in the joint venture [\u00bd]"}, {"section": "Solution", "text": "Data: Is there sufficient credible data available on the claims experience for health and care insurance business from the domestic insurer? [\u00bd]"}, {"section": "Solution", "text": "Is there data available on the specific risks for these products (e.g.CI claim rates, MME benefit levels) [\u00bd]"}, {"section": "Solution", "text": "Is there data available on the market as a whole? [\u00bd]"}, {"section": "Solution", "text": "Regulatory / Tax: Consideration will need to be given to the regulatory and taxation environment in country A [\u00bd]"}, {"section": "Solution", "text": "What level of scrutiny will there be on the sales process? [\u00bd]"}, {"section": "Solution", "text": "Will this cause significant additional administration cost? [\u00bd]"}, {"section": "Solution", "text": "How are insurance companies in country A taxed? [\u00bd]"}, {"section": "Solution", "text": "How are policyholders in country A taxed? Is the tax system likely to make the proposed products to be sold more or less attractive to consumers? [\u00bd]"}, {"section": "Solution", "text": "How onerous are reserving and capital requirements in country A? [\u00bd]"}, {"section": "Solution", "text": "Are there any issues repatriating profits back to the domestic country? [\u00bd]"}, {"section": "Solution", "text": "Are there any potential diversification benefits from selling these products in Country A? [\u00bd]"}, {"section": "Solution", "text": "Underwriting: How will new business be underwritten? [\u00bd]"}, {"section": "Solution", "text": "Will the underwriters have sufficient expertise to underwrite the business? [\u00bd]"}, {"section": "Solution", "text": "Will Company XYZ need to provide underwriting support? [\u00bd]"}, {"section": "Solution", "text": "Reinsurance: How will new business be reinsured? [\u00bd]"}, {"section": "Solution", "text": "What form will reinsurance take? [\u00bd]"}, {"section": "Solution", "text": "Given the level of uncertainty over new business will it be possible for the joint venture to reinsure a significant amount of the business written initially? [\u00bd]"}, {"section": "Solution", "text": "Perhaps the level of reinsurance could be reduced over time as there is greater credibility of the data on the business written [\u00bd]"}, {"section": "Solution", "text": "Expertise: Will company XYZ need to provide a lot of additional support and expertise to get the joint venture up and running? [\u00bd]"}, {"section": "Solution", "text": "XYZ will need to consider in what form any expertise it provides to the joint Venture will be [\u00bd]"}, {"section": "Solution", "text": "e.g. will be for admin, underwriting, finance etc [\u00bd]"}, {"section": "Solution", "text": "It will also need to consider how this additional expertise will cost, [\u00bd]"}, {"section": "Solution", "text": "And how long will it be needed for? [\u00bd]"}, {"section": "Solution", "text": "Or will it need to provide expertise for the duration of the joint venture? [\u00bd]"}, {"section": "Solution", "text": "Expenses: XYZ will need to consider the development and ongoing operational cost of any potential deal [\u00bd]"}, {"section": "Solution", "text": "Similarly with overheads [\u00bd]"}, {"section": "Solution", "text": "How much will costs between W and XYZ be shared? [\u00bd]"}, {"section": "Solution", "text": "Other: Is the expected return sufficient given the level of risk? [\u00bd]"}, {"section": "Solution", "text": "Are there other uses for the capital required to set up this arrangement and their expected return? [\u00bd]"}, {"section": "Solution", "text": "Are there suitable long-term assets available to support the liabilities? [\u00bd]"}, {"section": "Solution", "text": "If the agreement ends after 10 years how will any long-term ACI contracts be managed? [\u00bd]"}]}, {"id": "202304_Q2(i)", "sitting": "April 2023", "yymmkey": "202304", "ref": "Q2(i)", "marks": 4, "all_themes": ["Capital & Solvency", "Critical Illness", "Pricing", "Pricing & Rating", "Product Design"], "products": ["Critical Illness"], "question_text": "Describe four possible pre-specified events that an RoP option could be based on.", "scenario": "In Country Z, the insurance industry sells only individual Stand-Alone Critical Illness (SACI).\nPolicyholders, at the time of sale, have the choice to add a Return of Premium (RoP)\noption to their SACI policy. If the policyholder chooses an RoP option, they will receive a return of a specified amount of the premiums paid from the inception of the policy to the date of a pre-specified event.\nThe policyholder can choose different RoP options where premiums are returned dependent on different pre-s", "bullets": [{"section": "Solution", "text": "Return of premium on remaining in force: At certain intervals, a return of premium amount is provided if the policyholder remains in force [\u00bd]"}, {"section": "Solution", "text": "E.g. every 10 years a sum is returned to the policyholder while the policy remains in force on a permanent policy to age 100 [\u00bd]"}, {"section": "Solution", "text": "Return of premium on surrender or lapse: If a policyholder decides to surrender the policy a return of premium amount will be calculated and refunded [\u00bd]"}, {"section": "Solution", "text": "This may only be allowed after an initial period where adequate premiums have been paid to cover expenses etc. [\u00bd]"}, {"section": "Solution", "text": "Return of premiums on end of term, or expiry by age, or retirement: At the end of term, a return of premium amount is provided to the policyholder. [\u00bd]"}, {"section": "Solution", "text": "E.g. at 10, 15, 20 years [\u00bd]"}, {"section": "Solution", "text": "At the end of contract at the maximum age of cover, a return of premium amount is provided to the policy holder [\u00bd]"}, {"section": "Solution", "text": "E.g. at age 65 or 100 years old [\u00bd]"}, {"section": "Solution", "text": "Return of premium on conversion: When a policyholder converts the policy, a return of premium amount is returned to the policy holder [\u00bd]"}, {"section": "Solution", "text": "E.g. converting from a child\u2019s to an adult CI policy [\u00bd]"}, {"section": "Solution", "text": "Or converting from a temporary (10-year term) to a permanent (to maximum covered age e.g. 100) CI policy [\u00bd]"}, {"section": "Solution", "text": "Return of premium on death: When a policyholder dies, outside of death covered within the policy, a return of premium amount is returned to the policyholder\u2019s estate or nominated beneficiaries [\u00bd]"}, {"section": "Solution", "text": "E.g. accidental death such as car accident [\u00bd]"}, {"section": "Solution", "text": "Return of premium on claim declined: Provides the policyholder with the option of return of premium to lapse the policy if a claim is declined [\u00bd]"}, {"section": "Solution", "text": "E.g. Heart attack does not meet contract terms (not severe enough), but funds can be returned to assist policy holder to meet some needs / improve consumer satisfaction [\u00bd]"}, {"section": "Solution", "text": "Return of premium on death or claim within waiting period, survival or moratorium period: Provides a policyholder with a return of premium amount if an event occurs within a period in which cover is not valid for payment [\u00bd]"}, {"section": "Solution", "text": "E.g. policyholder has cancer within the 90-day moratorium period after sale [\u00bd]"}, {"section": "Solution", "text": "Or the policyholder dies within 30 days of heart attack [\u00bd]"}, {"section": "Solution", "text": "Return of premium upon partial claim (or early tier claim): When a policyholder is paid a partial claim, there can be a return of premium amount as if the sum insured is equal to the partial claim amount. The policy then terminates [\u00bd]"}, {"section": "Solution", "text": "E.g. a superficial melanoma claim is covered at 10% of the sum insured. The policyholder can access premium amounts (less the cover the partial claim value sum insured) to access additional care (skip waiting lists) [\u00bd]"}, {"section": "Solution", "text": "Return of premium on policyholder being diagnosed with a critical illness: When a policyholder is paid a full claim, there could be a return of premium potentially where the claim amount is disputed between the two parties. The policy then terminates [\u00bd]"}, {"section": "Solution", "text": "E.g. a full claim for stroke is submitted but the insurer does not think the evidence is sufficient. There may be an agreed amount paid and the difference in the premiums (between the sum insured and the claim amount paid) returned [\u00bd]"}, {"section": "Solution", "text": "(Maximum 1 mark for each option)"}]}, {"id": "202304_Q2(ii)", "sitting": "April 2023", "yymmkey": "202304", "ref": "Q2(ii)", "marks": 7, "all_themes": ["Capital & Solvency", "Claims Management", "Critical Illness", "Data", "Investments", "Pricing", "Pricing & Rating", "Professional Guidance", "Regulation", "Reinsurance", "Risk Management & Capital", "Underwriting"], "products": ["Critical Illness"], "question_text": "Discuss, with reasons, the factors that would be considered for calculating the specified RoP amounts offered and in pricing the options.", "scenario": "In Country Z, the insurance industry sells only individual Stand-Alone Critical Illness (SACI).\nPolicyholders, at the time of sale, have the choice to add a Return of Premium (RoP)\noption to their SACI policy. If the policyholder chooses an RoP option, they will receive a return of a specified amount of the premiums paid from the inception of the policy to the date of a pre-specified event.\nThe policyholder can choose different RoP options where premiums are returned dependent on different pre-s", "bullets": [{"section": "Solution", "text": "The actuaries forming the methodology will need to consider the following factors: General: Any regulations which would affect which ROP might be offered and the amounts or terms should be complied with to avoid fines or regulator action [\u00bd]"}, {"section": "Solution", "text": "Any professional guidance issued on the topic should be complied with to meet actuarial standards [\u00bd]"}, {"section": "Solution", "text": "Any disclosure requirements on the insurer to present certain information to potential customers should be complied with to meet regulatory standards [\u00bd]"}, {"section": "Solution", "text": "There is a need to consider a fair balance in terms between those with ROP and those without i.e. the terms cannot be too generous to ensure customers are treated fairly [\u00bd]"}, {"section": "Solution", "text": "Competitiveness and Sales: Will want to price and calculate RoP such that it is attractive in the market to generate adequate sales [\u00bd]"}, {"section": "Solution", "text": "The more generous the terms the more sales overall or the more sales with RoP. [\u00bd]"}, {"section": "Solution", "text": "Will want to ensure in line with industry practice and also consider competitors\u2019 terms to ensure not out of line; may attract too much business or reduce sales [\u00bd]"}, {"section": "Solution", "text": "Illustrative terms should be considered as it might influence the customer\u2019s decision to take the policy the insurer may want to show attractive terms [\u00bd]"}, {"section": "Solution", "text": "If multiple ROP options can be included, they will not all be called so is there an improvement in terms across all if multiple are chosen [\u00bd]"}, {"section": "Solution", "text": "Pricing of the option: The price of the option should reflect the risk posed beyond the SACI contract [\u00bd]"}, {"section": "Solution", "text": "Will need to balance fair terms between the unused risk premium returned to the policyholder and profitability to the shareholder i.e. the terms cannot be too generous [\u00bd]"}, {"section": "Solution", "text": "The level of return that can be earned on the pre-funded money before the event occurs [\u00bd]"}, {"section": "Solution", "text": "Factors affecting probability and timing of event: If the probability of calling the ROP option is minimal, terms may be beneficial e.g. probability of death under age 45 [\u00bd]"}, {"section": "Solution", "text": "The probability of calling an ROP option based on economic scenarios e.g. more likely to call option if economic downturn which may be at a time least affordable to insurer [\u00bd]"}, {"section": "Solution", "text": "The timing of calling an ROP option may be linked to the term of the policy and be related to lapse experience for the insurer [\u00bd]"}, {"section": "Solution", "text": "For example, sum insured may be reduced to prevent a lapse and a partial ROP payment made on the sum insured balance [\u00bd]"}, {"section": "Solution", "text": "Policyholder behavior or experience: The price of the option may vary by the type of event because the choice of the option may signal a difference in policyholder behaviour [\u00bd]"}, {"section": "Solution", "text": "Alternatively, terms may be set to encourage different policyholder behaviour [\u00bd]"}, {"section": "Solution", "text": "E.g. on surrender within 5 years only 25% of the amount is payable, increasing over the term for later lapses to encourage retention of business [\u00bd]"}, {"section": "Solution", "text": "Alternatively, the price of the option may vary by the type of event due to different expected experience [\u00bd]"}, {"section": "Solution", "text": "Previous experience data should be considered to see if any difference in experience if credible [\u00bd]"}, {"section": "Solution", "text": "Should consider if access to the data/insight is available via the insurer, reinsurer, industry [\u00bd]"}, {"section": "Solution", "text": "RoP on surrender or lapse may be selected by those are signaling that they are \u2018healthier\u2019 i.e. they expect not to claim before lapse [\u00bd]"}, {"section": "Solution", "text": "The pricing of surrender or lapse option should be balanced with it encouraging anti- selective lapse behaviour [\u00bd]"}, {"section": "Solution", "text": "Return of premium on death is unlikely to lead to anti- selective behaviour so could provide good terms in amount calculation [\u00bd]"}, {"section": "Solution", "text": "RoP on death may be selected by those who are seeking a means of acquiring funds at the time of death for funeral planning without having to own a funeral policy or death benefit [\u00bd]"}, {"section": "Solution", "text": "This pricing and terms for this may be strategically generous to appear attractive to distributors when seeking to meet customers morbidity and mortality needs when life cover is not sold separately [\u00bd]"}, {"section": "Solution", "text": "Likely low cost because the risk of death at main protection ages is low. However, this would increase with age. Therefore, may consider altering terms by age. [\u00bd]"}, {"section": "Solution", "text": "RoP at the end of term may be selected by those using the feature as a quasi -savings vehicle or to delay tax payment if premiums are tax deductible [\u00bd]"}, {"section": "Solution", "text": "This would likely be a more expensive option as in effect it could be seen as \u2018free\u2019 insurance [\u00bd]"}, {"section": "Solution", "text": "RoP on conversion may be selected by those who may use the feature as quasi-savings vehicle or to avoid inheritance tax e.g. grandparents paying for child policies where the ROP fund is then payable to the child [\u00bd]"}, {"section": "Solution", "text": "The pricing and terms for this may be strategically generous to attract high-net worth business with expected light morbidity, more likely to cross sell to, etc. [\u00bd]"}, {"section": "Solution", "text": "RoP on claim declined may be selected by those seeking to avoid disappointment if they fail to meet the specific contract terms, while also having some cash returned to help with the level of condition they are experiencing [\u00bd]"}, {"section": "Solution", "text": "An insurer with a poorer claims payout rate or customer experience record may consider offering this to continue to attract business [\u00bd]"}, {"section": "Solution", "text": "RoP on claim in survival, waiting period, or moratorium may be selected by those seeking to avoid disappointment if they fail to meet the specific contract terms, while also having some cash returned to help with the level of condition they are experiencing [\u00bd]"}, {"section": "Solution", "text": "This is a short period and so those who feel it is likely to occur may be signaling selective behaviour [\u00bd]"}, {"section": "Solution", "text": "RoP on partial claim may be selected by those seeking to avoid disappointment if they fail to meet the specific contract terms, while also having some cash returned to help with the level of condition they are experiencing [\u00bd]"}, {"section": "Solution", "text": "This is likely a cheaper option as the exposure ends after claim [\u00bd]"}, {"section": "Solution", "text": "An insurer may want to consider these option terms generously to attract distributors to sell their business by reducing the chance of dissatisfied customers [\u00bd]"}, {"section": "Solution", "text": "Amount of RoP offered: Will premiums be returned in full or in part? [\u00bd]"}, {"section": "Solution", "text": "If 100% of the cash value of the premiums paid is returned and there is a cooling off period, expenses will need to be considered [\u00bd]"}, {"section": "Solution", "text": "It is important that initial set up expenses are recouped so as not to make a loss. [\u00bd]"}, {"section": "Solution", "text": "The usual way of doing this is to set initial charges by dividing the total expenses Of the new business operations, including dealing with policy cancellations, by the number of policies that go into force i.e. are not cancelled [\u00bd]"}, {"section": "Solution", "text": "If paid in part might only return the additional premium charged to cover the feature [\u00bd]"}, {"section": "Solution", "text": "Or return the base premium less charges incurred by the insurer to ensure the insurer does not make a loss in the event the policyholder takes up the return of premium option [\u00bd]"}, {"section": "Solution", "text": "Charges could include elements to cover: Admin charges to calculate the return of premium amount and to process the payment [\u00bd]"}, {"section": "Solution", "text": "Operational charges may be included based on expected costs to recoup expenses [\u00bd]"}, {"section": "Solution", "text": "e.g. Reinsurance costs, fixed expenses, underwriting costs, sales process charges, taxes, profit margin charges, cost of capital (\u00bd mark for 4 relevant examples) [\u00bd]"}, {"section": "Solution", "text": "e.g. Insurance premium tax may be non-refundable/any corporation tax paid on present value of policy may affect profitability [\u00bd]"}, {"section": "Solution", "text": "Commission charge if within a certain duration with no clawback clause applicable [\u00bd]"}, {"section": "Solution", "text": "Commission charges may be excluded if there is a commission return window from the distributor [\u00bd]"}, {"section": "Solution", "text": "Experience charges may be included based on actual experience to date to ensure fairness between policyholders if premiums are reviewable and ensure profitability. [\u00bd]"}, {"section": "Solution", "text": "e.g. Morbidity, Incidence rates over the whole book, Incidence rates for the premium group (e.g. Female, Smoker), Mortality during survival period and outside of claim, Lapse rates, Expenses, Expense inflation, Investment performance (\u00bd mark for 4 relevant examples) [\u00bd]"}]}, {"id": "202304_Q2(iii)", "sitting": "April 2023", "yymmkey": "202304", "ref": "Q2(iii)", "marks": 4, "all_themes": ["Capital & Solvency", "Critical Illness", "Investments", "Pricing", "Pricing & Rating", "Regulation"], "products": ["Critical Illness"], "question_text": "Around 70% of the sales of individual SACI sold in Country Z include at least one type of RoP option. All SACI policies sold in Country Z are sold by Independent Financial Advisors (IFAs). The addition of each RoP feature increases the premium paid by the policyholder.\nDiscuss the different issues that an IFA should consider before recommending an RoP option to one of their clients.", "scenario": "In Country Z, the insurance industry sells only individual Stand-Alone Critical Illness (SACI).\nPolicyholders, at the time of sale, have the choice to add a Return of Premium (RoP)\noption to their SACI policy. If the policyholder chooses an RoP option, they will receive a return of a specified amount of the premiums paid from the inception of the policy to the date of a pre-specified event.\nThe policyholder can choose different RoP options where premiums are returned dependent on different pre-s", "bullets": [{"section": "Solution", "text": "Customer need: ROP may meet a clients\u2019 need e.g. death ROP could fund funeral expenses [\u00bd]"}, {"section": "Solution", "text": "ROP may meet clients\u2019 needs as can be sold partly as an investment product [\u00bd]"}, {"section": "Solution", "text": "May not be able to better meet customers\u2019 needs with fewer premiums spent on covering other risks with insurance like Income Protection [\u00bd]"}, {"section": "Solution", "text": "Customer may not be able to better meet current needs such as rent, travel (if funds used on ROP) [\u00bd]"}, {"section": "Solution", "text": "Increased complexity increases the risk that client will not understand the product [\u00bd]"}, {"section": "Solution", "text": "Customer affordability: The product premiums might be put down as a business expense which may reduce the tax bill so a higher premium not an issue [\u00bd]"}, {"section": "Solution", "text": "May delay tax payment, if premiums are tax-deductible, with ROP returned later [\u00bd]"}, {"section": "Solution", "text": "Policyholders can avoid tax payment if insurance benefits are non-taxable [\u00bd]"}, {"section": "Solution", "text": "Would suit high net-worth individuals, so would make clients happy / attract more clients [\u00bd]"}, {"section": "Solution", "text": "Reduces affordability of the insurance cover as higher premiums for same sum insured [\u00bd]"}, {"section": "Solution", "text": "For the IFA: Commission will be higher if based on premium charged [\u00bd]"}, {"section": "Solution", "text": "Takes the emphasis off having to sell the product as this can be positioned as \u2018free\u2019 insurance [\u00bd]"}, {"section": "Solution", "text": "Reduces the risk of consumer dissatisfaction in event of no claim or claim refusal making policies more saleable [\u00bd]"}, {"section": "Solution", "text": "Would help retain business if other distributors are also offering this i.e. remain competitive [\u00bd]"}, {"section": "Solution", "text": "Especially for high-net-worth clients who can afford the options [\u00bd]"}, {"section": "Solution", "text": "Reduce affordability of premiums which may lead to fewer policies sold and/or lower sums insured [\u00bd]"}, {"section": "Solution", "text": "Commission will be lower if based on sum insured or number of policies insured [\u00bd]"}, {"section": "Solution", "text": "May trigger regulator action on distributor [\u00bd]"}, {"section": "Solution", "text": "Could lead to bad public relations for distributor if policyholders are not satisfied with level of cover at time of claim [\u00bd]"}, {"section": "Solution", "text": "May sell fewer policies overall (especially to less wealthy clients - reducing potential business market) [\u00bd]"}, {"section": "Solution", "text": "Higher risk of mis-selling as ROP options increases the complexity of product [\u00bd]"}, {"section": "Solution", "text": "May attract poor reputation if the practice is criticised by the regulator [\u00bd]"}, {"section": "Solution", "text": "Policies loaded with ROP may be less affordable, leave policyholder underinsured which may lead to lapse. IFA may have commission claw back terms [\u00bd]"}]}, {"id": "202304_Q2(iv)", "sitting": "April 2023", "yymmkey": "202304", "ref": "Q2(iv)", "marks": 6, "all_themes": ["Capital & Solvency", "Claims Management", "Critical Illness", "Pricing", "Pricing & Rating", "Regulation", "Reserving & Valuation", "Underwriting"], "products": ["Critical Illness"], "question_text": "\u20135 Within the market, different SACI policies are sold to individual adults, families and children. The main features of these policies are set out in the table below:\nPolicy conditions Type of produce Adult Family Child Cover One adult.\nUp to two adults and two children.\nOne child.\nAge Underwritten on lives aged 17 and over.\nUnderwritten on lives aged 17 and over.\nUnderwritten on lives aged below\n15.\nClaim conditions Partial claims reduce the sum insured and do not terminate the policy.\nTermination upon full claim.\nPartial claims reduce the sum insured and do not terminate the policy. Termination upon first full claim.\nNo partial claims.\nTermination upon full claim.\nTerm Offered with terms of 10, 15 and 20 years or to expiry at age 65 or at age 100.\nOffered with terms of 10, 15 and 20 years.\nOffered with terms to expiry at age 18 or at age 25.\nOther conditions Offered for personal or business purposes.\nAt expiry age, there is an option to convert to an adult policy without underwriting.\nSuggest, with reasons, which type of policy is most suitable for the following clients:\nA A high-net-worth 45-year-old doctor with his own medical practice with no dependents B A single parent on low income, with above-average savings, who has two children aged 18 and 25 in further education C A wealthy adult who already owns an adult individual critical illness policy. She has four grandchildren under 5 years old and is currently looking at inheritance planning.", "scenario": "In Country Z, the insurance industry sells only individual Stand-Alone Critical Illness (SACI).\nPolicyholders, at the time of sale, have the choice to add a Return of Premium (RoP)\noption to their SACI policy. If the policyholder chooses an RoP option, they will receive a return of a specified amount of the premiums paid from the inception of the policy to the date of a pre-specified event.\nThe policyholder can choose different RoP options where premiums are returned dependent on different pre-s", "bullets": [{"section": "Solution", "text": "Client A: High net worth 45-year-old doctor with his own medical practice with no dependents: (maximum 2 marks from the examples below) The adult policy would be the most appropriate as there are no dependents so not paying for cover not needed [\u00bd]"}, {"section": "Solution", "text": "The policy would be useful for business purposes [\u00bd]"}, {"section": "Solution", "text": "For example, can use the money to pay for a locum to keep practice open [\u00bd]"}, {"section": "Solution", "text": "Can pay for treatment if there is no State healthcare which may allow them to return to work sooner [\u00bd]"}, {"section": "Solution", "text": "Can cover the loss in income during the close of business [\u00bd]"}, {"section": "Solution", "text": "Can put premiums down as business expense and reduce tax bill [\u00bd]"}, {"section": "Solution", "text": "A 20-year term or to expiry at age 65would cover the doctor to retirement age of 65 [\u00bd]"}, {"section": "Solution", "text": "Alternatively, if early retirement was sought a shorter term of 10 or 15 years might be chosen [\u00bd]"}, {"section": "Solution", "text": "Client B: A single parent on low income, with above average savings, who has 2 children aged 18 and 25 in further education: (maximum 2 marks from the examples below) The children are beyond age for underwriting for child policies, so adult policies only [\u00bd]"}, {"section": "Solution", "text": "The parent could get an adult policy [\u00bd]"}, {"section": "Solution", "text": "The children could get adult policies, however as they are in further education, they may not be able to afford premiums if not working [\u00bd]"}, {"section": "Solution", "text": "However, as they are young the premiums could be relatively cheap [\u00bd]"}, {"section": "Solution", "text": "Single parent may not be able to afford to pay those additional premiums on low income [\u00bd]"}, {"section": "Solution", "text": "However, as the parent has savings, perhaps lower sum insured could be selected to allow for all premiums to be affordable [\u00bd]"}, {"section": "Solution", "text": "Would choose personal policies in each case (non-business policy) [\u00bd]"}, {"section": "Solution", "text": "Client C: A wealthy adult who already owns an adult individual CI policy. She has four grandchildren under 5 years old and is currently looking at inheritance planning: (maximum 2 marks from the examples below) The client already has a policy so is unlikely to need extra cover [\u00bd]"}, {"section": "Solution", "text": "But may want to extend cover to age 100 if their policy is for a shorter duration [\u00bd]"}, {"section": "Solution", "text": "Could purchase 4 child policies to expiry age 18 or 25 [\u00bd]"}, {"section": "Solution", "text": "These will help reduce the assets of the grandparent to help with inheritance planning [\u00bd]"}, {"section": "Solution", "text": "And provide cover for the children [\u00bd]"}, {"section": "Solution", "text": "Alternatively, could get a family policy, however the level of premiums per child will be less - so not as good for inheritance planning [\u00bd]"}]}, {"id": "202304_Q2(v)", "sitting": "April 2023", "yymmkey": "202304", "ref": "Q2(v)", "marks": 3, "all_themes": ["Capital & Solvency", "Critical Illness", "Pricing", "Pricing & Rating", "Reserving & Valuation"], "products": ["Critical Illness"], "question_text": "Discuss whether adding RoP options is in the policyholder\u2019s best interests in each case.", "scenario": "In Country Z, the insurance industry sells only individual Stand-Alone Critical Illness (SACI).\nPolicyholders, at the time of sale, have the choice to add a Return of Premium (RoP)\noption to their SACI policy. If the policyholder chooses an RoP option, they will receive a return of a specified amount of the premiums paid from the inception of the policy to the date of a pre-specified event.\nThe policyholder can choose different RoP options where premiums are returned dependent on different pre-s", "bullets": [{"section": "Solution", "text": "Client A: (Maximum 1 mark from the examples below) Could allow deferral or avoidance of tax payments [\u00bd]"}, {"section": "Solution", "text": "May add more features to make premiums more expensive to increase the premiums to defer or avoid tax payment [\u00bd]"}, {"section": "Solution", "text": "There is likely to be no affordability issue so would be able to have sufficient sum insured for needs and afford the ROP features [\u00bd]"}]}, {"id": "202304_Q2(vi)", "sitting": "April 2023", "yymmkey": "202304", "ref": "Q2(vi)", "marks": 6, "all_themes": ["Capital & Solvency", "Critical Illness", "Pricing", "Pricing & Rating", "Regulation", "Risk Management & Capital"], "products": ["Critical Illness"], "question_text": "The regulator in Country Z has expressed concerns over the prevalent use of RoP in the market. The regulator is particularly concerned that:\n\uf0b7 adding the RoP option is making SACI products unaffordable for policyholders.\n\uf0b7 the cost of SACI with the RoP option is increasing the protection gap in Country Z, where many individuals are already under-insured.\n\u20136 The regulator in Country Z has called for industry participants to voluntarily cease the use of RoP options. The marketing actuary at Insurer A has stated that there would be consequences of being the first to do this.\nSuggest what the possible consequences could be for the first insurer to cease the use of RoP options in the market.", "scenario": "In Country Z, the insurance industry sells only individual Stand-Alone Critical Illness (SACI).\nPolicyholders, at the time of sale, have the choice to add a Return of Premium (RoP)\noption to their SACI policy. If the policyholder chooses an RoP option, they will receive a return of a specified amount of the premiums paid from the inception of the policy to the date of a pre-specified event.\nThe policyholder can choose different RoP options where premiums are returned dependent on different pre-s", "bullets": [{"section": "Solution", "text": "IFA\u2019s may sell other insurer\u2019s SACI products [\u00bd]"}, {"section": "Solution", "text": "Especially for high-net-worth individuals where the premium would be higher [\u00bd]"}, {"section": "Solution", "text": "Any policies sold would likely be low sum insured values [\u00bd]"}, {"section": "Solution", "text": "The insurer would pay much less commission on those [\u00bd]"}, {"section": "Solution", "text": "The sales of the insurer would drop i.e. loss of new business [\u00bd]"}, {"section": "Solution", "text": "Overhead expenses would be split over fewer policies [\u00bd]"}, {"section": "Solution", "text": "This would have implications on profitability [\u00bd]"}, {"section": "Solution", "text": "More policies may be sold at lower sum insured but this may not be sufficient to cover loss in profitability [\u00bd]"}, {"section": "Solution", "text": "There may be additional one-off expenses involved in the change e.g. change in marketing materials further reducing profitability [\u00bd]"}, {"section": "Solution", "text": "A drop in profits could mean that free capital is reduced [\u00bd]"}, {"section": "Solution", "text": "A higher proportion of total capital would be used for solvency [\u00bd]"}, {"section": "Solution", "text": "This may mean dividends are not payable [\u00bd]"}, {"section": "Solution", "text": "Shareholders may not be happy with this [\u00bd]"}, {"section": "Solution", "text": "If the adoption is voluntary, other insurers may not follow suit, meaning the above consequences could be longer term [\u00bd]"}, {"section": "Solution", "text": "The rating agency may take a different view on the rating of the insurer [\u00bd]"}, {"section": "Solution", "text": "Affecting the company\u2019s ability to raise capital [\u00bd]"}, {"section": "Solution", "text": "Distributors may be annoyed and stop selling the insurer\u2019s other products [\u00bd]"}, {"section": "Solution", "text": "Increase risk of consumer complaints of mis-selling if consumers are made aware of the regulators concerns about ROP [\u00bd]"}, {"section": "Solution", "text": "Praise from policyholders for making their product more affordable in the future. There may be positive media attention for insurer [\u00bd]"}, {"section": "Solution", "text": "Increase risk of lapse and entry if a policyholder can lapse their existing policy with ROP and re-enter on lower a premium level without ROP [\u00bd]"}]}, {"id": "202304_Q2(vii)", "sitting": "April 2023", "yymmkey": "202304", "ref": "Q2(vii)", "marks": 3, "all_themes": ["Capital & Solvency", "Critical Illness", "Pricing", "Pricing & Rating"], "products": ["Critical Illness"], "question_text": "The marketing actuary at Insurer A has suggested a phased approach where no RoP options will be offered on SACI sales for sum insured values in the lowest quartile by sum insured value from the industry in force statistics. This will remain or expand to the next quartile after the impact is assessed at the end of the financial year.\nDiscuss the advantages and disadvantages of the marketing actuary\u2019s suggestion.", "scenario": "In Country Z, the insurance industry sells only individual Stand-Alone Critical Illness (SACI).\nPolicyholders, at the time of sale, have the choice to add a Return of Premium (RoP)\noption to their SACI policy. If the policyholder chooses an RoP option, they will receive a return of a specified amount of the premiums paid from the inception of the policy to the date of a pre-specified event.\nThe policyholder can choose different RoP options where premiums are returned dependent on different pre-s", "bullets": [{"section": "Solution", "text": "Advantages: Will retain high-net-worth business [\u00bd]"}, {"section": "Solution", "text": "Which may be covering higher proportion of expenses [\u00bd]"}, {"section": "Solution", "text": "A phased adoption would allow the company to monitor and assess the impact [\u00bd]"}, {"section": "Solution", "text": "Increased retention - especially at lower sum insureds where the profit margin is lower so reducing expenses is important [\u00bd]"}, {"section": "Solution", "text": "Lower commission expense at lower sum insureds where profit margin is lower. [\u00bd]"}, {"section": "Solution", "text": "Lower admin expenses as fewer return of premiums to calculate [\u00bd]"}, {"section": "Solution", "text": "The industry statistics may not represent the insurers book - favorably so, such that a minor proportion of their sales are affected [\u00bd]"}, {"section": "Solution", "text": "Disadvantages: There may be a loss of sales to competitors [\u00bd]"}, {"section": "Solution", "text": "There may be TCF considerations where options not available to new business. [\u00bd]"}, {"section": "Solution", "text": "The industry statistics may not represent the insurers book - unfavorably so, such that a major proportion of their sales are affected [\u00bd]"}, {"section": "Solution", "text": "There will be additional costs of changing the approach for each phase of the introduction e.g. changing the sum assured for which the ROP is available in product literature [\u00bd]"}, {"section": "Solution", "text": "There may be confusion amongst policyholders and financial advisers leading to complaints that the ROP option is not available if the sum assured chosen is too small [\u00bd]"}]}, {"id": "202304_Q3(i)", "sitting": "April 2023", "yymmkey": "202304", "ref": "Q3(i)", "marks": 16, "all_themes": ["Capital & Solvency", "Investments", "Pricing", "Private Medical Insurance (PMI)", "Regulation", "State Healthcare & Demographics"], "products": ["Private Medical Insurance (PMI)"], "question_text": "Discuss the government\u2019s proposal from the point of view of:\n(a) healthcare providers.\n(b) customers.\n(c) health and care insurers.\n(d) the government of Country A.", "scenario": "Country A\u2019s healthcare system is serviced by private healthcare providers. A number of health and care insurance companies operate in the market, and two insurance products are available to individuals in Country A:\n\uf0b7 hospital cash plans \uf0b7 private medical insurance.\nThe government is looking to support individuals who are unable to afford health and care insurance. It has proposed introducing a means-tested subsidy, the size of which is dependent on the individual\u2019s income. The government would ", "bullets": [{"section": "Solution", "text": "Healthcare providers: The financial impact on the healthcare provider will depend on the size of the subsidy [\u00bd]"}, {"section": "Solution", "text": "If the subsidy is insufficient to cover the additional costs of treating the individuals receive then healthcare providers could end up losing money under the subsidy scheme [\u00bd]"}, {"section": "Solution", "text": "There may be uncertainty around the level of the subsidy the individual is entitled to until it is received, causing uncertainty for the healthcare provider [\u00bd]"}, {"section": "Solution", "text": "Larger market may be able to access healthcare [\u00bd]"}, {"section": "Solution", "text": "Which could lead to more business and increased profits for the healthcare provider [\u00bd]"}, {"section": "Solution", "text": "The healthcare needs of the market may change if a different segment now utilises services [\u00bd]"}, {"section": "Solution", "text": "This may have implications for: Capacity planning [\u00bd]"}, {"section": "Solution", "text": "Profitability [\u00bd]"}, {"section": "Solution", "text": "Future facility locations [\u00bd]"}, {"section": "Solution", "text": "Healthcare providers will now need to engage with government for payment in addition to insurers [\u00bd]"}, {"section": "Solution", "text": "This will increase the administrative complexity for the healthcare provider [\u00bd]"}, {"section": "Solution", "text": "which may require system development and incur initial expenses [\u00bd]"}, {"section": "Solution", "text": "There may be onerous requirements to claim the subsidy, for example, proof of income. Hospital admission processes may need to be updated to collect this information [\u00bd]"}, {"section": "Solution", "text": "Emergency treatment may need alternative processes [\u00bd]"}, {"section": "Solution", "text": "There could be liquidity issues for the healthcare provider if there is a long delay between treatment being given and receiving the subsidy [\u00bd]"}, {"section": "Solution", "text": "Could reduce credit risk for healthcare providers, if there is more certainty of payment for lower income consumers [\u00bd]"}, {"section": "Solution", "text": "Customers: The impact on customers is likely to depend on income level [\u00bd]"}, {"section": "Solution", "text": "Higher income customers who do not qualify for the subsidy may be largely unaffected by the change [\u00bd]"}, {"section": "Solution", "text": "Customers who will qualify for the subsidy may re-examine their insurance purchase and may look to lapse their insurance policies [\u00bd]"}, {"section": "Solution", "text": "Customers may consider the impact on the benefit if they are changing jobs - a salary increase may mean they lose the subsidy and need more insurance [\u00bd]"}, {"section": "Solution", "text": "Customers who lapse or do not purchase insurance because they can avail of the subsidy may not qualify for insurance (for example due to health reasons) in future and may find they no longer qualify for the subsidy [\u00bd]"}, {"section": "Solution", "text": "Customers may not be aware of or understand this risk [\u00bd]"}, {"section": "Solution", "text": "There may be differing views about the fairness of the subsidy from customers. For example, customers who are just above the threshold for receiving the subsidy may not view the subsidy as fair [\u00bd]"}, {"section": "Solution", "text": "There may be additional demand for healthcare services which my increase waiting times [\u00bd]"}, {"section": "Solution", "text": "This would adversely impact all customers [\u00bd]"}, {"section": "Solution", "text": "If the subsidy is insufficient to meet the cost of treatment for a low-income customer, will healthcare providers ask the customer to meet any shortfall? [\u00bd]"}, {"section": "Solution", "text": "This may not be affordable for the customer [\u00bd]"}, {"section": "Solution", "text": "Health and care insurers: If the insurer targeted a lower income market segment, this could lead to reduced new business volumes for the insurer [\u00bd]"}, {"section": "Solution", "text": "There could be more impact on health cash plan products compared to PMI (as these would typically offer lower levels of cover and be used more by lower income customers) [\u00bd]"}, {"section": "Solution", "text": "This could impact overall company profitability [\u00bd]"}, {"section": "Solution", "text": "For example, as it would need to spread its overheads over a smaller number of policies [\u00bd]"}, {"section": "Solution", "text": "Alternatively, the lower income segment business may not have been very profitable, and the subsidy could allow the insurer to target more profitable business, leading to increased profitability overall [\u00bd]"}, {"section": "Solution", "text": "This has implications for business planning [\u00bd]"}, {"section": "Solution", "text": "Will the insurer redesign product offerings? [\u00bd]"}, {"section": "Solution", "text": "This may present development opportunities [\u00bd]"}, {"section": "Solution", "text": "For example, if insurance plans can provide access to immediate treatment and waiting times have increased due to increased demand [\u00bd]"}, {"section": "Solution", "text": "Or this could have an impact on the relevance of excesses/coinsurance (if the first part of a claim is already paid by the State) (or other relevant examples) [\u00bd]"}, {"section": "Solution", "text": "How will this impact expense allocations? [\u00bd]"}, {"section": "Solution", "text": "Will there be selective lapses? [\u00bd]"}, {"section": "Solution", "text": "Insurers focused on the high-net-worth segment are likely to be less affected. [\u00bd]"}, {"section": "Solution", "text": "Government: The subsidy approach is potentially a cost-effective way for the government to increase healthcare coverage for individuals on lower income [\u00bd]"}, {"section": "Solution", "text": "The subsidy will potentially be popular with lower income consumers, which could increase the popularity of the government [\u00bd]"}, {"section": "Solution", "text": "The government will need to understand the cost implication of the subsidy. [\u00bd]"}, {"section": "Solution", "text": "And how the benefit will be funded? [\u00bd]"}, {"section": "Solution", "text": "If the benefit will be funded through higher taxes this will not be universally popular [\u00bd]"}, {"section": "Solution", "text": "The subsidy mechanism will need to be determined [\u00bd]"}, {"section": "Solution", "text": "Care will be needed to ensure the subsidy is not overly generous to healthcare providers or too low either [\u00bd]"}, {"section": "Solution", "text": "Will individual or household income level be used? [\u00bd]"}, {"section": "Solution", "text": "What level of income will be used to determine the subsidy? [\u00bd]"}, {"section": "Solution", "text": "The government will need to determine how to administer the subsidy [\u00bd]"}, {"section": "Solution", "text": "Will providers be responsible for income collecting information or will the government determine this upfront, for example, via the revenue authority? [\u00bd]"}, {"section": "Solution", "text": "There may be onerous additional costs for administrating the subsidy scheme in practice to ensure that it works well, and there is limited scope for abuse [\u00bd]"}, {"section": "Solution", "text": "This will need to be modelled and several scenarios will likely need to be tested. [\u00bd]"}, {"section": "Solution", "text": "In addition to the level of the subsidy, the government will need to determine if it will only apply to certain procedures [\u00bd]"}, {"section": "Solution", "text": "i.e. will elective procedures be excluded? [\u00bd]"}, {"section": "Solution", "text": "This may increase the health of the nation and/or [\u00bd]"}, {"section": "Solution", "text": "may be in response to government promises to the population [\u00bd]"}]}, {"id": "202309_Q1(iii)", "sitting": "September 2023", "yymmkey": "202309", "ref": "Q1(iii)", "marks": 10, "all_themes": ["Capital & Solvency", "Claims Management", "Data", "Pricing", "Private Medical Insurance (PMI)", "Regulation", "Reinsurance", "Risk Management & Capital", "Underwriting"], "products": ["Private Medical Insurance (PMI)"], "question_text": "Company ABC is a health and care insurance company in Country X, primarily selling PMI business. The chief executive officer of Company ABC has asked if the company needs to increase the premiums immediately on its PMI business to take into account increased flooding risks.\nDiscuss the factors Company ABC should consider when deciding whether to re-price its PMI business immediately.", "scenario": "Country X is a large, developed country. A significant proportion of the population of Country X live in large cities situated along the coast of the country.\nHistorically around 10% of the coastal area of Country X has been subject to flooding, which has occurred on average once every 5 years for many years. A recent university study has been produced that has stated that recent changes in climate mean that:\n\uf0b7 flooding in Country X will increase in frequency and severity, with a greater proport", "bullets": [{"section": "Solution", "text": "Company ABC will need to consider a wide range of factors when deciding whether to re-price its PMI business immediately. Expected future Claims Experience: Is future claims experience likely to immediately change due to increased flood risk? [\u00bd]"}, {"section": "Solution", "text": "If so it may be appropriate to re-price immediately. [\u00bd]"}, {"section": "Solution", "text": "If the impact of flooding is expected to gradually lead to more adverse claims increase over time then an immediate increase in premium rates may not be sensible [\u00bd]"}, {"section": "Solution", "text": "If the impact of increased flood risk is expected to increase over time it may be more appropriate to have a phased increase in premium increases. [\u00bd]"}, {"section": "Solution", "text": "ABC may prefer to wait to increase premium rates until it has built up more experience of more adverse experience due to increased flood risk. [\u00bd]"}, {"section": "Solution", "text": "It may take some time before ABC has sufficient credible data to decide whether it should reprice or not. [1]"}, {"section": "Solution", "text": "Historic data may not be a good indicator of expected future claims experience. [\u00bd]"}, {"section": "Solution", "text": "Consideration should be given to how much credibility should be given to the university study. [\u00bd]"}, {"section": "Solution", "text": "Consideration should also be given to whether there any other sources of information to back up the university study [\u00bd]"}, {"section": "Solution", "text": "Pricing / Profit: ABC should consider the potential profitability implications of changing and not changing premium rates. [1]"}, {"section": "Solution", "text": "If ABC does not change its premium rates immediately and claims experience worsens then it will need to consider the potential adverse impact on profitability on the PMI business. [\u00bd]"}, {"section": "Solution", "text": "If ABC does increase its premium rates immediately it may end up charging too much for the risk taken on if increased flood risk does not materialise immediately [\u00bd]"}, {"section": "Solution", "text": "Which could make ABC\u2019s PMI premium rates uncompetitive [\u00bd]"}, {"section": "Solution", "text": "Assuming PMI business is annually renewable there may be less pressure to increase premium rates immediately\u2026 [\u00bd]"}, {"section": "Solution", "text": "Since if experience is worse than expected then premium rates could potentially be increased in the future. [\u00bd]"}, {"section": "Solution", "text": "Solvency: If ABC is already well capitalised then it may be willing to defer decisions on repricing its PMI business [\u00bd]"}, {"section": "Solution", "text": "If ABC it is not well capitalised then it may prefer to reprice immediately [\u00bd]"}, {"section": "Solution", "text": "Competition and Sales: Are ABC\u2019s competitors repricing or waiting to see what happens? [\u00bd]"}, {"section": "Solution", "text": "Is there likely to be an adverse impact on sales if ABC re-prices before its competitors reprice? [\u00bd]"}, {"section": "Solution", "text": "There may be reputational issues for ABC if it decides to increase premiums ahead of competitors. [\u00bd]"}, {"section": "Solution", "text": "If it doesn\u2019t move immediately but competitors do ABC may be subject to increased anti-selection [\u00bd]"}, {"section": "Solution", "text": "Lapse experience: Could increasing premium rates immediately lead to an adverse impact on lapses? [\u00bd]"}, {"section": "Solution", "text": "Particularly if competitors don\u2019t immediately re-price their own PMI business. [\u00bd]"}, {"section": "Solution", "text": "If there are a large amount of lapses could these be selective lapses - i.e. those individuals in the best health that surrender? [\u00bd]"}, {"section": "Solution", "text": "Capital Requirements: Increased variability in claims experience will potentially lead to higher capital requirements [\u00bd]"}, {"section": "Solution", "text": "Which will lead to higher premiums for consumers. [\u00bd]"}, {"section": "Solution", "text": "Regulation: Consideration will need to be given to any regulatory requirements [\u00bd]"}, {"section": "Solution", "text": "Underwriting: Consideration will need to be given to whether ABC will change any of its underwriting requirements due to the increase in flood risk. [\u00bd]"}, {"section": "Solution", "text": "For example, if it were to stop taking business from the areas of the country that were most at risk to increased flood risk then it may decide not to increase premium rates immediately. [\u00bd]"}, {"section": "Solution", "text": "Reinsurance: If ABC has reinsurance for its PMI business then it will need to consider if the reinsurer will change its rates immediately to reflect the increased risk from flooding. [\u00bd]"}, {"section": "Solution", "text": "Practical Issues: ABC will need to consider operationally how quickly it is possible to make changes to premium rates. [\u00bd]"}, {"section": "Solution", "text": "Is an immediate change possible? [\u00bd]"}, {"section": "Solution", "text": "An immediate change may lead to extra costs [\u00bd]"}, {"section": "Solution", "text": "Consider how much notice needs to be given about premium rate changes to advisors/customers. [\u00bd]"}, {"section": "Solution", "text": "Consider the time needed to train advisors / servicing staff about the changes in pricing. [\u00bd]"}, {"section": "Solution", "text": "Customer Impact: ABC will need to consider the impact on customers of immediately increasing PMI premiums [\u00bd]"}, {"section": "Solution", "text": "Could a significant increase in premiums cause issues with affordability? [\u00bd]"}, {"section": "Solution", "text": "Treating Customers Fairly Issues: ABC will need to consider whether there are any specific treating customers fairly issues. [\u00bd]"}]}, {"id": "202309_Q1(iv)", "sitting": "September 2023", "yymmkey": "202309", "ref": "Q1(iv)", "marks": 7, "all_themes": ["Capital & Solvency", "Claims Management", "Pricing", "Private Medical Insurance (PMI)", "Regulation", "Risk Management & Capital"], "products": ["Private Medical Insurance (PMI)"], "question_text": "The insurance regulator in Country X has asked Company ABC to ensure increased flood risk is fully allowed for in its regulatory capital requirements. The regulatory capital requirement in Country X is determined using a value at risk approach based on a 99.5% confidence interval of the variation over 1 year of assets minus liabilities.\nDiscuss the potential challenges for Company ABC in allowing for increased flood risk accurately in its regulatory capital requirement.", "scenario": "Country X is a large, developed country. A significant proportion of the population of Country X live in large cities situated along the coast of the country.\nHistorically around 10% of the coastal area of Country X has been subject to flooding, which has occurred on average once every 5 years for many years. A recent university study has been produced that has stated that recent changes in climate mean that:\n\uf0b7 flooding in Country X will increase in frequency and severity, with a greater proport", "bullets": [{"section": "Sol
