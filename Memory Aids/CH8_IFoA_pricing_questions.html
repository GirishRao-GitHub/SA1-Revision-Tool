n": "Solution", "text": "The model may be more expensive than a fee for service model [\u00bd]"}]}, {"id": "202204_Q3(i)", "sitting": "April 2022", "yymmkey": "202204", "ref": "Q3(i)", "marks": 8, "all_themes": ["Claims Management", "Data", "Group Products", "Income Protection", "Pricing", "Pricing & Rating", "Reserving & Valuation", "Underwriting"], "products": ["Group Products", "Income Protection"], "question_text": "Outline how using the underwriting tool will impact Company Y\u2019s processes for individual and group IP business in respect of:\n(a) pricing.\n(b) policyholder application and underwriting.", "scenario": "Company Y is a health and care insurance company that has a large portfolio of group and individual Income Protection (IP) business.\nA specialist underwriting company has approached Company Y to offer an underwriting tool they have developed. The tool allows applicants to take a photograph of their face with a smartphone and upload the photograph directly to the insurance company. Based on the photograph, the underwriting tool has the capability to determine some of the applicant\u2019s personal char", "bullets": [{"section": "Solution", "text": "Pricing For individual business Ability to provide an individual rate depending on expected healthy life. [\u00bd]"}, {"section": "Solution", "text": "Potential to review premium rates during the course of the policy if customers upload a new photo at renewal. [\u00bd]"}, {"section": "Solution", "text": "May reduce margins for uncertainty if, for example, factors like smoker status can be known with a high degree of accuracy. [\u00bd]"}, {"section": "Solution", "text": "or may require increased margins if there is uncertainty around the accuracy of the tool [\u00bd]"}, {"section": "Solution", "text": "Low accuracy may lead to mis-pricing and worse than expected claims experience in future [\u00bd]"}, {"section": "Solution", "text": "May appeal to a younger audience [\u00bd]"}, {"section": "Solution", "text": "Which will impact business mix assumptions. [\u00bd]"}, {"section": "Solution", "text": "May impact expense assumptions [\u00bd]"}, {"section": "Solution", "text": "There may be costs savings if underwriting costs are reduced [\u00bd]"}, {"section": "Solution", "text": "But there will be additional development and system related costs to consider [\u00bd]"}, {"section": "Solution", "text": "Need to consider the ability to use the information captured by tool (e.g. gender) [\u00bd]"}, {"section": "Solution", "text": "Will need robust evaluation of the tool to ensure there is no bias [\u00bd]"}, {"section": "Solution", "text": "For group business Are rating factors currently used for group pricing? If not, the tool may not add value or the pricing methodology may need to change [\u00bd]"}, {"section": "Solution", "text": "Will employers be capable of managing differentiated pricing? [\u00bd]"}, {"section": "Solution", "text": "Accidents will need to be rated separately. [\u00bd]"}, {"section": "Solution", "text": "For both groups May have little impact if the personal characteristics are not used as rating factors. [\u00bd]"}, {"section": "Solution", "text": "Occupation, industry, or other key rating factors may not be captured by the tool, limiting its value. [\u00bd]"}, {"section": "Solution", "text": "Policy application and underwriting For individual business May reduce the need for underwriting and [\u00bd]"}, {"section": "Solution", "text": "Speed up the application/acceptance process [\u00bd]"}, {"section": "Solution", "text": "May reduce incidence of fraud by the applicant [\u00bd]"}, {"section": "Solution", "text": "Conversely, may enable greater misrepresentation/fraud [\u00bd]"}, {"section": "Solution", "text": "Will need to consider whether this impacts limits for medical exams / blood tests [\u00bd]"}, {"section": "Solution", "text": "The insurer may need a parallel manual process to cater for scenarios where customers cannot use the tool [\u00bd]"}, {"section": "Solution", "text": "Or where customers are unwilling to use the tool, [\u00bd]"}, {"section": "Solution", "text": "For example, due to the security of their data. [\u00bd]"}, {"section": "Solution", "text": "Past data is now less relevant and there may be a lack of data on how the photo features tie up to claims [\u00bd]"}, {"section": "Solution", "text": "Leading to increased margins, at least until experience is built up [\u00bd]"}, {"section": "Solution", "text": "For group business May not have a large impact on group business as few individuals would typically be underwritten. [\u00bd]"}, {"section": "Solution", "text": "And financial underwriting will need to be done separately. [\u00bd]"}, {"section": "Solution", "text": "But could be done remotely and so may be introduced for group. [\u00bd]"}, {"section": "Solution", "text": "For both groups: Does the applicant population have a smartphone? [\u00bd]"}]}, {"id": "202204_Q3(ii)", "sitting": "April 2022", "yymmkey": "202204", "ref": "Q3(ii)", "marks": 8, "all_themes": ["Claims Management", "Data", "Income Protection", "Investments", "Pricing", "Pricing & Rating", "Regulation", "Underwriting"], "products": ["Income Protection"], "question_text": "Discuss the risks to Company Y of using the underwriting tool to determine whether or not to accept a policyholder\u2019s application.", "scenario": "Company Y is a health and care insurance company that has a large portfolio of group and individual Income Protection (IP) business.\nA specialist underwriting company has approached Company Y to offer an underwriting tool they have developed. The tool allows applicants to take a photograph of their face with a smartphone and upload the photograph directly to the insurance company. Based on the photograph, the underwriting tool has the capability to determine some of the applicant\u2019s personal char", "bullets": [{"section": "Solution", "text": "There may be practical technical challenges (camera, lighting, app working) which may mean the photo is not an accurate depiction. [\u00bd]"}, {"section": "Solution", "text": "There is a risk the photo submitted may have been digitally altered [\u00bd]"}, {"section": "Solution", "text": "Or may not be of the applicant. [\u00bd]"}, {"section": "Solution", "text": "Or be an old photo. [\u00bd]"}, {"section": "Solution", "text": "Leading to increased incidences of fraud /misrepresentation. [\u00bd]"}, {"section": "Solution", "text": "The insurer will also need to consider how to handle claims where the initial information was inaccurate. [\u00bd]"}, {"section": "Solution", "text": "Inaccurate data may lead to mispricing risk. [\u00bd]"}, {"section": "Solution", "text": "The underwriting company is not exposed to risk if actual experience differs to expectations. [\u00bd]"}, {"section": "Solution", "text": "Customers may be unwilling to provide data to the insurer [\u00bd]"}, {"section": "Solution", "text": "The insurer will need to ensure that the customer has consented to use of the data [\u00bd]"}, {"section": "Solution", "text": "And will need to consider security of the data [\u00bd]"}, {"section": "Solution", "text": "There is a risk that the algorithm displays bias [\u00bd]"}, {"section": "Solution", "text": "This may have serious reputational risk [\u00bd]"}, {"section": "Solution", "text": "Including, for example bad press, unhappy customers [\u00bd]"}, {"section": "Solution", "text": "Or may lead to regulatory risk including fines [\u00bd]"}, {"section": "Solution", "text": "Particularly if protected characteristics such as gender are impacted [\u00bd]"}, {"section": "Solution", "text": "Or possible future legislative or regulatory changes restricting use of the tool [\u00bd]"}, {"section": "Solution", "text": "The underwriting limits for medical tests and additional information may need to be changed [\u00bd]"}, {"section": "Solution", "text": "If there is uncertainty regarding the accuracy of data then these limits may need to be reduced which could add to the cost of accepting a policy [\u00bd]"}, {"section": "Solution", "text": "Any bias may allow anti-selection [\u00bd]"}, {"section": "Solution", "text": "The insurer will also need to consider initial and future cost of the service [\u00bd]"}, {"section": "Solution", "text": "There is a business mix risk [\u00bd]"}, {"section": "Solution", "text": "For example, healthy lives may opt for to follow a process with a photo, leaving unhealthy lives to follow the standard process if this is continued [\u00bd]"}, {"section": "Solution", "text": "There may be a risk of lapse and re-entry as healthy lives take out new policies [\u00bd]"}, {"section": "Solution", "text": "Leaving poorer lives in the risk pool [\u00bd]"}, {"section": "Solution", "text": "New business volumes may reduce if customers dislike this approach [\u00bd]"}, {"section": "Solution", "text": "Leaving fewer policies to spread fixed costs over [\u00bd]"}, {"section": "Solution", "text": "Conversely, new business volumes may increase if customers like the approach [\u00bd]"}, {"section": "Solution", "text": "Potentially leading to new business strain [\u00bd]"}, {"section": "Solution", "text": "The reinsurer may not accept the tool or may require higher margins for business accepted using the too [\u00bd]"}, {"section": "Solution", "text": "The underwriting company may go out of business leading to the loss of investment costs. [\u00bd]"}]}, {"id": "202204_Q3(iii)", "sitting": "April 2022", "yymmkey": "202204", "ref": "Q3(iii)", "marks": 4, "all_themes": ["Claims Management", "Data", "Group Products", "Income Protection", "Pricing", "Pricing & Rating", "Reserving & Valuation", "Underwriting"], "products": ["Group Products", "Income Protection"], "question_text": "Company Y\u2019s Board are considering whether the underwriting tool has broader applications beyond pricing and policy acceptance.\nSuggest, with reasons, other areas of Company Y\u2019s business where the tool could be used.\n[Total 20]\nEND OF PAPER", "scenario": "Company Y is a health and care insurance company that has a large portfolio of group and individual Income Protection (IP) business.\nA specialist underwriting company has approached Company Y to offer an underwriting tool they have developed. The tool allows applicants to take a photograph of their face with a smartphone and upload the photograph directly to the insurance company. Based on the photograph, the underwriting tool has the capability to determine some of the applicant\u2019s personal char", "bullets": [{"section": "Solution", "text": "Reserving Could assist with setting IP case reserves [1]"}, {"section": "Solution", "text": "Data at an individual level could assist with more accurate reserving [1]"}, {"section": "Solution", "text": "Could be used within a rewards programme during the life of the policy motivating policyholders to follow a healthier lifestyle. [1]"}, {"section": "Solution", "text": "Claims underwriting Could provide information for claims validation. [1]"}, {"section": "Solution", "text": "Marketing The proposition may be unique in the market providing a competitive advantage. [1]"}, {"section": "Solution", "text": "Identification The proposition may allow the insurer to identify the customer during the life of the policy for administration services. [1]"}, {"section": "Solution", "text": "Credit awarded for other relevant examples"}]}, {"id": "202209_Q1(i)", "sitting": "September 2022", "yymmkey": "202209", "ref": "Q1(i)", "marks": 3, "all_themes": ["Critical Illness", "Long-Term Care (LTC)", "Pricing", "Private Medical Insurance (PMI)", "Product Design", "Underwriting"], "products": ["Long-Term Care (LTC)", "Private Medical Insurance (PMI)", "Critical Illness"], "question_text": "Suggest possible reasons why an individual may prefer MME to PMI.", "scenario": "Country X has a mainly young and healthy population. Healthcare is provided entirely by the private sector.\nFor short-term health and care insurance provision, the main products available are individual Private Medical Insurance (PMI) or an individual Major Medical Expense (MME) policy, which pays a fixed amount on major surgery. These products have a maximum acceptable age on application of 65, the most common retirement age in Country X. A significant proportion of the younger population takes", "bullets": [{"section": "Solution", "text": "Lower premiums: MME would have lower premiums which would help meet any affordability need of the consumer [\u00bd]"}, {"section": "Solution", "text": "Low expectation of need: PMI may cover more than is considered necessary by younger/healthier lives [\u00bd]"}, {"section": "Solution", "text": "Affluent society: Individuals may prefer to cover minor health care costs, but want insurance for more costly treatments. Hence MME is preferable as it is more suitable for their needs than PMI [\u00bd]"}, {"section": "Solution", "text": "Complexity: The policyholder may prefer MME if they didn\u2019t understand that PMI was more comprehensive. [\u00bd]"}, {"section": "Solution", "text": "This may be due to a lack of advice, e.g. if the policyholder was buying online [\u00bd]"}, {"section": "Solution", "text": "Simpler sales process: MME may be more convenient sales channel and process (e.g. online) given the lower premiums and fixed sum benefits [\u00bd]"}, {"section": "Solution", "text": "Less underwriting than PMI so less processing time needed [\u00bd]"}, {"section": "Solution", "text": "Fewer exclusions: For people with previous medical conditions, PMI underwriting may have exclusions whereas MME may not have as less stringent underwriting [\u00bd]"}, {"section": "Solution", "text": "Simplicity: For those not familiar with insurance products the simplicity of the terms of MME may be preferred [\u00bd]"}]}, {"id": "202209_Q1(ii)", "sitting": "September 2022", "yymmkey": "202209", "ref": "Q1(ii)", "marks": 6, "all_themes": ["Critical Illness", "Long-Term Care (LTC)", "Pricing", "Private Medical Insurance (PMI)", "Product Design", "Underwriting"], "products": ["Long-Term Care (LTC)", "Private Medical Insurance (PMI)", "Critical Illness"], "question_text": "Company A and Company B are health and care insurers selling both short-term and long-term products, but have significantly different approaches to marketing and distribution. Company A markets to consumers via social media and only sells online, with no advice given to the consumer. Company B markets to consumers through a partnership with a high-wealth credit card provider and distributes solely through financial advisors.\nDescribe, with reasons, the likely profile of each insurer\u2019s existing business in terms of demographics, and classes of business written.", "scenario": "Country X has a mainly young and healthy population. Healthcare is provided entirely by the private sector.\nFor short-term health and care insurance provision, the main products available are individual Private Medical Insurance (PMI) or an individual Major Medical Expense (MME) policy, which pays a fixed amount on major surgery. These products have a maximum acceptable age on application of 65, the most common retirement age in Country X. A significant proportion of the younger population takes", "bullets": [{"section": "Solution", "text": "Insurer A Demographics: The distribution channel of online is likely to appeal to younger ages [\u00bd]"}, {"section": "Solution", "text": "There may be a bias toward less financially sophisticated younger ages [\u00bd]"}, {"section": "Solution", "text": "There may be a bias toward less wealthy younger ages as less able to afford paying for advice [\u00bd]"}, {"section": "Solution", "text": "May include older lives who are comfortable using the internet and social media with a bias to the less wealthy [\u00bd]"}, {"section": "Solution", "text": "Product: If younger ages, then likely to be MME [\u00bd]"}, {"section": "Solution", "text": "Without advice the simpler products are more likely i.e. MME [\u00bd]"}, {"section": "Solution", "text": "The underwriting will be simplified online so more likely to be products with less complex underwriting i.e. MME [\u00bd]"}, {"section": "Solution", "text": "The PMI sold may include moratorium/exclusion underwriting to keep the underwriting simple online. [\u00bd]"}, {"section": "Solution", "text": "Any ACI on younger ages is likely to be for lower sums assured: [\u00bd]"}, {"section": "Solution", "text": "As premiums are likely to be kept low as higher price sensitivity online [\u00bd]"}, {"section": "Solution", "text": "As premiums likely to be kept low as higher lapse risk with customer-initiated sale [\u00bd]"}, {"section": "Solution", "text": "Given the crossover of cover between ACI and MME and the cap on acceptable age for MME [\u00bd]"}, {"section": "Solution", "text": "Likely ACI is skewed to older ages where there are sales [\u00bd]"}, {"section": "Solution", "text": "However, sales of ACI may be high amongst younger ages in relation to mortgages [\u00bd]"}, {"section": "Solution", "text": "Unlikely to have LTC given the need for financial advice [\u00bd]"}, {"section": "Solution", "text": "Unlikely to have LTC given high premiums if underwritten at older ages [\u00bd]"}, {"section": "Solution", "text": "Insurer B Demographics: Likely to be older ages as may be less technical minded than younger people [\u00bd]"}, {"section": "Solution", "text": "Likely to be wealthier groups: may be more used to using advisors and willing to pay for advice [\u00bd]"}, {"section": "Solution", "text": "May include younger wealthier ages to provide wider cover [\u00bd]"}, {"section": "Solution", "text": "Likely to be in better health than the average person of their age as their higher wealth may be related to less physically arduous occupations (or allows them to purchase better medical care) [\u00bd]"}, {"section": "Solution", "text": "Product: More likely to be PMI than MME as premiums will be more affordable to the target group [\u00bd]"}, {"section": "Solution", "text": "Accelerated CI likely to be sold, with higher premiums [\u00bd]"}, {"section": "Solution", "text": "Likely higher sum assured due to wealthier market [\u00bd]"}, {"section": "Solution", "text": "With advice, pre-funded LTC is more likely [\u00bd]"}, {"section": "Solution", "text": "May be from age 50 onwards if this is where savings are accumulated in life [\u00bd]"}, {"section": "Solution", "text": "(Maximum 4 marks per insurer. Credit was given if a reverse point was made under the other insurer but marks were not awarded twice if a point and its opposite was made under both insurers)"}]}, {"id": "202209_Q1(iii)", "sitting": "September 2022", "yymmkey": "202209", "ref": "Q1(iii)", "marks": 10, "all_themes": ["Claims Management", "Critical Illness", "Data", "Investments", "Long-Term Care (LTC)", "Pricing", "Private Medical Insurance (PMI)", "Product Design", "Reinsurance", "Underwriting"], "products": ["Long-Term Care (LTC)", "Private Medical Insurance (PMI)", "Critical Illness"], "question_text": "Comment on, with reference to your answer to part (ii), how the key risks to a health and care insurer\u2019s business may differ between Company A and Company B.", "scenario": "Country X has a mainly young and healthy population. Healthcare is provided entirely by the private sector.\nFor short-term health and care insurance provision, the main products available are individual Private Medical Insurance (PMI) or an individual Major Medical Expense (MME) policy, which pays a fixed amount on major surgery. These products have a maximum acceptable age on application of 65, the most common retirement age in Country X. A significant proportion of the younger population takes", "bullets": [{"section": "Solution", "text": "Rates (mortality, morbidity, average cost): Morbidity rates may differ given the different target markets [\u00bd]"}, {"section": "Solution", "text": "For example, Insurer A will be more exposed to diseases that predominantly affect the young. Insurer B may be better diversified across the ages [\u00bd]"}, {"section": "Solution", "text": "Mortality rates may differ given the different target markets [\u00bd]"}, {"section": "Solution", "text": "Insurer B may have wealthier policyholders than insurer A who are likely to have lower mortality rates than insurer A policyholders [\u00bd]"}, {"section": "Solution", "text": "The younger age profile of Insurer A may mean a lower claim rate and so a higher risk of random fluctuations (each extra claim has a proportionately bigger impact if the number of expected claims is low) [\u00bd]"}, {"section": "Solution", "text": "Investment: Insurer B may have a higher proportion of policyholders of long-term products and/or with higher sums assured [\u00bd]"}, {"section": "Solution", "text": "Long term products such as LTC and ACI have premiums invested over time [\u00bd]"}, {"section": "Solution", "text": "So there is likely to be more investment risk than for short term products or those with lower sums assured [\u00bd]"}, {"section": "Solution", "text": "Selection: Online sales may leave insurer A more at risk of anti-selection risk given the simplified underwriting [\u00bd]"}, {"section": "Solution", "text": "Online sales may leave insurer A more at risk of selective lapsing given the consumer initiates the sale [\u00bd]"}, {"section": "Solution", "text": "Financial advisors\u2019 business - more robust underwriting is undertaken to reduce the risk [\u00bd]"}, {"section": "Solution", "text": "An existing business portfolio only from online sales may therefore be more risky [\u00bd]"}, {"section": "Solution", "text": "However, financial advisors may expose insurer B to a higher risk of churning [\u00bd]"}, {"section": "Solution", "text": "Competition: Online sales are heavily price sensitive with the use of comparison websites so a new entrant could disrupt new business and cause lapses for insurer A [\u00bd]"}, {"section": "Solution", "text": "Financial advisors are also highly competitive, but this may be not just be on premiums but also on terms and conditions. A new entrant could disrupt new business and cause lapses for insurer B [\u00bd]"}, {"section": "Solution", "text": "Inflation: PMI is more exposed to inflation risk than MME as the latter is fixed amounts [\u00bd]"}, {"section": "Solution", "text": "Pre-funded LTC may be exposed to inflation risk if comprehensive cover rather than fixed benefit amounts [\u00bd]"}, {"section": "Solution", "text": "ACI is a fixed sum assured; however, this may be linked to inflation. [\u00bd]"}, {"section": "Solution", "text": "Overall, insurer B is more likely to be exposed to inflation risk than insurer A [\u00bd]"}, {"section": "Solution", "text": "Persistency (early selective lapses, withdrawals): Insurer A is more exposed to selective lapses [\u00bd]"}, {"section": "Solution", "text": "Policyholders of Insurer A haven\u2019t received the levels of advice given to the policyholders of Insurer B, so policyholders of Insurer A may be more likely to lapse if they later find that the contract doesn\u2019t meet their needs. [\u00bd]"}, {"section": "Solution", "text": "Depending on the commission structure Insurer B could be more exposed to the risk of churning of policies [\u00bd]"}, {"section": "Solution", "text": "Options and Guarantees: Insurer B is more likely to provide Options and Guarantees given advice is provided and market are financial sophisticated. Online is kept simple [\u00bd]"}, {"section": "Solution", "text": "New Business: The volume of business may be more variable for online business which would affect insurer A more. [\u00bd]"}, {"section": "Solution", "text": "Data (policy and other data): There will be more control over data provided through online sales than through financial advisors [\u00bd]"}, {"section": "Solution", "text": "E.g. online may have compulsory fields [\u00bd]"}, {"section": "Solution", "text": "With financial advisors as a distribution channel, there is less insurer control over the data for insurer B [\u00bd]"}, {"section": "Solution", "text": "Expenses: Lower premiums on online sales may mean that the expense loading is smaller and so more exposed to risk of variation for insurer A [\u00bd]"}, {"section": "Solution", "text": "However, expenses may be higher due to commission with financial advisors for Insurer B [\u00bd]"}, {"section": "Solution", "text": "Per policy expenses depend on new business volumes (and these could be more variable online as mentioned above) [\u00bd]"}, {"section": "Solution", "text": "Non-disclosure: This may be higher for insurer A because of online sales where no advice is given, so the consumer is unaware of the consequences of non-disclosure on entitlement to benefits [\u00bd]"}, {"section": "Solution", "text": "Counterparty risk (distributions, provision medical services, investment): Insurer A is expose to fewer distributors than B [\u00bd]"}, {"section": "Solution", "text": "Insurer B may have higher investments so higher exposure to failure of investment providers to meet return needs [\u00bd]"}, {"section": "Solution", "text": "Or poor medical services from providers [\u00bd]"}, {"section": "Solution", "text": "State benefits: If the government decided to provide free public health services, the market for MME and PMI may plummet; this may leave Insurer A without a market [\u00bd]"}, {"section": "Solution", "text": "If the government decided to provide long term care; this may create mass lapses on pre- funded LTC which may be more likely to affect insurer B [\u00bd]"}, {"section": "Solution", "text": "Catastrophes: Risks may be different, e.g. an internet outage would hit insurer A because of its high amount of online sales [\u00bd]"}, {"section": "Solution", "text": "Aggregation & concentration of risk: The geographical distributions of risk might be similar as online sales are accessible widely as are credit card consumers [\u00bd]"}, {"section": "Solution", "text": "Insurer A is more at risk of aggregation and concentration risk with the weight of younger ages [\u00bd]"}, {"section": "Solution", "text": "Reputational risk & Customer services shortcomings: There is an increased risk of mis-selling or misunderstanding of term of the policy where advice is not given. Insurer A could have more reputational risk [\u00bd]"}, {"section": "Solution", "text": "Insurer A may be exposed to greater reputational risk due to its use of social media, e.g. in connection to privacy and use of data [\u00bd]"}, {"section": "Solution", "text": "Using a network of financial advisors may diversify the risk of mis-selling for Insurer B [\u00bd]"}]}, {"id": "202209_Q1(iv)", "sitting": "September 2022", "yymmkey": "202209", "ref": "Q1(iv)", "marks": 5, "all_themes": ["Claims Management", "Critical Illness", "Data", "Investments", "Long-Term Care (LTC)", "Pricing", "Private Medical Insurance (PMI)", "Product Design", "Reinsurance", "Risk Management & Capital", "Underwriting"], "products": ["Long-Term Care (LTC)", "Private Medical Insurance (PMI)", "Critical Illness"], "question_text": "Suggest, with reasons, appropriate risk management techniques to mitigate the risks identified in part (iii).", "scenario": "Country X has a mainly young and healthy population. Healthcare is provided entirely by the private sector.\nFor short-term health and care insurance provision, the main products available are individual Private Medical Insurance (PMI) or an individual Major Medical Expense (MME) policy, which pays a fixed amount on major surgery. These products have a maximum acceptable age on application of 65, the most common retirement age in Country X. A significant proportion of the younger population takes", "bullets": [{"section": "Solution", "text": "Rates (mortality, morbidity, average cost): Increase the diversity of products offered to offset mortality and morbidity risks [\u00bd]"}, {"section": "Solution", "text": "E.g. selling LTC includes exposure to longevity - paying as long as living, which can offset the mortality exposure on ACI - paying out on death [\u00bd]"}, {"section": "Solution", "text": "Where the insurer is not internally diversified it can seek reinsurance to protect against adverse experience [\u00bd]"}, {"section": "Solution", "text": "It can also use reinsurers to provide advice on rates setting [\u00bd]"}, {"section": "Solution", "text": "Investment risk: Asset Liability Matching techniques can be employed to reduce the investment risk from having short- and long-term liabilities [\u00bd]"}, {"section": "Solution", "text": "Selection: A moratorium underwriting or waiting periods could be employed for online sales to reduce anti-selection [\u00bd]"}, {"section": "Solution", "text": "Introduce commission clawback for financial advisors to reduce the risk of early lapses [\u00bd]"}, {"section": "Solution", "text": "Competition: Company should pay market rates for commission where financial advisors distribute products to ensure products remain competitive and reduce churning [\u00bd]"}, {"section": "Solution", "text": "Regularly monitor competitors\u2019 prices and reprice where necessary to remain competitive [\u00bd]"}, {"section": "Solution", "text": "Inflation: The exposure to inflation could be reduced with reviewable premiums [\u00bd]"}, {"section": "Solution", "text": "Persistency (early selective lapses, withdrawals): Terms could be adopted to minimise selective withdrawal, such as penalties on pre-funded LTC products [\u00bd]"}, {"section": "Solution", "text": "Options and Guarantees: Adverse experience and capital strain arising from these can be managed by reducing how generous the terms under which they can be exercised are [\u00bd]"}, {"section": "Solution", "text": "Or options and guarantees may not be offered [\u00bd]"}, {"section": "Solution", "text": "New Business: Regular monitoring of new business by volume, mix, nature and size will help both insurers manage against pricing terms [\u00bd]"}, {"section": "Solution", "text": "Data (policy + other): Regular spot checks of data and staff training could mitigate risk through financial advisers. [\u00bd]"}, {"section": "Solution", "text": "Expenses: Clawback terms on commission may reduce risk of expense charges not being adequate [\u00bd]"}, {"section": "Solution", "text": "Surrender penalties on policyholders in the event they surrender early and the company does not have time to recoup initial expenses would also reduce the risk of expenses charges not being adequate [\u00bd]"}, {"section": "Solution", "text": "Regular experience analysis on expenses will help to ensure that the expense loading is adequate given lapses and loading by sum assured. [\u00bd]"}, {"section": "Solution", "text": "Non-disclosure: Improving transparency in why the question is being asked may mitigate this risk, however it may increase complexity [\u00bd]"}, {"section": "Solution", "text": "Counterparty risk (distributions, provision medical services, investment): A diversification of distributors and providers may reduce risk [\u00bd]"}, {"section": "Solution", "text": "Investment default risk could be reduced by only investing in assets with good credit rating [\u00bd]"}, {"section": "Solution", "text": "State benefits: Insurer A could diversify its product offering to be less exposed to loss of sales if state benefits or healthcare are introduced [\u00bd]"}, {"section": "Solution", "text": "Both insurers should keep abreast of policy developments [\u00bd]"}, {"section": "Solution", "text": "For LTC, the impact of mass lapse could be limited if withdrawal charges are levied [\u00bd]"}, {"section": "Solution", "text": "Catastrophes: This could be mitigated in various ways, e.g. with a support telephone sales distribution centre [\u00bd]"}, {"section": "Solution", "text": "Aggregation & concentration of risk: This may be mitigated with the use of reinsurance [\u00bd]"}, {"section": "Solution", "text": "Reputational risk & Customer services shortcomings: For Insurer A, the product terms and conditions should be kept as simple as possible Potentially with access to a sales team who can answer further questions [\u00bd]"}, {"section": "Solution", "text": "For Insurer B, the advisors can also be trained on a regular basis [\u00bd]"}, {"section": "Solution", "text": "Ensure policy wording is clear and unambiguous to reduce risk of unexpected claims [\u00bd]"}, {"section": "Solution", "text": "Conduct consumer satisfaction surveys to identify areas for improvement [\u00bd]"}]}, {"id": "202209_Q1(v)", "sitting": "September 2022", "yymmkey": "202209", "ref": "Q1(v)", "marks": 3, "all_themes": ["Claims Management", "Critical Illness", "Investments", "Long-Term Care (LTC)", "Pricing", "Private Medical Insurance (PMI)", "Reinsurance", "Risk Management & Capital", "Underwriting"], "products": ["Long-Term Care (LTC)", "Private Medical Insurance (PMI)", "Critical Illness"], "question_text": "Following the most recent submission of supervisory returns, the regulator in Country X has expressed concern about Company A\u2019s lack of diversification in the business written. The regulator has therefore asked Company A to \u2018remedy the situation\u2019 to protect policyholders.\nDescribe other possible actions the regulator could take to protect policyholders.", "scenario": "Country X has a mainly young and healthy population. Healthcare is provided entirely by the private sector.\nFor short-term health and care insurance provision, the main products available are individual Private Medical Insurance (PMI) or an individual Major Medical Expense (MME) policy, which pays a fixed amount on major surgery. These products have a maximum acceptable age on application of 65, the most common retirement age in Country X. A significant proportion of the younger population takes", "bullets": [{"section": "Solution", "text": "A requirement to purchase more reinsurance to limit the exposure to adverse experience [\u00bd]"}, {"section": "Solution", "text": "This would protect policyholders where the terms of the reinsurance are not overly expensive, but may cause liquidity issues [\u00bd]"}, {"section": "Solution", "text": "A requirement to hold additional capital to provide a cushion against adverse experience [\u00bd]"}, {"section": "Solution", "text": "This may be possible but would require the insurer to raise capital. This may not be available on good terms [\u00bd]"}, {"section": "Solution", "text": "Revoking the ability of certain managers to hold senior positions in a health & care insurer [\u00bd]"}, {"section": "Solution", "text": "A change in senior positions may cause adaptations to the sales and distribution channel strategy. However, this may not be necessary to remedy the situation. There may be disruption in services with a change to personnel which may affect policyholders detrimentally [\u00bd]"}, {"section": "Solution", "text": "Requiring the insurer to pursue a merger or acquisition [\u00bd]"}, {"section": "Solution", "text": "There could be an argument for requiring Insurer A to pursue a merger with Insurer B (or B to acquire A) as Insurer B has a more diversified portfolio and may be able to better protect policyholders [\u00bd]"}, {"section": "Solution", "text": "Other possible actions that the regulator could take include: Pricing restrictions so that policyholders are protected from high prices [\u00bd]"}, {"section": "Solution", "text": "Restrictions on rating factors to protect disadvantaged groups [\u00bd]"}, {"section": "Solution", "text": "Regulating terms and conditions, e.g. claims definitions, so that policyholders receive the benefits they need [\u00bd]"}, {"section": "Solution", "text": "Restrictions on the sales process, e.g. disclosure requirements so the policyholder is fully aware of what they are buying [\u00bd]"}, {"section": "Solution", "text": "Restrictions on underwriting, e.g. restricting the use of genetic tests [\u00bd]"}, {"section": "Solution", "text": "Restrictions on investments, e.g. limiting exposure to high risk assets [\u00bd]"}, {"section": "Solution", "text": "A requirement to treat customers fairly, e.g. in relation to premium reviews [\u00bd]"}]}, {"id": "202209_Q2(i)", "sitting": "September 2022", "yymmkey": "202209", "ref": "Q2(i)", "marks": 3, "all_themes": ["Capital & Solvency", "Claims Management", "Data", "Income Protection", "Investments", "Pricing", "Regulation", "Reserving & Valuation", "Risk Management & Capital", "Underwriting"], "products": ["Income Protection"], "question_text": "Describe how this information could improve Company X\u2019s reserving.", "scenario": "Data on drug prescribing and statutory sickness absence pay are publicly available in Country Z, split by geographical region.\nIn Company X, a health and care insurer based in Country Z, a data scientist in the actuarial team has suggested using this publicly available data to improve the precision of its reserves for long-term individual Income Protection (IP) business.\nThe actuarial team have the following information available internally:\n\uf0b7 Policyholders\u2019 underwriting information by geographi", "bullets": [{"section": "Solution", "text": "If this information was not gathered during upfront underwriting, then there is potential to improve reserving by better locating lives with higher and lower risk of claiming within the book of business - untangling historic risk margins used in pricing population segments [\u00bd]"}, {"section": "Solution", "text": "The starting point for deriving assumptions for reserving purposes is best estimate [\u00bd]"}, {"section": "Solution", "text": "Reserves for internal management accounts - this could give more clarity on expected claims in the future - which may allow the insurer to reinsurer effectively [\u00bd]"}, {"section": "Solution", "text": "Reserves for published accounts - margins may be incorporated - there may be additional clarity and precision on where margins are required in the business mix [\u00bd]"}, {"section": "Solution", "text": "Reserves for solvency accounts - margins used will be appropriate to the regulation; however, better understanding of historic risk will improve precision of reserves - could potentially free capital for further investment [\u00bd]"}, {"section": "Solution", "text": "The sick pay data would provide a greater understanding of how many illnesses there were [\u00bd]"}, {"section": "Solution", "text": "And how long they last for and hence improve the estimation of: [\u00bd]"}, {"section": "Solution", "text": "IBNR reserves by estimating the proportion of people that have recently fallen sick [\u00bd]"}, {"section": "Solution", "text": "Claims in the deferred period reserves by estimating how many of these sicknesses would go on to complete the deferred period and become payments [\u00bd]"}, {"section": "Solution", "text": "Claims in payment reserves by estimating how long the sicknesses would continue to last [\u00bd]"}, {"section": "Solution", "text": "By analysing the data on drug prescriptions the insurer may be able to make better predictions for trends in claim rates [\u00bd]"}, {"section": "Solution", "text": "Disability/Morbidity risk: Those with both drug and above average sick days are more likely to claim [\u00bd]"}, {"section": "Solution", "text": "Those with the drugs may have the risk factor but where this is not associated with an increase in sick pay data then those in the geographical area may be showing resilience [\u00bd]"}, {"section": "Solution", "text": "With this information the insurer will have an improved understanding of the risk posed in each geographical region that policyholders reside [\u00bd]"}, {"section": "Solution", "text": "Lapse risk: The data may improve the lapse assumption used for reserving [\u00bd]"}, {"section": "Solution", "text": "E.g. identifying lives who were charged a premium that is greater than the risk posed who live in area of lower than average sick absence [\u00bd]"}]}, {"id": "202209_Q2(ii)", "sitting": "September 2022", "yymmkey": "202209", "ref": "Q2(ii)", "marks": 4, "all_themes": ["Capital & Solvency", "Data", "Income Protection", "Pricing", "Reserving & Valuation", "Underwriting"], "products": ["Income Protection"], "question_text": "Before progressing with the approach proposed by the data scientist, the chief actuary has asked if using the new sources of information is ethical, in the public interest and whether it would be acceptable to the regulator and the public.\nDiscuss the chief actuary\u2019s concerns.", "scenario": "Data on drug prescribing and statutory sickness absence pay are publicly available in Country Z, split by geographical region.\nIn Company X, a health and care insurer based in Country Z, a data scientist in the actuarial team has suggested using this publicly available data to improve the precision of its reserves for long-term individual Income Protection (IP) business.\nThe actuarial team have the following information available internally:\n\uf0b7 Policyholders\u2019 underwriting information by geographi", "bullets": [{"section": "Solution", "text": "Areas of concern: The collection and use of new types of data The data is publicly available by geographical regions [\u00bd]"}, {"section": "Solution", "text": "The insurer will already have the postcode of the policy holder to administrate the policy [\u00bd]"}, {"section": "Solution", "text": "No new data is being collected; the public data is being mapped [\u00bd]"}, {"section": "Solution", "text": "Data by postcode is often used to understand risk so this may not constitute a new use of data [\u00bd]"}, {"section": "Solution", "text": "The appropriateness of using the data would depend on how accurate, credible and up to date it was [\u00bd]"}, {"section": "Solution", "text": "Ethics of using the data: The chief actuary would be concerned that using data that was unethical or not in the public interest would lead to negative consequences for the insurer such as regulatory fines, reputational damage and loss of business [\u00bd]"}, {"section": "Solution", "text": "The data is publicly available so it may be considered acceptable to consumers [\u00bd]"}, {"section": "Solution", "text": "The use of the medical data can be used to better understand the risk posed during underwriting so it may be acceptable to consumers [\u00bd]"}, {"section": "Solution", "text": "The insurer could make an announcement or undertake customer surveys to test acceptability [\u00bd]"}, {"section": "Solution", "text": "The insurer could keep the use of this data under review with customer acceptability focus group research [\u00bd]"}, {"section": "Solution", "text": "The level of cross-subsidy between policyholders could decline [\u00bd]"}, {"section": "Solution", "text": "This could lead to less healthy policy holders being unable to find health and care insurance at an affordable cost\u201d [\u00bd]"}, {"section": "Solution", "text": "This may be an issue as healthy and less heathy lives are better found in the data. However, this is only on the existing business. [\u00bd]"}, {"section": "Solution", "text": "It will therefore depend if the insurer uses the information to review premiums or in future pricing [\u00bd]"}, {"section": "Solution", "text": "There may be issues with regulatory approval [\u00bd]"}, {"section": "Solution", "text": "This could give rise to TCF issues [\u00bd]"}, {"section": "Solution", "text": "E.g. under lack of fairness between guaranteed and reviewable premiums [\u00bd]"}]}, {"id": "202209_Q2(iii)", "sitting": "September 2022", "yymmkey": "202209", "ref": "Q2(iii)", "marks": 5, "all_themes": ["Capital & Solvency", "Claims Management", "Data", "Group Products", "Income Protection", "Investments", "Pricing", "Reserving & Valuation"], "products": ["Income Protection", "Group Products"], "question_text": "Describe the potential operational challenges associated with implementing the data scientist\u2019s proposal.", "scenario": "Data on drug prescribing and statutory sickness absence pay are publicly available in Country Z, split by geographical region.\nIn Company X, a health and care insurer based in Country Z, a data scientist in the actuarial team has suggested using this publicly available data to improve the precision of its reserves for long-term individual Income Protection (IP) business.\nThe actuarial team have the following information available internally:\n\uf0b7 Policyholders\u2019 underwriting information by geographi", "bullets": [{"section": "Solution", "text": "Data: The new data may be incorrect, incomplete or biased; this could invalidate the results of any assessment of trends or associations in the data [\u00bd]"}, {"section": "Solution", "text": "E.g. some geographical areas may include homes for those in society who require care or are currently experiencing employment issues [\u00bd]"}, {"section": "Solution", "text": "The data may not be helpful for self-employed people who may not contribute to absence record data if they are not entitled to those state benefits [\u00bd]"}, {"section": "Solution", "text": "This information may have been gathered for other purposes such as government funding. Consumers may not consent to it being used for this purpose [\u00bd]"}, {"section": "Solution", "text": "However, the data being publicly available may negate this [\u00bd]"}, {"section": "Solution", "text": "The postcode information on the policyholders may be out of date on long term policies, such that the current public data may not be representative of insured lives [\u00bd]"}, {"section": "Solution", "text": "Data may be available for multiple years. The quality of data may have improved over time [\u00bd]"}, {"section": "Solution", "text": "There may be bias in missing fields. Checks will be required [\u00bd]"}, {"section": "Solution", "text": "Some of the drugs from the CMO\u2019s lists may previously not have been prescribed or approved for use, there may need to be a historical mapping to prescribing data [\u00bd]"}, {"section": "Solution", "text": "Mis-selling: Less of a concern as only considering the existing book where the purchase has been made [\u00bd]"}, {"section": "Solution", "text": "The provision of additional services to those who are considered higher risk is in the best interest of the policyholder so less likely to be an issue [\u00bd]"}, {"section": "Solution", "text": "Data security: There is a risk that this data could be lost, corrupted or stolen [\u00bd]"}, {"section": "Solution", "text": "The insurer may need to use new systems of storing the extra data [\u00bd]"}, {"section": "Solution", "text": "It will need to ensure that these are secure. [\u00bd]"}, {"section": "Solution", "text": "Linking public data to existing data may be perceived to be snooping or watching policyholders unnecessarily and result in poor PR [\u00bd]"}, {"section": "Solution", "text": "The geographic regions have a limiting factor of granularity. However, there may be issues where a drug is only prescribed for certain ages - increasing the granularity of the total dataset to an unacceptable level [\u00bd]"}, {"section": "Solution", "text": "Legacy systems: If the insurer has been selling this product for many years, there may be many tranches of data on different systems to navigate [\u00bd]"}, {"section": "Solution", "text": "The policy data may not be easily matched to lapse and claims data at the policy level [\u00bd]"}, {"section": "Solution", "text": "Matching to the public data will require postcode to map to the geographical regions, this may not be available in lapse and claims data [\u00bd]"}, {"section": "Solution", "text": "The processing time of matching the data may be too long on existing systems to make the project manageable [\u00bd]"}, {"section": "Solution", "text": "The cost to upgrade systems may make the project unattractive [\u00bd]"}, {"section": "Solution", "text": "The administration to upgrade to enable data science to be applied may not be appealing to management [\u00bd]"}, {"section": "Solution", "text": "Staff skills: The insurer may not have staff with data scientist skills to develop the project [\u00bd]"}, {"section": "Solution", "text": "The insurer may be able to hire data scientists if there was wider application of these approaches such as in pricing [\u00bd]"}, {"section": "Solution", "text": "However, this may be expensive [\u00bd]"}]}, {"id": "202209_Q2(iv)", "sitting": "September 2022", "yymmkey": "202209", "ref": "Q2(iv)", "marks": 1, "all_themes": ["Capital & Solvency", "Income Protection", "Pricing", "Reserving & Valuation"], "products": ["Income Protection"], "question_text": "Following implementation of the proposal, a surplus has arisen. An actuary has been asked to undertake an analysis of surplus. Company X\u2019s board needs to prepare a statement regarding the intended use of the surplus for its parent company.\nDescribe the benefit to Company X of performing an analysis of surplus.", "scenario": "Data on drug prescribing and statutory sickness absence pay are publicly available in Country Z, split by geographical region.\nIn Company X, a health and care insurer based in Country Z, a data scientist in the actuarial team has suggested using this publicly available data to improve the precision of its reserves for long-term individual Income Protection (IP) business.\nThe actuarial team have the following information available internally:\n\uf0b7 Policyholders\u2019 underwriting information by geographi", "bullets": [{"section": "Solution", "text": "An analysis of surplus would indicate the amount of surplus arising [\u00bd]"}, {"section": "Solution", "text": "broken down into its component sources [\u00bd]"}, {"section": "Solution", "text": "Thus enabling appropriate decisions to be made about the distribution of surplus [\u00bd]"}]}, {"id": "202209_Q2(vi)", "sitting": "September 2022", "yymmkey": "202209", "ref": "Q2(vi)", "marks": 4, "all_themes": ["Capital & Solvency", "Data", "Income Protection", "Investments", "Pricing", "Reinsurance", "Reserving & Valuation", "Risk Management & Capital"], "products": ["Income Protection"], "question_text": "Discuss the potential uses of the surplus.", "scenario": "Data on drug prescribing and statutory sickness absence pay are publicly available in Country Z, split by geographical region.\nIn Company X, a health and care insurer based in Country Z, a data scientist in the actuarial team has suggested using this publicly available data to improve the precision of its reserves for long-term individual Income Protection (IP) business.\nThe actuarial team have the following information available internally:\n\uf0b7 Policyholders\u2019 underwriting information by geographi", "bullets": [{"section": "Solution", "text": "Without-profits business - 100% may be attributable to shareholders [\u00bd]"}, {"section": "Solution", "text": "If the block of business is securitised can repay loans as surplus arises - to investors or to the reinsurer under the terms of the treaty [\u00bd]"}, {"section": "Solution", "text": "Proprietary company - available capital can be augmented by a surplus [\u00bd]"}, {"section": "Solution", "text": "Prevents the need in the future to raise amounts from shareholders or invested through subordinated loan stock [\u00bd]"}, {"section": "Solution", "text": "Use to build the business, e.g. the surplus could be used to cover the new business strain of new policies (or passed on to future policyholders through lower premiums Or improved product features) and so help to expand the business [\u00bd]"}, {"section": "Solution", "text": "Or used to increase investment freedom and so improve expected investment return [\u00bd]"}, {"section": "Solution", "text": "Or used to reduce the use of reinsurance and so retain more profit [\u00bd]"}, {"section": "Solution", "text": "Or to buy blocks of business from other insurers [\u00bd]"}, {"section": "Solution", "text": "These uses of the surplus may provide a high return on capital and so be preferable to paying out the surplus as a dividend [\u00bd]"}, {"section": "Solution", "text": "The insurer may decide to retain the surplus given that it has arisen due to changes in reserves following the introduction of the new data source. It may turn out that the new methodology is less accurate and the surplus will be removed when the calculation is corrected at a later date [\u00bd]"}, {"section": "Solution", "text": "May give a proportion of the surplus to the parent company [\u00bd]"}, {"section": "Solution", "text": "May use to offset likely upcoming losses on a book of business [\u00bd]"}]}, {"id": "202209_Q2(vii)", "sitting": "September 2022", "yymmkey": "202209", "ref": "Q2(vii)", "marks": 6, "all_themes": ["Capital & Solvency", "Income Protection", "Pricing", "Professional Guidance", "Regulation", "Reserving & Valuation"], "products": ["Income Protection"], "question_text": "The analysis shows that business is more profitable in the higher socio-economic geographical regions where most policyholders select guaranteed premiums. Business in lower socio-economic regions, where most policyholders select reviewable premiums, is less profitable. Following the revisions to the reserving process, it has been proposed that premiums be adjusted to reflect the improved understanding of risk.\nDescribe possible actions that could help to ensure customers are treated fairly.\n[Total 27]\n\u20135", "scenario": "Data on drug prescribing and statutory sickness absence pay are publicly available in Country Z, split by geographical region.\nIn Company X, a health and care insurer based in Country Z, a data scientist in the actuarial team has suggested using this publicly available data to improve the precision of its reserves for long-term individual Income Protection (IP) business.\nThe actuarial team have the following information available internally:\n\uf0b7 Policyholders\u2019 underwriting information by geographi", "bullets": [{"section": "Solution", "text": "Treating customers fairly: The insurer needs to ensure that the customer understands the difference between guaranteed insurance contract and reviewable premiums at the outset [\u00bd]"}, {"section": "Solution", "text": "Could undertake policyholder research through focus groups to understand if policyholders or consumers would consider the change within their reasonable expectations [\u00bd]"}, {"section": "Solution", "text": "The insurers need to ensure the communications to the reviewable premium policyholders are clear and concise [\u00bd]"}, {"section": "Solution", "text": "The insurer could offer additional support and signpost the client to independent advice before deciding if the change should be accepted or not [\u00bd]"}, {"section": "Solution", "text": "The insurer could discuss the changes with its risk board to see if the potential poor PR is worth the potential net change of the increased premiums and lapses overall [\u00bd]"}, {"section": "Solution", "text": "Must be in accordance with the contract\u2019s clear explanation of how the premium from a policy could be varied going forward [\u00bd]"}, {"section": "Solution", "text": "Those who can more afford a premium increase are now known to pose less risk. Those with increased risk are less likely to afford the premium. Overall, the portfolio may be adequately priced - so without decreasing the guaranteed premiums but adjusting the reviewable premiums - the existing portfolio would become more profitable. Can the insurer justify this? [\u00bd]"}, {"section": "Solution", "text": "However, if the portfolio is not profitable - this may be seen as safeguarding existing policyholders [\u00bd]"}, {"section": "Solution", "text": "The information given suggests that it would be fair to reduce the premiums for the higher socio-economic groups [\u00bd]"}, {"section": "Solution", "text": "And / or increase the premiums for the lower socio-economic groups [\u00bd]"}, {"section": "Solution", "text": "However, the insurer should conduct further analysis to consider whether the differences in profitability reflect the differences in risk taken on [\u00bd]"}, {"section": "Solution", "text": "This may require the consideration of different measures of profit (e.g. NPV, IRR) [\u00bd]"}, {"section": "Solution", "text": "The bigger benefit size and the guaranteed nature of the premiums of the higher socio- economic groups suggests that it would be fair for the insurer to have a higher net present value of profit as compensation for the higher risk [\u00bd]"}, {"section": "Solution", "text": "So after further analysis, the insurer may conclude to take no further action as the profitability differences are fair in relation to the differences in risk being taken on [\u00bd]"}, {"section": "Solution", "text": "The insurer needs to consider any element of cross-subsidising, e.g. charging more to larger policies to help cover expenses of smaller policies. If this was reversed, the insurer would need to consider if this was fair to smaller policies [\u00bd]"}, {"section": "Solution", "text": "The insurer may not take any premium review action, in order to be in line with TCF [\u00bd]"}, {"section": "Solution", "text": "Effectively the option to increase premium or lapse may be to the detriment of the consumer [\u00bd]"}, {"section": "Solution", "text": "The insurer may provide an alternative option of reducing cover [\u00bd]"}, {"section": "Solution", "text": "e.g. extending the waiting period, reducing the replacement ratio, or making the occupational terms less generous [\u00bd]"}, {"section": "Solution", "text": "The insurer should take action to ensure the policyholder has adequate options to lapse without penalties [\u00bd]"}, {"section": "Solution", "text": "This may also include ensuring that commission clawback terms are not enforced [\u00bd]"}, {"section": "Solution", "text": "The health insurer may decide to take no action other than to monitor the business mix of the existing business and new business such that subsidies are not biased to an unprofitable level [\u00bd]"}]}, {"id": "202209_Q3(i)", "sitting": "September 2022", "yymmkey": "202209", "ref": "Q3(i)", "marks": 7, "all_themes": ["Claims Management", "Data", "Group Products", "Pricing", "Regulation", "Reserving & Valuation", "State Healthcare & Demographics", "Underwriting"], "products": ["Group Products"], "question_text": "Outline the key risks to Company C, in relation to:\n(a) premiums.\n(b) claims.", "scenario": "Company C operates in a country where the majority of the population earns a very low income and have variable and irregular income streams. Company C is considering launching a new microinsurance product to the market. One of the objectives of microinsurance is to provide a social benefit and, as a result, benefits paid out to policyholders will be a key metric in evaluating the success of the product.\nThe new microinsurance product will offer a fixed cash benefit payable in the event of hospit", "bullets": [{"section": "Solution", "text": "Inconsistent premium collection may make it difficult to manage the expense base [\u00bd]"}, {"section": "Solution", "text": "If insufficient premiums are sold the expense loadings may not cover the fixed expenses [\u00bd]"}, {"section": "Solution", "text": "Microinsurance implies low premiums so this will need substantial scale to be commercially viable [\u00bd]"}, {"section": "Solution", "text": "There may be little data available to price premiums [\u00bd]"}, {"section": "Solution", "text": "Individual sales and the use of field agents will mean that distribution costs need to be carefully considered [\u00bd]"}, {"section": "Solution", "text": "If agents earn commission based on premium received, it may be difficult to estimate expected incomes [\u00bd]"}, {"section": "Solution", "text": "There is a risk that gaps in cover lead to poor customer experience if a claim event occurs when a customer has not paid a premium [\u00bd]"}, {"section": "Solution", "text": "It is not clear what mechanism will be used to collect premium. Customers may not have bank accounts to allow for deduction of premiums [\u00bd]"}, {"section": "Solution", "text": "If this is the case, repeat premium payment may be poor and lapse rates may be high leading to poor customer experience [\u00bd]"}, {"section": "Solution", "text": "And an inability to recoup acquisition costs [\u00bd]"}, {"section": "Solution", "text": "More policyholders may choose to pause their premium payments than expected [\u00bd]"}, {"section": "Solution", "text": "The ability to stop and restart premium payments creates extra administration costs, so there is a risk of higher than expected expenses. [\u00bd]"}, {"section": "Solution", "text": "(Maximum 5 marks for premium risks) Anti-selection will be a key risk that will need to be considered [\u00bd]"}, {"section": "Solution", "text": "By allowing gaps in cover without a corresponding waiting period, there is a risk that the policy will be activated when a person expects to be hospitalised [\u00bd]"}, {"section": "Solution", "text": "Selective lapses may be an issue as there is no penalty for gaps in insurance cover [\u00bd]"}, {"section": "Solution", "text": "There may be concerns with fraud [\u00bd]"}, {"section": "Solution", "text": "Claims may be difficult to validate [\u00bd]"}, {"section": "Solution", "text": "The customer base may not be able to submit the necessary requirements [\u00bd]"}, {"section": "Solution", "text": "The benefit does not appear to be related to the severity of hospitalisation [\u00bd]"}, {"section": "Solution", "text": "There is a chance of windfall payments if the lump sum benefit is substantially higher than the cost of hospitalisation and/or the potential income loss due to hospitalisation [\u00bd]"}, {"section": "Solution", "text": "Business mix may differ compared to expected leading to higher claims. For example: Age Gender Health status Occupation Location [\u00bd]"}, {"section": "Solution", "text": "(\u00bd mark for 2 examples, maximum 1 mark for 4 examples Are there factors that could influence hospitalisation incidence rates and invalidate claim assumptions? [\u00bd]"}, {"section": "Solution", "text": "Claims rates could be very low which may raise risks relating to Treating Customers Fairly [\u00bd]"}, {"section": "Solution", "text": "Or may lead to regulator intervention [\u00bd]"}, {"section": "Solution", "text": "There may be more claims than expected [\u00bd]"}, {"section": "Solution", "text": "Hospital stays may be longer than expected, e.g. there is a moral hazard that policyholders may pressurise hospitals to keep them in for at least 3 days or may leave hospital after 3 days and then returning shortly afterwards to claim again [\u00bd]"}, {"section": "Solution", "text": "(Maximum 5 marks for claims risks)"}]}, {"id": "202209_Q3(ii)", "sitting": "September 2022", "yymmkey": "202209", "ref": "Q3(ii)", "marks": 8, "all_themes": ["Claims Management", "Group Products", "Pricing", "Product Design", "Reserving & Valuation", "State Healthcare & Demographics", "Underwriting"], "products": ["Group Products"], "question_text": "Suggest possible product design features that could be introduced to mitigate the risks identified in parts (i)(a) and (b).", "scenario": "Company C operates in a country where the majority of the population earns a very low income and have variable and irregular income streams. Company C is considering launching a new microinsurance product to the market. One of the objectives of microinsurance is to provide a social benefit and, as a result, benefits paid out to policyholders will be a key metric in evaluating the success of the product.\nThe new microinsurance product will offer a fixed cash benefit payable in the event of hospit", "bullets": [{"section": "Solution", "text": "The company can ensure that premium rates are reviewable [\u00bd]"}, {"section": "Solution", "text": "and benefit terms are reviewable [\u00bd]"}, {"section": "Solution", "text": "This would ensure that the company has the ability to react to unfavourable experience The company could consider a group product structure [\u00bd]"}, {"section": "Solution", "text": "This could assist with premium collection if the group is responsible for collecting premium on behalf of individuals [\u00bd]"}, {"section": "Solution", "text": "This could assist with acquisition costs given the expected low premiums associated with microinsurance products [\u00bd]"}, {"section": "Solution", "text": "The terms and conditions should be set out clearly and be easily understood [\u00bd]"}, {"section": "Solution", "text": "The terms of the product might be set to appeal to the anticipated target market to try to obtain the business mix expected [\u00bd]"}, {"section": "Solution", "text": "The company could require a waiting period if the gap in cover exceeds a certain period of time, for example 90 or 180 days [\u00bd]"}, {"section": "Solution", "text": "The company could introduce cash back features or other loyalty-based rewards to drive consistent premium payment [\u00bd]"}, {"section": "Solution", "text": "The company could partner with private or public hospitals to identify claims processes which mitigate fraud risk [\u00bd]"}, {"section": "Solution", "text": "And to ease the claim process for customers [\u00bd]"}, {"section": "Solution", "text": "The company could introduce maximum (and minimum) ages for enrolment [\u00bd]"}, {"section": "Solution", "text": "And for provision of insurance cover [\u00bd]"}, {"section": "Solution", "text": "The company could review the term of the cover [\u00bd]"}, {"section": "Solution", "text": "And consider whether an annual product would eliminate some of the risks identified [\u00bd]"}, {"section": "Solution", "text": "The benefit could be structured as a payment per night as this would mean that the benefit may be more closely linked to the need [\u00bd]"}, {"section": "Solution", "text": "The definition of hospital stay could be adjusted if the claims ratio is low [\u00bd]"}, {"section": "Solution", "text": "For example, based on a minimum of 1 or 2 nights stay [\u00bd]"}, {"section": "Solution", "text": "Could limit the number of claims made per month to reduce the risk of moral hazard. [\u00bd]"}, {"section": "Solution", "text": "Selection risk could be reduced by requiring a statement of good health when taking out a policy or re-starting premiums [\u00bd]"}]}, {"id": "202209_Q3(iii)", "sitting": "September 2022", "yymmkey": "202209", "ref": "Q3(iii)", "marks": 2, "all_themes": ["Claims Management", "Pricing", "Reinsurance", "Reserving & Valuation", "State Healthcare & Demographics", "Underwriting"], "products": ["General/Mixed"], "question_text": "State the main reserves Company C should hold for the microinsurance product.", "scenario": "Company C operates in a country where the majority of the population earns a very low income and have variable and irregular income streams. Company C is considering launching a new microinsurance product to the market. One of the objectives of microinsurance is to provide a social benefit and, as a result, benefits paid out to policyholders will be a key metric in evaluating the success of the product.\nThe new microinsurance product will offer a fixed cash benefit payable in the event of hospit", "bullets": [{"section": "Solution", "text": "IBNR (Incurred but not reported) [\u00bd]"}, {"section": "Solution", "text": "UPR (Unexpired premium reserve) [\u00bd]"}, {"section": "Solution", "text": "URR (Unexpired risk reserve) [\u00bd]"}, {"section": "Solution", "text": "RBNS (Reported but not settled) [\u00bd]"}, {"section": "Solution", "text": "Global reserves such as catastrophe reserves or equalisation reserves [\u00bd]"}]}, {"id": "202209_Q3(iv)", "sitting": "September 2022", "yymmkey": "202209", "ref": "Q3(iv)", "marks": 2, "all_themes": ["Claims Management", "Data", "Pricing", "Reinsurance", "Reserving & Valuation", "State Healthcare & Demographics", "Underwriting"], "products": ["General/Mixed"], "question_text": "Outline the data requirements Company C would need in order to calculate each of the reserves identified in part (iii).", "scenario": "Company C operates in a country where the majority of the population earns a very low income and have variable and irregular income streams. Company C is considering launching a new microinsurance product to the market. One of the objectives of microinsurance is to provide a social benefit and, as a result, benefits paid out to policyholders will be a key metric in evaluating the success of the product.\nThe new microinsurance product will offer a fixed cash benefit payable in the event of hospit", "bullets": [{"section": "Solution", "text": "IBNR: Need claims data [\u00bd]"}, {"section": "Solution", "text": "Including claims delays [\u00bd]"}, {"section": "Solution", "text": "If claims have been light, then may need to estimate based on premium data [\u00bd]"}, {"section": "Solution", "text": "May need assistance from reinsurer to estimate delays [\u00bd]"}, {"section": "Solution", "text": "UPR: Need premium and exposure data [\u00bd]"}, {"section": "Solution", "text": "URR: This would make use of claims data listed above [\u00bd]"}, {"section": "Solution", "text": "RBNS: Need to know the number of outstanding claims [\u00bd]"}, {"section": "Solution", "text": "And whether the claimant has completed 3 days in hospital or has been in hospital for less than 3 days but is yet to leave [\u00bd]"}, {"section": "Solution", "text": "Catastrophe reserves/equalisation reserves: Data on past claims [\u00bd]"}, {"section": "Solution", "text": "Data on average claims experience [\u00bd]"}]}, {"id": "202209_Q3(v)", "sitting": "September 2022", "yymmkey": "202209", "ref": "Q3(v)", "marks": 8, "all_themes": ["Claims Management", "Data", "Group Products", "Pricing", "Product Design", "Regulation", "Reserving & Valuation", "State Healthcare & Demographics", "Underwriting"], "products": ["Group Products"], "question_text": "Company C has now launched the product. Company C has been tracking the claims ratio, defined as claims paid over gross premium received, since the launch. The claims ratio has been lower than anticipated.\nThe chief actuary has asked the product team at Company C to investigate whether the product is meeting its social objective, and fulfilling the principle of treating customers fairly.\nList the key investigations the product team should undertake, including:\n(a) examples of the data needed to complete the investigation.\n(b) the key issues the investigation will highlight.", "scenario": "Company C operates in a country where the majority of the population earns a very low income and have variable and irregular income streams. Company C is considering launching a new microinsurance product to the market. One of the objectives of microinsurance is to provide a social benefit and, as a result, benefits paid out to policyholders will be a key metric in evaluating the success of the product.\nThe new microinsurance product will offer a fixed cash benefit payable in the event of hospit", "bullets": [{"section": "Solution", "text": "Data needed Operational investigations: Customer service queries [\u00bd]"}, {"section": "Solution", "text": "Claims process audit including [\u00bd]"}, {"section": "Solution", "text": "Declined claims [\u00bd]"}, {"section": "Solution", "text": "Claim turnaround time [\u00bd]"}, {"section": "Solution", "text": "Percentage of claims with all documents submitted [\u00bd]"}, {"section": "Solution", "text": "Whether claims are submitted but customers do not have cover [\u00bd]"}, {"section": "Solution", "text": "Complaints [\u00bd]"}, {"section": "Solution", "text": "Need to know the premium amount [\u00bd]"}, {"section": "Solution", "text": "The number of policyholders covered [\u00bd]"}, {"section": "Solution", "text": "And details of when they have stopped and restarted premium payments [\u00bd]"}, {"section": "Solution", "text": "Lapse investigations: Percentage lapse during the waiting period [\u00bd]"}, {"section": "Solution", "text": "Duration of policyholders [\u00bd]"}, {"section": "Solution", "text": "New business mix and volume investigations: Age [\u00bd]"}, {"section": "Solution", "text": "Gender [\u00bd]"}, {"section": "Solution", "text": "Location [\u00bd]"}, {"section": "Solution", "text": "Occupation [\u00bd]"}, {"section": "Solution", "text": "Other rating factors considered during pricing [\u00bd]"}, {"section": "Solution", "text": "Survey views of salespeople including consumer interest, understanding and conversion rates [\u00bd]"}, {"section": "Solution", "text": "These investigations will highlight: Customer understanding of the product and cover provided [\u00bd]"}, {"section": "Solution", "text": "Any mis-selling [\u00bd]"}, {"section": "Solution", "text": "Areas where process improvements could improve the customer experience [\u00bd]"}, {"section": "Solution", "text": "Whether the product meet customer needs (e.g. are persistency rates high / do customers return [\u00bd]"}, {"section": "Solution", "text": "Take-up rates versus target market expectations [\u00bd]"}, {"section": "Solution", "text": "Customer profile versus expectation [\u00bd]"}, {"section": "Solution", "text": "This will also show if the distribution process failing to meet particular groups (by age, gender, location etc) [\u00bd]"}, {"section": "Solution", "text": "Are claims made meeting needs [\u00bd]"}, {"section": "Solution", "text": "Do products represent good value for money [\u00bd]"}, {"section": "Solution", "text": "Reason for claims (accident versus illness for example) versus assumptions [\u00bd]"}, {"section": "Solution", "text": "Length of hospital stays and whether the 3-night minimum is reached [\u00bd]"}, {"section": "Solution", "text": "How this compares to hospital data in country [\u00bd]"}, {"section": "Solution", "text": "Level of benefit versus [\u00bd]"}, {"section": "Solution", "text": "Costs of hospitalisation [\u00bd]"}, {"section": "Solution", "text": "Income lost due to hospitalisation [\u00bd]"}, {"section": "Solution", "text": "Additional outpatient / medical costs incurred [\u00bd]"}]}, {"id": "202209_Q3(vi)", "sitting": "September 2022", "yymmkey": "202209", "ref": "Q3(vi)", "marks": 8, "all_themes": ["Claims Management", "Data", "Investments", "Models", "Pricing", "Professional Guidance", "Reserving & Valuation", "State Healthcare & Demographics", "Underwriting"], "products": ["General/Mixed"], "question_text": "\u20136 The chief actuary has asked the product team for proposals to increase the claims ratio for the product. Four proposals have been put forward:\n\uf0b7 Increase the sum assured value.\n\uf0b7 Amend the hospital definition to allow claims following a 2-night minimum stay.\n\uf0b7 Reduce the premiums payable.\n\uf0b7 Carry out an education and awareness programme for customers.\nDiscuss the advantages and disadvantages of each proposal from the perspective of:\n(a) the customer.\n(b) Company C.", "scenario": "Company C operates in a country where the majority of the population earns a very low income and have variable and irregular income streams. Company C is considering launching a new microinsurance product to the market. One of the objectives of microinsurance is to provide a social benefit and, as a result, benefits paid out to policyholders will be a key metric in evaluating the success of the product.\nThe new microinsurance product will offer a fixed cash benefit payable in the event of hospit", "bullets": [{"section": "Solution", "text": "Increase the sum assured: This will increase the claim ratio by increasing the claim amount [\u00bd]"}, {"section": "Solution", "text": "Customers will still need to be hospitalised for 3 days so this will not impact claim incidence [\u00bd]"}, {"section": "Solution", "text": "Policyholders may value the higher benefit amount and think the policy therefore offers better value for money [\u00bd]"}, {"section": "Solution", "text": "If the benefit level has been set at a low level, then it may not have met the customer\u2019s needs and so the higher proposed benefit would be more appropriate [\u00bd]"}, {"section": "Solution", "text": "The company may face increased fraud risk if there is a mismatch between the customer need and the benefit and/or the benefit provides a windfall payment [\u00bd]"}, {"section": "Solution", "text": "As the company has experience on claim incidence rates, increasing the sum assured may provide a mechanism for increasing the claim ratio with a low level of uncertainty [\u00bd]"}, {"section": "Solution", "text": "Amend the hospital definition: This will enable claim payments to a greater number of policyholders [\u00bd]"}, {"section": "Solution", "text": "This may be welcomed by customers [\u00bd]"}, {"section": "Solution", "text": "Shorter stays in hospital would be associated with smaller costs for the policyholder and so now the benefit may be too big to meet their needs in some cases possibly leading to windfall payments, depending on how the benefits paid are defined [\u00bd]"}, {"section": "Solution", "text": "The company may not have or only have limited data to price the benefit extension [\u00bd]"}, {"section": "Solution", "text": "The additional claims would lead to greater claims expenses for the insurer [\u00bd]"}, {"section": "Solution", "text": "Given the microinsurance often targets a social good, expanding the benefit to more people may meet company objectives [\u00bd]"}, {"section": "Solution", "text": "Premium reduction: This will increase the claim ratio by increasing the value of claims relative to premiums received [\u00bd]"}, {"section": "Solution", "text": "This will make the product more affordable. Customers from lower income groups may be more likely to take out the product as a result [\u00bd]"}, {"section": "Solution", "text": "This could also lead to an increase in the claim ratio if these customers come from a higher risk segment given occupation and/or income levels [\u00bd]"}, {"section": "Solution", "text": "Improving affordability helps the product meet the social benefit aim of the contract [\u00bd]"}, {"section": "Solution", "text": "As the product is a microinsurance product, the premium may already be at a low level. Reducing premium levels further may compromise the ability of the product to support operational expenses [\u00bd]"}, {"section": "Solution", "text": "If field agents are remunerated via commission, reducing the premium will require commission models to be revisited [\u00bd]"}, {"section": "Solution", "text": "However, this may lead to higher sales which would help the insurer to spread overhead and development costs over a larger number of policies and so may reduce per policy expenses [\u00bd]"}, {"section": "Solution", "text": "The company may have limited or no data to price the benefit extension [\u00bd]"}, {"section": "Solution", "text": "Education & awareness programmes / Process improvement: These actions will aim to increase the number of claims submitted and therefore increase the claims ratio [\u00bd]"}, {"section": "Solution", "text": "These programmes will enhance the customer experience. Customers may submit more claims if they are aware of the benefits and an easy / automatic claims process is in place [\u00bd]"}, {"section": "Solution", "text": "From the company perspective, the company will aim to ensure that customers understand the benefit and are able to claim easily [\u00bd]"}, {"section": "Solution", "text": "This may increase communication costs or require investment in
