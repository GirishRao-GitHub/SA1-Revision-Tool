ency", "Legislation & Taxation", "Pricing", "Regulation", "Reserving & Valuation"], "products": ["General/Mixed"], "question_text": "After gaining independence from the association, Country Y has to decide on how to regulate its insurance industry.  Country Y is consulting actuaries on the following four options:\nOption 1. Retain the rules of the association at the date of independence and subsequently incorporate any other rules made by the association.\nOption 2. Retain the rules of the association at the date of independence but decide on a rule-by-rule basis whether to adopt any future association rule changes.\nOption 3. Return to the insurance regulations originally set in Country Y.\nOption 4. Allow insurance companies to follow either regulation, provided they can demonstrate they are at least equivalent to Country Y\u2019s insurance regulations.\nDiscuss the advantages and disadvantages of each of the options from the point of view of the three interested parties:\n(a) the insurance companies\n(b) the regulator\n(c) the policyholders\n[Total 32]", "scenario": "", "bullets": [{"section": "Solution", "text": "Option 1: Retain association rules and follow future changes."}, {"section": "Solution", "text": "Insurance Companies: Advantage: Minimal initial change, maintains consistency with the association. [1]"}, {"section": "Solution", "text": "Disadvantage: Loss of control over future rules which may be unsuitable for Country Y. [1]"}, {"section": "Solution", "text": "Regulator: Advantage: Simple to administer, relies on the association\u2019s expertise. [1]"}, {"section": "Solution", "text": "Disadvantage: May not protect local policyholders against local risks. [1]"}, {"section": "Solution", "text": "Policyholders: Advantage: Stability and continuity of protection. [1]"}, {"section": "Solution", "text": "Disadvantage: May pay higher premiums if rules are too onerous. [1]"}, {"section": "Solution", "text": "Option 2: Retain current rules, decide future rules rule-by-rule."}, {"section": "Solution", "text": "Insurance Companies: Advantage: More flexible than Option 1, allows for local adjustments. [1]"}, {"section": "Solution", "text": "Disadvantage: Uncertainty about future changes, complex to manage. [1]"}, {"section": "Solution", "text": "Regulator: Advantage: Allows tailoring to local needs while maintaining a baseline. [1]"}, {"section": "Solution", "text": "Disadvantage: Onerous to review every rule change. [1]"}, {"section": "Solution", "text": "Policyholders: Advantage: Potential for better protection tailored to Country Y. [1]"}, {"section": "Solution", "text": "Option 3: Return to original Country Y regulations."}, {"section": "Solution", "text": "Insurance Companies: Advantage: Pragmatic and familiar regulation, potentially lower costs. [1]"}, {"section": "Solution", "text": "Disadvantage: Significant upheaval in systems and processes. [1]"}, {"section": "Solution", "text": "Regulator: Advantage: Full control over the industry, can support local market development. [1]"}, {"section": "Solution", "text": "Disadvantage: Resources needed to update and maintain own rules. [1]"}, {"section": "Solution", "text": "Option 4: Dual regulation approach (equivalence)."}, {"section": "Solution", "text": "Insurance Companies: Advantage: Maximum flexibility for international groups. [1]"}, {"section": "Solution", "text": "Disadvantage: Risk of complex reporting if following two systems. [1]"}, {"section": "Solution", "text": "Regulator: Advantage: Ensures high standards while allowing flexibility. [1]"}, {"section": "Solution", "text": "Disadvantage: Difficult to monitor and compare different companies. [1]"}]}, {"id": "202004_Q3(i)", "sitting": "April 2020", "yymmkey": "202004", "ref": "Q3(i)", "marks": 3, "all_themes": ["Capital & Solvency", "Claims Management", "Critical Illness", "Pricing", "Product Design (Protection)"], "products": ["Critical Illness"], "question_text": "Suggest ways, other than product features, through which the insurer could differentiate itself.", "scenario": "In Country Z all health and care insurers provide non-profit, non-linked standalone Critical Illness (CI) insurance on guaranteed terms.  All health and care insurers adopt industry standard CI definitions that solely cover heart attack, stroke and cancer on the insured life only.\nOne health and care insurer is looking to differentiate its product by extending the cancer cover provided by their policy to include a children\u2019s cancer option.", "bullets": [{"section": "Solution", "text": "Ways to differentiate: \u2022 Price (lower premiums). [\u00bd]"}, {"section": "Solution", "text": "Better customer service / claims handling. [1]"}, {"section": "Solution", "text": "Brand reputation and strength. [\u00bd]"}, {"section": "Solution", "text": "Distribution strategy (e.g. exclusive brokers, online portal). [1]"}, {"section": "Solution", "text": "Added-value services (e.g. medical helplines, second opinion services). [1]"}, {"section": "Solution", "text": "Use of technology (e.g. health tracking apps). [\u00bd]"}]}, {"id": "202004_Q3(ii)", "sitting": "April 2020", "yymmkey": "202004", "ref": "Q3(ii)", "marks": 6, "all_themes": ["Capital & Solvency", "Claims Management", "Critical Illness", "Data", "Pricing", "Product Design", "Product Design (Protection)", "Regulation", "Reinsurance", "Risk Management & Capital", "Underwriting"], "products": ["Critical Illness"], "question_text": "Describe what the insurer would need to consider in order to include the children\u2019s cancer option.", "scenario": "In Country Z all health and care insurers provide non-profit, non-linked standalone Critical Illness (CI) insurance on guaranteed terms.  All health and care insurers adopt industry standard CI definitions that solely cover heart attack, stroke and cancer on the insured life only.\nOne health and care insurer is looking to differentiate its product by extending the cancer cover provided by their policy to include a children\u2019s cancer option.", "bullets": [{"section": "Solution", "text": "Factors to consider for children\u2019s cancer option: \u2022 Lack of credible historical data for childhood cancers. [1]"}, {"section": "Solution", "text": "High severity/impact of claims (emotional and financial). [\u00bd]"}, {"section": "Solution", "text": "Definition of \"child\" (age limits). [\u00bd]"}, {"section": "Solution", "text": "Anti-selection risk (parents buying for sick children). [1]"}, {"section": "Solution", "text": "Morbidity assumptions and pricing margins. [1]"}, {"section": "Solution", "text": "Reinsurance availability and cost. [1]"}, {"section": "Solution", "text": "Impact on capital requirements. [\u00bd]"}, {"section": "Solution", "text": "Market demand and competitor actions. [\u00bd]"}]}, {"id": "202004_Q3(iii)", "sitting": "April 2020", "yymmkey": "202004", "ref": "Q3(iii)", "marks": 1, "all_themes": ["Capital & Solvency", "Claims Management", "Critical Illness", "Pricing", "Product Design (Protection)"], "products": ["Critical Illness"], "question_text": "Another health and care insurer decides to redesign its CI product to be a unit-linked product with a reviewable morbidity charge deducted monthly from the unit funds, a fixed allocation rate and a reviewable monthly policy fee and an annual fund-based management charge.  The health and care insurer offers no other unit-linked products.\nExplain what a morbidity charge represents.", "scenario": "In Country Z all health and care insurers provide non-profit, non-linked standalone Critical Illness (CI) insurance on guaranteed terms.  All health and care insurers adopt industry standard CI definitions that solely cover heart attack, stroke and cancer on the insured life only.\nOne health and care insurer is looking to differentiate its product by extending the cancer cover provided by their policy to include a children\u2019s cancer option.", "bullets": [{"section": "Solution", "text": "Morbidity charge: The monthly cost of providing the critical illness insurance cover, deducted from the unit fund. [1]"}]}, {"id": "202004_Q3(iv)", "sitting": "April 2020", "yymmkey": "202004", "ref": "Q3(iv)", "marks": 2, "all_themes": ["Capital & Solvency", "Critical Illness", "Pricing", "Product Design (Protection)"], "products": ["Critical Illness"], "question_text": "List the factors that will influence the size of the morbidity charge.", "scenario": "In Country Z all health and care insurers provide non-profit, non-linked standalone Critical Illness (CI) insurance on guaranteed terms.  All health and care insurers adopt industry standard CI definitions that solely cover heart attack, stroke and cancer on the insured life only.\nOne health and care insurer is looking to differentiate its product by extending the cancer cover provided by their policy to include a children\u2019s cancer option.", "bullets": [{"section": "Solution", "text": "Factors influencing morbidity charge: \u2022 Age and gender of the life insured. [\u00bd]"}, {"section": "Solution", "text": "Health status and medical history. [\u00bd]"}, {"section": "Solution", "text": "Benefit amount. [\u00bd]"}, {"section": "Solution", "text": "Claim incidence rates for the covered conditions. [\u00bd]"}]}, {"id": "202004_Q3(v)", "sitting": "April 2020", "yymmkey": "202004", "ref": "Q3(v)", "marks": 8, "all_themes": ["Capital & Solvency", "Critical Illness", "Investments", "Pricing", "Product Design (Protection)", "Regulation"], "products": ["Critical Illness"], "question_text": "Discuss the impact on the health and care insurer\u2019s risk following the change to a unit-linked form of the product.\n[Total 20]\nEND OF PAPER", "scenario": "In Country Z all health and care insurers provide non-profit, non-linked standalone Critical Illness (CI) insurance on guaranteed terms.  All health and care insurers adopt industry standard CI definitions that solely cover heart attack, stroke and cancer on the insured life only.\nOne health and care insurer is looking to differentiate its product by extending the cancer cover provided by their policy to include a children\u2019s cancer option.", "bullets": [{"section": "Solution", "text": "Impact on risk following the change to unit-linked: Company Risks: \u2022 Market Risk: Reduced as the policyholder bears the investment risk. [1]"}, {"section": "Solution", "text": "Expense Risk: Increased if fixed charges do not cover inflating costs. [1]"}, {"section": "Solution", "text": "Operational Risk: New systems and processes for unit pricing/fund mgmt. [1]"}, {"section": "Solution", "text": "Persistency Risk: Lapses may increase if fund performance is poor. [1]"}, {"section": "Solution", "text": "Mortality/Morbidity Risk: Retained but reviewable charges provide a hedge. [1]"}, {"section": "Solution", "text": "Reputation Risk: If fund performance is poor or charges seem unfair. [1]"}, {"section": "Solution", "text": "Regulatory Risk: Compliance with unit-linked disclosure rules. [1]"}, {"section": "Solution", "text": "Benefits of reviewability: \u2022 Ability to pass on adverse mortality/morbidity experience to policyholders. [1]"}]}, {"id": "202009_Q1(i)", "sitting": "September 2020", "yymmkey": "202009", "ref": "Q1(i)", "marks": 5, "all_themes": ["Claims Management", "Critical Illness", "Data", "Income Protection", "Investments", "Pricing", "Private Medical Insurance (PMI)", "Reserving & Valuation", "Underwriting"], "products": ["Private Medical Insurance (PMI)", "Critical Illness", "Income Protection"], "question_text": "Suggest how Company XYZ could use technology to enhance its product proposition.", "scenario": "Country A is a large, well-developed country, with a heavily regulated health and care insurance market.\nFor many years the health and care insurance market in Country A has been dominated by a small number of large, well-established health and care insurance companies that sell a wide range of health and care insurance products.\nThere has been considerable criticism of the dominant health and care insurance companies in the consumer press of Country A. Particular concerns have been expressed ab", "bullets": [{"section": "Solution", "text": "Sales Technology can help streamline the sales process [\u00bd]"}, {"section": "Solution", "text": "It can provide customers with access to basic details about health and care insurers [\u00bd]"}, {"section": "Solution", "text": "And information about the products they wish to buy [\u00bd]"}, {"section": "Solution", "text": "E.g. on its own website or on online comparison websites [\u00bd]"}, {"section": "Solution", "text": "This can allow easier comparison of XYZ\u2019s products with those of the competition for the consumer [\u00bd]"}, {"section": "Solution", "text": "And the advisor/distributor [\u00bd]"}, {"section": "Solution", "text": "Indicative premium quotes can be provided based on the information entered e.g. size of benefit required, term etc [\u00bd]"}, {"section": "Solution", "text": "Underwriting Technology can be used to make the underwriting process less onerous For example, using data already obtained to prepopulate application forms [\u00bd]"}, {"section": "Solution", "text": "Or by allowing purchase online [\u00bd]"}, {"section": "Solution", "text": "It may be possible for applicants or distributors to enter information directly and to receive a quick yes/no or need for further information [\u00bd]"}, {"section": "Solution", "text": "Technology can help insurer categorise the customers risk more accurately. [\u00bd]"}, {"section": "Solution", "text": "E.g. through the provision of an app or wearable technology by the insurer to gather more data on consumer [\u00bd]"}, {"section": "Solution", "text": "In return consumer can receive additional benefits such as coffees, film tickets etc [\u00bd]"}, {"section": "Solution", "text": "Data may from third party sources to help assess health risks. [\u00bd]"}, {"section": "Solution", "text": "Use of technology may be able to identify cases of fraud easily, either at the application stage or the claims stage [\u00bd]"}, {"section": "Solution", "text": "Customer service Policyholders can be provided with interactive tools to access information on their policies [\u00bd]"}, {"section": "Solution", "text": "For example: Monitoring their health and care insurance products [\u00bd]"}, {"section": "Solution", "text": "Making product amendments [\u00bd]"}, {"section": "Solution", "text": "Obtaining online valuations for unit linked products [\u00bd]"}, {"section": "Solution", "text": "Or allowing switches between funds for unit linked products [\u00bd]"}, {"section": "Solution", "text": "[Marks given for other relevant examples, maximum 2 marks] Channels for doing this include: website self-service e-mail text messaging; and social media. [\u00bd for 2 valid examples, 1 mark for 4 examples] Technology can be used to speed up the insurer\u2019s back office operations [\u00bd]"}, {"section": "Solution", "text": "and claims processes. [\u00bd]"}, {"section": "Solution", "text": "For example, by the policyholder submitting details of the claim online [\u00bd]"}, {"section": "Solution", "text": "And data can be extracted from handwritten and typed forms at high levels of accuracy [\u00bd]"}, {"section": "Solution", "text": "Technology can be used to help the insurer in new business acquisition by helping to identify individuals who may wish to buy the insurer\u2019s products. [\u00bd]"}, {"section": "Solution", "text": "And matching products to individual\u2019s needs [\u00bd]"}, {"section": "Solution", "text": "XYZ may use data from Country A and other countries to produce new products to meet customers\u2019 needs [\u00bd]"}, {"section": "Solution", "text": "Better information on providers to reduce costs for PMI [\u00bd]"}, {"section": "Solution", "text": "Can track recovery process for IP or suggest treatment/rehabilitation to improve health and speed up return to work based on data on the policyholder [\u00bd]"}, {"section": "Solution", "text": "Use of technology could strengthen the relationships between the customer and insurer. [\u00bd]"}, {"section": "Solution", "text": "If the customers values XYZ\u2019s products more this can improve the retention of the business for the insurer [\u00bd]"}, {"section": "Solution", "text": "Technology can be used to differentiate the insurer from other equivalent insurers in the market [\u00bd]"}]}, {"id": "202009_Q1(iii)", "sitting": "September 2020", "yymmkey": "202009", "ref": "Q1(iii)", "marks": 10, "all_themes": ["Claims Management", "Critical Illness", "Data", "Group Products", "Income Protection", "Investments", "Pricing", "Private Medical Insurance (PMI)", "Regulation", "Reinsurance", "Risk Management & Capital", "Underwriting"], "products": ["Private Medical Insurance (PMI)", "Critical Illness", "Income Protection", "Group Products"], "question_text": "Suggest possible challenges that Company XYZ could face in meeting the group\u2019s market share and profitability targets in Country A.", "scenario": "Country A is a large, well-developed country, with a heavily regulated health and care insurance market.\nFor many years the health and care insurance market in Country A has been dominated by a small number of large, well-established health and care insurance companies that sell a wide range of health and care insurance products.\nThere has been considerable criticism of the dominant health and care insurance companies in the consumer press of Country A. Particular concerns have been expressed ab", "bullets": [{"section": "Solution", "text": "Market Share It is unclear how easy it will be to attract new business away from the existing dominant players in the market. [\u00bd]"}, {"section": "Solution", "text": "It is unclear even if it is possible to attract sufficient new business to meet the market share target whether this is achievable within the desired timescale. [\u00bd]"}, {"section": "Solution", "text": "May be at wrong stage of underwriting cycle in Country A [\u00bd]"}, {"section": "Solution", "text": "The insurer will have a narrower range of products than the existing dominant players in the market\u2026. [\u00bd]"}, {"section": "Solution", "text": "\u2026. possibly making the insurer less attractive to advisors and potential policyholders making it difficult to achieve the required market share targets. [\u00bd]"}, {"section": "Solution", "text": "It is possible company\u2019s product offering may not be attractive to the local population due to local culture, religion and custom. [\u00bd]"}, {"section": "Solution", "text": "The products offered by the group may exclude a large market in Country A, for example it could be that PMI is compulsory for employers to offer and therefore there is a large group PMI market rather than individual market. [\u00bd]"}, {"section": "Solution", "text": "The State benefits offered in Country A may affect the product required and demand too, for example a comprehensive State healthcare system may mean there is no need for PMI in this country. [\u00bd]"}, {"section": "Solution", "text": "The economic environment in Country A will affect the new business volumes, [\u00bd]"}, {"section": "Solution", "text": "For example, if the country is entering a recession it may experience low new business volumes across the health and care insurance market. [\u00bd]"}, {"section": "Solution", "text": "The existing insurers are large and well established and so will be well placed to fight back to eliminate a new competitor [\u00bd]"}, {"section": "Solution", "text": "e.g. brand awareness, large advertising spend [or other suitable example] [\u00bd]"}, {"section": "Solution", "text": "Competitors could cut premiums to keep the new company out. [\u00bd]"}, {"section": "Solution", "text": "It is possible that a new innovative insurer could increase the total size of the market by selling to customers that would not have bought products from the current dominant insurers in the market [\u00bd]"}, {"section": "Solution", "text": "It is not clear how possible this will be. These new customers may not exist in suitable volumes. [\u00bd]"}, {"section": "Solution", "text": "The existing dominant players are likely to have strong distribution of their products\u2026. [\u00bd]"}, {"section": "Solution", "text": "\u2026..it may be difficult for a new insurer to sell sufficient volumes [\u00bd]"}, {"section": "Solution", "text": "From outset a new company will have very little market awareness with customers, distributors etc\u2026.. [\u00bd]"}, {"section": "Solution", "text": "\u2026.. which may make it difficult to attract sufficient customers away from the dominant insurers in the market [\u00bd]"}, {"section": "Solution", "text": "The insurer may have to invest significantly on marketing, advertising etc to increase market awareness\u2026\u2026 [\u00bd]"}, {"section": "Solution", "text": "\u2026\u2026 which could be costly. [\u00bd]"}, {"section": "Solution", "text": "Relationship between the insurer and third parties such as hospitals unlikely to be as strong as the main local competitions which could adversely impact costs and service standards. [\u00bd]"}, {"section": "Solution", "text": "There may be language issues e.g. translation of materials [\u00bd]"}, {"section": "Solution", "text": "Profitability It is unclear at this stage whether the required return on capital is reasonable in this market. [\u00bd]"}, {"section": "Solution", "text": "The dominant insurers in the market may be willing to accept a lower return on capital. [\u00bd]"}, {"section": "Solution", "text": "If the insurer\u2019s required return on capital / profitability targets are too high relative to the competition, then the insurer\u2019s premiums are likely to be high relative to the competition. [1]"}, {"section": "Solution", "text": "Which is likely to make significantly increasing market share difficult. [\u00bd]"}, {"section": "Solution", "text": "Particularly if the market is very price sensitive. [\u00bd]"}, {"section": "Solution", "text": "Insurer will not have credible local data making accurate assessment of risks and pricing more difficult. [\u00bd]"}, {"section": "Solution", "text": "The experience of Company XYZ could have a significant impact on the potential profitability, for example: [\u00bd]"}, {"section": "Solution", "text": "claims experience may be worse than other countries, perhaps due to attitudes to claiming [\u00bd]"}, {"section": "Solution", "text": "if inflation is much higher than expected it could lead to much higher benefit payouts than expected. [\u00bd]"}, {"section": "Solution", "text": "low investment returns [\u00bd]"}, {"section": "Solution", "text": "high expenses, perhaps due to high salaries that are required in Country A [\u00bd]"}, {"section": "Solution", "text": "low renewals or retention of business e.g. due to attitudes of policyholders to move providers frequently. [\u00bd]"}, {"section": "Solution", "text": "Company will have limited expertise initially in the new market so will need to spend a lot on training. [\u00bd]"}, {"section": "Solution", "text": "There may also be a lack of staff in Country A with the required experience for the products being offered. To get the necessary staff may lead to higher salaries being paid, or more external assistance, and lower profits. [\u00bd]"}, {"section": "Solution", "text": "The high level of regulations in Country A may lead to higher costs of complying with regulations, reducing profitability. [\u00bd]"}, {"section": "Solution", "text": "It may take time understanding what the regulator in Country A wants. [\u00bd]"}, {"section": "Solution", "text": "The political / regulatory / tax situation in the country may be volatile. [\u00bd]"}, {"section": "Solution", "text": "There may be restrictions on foreign ownership/profit movement [\u00bd]"}, {"section": "Solution", "text": "There may be a currency risk e.g. on relocation of returns in investments [\u00bd]"}, {"section": "Solution", "text": "Reinsurance may be difficult to obtain [\u00bd]"}, {"section": "Solution", "text": "The insurer could decide to accept a lower level of profitability in the short term to enable it to build up its market share. [\u00bd]"}, {"section": "Solution", "text": "It may be difficult to get the required return on capital until the insurer is selling sufficient volume of business to spread its fixed costs sufficiently across a large number of policies [1]"}, {"section": "Solution", "text": "The opportunity cost to enter market may be too high. Capital could be used better elsewhere. [\u00bd]"}]}, {"id": "202009_Q1(iv)", "sitting": "September 2020", "yymmkey": "202009", "ref": "Q1(iv)", "marks": 9, "all_themes": ["Critical Illness", "Data", "Income Protection", "Models", "Pricing", "Private Medical Insurance (PMI)", "Risk Management & Capital", "Underwriting"], "products": ["Private Medical Insurance (PMI)", "Critical Illness", "Income Protection"], "question_text": "Discuss the advantages and disadvantages of the group\u2019s business model from the perspective of:\n(a) Company XYZ.\n(b) the group.\n(c) policyholders of XYZ.", "scenario": "Country A is a large, well-developed country, with a heavily regulated health and care insurance market.\nFor many years the health and care insurance market in Country A has been dominated by a small number of large, well-established health and care insurance companies that sell a wide range of health and care insurance products.\nThere has been considerable criticism of the dominant health and care insurance companies in the consumer press of Country A. Particular concerns have been expressed ab", "bullets": [{"section": "Solution", "text": "Company XYZ Advantages The group should be experienced in rolling out its business model in different countries\u2026.. [\u00bd]"}, {"section": "Solution", "text": "\u2026.which should make the roll out straightforward and cost effective [\u00bd]"}, {"section": "Solution", "text": "Relevant products that meet customer need will lead to high volumes of new business, good customer retention and reputation. [\u00bd]"}, {"section": "Solution", "text": "The company\u2019s use of technology may give it a competitive edge [\u00bd]"}, {"section": "Solution", "text": "Improved pricing terms should reduce anti-selection risk [\u00bd]"}, {"section": "Solution", "text": "Disadvantages The one size fits all strategy may not work well in every country. [\u00bd]"}, {"section": "Solution", "text": "For example the product lines may not be the products customers want to buy in this country [\u00bd]"}, {"section": "Solution", "text": "The low capital model may not be popular with the local regulator\u2026.. [\u00bd]"}, {"section": "Solution", "text": "\u2026.. which may make it difficult for company XYZ to get approval [\u00bd]"}, {"section": "Solution", "text": "The group\u2019s strategy does not give company XYZ much flexibility to amend its strategy to allow for conditions in a particular country. [\u00bd]"}, {"section": "Solution", "text": "It may be too difficult to maximise market share and profitability [\u00bd]"}, {"section": "Solution", "text": "The company will not benefit directly from any excess profits as the surplus is retained at the group level. [\u00bd]"}, {"section": "Solution", "text": "There are risks associated with holding large amounts of personal data, such as fines for lost data (outlined in solution (ii) earlier). [\u00bd]"}, {"section": "Solution", "text": "The technology will need to be maintained leading to costs for the insurer. [\u00bd]"}, {"section": "Solution", "text": "They may not be able to access a significant part of the market in Country A via the products offered (e.g. LTCI). [\u00bd]"}, {"section": "Solution", "text": "Or XYZ may not be price competitive if model leads to high premiums [\u00bd]"}]}, {"id": "202009_Q1(vi)", "sitting": "September 2020", "yymmkey": "202009", "ref": "Q1(vi)", "marks": 10, "all_themes": ["Claims Management", "Critical Illness", "Data", "Income Protection", "Models", "Pricing", "Private Medical Insurance (PMI)", "Product Design", "Professional Guidance", "Regulation", "Reinsurance", "Risk Management & Capital", "Underwriting"], "products": ["Private Medical Insurance (PMI)", "Critical Illness", "Income Protection"], "question_text": "Describe the actions Company XYZ could take to control the risks as its portfolio of business builds up.\n[Total 49]", "scenario": "Country A is a large, well-developed country, with a heavily regulated health and care insurance market.\nFor many years the health and care insurance market in Country A has been dominated by a small number of large, well-established health and care insurance companies that sell a wide range of health and care insurance products.\nThere has been considerable criticism of the dominant health and care insurance companies in the consumer press of Country A. Particular concerns have been expressed ab", "bullets": [{"section": "Solution", "text": "Data The company should invest sufficiently in technology to ensure it can securely store [\u00bd]"}, {"section": "Solution", "text": "and analyse the potentially significant amounts of data it will collect. [\u00bd]"}, {"section": "Solution", "text": "Introduce data quality checks [\u00bd]"}, {"section": "Solution", "text": "The company should put in place robust strategies to deal with cyber risks\u2026. [\u00bd]"}, {"section": "Solution", "text": "\u2026\u2026including processes for detecting, reporting and responding to fraud, cyber risks etc [\u00bd]"}, {"section": "Solution", "text": "The company should have clear governance in respect of data held. [\u00bd]"}, {"section": "Solution", "text": "Sales Company should ensure it has robust processes in place to ensure it can take on expected levels of new business. [\u00bd]"}, {"section": "Solution", "text": "Processes should also be able to cope if new business is much higher than expected [\u00bd]"}, {"section": "Solution", "text": "Recruit appropriately trained staff in adequate numbers to meet the demands of writing new business. [\u00bd]"}, {"section": "Solution", "text": "Distributors should be adequately trained on communication with potential customers about the use of their data [\u00bd]"}, {"section": "Solution", "text": "Ensure good customer service to retain business and ensure initial expenses are covered. [\u00bd]"}, {"section": "Solution", "text": "Carry out customer satisfaction surveys to identify any issues [\u00bd]"}, {"section": "Solution", "text": "Pricing Appropriate margins in premium rates for new business to allow for more adverse experience than expected. [\u00bd]"}, {"section": "Solution", "text": "Ensure processes in place to review pricing if required. [\u00bd]"}, {"section": "Solution", "text": "Claims Ensuring that good claims management processes are in place to prevent excessive or fraudulent claims. [\u00bd]"}, {"section": "Solution", "text": "Ensure that policy wording is clear to reduce the risks associated with disputed claims. [\u00bd]"}, {"section": "Solution", "text": "Ensure policy wording sufficiently tight to reduce possibility of unexpected claims\u2026 [\u00bd]"}, {"section": "Solution", "text": "\u2026.and anti-selection [\u00bd]"}, {"section": "Solution", "text": "Providers Review any commission structure [\u00bd]"}, {"section": "Solution", "text": "Review contract terms with providers [\u00bd]"}, {"section": "Solution", "text": "Solvency The company should ensure it has sufficient free capital in respect of the business it expects to take on [\u00bd]"}, {"section": "Solution", "text": "The company should also hold a capital buffer in case new business is higher than expected. [\u00bd]"}, {"section": "Solution", "text": "Company should ensure it can obtain additional capital if required\u2026. [\u00bd]"}, {"section": "Solution", "text": "\u2026.possibly from an external party [\u00bd]"}, {"section": "Solution", "text": "Or from Group if required. [\u00bd]"}, {"section": "Solution", "text": "In particular it could ensure there is a legal agreement in place that would require Group to pass the company sufficient capital in the event that the company required additional capital. [\u00bd]"}, {"section": "Solution", "text": "The company may not offer any guarantees or options on products, to reduce the capital requirements. [\u00bd]"}, {"section": "Solution", "text": "Reinsurance Given the company is new to this market the company could put in place an appropriate reinsurance program with a high quality reinsurer [1]"}, {"section": "Solution", "text": "Monitoring The company should regularly monitor experience to ensure adverse experience is identified early\u2026.. [\u00bd]"}, {"section": "Solution", "text": "\u2026.. which will allow management to take action to address the issue(s) [\u00bd]"}, {"section": "Solution", "text": "Training Company should ensure staff are appropriately trained. [\u00bd]"}, {"section": "Solution", "text": "Underwriting Ensure underwriting standards are sufficiently robust to assess the risks being taken on accurately. [\u00bd]"}, {"section": "Solution", "text": "Consider the use of exclusions [\u00bd]"}, {"section": "Solution", "text": "Expenses Consider whether it would be appropriate to outsource any functions, such as admin roles, to save costs. [\u00bd]"}, {"section": "Solution", "text": "These might be outsourced to other insurers within the group who may have more expertise [\u00bd]"}]}, {"id": "202009_Q2(iii)", "sitting": "September 2020", "yymmkey": "202009", "ref": "Q2(iii)", "marks": 3, "all_themes": ["Claims Management", "Group Products", "Income Protection", "Pricing", "State Healthcare & Demographics"], "products": ["Income Protection", "Group Products"], "question_text": "Suggest other possible actions the employer could take to manage the operational costs of running the sickness and disability scheme.\n[Total 16]", "scenario": "A large company operates in a country where the state provides no sickness or disability benefits to its citizens. The company has employees working in a wide range of roles.\nThe company is considering introducing a new sickness and disability benefit scheme for its employees who are unable to work as a result of sickness or injury. The scheme will provide a replacement income to employees payable in the event the employee becomes sick or disabled.\nThe company requires the benefits of the scheme", "bullets": [{"section": "Solution", "text": "Expense efficiencies [\u00bd]"}, {"section": "Solution", "text": "e.g. part of payroll systems [\u00bd]"}, {"section": "Solution", "text": "\u2026 simplify benefit structure [\u00bd]"}, {"section": "Solution", "text": "\u2026 claims administration costs in proportion to benefit claim [\u00bd]"}, {"section": "Solution", "text": "Keep the design of the scheme simple to reduce the complexity of the administration [\u00bd]"}, {"section": "Solution", "text": "Auto-enroll all employees, or offer to all employees as standard, to ensure there are sufficient economies of scale [\u00bd]"}, {"section": "Solution", "text": "Require employee to have been in employment for a minimum period before they can get access to the scheme \u2013 to avoid admin costs of dealing with people who do not stay with the company for long. [\u00bd]"}, {"section": "Solution", "text": "Analyse expenses over time to manage expense inflation risk [\u00bd]"}, {"section": "Solution", "text": "Outsource the running of the scheme for efficiencies in running costs [\u00bd]"}, {"section": "Solution", "text": "Outsource administration for a fixed cost to control expense inflation [\u00bd]"}, {"section": "Solution", "text": "Outsource claims administration/management [\u00bd]"}, {"section": "Solution", "text": "Ensure all scheme literature is available online and not in paper form [\u00bd]"}, {"section": "Solution", "text": "Seek advice from the consultants [\u00bd]"}, {"section": "Solution", "text": "Have fixed cost arrangement with providers [\u00bd]"}, {"section": "Solution", "text": "Seek employee contributions [\u00bd]"}]}, {"id": "202009_Q3(i)", "sitting": "September 2020", "yymmkey": "202009", "ref": "Q3(i)", "marks": 5, "all_themes": ["Capital & Solvency", "Critical Illness", "Data", "Pricing", "Pricing & Rating", "Professional Guidance", "Regulation", "Reinsurance", "Reserving & Valuation", "Risk Management & Capital"], "products": ["Critical Illness"], "question_text": "Outline the advantages and disadvantages of offering CI insurance business with reviewable premium rates from the perspective of the insurer.", "scenario": "A health and care insurance company specialises in long-term Critical Illness (CI)\ninsurance business. The insurer sells CI insurance business with either:\n\uf0b7 guaranteed premium rates \u2013 where all future premiums are guaranteed to be the same as the premiums offered at the policy commencement date; or \uf0b7 reviewable premium rates \u2013 where premiums are guaranteed to be unchanged for the first 5 years of the policy term and are then subject to annual reviews. Any changes to premium rates are at the dis", "bullets": [{"section": "Solution", "text": "Advantages Marketing \u2013 may increase sales as more options for potential policyholders. [\u00bd]"}, {"section": "Solution", "text": "This is particularly the case if most of the other competitors in the same market offer reviewable business. [\u00bd]"}, {"section": "Solution", "text": "Risk management \u2013 provides product diversification on pricing terms. [\u00bd]"}, {"section": "Solution", "text": "Profitability \u2013 may increase profitability as the company has the option to change premiums if the actual experience turns out to be worse than the original pricing assumptions. [\u00bd]"}, {"section": "Solution", "text": "Reinsurance \u2013 it may be easier to obtain reinsurance as some reinsurers in the market may not offer critical illness reinsurance on guaranteed terms. [\u00bd]"}, {"section": "Solution", "text": "Reserving \u2013 reserving requirements for reviewable business are likely to be lower than those for guaranteed business as the option to change premium rates is at the discretion of the insurer. [\u00bd]"}, {"section": "Solution", "text": "Capital requirements \u2013 for the same reason as above, capital requirements for reviewable business are likely to be lower than those for guaranteed business. [\u00bd]"}, {"section": "Solution", "text": "More product options should also be welcome by brokers/intermediates. [\u00bd]"}, {"section": "Solution", "text": "There will be less reliance on sufficiency of pricing data and credibility of experience at outset as the insurer has the opportunity to fine tune the premium rates on written business in the future. [\u00bd]"}, {"section": "Solution", "text": "Any reduction in premium rates as a result of favourable experience will be welcome by existing policyholders. [\u00bd]"}, {"section": "Solution", "text": "Disadvantages Data \u2013 it may take a long time to accumulate sufficient data for pricing/policy review depending on how popular the reviewable business. [\u00bd]"}, {"section": "Solution", "text": "System \u2013 have to run two systems, one for guaranteed business and one for reviewable business. [\u00bd]"}, {"section": "Solution", "text": "Review process - can be onerous and time consuming. [\u00bd]"}, {"section": "Solution", "text": "Any increase in premium rates may not be well received by policyholders. [\u00bd]"}, {"section": "Solution", "text": "This may lead to bad publicity and hence reputational risks. [\u00bd]"}, {"section": "Solution", "text": "The premium increase may lead to selective lapses, which could worsen experience further. [\u00bd]"}, {"section": "Solution", "text": "Reinsurance - premium rates may become out of sync, in particular that the reinsurer may decide to increase the reinsurance premium rates and the insurer chooses not to because of strategic reasons. [\u00bd]"}, {"section": "Solution", "text": "Market practice \u2013 offering reviewable business may not be in line with market practice. [\u00bd]"}, {"section": "Solution", "text": "Reviewable business could attract higher level of regulatory scrutiny. [\u00bd]"}, {"section": "Solution", "text": "The maintenance costs could be high because of the regular policy reviews and policyholder communication. [\u00bd]"}, {"section": "Solution", "text": "There could be issues relating to reserving (e.g. contract boundaries) [\u00bd]"}, {"section": "Solution", "text": "Policyholders reasonable expectations may be hard to manage over time [\u00bd]"}, {"section": "Solution", "text": "The regulator\u2019s views on the permissible triggers for a review may vary over time [\u00bd]"}, {"section": "Solution", "text": "Burden of proof for Treating Customers Fairly [\u00bd]"}, {"section": "Solution", "text": "May lead to churning by distributors [\u00bd]"}, {"section": "Solution", "text": "There is a lapse and re-entry risk if premiums decrease for a newer tranche of business [\u00bd]"}]}, {"id": "202009_Q3(ii)", "sitting": "September 2020", "yymmkey": "202009", "ref": "Q3(ii)", "marks": 5, "all_themes": ["Capital & Solvency", "Critical Illness", "Pricing", "Pricing & Rating", "Professional Guidance", "Regulation"], "products": ["Critical Illness"], "question_text": "There are currently no statements of good practice in place relating to reviewable premium rates for long-term CI insurance business sold in the country in which the insurer operates. The insurance regulator is considering introducing a set of statements of good practice with respect to how an insurer should review premium rates for CI business.\nSuggest examples of good practice that could be included in the statement.", "scenario": "A health and care insurance company specialises in long-term Critical Illness (CI)\ninsurance business. The insurer sells CI insurance business with either:\n\uf0b7 guaranteed premium rates \u2013 where all future premiums are guaranteed to be the same as the premiums offered at the policy commencement date; or \uf0b7 reviewable premium rates \u2013 where premiums are guaranteed to be unchanged for the first 5 years of the policy term and are then subject to annual reviews. Any changes to premium rates are at the dis", "bullets": [{"section": "Solution", "text": "Review process The insurer may be required to demonstrate that reviews are calculated fairly [\u00bd]"}, {"section": "Solution", "text": "The insurer might be required to review the assumptions on a regular basis [\u00bd]"}, {"section": "Solution", "text": "And in line with any frequency set out in any marketing literature, policy terms etc [\u00bd]"}, {"section": "Solution", "text": "The insurer may be required to disclose the basis on which the review is carried out [\u00bd]"}, {"section": "Solution", "text": "The review process should meet any relevant regulations in the country [\u00bd]"}, {"section": "Solution", "text": "e.g. Treating customers fairly [\u00bd]"}, {"section": "Solution", "text": "Insurers should keep records of the assumptions used to calculate premiums and analyses undertaken to support reviews. [\u00bd]"}, {"section": "Solution", "text": "Change in assumptions The statement may specify the reasons for which the assumptions used might be changed [\u00bd]"}, {"section": "Solution", "text": "And that the reasons under which assumptions might be changed should be set out in the policy terms [\u00bd]"}, {"section": "Solution", "text": "The statement may specify how any new assumptions should be derived [\u00bd]"}, {"section": "Solution", "text": "And for how long the assumptions are assumed to be valid [\u00bd]"}, {"section": "Solution", "text": "There may be restrictions regarding the use of different assumptions for in force policies and for new business [\u00bd]"}, {"section": "Solution", "text": "May require that if critical illness list coverage changes customers will be on \u2018no worse\u2019 terms going forward [\u00bd]"}, {"section": "Solution", "text": "There may be restrictions on the reasons under which premiums can be increased [\u00bd]"}, {"section": "Solution", "text": "For example, insurers may not be allowed to increase premiums purely to recoup earlier losses [\u00bd]"}, {"section": "Solution", "text": "Confirmation of possible circumstances where the insurer could increase the CI premium more than outlined in statement \u2013 e.g. after a period of hyper-inflation [\u00bd]"}, {"section": "Solution", "text": "Communication with policyholders The results of a review should be communicated to policyholders [\u00bd]"}, {"section": "Solution", "text": "And the reasons for any increase in premium should be explained to policyholders [\u00bd]"}, {"section": "Solution", "text": "And in clear language [\u00bd]"}, {"section": "Solution", "text": "If premium rates increase as a result of a review, individual customers may be given the option to amend the policy [\u00bd]"}, {"section": "Solution", "text": "e.g. continue paying the same premium but reduce the sum insured instead [\u00bd]"}, {"section": "Solution", "text": "And given sufficient time to make any decisions about whether to continue cover [\u00bd]"}, {"section": "Solution", "text": "Regulation and complaints Any review resulting in large increases in premium may need to be discussed with the regulator [\u00bd]"}, {"section": "Solution", "text": "There may be a requirement for a complaints process to be available for policyholders [\u00bd]"}]}, {"id": "202009_Q3(iii)", "sitting": "September 2020", "yymmkey": "202009", "ref": "Q3(iii)", "marks": 15, "all_themes": ["Capital & Solvency", "Claims Management", "Critical Illness", "Data", "Investments", "Models", "Pricing", "Pricing & Rating", "Regulation", "Reinsurance", "Reserving & Valuation", "Risk Management & Capital", "Underwriting"], "products": ["Critical Illness"], "question_text": "The insurer conducts a premium review exercise annually in respect of its reviewable CI business. The results of the exercise are used by the management of the insurer to decide on whether any premium changes are needed.\nDescribe how the premium review process could be conducted.", "scenario": "A health and care insurance company specialises in long-term Critical Illness (CI)\ninsurance business. The insurer sells CI insurance business with either:\n\uf0b7 guaranteed premium rates \u2013 where all future premiums are guaranteed to be the same as the premiums offered at the policy commencement date; or \uf0b7 reviewable premium rates \u2013 where premiums are guaranteed to be unchanged for the first 5 years of the policy term and are then subject to annual reviews. Any changes to premium rates are at the dis", "bullets": [{"section": "Solution", "text": "Homogeneous groups and model points Split existing policies into homogeneous groups. [\u00bd]"}, {"section": "Solution", "text": "This should be by product types such as standalone and accelerated business. [\u00bd]"}, {"section": "Solution", "text": "And then further sub-divided based on pricing series and premium rates. [\u00bd]"}, {"section": "Solution", "text": "Within each homogeneous group, a number of model points could be chosen to represent the existing policy profile of that group. [\u00bd]"}, {"section": "Solution", "text": "Alternatively, the assessment could be based on all the policies within each group. [\u00bd]"}, {"section": "Solution", "text": "Experience investigations Experience investigation should be carried out for each homogeneous group. [\u00bd]"}, {"section": "Solution", "text": "Morbidity experience data should be collected since the last pricing or premium review date, whichever is the latest. [\u00bd]"}, {"section": "Solution", "text": "Incidence rates will be examined at the homogeneous group level and subdivided into the following areas for analyses: [1]"}, {"section": "Solution", "text": "age; \u2022 gender; \u2022 occupation (if known); \u2022 region/area of residence; \u2022 duration from entry; \u2022 underwriting method. [\u00bd mark for two examples, 1 mark for four examples] Further analysis, if data permits, may be done on the validity of the factors underlying any survival period for claim on a stand-alone CI policy. [\u00bd]"}, {"section": "Solution", "text": "It may be appropriate to analyse incidence rates by severity, if reduced benefits are payable on lower severity cases. For example, in some countries CI contracts pay a partial lump sum on treatable early stage cancer claims. [\u00bd]"}, {"section": "Solution", "text": "Mortality experience is also an important component of the investigation. [\u00bd]"}, {"section": "Solution", "text": "Under accelerated critical illness cover, death is a trigger for payment of the full sum insured. [\u00bd]"}, {"section": "Solution", "text": "Under standalone critical illness cover, death signals a release of reserve in favour of the insurer. [\u00bd]"}, {"section": "Solution", "text": "Exposed to risk - particular care will need to be exercised to ensure that only lives insured in the investigation period under consideration are included in the figures. [1]"}, {"section": "Solution", "text": "It is equally important to ensure that claims are correctly included. [\u00bd]"}, {"section": "Solution", "text": "Adjustments to \u201cexposed to risk\u201d will need to be made where the life exposure only contributes to part of the period under investigation. [\u00bd]"}, {"section": "Solution", "text": "As data is largely computerised, adjustments can be made on a life-by-life basis using the date of entry and/or exit from the investigation. [\u00bd]"}, {"section": "Solution", "text": "Actual versus expected - the insurer needs to monitor the actual claims experience against the expected level. [\u00bd]"}, {"section": "Solution", "text": "Expense investigation - the insurer needs to monitor the actual expenses incurred against the expected level. [1]"}, {"section": "Solution", "text": "Broken down by initial, renewal and claims expenses [\u00bd]"}, {"section": "Solution", "text": "Allowing for inflation since the last analysis [\u00bd]"}, {"section": "Solution", "text": "Excluding any one-off expenses [\u00bd]"}, {"section": "Solution", "text": "And commission [\u00bd]"}, {"section": "Solution", "text": "Lapse investigation - the numbers of policies lapsing in any period will be compared to the relevant portfolio exposed to risk to produce lapse rates. [1]"}, {"section": "Solution", "text": "A key area for lapse analysis for a long-term insurer will be the duration from entry. [\u00bd]"}, {"section": "Solution", "text": "This will enable the insurer to ascertain its susceptibility to loss, as measured by the degree to which the capital outlay in writing a policy has not been repaid by the premiums received prior to lapse. [\u00bd]"}, {"section": "Solution", "text": "Investment income investigation - the insurer needs to monitor the actual investment income received (after allowing for capital movements) against the expected level. [1]"}, {"section": "Solution", "text": "The significance of investment income will vary by contract, significance for critical illness business is likely to be low. [\u00bd]"}, {"section": "Solution", "text": "The analysis would be split by investment class and, where appropriate, would include dividends, interest and capital gains (realised and unrealised). [\u00bd]"}, {"section": "Solution", "text": "Assumption setting The best estimate assumptions will need to be revised based on the results of the experience investigations mentioned above, [\u00bd]"}, {"section": "Solution", "text": "Taking appropriate considerations regarding the sufficiency and credibility of the insurer\u2019s own data. [\u00bd]"}, {"section": "Solution", "text": "Make appropriate allowance for expectations of future trends in incidence e.g. through diagnostic trends [\u00bd]"}, {"section": "Solution", "text": "And whether the illness should continue to be included [\u00bd]"}, {"section": "Solution", "text": "The risk discount rate will be based on the insurer\u2019s required profit margin at the original pricing date, [\u00bd]"}, {"section": "Solution", "text": "but the risk-free rate should be consistent with current economic conditions and other financial assumptions. [\u00bd]"}, {"section": "Solution", "text": "As reinsurance is not part of the contractual agreement between the insurer and its policyholders, any profit or loss relating to the costs and recoveries of any reinsurance arrangements will not be considered as part of the premium review exercise. [1]"}, {"section": "Solution", "text": "Investment return will need be consistent with risk discount rate and expense inflation. [\u00bd]"}, {"section": "Solution", "text": "Profit testing For each policy/model point, cashflows will be projected forward from the premium review date to the end of the policy term. [\u00bd]"}, {"section": "Solution", "text": "Typical elements of cashflow will include: Premiums [\u00bd]"}, {"section": "Solution", "text": "Expenses (renewal, claim) [\u00bd]"}, {"section": "Solution", "text": "Commission (renewal) [\u00bd]"}, {"section": "Solution", "text": "Morbidity claims [\u00bd]"}, {"section": "Solution", "text": "Mortality claims \u2013 this is only needed for the accelerated critical illness business [\u00bd]"}, {"section": "Solution", "text": "Contribution to reserves [\u00bd]"}, {"section": "Solution", "text": "Contribution to capital requirements [\u00bd]"}, {"section": "Solution", "text": "Interest on cashflows and reserves [\u00bd]"}, {"section": "Solution", "text": "Tax [\u00bd]"}]}, {"id": "202009_Q3(iv)", "sitting": "September 2020", "yymmkey": "202009", "ref": "Q3(iv)", "marks": 10, "all_themes": ["Capital & Solvency", "Claims Management", "Critical Illness", "Data", "Pricing", "Pricing & Rating", "Professional Guidance", "Regulation", "Reinsurance", "Reserving & Valuation", "Underwriting"], "products": ["Critical Illness"], "question_text": "The results of the most recent premium review exercise indicate that the business written on the current premium rates is unlikely to meet the profit criteria required by the management of the insurer.\nSet out the factors and information that the management may need to consider in order to decide on the most appropriate course of action.\n[Total 35]\nEND OF PAPER", "scenario": "A health and care insurance company specialises in long-term Critical Illness (CI)\ninsurance business. The insurer sells CI insurance business with either:\n\uf0b7 guaranteed premium rates \u2013 where all future premiums are guaranteed to be the same as the premiums offered at the policy commencement date; or \uf0b7 reviewable premium rates \u2013 where premiums are guaranteed to be unchanged for the first 5 years of the policy term and are then subject to annual reviews. Any changes to premium rates are at the dis", "bullets": [{"section": "Solution", "text": "Sufficiency of historical data for setting the latest best estimate assumptions. [\u00bd]"}, {"section": "Solution", "text": "And hence the reliability of the results of the experience investigations. [\u00bd]"}, {"section": "Solution", "text": "This is particularly the case if historical data for certain homogeneous product groups or risk groups within homogeneous product groups are sparse. [1]"}, {"section": "Solution", "text": "The insurer should also take into consideration the robustness of the policy review exercise. [\u00bd]"}, {"section": "Solution", "text": "Which will affect the accuracy and reliability of the overall results. [\u00bd]"}, {"section": "Solution", "text": "The insurer should consider whether there are any existing guidance or tolerance levels that would trigger an adjustment to the premium rates. [\u00bd]"}, {"section": "Solution", "text": "As such, if the extent of deviation from original level of profitability is not material, it may not be worthwhile to make any changes to the premium rates. [\u00bd]"}, {"section": "Solution", "text": "Similarly, the insurer should consider the extent of products affected. [\u00bd]"}, {"section": "Solution", "text": "The insurer should consider the expected level of premium changes, in particular if the increase in premium rates is expected to be significant. [\u00bd]"}, {"section": "Solution", "text": "Consider any precedent of premium changes, [\u00bd]"}, {"section": "Solution", "text": "and the reactions of policyholders. [\u00bd]"}, {"section": "Solution", "text": "Consider the expected impact on persistency. [\u00bd]"}, {"section": "Solution", "text": "In particular, the possibility of selective lapsing. [\u00bd]"}, {"section": "Solution", "text": "Consider any historical press coverage, in particular bad publicity as a result of premium increases. [\u00bd]"}, {"section": "Solution", "text": "Consider the practice adopted by other competitors. [\u00bd]"}, {"section": "Solution", "text": "Consider whether there are any regulatory guidance or rules relating to changing premium rates. [\u00bd]"}, {"section": "Solution", "text": "Consider any potential issues relating to Treating Customers Fairly. [\u00bd]"}, {"section": "Solution", "text": "Consider any statements of best practice [\u00bd]"}, {"section": "Solution", "text": "and demonstration that these have been adhered to. [\u00bd]"}, {"section": "Solution", "text": "The insurer may consider commissioning an external party to carry out an independent review to demonstrate accuracy and transparency of its decisions. [\u00bd]"}, {"section": "Solution", "text": "The insurer may want to seek independent advice from reinsurers, in particular whether reinsurers are also considering making changes to the reinsurance premiums rates. [\u00bd]"}, {"section": "Solution", "text": "Consider potential reactions of distribution channels. [\u00bd]"}, {"section": "Solution", "text": "The insurer must ensure that any potential actions are in line with the corresponding product literature and sales documents. [\u00bd]"}, {"section": "Solution", "text": "Consider any other alternatives such as adjusting sum assured instead. [\u00bd]"}, {"section": "Solution", "text": "Materiality of products in question relative to the company\u2019s overall product portfolio. [\u00bd]"}, {"section": "Solution", "text": "Consider the costs relating to customer communication. [\u00bd]"}, {"section": "Solution", "text": "The insurer should consider the cause of the deficit \u2013 is it just one item of experience that could be controlled by the insurer or is it trends in several items of experience [\u00bd]"}, {"section": "Solution", "text": "Is there any explanation for the deficit [\u00bd]"}, {"section": "Solution", "text": "For example, was the mix of business different to what was expected, did the underwriting processes changes or claims management differ [\u00bd]"}, {"section": "Solution", "text": "[one half mark for any valid example ] Consider how many policies have been written on the current premium rates [\u00bd]"}]}, {"id": "202104_Q1(i)", "sitting": "April 2021", "yymmkey": "202104", "ref": "Q1(i)", "marks": 10, "all_themes": ["Pricing", "Pricing & Rating", "Private Medical Insurance (PMI)", "Product Design", "Reserving & Valuation", "Underwriting"], "products": ["Private Medical Insurance (PMI)"], "question_text": "Assess the current approach for meeting the healthcare needs of the citizens of Country A.", "scenario": "Country A is a large, well-developed country. Medical services for citizens of Country A are generally provided through a range of modern, well-equipped private hospitals and medical practices.\nThe government of Country A pays for very limited medical services for its citizens and many citizens purchase Private Medical Insurance (PMI) to cover the costs of any medical treatment they need. Country A has a large number of private health and care insurance companies who provide PMI. PMI is generall", "bullets": [{"section": "Solution", "text": "Citizens in country A are likely to have a wide range of medical needs and different groups of citizens may have very different needs depending on a wide range of factors (e.g. age, location, health status etc.). [1]"}, {"section": "Solution", "text": "The government may provide medical services for its citizens in limited circumstances, for example, accident and emergency treatment [\u00bd]"}, {"section": "Solution", "text": "The state may provide means tested benefits as a safety net. [\u00bd]"}, {"section": "Solution", "text": "However, there may be gaps; for example, middle income families may not be able to afford insurance but may also not be entitled to any means tested benefits from government. [\u00bd]"}, {"section": "Solution", "text": "The limited medical services offered by the state might be acceptable while the population is relatively young, but as the population ages (as mentioned in the question) their healthcare needs will rise, leading to more care being required. [\u00bd]"}, {"section": "Solution", "text": "Additional healthcare needs not covered including Long Term Care, Income Protection etc. [\u00bd]"}, {"section": "Solution", "text": "Provision of check-ups, vaccinations and other preventative care may not be covered. [\u00bd]"}, {"section": "Solution", "text": "Healthcare may not be equally accessible to all, driving health inequalities [\u00bd]"}, {"section": "Solution", "text": "Some groups may have difficulty accessing agents or other insurance distribution channels (e.g. those in remote rural areas). [\u00bd]"}, {"section": "Solution", "text": "The less financially aware/literate may suffer from lack of public availability [\u00bd]"}, {"section": "Solution", "text": "The quality of hospitals is good so standard of medical treatment from hospitals should also be of good. [\u00bd]"}, {"section": "Solution", "text": "The private sector may be able to offer a more flexible healthcare service than the state. [\u00bd]"}, {"section": "Solution", "text": "For example, it may be able to respond more quickly to changing healthcare needs of citizens than the state. [\u00bd]"}, {"section": "Solution", "text": "It may provide a greater choice for citizens than the state - coverage can be flexed to suit individual\u2019s own health needs. [\u00bd]"}, {"section": "Solution", "text": "It may provide better customer service than the state [\u00bd]"}, {"section": "Solution", "text": "The number of PMI providers could mean that the market is competitive \u2013 potentially could mean that premium levels are affordable. [\u00bd]"}, {"section": "Solution", "text": "Or a wide range of products is available or there is product innovation. [\u00bd]"}, {"section": "Solution", "text": "The market is well-developed so likely to be well regulated - good for customers [\u00bd]"}, {"section": "Solution", "text": "Detailed underwriting requirements could increase the cost of cover. [\u00bd]"}, {"section": "Solution", "text": "Medical treatments are potentially available provided by private companies but to access these treatments the individual will need to be able to afford to pay for treatment from their own resources [\u00bd]"}, {"section": "Solution", "text": "Or have suitable insurance in place. [\u00bd]"}, {"section": "Solution", "text": "Private Medical Insurance is potentially a good way for individuals to spread the costs of medical treatment in advance of need [\u00bd]"}, {"section": "Solution", "text": "And to meet the cost of care when required. [\u00bd]"}, {"section": "Solution", "text": "Although there may be limits on how much of any claim the insurer will cover. [\u00bd]"}, {"section": "Solution", "text": "Depending on any excess of claim limits Private Medical Insurance may not fully cover the costs of a particular treatment and for certain treatments the citizen may end up needing to pay significant costs themselves. [\u00bd]"}, {"section": "Solution", "text": "Certain expensive treatments could be excluded from Private Medical Insurance policies and may need to be funded completely by the individual [\u00bd]"}, {"section": "Solution", "text": "There may be other exclusions, for example Normal pregnancy [\u00bd]"}, {"section": "Solution", "text": "Cosmetic surgery [\u00bd]"}]}, {"id": "202104_Q1(ii)", "sitting": "April 2021", "yymmkey": "202104", "ref": "Q1(ii)", "marks": 6, "all_themes": ["Claims Management", "Data", "Pricing", "Pricing & Rating", "Private Medical Insurance (PMI)", "Regulation", "Reserving & Valuation", "Risk Management & Capital", "Underwriting"], "products": ["Private Medical Insurance (PMI)"], "question_text": "Following a general election in Country A, a new government has been elected. The new government promised during the election that it would improve the affordability and increase the coverage of PMI in Country A. The new government of Country A is considering three options to meet these aims.\nOption 1 would require all health and care insurance companies to offer a low-cost Health and Care Plan (HCP) alternative to the full PMI product. The product will pay out pre-specified cash amounts on the occurrence of selected medical events.\nDiscuss the advantages and disadvantages of Option 1 from the perspective of:\n(a) the citizens of Country A.\n(b) the health and care insurance companies in Country A.", "scenario": "Country A is a large, well-developed country. Medical services for citizens of Country A are generally provided through a range of modern, well-equipped private hospitals and medical practices.\nThe government of Country A pays for very limited medical services for its citizens and many citizens purchase Private Medical Insurance (PMI) to cover the costs of any medical treatment they need. Country A has a large number of private health and care insurance companies who provide PMI. PMI is generall", "bullets": [{"section": "Solution", "text": "Option 1 Advantages for Citizens HCP can help meet the cost for a range of medical treatments [\u00bd]"}, {"section": "Solution", "text": "HCP is more affordable than full PMI [\u00bd]"}, {"section": "Solution", "text": "HCP could offer sufficient benefits for citizens in good health but who want limited cover at a low cost [\u00bd]"}, {"section": "Solution", "text": "HCP may cover some treatments that are not covered under PMI [\u00bd]"}, {"section": "Solution", "text": "Treatments covered may be particularly relevant for some citizens [\u00bd]"}, {"section": "Solution", "text": "It will enable some citizens that currently cannot afford insurance to get some cover. [\u00bd]"}, {"section": "Solution", "text": "The government may offer additional incentives for citizens take up HCP making it more attractive [\u00bd]"}, {"section": "Solution", "text": "May encourage new entrants to the market, resulting in innovation and price competition. [\u00bd]"}, {"section": "Solution", "text": "Customers can choose how to utilise cash. [\u00bd]"}, {"section": "Solution", "text": "Disadvantages for Citizens HCP not intended to cover the cost for more significant medical treatment [\u00bd]"}, {"section": "Solution", "text": "Citizen may still be liable for some of the cost of medical treatment [\u00bd]"}, {"section": "Solution", "text": "HCP could still be unaffordable for the lowest paid [\u00bd]"}, {"section": "Solution", "text": "The medical treatments covered may not be that relevant for some groups of citizens [\u00bd]"}, {"section": "Solution", "text": "May reduce the pool of lives for PMI / introduce selection against insurers where healthier lives take out cash insurance. This could lead to PMI becoming more unaffordable for those who need comprehensive cover. [\u00bd]"}, {"section": "Solution", "text": "Advantages for Insurers It could increase the profitable business sold by the insurer [\u00bd]"}, {"section": "Solution", "text": "It could allow the insurer to attract new customers [\u00bd]"}, {"section": "Solution", "text": "It could allow the insurer to spread its fixed expenses across a wider range of policies. [\u00bd]"}, {"section": "Solution", "text": "The costs of underwriting and claims management could be significantly lower than for PMI business. [\u00bd]"}, {"section": "Solution", "text": "The risk of medical inflation is passed to the customer. [\u00bd]"}, {"section": "Solution", "text": "There may be a reputational advantage for the insurer being seen to offer more affordable cover [\u00bd]"}, {"section": "Solution", "text": "Disadvantages for insurers There may be more profitable uses of the insurer\u2019s capital elsewhere [\u00bd]"}, {"section": "Solution", "text": "The low level of premium income received per policy may be insufficient for the insurer to recoup its costs\u2026. [\u00bd]"}, {"section": "Solution", "text": "Depending on the terms of the product it may be onerous for the insurer to administrate the HCP product [\u00bd]"}, {"section": "Solution", "text": "Some PMI policyholders may lapse and take up a cash plan policy instead which may lead to a loss of profit if HCP is less profitable than PMI [\u00bd]"}, {"section": "Solution", "text": "From the insurer\u2019s perspective, there is a lack of data and experience for the HCP. This could lead to issues with setting assumptions, [\u00bd]"}, {"section": "Solution", "text": "The experience could be worse than expected, [\u00bd]"}, {"section": "Solution", "text": "And it may lead to higher capital requirements to cope with the risk. [\u00bd]"}, {"section": "Solution", "text": "Whilst the claim amount is capped compared to PMI, a large volume of claims could still be expensive. [\u00bd]"}, {"section": "Solution", "text": "The new product may require new systems and staff training, increasing costs. [\u00bd]"}, {"section": "Solution", "text": "If the product is new to the market (as well as the insurer) there could be misunderstandings with policyholders expecting an indemnity product, leading to an impact on the insurer\u2019s reputation (this is mentioned in part (a) so could be cross-marked here). [\u00bd]"}]}, {"id": "202104_Q1(iii)", "sitting": "April 2021", "yymmkey": "202104", "ref": "Q1(iii)", "marks": 5, "all_themes": ["Claims Management", "Data", "Pricing", "Pricing & Rating", "Private Medical Insurance (PMI)", "Reinsurance", "Reserving & Valuation", "Risk Management & Capital", "Underwriting"], "products": ["Private Medical Insurance (PMI)"], "question_text": "Option 2 is to change the basis on which health and care insurance companies can charge for PMI in Country A. Under Option 2, PMI premiums will only be allowed to vary by age, geographical location, marital status and smoker status. In addition:\n\uf0b7 the extent to which premiums can vary by age will be limited such that the premium for the highest age cannot be more than three times the premium for the lowest age.\n\uf0b7 gender can no longer be used as a rating factor.\n\uf0b7 medical underwriting can no longer be used in the premium rating process.\n\u20133\nDiscuss the implications of Option 2 from the perspective of the citizens of Country A.", "scenario": "Country A is a large, well-developed country. Medical services for citizens of Country A are generally provided through a range of modern, well-equipped private hospitals and medical practices.\nThe government of Country A pays for very limited medical services for its citizens and many citizens purchase Private Medical Insurance (PMI) to cover the costs of any medical treatment they need. Country A has a large number of private health and care insurance companies who provide PMI. PMI is generall", "bullets": [{"section": "Solution", "text": "The Option 2 approach will make insurance more accessible/affordable for a number of groups of citizens. [\u00bd]"}, {"section": "Solution", "text": "Individuals with existing conditions may now be able to obtain medical insurance as the insurer will no longer be able to exclude them at the underwriting stage [\u00bd]"}, {"section": "Solution", "text": "And at an affordable cost [\u00bd]"}, {"section": "Solution", "text": "Individuals who were previously treated as uninsurable could now be able to obtain insurance. [\u00bd]"}, {"section": "Solution", "text": "Older individuals will potentially find private medical insurance to be more affordable due to the limit on premium size due to variations in age. [\u00bd]"}, {"section": "Solution", "text": "Private Medical Insurance premiums are likely to be much more consistent between different groups of policyholders with different characteristics [\u00bd]"}, {"section": "Solution", "text": "More consistency in premiums over time should allow citizens to plan better financially [\u00bd]"}, {"section": "Solution", "text": "The removal of medical underwriting should lead to faster decisions on acceptance [\u00bd]"}, {"section": "Solution", "text": "This is likely to mean considerable cross subsidies between different groups of customers. [1]"}, {"section": "Solution", "text": "For example Younger policyholders will end up subsidising older customers [\u00bd]"}, {"section": "Solution", "text": "Healthier policyholders will end up subsidising less healthy customers [\u00bd]"}, {"section": "Solution", "text": "Cross subsidies by gender [\u00bd]"}, {"section": "Solution", "text": "). [\u00bd]"}, {"section": "Solution", "text": "For example, if a competitor takes all the young, healthy lives, an insurer would be left with a portfolio of higher risk lives than expected. [\u00bd]"}, {"section": "Solution", "text": "Past experience of claims incurred will be much less relevant for pricing future business. [\u00bd]"}, {"section": "Solution", "text": "It is likely that it will take some time after the implementation of option 2 for insurers to accumulate sufficiently credible data for pricing. [\u00bd]"}, {"section": "Solution", "text": "Expense risk - costs associated with changes Assumption setting [\u00bd]"}, {"section": "Solution", "text": "Increase in capital for associated risks increasing reserves [\u00bd]"}, {"section": "Solution", "text": "Admin system changes [\u00bd]"}, {"section": "Solution", "text": "Re-publish literature and advertisements [\u00bd]"}, {"section": "Solution", "text": "Training of staff and intermediaries [\u00bd]"}, {"section": "Solution", "text": "Cost in changeover of staff (less underwriting needed) [\u00bd]"}, {"section": "Solution", "text": "Reinsurance likely to be more expensive as less specific to risk [\u00bd]"}, {"section": "Solution", "text": "Competition risk Will want to increase the premiums to cover risk [\u00bd]"}, {"section": "Solution", "text": "but not over competitors\u2019 premiums for fear of not selling policies. [\u00bd]"}, {"section": "Solution", "text": "Group Less concerned as likely not rating on these factors, experience rated [\u00bd]"}, {"section": "Solution", "text": "Provider negotiations More higher risk lives, could mean more business for providers so could negotiate costs down or up depending on profitability for providers [\u00bd]"}, {"section": "Solution", "text": "If there is an increase in premium rates, selective lapses may compound the problem. [\u00bd]"}, {"section": "Solution", "text": "If the insurer can\u2019t make money under new arrangement it could decide to stop writing PMI business. [\u00bd]"}]}, {"id": "202104_Q1(iv)", "sitting": "April 2021", "yymmkey": "202104", "ref": "Q1(iv)", "marks": 4, "all_themes": ["Pricing", "Pricing & Rating", "Private Medical Insurance (PMI)", "Reserving & Valuation", "Underwriting"], "products": ["Private Medical Insurance (PMI)"], "question_text": "Discuss the possible concerns that health and care insurance companies could have if Option 2 is introduced.", "scenario": "Country A is a large, well-developed country. Medical services for citizens of Country A are generally provided through a range of modern, well-equipped private hospitals and medical practices.\nThe government of Country A pays for very limited medical services for its citizens and many citizens purchase Private Medical Insurance (PMI) to cover the costs of any medical treatment they need. Country A has a large number of private health and care insurance companies who provide PMI. PMI is generall", "bullets": [{"section": "Solution", "text": "Prior to the restrictions of option 2 insurance companies could charge premiums for Private Medical Insurance that closely match the risk taken on by the insurer. [\u00bd]"}, {"section": "Solution", "text": "Insurance companies were also able to ensure that individuals that were potentially higher risk could be charged an increased premium to reflect this additional risk. [\u00bd]"}, {"section": "Solution", "text": "The proposed new restrictions outlined in option 2 are likely to mean that insurance companies will be less able to differentiate between good risks and bad risks in terms of charging an appropriate premium rate for the risks taken on. [\u00bd]"}, {"section": "Solution", "text": "Insurers will potentially have to charge customers the same premium as a customer with a much lower chance of claiming provided the customers are the same age. [\u00bd]"}, {"section": "Solution", "text": "There is therefore a potentially significantly increased risk of anti-selection for the insurer. [\u00bd]"}, {"section": "Solution", "text": "The insurer is much more heavily exposed to the risk of writing a different mix of business than expected given there are likely to be significant cross-subsidies (as mentioned in part"}]}, {"id": "202104_Q1(v)", "sitting": "April 2021", "yymmkey": "202104", "ref": "Q1(v)", "marks": 4, "all_themes": ["Pricing", "Pricing & Rating", "Private Medical Insurance (PMI)", "Regulation", "Reinsurance", "Reserving & Valuation", "Risk Management & Capital"], "products": ["Private Medical Insurance (PMI)"], "question_text": "Suggest possible actions the government of Country A could take to address the concerns in part (iv).", "scenario": "Country A is a large, well-developed country. Medical services for citizens of Country A are generally provided through a range of modern, well-equipped private hospitals and medical practices.\nThe government of Country A pays for very limited medical services for its citizens and many citizens purchase Private Medical Insurance (PMI) to cover the costs of any medical treatment they need. Country A has a large number of private health and care insurance companies who provide PMI. PMI is generall", "bullets": [{"section": "Solution", "text": "Possible actions that could be take include: The government could set up a reinsurance fund which could meet the cost of individual claim amounts above a certain level. [1]"}, {"section": "Solution", "text": "The government could provide aggregate stop loss insurance for insurers. [1]"}, {"section": "Solution", "text": "The government could require all individuals to purchase Private Medical Insurance. [1]"}, {"section": "Solution", "text": "The government could choose to meet some of the cost of insurance for lower income families. [\u00bd]"}, {"section": "Solution", "text": "Tax relief could be offered for older customers to reduce the cost of premiums. [\u00bd]"}, {"section": "Solution", "text": "The government could introduce risk equalisation within the PMI insurance market, where risk is shared across insurers. [\u00bd]"}, {"section": "Solution", "text": "The profits / losses on the identified riskier policies are pooled and then shared among the insurers involved to ensure that they all have the same average experience. This avoids the risk of one insurer taking on more risky policies (e.g. by writing cover for older lives) than others in the market, leading to uncompetitive premiums. [\u00bd]"}, {"section": "Solution", "text": "Health
