<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SA1 Pricing Questions — IFoA 2019–2025</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1e2532;
    --surface3: #252d3a;
    --border: #30363d;
    --accent: #7c5cbf;
    --accent2: #a78bdc;
    --text: #e6edf3;
    --text-dim: #8b949e;
    --text-dimmer: #6e7681;
    --green: #3fb950;
    --amber: #d29922;
    --red: #f85149;
    --blue: #58a6ff;
    --tag-bg: #21262d;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; line-height: 1.6; }
  
  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 16px 24px; display: flex; align-items: center; gap: 16px; }
  header h1 { font-size: 18px; font-weight: 700; color: var(--text); }
  header .subtitle { color: var(--text-dim); font-size: 13px; }
  .badge { background: var(--accent); color: #fff; border-radius: 20px; padding: 2px 10px; font-size: 12px; font-weight: 600; }

  .layout { display: grid; grid-template-columns: 260px 1fr; min-height: calc(100vh - 57px); }

  /* Sidebar */
  .sidebar { background: var(--surface); border-right: 1px solid var(--border); padding: 16px; overflow-y: auto; position: sticky; top: 0; height: calc(100vh - 57px); }
  .sidebar h2 { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-dimmer); margin-bottom: 12px; margin-top: 20px; }
  .sidebar h2:first-child { margin-top: 0; }
  
  .filter-group { margin-bottom: 4px; }
  label.filter-btn { display: block; padding: 6px 10px; border-radius: 6px; cursor: pointer; transition: background 0.15s; user-select: none; font-size: 13px; color: var(--text-dim); }
  label.filter-btn:hover { background: var(--surface2); }
  label.filter-btn input { display: none; }
  label.filter-btn.active { background: var(--accent); color: #fff; font-weight: 600; }
  
  .marks-row { display: flex; gap: 8px; align-items: center; margin-top: 4px; }
  .marks-row input[type=range] { flex: 1; accent-color: var(--accent); }
  .marks-val { color: var(--accent2); font-weight: 600; font-size: 13px; min-width: 32px; text-align: right; }
  
  input[type=text] { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 8px 10px; color: var(--text); font-size: 13px; outline: none; }
  input[type=text]:focus { border-color: var(--accent); }
  
  .reset-btn { width: 100%; margin-top: 16px; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 8px; color: var(--text-dim); font-size: 13px; cursor: pointer; transition: all 0.15s; }
  .reset-btn:hover { background: var(--surface3); color: var(--text); }

  /* Main content */
  .main { padding: 16px 20px; overflow-y: auto; }
  
  .stats-bar { display: flex; gap: 20px; margin-bottom: 16px; padding: 10px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; }
  .stat { text-align: center; }
  .stat-val { font-size: 22px; font-weight: 700; color: var(--accent2); }
  .stat-lbl { font-size: 11px; color: var(--text-dimmer); text-transform: uppercase; letter-spacing: 0.05em; }
  
  .results-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .results-count { font-size: 13px; color: var(--text-dim); }
  .sort-select { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 5px 8px; color: var(--text); font-size: 12px; }
  
  /* Cards */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 10px; overflow: hidden; transition: border-color 0.15s; }
  .card:hover { border-color: var(--accent); }
  
  .card-header { padding: 12px 16px; display: flex; align-items: flex-start; gap: 12px; cursor: pointer; }
  .card-ref { background: var(--accent); color: #fff; border-radius: 6px; padding: 3px 10px; font-size: 12px; font-weight: 700; white-space: nowrap; }
  .card-sitting { color: var(--text-dim); font-size: 12px; white-space: nowrap; }
  .card-marks { margin-left: auto; background: var(--surface3); border-radius: 6px; padding: 3px 10px; font-size: 12px; font-weight: 700; color: var(--amber); white-space: nowrap; }
  .card-meta { flex: 1; min-width: 0; }
  .card-q { font-size: 13px; color: var(--text); margin-top: 4px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .card-q.expanded { display: block; }
  
  .tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
  .tag { background: var(--tag-bg); border: 1px solid var(--border); border-radius: 4px; padding: 2px 7px; font-size: 11px; color: var(--text-dim); }
  .tag.product { border-color: var(--accent); color: var(--accent2); }
  .tag.pricing-tag { border-color: #3fb950; color: #3fb950; }
  
  .expand-icon { color: var(--text-dimmer); font-size: 16px; margin-left: 8px; flex-shrink: 0; transition: transform 0.2s; }
  .card.open .expand-icon { transform: rotate(90deg); }
  
  .card-body { display: none; border-top: 1px solid var(--border); }
  .card.open .card-body { display: block; }
  
  .scenario-box { background: var(--surface2); border-left: 3px solid var(--accent); padding: 10px 14px; margin: 12px 16px 0; border-radius: 0 6px 6px 0; font-size: 12px; color: var(--text-dim); }
  .scenario-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--accent); margin-bottom: 4px; }
  
  .full-q { padding: 12px 16px 0; font-size: 13px; color: var(--text); }
  
  .bullets-section { padding: 10px 16px 16px; }
  .bullets-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--green); margin-bottom: 8px; }
  .bullet { display: flex; gap: 8px; padding: 5px 0; border-bottom: 1px solid var(--surface3); font-size: 12.5px; color: var(--text-dim); }
  .bullet:last-child { border-bottom: none; }
  .bullet-dot { color: var(--accent); flex-shrink: 0; margin-top: 2px; }
  .bullet-marks { color: var(--amber); font-size: 11px; font-weight: 700; flex-shrink: 0; margin-top: 2px; white-space: nowrap; }
  
  .no-results { text-align: center; padding: 60px 20px; color: var(--text-dimmer); }
  .no-results .icon { font-size: 40px; margin-bottom: 12px; }
  
  @media (max-width: 768px) {
    .layout { grid-template-columns: 1fr; }
    .sidebar { position: static; height: auto; }
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>SA1 Pricing Questions</h1>
    <div class="subtitle">IFoA SP1 Exam Sittings 2019–2025</div>

  <span class="badge" id="total-badge">168 parts</span>
</header>

<div class="layout">
  <aside class="sidebar">

    <div id="product-filters"></div>

      <span class="marks-val" id="marks-val">1+</span>

  <main class="main">
    <div class="stats-bar">
      <div class="stat"><div class="stat-val" id="stat-shown">168</div><div class="stat-lbl">Shown</div></div>
      <div class="stat"><div class="stat-val" id="stat-marks">—</div><div class="stat-lbl">Total Marks</div></div>
      <div class="stat"><div class="stat-val" id="stat-sittings">14</div><div class="stat-lbl">Sittings</div></div>
      <div class="stat"><div class="stat-val">168</div><div class="stat-lbl">Total Parts</div></div>
    </div>
    
    <div class="results-header">
      <span class="results-count" id="results-count">Showing 168 of 168 question parts</span>
      <select class="sort-select" id="sort-select" onchange="render()">
        <option value="chrono">Chronological</option>
        <option value="marks-desc">Marks (High→Low)</option>
        <option value="marks-asc">Marks (Low→High)</option>
      </select>
    </div>
    
    <div id="results-list"></div>
    <div id="no-results" class="no-results" style="display:none">
      <div class="icon">🔍</div>
      <div>No questions match the current filters.</div>
    </div>
  </main>
</div>

<script>
const DATA = [{"id": "201904_Q1(iv)", "sitting": "April 2019", "yymmkey": "201904", "ref": "Q1(iv)", "marks": 4, "all_themes": ["State Healthcare & Demographics"], "products": ["General/Mixed"], "question_text": "The government is considering two potential options for a framework for operating the new requirement:\nOption 1. P erform checks at all points of entry into Country A to ensure visitors have adequate health and care insurance cover. For visitors without cover, a standard health and care policy will be available to purchase and anyone choosing not to purchase the policy will be turned away.\nOption 2. R equire all companies which transport people into Country A to provide health and care insurance for non-residents of Country A that has been approved by the government of Country A within the cost of the travel ticket they have sold.\nList four advantages and four disadvantages of Option 1 compared to Option 2, from the viewpoint of the government.", "scenario": "Country A is an independent island country, with a high quality state funded health care system. It offers the latest modern treatments free at the point any treatment is received.\nThis has led to an increase in \u201cHealth Tourists\u201d \u2013 residents of countries outside Country A who come to Country A for free health care which they would otherwise have to pay for in their country of residence.\nCountry A\u2019s government (\u201cthe government\u201d) has become concerned because \u201cHealth Tourists\u201d now make up over 10% ", "bullets": [{"section": "Solution", "text": "Advantages of Option 1 The government knows its default policy will meet its requirements for the level of cover; this would not necessarily be the case under Option 2. [\u00bd]"}, {"section": "Solution", "text": "The government is more likely to be able to make commission, or more commission, on selling its preferred policy than under Option 2. [\u00bd]"}, {"section": "Solution", "text": "The government can be certain everyone entering has cover which may not be the case under Option 2. [\u00bd]"}, {"section": "Solution", "text": "Travellers are able to buy their own policy if they prefer, or can obtain it cheaper, they can have annual policies; [\u00bd]"}, {"section": "Solution", "text": "And avoids charging everyone for cover they may already have. [\u00bd]"}, {"section": "Solution", "text": "These are less likely to be a deterrent for travel to Country A of non-Health Tourists than Option 2. [\u00bd]"}, {"section": "Solution", "text": "The extra staff and checks may be advantages from other angles e.g. counterterrorism. [\u00bd]"}, {"section": "Solution", "text": "It does not impose potentially unpopular burdens on the carriers, which is likely to be the case under Option 2. [\u00bd]"}, {"section": "Solution", "text": "Avoids having to ban non-compliant carriers or fine them or take legal action against them. [\u00bd]"}, {"section": "Solution", "text": "Disadvantages of Option 1 Option 1 is potentially more complex and expensive for the government to administer [\u00bd]"}, {"section": "Solution", "text": "As Country A has to employ sufficient qualified personnel to check visitors\u2019 health insurance cover at each point of entry to carry out the checks [\u00bd]"}, {"section": "Solution", "text": "And suitably qualified sales persons to sell cover, if necessary, at each point of entry. [\u00bd]"}, {"section": "Solution", "text": "There may be disputes over what \u2018adequate cover\u2019 is. [\u00bd]"}, {"section": "Solution", "text": "Option 1 is very difficult to underwrite on the spot. [\u00bd]"}, {"section": "Solution", "text": "Potentially more likely to give rise to mis-selling issues as cover may need to be bought quickly at point of entry. [\u00bd]"}, {"section": "Solution", "text": "Option 1 is likely to be more onerous than Option 2 for the individual in terms of needing to buy their own cover, potentially leading to fewer non-Health tourists. [\u00bd]"}, {"section": "Solution", "text": "Country A will have to source a suitable health policy, which may be difficult (under Option 2 responsibility is passed over to the carriers). [\u00bd]"}, {"section": "Solution", "text": "Persons will be able to travel without a policy and have to be deported if they won\u2019t purchase the state option [\u00bd]"}, {"section": "Solution", "text": "Potentially leading to Country A\u2019s government being associated with turning away visitors which may put off non-Health tourists. [\u00bd]"}, {"section": "Solution", "text": "Travellers can still fall ill without a policy e.g. at the airport if they have not bought one and are ill before they can be sold the default policy. [\u00bd]"}]}, {"id": "201904_Q1(v)", "sitting": "April 2019", "yymmkey": "201904", "ref": "Q1(v)", "marks": 25, "all_themes": ["Claims Management", "Data", "Group Products", "Pricing", "Product Design", "Regulation", "Reinsurance", "Reserving & Valuation", "Risk Management & Capital", "State Healthcare & Demographics", "Underwriting"], "products": ["Group Products"], "question_text": "The government has decided to implement Option 1 and has invited a small number of global insurance companies to tender for the contract to provide the standard health and care policy.\nDiscuss the factors the insurance companies would need to consider before deciding whether to tender. You are not required to consider how the premium would be determined.", "scenario": "Country A is an independent island country, with a high quality state funded health care system. It offers the latest modern treatments free at the point any treatment is received.\nThis has led to an increase in \u201cHealth Tourists\u201d \u2013 residents of countries outside Country A who come to Country A for free health care which they would otherwise have to pay for in their country of residence.\nCountry A\u2019s government (\u201cthe government\u201d) has become concerned because \u201cHealth Tourists\u201d now make up over 10% ", "bullets": [{"section": "Solution", "text": "The product The first consideration is who is the client under the default option, this is presumably the traveller not the government. [\u00bd]"}, {"section": "Solution", "text": "Does the selling of this product fit into the insurers\u2019 current risk appetite? [\u00bd]"}, {"section": "Solution", "text": "This product potentially has many of the features of a group scheme, with the government in the position of sponsor/\u201cemployer\u201d. [\u00bd]"}, {"section": "Solution", "text": "However unlike an employer the government has not had any contact with the traveller or been involved in selecting them e.g. for employment. [\u00bd]"}, {"section": "Solution", "text": "It may be possible to introduce a profit share however as the purpose of the initiative is for the government to pass on its costs and risks this is unlikely to be acceptable. [\u00bd]"}, {"section": "Solution", "text": "The insurer needs to cover all of the medical expenses of a passenger who has not purchased their own cover before travelling. [\u00bd]"}, {"section": "Solution", "text": "Uninsured travellers are likely to be less healthy than the other travellers otherwise they would purchase their own (cheaper) health cover. [\u00bd]"}, {"section": "Solution", "text": "Cover will usually be for short periods, possibly just a few days. [\u00bd]"}, {"section": "Solution", "text": "However, there may be issues in setting the terms for some policies e.g. when individuals do not know how long they will be staying in country A or stay longer than intended. [\u00bd]"}, {"section": "Solution", "text": "May need to check the rules covering visitor stays in County A. [\u00bd]"}, {"section": "Solution", "text": "What terms will the policies include [\u00bd]"}, {"section": "Solution", "text": "e.g. Excesses/Coinsurance [\u00bd]"}, {"section": "Solution", "text": "Deferred periods \u2013 for short periods after diagnosis before treatment occurs [\u00bd]"}, {"section": "Solution", "text": "Exclusions [\u00bd]"}, {"section": "Solution", "text": "Will documents be in Country A\u2019s language or will it be necessary to have them translated into many different languages. [\u00bd]"}, {"section": "Solution", "text": "Cost of claim is potentially unlimited. [\u00bd]"}, {"section": "Solution", "text": "For the first years\u2019 experience data will be sparse. [\u00bd]"}, {"section": "Solution", "text": "How long will the premium(s) be fixed for. [\u00bd]"}, {"section": "Solution", "text": "Renewal (of the government contract) can be based on actual experience. [\u00bd]"}, {"section": "Solution", "text": "Market and claim numbers and amounts have the potential to change substantially over very short time periods. [\u00bd]"}, {"section": "Solution", "text": "Potential to make significant losses before repricing can take place. [\u00bd]"}, {"section": "Solution", "text": "Costs of development will be high. [\u00bd]"}, {"section": "Solution", "text": "Likely to be a one off. [\u00bd]"}, {"section": "Solution", "text": "Will the policy be sold as individual or will joint or family/group cover be available. [\u00bd]"}, {"section": "Solution", "text": "Does being the default provider put the insurer in a better position to sell alternative policies to customers before they turn up uninsured at the entry point. [\u00bd]"}, {"section": "Solution", "text": "The policyholder Policyholders could reside in any country. [\u00bd]"}, {"section": "Solution", "text": "They do not belong to particular occupation groups. [\u00bd]"}, {"section": "Solution", "text": "They can have serious medical conditions. [\u00bd]"}, {"section": "Solution", "text": "Market / distribution The insurer would need to assess the potential size of the target market overall, [\u00bd]"}, {"section": "Solution", "text": "This could be large if travellers are unaware of the change and need to purchase cover on entry, [\u00bd]"}, {"section": "Solution", "text": "And the potential for future growth [\u00bd]"}, {"section": "Solution", "text": "And their potential share of it, taking into account opportunities to sell the individual policies. [\u00bd]"}, {"section": "Solution", "text": "Whether it would be possible to sell enhanced products. [\u00bd]"}, {"section": "Solution", "text": "Assess whether sufficient volumes can be sold to recoup development costs. [\u00bd]"}, {"section": "Solution", "text": "Will there be a need to undertake a marketing/advertising campaign or will they be allocated customers by the government, [\u00bd]"}, {"section": "Solution", "text": "The insurer would need to decide if entry into this market fits with the company\u2019s brand/strategy. [\u00bd]"}, {"section": "Solution", "text": "There may be increased brand awareness through being associated with these policies, [\u00bd]"}, {"section": "Solution", "text": "Are there benefits to the insurer from having a monopoly on this market. [\u00bd]"}, {"section": "Solution", "text": "Citizens of Country A are likely to see the policies as reducing their contribution to healthcare so positive brand impact. [\u00bd]"}, {"section": "Solution", "text": "Citizens of other countries may react negatively towards companies involved in the scheme, this is a global company with a global reputation to consider. [\u00bd]"}, {"section": "Solution", "text": "The insurer would need to consider how the product will be sold/distributed and other changes to the sales process e.g. commission/fees. [\u00bd]"}, {"section": "Solution", "text": "The economic situation would be considered; there might be more demand in a strongly growing economy. [\u00bd]"}, {"section": "Solution", "text": "Transport links to Country A need to be considered; there may be more demand when travel is easier or there are more flights/ferries. [\u00bd]"}, {"section": "Solution", "text": "Consider whether other countries have plans to change their health provision, charging structure or to introduce compulsory healthcare insurance in their own country. [\u00bd]"}, {"section": "Solution", "text": "The insurer may be keen to do more business with the travel industry. [\u00bd]"}, {"section": "Solution", "text": "The locations of default policyholders may fit well with its global locations so it may have more relevant data e.g. on local illnesses and locally available treatments. [\u00bd]"}, {"section": "Solution", "text": "It may already have products which only require small changes to make them suitable. [\u00bd]"}, {"section": "Solution", "text": "It could provide increased risk diversification with benefits for overall capital requirements. [\u00bd]"}, {"section": "Solution", "text": "Underwriting / claims management The insurer will have to establish what information it will be able/allowed to collect on each life. [\u00bd]"}, {"section": "Solution", "text": "What policy information can be obtained from the proposal form (if any). [\u00bd]"}, {"section": "Solution", "text": "What claim information it will receive from the state provider. [\u00bd]"}, {"section": "Solution", "text": "The insurer is likely to only be able to carry out limited underwriting at the point of sale. [\u00bd]"}, {"section": "Solution", "text": "It will not be possible to carry out the initial or claim underwriting the company is used to [\u00bd]"}, {"section": "Solution", "text": "It will not be possible to decline poor risks [\u00bd]"}, {"section": "Solution", "text": "Or to have exclusion clauses, PECs etc. [\u00bd]"}, {"section": "Solution", "text": "The purpose of the policy is to ensure the uninsurable have cover. [\u00bd]"}, {"section": "Solution", "text": "Would need to establish if the same price must be offered to everyone, regardless of age, gender and health status. [\u00bd]"}, {"section": "Solution", "text": "It is not possible to carry out claim underwriting. [\u00bd]"}, {"section": "Solution", "text": "The state healthcare system will decide if treatment is necessary. [\u00bd]"}, {"section": "Solution", "text": "And the state healthcare system will be able to determine the cost of treatments. [\u00bd]"}, {"section": "Solution", "text": "Investigate whether there could be scope to provide cover in alternative establishments with whom the insurer can negotiate discounts. [\u00bd]"}, {"section": "Solution", "text": "Morbidity/Mortality The numbers of claims incepting would need to be estimated. [\u00bd]"}, {"section": "Solution", "text": "Compared to standard policies there will be more claims. [\u00bd]"}, {"section": "Solution", "text": "The company is global so it will have data on its insured population, split by the countries in which it operates but most of its new clients will not have had insurance before [\u00bd]"}, {"section": "Solution", "text": "But this data is likely to be for claims incurred within the insureds own country. [\u00bd]"}, {"section": "Solution", "text": "The data which is required will be for claims and treatments outside the insured\u2019s home country, which is likely to be scarce. [\u00bd]"}, {"section": "Solution", "text": "The Country A government should be able to provide data on the number and costs of treatments it provided to citizens of other countries. [\u00bd]"}, {"section": "Solution", "text": "It may be necessary to obtain additional external data. [\u00bd]"}, {"section": "Solution", "text": "This needs to be adjusted to reflect the likely profile of its new clients [\u00bd]"}, {"section": "Solution", "text": "And the types of the expected treatments. [\u00bd]"}, {"section": "Solution", "text": "Trends and seasonality in experience would need to be considered. [\u00bd]"}, {"section": "Solution", "text": "The insurer will need to consider if there is sufficient data to allow it to be subdivided by country of origin, type of health procedure etc [\u00bd]"}, {"section": "Solution", "text": "And split by age, gender etc. [\u00bd]"}, {"section": "Solution", "text": "As data is built up it can be used to improve the understanding of the claim experience and improve quotes and reserving. [\u00bd]"}, {"section": "Solution", "text": "This is a new scheme to all insurers so there are no data for a credibility factor if it chooses a group option [\u00bd]"}, {"section": "Solution", "text": "Claim costs This is an indemnity product so likely claim costs also need to be estimated. [\u00bd]"}, {"section": "Solution", "text": "Clear definitions of what will be covered under each policy will be needed. [\u00bd]"}, {"section": "Solution", "text": "It will need to consider if any limits on total claim cost can be imposed. [\u00bd]"}, {"section": "Solution", "text": "The insurer will need to determine the most likely treatments [\u00bd]"}, {"section": "Solution", "text": "And the costs of having these treatments in Country A [\u00bd]"}, {"section": "Solution", "text": "The insurer needs to know the anticipated future levels of charges by the hospitals, split by procedure [\u00bd]"}, {"section": "Solution", "text": "The insurer will need to know the anticipated future levels of charges by repatriation airline for various levels of repatriation eg walking wounded, full isolation, [\u00bd]"}, {"section": "Solution", "text": "There may be opportunities for preferred supplier discounts if the insurer can use its own hospitals or airlines. [\u00bd]"}, {"section": "Solution", "text": "Medical inflation/advances will need to be allowed for; the rate will be determined in part, if not completely, by the Country A government. [\u00bd]"}, {"section": "Solution", "text": "The costs of treating the young and old may be significant. [\u00bd]"}, {"section": "Solution", "text": "The potential for anti-selection would be considered. [\u00bd]"}, {"section": "Solution", "text": "This will depend on the availability and cost of the treatments in the home country. [\u00bd]"}, {"section": "Solution", "text": "There will be a greater need to incorporate margins, to reflect approximations/unknowns. [\u00bd]"}, {"section": "Solution", "text": "Expenses / new business Costs of advertising, marketing and selling the product will be very different from its current products. [\u00bd]"}, {"section": "Solution", "text": "These costs will depend on how the government implements its policy. [\u00bd]"}, {"section": "Solution", "text": "Unlikely to have marketing costs. [\u00bd]"}, {"section": "Solution", "text": "Sales costs could be lower e.g. if government paid agents sell the policies [\u00bd]"}, {"section": "Solution", "text": "And carry out the policy and claim administration. [\u00bd]"}, {"section": "Solution", "text": "Government may expect commission . [\u00bd]"}, {"section": "Solution", "text": "Claim expenses may be lower if the insurer simply reimburses the government rather than multiple policyholders. [\u00bd]"}, {"section": "Solution", "text": "Reimbursement may take the form of monthly payment to the travel company or the government. [\u00bd]"}, {"section": "Solution", "text": "There may be increased costs due to having to audit the government\u2019s bills for cover. [\u00bd]"}, {"section": "Solution", "text": "Costs of settling disputes may be significantly higher. [\u00bd]"}, {"section": "Solution", "text": "The government may not permit its bills to be queried or declined. [\u00bd]"}, {"section": "Solution", "text": "Costs of changing systems may be significant [\u00bd]"}, {"section": "Solution", "text": "As will the costs of developing and pricing the product. [\u00bd]"}, {"section": "Solution", "text": "The insurer will need to ensure that expense loadings will be sufficient to cover anticipated costs. [\u00bd]"}, {"section": "Solution", "text": "Any specific one-off and additional costs (e.g. product development, changes to the systems, training) will need to be allowed for, as will annual administration costs, regulation costs etc. [\u00bd]"}, {"section": "Solution", "text": "Legal costs e.g. of disputes with the government over who is liable, also need to be estimated. [\u00bd]"}, {"section": "Solution", "text": "Assumptions about new business volumes will be needed for spreading fixed costs. [\u00bd]"}, {"section": "Solution", "text": "The average premium size will need to be estimated, and assumptions made about the mix of lives e.g. by age and sex. [\u00bd]"}, {"section": "Solution", "text": "Policies are short term and will not be renewed so the costs will need to be recouped in the lifetime of the policy. [\u00bd]"}, {"section": "Solution", "text": "State intervention Country A is heavily involved but tourists own governments may impose regulations e.g. TCF on the insurer. [\u00bd]"}, {"section": "Solution", "text": "Risk that Country A increases the costs above those in the market to make \u201cprofits\u201d. [\u00bd]"}, {"section": "Solution", "text": "The insurer would need to know whether the government would be offering incentives to travel companies and/or subsidies to insurance companies. [\u00bd]"}, {"section": "Solution", "text": "Consider any reporting or reserving requirements. [\u00bd]"}, {"section": "Solution", "text": "The insurer would also need to consider whether the state healthcare provision will be changed e.g. more treatments available to non-citizens of Country A. [\u00bd]"}, {"section": "Solution", "text": "Will there be marketing to encourage citizens of other countries to travel to Country A for treatments (by the government or others). [\u00bd]"}, {"section": "Solution", "text": "How long will they be preferred suppliers. [\u00bd]"}, {"section": "Solution", "text": "There may be reputational risks for the insurer from potential mis-selling of the policies. [\u00bd]"}, {"section": "Solution", "text": "The proposed change may not actually be implemented or may be reversed after a short period by a new government. [\u00bd]"}, {"section": "Solution", "text": "Profit The insurer will need to consider whether there is potential for sufficient profit according to the company\u2019s profit criteria / shareholder (if relevant) minimum profit or return on capital requirements. [\u00bd]"}, {"section": "Solution", "text": "It will also need to consider the sensitivity of profit to key risks and variables including claims costs, expenses and new business volumes. [\u00bd]"}, {"section": "Solution", "text": "There is significant scope for anti-selection e.g. people travel when they know they have cancer, or a risky pregnancy [\u00bd]"}, {"section": "Solution", "text": "And moral hazard e.g. travel companies offer/market treatment flights to the sick having obtained a good premium based on past good experience. [\u00bd]"}, {"section": "Solution", "text": "The insurer would need to define the products which it is offering very carefully. [\u00bd]"}, {"section": "Solution", "text": "The insurer would need to ensure that terms and conditions can be developed which meet the government\u2019s requirements but also limit the risk to an acceptable level for the insurance company. [\u00bd]"}, {"section": "Solution", "text": "There may be a currency advantage leading to profits being higher when converted to Country A\u2019s currency. [\u00bd]"}, {"section": "Solution", "text": "There could be capital, regulatory and tax advantages. [\u00bd]"}, {"section": "Solution", "text": "It could be beneficial to stop a competitor gaining market share. [\u00bd]"}, {"section": "Solution", "text": "The reserves and hence cost of capital could be higher because of the uncertainties involved. [\u00bd]"}, {"section": "Solution", "text": "The insurer will need to investigate the capital required and its cost to the insurer. [\u00bd]"}, {"section": "Solution", "text": "There may be high capital requirements due to uncertainty of this niche market. [\u00bd]"}, {"section": "Solution", "text": "Other Significant new business levels may lead to unmanageable new business strain. [\u00bd]"}, {"section": "Solution", "text": "The insurer will need to consider whether reinsurance will be available [\u00bd]"}, {"section": "Solution", "text": "And on acceptable terms. [\u00bd]"}, {"section": "Solution", "text": "The Government might offer to meet costs above a certain limit. [\u00bd]"}, {"section": "Solution", "text": "How will this affect the insurers\u2019 current solvency positions. [\u00bd]"}, {"section": "Solution", "text": "Business may be sold in many countries and languages. [\u00bd]"}, {"section": "Solution", "text": "Premiums may be paid in local currency or other currencies [\u00bd]"}, {"section": "Solution", "text": "And claims settled in Country A\u2019s currency [\u00bd]"}, {"section": "Solution", "text": "Potentially giving rise to currency exchange risks. [\u00bd]"}, {"section": "Solution", "text": "The premiums may be difficult to collect or there may be lags before they are received. [\u00bd]"}, {"section": "Solution", "text": "There will be many different sources of business \u2013 airline, airport, ferry terminal, travel agents etc. [\u00bd]"}, {"section": "Solution", "text": "System changes are likely to be required. [\u00bd]"}, {"section": "Solution", "text": "The insurer would need to consider the availability of sufficient numbers of trained staff to cope with the expected volumes of new business [\u00bd]"}, {"section": "Solution", "text": "And where they need to be located [\u00bd]"}, {"section": "Solution", "text": "And their language skills [\u00bd]"}, {"section": "Solution", "text": "And would need to ensure there are sufficient trained staff to deal with the significantly higher claims management burden. [\u00bd]"}, {"section": "Solution", "text": "The insurer may be interested in getting experience of tendering [\u00bd]"}, {"section": "Solution", "text": "The insurer may want to work more closely with the government [\u00bd]"}]}, {"id": "201904_Q1(vi)", "sitting": "April 2019", "yymmkey": "201904", "ref": "Q1(vi)", "marks": 4, "all_themes": ["Claims Management", "Group Products", "Pricing", "Product Design", "State Healthcare & Demographics", "Underwriting"], "products": ["Group Products"], "question_text": "Outline how your answer to part (v) would change if the government had decided to implement Option 2 instead.\n[Total 55]", "scenario": "Country A is an independent island country, with a high quality state funded health care system. It offers the latest modern treatments free at the point any treatment is received.\nThis has led to an increase in \u201cHealth Tourists\u201d \u2013 residents of countries outside Country A who come to Country A for free health care which they would otherwise have to pay for in their country of residence.\nCountry A\u2019s government (\u201cthe government\u201d) has become concerned because \u201cHealth Tourists\u201d now make up over 10% ", "bullets": [{"section": "Solution", "text": "More likely to be offered as group schemes to airlines, ferry companies. [\u00bd]"}, {"section": "Solution", "text": "Will a flat premium be added to the cost of the travel ticket or will the levy be determined after some underwriting. [\u00bd]"}, {"section": "Solution", "text": "Consider whether it is possible to have exclusions or refuse cover to some travellers. [\u00bd]"}, {"section": "Solution", "text": "The insurer might target certain organisations to work with and so restrict or reduce the countries it is exposed to covering. [\u00bd]"}, {"section": "Solution", "text": "Will the government allow travel providers to choose any insurer [\u00bd]"}, {"section": "Solution", "text": "Or will you be the only provider. [\u00bd]"}, {"section": "Solution", "text": "If not you will be competing to offer cover to the travel providers which may limit your scope to make profits [\u00bd]"}, {"section": "Solution", "text": "And even just to avoid losses. [\u00bd]"}, {"section": "Solution", "text": "The insurer will need to consider how business will be sold, there may be costs and commission to specialist brokers. [\u00bd]"}, {"section": "Solution", "text": "The insurer will need to consider whether there will be any restrictions on travel e.g. travel companies setting age limits. [\u00bd]"}, {"section": "Solution", "text": "Initial costs may be lower if the travel companies sell, issue and administers the policies. [\u00bd]"}, {"section": "Solution", "text": "Ongoing administration expenses are likely to be higher as dealing with more parties. [\u00bd]"}, {"section": "Solution", "text": "Language issues will be more important [\u00bd]"}, {"section": "Solution", "text": "Also currency fluctuations. [\u00bd]"}, {"section": "Solution", "text": "A potentially complex and expensive claim payment system may be required to ensure correct amounts of premium are being received, correct allowance is made for cancellations, the correct claims amount is paid back etc. [1]"}, {"section": "Solution", "text": "There may be a higher risk of fraud or poor claims control with group arrangements. [\u00bd]"}, {"section": "Solution", "text": "Will the insurer need to be registered in all of the locations. [\u00bd]"}, {"section": "Solution", "text": "Reporting requirements likely to be more onerous, may have to report in many countries. [\u00bd]"}, {"section": "Solution", "text": "The insurer is more likely to know return dates making the determination of period of cover easier. [\u00bd]"}]}, {"id": "201904_Q2(i)", "sitting": "April 2019", "yymmkey": "201904", "ref": "Q2(i)", "marks": 5, "all_themes": ["Capital & Solvency", "Claims Management", "Data", "Investments", "Models", "Pricing", "Private Medical Insurance (PMI)", "Regulation", "Reserving & Valuation", "Risk Management & Capital"], "products": ["Private Medical Insurance (PMI)"], "question_text": "Suggest the areas that would be covered in the independent review to provide the insurer with an assurance that the TP and SCR results are in compliance with Solvency II.", "scenario": "A health and care insurer specialising in private medical insurance is in the process of implementing its Solvency II Technical Provisions (TP) and Standard Formula Solvency Capital Requirement (SCR). The insurer has commissioned an external consultancy firm to carry out an independent review of its Solvency II TP and SCR results.", "bullets": [{"section": "Solution", "text": "In order to provide an assurance opinion, the scope should cover: A review of the methodology, approach and assumptions used for the calculation of the Technical Provisions against the relevant Solvency II requirements. [\u00bd]"}, {"section": "Solution", "text": "The Best Estimate Liabilities (BEL) and Risk Margin (RM) will be assessed separately. [\u00bd]"}, {"section": "Solution", "text": "For BEL, premium provisions and claims provisions will be assessed separately. [\u00bd]"}, {"section": "Solution", "text": "A review of the methodology, approach and assumptions used for the calculation of the Solvency Capital Requirement against the relevant Solvency II requirements. [\u00bd]"}, {"section": "Solution", "text": "Check the actual calculation results of the Best Estimate Liabilities against the health insurer\u2019s internal documentation and with the relevant Solvency II requirements. [\u00bd]"}, {"section": "Solution", "text": "Check the determination of the discount rate used for the BEL calculations, [\u00bd]"}, {"section": "Solution", "text": "In particular, that any matching adjustment or volatility adjustment was correct. [\u00bd]"}, {"section": "Solution", "text": "Check the actual calculation results of the Risk Margin against the health insurer\u2019s internal documentation and with the relevant Solvency II requirements. [\u00bd]"}, {"section": "Solution", "text": "This would include the methodology used for the run-off of the non-hedgeable risks. [\u00bd]"}, {"section": "Solution", "text": "Check the calculation of the diversification benefit in the SCR calculation. [\u00bd]"}, {"section": "Solution", "text": "Check the actual calculation results of the Solvency Capital Requirement against the health insurer\u2019s internal documentation and with the relevant Solvency II requirements. [\u00bd]"}, {"section": "Solution", "text": "This would include the level of look-through on the assets under stress [\u00bd]"}, {"section": "Solution", "text": "The loss absorbency of deferred tax (LADT) [\u00bd]"}, {"section": "Solution", "text": "Treatment of pension scheme. [\u00bd]"}, {"section": "Solution", "text": "The review will also cover the models used to carry out parts of the calculations. [\u00bd]"}, {"section": "Solution", "text": "A review of the input data to ensure that they are complete, appropriate and accurate. [\u00bd]"}, {"section": "Solution", "text": "A review of the governance and controls over the calculation processes. [\u00bd]"}, {"section": "Solution", "text": "A review of the output data to ensure that they have been extracted correctly from the models. [\u00bd]"}, {"section": "Solution", "text": "A review of the adequacy of the review and sign-off processes that the methodology, assumptions and final figures have gone through prior to the independent review. [\u00bd]"}, {"section": "Solution", "text": "[Parts (i), (ii) and (iii) of this question were cross marked]"}]}, {"id": "201904_Q2(ii)", "sitting": "April 2019", "yymmkey": "201904", "ref": "Q2(ii)", "marks": 12, "all_themes": ["Capital & Solvency", "Claims Management", "Data", "Investments", "Models", "Pricing", "Private Medical Insurance (PMI)", "Product Design", "Regulation", "Reinsurance", "Reserving & Valuation", "Risk Management & Capital"], "products": ["Private Medical Insurance (PMI)"], "question_text": "Set out the information that the external consultancy firm would require from the insurer to carry out the independent review.", "scenario": "A health and care insurer specialising in private medical insurance is in the process of implementing its Solvency II Technical Provisions (TP) and Standard Formula Solvency Capital Requirement (SCR). The insurer has commissioned an external consultancy firm to carry out an independent review of its Solvency II TP and SCR results.", "bullets": [{"section": "Solution", "text": "Basis of preparation TP methodology and approach paper [\u00bd]"}, {"section": "Solution", "text": "TP assumptions paper [\u00bd]"}, {"section": "Solution", "text": "Experience investigation reports [\u00bd]"}, {"section": "Solution", "text": "Back testing results [\u00bd]"}, {"section": "Solution", "text": "SCR methodology and approach paper [\u00bd]"}, {"section": "Solution", "text": "Expert Judgement log [\u00bd]"}, {"section": "Solution", "text": "Asset data Look-through data for investment funds [\u00bd]"}, {"section": "Solution", "text": "Market value of assets [\u00bd]"}, {"section": "Solution", "text": "Credit rating of assets [\u00bd]"}, {"section": "Solution", "text": "Currency of assets [\u00bd]"}, {"section": "Solution", "text": "Bonds (coupon, [\u00bd]"}, {"section": "Solution", "text": "Equity [\u00bd]"}, {"section": "Solution", "text": "Property [\u00bd]"}, {"section": "Solution", "text": "Cash/Deposits [\u00bd]"}, {"section": "Solution", "text": "Derivatives [\u00bd]"}, {"section": "Solution", "text": "Pension scheme assets [\u00bd]"}, {"section": "Solution", "text": "Deferred tax assets [\u00bd]"}, {"section": "Solution", "text": "Liability data Policy data [\u00bd]"}, {"section": "Solution", "text": "Claims data [\u00bd]"}, {"section": "Solution", "text": "Premium data [\u00bd]"}, {"section": "Solution", "text": "Pension scheme labilities [\u00bd]"}, {"section": "Solution", "text": "Reinsurance premium and claims data [\u00bd]"}, {"section": "Solution", "text": "Deferred tax liability [\u00bd]"}, {"section": "Solution", "text": "Results data Results produced by the models [\u00bd]"}, {"section": "Solution", "text": "Broken down by SCR risk module [\u00bd]"}, {"section": "Solution", "text": "Analysis of change [\u00bd]"}, {"section": "Solution", "text": "Solvency II balance sheet [\u00bd]"}, {"section": "Solution", "text": "Quantitative reporting templates (QRTs) [\u00bd]"}, {"section": "Solution", "text": "Governance and controls Processes documentation [\u00bd]"}, {"section": "Solution", "text": "Management sign-offs [\u00bd]"}, {"section": "Solution", "text": "Consultancy would want details of: Expenses \u2013 data on overheads, directly attributable expenses and expense inflation [\u00bd]"}, {"section": "Solution", "text": "Details of any contractual options and guarantees [\u00bd]"}, {"section": "Solution", "text": "How cashflows were projected \u2013 e.g. was it on a policy by policy basis, or alternatively would want to understand if any approximations had been used. [\u00bd]"}, {"section": "Solution", "text": "The consultancy may need information details of the policy terms that might affect policyholder actions [\u00bd]"}, {"section": "Solution", "text": "Including options and guarantees [\u00bd]"}, {"section": "Solution", "text": "Details of any transitional arrangements [\u00bd]"}, {"section": "Solution", "text": "Details of any matching adjustment (unlikely for PMI)/volatility adjustment used Details of treatment of options and guarantees [\u00bd]"}, {"section": "Solution", "text": "Has the national regulator applied any capital \u2018add-on\u2019 in excess of the SCR calculated by the insurance company [\u00bd]"}, {"section": "Solution", "text": "If so, details would be needed about why additional capital has been added on [\u00bd]"}, {"section": "Solution", "text": "[Parts (i), (ii) and (iii) of this question were cross marked]"}]}, {"id": "201904_Q2(iii)", "sitting": "April 2019", "yymmkey": "201904", "ref": "Q2(iii)", "marks": 22, "all_themes": ["Capital & Solvency", "Claims Management", "Data", "Investments", "Models", "Pricing", "Private Medical Insurance (PMI)", "Regulation", "Reinsurance", "Reserving & Valuation", "Risk Management & Capital", "Underwriting"], "products": ["Private Medical Insurance (PMI)"], "question_text": "Describe how the external consultancy firm might review the following areas:\n(a) Input data.\n(b) Methodology, assumptions and calculation of the TP.\n(c) Methodology, assumptions and calculation of the SCR.\n(d) Governance and controls.", "scenario": "A health and care insurer specialising in private medical insurance is in the process of implementing its Solvency II Technical Provisions (TP) and Standard Formula Solvency Capital Requirement (SCR). The insurer has commissioned an external consultancy firm to carry out an independent review of its Solvency II TP and SCR results.", "bullets": [{"section": "Solution", "text": "Input data Spot check input data. [\u00bd]"}, {"section": "Solution", "text": "Carry out a movement analysis to sense check the data. [\u00bd]"}, {"section": "Solution", "text": "Reconcile market value of assets to audited accounts. [\u00bd]"}, {"section": "Solution", "text": "Check credit rating of assets against independently sources such as Bloomberg or publicly available information where relevant [\u00bd]"}, {"section": "Solution", "text": "Check currency of assets against independently sources such as Bloomberg or publicly available information where relevant. [\u00bd]"}, {"section": "Solution", "text": "Reconcile policy data against policy admin system control reports. [\u00bd]"}, {"section": "Solution", "text": "Reconcile premium amounts to audited accounts. [\u00bd]"}, {"section": "Solution", "text": "Reconcile claims amounts to audited accounts. [\u00bd]"}, {"section": "Solution", "text": "Check that all the parameters and assumptions have been entered correctly into the models [\u00bd]"}, {"section": "Solution", "text": "Methodology, assumptions and calculation of the TP Best Estimate Liability Check that business have been segmented appropriately at the homogeneous risk group level, by prescribed Solvency II Lines of Business. [\u00bd]"}, {"section": "Solution", "text": "They should then further segmented by currency. [\u00bd]"}, {"section": "Solution", "text": "Check that the BEL is calculated gross of reinsurance. [\u00bd]"}, {"section": "Solution", "text": "Review the appropriateness of the contract boundaries [\u00bd]"}, {"section": "Solution", "text": "For PMI business these are likely to be up to the next policy renewal date. [\u00bd]"}, {"section": "Solution", "text": "Check that the claims provision is the expected present value of all future claim payments and expenses arising from claims events that have occurred before or at the valuation date. [\u00bd]"}, {"section": "Solution", "text": "Reconcile the claims provision against the audited accounts by removing any prudence margins incorporated under the statutory basis. [\u00bd]"}, {"section": "Solution", "text": "Would need to allow for guarantees and options. [\u00bd]"}, {"section": "Solution", "text": "Check whether discounting has been allowed for, although due the short-term nature of the outstanding claims payment discounting may be ignored on materiality. [\u00bd]"}, {"section": "Solution", "text": "Check that a cash flow approach has been adopted for the premium provision calculation. [\u00bd]"}, {"section": "Solution", "text": "The premium provision should be the expected present value of all future cash flows relating to risk exposure after the valuation date. [\u00bd]"}, {"section": "Solution", "text": "Check that the cash flow items such as premium, claims and expenses have been included in the projections. [\u00bd]"}, {"section": "Solution", "text": "Check that the effect of lapses have been allowed for in the projections. [\u00bd]"}, {"section": "Solution", "text": "All the assumptions should be best estimate and are consistent with the results of the experience investigations. [\u00bd]"}, {"section": "Solution", "text": "Check the BEL calculations factor in all policyholder actions [\u00bd]"}, {"section": "Solution", "text": "And management actions. [\u00bd]"}, {"section": "Solution", "text": "Reinsurance recoverable This is the expected present value of all future cash flows under reinsurance arrangements. [\u00bd]"}, {"section": "Solution", "text": "Check that any expected losses due to the default of the reinsurance counterparty have been accounted for in the calculation. [\u00bd]"}, {"section": "Solution", "text": "These need to must be split into two parts, one corresponding to the premium provision and the other corresponding to the claims provision. [\u00bd]"}, {"section": "Solution", "text": "Check that reinsurance recoverables are included as an asset on the Solvency II balance sheet and that the BEL is shown gross of reinsurance on the liability side. [\u00bd]"}, {"section": "Solution", "text": "Risk Margin Check that the risk margin method is based on a 6% cost of capital approach applied to the present value of projected non-hedgeable risks. [\u00bd]"}, {"section": "Solution", "text": "Non-hedgeable risks for a PMI insurer are likely to include the underwriting and operational risk modules. [\u00bd]"}, {"section": "Solution", "text": "Check that these risk charges are being projected forwarded using appropriate risk drivers, such as premium volumes. [\u00bd]"}, {"section": "Solution", "text": "Check that the correct risk free rates as prescribed by EIOPA have been incorporated correctly. [\u00bd]"}, {"section": "Solution", "text": "Check any simplifications for the risk margin calculations [\u00bd]"}, {"section": "Solution", "text": "For example, check drivers are appropriate. [\u00bd]"}, {"section": "Solution", "text": "Methodology, assumptions and calculation of the SCR Market risk For bonds, check that they have been included in the interest risk and spread risk modules. [\u00bd]"}, {"section": "Solution", "text": "Check that the credit spread for each bond has been derived in line with the relevant Solvency II requirements. [\u00bd]"}, {"section": "Solution", "text": "Check that the up and down stresses for interest risk have been carried out correctly, and that the most onerous of the two has been selected for reporting. [\u00bd]"}, {"section": "Solution", "text": "Check that consistent stresses have been applied on TP, although due to the short- tailed nature of PMI business interest rate risk is likely to be small. [\u00bd]"}, {"section": "Solution", "text": "For spread risk, check that the calculation is based on the modified duration and the credit rating of each security. [\u00bd]"}, {"section": "Solution", "text": "For equity risk, check that each holding has been categorised correctly into Type 1 or Type 2. [\u00bd]"}, {"section": "Solution", "text": "Check that the correct symmetric adjustments as prescribed by Solvency II have been applied. [\u00bd]"}, {"section": "Solution", "text": "Check that the correct risk charges as prescribed by Solvency II have been applied. [\u00bd]"}, {"section": "Solution", "text": "For property risk, check that the correct property risk charge as prescribed by Solvency II has been applied. [\u00bd]"}, {"section": "Solution", "text": "For spread risk, check that the calculation is based on the modified duration and the credit rating of each security. [\u00bd]"}, {"section": "Solution", "text": "For currency risk, check that the correct property risk charge as prescribed by Solvency II has been applied to the net currency exposure. [\u00bd]"}, {"section": "Solution", "text": "Check that the stresses are being applied based on the whether the upward or downward stress is biting for each currency. [\u00bd]"}, {"section": "Solution", "text": "Check that the effects of any hedging/derivatives have been allowed for correctly. [\u00bd]"}, {"section": "Solution", "text": "For concentration risk, check that exposures to each counterparty that is part of the same group are aggregated together. [\u00bd]"}, {"section": "Solution", "text": "Check that a weighted average credit rating is used for the counterparty group and the correct concentration risk charge as prescribed by Solvency II has been applied. [\u00bd]"}, {"section": "Solution", "text": "Check appropriate allowance made for any intangible assets. [\u00bd]"}, {"section": "Solution", "text": "Counterparty Risk For counterparty default risk, check that each holding has been categorised correctly into Type 1 or Type 2. [1]"}, {"section": "Solution", "text": "And correct risk charge has been applied. [\u00bd]"}, {"section": "Solution", "text": "Insurance risk For non-life health risk for PMI business, check that it comprises underwriting risk (premium and reserve risk), [\u00bd]"}, {"section": "Solution", "text": "Lapse risk [\u00bd]"}, {"section": "Solution", "text": "And catastrophe risk. [\u00bd]"}, {"section": "Solution", "text": "Check the correct stresses were used for disability/morbidity. [\u00bd]"}, {"section": "Solution", "text": "Check that the premium risk charge is calculated from premium volume and the standard formula parameter for the standard deviation. [\u00bd]"}, {"section": "Solution", "text": "Check that the reserve risk charge is calculated from reserve volume and the standard formula parameter for the standard deviation. [\u00bd]"}, {"section": "Solution", "text": "Check that the correct lapse risk charge based on an immediate cancellation of a prescribed percentage of contracts has been applied. [\u00bd]"}, {"section": "Solution", "text": "For catastrophe risk, check that the three types of catastrophic risks: mass accident risk, accident concentration risk and pandemic risk have been allowed for correctly. [\u00bd]"}, {"section": "Solution", "text": "Operational risk For operation risk, check that the formula applied is in line with the Solvency II requirements [\u00bd]"}, {"section": "Solution", "text": "And is based on gross of reinsurance premiums. [\u00bd]"}, {"section": "Solution", "text": "Other Check that the individual stresses have been combined correctly to calculate the BSCR. [\u00bd]"}, {"section": "Solution", "text": "Check the calculation of the loss absorbing capacity of deferred tax [\u00bd]"}, {"section": "Solution", "text": "And ensure that this can be offset against deferred tax liabilities. [\u00bd]"}, {"section": "Solution", "text": "Check that the prescribed correlation matrix has been correctly incorporated in the calculation. [\u00bd]"}, {"section": "Solution", "text": "Governance and controls Review the design of governance and controls over the experience investigations process. [\u00bd]"}, {"section": "Solution", "text": "Review the design of governance and controls over the setting of best estimate assumptions, in particular how they relate to the results of the experience investigations. [\u00bd]"}, {"section": "Solution", "text": "Review the design of governance and controls over the data input processes. [\u00bd]"}, {"section": "Solution", "text": "Review the design of governance and controls over the model, in particular the access rights, version control and independent checking. [\u00bd]"}, {"section": "Solution", "text": "Review the design of governance and controls over the results extraction process. [\u00bd]"}, {"section": "Solution", "text": "Review the operating effectiveness by carrying out walkthrough of the processes with the relevant staff. [\u00bd]"}, {"section": "Solution", "text": "Review the evidence of independent checks [\u00bd]"}, {"section": "Solution", "text": "Such as management sign-offs [\u00bd]"}, {"section": "Solution", "text": "And that they have been signed off by an appropriate person. [\u00bd]"}, {"section": "Solution", "text": "Review the issues and errors log to ensure that all the material issues have been addressed, and follow up actions have been agreed to resolve any outstanding issues. [\u00bd]"}, {"section": "Solution", "text": "Review the compliance with relevant professional and regulatory standards. [\u00bd]"}, {"section": "Solution", "text": "[Cross mark with parts (i) and (ii) \u2013 also check total marks for each part]"}]}, {"id": "201904_Q2(iv)", "sitting": "April 2019", "yymmkey": "201904", "ref": "Q2(iv)", "marks": 6, "all_themes": ["Capital & Solvency", "Data", "Investments", "Models", "Pricing", "Private Medical Insurance (PMI)", "Regulation", "Reinsurance", "Reserving & Valuation"], "products": ["Private Medical Insurance (PMI)"], "question_text": "Suggest analyses that could be carried out to assess the appropriateness of using the Standard Formula approach for the SCR.\n[Total 45]\nEND OF PAPER", "scenario": "A health and care insurer specialising in private medical insurance is in the process of implementing its Solvency II Technical Provisions (TP) and Standard Formula Solvency Capital Requirement (SCR). The insurer has commissioned an external consultancy firm to carry out an independent review of its Solvency II TP and SCR results.", "bullets": [{"section": "Solution", "text": "The appropriateness of standard formula depends on whether any areas of the insurer\u2019s business materially deviates from the standard formula SCR assumptions. [\u00bd]"}, {"section": "Solution", "text": "Does the insurer have the expertise to use an internal model [\u00bd]"}, {"section": "Solution", "text": "Or the funds? [\u00bd]"}, {"section": "Solution", "text": "For a health insurer, the standard formula should fit the risk charge of a number of areas of its business. [\u00bd]"}, {"section": "Solution", "text": "The insurer\u2019s Own Risk and Solvency Assessment should allow it to demonstrate assessment of appropriateness. [\u00bd]"}, {"section": "Solution", "text": "The assessment should be carried out for each risk module separately. [\u00bd]"}, {"section": "Solution", "text": "The starting point is to consider the insurer\u2019s risk profile and materiality of each risk. [\u00bd]"}, {"section": "Solution", "text": "For a health insurer writing PMI business, insurance risk is likely to be significant. [\u00bd]"}, {"section": "Solution", "text": "Within insurance risk, lapse and catastrophe risks are not likely to be material due to the short term nature of the business. [\u00bd]"}, {"section": "Solution", "text": "Premium and reserve risks are likely to be significant. [\u00bd]"}, {"section": "Solution", "text": "Next step is to assess whether the risk profile of the business written by this insurer is likely to cause these risk to deviate materially from the standard formula SCR [1]"}, {"section": "Solution", "text": "Past data should be used to assess the volatility of the premium and reserve risks. [\u00bd]"}, {"section": "Solution", "text": "For market risk, the significance of each asset type should be considered separately. [\u00bd]"}, {"section": "Solution", "text": "This would include: Equity risk [\u00bd]"}, {"section": "Solution", "text": "Interest risk [\u00bd]"}, {"section": "Solution", "text": "Spread risk [\u00bd]"}, {"section": "Solution", "text": "Currency risk [\u00bd]"}, {"section": "Solution", "text": "Property risk [\u00bd]"}]}, {"id": "201909_Q1(ii)", "sitting": "September 2019", "yymmkey": "201909", "ref": "Q1(ii)", "marks": 4, "all_themes": ["Capital & Solvency", "Long-Term Care (LTC)", "Pricing", "Reserving & Valuation"], "products": ["Long-Term Care (LTC)"], "question_text": "Suggest reasons why the insurer is considering launching this type of product.", "scenario": "A health and care insurance company operates in a country in which the Solvency II regulatory regime applies. The company is considering entering the long-term care market by launching a non-linked, pre-funded, long-term care insurance (LTCI)\nproduct. No other insurer in the market currently offers pre-funded long-term care insurance.", "bullets": [{"section": "Solution", "text": "Possible reasons include: Insurer sees a market opportunity. [\u00bd]"}, {"section": "Solution", "text": "First mover/competitive advantage. [\u00bd]"}, {"section": "Solution", "text": "Increasing demand from customers because of ageing population. [\u00bd]"}, {"section": "Solution", "text": "Increasing demand from distributors on the insurer to provide innovative sales/products. [\u00bd]"}, {"section": "Solution", "text": "Increased need for such cover in the future due to increasing life expectancy but not increasing healthy life expectancy. [\u00bd]"}, {"section": "Solution", "text": "Policyholder need - concerns over Government future provision of basic LTC due to resource or political willingness. [\u00bd]"}, {"section": "Solution", "text": "Can plan for their long-term need. [\u00bd]"}, {"section": "Solution", "text": "And not be a burden on their family. [\u00bd]"}, {"section": "Solution", "text": "There may be Government incentives. [\u00bd]"}, {"section": "Solution", "text": "Changing tax rules for prefunded LTCI may increase its attraction to customers. [\u00bd]"}, {"section": "Solution", "text": "Increased sales as pre-funded cover cheaper than immediate needs policy. [\u00bd]"}, {"section": "Solution", "text": "Improve insurer\u2019s brand image. [\u00bd]"}, {"section": "Solution", "text": "Changing social circumstances \u2013 e.g. increasing number of older generations who are divorced or have no dependents to provide informal care. [\u00bd]"}, {"section": "Solution", "text": "Insurer may have experience in selling long-term care in other territories and can use this experience to launch a LTC in this country. [\u00bd]"}, {"section": "Solution", "text": "Insurer expects to sell more profitable business. [\u00bd]"}, {"section": "Solution", "text": "Alternatively, may be used as a loss leader. [\u00bd]"}, {"section": "Solution", "text": "May allow cross-selling of other products. [\u00bd]"}]}, {"id": "201909_Q1(iii)", "sitting": "September 2019", "yymmkey": "201909", "ref": "Q1(iii)", "marks": 13, "all_themes": ["Capital & Solvency", "Claims Management", "Data", "Group Products", "Investments", "Long-Term Care (LTC)", "Pricing", "Product Design", "Regulation", "Reinsurance", "Reserving & Valuation", "Risk Management & Capital", "Underwriting"], "products": ["Long-Term Care (LTC)", "Group Products"], "question_text": "Discuss aspects of each of the design factors below that the insurer would consider to ensure a successful launch of the new product in terms of adequate sales and profit margin:\n(a) Benefit structure.\n(b) Claim definitions.\n(c) Other key product design factors.", "scenario": "A health and care insurance company operates in a country in which the Solvency II regulatory regime applies. The company is considering entering the long-term care market by launching a non-linked, pre-funded, long-term care insurance (LTCI)\nproduct. No other insurer in the market currently offers pre-funded long-term care insurance.", "bullets": [{"section": "Solution", "text": "Benefit Structure The level and form of the benefits must meet the needs of customers. [1]"}, {"section": "Solution", "text": "Could be a lump sum [\u00bd]"}, {"section": "Solution", "text": "or regular income. [\u00bd]"}, {"section": "Solution", "text": "The term of the benefits \u2013 are they payable for the rest of the policyholder\u2019s life or for a fixed term e.g. 2 or 5 years. [\u00bd]"}, {"section": "Solution", "text": "The policy could cover the costs of care throughout the remainder of life, i.e. indemnify against long term care costs. [\u00bd]"}, {"section": "Solution", "text": "This would give rise to very uncertain benefits so the financial risk is large. [\u00bd]"}, {"section": "Solution", "text": "Providing fixed benefits or benefits that increase in line with an index removes the degree of benefit uncertainty and so financial risk is greatly reduced. [\u00bd]"}, {"section": "Solution", "text": "Fixed non-indemnity benefits are administratively simpler [\u00bd]"}, {"section": "Solution", "text": "But need to consider carefully any index used. [\u00bd]"}, {"section": "Solution", "text": "The level of benefit could depend on the level of disability; this could reduce the cost to the customer whilst still meeting their needs as they change [\u00bd]"}, {"section": "Solution", "text": "Although this might lead to increased complexity of definitions, misunderstanding of benefits and reduced sales. [\u00bd]"}, {"section": "Solution", "text": "Mis-selling risk if the benefits not sufficient to cover the actual cost of care. [\u00bd]"}, {"section": "Solution", "text": "Index benefits may be a compromise between the fixed benefits and indemnity benefits [\u00bd]"}, {"section": "Solution", "text": "\u2026. But choice of the index problematic as no one index captures the increase in costs [\u00bd]"}, {"section": "Solution", "text": "\u2026. main costs are salary related so a salary/earnings index may be suitable but accommodation costs which is another main cost could increase at a different rate. [\u00bd]"}, {"section": "Solution", "text": "Additional benefits may be payable such as death benefits or a surrender value. [\u00bd]"}, {"section": "Solution", "text": "Consider the use of limitations on benefits (e.g. caps/excesses/limits) etc to ensure cost of product is affordable [\u00bd]"}, {"section": "Solution", "text": "And profitable for the insurer. [\u00bd]"}, {"section": "Solution", "text": "Are benefits paid directly to the policyholder or the provider of care. [\u00bd]"}, {"section": "Solution", "text": "Benefits should be designed to integrate with state LTC provision to maximize value for money to customers and improve affordability. [\u00bd]"}, {"section": "Solution", "text": "Claim Definition The claims definition needs to be well defined to avoid unanticipated claims but enable policyholders who need care to meet the definition. [\u00bd]"}, {"section": "Solution", "text": "For example, the policyholder fails to meet a number of activities of daily living, [\u00bd]"}, {"section": "Solution", "text": "Such as, dressing, feeding, washing, mobility, transferring. [\u00bd]"}, {"section": "Solution", "text": "[Half mark awarded for one relevant example, maximum \u00bd mark] A mental impairment trigger may also be included. [\u00bd]"}, {"section": "Solution", "text": "The definition could be a \u2018single event\u2019 trigger [\u00bd]"}, {"section": "Solution", "text": "or an ongoing assessment definition, where policyholder meets the definition for a period of time. [\u00bd]"}, {"section": "Solution", "text": "The former is administratively simpler. [\u00bd]"}, {"section": "Solution", "text": "The latter is more complex but arguably better fits the customer\u2019s needs. [\u00bd]"}, {"section": "Solution", "text": "Increasing the number of activities to be failed or the severity of each of the tests will limit the number of claims [\u00bd]"}, {"section": "Solution", "text": "but may reduce the marketability of the policy. [\u00bd]"}, {"section": "Solution", "text": "If the product claim trigger also meets the State benefit trigger this may reduce the amount of benefit required under the policy as they would be receiving some benefit from the State as well and hence reduce the cost. [\u00bd]"}, {"section": "Solution", "text": "Other factors Premiums: how long will these be paid for. [\u00bd]"}, {"section": "Solution", "text": "Will they be level of increasing. [\u00bd]"}, {"section": "Solution", "text": "Will they be reviewable or guaranteed. [\u00bd]"}, {"section": "Solution", "text": "Underwriting: will the product be fully medically underwritten for each life. [\u00bd]"}, {"section": "Solution", "text": "Will evidence of health be required. [\u00bd]"}, {"section": "Solution", "text": "Shouldn\u2019t be too onerous to deter applicants but needs to be thorough. [\u00bd]"}, {"section": "Solution", "text": "Claims management which help insurer control future claim costs which keep prices down and so improves competitiveness, [\u00bd]"}, {"section": "Solution", "text": "\u2026. for example an assessment period, telephone helplines. [\u00bd]"}, {"section": "Solution", "text": "The product should be designed to achieve the desired profitability of the company. [\u00bd]"}, {"section": "Solution", "text": "Additional design features may improve marketability for example, addition of options and guarantees [\u00bd]"}, {"section": "Solution", "text": "\u2026\u2026 but not too onerous that the capital required significantly affects the company\u2019s financial position. [\u00bd]"}, {"section": "Solution", "text": "The product should be designed with the risk appetite of the company in mind [\u00bd]"}, {"section": "Solution", "text": "Balancing this with the marketability of the product. [\u00bd]"}, {"section": "Solution", "text": "Sources of data available to assess risks. [\u00bd]"}, {"section": "Solution", "text": "Consumer demand \u2013 check acceptable price levels. [\u00bd]"}, {"section": "Solution", "text": "Distribution \u2013 consider the most appropriate distribution channels; [\u00bd]"}, {"section": "Solution", "text": "Likely to be specialist healthcare brokers. [\u00bd]"}, {"section": "Solution", "text": "May need a new distribution network if the insurer does not currently use such distributors. [\u00bd]"}, {"section": "Solution", "text": "Complex product, policies can have large benefit amounts therefore require large remuneration to motivate sales. [1]"}, {"section": "Solution", "text": "May need training. [\u00bd]"}, {"section": "Solution", "text": "Consider documentation/sales literature etc required. [\u00bd]"}, {"section": "Solution", "text": "Consider any admin/systems changes required. [\u00bd]"}, {"section": "Solution", "text": "For example, underwriting, claims management, admin [\u00bd]"}, {"section": "Solution", "text": "[Half mark awarded for one relevant example, maximum \u00bd mark] Sales volumes \u2013 if too low, may not cover development costs or fixed expenses [1]"}, {"section": "Solution", "text": "If too high may cause new business strain [\u00bd]"}, {"section": "Solution", "text": "And require additional capital. [\u00bd]"}, {"section": "Solution", "text": "Consider the extent of any cross-subsidies between sexes etc. [\u00bd]"}, {"section": "Solution", "text": "Simple design helpful for marketing [\u00bd]"}, {"section": "Solution", "text": "So potential higher sales [\u00bd]"}, {"section": "Solution", "text": "And reduces the administration required [\u00bd]"}, {"section": "Solution", "text": "So lower costs. [\u00bd]"}, {"section": "Solution", "text": "Consider regulatory requirements on the product design e.g. UK benchmark set of claim definitions, reviewability of premiums and benefits. [\u00bd]"}, {"section": "Solution", "text": "Consider local tax rules to assess tax efficiency of the product. [\u00bd]"}, {"section": "Solution", "text": "Financing requirements - e.g. capital should be available to support initial set up cost. [\u00bd]"}, {"section": "Solution", "text": "And capital requirements [\u00bd]"}, {"section": "Solution", "text": "Without higher opportunity costs on other projects. [\u00bd]"}, {"section": "Solution", "text": "Sensitivity of profit [\u00bd]"}, {"section": "Solution", "text": "E.g. for changes in state benefit provisions, for a fast or slow sales volume launch, for tax or interest rate changes [half mark for one suitable example] [\u00bd]"}, {"section": "Solution", "text": "Need for and availability of reinsurance [\u00bd]"}, {"section": "Solution", "text": "And cost of reinsurance. [\u00bd]"}, {"section": "Solution", "text": "Consider investment strategy and availability of assets required. [\u00bd]"}, {"section": "Solution", "text": "Need to consider potential actions of competitors. [\u00bd]"}]}, {"id": "201909_Q1(iv)", "sitting": "September 2019", "yymmkey": "201909", "ref": "Q1(iv)", "marks": 6, "all_themes": ["Capital & Solvency", "Claims Management", "Data", "Long-Term Care (LTC)", "Pricing", "Regulation", "Reinsurance", "Reserving & Valuation", "Underwriting"], "products": ["Long-Term Care (LTC)"], "question_text": "The customer will pay regular premiums on the product. The product benefit is a fixed income that starts when the policyholder meets a specific set of claim definitions that qualifies them for long-term care.\nOutline the following risks that the company faces by launching this product for the first time:\n(a) Insurance risks.\n(b) Underwriting and sales risks.", "scenario": "A health and care insurance company operates in a country in which the Solvency II regulatory regime applies. The company is considering entering the long-term care market by launching a non-linked, pre-funded, long-term care insurance (LTCI)\nproduct. No other insurer in the market currently offers pre-funded long-term care insurance.", "bullets": [{"section": "Solution", "text": "Insurance Risk Lack of data to price the product accurately. [\u00bd]"}, {"section": "Solution", "text": "Longevity risk \u2013 claims last longer than expected. [\u00bd]"}, {"section": "Solution", "text": "Morbidity risk \u2013 greater number of claims than expected. [\u00bd]"}, {"section": "Solution", "text": "Aggregation/accumulation of claims e.g. too much exposure to cross subsidies on sex or postcode that are for more costly claims and lengthy claims. [\u00bd]"}, {"section": "Solution", "text": "Catastrophe risks from one-off events. [\u00bd]"}, {"section": "Solution", "text": "Claims may be more volatile than expected leading to a risk that provisions insufficient and risk of insolvency. [\u00bd]"}, {"section": "Solution", "text": "Persistency not as expected with early lapses before costs are covered [\u00bd]"}, {"section": "Solution", "text": "Or selective lapses leading to worse claims experience on the remaining block of business. [\u00bd]"}, {"section": "Solution", "text": "Development expenses greater than expected. [\u00bd]"}, {"section": "Solution", "text": "Policy expenses greater than expected. [\u00bd]"}, {"section": "Solution", "text": "If indemnity cover provided, costs may increase faster than projected. [\u00bd]"}, {"section": "Solution", "text": "Underwriting Risk The underwriting process is inadequate [\u00bd]"}, {"section": "Solution", "text": "resulting in inappropriate premiums charged for benefits. [\u00bd]"}, {"section": "Solution", "text": "Poor financial underwriting leading to over insurance. [\u00bd]"}, {"section": "Solution", "text": "Moral hazard \u2013 e.g. policyholders exaggerating symptoms or behaving differently knowing that an insurance policy can be claimed. [\u00bd]"}, {"section": "Solution", "text": "Anti-selection \u2013 policyholders take out a LTCI policy believing that their risk is greater than that allowed for in the premium rate. The policyholder makes use of information (their health) that is not favourable to the insurer. [\u00bd]"}, {"section": "Solution", "text": "Claims handling expenses are greater than expected e.g. because processes are inefficient. [\u00bd]"}, {"section": "Solution", "text": "Non-disclosure \u2013 where policyholder when asked for information does not disclose relevant information. [\u00bd]"}, {"section": "Solution", "text": "Sales Risk Sales remuneration structure leading to inappropriate sales/mis-selling. [\u00bd]"}, {"section": "Solution", "text": "Poor training of sales staff leading to mis-selling. [\u00bd]"}, {"section": "Solution", "text": "Insufficient sales volumes leading to fixed expenses are not being covered. [\u00bd]"}, {"section": "Solution", "text": "This may be caused by competitive pressures, prices or contract terms, poor servicing or poor underwriting (e.g. taking a long time to make a decision). [1]"}, {"section": "Solution", "text": "[Half mark awarded for any relevant example, maximum 1 mark] Sales volumes are too high resulting in too much new business stain risking insolvency. [\u00bd]"}, {"section": "Solution", "text": "If there are cross subsidies in the pricing basis a different business mix to that expected may lead to losses. [\u00bd]"}]}, {"id": "201909_Q1(v)", "sitting": "September 2019", "yymmkey": "201909", "ref": "Q1(v)", "marks": 3, "all_themes": ["Capital & Solvency", "Investments", "Long-Term Care (LTC)", "Pricing", "Product
