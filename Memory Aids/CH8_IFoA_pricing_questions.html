 and care insurers could be subsidised directly based on the level of risk they are accepting. The more risk accepted, the larger the subsidy. [\u00bd]"}, {"section": "Solution", "text": "Or tax incentives could be given to insurers. [\u00bd]"}, {"section": "Solution", "text": "Or regulatory easing could be granted to reduce capital requirements [\u00bd]"}, {"section": "Solution", "text": "The government may allow insurers to phase individual changes in gradually. [\u00bd]"}, {"section": "Solution", "text": "The government may offer to review the experience of insurers at a future point and re-think if the changes are causing insurers problems [\u00bd]"}, {"section": "Solution", "text": "Create insurance company backed by government to take the uninsurable/poor risks, subsidised by industry players [1]"}]}, {"id": "202104_Q1(vi)", "sitting": "April 2021", "yymmkey": "202104", "ref": "Q1(vi)", "marks": 14, "all_themes": ["Claims Management", "Data", "Pricing", "Pricing & Rating", "Private Medical Insurance (PMI)", "Product Design", "Regulation", "Reserving & Valuation", "Risk Management & Capital", "Underwriting"], "products": ["Private Medical Insurance (PMI)"], "question_text": "Option 3 would be for the government of Country A to set up its own not-for-profit health and care insurance company that would sell low-cost PMI with minimal underwriting requirements.\nDiscuss the factors that will need to be considered in determining the assumptions for statutory reserving and capital requirements for this insurance company.\n[Total 43]", "scenario": "Country A is a large, well-developed country. Medical services for citizens of Country A are generally provided through a range of modern, well-equipped private hospitals and medical practices.\nThe government of Country A pays for very limited medical services for its citizens and many citizens purchase Private Medical Insurance (PMI) to cover the costs of any medical treatment they need. Country A has a large number of private health and care insurance companies who provide PMI. PMI is generall", "bullets": [{"section": "Solution", "text": "Overall Setting assumptions for statutory reserving and capital requirements is likely to be challenging from outset for the government owned insurance company. [\u00bd]"}, {"section": "Solution", "text": "The insurance company has no previous experience on which to base its assumptions at outset [1]"}, {"section": "Solution", "text": "and it is likely to take a number of years before credible experience can be built up. [1]"}, {"section": "Solution", "text": "The actuarial control cycle should be used to regularly assess the assumptions made, and update these assumptions over time as the government insurer builds up its experience [1]"}, {"section": "Solution", "text": "Potentially the government insurer could end up writing a lot of new business due to its scale which could it allow it to build up credible data quickly. [\u00bd]"}, {"section": "Solution", "text": "In the early years of the government insurer there is likely to be some variation between the assumptions the insurer has made and experience. [\u00bd]"}, {"section": "Solution", "text": "There will be some selection from early-takers of the product who are more likely to perceive a benefit from cover and therefore more likely to claim (leading to worse experience initially). [\u00bd]"}, {"section": "Solution", "text": "It is unlikely that the insurer will want to change assumptions too often until it has built up credible experience as this could lead to significant changes in capital and / or reserves. [\u00bd]"}, {"section": "Solution", "text": "The assumptions required to set the reserving / capital requirements include: PMI claim inception rates PMI claim costs Expenses New business volumes New business mix [\u00bd mark for 2 relevant examples, Maximum 1 mark for 4 relevant examples] Data It may be possible to use any publicly available information on assumptions for other insurers selling private medical insurance in setting its assumptions [\u00bd]"}, {"section": "Solution", "text": "Although it may not be possible to access very up to date or accurate information from other insurers about their experience [\u00bd]"}, {"section": "Solution", "text": "It may be necessary to get some information from other insurers past statutory returns [\u00bd]"}, {"section": "Solution", "text": "Or other external sources such as from actuarial consultants [\u00bd]"}, {"section": "Solution", "text": "However it is not clear how relevant that other PMI insurers experience will be in setting the government insurers assumptions: [\u00bd]"}, {"section": "Solution", "text": "The information could be quite out of date [\u00bd]"}, {"section": "Solution", "text": "The products sold by the other companies are likely to be different. [\u00bd]"}, {"section": "Solution", "text": "The target market these companies sell to is potentially different [\u00bd]"}, {"section": "Solution", "text": "The basis on which these companies sell their products is different \u2013 e.g. other insurers require a full underwriting process before accepting a risk, whilst the government insurers PMI product does not [\u00bd]"}, {"section": "Solution", "text": "The scale of the government insurer may be significantly greater than many PMI insurers [\u00bd]"}, {"section": "Solution", "text": "which may make comparing certain assumptions very difficult such as expense levels [\u00bd]"}, {"section": "Solution", "text": "It may be possible to discuss assumption setting with external reinsurers. [\u00bd]"}, {"section": "Solution", "text": "Another possible source of data is the government, who may have collected data directly from hospitals. [\u00bd]"}, {"section": "Solution", "text": "The government may decide not to carry out certain functions (such as claims admin) internally, but could outsource these, and this would need to be considered in the assumptions. [\u00bd]"}, {"section": "Solution", "text": "Regulation may specify how certain assumptions are to be set or give a specific value (e.g. cost of capital). [\u00bd]"}, {"section": "Solution", "text": "It will not be possible to set IBNR reserves using statistical methods as there is no data. May need input from third party such as a reinsurer. [\u00bd]"}, {"section": "Solution", "text": "Expertise Does the government have sufficient expertise to set its own assumptions [\u00bd]"}, {"section": "Solution", "text": "If not, it will need to find and employ sufficient knowledgeable staff. [\u00bd]"}, {"section": "Solution", "text": "Underwriting Limited underwriting could mean the new insurance company could attract the poorer risks in the market which could not get cover at the other insurance companies [\u00bd]"}, {"section": "Solution", "text": "There is therefore scope for considerably more anti-selection for the government insurer than other insurers in the market. [\u00bd]"}, {"section": "Solution", "text": "Consistency with Pricing Assumptions How will the reserving assumptions compare to the pricing assumptions assumed by the government insurer. [\u00bd]"}, {"section": "Solution", "text": "Statutory returns The insurer will need to consider the basis on which any reserves should be calculated, when setting assumptions. [\u00bd]"}, {"section": "Solution", "text": "For example If statutory reserves are calculated on a prudential basis then allowance will need to be made for prudence in the assumptions [\u00bd]"}, {"section": "Solution", "text": "although care will be required to ensure there is not an excessive level of prudence. [\u00bd]"}, {"section": "Solution", "text": "If statutory reserves are calculated on a best estimate basis then it is likely to be challenging to determine a best estimate for each individual assumption from outset. [\u00bd]"}, {"section": "Solution", "text": "Capital Assumptions The government insurer will need to consider the basis on which capital is calculated. [\u00bd]"}, {"section": "Solution", "text": "For example, if capital is determined as a percentage of statutory liabilities there may be no additional explicit capital assumptions. [\u00bd]"}, {"section": "Solution", "text": "The insurer\u2019s capital calculation could use more sophisticated methods than a percentage of liabilities, meaning more data could be required in order to determine appropriate probability distributions for key risk drivers. [\u00bd]"}, {"section": "Solution", "text": "It may be assumptions may not be that important at outset \u2013 for example if there is a minimum monetary capital requirement. [\u00bd]"}, {"section": "Solution", "text": "However, if the government insurer writes a lot of new business then very quickly the insurers capital requirements could exceed any minimum, and the assumptions used in the capital calculation could become more important. [\u00bd]"}]}, {"id": "202104_Q2(i)", "sitting": "April 2021", "yymmkey": "202104", "ref": "Q2(i)", "marks": 10, "all_themes": ["Capital & Solvency", "Claims Management", "Critical Illness", "Data", "Pricing", "Pricing & Rating", "Regulation", "Reinsurance", "Reserving & Valuation", "Risk Management & Capital", "Underwriting"], "products": ["Critical Illness"], "question_text": "Outline the advantages and disadvantages of the Marketing Manager\u2019s proposal.", "scenario": "A large health and care insurance company operating in a developed country provides a range of Critical Illness (CI) products on both a stand-alone and accelerated basis.\nA new disease has recently swept across the country and the expectation is that 10% to 15% of the population will fall ill from the disease. In the majority of cases, the symptoms experienced by individuals are mild and recovery occurs within a week.\nHowever, hospitalisation is typically required in cases where individuals alre", "bullets": [{"section": "Solution", "text": "The criteria for a condition covered by CI insurance are: \u2022 the illness is perceived by the public to be serious and to occur frequently \u2022 that it can be defined clearly so that there is no ambiguity at time of claim \u2022 sufficient data is available to price the benefit. Advantages The disease meets some of the characteristics of a critical illness [\u00bd]"}, {"section": "Solution", "text": "For example, the disease is expected to have a high incidence rate [\u00bd]"}, {"section": "Solution", "text": "And the disease is serious in a minority of cases and may be feared out of proportion [\u00bd]"}, {"section": "Solution", "text": "The policy addition will be profitable if the insurer can charge more for the extra premiums than it will have to pay in extra claims. [\u00bd]"}, {"section": "Solution", "text": "This addition may be seen as adding value by potential customers [\u00bd]"}, {"section": "Solution", "text": "Which could increase new business [\u00bd]"}, {"section": "Solution", "text": "Potentially leading to increased profitability [\u00bd]"}, {"section": "Solution", "text": "And/or reduce lapses [\u00bd]"}, {"section": "Solution", "text": "Distributors may also welcome the addition [\u00bd]"}, {"section": "Solution", "text": "There could be a first mover advantage if the insurer is the first to offer the benefit [\u00bd]"}, {"section": "Solution", "text": "Or it may be required to offer the benefit if other insurers are doing so [\u00bd]"}, {"section": "Solution", "text": "As there appears to be an interaction with other health conditions, many policyholders who get the disease may claim anyway for another critical illness [\u00bd]"}, {"section": "Solution", "text": "So it may be possible to offer the benefit at a reasonable price [\u00bd]"}, {"section": "Solution", "text": "As the symptoms are mild in the majority of cases it may be possible to offer tiered benefits and reduce potential claims costs [\u00bd]"}, {"section": "Solution", "text": "As the insurer is large it may have available capital to support the development costs involved [\u00bd]"}, {"section": "Solution", "text": "And possible increases in solvency requirements [\u00bd]"}, {"section": "Solution", "text": "The company may be seen as innovative and boost its reputation. [\u00bd]"}, {"section": "Solution", "text": "Disadvantages As the experience is emerging, it will be difficult to price with a reasonable level certainty [\u00bd]"}, {"section": "Solution", "text": "The interaction of the new disease with other claims may be hard to estimate until much more experience has evolved (so there could be a more significant double counting issue). [\u00bd]"}, {"section": "Solution", "text": "There is potentially considerable uncertainty on claim inception rates and mortality experience from adding the new disease [\u00bd]"}, {"section": "Solution", "text": "which means it is difficult to set reserves / capital for the companies CI business [\u00bd]"}, {"section": "Solution", "text": "It may be difficult to define when to pay a claim [\u00bd]"}, {"section": "Solution", "text": "Possible definitions include being payable on diagnosis, on hospitalisation, on receiving certain treatments [\u00bd]"}, {"section": "Solution", "text": "Need for a waiting period to know if already have the disease but without symptoms [\u00bd]"}, {"section": "Solution", "text": "The insurer would need to consider what verification will be required to provide evidence for the claims that are made on the critical illness side, [\u00bd]"}, {"section": "Solution", "text": "If 10-15% of policyholders may claim, it will be important to have clear wording to avoid high volumes of claims being made that may be declined as the disease was not serious enough. [\u00bd]"}, {"section": "Solution", "text": "Non-payment of claims may lead to reputational issues [\u00bd]"}, {"section": "Solution", "text": "And litigation costs/regulatory fines [\u00bd]"}, {"section": "Solution", "text": "There will be systems and policy literature changes, [\u00bd]"}, {"section": "Solution", "text": "Along with staff training (particularly around underwriting) required which will have a cost for the insurer. [\u00bd]"}, {"section": "Solution", "text": "If there is a large increase in new business this may lead to pressure on admin systems etc though potentially less of an issue as the insurer is large [\u00bd]"}, {"section": "Solution", "text": "Business mix risk as some in society at more risk than others of contracting infection [\u00bd]"}, {"section": "Solution", "text": "There is the potential that the benefit might prove expensive given the expected incidence [\u00bd]"}, {"section": "Solution", "text": "In many cases, the disease is not serious, and it is not clear that the disease results in a real customer need for financial support [\u00bd]"}, {"section": "Solution", "text": "In these cases, there is the potential for windfall payments for policyholders if the claims definition is too lax [\u00bd]"}, {"section": "Solution", "text": "There is a potential for lapse and re-entry if the benefit is not extended to existing policyholders [\u00bd]"}, {"section": "Solution", "text": "May need to hold extra capital as the disease is new and claims experience may be underestimated or volatile [\u00bd]"}, {"section": "Solution", "text": "May need increased capital to meet increased solvency requirements [\u00bd]"}, {"section": "Solution", "text": "It may be difficult to get reinsurance [\u00bd]"}, {"section": "Solution", "text": "Or reinsurance premiums may be high [\u00bd]"}, {"section": "Solution", "text": "If the insurer has a reinsurance treaty then it will need to discuss the addition of the disease with the reinsurer. [\u00bd]"}, {"section": "Solution", "text": "There is no guarantee that the reinsurer will allow the addition of the disease to any existing treaty [\u00bd]"}, {"section": "Solution", "text": "so all claims from new disease may fall on the insurer. [\u00bd]"}, {"section": "Solution", "text": "There may be additional requirements from the regulator which may be onerous [\u00bd]"}, {"section": "Solution", "text": "If an individual has already had this disease, would they want/need it to be covered (ie can you get it multiple times?). If not it might deter some applicants if the premiums are high for cover they don\u2019t require [\u00bd]"}, {"section": "Solution", "text": "Ultimately the insurer may need to increase premium rates in respect of the new disease. [\u00bd]"}, {"section": "Solution", "text": "This could put off potential new customers from buying the company\u2019s CI products [\u00bd]"}, {"section": "Solution", "text": "And put the insurer at a competitive disadvantage if consumers don\u2019t value the addition of the new disease. [\u00bd]"}, {"section": "Solution", "text": "Underwriting may be complex given disease interactions. May need to introduce new underwriting factors (e.g., Employment sector). [\u00bd]"}, {"section": "Solution", "text": "The disease is new and as such, the risk is not yet fully understood, including lasting prevalence. [\u00bd]"}, {"section": "Solution", "text": "Would the need for the product remain high after the initial novelty of the disease, causing a need for the expenses to be front loaded to avoid lapse risk [\u00bd]"}]}, {"id": "202104_Q2(ii)", "sitting": "April 2021", "yymmkey": "202104", "ref": "Q2(ii)", "marks": 11, "all_themes": ["Capital & Solvency", "Claims Management", "Critical Illness", "Data", "Investments", "Pricing", "Pricing & Rating", "Regulation", "Reinsurance", "Reserving & Valuation", "Risk Management & Capital", "Underwriting"], "products": ["Critical Illness"], "question_text": "Describe how the disease could impact the pricing assumptions for the company\u2019s CI products.\n[Total 21]\n\u20134", "scenario": "A large health and care insurance company operating in a developed country provides a range of Critical Illness (CI) products on both a stand-alone and accelerated basis.\nA new disease has recently swept across the country and the expectation is that 10% to 15% of the population will fall ill from the disease. In the majority of cases, the symptoms experienced by individuals are mild and recovery occurs within a week.\nHowever, hospitalisation is typically required in cases where individuals alre", "bullets": [{"section": "Solution", "text": "Data Consider the data available [\u00bd]"}, {"section": "Solution", "text": "whether reinsurer data is available [\u00bd]"}, {"section": "Solution", "text": "Or whether medical studies can be used as a proxy [\u00bd]"}, {"section": "Solution", "text": "Consider how data will need to be adjusted given the specific claims definition used [\u00bd]"}, {"section": "Solution", "text": "If there is a lack of data, the pricing assumptions may include a level of prudence [\u00bd]"}, {"section": "Solution", "text": "Demographic rates (mortality, morbidity, lapse) Is there a bias between the population and the insured lives? If insured lives are generally healthier than the population and be expected to be less severely impacted by the disease, the impact on pricing assumptions will be less than for the population as a whole [\u00bd]"}, {"section": "Solution", "text": "However, depending on the level of anti-selection the impact could be larger than in the general population [\u00bd]"}, {"section": "Solution", "text": "What is the prevalence of serious underlying medical conditions in the book? If this has been reduced due to underwriting, then the impact to pricing assumptions will be less [\u00bd]"}, {"section": "Solution", "text": "Morbidity Consider how the prevalence of the disease is related to various risk factors [\u00bd]"}, {"section": "Solution", "text": "Such as age, gender [\u00bd]"}, {"section": "Solution", "text": "Consider the co-morbidities between the disease and other conditions covered under the policy [\u00bd]"}, {"section": "Solution", "text": "If offered under a tiered structure, consider transition probabilities between levels [\u00bd]"}, {"section": "Solution", "text": "Given that this is a new disease and there is significant uncertainty, consider what level of margin may be needed [\u00bd]"}, {"section": "Solution", "text": "Need to consider possible future trends in diagnosis [\u00bd]"}, {"section": "Solution", "text": "And treatment (for accelerated business) [\u00bd]"}, {"section": "Solution", "text": "And the development of effective vaccinations, if the disease is infectious [\u00bd]"}, {"section": "Solution", "text": "This disease may accelerate some claims that would be paid anyway if individuals are seriously ill. [\u00bd]"}, {"section": "Solution", "text": "Similarly, it may not have a significant impact if those who are seriously ill have already made a CI claim for the existing illness (e.g. heart attack). [\u00bd]"}, {"section": "Solution", "text": "The claim definition (severity of) will impact rates [\u00bd]"}, {"section": "Solution", "text": "Mortality Mortality rates may need to be considered for both SACI and accelerated business. [\u00bd]"}, {"section": "Solution", "text": "In the case of SACI, if the disease causes fatality within the survival period, the impact to pricing assumptions will be lower than otherwise. [\u00bd]"}, {"section": "Solution", "text": "Lapse Lapse rates: could decline if added to existing business, [\u00bd]"}, {"section": "Solution", "text": "If not there may be lapse and re-entry concerns. [\u00bd]"}, {"section": "Solution", "text": "Lapse rates for new business could differ compared to the existing book (potentially lower if the benefit is valued [\u00bd]"}, {"section": "Solution", "text": "Or higher if the introduction of the benefit is costly) [\u00bd]"}, {"section": "Solution", "text": "Discount rates and investment returns Investment returns: if the spread of the disease outbreak has wider economic implications, investment returns will need to be revisited. [\u00bd]"}, {"section": "Solution", "text": "May need to add in margins given the uncertainty involved [\u00bd]"}, {"section": "Solution", "text": "The discount rate may be informed by the long term expected return on assets [\u00bd]"}, {"section": "Solution", "text": "The cost of capital may increase as with increase uncertainty and margins, the reserves will increase. [\u00bd]"}, {"section": "Solution", "text": "Expenses Expenses: Likely to increase as there will be product development [\u00bd]"}, {"section": "Solution", "text": "And marketing expenses associated. [\u00bd]"}, {"section": "Solution", "text": "Claims expenses may be linked to the number of claims submitted and may depend on the amount of claims underwriting required. [\u00bd]"}, {"section": "Solution", "text": "Expense inflation may not be impacted [\u00bd]"}, {"section": "Solution", "text": "Business impacts It is likely that the expected incidence for this disease will be calculated and, if the disease is expected to be a significant contributor to cost then the incidence rate will be combined with the incidence rates for the other major conditions in order to derive the global incidence rate. [\u00bd]"}, {"section": "Solution", "text": "Alternatively, if the cost is not significant or it is not possible to find reliable data, it may be added as a proportionate cost to product. [\u00bd]"}, {"section": "Solution", "text": "New business volume: likely to increase if the benefit is seen as valuable [\u00bd]"}, {"section": "Solution", "text": "Potentially reducing expenses per policy [\u00bd]"}, {"section": "Solution", "text": "New business mix might also change depending on whether the disease coverage appeals to specific categories. [\u00bd]"}, {"section": "Solution", "text": "Consider any regulatory requirements (e.g. may not be able to use gender if the disease only impacts say men) [\u00bd]"}, {"section": "Solution", "text": "Profitability of the existing products could influence the impact to pricing assumptions. [\u00bd]"}, {"section": "Solution", "text": "If the existing product is priced on best estimate terms, then adding the disease may have a more noticeable impact on pricing assumptions. [\u00bd]"}, {"section": "Solution", "text": "If the existing product is priced on prudent terms, then adding the disease may not increase pricing greatly but work to reduce the prudence margin. [\u00bd]"}, {"section": "Solution", "text": "This may be done by the business to increase sales, as a means to retain profits if prudence in pricing is reduced. [\u00bd]"}, {"section": "Solution", "text": "The demographic assumptions may be set by the re-insurer depending on the reinsurance arrangement, leaving only non-demographic assumptions to be considered. [\u00bd]"}, {"section": "Solution", "text": "Pricing assumptions may only be impacted for the demographic affected (say over 50s) [\u00bd]"}, {"section": "Solution", "text": "But if pricing is undertaken on community terms, then all ages would have an increase as the cost is spread across the book. [\u00bd]"}, {"section": "Solution", "text": "Will need to consider the impact on reserves / capital requirements within pricing [\u00bd]"}, {"section": "Solution", "text": "Will need to consider the impact on reinsurance assumptions [\u00bd]"}, {"section": "Solution", "text": "Reviewability of premium rates may impact need for / extent of margins. [\u00bd]"}]}, {"id": "202104_Q3(i)", "sitting": "April 2021", "yymmkey": "202104", "ref": "Q3(i)", "marks": 4, "all_themes": ["Capital & Solvency", "Data", "Long-Term Care (LTC)", "Pricing", "Pricing & Rating", "Product Design", "Regulation", "Reserving & Valuation", "Risk Management & Capital"], "products": ["Long-Term Care (LTC)"], "question_text": "Discuss the advantages and disadvantages for consumers in Country B of Company Z\u2019s domination of the pre-funded LTCI market.", "scenario": "In Country B, a small, well-developed country, both state and private healthcare providers are available. A small number of insurers provide long-term care products that are offered on a pre-funded basis. One health and care insurance company, Company Z, dominates the market for pre-funded Long-Term Care Insurance (LTCI)\nproducts. The primary product it offers provides benefits on an indemnity basis in return for annual premiums payable until care is required.", "bullets": [{"section": "Solution", "text": "Disadvantages Pricing may not be competitive [\u00bd]"}, {"section": "Solution", "text": "The lack of competition might reduce product innovation [\u00bd]"}, {"section": "Solution", "text": "If the product design does not meet customer needs, there will be little incentive to change. [\u00bd]"}, {"section": "Solution", "text": "Customers may not have an alternative if premium rates are increased substantially [\u00bd]"}, {"section": "Solution", "text": "Customer service may be poor and there may not be an option for policyholders to choose another provider to avoid this [\u00bd]"}, {"section": "Solution", "text": "If a customer was declined cover, they may struggle to find alternative provision [\u00bd]"}, {"section": "Solution", "text": "Because the pre-funded market is dominated by the insurer, it may be more disadvantageous for customers as they will only be able to compare to immediate needs products [\u00bd]"}, {"section": "Solution", "text": "Over concentration of business in one company could be a problem for consumers if company Z got into financial or operational difficulties [\u00bd]"}, {"section": "Solution", "text": "If there are concerns with the solvency of the company, consumers may not have an alternative [\u00bd]"}, {"section": "Solution", "text": "In the event of a solvency crisis it is not clear whether other insurers in the market would be able to take over existing liabilities and consumers may lose benefits [\u00bd]"}, {"section": "Solution", "text": "Advantages Data is concentrated with one insurer and this may allow for better pricing and risk management [\u00bd]"}, {"section": "Solution", "text": "Z may have the most specialist knowledge and expertise as it\u2019s the market leader [\u00bd]"}, {"section": "Solution", "text": "which means it could offer the best LTCI product features and customer servicing [\u00bd]"}, {"section": "Solution", "text": "If one insurer is the best then consumer does not need to go through a time consuming process of comparing different insurer\u2019s products before buying LTCI product. [\u00bd]"}, {"section": "Solution", "text": "The insurer will be experienced in administering policies and claim handling so may deliver a good customer experience [\u00bd]"}, {"section": "Solution", "text": "Economies of scale for the insurer could lead to lower premiums for customers [\u00bd]"}, {"section": "Solution", "text": "The insurer may have the market power to negotiate better rates with healthcare facilities leading to lower costs than if the customer had to self-finance care [\u00bd]"}, {"section": "Solution", "text": "The regulator may be focused on the insurer given its market dominance, this should give customers a level of comfort that the company has adequate reserves [\u00bd]"}]}, {"id": "202104_Q3(ii)", "sitting": "April 2021", "yymmkey": "202104", "ref": "Q3(ii)", "marks": 10, "all_themes": ["Capital & Solvency", "Claims Management", "Data", "Group Products", "Investments", "Long-Term Care (LTC)", "Pricing", "Pricing & Rating", "Reserving & Valuation"], "products": ["Long-Term Care (LTC)", "Group Products"], "question_text": "Company Z is currently conducting an experience analysis in order to review the premium rates of its pre-funded LTCI product.\nDescribe the investigations the actuarial team should perform to understand the product performance.", "scenario": "In Country B, a small, well-developed country, both state and private healthcare providers are available. A small number of insurers provide long-term care products that are offered on a pre-funded basis. One health and care insurance company, Company Z, dominates the market for pre-funded Long-Term Care Insurance (LTCI)\nproducts. The primary product it offers provides benefits on an indemnity basis in return for annual premiums payable until care is required.", "bullets": [{"section": "Solution", "text": "Geographical variation Data could be analysed by region to understand whether the cost of care varies depending on location [\u00bd]"}, {"section": "Solution", "text": "And whether exposure is concentrated in specific locations [\u00bd]"}, {"section": "Solution", "text": "This may be because if the distribution of state and private facilities [\u00bd]"}, {"section": "Solution", "text": "But as County B is small, it may not be material [\u00bd]"}, {"section": "Solution", "text": "Mortality and morbidity experience This insurer will need to review: Morbidity incidence rates [\u00bd]"}, {"section": "Solution", "text": "Cost of care [\u00bd]"}, {"section": "Solution", "text": "Average claim amounts will be important as the product is indemnity based [\u00bd]"}, {"section": "Solution", "text": "And claims inflation [\u00bd]"}, {"section": "Solution", "text": "And the cost of claims will need to be investigated as this will be important for assessing the claims reserves required [\u00bd]"}, {"section": "Solution", "text": "Impaired mortality rates [\u00bd]"}, {"section": "Solution", "text": "Mortality rates pre-claim [\u00bd]"}, {"section": "Solution", "text": "Estimation of future trends will be required [\u00bd]"}, {"section": "Solution", "text": "Given that Country B is a well-developed country, it is likely that mortality rates have been improving [\u00bd]"}, {"section": "Solution", "text": "In the context of pre-funded long term care, this translates to both a larger proportion of lives reaching an age where they are likely to need care [\u00bd]"}, {"section": "Solution", "text": "And a likely reduction in impaired life mortality. [\u00bd]"}, {"section": "Solution", "text": "Recovery rates might be reviewed but likely to be immaterial and this data may not be recorded. [\u00bd]"}, {"section": "Solution", "text": "The insurer will need to investigate lapse experience [\u00bd]"}, {"section": "Solution", "text": "By factors such as: \u2022 duration in force [\u00bd]"}, {"section": "Solution", "text": "premium payment method [\u00bd]"}, {"section": "Solution", "text": "premium size [\u00bd]"}, {"section": "Solution", "text": "[\u00bd mark for relevant factors, Maximum 1 mark] This could affect the profile of the underlying book of business if healthier lives lapse [\u00bd]"}, {"section": "Solution", "text": "Early lapses will affect the ability to cover acquisition expenses [\u00bd]"}, {"section": "Solution", "text": "The insurer will need to analyse expenses [\u00bd]"}, {"section": "Solution", "text": "This will need to be divided by acquisition expenses, policy administration expenses pre- claim, claim assessment expenses, claims management expenses [1]"}, {"section": "Solution", "text": "Consider if one-off expenses would be excluded [\u00bd]"}, {"section": "Solution", "text": "Expense inflation would also be investigated [\u00bd]"}, {"section": "Solution", "text": "The insurer will want to understand how the underlying business mix has evolving over time [\u00bd]"}, {"section": "Solution", "text": "For example, the profile of new business [\u00bd]"}, {"section": "Solution", "text": "And the volumes of new business [\u00bd]"}, {"section": "Solution", "text": "And the profile of lapses [\u00bd]"}, {"section": "Solution", "text": "And how these deviate from the expected business mix [\u00bd]"}, {"section": "Solution", "text": "The insurer will also review the investment income [\u00bd]"}, {"section": "Solution", "text": "The insurer will need to divide data into homogenous groups [\u00bd]"}, {"section": "Solution", "text": "As the country is small, there may not be a large long-term care market so there may be limited data available [\u00bd]"}, {"section": "Solution", "text": "But as the insurer is dominant in this product category, it may have higher volumes of data allowing it to analyse the data in detail [\u00bd]"}, {"section": "Solution", "text": "The insurer will want to understand the experience by categories including age, gender, occupation, smoker status and region. [\u00bd]"}, {"section": "Solution", "text": "Morbidity incidence and average claim cost will be estimated based on the sub-division of data [\u00bd]"}, {"section": "Solution", "text": "Data on the exposed to risk will also be required along with claims/lapses [\u00bd]"}, {"section": "Solution", "text": "Other data sources that could be used for comparison include Reinsurer data [\u00bd]"}, {"section": "Solution", "text": "Market data [\u00bd]"}, {"section": "Solution", "text": "Population data etc. [\u00bd]"}, {"section": "Solution", "text": "These data would need to be adjusted to ensure relevant to this insurer/product [\u00bd]"}, {"section": "Solution", "text": "For all factors, the actual experience should be compared with the pricing assumptions and any reasons for a difference identified [\u00bd]"}]}, {"id": "202104_Q3(iii)", "sitting": "April 2021", "yymmkey": "202104", "ref": "Q3(iii)", "marks": 10, "all_themes": ["Capital & Solvency", "Claims Management", "Data", "Investments", "Long-Term Care (LTC)", "Models", "Pricing", "Pricing & Rating", "Product Design", "Regulation", "Reinsurance", "Underwriting"], "products": ["Long-Term Care (LTC)"], "question_text": "The review suggests a substantial increase in the premium rates will be required.\nDescribe the factors that could have caused the experience to change over time.", "scenario": "In Country B, a small, well-developed country, both state and private healthcare providers are available. A small number of insurers provide long-term care products that are offered on a pre-funded basis. One health and care insurance company, Company Z, dominates the market for pre-funded Long-Term Care Insurance (LTCI)\nproducts. The primary product it offers provides benefits on an indemnity basis in return for annual premiums payable until care is required.", "bullets": [{"section": "Solution", "text": "Sources of risk Rates Mortality Life expectancy could have improved for a certain condition, meaning people are in care for longer [\u00bd]"}, {"section": "Solution", "text": "Morbidity There may be changes to policyholder behaviour which impact the propensity to claim and this may impact incidence/termination rates [\u00bd]"}, {"section": "Solution", "text": "Claims eligibility could have weakened [\u00bd]"}, {"section": "Solution", "text": "e.g. due to changes to the medical definitions used for functional test like ADLs [\u00bd]"}, {"section": "Solution", "text": "Claims amounts Treatment protocols may have changed which could change claim amounts [\u00bd]"}, {"section": "Solution", "text": "Cultural factors may change provision of care, for example from in-home care, to care homes [\u00bd]"}, {"section": "Solution", "text": "e.g. indemnity policy claim amounts increase [\u00bd]"}, {"section": "Solution", "text": "Ongoing long term care claims may be increasing [\u00bd]"}, {"section": "Solution", "text": "e.g. increase in staff care salary costs [\u00bd]"}, {"section": "Solution", "text": "Investment The cost of pre-funded LTC will in part be funded by investment returns, lower return experience would require an increase in premiums [\u00bd]"}, {"section": "Solution", "text": "There may have been changes in investment strategy, economic effects such as recession [\u00bd]"}, {"section": "Solution", "text": "Selection The underwriting policy may have weakened [\u00bd]"}, {"section": "Solution", "text": "e.g. to keep up with competitors or distributors needs [\u00bd]"}, {"section": "Solution", "text": "There may be anti-selection risk [\u00bd]"}, {"section": "Solution", "text": "e.g. genomics testing to highlight conditions that will require care later in life without need for disclosure [\u00bd]"}, {"section": "Solution", "text": "Competition Competitors may have launched new immediate care offerings which might lead to healthier lives delaying purchase [\u00bd]"}, {"section": "Solution", "text": "Inflation Medical inflation changes could be higher than expected costs [\u00bd]"}, {"section": "Solution", "text": "Persistency Increase in the number of people requesting a return of premium before the eligible period to claim e.g. reduced spread of expenses. [\u00bd]"}, {"section": "Solution", "text": "Options & Guarantees Guaranteed return of premiums on death may have been much higher than expected [\u00bd]"}, {"section": "Solution", "text": "New Business Volumes may be lower than expected, so increase represents increase in expense loading [\u00bd]"}, {"section": "Solution", "text": "The source of new business may be more risky than was expected [\u00bd]"}, {"section": "Solution", "text": "Changes to the cost of private healthcare may lead to change in the number of people taking out LTC [\u00bd]"}, {"section": "Solution", "text": "Data The company may have limited data and, as it builds experience, expectations may change [\u00bd]"}, {"section": "Solution", "text": "e.g. the premiums could have been set too low initially [\u00bd]"}, {"section": "Solution", "text": "Expenses Expense claims could exceed expectation [\u00bd]"}, {"section": "Solution", "text": "Reinsurance Reinsurer could have adjusted rates upwards [\u00bd]"}, {"section": "Solution", "text": "Actions of management Management may have set the rates as a loss leader to develop the business initially. [\u00bd]"}, {"section": "Solution", "text": "Non-disclosure Policyholders may not disclose smoker status or lifestyle factors correctly [\u00bd]"}, {"section": "Solution", "text": "Internal audit and systems failures There may have been errors in the previous pricing exercise [\u00bd]"}, {"section": "Solution", "text": "e.g. errors in models not caught through review process [\u00bd]"}, {"section": "Solution", "text": "Counterparty risks The distribution model may have changed to a different profile of customer [\u00bd]"}, {"section": "Solution", "text": "e.g. selling to lower socio-economic area with poorer health outcomes [\u00bd]"}, {"section": "Solution", "text": "Care providers may have changed [\u00bd]"}, {"section": "Solution", "text": "Provider negotiated fee schedules may have changed [\u00bd]"}, {"section": "Solution", "text": "Claims management may have weakened e.g. outsourced company did not uphold standards [\u00bd]"}, {"section": "Solution", "text": "State benefits Reduction to state health care may have led to changes in the cost of claims [\u00bd]"}, {"section": "Solution", "text": "e.g. increase in means testing or reduction of state entitlement asset threshold [\u00bd]"}, {"section": "Solution", "text": "Or the percentage of state and in-home care provision could have reduced [\u00bd]"}, {"section": "Solution", "text": "Regulatory / Fiscal development Legal challenges could have given rise to extra claims that were not expected [\u00bd]"}, {"section": "Solution", "text": "e.g. previously disputed claims may now be allowed, with back dated payments [\u00bd]"}, {"section": "Solution", "text": "The costs of complying with regulation may have increased [\u00bd]"}, {"section": "Solution", "text": "Early screening / diagnosis There may have been the introduction of screening programmes [\u00bd]"}, {"section": "Solution", "text": "Changes in early diagnosis which could bring forward claims [\u00bd]"}, {"section": "Solution", "text": "Reputational risks Poor publicity could mean that claims have had to be approved even though not priced for in the rates [\u00bd]"}]}, {"id": "202104_Q3(iv)", "sitting": "April 2021", "yymmkey": "202104", "ref": "Q3(iv)", "marks": 12, "all_themes": ["Capital & Solvency", "Claims Management", "Data", "Group Products", "Long-Term Care (LTC)", "Pricing", "Pricing & Rating", "Product Design", "Regulation", "Risk Management & Capital"], "products": ["Long-Term Care (LTC)", "Group Products"], "question_text": "Company Z is concerned that the increase in LTCI premium rates will adversely impact its reputation and has proposed amending the product structure as an alternative. Two possible amendments have been suggested:\nOption A:\nIntroduce deductibles and co-insurance payments if private care is selected over state facilities.\nOption B:\nDiscontinue stand-alone long-term care and, instead, offer a life insurance product with long-term care benefits offered on an accelerated basis. Long-term care benefits claimed would reduce the life insurance sum assured and would only be paid up to the value of the life policy.\nDiscuss, for each of the options above, the advantages and disadvantages from the perspective of:\n(a) Company Z.\n(b) the policyholder.\n(c) healthcare providers in Country B.\n[Total 36]\nEND OF PAPER", "scenario": "In Country B, a small, well-developed country, both state and private healthcare providers are available. A small number of insurers provide long-term care products that are offered on a pre-funded basis. One health and care insurance company, Company Z, dominates the market for pre-funded Long-Term Care Insurance (LTCI)\nproducts. The primary product it offers provides benefits on an indemnity basis in return for annual premiums payable until care is required.", "bullets": [{"section": "Solution", "text": "OPTION A: Need to consider if the amendments will apply to new business only [\u00bd]"}, {"section": "Solution", "text": "There may be issues with TCF if changes are applied to all business [\u00bd]"}, {"section": "Solution", "text": "This will limit the effectiveness of the changes applied [\u00bd]"}, {"section": "Solution", "text": "Compared to an increase in premium which (if premium rates are reviewable) can be applied across the book [\u00bd]"}, {"section": "Solution", "text": "Company XYZ Advantages This should reduce the cost of claims where private care is selected [\u00bd]"}, {"section": "Solution", "text": "This change to the design of the product may be relatively simple to implement and easy for staff, distributors and customers to understand [\u00bd]"}, {"section": "Solution", "text": "Competitors may offer this structure and so this will be in line with the market [\u00bd]"}, {"section": "Solution", "text": "There may be a reduction in moral hazard [\u00bd]"}, {"section": "Solution", "text": "Disadvantages Depending on the reputation of state care, this may impact the reputation of Company XYZ [\u00bd]"}, {"section": "Solution", "text": "If there are long waiting lists for state care may mean that customers perceive this as unfair [\u00bd]"}, {"section": "Solution", "text": "There may be future changes to state care provision and the insurer will be more exposed to this risk [\u00bd]"}, {"section": "Solution", "text": "If the change applies across the book, policyholders may lapse [\u00bd]"}, {"section": "Solution", "text": "Operational cost of setting up and managing product structure. [\u00bd]"}, {"section": "Solution", "text": "Policyholders Advantages This may be preferable compared to a premium rate increase [\u00bd]"}, {"section": "Solution", "text": "Especially if the benefit changes do not affect current policyholders [\u00bd]"}, {"section": "Solution", "text": "The reduced level of cover may make the product more affordable for some customers [\u00bd]"}, {"section": "Solution", "text": "Disadvantages Policyholders will have additional payments if they select private care [\u00bd]"}, {"section": "Solution", "text": "There may be insufficient state capacity which may disadvantage policyholders [\u00bd]"}, {"section": "Solution", "text": "A lack of competition means that policyholders may not have alternative options [\u00bd]"}, {"section": "Solution", "text": "If it impacts new business levels, premium increases may be inevitable if premiums are reviewable [\u00bd]"}, {"section": "Solution", "text": "State care may be of lower quality. [\u00bd]"}, {"section": "Solution", "text": "The product will no longer offer full indemnity cover and therefore may not meet the needs of the customer. [\u00bd]"}, {"section": "Solution", "text": "Although the policyholder may be able to meet the premiums payments, once in care they may struggle to meet the cost of the deductible/excess [\u00bd]"}, {"section": "Solution", "text": "Providers Advantages There may be less pressure to negotiate lower fee schedules [\u00bd]"}, {"section": "Solution", "text": "There may be little change if providers service both state and private markets. [\u00bd]"}, {"section": "Solution", "text": "Disadvantages May face a loss of business if they relied on LTC customers [\u00bd]"}, {"section": "Solution", "text": "May increase administration if co-payments need to be collected / managed by the provider [\u00bd]"}, {"section": "Solution", "text": "A smaller market may result in aggressive competition [\u00bd]"}, {"section": "Solution", "text": "There may be a change in the mix of State and private provision. [\u00bd]"}, {"section": "Solution", "text": "Some customers may prefer State provision if they are unable to meet the cost of the excess, leading to lower demand for private providers. [\u00bd]"}, {"section": "Solution", "text": "OPTION B:"}, {"section": "Solution", "text": "Company XYZ Advantages If current claims are capped, this may be simple to introduce administratively [\u00bd]"}, {"section": "Solution", "text": "May attract a broader market [\u00bd]"}, {"section": "Solution", "text": "Which could increase sales and profitability [\u00bd]"}, {"section": "Solution", "text": "It may allow for a premium increase to be matched with a benefit increase [\u00bd]"}, {"section": "Solution", "text": "Reduces uncertainty relating to future claim payouts. [\u00bd]"}, {"section": "Solution", "text": "The capped risk element of claims, moving away from the indemnity style product, may allow the insurer to reduce its capital requirements overall. [\u00bd]"}, {"section": "Solution", "text": "Disadvantages May have no experience with life insurance [\u00bd]"}, {"section": "Solution", "text": "May have additional licensing requirements which may be expensive [\u00bd]"}, {"section": "Solution", "text": "This is unlikely to resolve the premium rate issue [\u00bd]"}, {"section": "Solution", "text": "May be significant administrative requirements [\u00bd]"}, {"section": "Solution", "text": "Product complexity may make it difficult to explain / additional selling expenses (training, distributor commission) [\u00bd]"}, {"section": "Solution", "text": "There will be policies that, at the moment, receive no benefit from cover as no care is required before death, all these policies will become claims under the new product. [\u00bd]"}, {"section": "Solution", "text": "This will lead to higher claims administration costs. [\u00bd]"}, {"section": "Solution", "text": "The insurer may lack the data to price this version of the product as the target market for the current product may differ given it meets a different customer need. [\u00bd]"}, {"section": "Solution", "text": "Policyholders Advantages Unlikely to apply to existing policyholders so no impact on existing policyholders [\u00bd]"}, {"section": "Solution", "text": "This may be an innovative benefit which is new to the market [\u00bd]"}, {"section": "Solution", "text": "Which may prove attractive [\u00bd]"}, {"section": "Solution", "text": "Policyholders may find the \u2018guaranteed\u2019 benefit element of the product attractive. [\u00bd]"}, {"section": "Solution", "text": "Disadvantages Overall amount payable is capped so there may be insufficient money to pay for LTC required. [\u00bd]"}, {"section": "Solution", "text": "Policyholders will have to pay for life insurance [\u00bd]"}, {"section": "Solution", "text": "Which they may not want [\u00bd]"}, {"section": "Solution", "text": "Policyholders may be concerned about the benefits not paying for all care costs. They may be uncertain about what happens if this occurs, e.g. do they have to move facilities? [\u00bd]"}, {"section": "Solution", "text": "There is also the risk that this happens earlier than expected if cost of care inflation is higher than expected [\u00bd]"}, {"section": "Solution", "text": "Providers Advantages There may be limited change which providers may welcome [\u00bd]"}, {"section": "Solution", "text": "If this increases the market, this will likely be viewed positively by providers [\u00bd]"}, {"section": "Solution", "text": "Disadvantages Providers may be uncertain about what happens if the insurer payments cease \u2013 would policyholders be able to afford to continue with payments? [\u00bd]"}, {"section": "Solution", "text": "Reputational issues if a policyholder claims their full benefit and is unable to continue to access LTC [\u00bd]"}]}, {"id": "202109_Q1(i)", "sitting": "September 2021", "yymmkey": "202109", "ref": "Q1(i)", "marks": 4, "all_themes": ["Claims Management", "Income Protection", "Long-Term Care (LTC)", "Pricing", "Private Medical Insurance (PMI)", "Product Design"], "products": ["Long-Term Care (LTC)", "Private Medical Insurance (PMI)", "Income Protection"], "question_text": "Discuss the suitability of selling the proposed product as a microinsurance product.", "scenario": "The majority of the population in Country A live on low levels of income, of around $2 per day. There are no insurance companies established in Country A and no state benefits are provided on ill-health.\nCountry A has been experiencing high levels of a particular disease. The disease affects around 25% of the population, creating a debilitating illness soon after becoming infected. Without treatment, death is certain to occur within 2 weeks. With treatment, the illness lasts an average of 2 week", "bullets": [{"section": "Solution", "text": "General A micro-insurance product is characterised by low premiums and low coverage limits [\u00bd]"}, {"section": "Solution", "text": "Low premiums Premiums must be kept affordable given income is around $2 per day and most of that is likely to be dedicated to food/shelter [\u00bd]"}, {"section": "Solution", "text": "If the benefit pays for home treatment cost would be $10 x 0.25 = $2-50 per head of population [\u00bd]"}, {"section": "Solution", "text": "May need to provide cover for whole family so cost may be of the order of $10-$15 spread over 5 years, so $2-$3 per annum [\u00bd]"}, {"section": "Solution", "text": "Hence, the cost of home treatment may be affordable to those on low incomes even after loading for expenses, profit margin etc. [\u00bd]"}, {"section": "Solution", "text": "A product designed to have low premiums is suitable for a country with low income levels, such as country A [\u00bd]"}, {"section": "Solution", "text": "Low benefits Benefits on this product are low [\u00bd]"}, {"section": "Solution", "text": "A product designed to have low benefits (and therefore low premiums) is appropriate [\u00bd]"}, {"section": "Solution", "text": "Target Market Micro-insurance is generally targeted at the low wealth segments of a population [\u00bd]"}, {"section": "Solution", "text": "And provides a social benefit in providing access to insurance cover for such socio-economic groups [\u00bd]"}, {"section": "Solution", "text": "Micro-insurance products are potentially suitable for country A due to the majority of the population being on low incomes [\u00bd]"}, {"section": "Solution", "text": "Micro-insurance products should be simple and straightforward which is appropriate for an unsophisticated target market [\u00bd]"}, {"section": "Solution", "text": "Customer Need There will be a need for cash to access treatment and food/shelter, rather than indemnity [\u00bd]"}, {"section": "Solution", "text": "The product could provide peace of mind for the community if the main earners get the disease [\u00bd]"}, {"section": "Solution", "text": "Could also provide peace of mind for parents for their children to be covered as they may be a future income source [\u00bd]"}, {"section": "Solution", "text": "The product may not meet needs if want/need hospital treatment [\u00bd]"}, {"section": "Solution", "text": "The cost of hospital treatment is unlikely to be affordable unless subsidised by the state [\u00bd]"}, {"section": "Solution", "text": "Volumes Micro-insurance requires large volumes of business to work as it is very low margin [\u00bd]"}, {"section": "Solution", "text": "There is a specific need as the risk to health is 1 in 4 [\u00bd]"}, {"section": "Solution", "text": "So there is the potential for significant volumes of business [\u00bd]"}, {"section": "Solution", "text": "Although following treatment the risk and therefore potential volumes are reduced [\u00bd]"}, {"section": "Solution", "text": "Overall Overall the proposed product does meet the criteria to be a micro-insurance product [\u00bd]"}]}, {"id": "202109_Q1(ii)", "sitting": "September 2021", "yymmkey": "202109", "ref": "Q1(ii)", "marks": 20, "all_themes": ["Claims Management", "Data", "Income Protection", "Investments", "Long-Term Care (LTC)", "Pricing", "Private Medical Insurance (PMI)", "Product Design", "Regulation", "Reinsurance", "Reserving & Valuation", "Risk Management & Capital", "Underwriting"], "products": ["Long-Term Care (LTC)", "Private Medical Insurance (PMI)", "Income Protection"], "question_text": "It has been decided that a new insurance company will need to be set up in Country A to sell the new product. The group of actuaries has been asked to write a report setting out the factors that need to be considered in setting up the new insurance company and in launching the new product.\nOutline the factors that should be considered in the report under each of the following areas:\n(a) Product design\n(b) Product pricing\n(c) Other areas.", "scenario": "The majority of the population in Country A live on low levels of income, of around $2 per day. There are no insurance companies established in Country A and no state benefits are provided on ill-health.\nCountry A has been experiencing high levels of a particular disease. The disease affects around 25% of the population, creating a debilitating illness soon after becoming infected. Without treatment, death is certain to occur within 2 weeks. With treatment, the illness lasts an average of 2 week", "bullets": [{"section": "Solution", "text": "Product design The contract is effectively a limited critical illness product [\u00bd]"}, {"section": "Solution", "text": "Will the sum assured be paid out on death (i.e. accelerated critical illness)? [\u00bd]"}, {"section": "Solution", "text": "The product benefit and the purpose for which the benefit will be used will need to be finalised [\u00bd]"}, {"section": "Solution", "text": "For example \u2013 lump sum to cover the cost of treatment and other costs associated with the illness [\u00bd]"}, {"section": "Solution", "text": "The claim definition for the disease will need to be determined [\u00bd]"}, {"section": "Solution", "text": "Premium payment frequency and whether the premium is level or increases (and, if so, at what rate) will need to be considered [\u00bd]"}, {"section": "Solution", "text": "It will need to be determined whether benefits are fixed, or if they will increase (and, if so, at what rate) [\u00bd]"}, {"section": "Solution", "text": "The term of the policy will need to be defined [\u00bd]"}, {"section": "Solution", "text": "How will benefit be paid, e.g. via cash, mobile phone credit, bank account (not everyone may have access to a bank account) [\u00bd]"}, {"section": "Solution", "text": "Additional features, e.g. options and guarantees or variations are not likely to be included for micro-insurance products [\u00bd]"}, {"section": "Solution", "text": "Product pricing Data to price Need to consider possible data sources for pricing [\u00bd]"}, {"section": "Solution", "text": "There may be population data publicly available [\u00bd]"}, {"section": "Solution", "text": "There may be surveillance data on the disease [\u00bd]"}, {"section": "Solution", "text": "There may be data from other countries where a similar disease has occurred [\u00bd]"}, {"section": "Solution", "text": "Where external data has been used will need to consider if any adjustments will be needed to reflect different demographic profiles, location, business mix etc. [\u00bd]"}, {"section": "Solution", "text": "There are starting numbers for the expected frequency of infection and duration given in the question which could be kept under regular review [\u00bd]"}, {"section": "Solution", "text": "Pricing process Need to understand the benefits that would be priced [\u00bd]"}, {"section": "Solution", "text": "Identify the rating factors to use [\u00bd]"}, {"section": "Solution", "text": "Split data by the rating factors [\u00bd]"}, {"section": "Solution", "text": "Assumptions will be needed regarding take up rate [\u00bd]"}, {"section": "Solution", "text": "May need to estimate possible duration of ongoing treatment and associated costs to derive suitable levels of lump sum benefit [\u00bd]"}, {"section": "Solution", "text": "Will need to estimate frequency of claim [\u00bd]"}, {"section": "Solution", "text": "Will need to account for anti-selection [\u00bd]"}, {"section": "Solution", "text": "This is likely on new business as those who have recently had the disease are not likely to take out cover. Hence, whilst the population rate is 25%, it may be higher than this in the insured population [\u00bd]"}, {"section": "Solution", "text": "Allow for other costs [\u00bd]"}, {"section": "Solution", "text": "E.g. marketing costs such as producing literature [\u00bd]"}, {"section": "Solution", "text": "Claim expenses [\u00bd]"}, {"section": "Solution", "text": "Development costs [\u00bd]"}, {"section": "Solution", "text": "Reinsurance costs [\u00bd]"}, {"section": "Solution", "text": "Admin and other expenses [\u00bd]"}, {"section": "Solution", "text": "Need to consider expense inflation, as this may be high in a rapidly developing country [\u00bd]"}, {"section": "Solution", "text": "How will expenses be incorporated in the pricing e.g. loading by premium, policy, etc. [\u00bd]"}, {"section": "Solution", "text": "New business volumes will need to be estimated [\u00bd]"}, {"section": "Solution", "text": "And the mix of business will need to be estimated [\u00bd]"}, {"section": "Solution", "text": "To calculate the expense loadings [\u00bd]"}, {"section": "Solution", "text": "And to recoup development costs [\u00bd]"}, {"section": "Solution", "text": "Need to consider the renewal rates expected [\u00bd]"}, {"section": "Solution", "text": "Lapses \u2013 these may be selective since once an individual has had the disease they can cancel the cover for the next 4-5 year as they should have immunity [\u00bd]"}, {"section": "Solution", "text": "The above steps provide a premium [\u00bd]"}, {"section": "Solution", "text": "Margins will be needed [\u00bd]"}, {"section": "Solution", "text": "E.g. to allow for the risk of misestimation [\u00bd]"}, {"section": "Solution", "text": "Need to assess the competitiveness of the product [\u00bd]"}, {"section": "Solution", "text": "Need to consider the sales strategy [\u00bd]"}, {"section": "Solution", "text": "Need to produce a range of premium rates and likely volumes sold at each rate and the overall total profit estimated [\u00bd]"}, {"section": "Solution", "text": "Need to consider how to assess the social benefit impact [\u00bd]"}, {"section": "Solution", "text": "Need to consider how to value to the social benefit impact [\u00bd]"}, {"section": "Solution", "text": "Profitability Need to consider the profitability metrics such as [\u00bd]"}, {"section": "Solution", "text": "Return on capital/payback period [\u00bd]"}, {"section": "Solution", "text": "Other appropriate profit measure [\u00bd]"}, {"section": "Solution", "text": "It is unlikely that the product will seek to make a profit as it creates a social benefit [\u00bd]"}, {"section": "Solution", "text": "However, it will be important for sustaining the product that it does not make a loss [\u00bd]"}, {"section": "Solution", "text": "Profit sensitivity Consider profit sensitivity to: [\u00bd]"}, {"section": "Solution", "text": "Changes in volume [\u00bd]"}, {"section": "Solution", "text": "Changes in business mix [\u00bd]"}, {"section": "Solution", "text": "A change in prevalence should be tested [\u00bd]"}, {"section": "Solution", "text": "A change in treatment cost should be considered [\u00bd]"}, {"section": "Solution", "text": "Consider the factors affecting potential demand for the product Is there sufficient consumer demand? [\u00bd]"}, {"section": "Solution", "text": "Do the products meet the consumers\u2019 needs? [\u00bd]"}, {"section": "Solution", "text": "Are the products affordable [\u00bd]"}, {"section": "Solution", "text": "Micro-insurance products so premiums must be kept low [\u00bd]"}, {"section": "Solution", "text": "Ability of the company to create consumer confidence in products offered [\u00bd]"}, {"section": "Solution", "text": "Need to produce literature etc in local language [\u00bd]"}, {"section": "Solution", "text": "Need to consider the country\u2019s culture [\u00bd]"}, {"section": "Solution", "text": "E.g. the acceptance and trust in insurance as a concept given there is no insurance industry in Country A [\u00bd]"}, {"section": "Solution", "text": "The level of literacy amongst the likely purchasers [\u00bd]"}, {"section": "Solution", "text": "There is no insurance currently provided [\u00bd]"}, {"section": "Solution", "text": "Consider factors in evaluating a launch Availability and relevance of data [\u00bd]"}, {"section": "Solution", "text": "Need for new staff and systems (practicalities) [\u00bd]"}, {"section": "Solution", "text": "Risk management Which methods of risk management are available and appropriate? [\u00bd]"}, {"section": "Solution", "text": "Underwriting [\u00bd]"}, {"section": "Solution", "text": "Product design [\u00bd]"}, {"section": "Solution", "text": "Would waiting periods reduce the anti-selection risk? [\u00bd]"}, {"section": "Solution", "text": "Process control for distribution [\u00bd]"}, {"section": "Solution", "text": "Regular experience monitoring [\u00bd]"}, {"section": "Solution", "text": "Data gathering and checks [\u00bd]"}, {"section": "Solution", "text": "Would there be any reinsurers willing to back the risk? [\u00bd]"}, {"section": "Solution", "text": "Financial reinsurance is unlikely given that the product is unlikely to make profit [\u00bd]"}, {"section": "Solution", "text": "Staff competence \u2013 training and assessment [\u00bd]"}, {"section": "Solution", "text": "Claims management processes [\u00bd]"}, {"section": "Solution", "text": "Is there a greater risk of insurance fraud to be managed? [\u00bd]"}, {"section": "Solution", "text": "Lapse risk \u2013 it may be that policies lapse after a claim is made [\u00bd]"}, {"section": "Solution", "text": "Marketability/Saleability Where and how will the product be sold? [\u00bd]"}, {"section": "Solution", "text": "What will the commission rates be? [\u00bd]"}, {"section": "Solution", "text": "Brand image [\u00bd]"}, {"section": "Solution", "text": "Financial considerations Business plan [\u00bd]"}, {"section": "Solution", "text": "Expected business volumes [\u00bd]"}, {"section": "Solution", "text": "When will the project break even? [\u00bd]"}, {"section": "Solution", "text": "What are the key assumptions? [\u00bd]"}, {"section": "Solution", "text": "New business strain If no commission paid to the distributor this would be limited to expenses [\u00bd]"}, {"section": "Solution", "text": "How to keep the expenses low so that the premiums remain low? [\u00bd]"}, {"section": "Solution", "text": "Capital requirements Where would they get capital for launching a new insurance company [\u00bd]"}, {"section": "Solution", "text": "There are no insurance companies in country A so there may not be any insurance regulations [\u00bd]"}, {"section": "Solution", "text": "However, in that case the actuaries would need to ensure the company has sufficient capital to cover potential losses [\u00bd]"}, {"section": "Solution", "text": "If there are insurance regulations, what are the capital requirements for insurance companies on country A [\u00bd]"}, {"section": "Solution", "text": "How much capital above the statutory capital requirements should the company hold [\u00bd]"}, {"section": "Solution", "text": "Reserving requirements What are the reserving requirements for insurance companies on country A? [\u00bd]"}, {"section": "Solution", "text": "If there are no formal reserving requirements what liabilities should be held? [\u00bd]"}, {"section": "Solution", "text": "Expenses What are the set up costs to get the company up and running? [\u00bd]"}, {"section": "Solution", "text": "What are the ongoing costs? [\u00bd]"}, {"section": "Solution", "text": "Opportunity cost What would potential backers to a new insurance company otherwise do with their money to gain a return on their investment? [\u00bd]"}, {"section": "Solution", "text": "Practicalities A company will need to be set up and registered [\u00bd]"}, {"section": "Solution", "text": "Staff will need to be recruited [\u00bd]"}, {"section": "Solution", "text": "Marketing and policy literature will be required [\u00bd]"}, {"section": "Solution", "text": "Policy terms and conditions will need to be checked with a legal team [\u00bd]"}, {"section": "Solution", "text": "Systems will need to be set up [\u00bd]"}, {"section": "Solution", "text": "Will need to decide on the design of product [\u00bd]"}, {"section": "Solution", "text": "Will need to consider the timescale for developing the product and setting up the company [\u00bd]"}, {"section": "Solution", "text": "There is an immediate need for cover but that may reduce over time. If unable to launch quickly, the demand for the product may no longer be there [\u00bd]"}, {"section": "Solution", "text": "Regulatory licences may be needed and there may be other constraints to consider [\u00bd]"}, {"section": "Solution", "text": "Environment Economic Will income levels in the country be at similar levels to make the development of the product worthwhile [\u00bd]"}, {"section": "Solution", "text": "Or if the economy is growing rapidly will there be continued demand from poorer lives even with economic growth [\u00bd]"}, {"section": "Solution", "text": "Is there inflation which may erode the purchasing power of the cash benefit [\u00bd]"}, {"section": "Solution", "text": "Business Would the insurance company be able to operate effectively in Country A? [\u00bd]"}, {"section": "Solution", "text": "Is there political instability making the ability to run a business difficult? [\u00bd]"}, {"section": "Solution", "text": "Regulatory Is there an insurance regulator? [\u00bd]"}, {"section": "Solution", "text": "What is the process for seeking approval to operate in the country? [\u00bd]"}, {"section": "Solution", "text": "Will product approval be required as well? [\u00bd]"}, {"section": "Solution", "text": "What requirements are there for a new insurer? [\u00bd]"}, {"section": "Solution", "text": "Tax Would there be insurance premium tax? [\u00bd]"}, {"section": "Solution", "text": "Would there be tax on the benefit paid? [\u00bd]"}, {"section": "Solution", "text": "Competitors Would more enter the market given the profit is low and it\u2019s for social benefit only? [\u00bd]"}]}, {"id": "202109_Q1(iv)", "sitting": "September 2021", "yymmkey": "202109", "ref": "Q1(iv)", "marks": 4, "all_themes": ["Claims Management", "Income Protection", "Long-Term Care (LTC)", "Pricing", "Private Medical Insurance (PMI)", "Product Design", "Professional Guidance", "Regulation", "Reinsurance", "Reserving & Valuation", "Risk Management & Capital"], "products": ["Long-Term Care (LTC)", "Private Medical Insurance (PMI)", "Income Protection"], "question_text": "Propose, with reasons, areas of the pricing process where the actuaries may need to seek additional input.", "scenario": "The majority of the population in Country A live on low levels of income, of around $2 per day. There are no insurance companies established in Country A and no state benefits are provided on ill-health.\nCountry A has been experiencing high levels of a particular disease. The disease affects around 25% of the population, creating a debilitating illness soon after becoming infected. Without treatment, death is certain to occur within 2 weeks. With treatment, the illness lasts an average of 2 week", "bullets": [{"section": "Solution", "text": "Understand the benefits that would be priced Actuaries may need input on the attractiveness of the proposed benefits of the product for the target market [\u00bd]"}, {"section": "Solution", "text": "Identify rating factors to use The use of rating factors will not be a new concept to the actuaries [\u00bd]"}, {"section": "Solution", "text": "However, the actuaries may need to seek local expert input on rating factors for disease incidence rates and outcomes within the population [\u00bd]"}, {"section": "Solution", "text": "They may decide to do community rating which also will not be a new concept to the actuaries [\u00bd]"}, {"section": "Solution", "text": "Estimate frequency of claim Whilst there is information on the incidence of the disease the actuaries may need local insight from those who have experience in micro insurance to assess the likely frequency of claims [\u00bd]"}, {"section": "Solution", "text": "Allow for other costs The actuaries may converse or get peer review from those who have experience in micro insurance to understand potential pitfalls [\u00bd]"}, {"section": "Solution", "text": "Expenses The actuaries may need to understand from others who work in micro insurance how expenses are recouped given low premiums [\u00bd]"}, {"section": "Solution", "text": "New business volumes estimates Initial estimates could be made by the actuaries but this area may be very different to a well-established insurance market and non-micro insurance products \u2013 therefore a peer review and secondary input could be sought [\u00bd]"}, {"section": "Solution", "text": "Local assistance may be needed to advise on any cultural issues that might affect demand for insurance (e.g. mistrust of insurance) [\u00bd]"}, {"section": "Solution", "text": "Local assistance could also help in setting new business mix assumptions [\u00bd]"}, {"section": "Solution", "text": "Renewal rates expected This assumption is material to the long-term viability of the project and given the lack of experience, estimates could be based on poor understanding of micro-insurance markets. It is very likely the actuaries will need to get additional support here [\u00bd]"}, {"section": "Solution", "text": "Resultant Premium Advice required on what an affordable premium for the company\u2019s target market in country A would be [\u00bd]"}, {"section": "Solution", "text": "Margins For micro-insurance this area may be specifically related to risk. Given the product is for social benefit, it will need to keep premiums low so prudence may not be as generous. However, the long-term sustainability of the product is required. Asking for input from those with experience may be beneficial [\u00bd]"}, {"section": "Solution", "text": "Micro insurance is for social benefit so may not be profit orientated [\u00bd]"}, {"section": "Solution", "text": "Actuaries may need help in assessing the social benefit impact [\u00bd]"}, {"section": "Solution", "text": "Capital requirements Additional assistance may be needed when setting the capital requirements for the new company and product, given the lack of internal experience on both the product and the country [\u00bd]"}, {"section": "Solution", "text": "Reinsurance Additional assistance could be needed when considering available reinsurance options [\u00bd]"}]}, {"id": "202109_Q1(v)", "sitting": "September 2021", "yymmkey": "202109", "ref": "Q1(v)", "marks": 6, "all_themes": ["Claims Management", "Income Protection", "Long-Term Care (LTC)", "Pricing", "Private Medical Insurance (PMI)"], "products": ["Long-Term Care (LTC)", "Private Medical Insurance (PMI)", "Income Protection"], "question_text": "\u20133 The insurance company has been successfully set up in Country A and the product has proved popular. The insurer is now considering launching other microinsurance health and care products in Country A, namely:\n\uf0b7 income protection.\n\uf0b7 private medical insurance.\n\uf0b7 long-term care.\nAssess the suitability of each of these products to microinsurance and to the disease.\n[Total 35]\n\u20134", "scenario": "The majority of the population in Country A live on low levels of income, of around $2 per day. There are no insurance companies established in Country A and no state benefits are provided on ill-health.\nCountry A has been experiencing high levels of a particular disease. The disease affects around 25% of the population, creating a debilitating illness soon after becoming infected. Without treatment, death is certain to occur within 2 weeks. With treatment, the illness lasts an average of 2 week", "bullets": [{"section": "Solution", "text": "Income Protection Micro insurance \u2013 suitable as a low benefit ($2/day) would support income lost while sick; can limit time period in payment to keep premiums small [1]"}, {"section": "Solution", "text": "However, there may be issues around proof of income and proof of inability to work [\u00bd]"}, {"section": "Solution", "text": "Disease - suitable as whilst the disease affects 25% of population, the resulting sick period is on average 2 weeks for most claims; may be debilitating so having to stop work [\u00bd]"}, {"section": "Solution", "text": "May need to limit the average recovery period to keep premiums low as there could be a long tail on mobility claims [\u00bd]"}, {"section": "Solution", "text": "Private Medical Insurance Not suitable for micro insurance as product generally provides indemnity so premiums hard to be kept low [1]"}, {"section": "Solution", "text": "For the disease, the cost of home treatment is low so may be suitable for this treatment e.g. if indemnify the cost of the treatment [1]"}, {"section": "Solution", "text": "Cost of hospital treatment is high compared to income so not suitable as premiums would be too high [\u00bd]"}, {"section": "Solution", "text": "Long Term Care Not suitable to micro insurance as premiums unlikely to be kept low [1]"}, {"section": "Solution", "text": "For the disease unlikely to be needed as most will either die within a short time frame or recover [1]"}, {"section": "Solution", "text": "If all are treated around 5% of the population may have long-term mobility issues so there may be a need for long term care [\u00bd]"}]}, {"id": "202109_Q2(i)", "sitting": "September 2021", "yymmkey": "202109", "ref": "Q2(i)", "marks": 12, "all_themes": ["Capital & Solvency", "Claims Management", "Pricing", "Pricing & Rating", "Product Design", "Reserving & Valuation", "Underwriting"], "products": ["General/Mixed"], "question_text": "Discuss the factors that Company X would need to consider when designing this product to best meet the students\u2019 needs.", "scenario": "A health and care insurance company, Company X, is looking to launch a new product. The product will provide both:\n\uf0b7 a fixed cash lump sum \uf0b7 a regular monthly income to university students who are diagnosed with any one of a list of medical conditions while they are studying for a university degree. Initial market research of current students and their parents suggests a perceived need for insurance cover:\n\uf0b7 for immediate adaptation to facilitate continued presence at university \uf0b7 to cover the s", "bullets": [{"section": "Solution", "text": "Meeting specific needs [\u00bd]"}, {"section": "Solution", "text": "The conditions covered should reflect those prevalent amongst university students [\u00bd]"}, {"section": "Solution", "text": "E.g. meet need for income during an illness that prevents insured from studying/working [\u00bd]"}, {"section": "Solution", "text": "Policy benefits might be chosen to match students\u2019 living costs [\u00bd]"}, {"section": "Solution", "text": "Policies may be earmarked for particular expenditure (may need to pay education fees on an annual or quarterly basis) [\u00bd]"}, {"section": "Solution", "text": "Could be used to match monthly loan-servicing costs (may have taken educational loan with immediate repayment) [\u00bd]"}, {"section": "Solution", "text": "Or pay premiums on other insurance policies e.g. general insurance (gadgets, home, car), health (PMI, Dental, Optical, budget health plans) [\u00bd]"}, {"section": "Solution", "text": "The product needs to meet the student\u2019s needs but depending on the need should they either get a lump sum or income? [\u00bd]"}, {"section": "Solution", "text": "Hence income protection type benefits may not be suitable [\u00bd]"}, {"section": "Solution", "text": "May offer students the choice of a lump sum or an income [\u00bd]"}, {"section": "Solution", "text": "The insurer would need to consider what sort of conditions are covered [\u00bd]"}, {"section": "Solution", "text": "Are they very serious conditions (e.g. cancer) [\u00bd]"}, {"section": "Solution", "text": "Or are they less serious conditions (e.g. glandular fever etc.)? [\u00bd]"}, {"section": "Solution", "text": "The insurer could offer support for the student following a claim e.g. offer rehabilitation services to encourage students back from illness [\u00bd]"}, {"section": "Solution", "text": "Would a cash plan type product be better \u2013 where the insurer pays a cash payment in the event of certain th
