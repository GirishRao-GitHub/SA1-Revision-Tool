Data", "Pricing", "Regulation", "Reserving & Valuation", "Risk Management & Capital", "Underwriting"], "products": ["Critical Illness"], "question_text": "XYZ Health specifically lists all the conditions that are covered under its CI product in its terms and conditions.\nXYZ Health has received complaints from its CI policyholders that they cannot predict the conditions that they will contract during their lifetime, and therefore a CI product that only covers a defined list of conditions that are fixed throughout the lifetime of their policy is not flexible enough for their needs.\nAn example of the problem is that during a recent pandemic, many policyholders of XYZ Health contracted a serious new infectious disease that resulted in a significant level of long-term impairment for some policyholders. The new disease was not listed in XYZ Health\u2019s CI terms and conditions and therefore XYZ Health did not pay out on any claims for this disease.\nThe sales director of XYZ Health has proposed that XYZ Health replace the list of individual specified infectious diseases covered under its current CI product with a catch all term of \u2018serious infectious diseases\u2019.\nDiscuss the advantages and disadvantages of the sales director\u2019s proposal from the perspective of XYZ Health.", "scenario": "XYZ Health is a health and care insurance company that sells Critical Illness (CI)\nbusiness in Country A.\nXYZ Health\u2019s CI product covers a number of different health conditions, but currently it does not cover any mental health conditions.\nXYZ Health has received many requests to add mental health conditions to its CI product. Financial advisors and policyholders have argued for many years that individuals in Country A can be subject to serious mental health conditions during their lifetime and ", "bullets": [{"section": "Solution", "text": "Advantages of the sales director\u2019s proposal The sales directors proposal will give the customer and the financial advisor more certainty that their CI policy will pay out in the event of the policyholder catching a disease. [1]"}, {"section": "Solution", "text": "The proposed approach is simpler for the customer to understand and the financial advisor to explain what is covered by the policy. [\u00bd]"}, {"section": "Solution", "text": "This will give the policyholder more confidence to buy the product in the first place. [\u00bd]"}, {"section": "Solution", "text": "This increased certainty could make XYZ\u2019s CI product more competitive in the market [\u00bd]"}, {"section": "Solution", "text": "Which could lead to increased sales and profitability for XYZ. [\u00bd]"}, {"section": "Solution", "text": "The proposal would make XYZ seem more consumer friendly [\u00bd]"}, {"section": "Solution", "text": "And will potentially enhance XYZ\u2019s reputation. [\u00bd]"}, {"section": "Solution", "text": "Disadvantages of the Sales Directors proposal However, if the amended product sales are materially increased then XYZ will need to find more capital than expected. [\u00bd]"}, {"section": "Solution", "text": "If XYZ\u2019s capital is limited this could become an issue. [\u00bd]"}, {"section": "Solution", "text": "It could even result in new business being stopped partway through the year. This could result in significant reputational damage. [\u00bd]"}, {"section": "Solution", "text": "The claims definition is key to designing a sustainable and profitable product. [\u00bd]"}, {"section": "Solution", "text": "Accurate policy wording is likely to be crucial in terms of understanding what diseases are actually covered by XYZ\u2019s policy [\u00bd]"}, {"section": "Solution", "text": "And therefore understanding what XYZ\u2019s future claim experience for its CI policy is likely to be. [\u00bd]"}, {"section": "Solution", "text": "Using a catch all term like \u2018serious infectious diseases\u2019 is potentially not an accurate term and will potentially cover a very wide range of diseases [\u00bd]"}, {"section": "Solution", "text": "Including those that are currently known, and any other diseases that are currently not known but will emerge in the future. [\u00bd]"}, {"section": "Solution", "text": "This will make it extremely uncertain for XYZ in terms of what diseases are actually covered by their CI product [\u00bd]"}, {"section": "Solution", "text": "And also make estimation of future claims experience very difficult. [\u00bd]"}, {"section": "Solution", "text": "There may end up being disputes about what constitutes a \u2018serious\u2019 infectious disease. This could lead to legal challenge. [\u00bd]"}, {"section": "Solution", "text": "Potentially XYZ could end up paying out on claims it did not expect to pay out on. [\u00bd]"}, {"section": "Solution", "text": "If XYZ is too prudent in assuming every possible infectious disease is covered this could make the premium for the product unaffordable for the customer. [1]"}, {"section": "Solution", "text": "Depending on the approach taken by other health and care insurers if XYZ is too prudent in its assumptions there is risk that their CI product becomes uncompetitive. [1]"}, {"section": "Solution", "text": "If the pricing actuary is less prudent then there is a risk that claims experience could be significantly worse than expected [\u00bd]"}, {"section": "Solution", "text": "Which could have an adverse impact on XYZ\u2019s profitability [\u00bd]"}, {"section": "Solution", "text": "Over the long term it could adversely impact XYZ\u2019s solvency. [\u00bd]"}, {"section": "Solution", "text": "It is unlikely that past data will be much use for assessing future claims experience if XYZ moves to the new \u2018catch all\u2019 definition. [\u00bd]"}, {"section": "Solution", "text": "There may be higher than expected claims expenses if the number of claims payouts increases [\u00bd]"}, {"section": "Solution", "text": "Which could also reduce product profitability. [\u00bd]"}, {"section": "Solution", "text": "The new product may need to have significantly higher claims reserves than the current product [\u00bd]"}, {"section": "Solution", "text": "Due to higher prudential margins to reflect greater uncertainty about future experience [\u00bd]"}, {"section": "Solution", "text": "This could adversely impact product profitability. [\u00bd]"}, {"section": "Solution", "text": "Similarly more capital is likely to be needed to write the same level of new business. [\u00bd]"}, {"section": "Solution", "text": "XYZ may also be faced with additional legal costs if it ends up in dispute with customers about whether claims are covered. [\u00bd]"}, {"section": "Solution", "text": "Overall the proposal potentially creates significant uncertainty for XYZ and is not likely to be suitable. [1]"}, {"section": "Solution", "text": "[Up to 1 mark for any conclusion on suitability that follows from the points made in the candidate\u2019s answer to this part question.]"}]}, {"id": "202409_Q3(i)", "sitting": "September 2024", "yymmkey": "202409", "ref": "Q3(i)", "marks": 10, "all_themes": ["Claims Management", "Group Products", "Income Protection", "Pricing", "Reserving & Valuation", "Underwriting"], "products": ["Income Protection", "Group Products"], "question_text": "Discuss, with reasons, what investigations you could undertake to understand the reasons for the increase in the loss ratio of Company X\u2019s IP business.", "scenario": "Company X, a health and care insurance company, writes both group and individual Income Protection (IP) policies. Company X has recently analysed the claim experience of its IP business. Company X has noticed that the loss ratio (defined as claims incurred as a percentage of premium) for this business has increased steadily over the analysis period and is now substantially higher than the loss ratios reported by its competitors for IP business.", "bullets": [{"section": "Solution", "text": "The loss ratio may be higher than expected due to: Higher claims inception rates [\u00bd]"}, {"section": "Solution", "text": "Lower recovery rates [\u00bd]"}, {"section": "Solution", "text": "Higher claim amounts [\u00bd]"}, {"section": "Solution", "text": "Lower premium income [\u00bd]"}, {"section": "Solution", "text": "Investigate whether there have been changes in the business mix such as: [\u00bd]"}, {"section": "Solution", "text": "There may be cross subsidies in the pricing basis [\u00bd]"}, {"section": "Solution", "text": "Demographic trends (age, gender, smoker) [\u00bd]"}, {"section": "Solution", "text": "Or by occupation [\u00bd]"}, {"section": "Solution", "text": "And scheme size for group business to see if free cover limits are inappropriate [\u00bd]"}, {"section": "Solution", "text": "Review whether there have been changes in product terms and conditions [\u00bd]"}, {"section": "Solution", "text": "Or whether there have been changes in market norms [\u00bd]"}, {"section": "Solution", "text": "For example: Incapacity definitions [\u00bd]"}, {"section": "Solution", "text": "The deferred period [\u00bd]"}, {"section": "Solution", "text": "Benefit limits / maximums [\u00bd]"}, {"section": "Solution", "text": "Replacement ratios [\u00bd]"}, {"section": "Solution", "text": "Claim criteria [\u00bd]"}, {"section": "Solution", "text": "Underwriting criteria [\u00bd]"}, {"section": "Solution", "text": "Inclusion of partial, proportional or rehabilitation benefits [\u00bd]"}, {"section": "Solution", "text": "[Up to 3 marks in total for suitable examples.] Investigate claim escalation rates. [\u00bd]"}, {"section": "Solution", "text": "A drive to increase market share with pricing discounts may have reduced premium income. [\u00bd]"}, {"section": "Solution", "text": "Investigate whether there has been any significant changes in new business such as a major decline in new business [\u00bd]"}, {"section": "Solution", "text": "With the average age (and related risk) of the book of the business increasing as a result [\u00bd]"}, {"section": "Solution", "text": "Or lower protection from waiting periods [\u00bd]"}, {"section": "Solution", "text": "Or a loss of large groups schemes with favourable experience [\u00bd]"}, {"section": "Solution", "text": "Or other marketing campaigns which may have attracted poor risks. [\u00bd]"}, {"section": "Solution", "text": "Review general economic conditions [\u00bd]"}, {"section": "Solution", "text": "As recession conditions may lead to increases in claims or lapses [\u00bd]"}, {"section": "Solution", "text": "And impact recovery rates. [\u00bd]"}, {"section": "Solution", "text": "Economic conditions, such as changes in interest rates, may impact the value of claims in payment reserves. [\u00bd]"}, {"section": "Solution", "text": "Conduct a lapse experience. [\u00bd]"}, {"section": "Solution", "text": "There may be selective lapses, for example if the product is no longer competitive. [\u00bd]"}, {"section": "Solution", "text": "Investigate cause of claims as this may impact claim duration. [\u00bd]"}, {"section": "Solution", "text": "Investigate early claims or claims by notification date to check for anti-selective behaviour. [\u00bd]"}, {"section": "Solution", "text": "Investigate if there have been any outliers /abnormal claims which are influencing the loss ratio. [\u00bd]"}, {"section": "Solution", "text": "Have there been any ex-gratia claims (or other legal challenges/fines) which may impact the results [\u00bd]"}, {"section": "Solution", "text": "Or whether there are any large group schemes which have an outsize impact on the loss ratio. [\u00bd]"}, {"section": "Solution", "text": "Investigate whether there has been a change in the type of claim being incurred, for example, mental health or stress related claims may have lower recovery rates. [\u00bd]"}]}, {"id": "202409_Q3(ii)", "sitting": "September 2024", "yymmkey": "202409", "ref": "Q3(ii)", "marks": 5, "all_themes": ["Claims Management", "Group Products", "Income Protection", "Pricing", "Regulation", "Underwriting"], "products": ["Income Protection", "Group Products"], "question_text": "Suggest possible actions Company X could take to improve the loss ratio.", "scenario": "Company X, a health and care insurance company, writes both group and individual Income Protection (IP) policies. Company X has recently analysed the claim experience of its IP business. Company X has noticed that the loss ratio (defined as claims incurred as a percentage of premium) for this business has increased steadily over the analysis period and is now substantially higher than the loss ratios reported by its competitors for IP business.", "bullets": [{"section": "Solution", "text": "Could increase premium rates [\u00bd]"}, {"section": "Solution", "text": "Or implement more granular premium rates (if not in place). [\u00bd]"}, {"section": "Solution", "text": "Could amend product terms for example: [\u00bd]"}, {"section": "Solution", "text": "Reduce maximum replacement ratio [\u00bd]"}, {"section": "Solution", "text": "To encourage return to work [\u00bd]"}, {"section": "Solution", "text": "Increase waiting periods [\u00bd]"}, {"section": "Solution", "text": "Increase deferred periods [\u00bd]"}, {"section": "Solution", "text": "Introduce partial or rehabilitation benefits [\u00bd]"}, {"section": "Solution", "text": "Amend underwriting guidelines for example: [\u00bd]"}, {"section": "Solution", "text": "Limit high risk occupations [\u00bd]"}, {"section": "Solution", "text": "Increase health underwriting [\u00bd]"}, {"section": "Solution", "text": "Reduce free cover limits on group schemes [\u00bd]"}, {"section": "Solution", "text": "Review disability definitions [\u00bd]"}, {"section": "Solution", "text": "And ensure these are clear to limit any disputes [\u00bd]"}, {"section": "Solution", "text": "Increase claim underwriting, for example, by requiring additional documentation or second opinions [\u00bd]"}, {"section": "Solution", "text": "Tighten claims assessment practices [\u00bd]"}, {"section": "Solution", "text": "And claims management to ensure benefits paid and recovery times are as expected. [\u00bd]"}, {"section": "Solution", "text": "Take measures to reduce lapses [\u00bd]"}, {"section": "Solution", "text": "For example, introduce loyalty benefits. [\u00bd]"}, {"section": "Solution", "text": "Introduce rehabilitation services to get customers back to work sooner. [\u00bd]"}, {"section": "Solution", "text": "Improve fraud detection processes. [\u00bd]"}, {"section": "Solution", "text": "Review and tighten policy wording. [\u00bd]"}, {"section": "Solution", "text": "Get advice from reinsurer. [\u00bd]"}, {"section": "Solution", "text": "[Any additional reasonable points up to 1 mark.]"}]}, {"id": "202504_Q1(i)", "sitting": "April 2025", "yymmkey": "202504", "ref": "Q1(i)", "marks": 5, "all_themes": ["Capital & Solvency", "Claims Management", "Critical Illness", "Pricing & Rating"], "products": ["Critical Illness"], "question_text": "Outline how a Critical Illness (CI) insurance product can meet the needs of a policyholder.", "scenario": "", "bullets": [{"section": "Solution", "text": "A variety of customer needs are met by a critical illness insurance policy. The critical illness benefit can be used to: Meet medical costs when the illness requires surgery or other expensive treatment. [\u00bd]"}, {"section": "Solution", "text": "Meet the cost of hospital stays. [\u00bd]"}, {"section": "Solution", "text": "Repay a mortgage or other loan when the policyholder is diagnosed with a critical illness. [\u00bd]"}, {"section": "Solution", "text": "Provide an income from the lump sum via an annuity when the individual cannot work as a result of their critical illness. [\u00bd]"}, {"section": "Solution", "text": "Provide an income to pay for other insurance policies or continue to fund any retirement provision. [\u00bd]"}, {"section": "Solution", "text": "Provision of income or assistance when a dependant requires care. [\u00bd]"}, {"section": "Solution", "text": "Fund day to day costs - e.g. rent, food, utilities. [\u00bd]"}, {"section": "Solution", "text": "Fund a change of lifestyle where necessary to improve the claimant\u2019s health. [\u00bd]"}, {"section": "Solution", "text": "Fund adaptations to the immediate environment to cope with the changed physical needs. [\u00bd]"}, {"section": "Solution", "text": "Fund domestic help. [\u00bd]"}, {"section": "Solution", "text": "Fund recuperation or rehabilitation treatment after illness. [\u00bd]"}, {"section": "Solution", "text": "Provide peace of mind that the policyholder\u2019s financial needs will be met in the event of a critical illness. [\u00bd]"}, {"section": "Solution", "text": "Ensuring the policyholder does not need to rely on state benefits or family support in the event of a financially crippling critical illness. [\u00bd]"}, {"section": "Solution", "text": "[ \u00bd mark for other reasonable points] [Total marks 6\u00bd, maximum 5]"}]}, {"id": "202504_Q1(ii)", "sitting": "April 2025", "yymmkey": "202504", "ref": "Q1(ii)", "marks": 15, "all_themes": ["Capital & Solvency", "Claims Management", "Critical Illness", "Pricing", "Pricing & Rating", "Product Design"], "products": ["Critical Illness"], "question_text": "Country X is a large well-developed country. CI insurance products were first introduced in Country X 25 years ago. The CI insurance market in Country X has expanded significantly over the last 25 years with many health and care insurance companies now selling CI products. The main features of CI products in Country X have remained largely unchanged over the last 25 years, other than the number of CI conditions covered that has increased significantly.\nFollowing a significant increase in the number of complaints from consumers, the regulator carried out an investigation of the CI insurance market in Country X. The regulator subsequently produced a report on the CI insurance market, which concluded that CI products:\n\uf0b7 do not appear to be adequately meeting policyholders\u2019 needs.\n\uf0b7 do not appear to represent good value for consumers.\nThe following table provides an extract from the report.\n2005 2010 2015 2020 2024 Number of CI claims paid out/number of CI claims received (%) 55 56 57 58 59 Maximum benefit paid out on CI policy (inflation adjusted to 2024 values) ($) 50,000 52,500 58,000 61,500 64,000 Total expected premiums paid over the lifetime on a CI policy/maximum possible benefits payable on the policy (for new business) 0.8 0.9 1 1.2 1.5 Time taken to pay CI claims (in days) 14 14 21 48 72 Number of CI conditions covered on a CI policy 10 15 30 60 100 Advisor commission on a CI policy ($) 240 350 700 1,400 2,400 All figures in the table above are averaged across all health and care insurance companies that sell CI insurance products in Country X.\nOther information:\n\uf0b7 Price inflation in Country X has been 4% p.a. for many years.\n\uf0b7 CI premium rates have increased broadly in line with price inflation each year.\nDiscuss the regulator\u2019s concerns about CI products, taking into consideration the information provided in the table above.", "scenario": "", "bullets": [{"section": "Solution", "text": "CI products not meeting policyholder\u2019s needs. Only 50% to 60% of claims received result in claims being paid out; [\u00bd]"}, {"section": "Solution", "text": "This appears to be very low. [\u00bd]"}, {"section": "Solution", "text": "Policyholders are likely to be unhappy that such a low proportion of claims made result in benefits aid out. [\u00bd]"}, {"section": "Solution", "text": "Such a high proportion of claims made not being paid out is unlikely to be meeting policyholder\u2019s needs. [1]"}, {"section": "Solution", "text": "There could be a number of reasons for claims paid out being so low. For example: This could be because claims made by policyholders are not within the claim definitions in the company\u2019s terms. [\u00bd]"}, {"section": "Solution", "text": "Perhaps many claimants are not quite ill enough to meet the CI products claims definition. [\u00bd]"}, {"section": "Solution", "text": "The Insurers could also be being unreasonably harsh in managing claim payments, which will not be meeting client\u2019s needs. [\u00bd]"}, {"section": "Solution", "text": "Policyholders may not have fully understood when companies will/will not payout on CI claims when they bought the policy [\u00bd]"}, {"section": "Solution", "text": "Which could indicate that the policies have been mis-sold. [\u00bd]"}, {"section": "Solution", "text": "There has been a small increase in the claims payout ratio since 2005. [\u00bd]"}, {"section": "Solution", "text": "This is to be expected given the significant increase in the number of CI conditions added over the period (increasing from 10 to 100). [\u00bd]"}, {"section": "Solution", "text": "However, the incremental increase in the number of conditions is not yielding a corresponding increase in the expected benefit payout to the policyholder. [\u00bd]"}, {"section": "Solution", "text": "It is possible that the new conditions added are relatively costly and of low relevance to the policyholder. [\u00bd]"}, {"section": "Solution", "text": "This is not the intended purpose of a CI product - the conditions these products cover should be deemed to be widely occurring and of a significant risk to the customer. [1]"}, {"section": "Solution", "text": "From the customer perspective the CI product design has evolved in a manner that may be seen as deceptive to customers by supposedly covering 100 conditions but offering low value [1]"}, {"section": "Solution", "text": "And therefore may be falling short of the customers need to be treated fairly. [\u00bd]"}, {"section": "Solution", "text": "The maximum CI benefits paid out has increased by a real rate of around 1.3% p.a. over the period\u2026. [\u00bd]"}, {"section": "Solution", "text": "\u2026..(64,000/50,000)^(1/19)-1 = c1.3% p.a. [\u00bd]"}, {"section": "Solution", "text": "This is equivalent to a nominal rate of increase of around 5.3% p.a. which is higher than annualised price inflation which has been 4%. [\u00bd]"}, {"section": "Solution", "text": "CI premiums have been increasing roughly in line with price inflation, and therefore have been increasing at a slightly lower rate than CI benefits. [\u00bd]"}, {"section": "Solution", "text": "So it is likely that policyholders diagnosed with a critical illness are likely to be finding that the purchasing power of the benefit they receive will be increasing in real terms. [1]"}, {"section": "Solution", "text": "This is likely to be meeting policyholder\u2019s needs. [\u00bd]"}, {"section": "Solution", "text": "The time taken to pay CI claims appears to have increased significantly over the period covered. [\u00bd]"}, {"section": "Solution", "text": "The delay in CI claim payments could be for a variety of reasons: Claim settlement processes could be more onerous for the policyholder. [\u00bd]"}, {"section": "Solution", "text": "Insurer could have cut down on operational staff to pay claims. [\u00bd]"}, {"section": "Solution", "text": "This is unlikely to be meeting policyholder\u2019s expectations [\u00bd]"}, {"section": "Solution", "text": "And is likely to lead to considerable policyholder dissatisfaction. [\u00bd]"}, {"section": "Solution", "text": "Particularly as the policyholder may be needing the CI benefit payment to meet costs they are incurring [\u00bd]"}, {"section": "Solution", "text": "For example, medical treatment costs. [\u00bd]"}, {"section": "Solution", "text": "CI products not offering good value for consumers. Expected premiums/maximum benefit paid for new business looks to have worsened significantly since 2005. [\u00bd]"}, {"section": "Solution", "text": "With new policyholders in 2024 expecting to pay significantly more in premiums than the maximum benefits they could receive under the policy\u2026.. [1]"}, {"section": "Solution", "text": "\u2026..which does not look to be good value for consumers [\u00bd]"}, {"section": "Solution", "text": "and policyholders could now be overpaying for CI cover. [\u00bd]"}, {"section": "Solution", "text": "The time taken to pay claims has also risen significantly from 14 days in 2005 to 72 days in 2024. [\u00bd]"}, {"section": "Solution", "text": "This would be an inconvenience to customers and result in poor value from the product. [\u00bd]"}, {"section": "Solution", "text": "Advisor commission looks to have increased significantly on new business since 2005 [\u00bd]"}, {"section": "Solution", "text": "Which is likely to be one of the reasons for premiums increasing. [\u00bd]"}, {"section": "Solution", "text": "High advisor commission could be resulting in more churning by advisors. [\u00bd]"}, {"section": "Solution", "text": "Another reason is likely to be the significant increase in benefits covered by CI products. [\u00bd]"}, {"section": "Solution", "text": "It is possible that these commissions have gone up due to the addition of new conditions [\u00bd]"}, {"section": "Solution", "text": "(Since the product is more complex and perhaps requires more effort to explain and sell to customers). [\u00bd]"}, {"section": "Solution", "text": "However, given that the addition of new conditions does not materially increase the maximum expected payout from the policy, customers may ask what this charge (and the additional conditions that give rise to them) are worth from a customer value generation perspective. [1]"}, {"section": "Solution", "text": "There could be other issues For example, policyholders living longer - CI product benefits not amended to reflect this. [\u00bd]"}, {"section": "Solution", "text": "[\u00bd mark for other reasonable points] [Total marks 24\u00bd, Maximum 15]"}]}, {"id": "202504_Q1(iii)", "sitting": "April 2025", "yymmkey": "202504", "ref": "Q1(iii)", "marks": 15, "all_themes": ["Capital & Solvency", "Claims Management", "Critical Illness", "Group Products", "Pricing", "Pricing & Rating", "Product Design", "Regulation", "Underwriting"], "products": ["Critical Illness", "Group Products"], "question_text": "Following the investigation into the CI market, the regulator has decided to introduce new consumer protection regulations referred to as \u2018Consumer Responsibility\u2019 regulations. The new regulations require that health and care products provide \u2018good consumer outcomes\u2019 and \u2018fair value\u2019 for the customer. Each health and care insurance company in Country X must determine what represents \u2018good consumer outcomes\u2019 and \u2018fair value\u2019 for their own customers.\nCompany A is a health and care insurance company that has sold CI business in Country X for many years. Company A has been considering its response to the new \u2018Consumer Responsibility\u2019 regulations on its business.\nDiscuss how Company A could ensure its CI products provide \u2018good consumer outcomes\u2019 and \u2018fair value\u2019 to its customers.", "scenario": "", "bullets": [{"section": "Solution", "text": "The factors Company A should consider: Good Outcomes Customer Needs Review the CI product needs of customers in the target market segment company is aiming for. [\u00bd]"}, {"section": "Solution", "text": "Customer needs are likely to have changed significantly over the last 25 years; [\u00bd]"}, {"section": "Solution", "text": "for example, people could be living longer [\u00bd]"}, {"section": "Solution", "text": "but in poorer health. [\u00bd]"}, {"section": "Solution", "text": "Customers may be being diagnosed earlier for CI\u2019s. [\u00bd]"}, {"section": "Solution", "text": "The way customers live/work may have changed. [\u00bd]"}, {"section": "Solution", "text": "Identify any changes that may need to be made to the product to reflect the changes in customers. [\u00bd]"}, {"section": "Solution", "text": "Could consider needs of vulnerable customers. [\u00bd]"}, {"section": "Solution", "text": "Target Market Review who the product is being sold to [\u00bd]"}, {"section": "Solution", "text": "In order to ensure the product is being aimed at the appropriate target market. [\u00bd]"}, {"section": "Solution", "text": "Product design Identify any changes that need to be made to the overall CI product design to reflect changes in the customer\u2019s needs. [\u00bd]"}, {"section": "Solution", "text": "For example the company could consider introduce severity based partial payments rather than \u2018all or nothing\u2019 sum insured. [\u00bd]"}, {"section": "Solution", "text": "Ensure CI benefits are regularly increased to keep pace with inflation to ensure CI benefits buying power meets customer\u2019s needs. [\u00bd]"}, {"section": "Solution", "text": "Review the number of CI conditions to ensure they are sufficiently relevant to policyholders. [\u00bd]"}, {"section": "Solution", "text": "Consider removing CI conditions that have little value to the consumer. [\u00bd]"}, {"section": "Solution", "text": "Could consider adding optional benefits where this adds value to the consumer. [\u00bd]"}, {"section": "Solution", "text": "Product Literature Product literature may need to be updated to ensure customers understand what they are buying. [\u00bd]"}, {"section": "Solution", "text": "Ensure critical illness definitions are as clear and fair as possible to ensure policyholders understand what they have bought. [\u00bd]"}, {"section": "Solution", "text": "Similarly ensure sales literature is clear and fair. [\u00bd]"}, {"section": "Solution", "text": "Ensure customer has clear expectations of the scope and limitations of critical illness cover. [\u00bd]"}, {"section": "Solution", "text": "Could issue annual updates on changes in the product to policyholder, to remind policyholders of the value of their product. [\u00bd]"}, {"section": "Solution", "text": "Administration Ensure service levels are appropriate and within market norms. [\u00bd]"}, {"section": "Solution", "text": "Ensure CI product administration is providing good outcomes from policyholders. [\u00bd]"}, {"section": "Solution", "text": "Ensure underwriting processes are clear and fair for the customer [\u00bd]"}, {"section": "Solution", "text": "E.g. Ensure new policies are underwritten promptly [\u00bd]"}, {"section": "Solution", "text": "E.g. Claim payment processes are quick, transparent and fair. [\u00bd]"}, {"section": "Solution", "text": "Minimise the number of disputed claims. [\u00bd]"}, {"section": "Solution", "text": "Review Persistency/claims experience Identify areas of poor persistency. [\u00bd]"}, {"section": "Solution", "text": "This could be due to mis-selling [\u00bd]"}, {"section": "Solution", "text": "or distributors churning the business [\u00bd]"}, {"section": "Solution", "text": "Put in place actions to deal with these issues [\u00bd]"}, {"section": "Solution", "text": "For example, stop dealing with distributors with high churn rates. [\u00bd]"}, {"section": "Solution", "text": "Identify problem areas where claim payments are not being made. [\u00bd]"}, {"section": "Solution", "text": "Understand why this is the case and take appropriate action. [\u00bd]"}, {"section": "Solution", "text": "Industry Standards Ensure CI product complies with minimum industry standards. [\u00bd]"}, {"section": "Solution", "text": "If industry standards are not sufficiently clear then work with Industry to improve minimum standards. [\u00bd]"}, {"section": "Solution", "text": "Distribution Strategy Ensure Company A\u2019s distribution strategy is appropriate for the target market. [\u00bd]"}, {"section": "Solution", "text": "If industry standards are not sufficiently clear then work with the Industry to improve minimum standards. [\u00bd]"}, {"section": "Solution", "text": "Distribution Strategy Ensure Company A\u2019s distribution strategy is appropriate for the target market. [\u00bd]"}, {"section": "Solution", "text": "Due to the complexity of the sale CI product sales need to be made by appropriately trained individuals - e.g. financial advisors. [\u00bd]"}, {"section": "Solution", "text": "Fair Value Review pricing basis of CI products to ensure profitability is not excessive. [\u00bd]"}, {"section": "Solution", "text": "Could remove any unnecessary margins in premiums. [\u00bd]"}, {"section": "Solution", "text": "Could ensure all product charges are fair and not excessive. [\u00bd]"}, {"section": "Solution", "text": "Ensure pricing assumptions are reflect the latest experience and market conditions. [\u00bd]"}, {"section": "Solution", "text": "Compare premium rates for key ages and terms against competitor\u2019s premium rates. [\u00bd]"}, {"section": "Solution", "text": "Ensure commission payments to advisors are not excessive and are appropriate for the level of work the advisor has to do. [\u00bd]"}, {"section": "Solution", "text": "Ensure CI conditions offered by the product are only those a policyholder has a realistic chance of contracting. [\u00bd]"}, {"section": "Solution", "text": "Should consider where CI products are not suitable for consumer [\u00bd]"}, {"section": "Solution", "text": "\u2026.e.g. where they can\u2019t afford premiums. [\u00bd]"}, {"section": "Solution", "text": "Stakeholder Feedback Obtain feedback from key stakeholders (e.g. customers, distributors etc) to understand problem areas where policyholders needs are not being met or customers are not receiving fair value in the past. [1]"}, {"section": "Solution", "text": "Identify actions to resolve these issues. [\u00bd]"}, {"section": "Solution", "text": "Introduce a feedback process so policyholders can report issues where they did not receive good outcomes/fair value. [\u00bd]"}, {"section": "Solution", "text": "Introduce a dispute resolution process to resolve issues. [\u00bd]"}, {"section": "Solution", "text": "Monitoring Put in place appropriate monitoring to measure that the actions taken above are ensuring that the company\u2019s CI products are providing good consumer outcomes and fair value to its customers. [1]"}, {"section": "Solution", "text": "[Total marks 28, maximum 15]"}]}, {"id": "202504_Q1(iv)", "sitting": "April 2025", "yymmkey": "202504", "ref": "Q1(iv)", "marks": 5, "all_themes": ["Capital & Solvency", "Claims Management", "Critical Illness", "Pricing", "Pricing & Rating", "Product Design", "Regulation"], "products": ["Critical Illness"], "question_text": "The board of Company A has asked that monitoring is put in place to ensure Company A is complying with the new Consumer Responsibility regulations for its CI business.\nDescribe the monitoring that Company A could carry out for its CI business to check it is complying with the new Consumer Responsibility regulations.", "scenario": "", "bullets": [{"section": "Solution", "text": "Ensure monitoring process for key management information is put in place [\u00bd]"}, {"section": "Solution", "text": "where statistics should be accumulated for the key aspects of Customer Responsibility. [\u00bd]"}, {"section": "Solution", "text": "Management will need to consider how frequently these statistics should be produced [\u00bd]"}, {"section": "Solution", "text": "but it is likely to be frequently, for example monthly, quarterly etc. [\u00bd]"}, {"section": "Solution", "text": "Company A will need to consider the key statistics that it will monitor on a regular basis. Possible examples of regular information could include: Check product is being sold to the target market [\u00bd]"}, {"section": "Solution", "text": "Percentage of claims successfully paid out [\u00bd]"}, {"section": "Solution", "text": "Value of claims paid out compared to the value of premiums received [\u00bd]"}, {"section": "Solution", "text": "Duration for successful claims to be paid [\u00bd]"}, {"section": "Solution", "text": "Benefits are appropriate and keep pace with inflation [\u00bd]"}, {"section": "Solution", "text": "Margin levels on CI products [\u00bd]"}, {"section": "Solution", "text": "Valid CI claims are paid in an appropriate timescale. [\u00bd]"}, {"section": "Solution", "text": "Commission levels [\u00bd]"}, {"section": "Solution", "text": "Service levels [\u00bd]"}, {"section": "Solution", "text": "Customer complaints [\u00bd]"}, {"section": "Solution", "text": "[\u00bd mark for reasonable examples] This management information should get appropriate senior management time to review these statistics [\u00bd]"}, {"section": "Solution", "text": "and senior management should then identify where action is required. [\u00bd]"}, {"section": "Solution", "text": "An action log may be needed to ensure that actions identified are tracked and fixed. [1]"}, {"section": "Solution", "text": "Senior management should consider what limits should be in place for each of the key statistics that are being monitored [\u00bd]"}, {"section": "Solution", "text": "And senior management will want to identify what action should be taken if the limits for these key statistics are breached. [\u00bd]"}, {"section": "Solution", "text": "A summary of the key statistics and issues should go to Company A\u2019s Board. [\u00bd]"}, {"section": "Solution", "text": "In addition to point statistics for each month, senior management and the Board will also be keen to see trends in the key statistics over a period of time to check they are complying with new regulations [\u00bd]"}, {"section": "Solution", "text": "particularly where the trends are worsening [\u00bd]"}, {"section": "Solution", "text": "in order for remedial action to be taken before issues become a problem. [\u00bd]"}, {"section": "Solution", "text": "[Total marks 12, Maximum 5]"}]}, {"id": "202504_Q2(i)", "sitting": "April 2025", "yymmkey": "202504", "ref": "Q2(i)", "marks": 12, "all_themes": ["Claims Management", "Critical Illness", "Data", "Group Products", "Income Protection", "Investments", "Pricing", "Product Design", "Regulation", "Reinsurance", "Reserving & Valuation", "Risk Management & Capital"], "products": ["Critical Illness", "Income Protection", "Group Products"], "question_text": "Discuss the market research you would conduct to evaluate the potential opportunity.", "scenario": "Company ABC, a successful insurance company in Country A, writes income protection on a group basis. Company ABC has a significant share of the available market and is exploring growth opportunities.\nOne opportunity being considered is expansion to Country B.", "bullets": [{"section": "Solution", "text": "Employment / Labour Market Understand the employment market in Country B [\u00bd]"}, {"section": "Solution", "text": "Including what industries are represented [\u00bd]"}, {"section": "Solution", "text": "And size / concentration of employers. [\u00bd]"}, {"section": "Solution", "text": "The state may be a large employer, which may add a political dynamic to the market. [\u00bd]"}, {"section": "Solution", "text": "Is the labour market expanding or contracting? [\u00bd]"}, {"section": "Solution", "text": "[\u00bd mark for relevant alternative points. Max 3 marks in total regarding the nature of employment and demographics in Country B] Country B Population Dynamics What are the demographics of the population? [\u00bd]"}, {"section": "Solution", "text": "Research health indicators / burden of disease in Country B. [\u00bd]"}, {"section": "Solution", "text": "Income Protection Market Research the size of the market / size of the opportunity. [\u00bd]"}, {"section": "Solution", "text": "Are plans typically voluntary or compulsory? [\u00bd]"}, {"section": "Solution", "text": "What product features are typically included [\u00bd]"}, {"section": "Solution", "text": "For example: deferred periods, waiting periods. [\u00bd]"}, {"section": "Solution", "text": "[\u00bd mark for any relevant example] And what definitions are typically used [\u00bd]"}, {"section": "Solution", "text": "For example: own occupation, any occupation. [\u00bd]"}, {"section": "Solution", "text": "[\u00bd mark for any relevant example] Does Company ABC have experience with these types of products? [\u00bd]"}, {"section": "Solution", "text": "Would Company ABC be able to introduce new or unique product features? [\u00bd]"}, {"section": "Solution", "text": "What are the consumer preferences in the market? [\u00bd]"}, {"section": "Solution", "text": "Investigate the competitor landscape. [\u00bd]"}, {"section": "Solution", "text": "Understand whether there are any equivalent benefits paid by the state in Country B. [\u00bd]"}, {"section": "Solution", "text": "Regulatory Landscape Investigate the regulatory landscape. [\u00bd]"}, {"section": "Solution", "text": "Are there any regulatory restrictions? [\u00bd]"}, {"section": "Solution", "text": "For example: restrictions on product design/distributor commission/ charges? [\u00bd]"}, {"section": "Solution", "text": "[\u00bd mark for any relevant example] Understand the capital and solvency requirements [\u00bd]"}, {"section": "Solution", "text": "And reserving requirements. [\u00bd]"}, {"section": "Solution", "text": "Investigate the availability of investments to meet reserving requirements. [\u00bd]"}, {"section": "Solution", "text": "Investigate the availability of fund managers (and/or expertise for in-house management). [\u00bd]"}, {"section": "Solution", "text": "Understand the tax landscape [\u00bd]"}, {"section": "Solution", "text": "For example: are there any tax incentives in Country B for income protection business? [\u00bd]"}, {"section": "Solution", "text": "(\u00bd mark for any relevant example) What are the requirements for profit repatriation, if allowed. [\u00bd]"}, {"section": "Solution", "text": "Sales and Distribution Understand the distribution landscape [\u00bd]"}, {"section": "Solution", "text": "For example, are independent brokers prevalent, [\u00bd]"}, {"section": "Solution", "text": "Or tied agents which may require greater investment and servicing capability. [\u00bd]"}, {"section": "Solution", "text": "General Understand the macro-economic conditions prevalent in Country B. [\u00bd]"}, {"section": "Solution", "text": "Carry out a comparative analysis of Country A versus Country B [\u00bd]"}, {"section": "Solution", "text": "To determine the extent to which knowledge/learnings/data can be utilised across markets. [\u00bd]"}, {"section": "Solution", "text": "Market research will be needed for payments and servicing [\u00bd]"}, {"section": "Solution", "text": "For example, are payroll deductions common for premiums. [\u00bd]"}, {"section": "Solution", "text": "[\u00bd mark for a relevant example] Investigate the availability of reinsurance. [\u00bd]"}, {"section": "Solution", "text": "Investigate the availability of skills resources. [\u00bd]"}, {"section": "Solution", "text": "[Total marks 19, maximum 12]"}]}, {"id": "202504_Q2(ii)", "sitting": "April 2025", "yymmkey": "202504", "ref": "Q2(ii)", "marks": 8, "all_themes": ["Critical Illness", "Income Protection", "Pricing", "Regulation", "Risk Management & Capital"], "products": ["Critical Illness", "Income Protection"], "question_text": "Company XYZ, a local insurer in Country B, writes all categories of health business including income protection, critical illness and health insurance. Company XYZ has been identified as a potential acquisition target.\nCompare the relative merits of acquiring Company XYZ versus purchasing their book of income protection policies.", "scenario": "Company ABC, a successful insurance company in Country A, writes income protection on a group basis. Company ABC has a significant share of the available market and is exploring growth opportunities.\nOne opportunity being considered is expansion to Country B.", "bullets": [{"section": "Solution", "text": "Purchasing Company XYZ Purchasing book of income protection policies Overall Deal \uf0b7 The acquisition price may be attractive [\u00bd]"}, {"section": "Solution", "text": "\uf0b7 Exposure to other lines of business may provide valuable learnings and support future expansion opportunities [\u00bd]"}, {"section": "Solution", "text": "\uf0b7 The pricing of the income protection portfolio versus the full business may be attractive [\u00bd]"}, {"section": "Solution", "text": "\uf0b7 The deal is only focused on one line of business allowing for a pure play of income protection business [\u00bd]"}, {"section": "Solution", "text": "\uf0b7 Company XYZ may not be willing to sell a portion of the portfolio [\u00bd]"}, {"section": "Solution", "text": "\uf0b7 And this presents a cleaner option for customers with multiple policies [\u00bd]"}, {"section": "Solution", "text": "\uf0b7 Or if there have been cross- subsidies across products [\u00bd]"}, {"section": "Solution", "text": "\uf0b7 Company ABC may not want exposure to additional business lines [\u00bd]"}, {"section": "Solution", "text": "\uf0b7 Additional lines of business may have onerous requirements from a capital perspective [\u00bd]"}, {"section": "Solution", "text": "\uf0b7 which could impact the ability to support new business [\u00bd]"}, {"section": "Solution", "text": "\uf0b7 and which could mean lower margins and lower profitability [\u00bd]"}, {"section": "Solution", "text": "Staff and Operations \uf0b7 Can benefit from: o Existing staff [\u00bd]"}, {"section": "Solution", "text": "o Existing systems [\u00bd]"}, {"section": "Solution", "text": "o Existing servicing capability [\u00bd]"}, {"section": "Solution", "text": "\uf0b7 Company ABC may want to hire their own staff [\u00bd]"}, {"section": "Solution", "text": "\uf0b7 And build their own culture [\u00bd]"}, {"section": "Solution", "text": "\uf0b7 There may be substantial benefits from scale which can be realised if a book of business is purchased without the corresponding staff and operations complement [\u00bd]"}, {"section": "Solution", "text": "\uf0b7 Regulation \uf0b7 Can benefit from existing o Insurance licence [\u00bd]"}, {"section": "Solution", "text": "o Regulatory approvals [\u00bd]"}, {"section": "Solution", "text": "\uf0b7 Adding additional lines of business may have onerous regulatory requirements which do not apply to income protection policies [\u00bd]"}, {"section": "Solution", "text": "Distribution \uf0b7 Can benefit from existing distributor relationships [\u00bd]"}, {"section": "Solution", "text": "\uf0b7 Income protection may be sold as an upsell or cross-sell on another policy [\u00bd]"}, {"section": "Solution", "text": "\uf0b7 Adding additional lines of business may have onerous requirements from a distribution perspective [\u00bd]"}, {"section": "Solution", "text": "\uf0b7 For example, training requirements [\u00bd]"}, {"section": "Solution", "text": "Marketing \uf0b7 Can benefit from existing known brand of Company XYZ [\u00bd]"}, {"section": "Solution", "text": "\uf0b7 There may be negative market sentiment affecting Company XYZ. So purchasing income protection book only is better than buying all of Company XYZ [\u00bd]"}]}, {"id": "202504_Q2(iii)", "sitting": "April 2025", "yymmkey": "202504", "ref": "Q2(iii)", "marks": 12, "all_themes": ["Claims Management", "Critical Illness", "Data", "Group Products", "Income Protection", "Pricing", "Regulation", "Reinsurance", "Risk Management & Capital", "Underwriting"], "products": ["Critical Illness", "Income Protection", "Group Products"], "question_text": "The finance director of Company ABC has proposed that alternative growth strategies are considered. Two strategies put forward are:\n\uf0b7 Company XYZ to start selling individual income protection business \uf0b7 Company XYZ to start selling additional health and care insurance lines within Country A.\nDiscuss the merits of each strategy.", "scenario": "Company ABC, a successful insurance company in Country A, writes income protection on a group basis. Company ABC has a significant share of the available market and is exploring growth opportunities.\nOne opportunity being considered is expansion to Country B.", "bullets": [{"section": "Solution", "text": "Merits of Company ABC selling Individual business The product will be broadly similar to the existing product. [\u00bd]"}, {"section": "Solution", "text": "The merits of the strategy will depend on the size of the market. [\u00bd]"}, {"section": "Solution", "text": "If the market is dominated by employers and group products, it may not be material. [\u00bd]"}, {"section": "Solution", "text": "However, if there are a large number of individuals or small businesses that are currently not serviced through the existing products, this may be a viable option. [\u00bd]"}, {"section": "Solution", "text": "There may be less competition which could make the market attractive. [\u00bd]"}, {"section": "Solution", "text": "The distribution strategy is likely to differ so will need to understand the distribution landscape. [\u00bd]"}, {"section": "Solution", "text": "There may be broker houses who serve retail clients who would welcome the product line. [\u00bd]"}, {"section": "Solution", "text": "However, distribution costs may be higher [\u00bd]"}, {"section": "Solution", "text": "Leading to higher product costs. [\u00bd]"}, {"section": "Solution", "text": "Company ABC will need to consider if differential pricing is acceptable between group and individual business [\u00bd]"}, {"section": "Solution", "text": "Or whether any cross-subsidy will be allowed for. [\u00bd]"}, {"section": "Solution", "text": "The product and pricing structure is also likely to differ [\u00bd]"}, {"section": "Solution", "text": "For example, age rating [\u00bd]"}, {"section": "Solution", "text": "Or underwriting is likely to apply. [\u00bd]"}, {"section": "Solution", "text": "This may allow the company to target specific market segments. [\u00bd]"}, {"section": "Solution", "text": "Company ABC will need to consider the impact of processes and systems. [\u00bd]"}, {"section": "Solution", "text": "Claims processes, including claim management, may be the same across both product lines [\u00bd]"}, {"section": "Solution", "text": "And the development cost may be relatively low given existing systems and processes [\u00bd]"}, {"section": "Solution", "text": "Allowing the insurer to benefit from increased scale. [\u00bd]"}, {"section": "Solution", "text": "Reinsurance availability and advice will need to be considered. [\u00bd]"}, {"section": "Solution", "text": "Reinsurers may be able to support product development and pricing which would be useful. [\u00bd]"}, {"section": "Solution", "text": "Existing data is likely to be broadly applicable (with adjustments) to an individual product which will be useful. [\u00bd]"}, {"section": "Solution", "text": "Regulatory and licensing requirements may be important to understand the merits of the strategy. [\u00bd]"}, {"section": "Solution", "text": "Company ABC will need to consider the capital requirement for each product line [\u00bd]"}, {"section": "Solution", "text": "Additional Health and Care insurance lines The merits of this strategy will depend on the size of the market. [\u00bd]"}, {"section": "Solution", "text": "Company ABC will likely first consider if other group products are prevalent [\u00bd]"}, {"section": "Solution", "text": "For example, critical illness. [\u00bd]"}, {"section": "Solution", "text": "This may be an easier expansion route as distribution already in place might be usable [\u00bd]"}, {"section": "Solution", "text": "For example, broker houses servicing employer groups [\u00bd]"}, {"section": "Solution", "text": "Need to consider the systems required [\u00bd]"}, {"section": "Solution", "text": "For example, payroll deduction of premiums [\u00bd]"}, {"section": "Solution", "text": "And processes [\u00bd]"}, {"section": "Solution", "text": "For example, annual premium review processes. [\u00bd]"}, {"section": "Solution", "text": "Will all remain similar across product lines [\u00bd]"}, {"section": "Solution", "text": "(\u00bd mark for reasonable examples given) Company ABC will want to consider what competitors offer. [\u00bd]"}, {"section": "Solution", "text": "If competitors offer a full suite of products, employers may want to select an insurer who can provide an integrated solution. [\u00bd]"}, {"section": "Solution", "text": "Reinsurance availability and advice will need to be considered. [\u00bd]"}, {"section": "Solution", "text": "Reinsurers may be able to support product development and pricing which would be useful. [\u00bd]"}, {"section": "Solution", "text": "Existing data is unlikely to be broadly applicable and this will need to be considered. [\u00bd]"}, {"section": "Solution", "text": "Critical illness and/or [\u00bd]"}, {"section": "Solution", "text": "Hospital cash plans may be relatively easier to launch, [\u00bd]"}, {"section": "Solution", "text": "Although availability of data for pricing will need to be considered, [\u00bd]"}, {"section": "Solution", "text": "Compared to PMI plans [\u00bd]"}, {"section": "Solution", "text": "Which may require hospital, doctor and other networks [\u00bd]"}, {"section": "Solution", "text": "Although these could be outsourced to service providers. [\u00bd]"}, {"section": "Solution", "text": "Regulatory and licensing requirements may be important to understand the merits of the strategy. [\u00bd]"}, {"section": "Solution", "text": "Company ABC will need to consider the capital requirement for each product line. [\u00bd]"}, {"section": "Solution", "text": "[Total marks 23\u00bd, maximum 12]"}]}, {"id": "202504_Q3(iii)", "sitting": "April 2025", "yymmkey": "202504", "ref": "Q3(iii)", "marks": 8, "all_themes": ["Capital & Solvency", "Group Products", "Pricing", "Private Medical Insurance (PMI)", "Reserving & Valuation", "Underwriting"], "products": ["Private Medical Insurance (PMI)", "Group Products"], "question_text": "Discuss the proposal from the perspective of the employer\u2019s staff members.", "scenario": "A large employer provides medical benefits to its staff via an in-house (self-insured)\nscheme. The scheme has the following features:\n\uf0b7 All staff are required to join the scheme.\n\uf0b7 There is one set of benefits available and all staff receive the same benefits.\n\uf0b7 The scheme covers all expenses related to doctor visits, hospital expenses and prescribed medication. Over the counter medication, physiotherapy and alternative medicine are not covered.\n\uf0b7 The scheme has no upfront underwriting and there", "bullets": [{"section": "Solution", "text": "Staff may feel they were getting a benefit which they no longer have access to [\u00bd]"}, {"section": "Solution", "text": "Especially if the cost was not reflected in their monthly salary so the benefit may have felt free. [\u00bd]"}, {"section": "Solution", "text": "If they are required to start paying for medical cover they may be very unhappy [\u00bd]"}, {"section": "Solution", "text": "And may see it as a new cost. [\u00bd]"}, {"section": "Solution", "text": "This may mean that salaries need to increase to take into account the change in structure. [\u00bd]"}, {"section": "Solution", "text": "The scheme may have provided subsidised family members pricing, so there may be greater implications for those wanting cover for family members [\u00bd]"}, {"section": "Solution", "text": "And staff with larger families included on the scheme may have higher expenses if increases in salaries do not take into account subsidies provided. [\u00bd]"}, {"section": "Solution", "text": "However, staff members will be able to select a package depending on their need. [\u00bd]"}, {"section": "Solution", "text": "If pay is increased in line with the average benefit cost, then it is likely that those who select a hospital package will pay less, increasing their take-home pay so this could be popular. [\u00bd]"}, {"section": "Solution", "text": "Conversely, those who require the comprehensive plan will pay more and this may be unpopular. [\u00bd]"}, {"section": "Solution", "text": "The added benefits (dental, optical, traditional medicine) may be popular and valued by some staff members [\u00bd]"}, {"section": "Solution", "text": "But it does mean that a like-for-like package is not available [\u00bd]"}, {"section": "Solution", "text": "And so the change may be resisted or be unpopular. [\u00bd]"}, {"section": "Solution", "text": "As the existing benefit scheme has not been expressly charged to salary, then it may be difficult for employees to evaluate the difference in expenses [\u00bd]"}, {"section": "Solution", "text": "And therefore difficult to evaluate the proposal. [\u00bd]"}, {"section": "Solution", "text": "Those with pre-existing or chronic conditions may be concerned about the cost impact of deductibles on medicines. [\u00bd]"}, {"section": "Solution", "text": "Once insurance has been transferred to an insurer, there may be future changes in plans provided which could negatively impact staff. [\u00bd]"}, {"section": "Solution", "text": "The staff members will now form part of a broader group of policyholders and are likely to lose any influence over benefit design or changes in pricing (which they may have had as a result of the closed scheme). [\u00bd]"}, {"section": "Solution", "text": "Staff members may be concerned that the insurer will not have the same motives as the employer (e.g. attracting staff, industrial relations, paternalism etc.) [\u00bd]"}, {"section": "Solution", "text": "and therefore may be less likely to apply cross-subsidies across membership categories [\u00bd]"}, {"section": "Solution", "text": "Or fund loss-making benefits. [\u00bd]"}, {"section": "Solution", "text": "The insurer may charge higher premiums given the open nature of the scheme and potential for anti-selection. [\u00bd]"}, {"section": "Solution", "text": "The employer would be more protected from this and staff would lose this benefit. [\u00bd]"}, {"section": "Solution", "text": "The insurer may be able to take advantage from economies of scale, network management and can pass this benefit to policyholders. [\u00bd]"}, {"section": "Solution", "text": "There may be a temptation to maximise take home pay by selecting lower health benefits which could negatively affect future cost of provision. [\u00bd]"}, {"section": "Solution", "text": "It is not clear how employees could move from hospital to comprehensive benefits as needs change, again potentially negative future impact. [\u00bd]"}, {"section": "Solution", "text": "It is not clear how the underwriting would be applied; the employer may be more flexible than an insurer. [\u00bd]"}, {"section": "Solution", "text": "Also underwriting will now also be applied to family members joining the scheme. [\u00bd]"}, {"section": "Solution", "text": "Employees may prefer the employer\u2019s scheme as this scheme may have much more discretion about the employees that are allowed to join the scheme, than the insurance company. [\u00bd]"}, {"section": "Solution", "text": "Employees will want the company to negotiate take-over based on current health status [\u00bd]"}, {"section": "Solution", "text": "Otherwise there is substantial risk for those for with pre-existing conditions. [\u00bd]"}, {"section": "Solution", "text": "Addition of family members is no longer restricted to specific events. [\u00bd]"}, {"section": "Solution", "text": "If there are staff employed in the running of the scheme, they may be impacted. [\u00bd]"}, {"section": "Solution", "text": "[Total marks 16 \u00bd, maximum 8]"}]}, {"id": "202504_Q3(v)", "sitting": "April 2025", "yymmkey": "202504", "ref": "Q3(v)", "marks": 6, "all_themes": ["Capital & Solvency", "Group Products", "Pricing", "Private Medical Insurance (PMI)", "Underwriting"], "products": ["Private Medical Insurance (PMI)", "Group Products"], "question_text": "The employer implemented the PMI package from Insurer Z and the new arrangements have been in place for several years. Following an economic downturn, the employer has set an objective to reduce the cost of the PMI package.\nDiscuss the issues that the employer should consider if it decides to reduce the cost of the PMI package.", "scenario": "A large employer provides medical benefits to its staff via an in-house (self-insured)\nscheme. The scheme has the following features:\n\uf0b7 All staff are required to join the scheme.\n\uf0b7 There is one set of benefits available and all staff receive the same benefits.\n\uf0b7 The scheme covers all expenses related to doctor visits, hospital expenses and prescribed medication. Over the counter medication, physiotherapy and alternative medicine are not covered.\n\uf0b7 The scheme has no upfront underwriting and there", "bullets": [{"section": "Solution", "text": "The insurer plans have been in place for several years. [\u00bd]"}, {"section": "Solution", "text": "The implementation of the insurance plans could have followed: An approach where employees are paid on a cost-to-company basis, meaning that a total package is paid and employees effectively fund the PMI benefit [\u00bd]"}, {"section": "Solution", "text": "In which case the desire to reduce cost is likely to ensure that take-home pay for employees can be increased [\u00bd]"}, {"section": "Solution", "text": "Or the employer continued paying a basic salary plus medical benefits with the cost of the benefits being made visible to the staff but not impacting their salary [\u00bd]"}, {"section": "Solution", "text": "In which case, the desire to reduce cost is likely to cut company expenses. [\u00bd]"}, {"section": "Solution", "text": "The employer will have a range of options available to reduce the costs. [\u00bd]"}, {"section": "Solution", "text": "If the cost of PMI is visible to staff, but effectively employer funded: The employer will need to decide how much it needs to save as this will drive how significant the action it needs to take. [\u00bd]"}, {"section": "Solution", "text": "The most extreme option would be if the employer decided to not offer any PMI benefits at all in future [\u00bd]"}, {"section": "Solution", "text": "but stopping PMI benefits could increase staff turnover as employees are likely to value PMI benefits [\u00bd]"}, {"section": "Solution", "text": "and it may be the best employees that leave if they can get jobs that have PMI coverage elsewhere. [\u00bd]"}, {"section": "Solution", "text": "PMI benefits could continue to be offered to existing employees but not new employees [\u00bd]"}, {"section": "Solution", "text": "which will reduce costs but could make the employer less attractive to new employees. [\u00bd]"}, {"section": "Solution", "text": "It could also create ill feeling between different cohorts of employees. [\u00bd]"}, {"section": "Solution", "text": "The employer could offer employees an increase in their salary for individuals to go and buy PMI benefits elsewhere. [\u00bd]"}, {"section": "Solution", "text": "Provided the increase in salary was less than what the employer was paying for PMI coverage this will reduce costs for the employer. [\u00bd]"}, {"section": "Solution", "text": "It may not be very cost effective to do this as there are likely to be economies of scale for the employer to get PMI coverage for its employees, rather than each employee buying their own individual insurance policy. [\u00bd]"}, {"section": "Solution", "text": "There could be tax disadvantages of paying for PMI benefits through additional salary. [\u00bd]"}, {"section": "Solution", "text": "If the cost of PMI is effectively employee funded: The employer could look to introduce a subsidy to limit the cost of PMI coverage [\u00bd]"}, {"section": "Solution", "text": "But then it will need to introduce admin arrangements to collect the employees\u2019 share of the cost. [\u00bd]"}, {"section": "Solution", "text": "The employer could look to reduce cost of the PMI package with the Insurer Z. [\u00bd]"}, {"section": "Solution", "text": "The employer could look to rebroke the PMI package with a expected.\n\nSAI S2025-5", "scenario": "Company A is a large health and care insurance company in Country Z. Company A specialises in, and sells large volumes of, individual Critical Illness (CI) business.", "bullets": []}, {"id": "202509_Q3(ii)", "sitting": "September 2025", "yymmkey": "202509", "ref": "Q3(ii)", "marks": 8, "all_themes": ["Critical Illness", "Pricing"], "products": ["Critical Illness"], "question_text": "Discuss why the asset share may be greater than expected on longer duration policies.  The economy in Country Z has been in recession for the last 5 years. This economic environment has placed downward pressure on premiums across all health and care insurance products. Reviewable premiums have replaced guaranteed premiums as the industry norm for new CI business sold in Country Z.", "scenario": "Company A is a large health and care insurance company in Country Z. Company A specialises in, and sells large volumes of, individual Critical Illness (CI) business.", "bullets": []}, {"id": "202509_Q3(iii)", "sitting": "September 2025", "yymmkey": "202509", "ref": "Q3(iii)", "marks": 5, "all_themes": ["Critical Illness", "Investments", "Pricing"], "products": ["Critical Illness"], "question_text": "Explain why insurance companies may have adopted reviewable premiums for new CI business sold in Country Z.  Recently, Company A has made the following changes: \u2022 new CI business will be written exclusively on a reviewable premium basis  the investment strategy for the assets backing CI business has been updated.", "scenario": "Company A is a large health and care insurance company in Country Z. Company A specialises in, and sells large volumes of, individual Critical Illness (CI) business.", "bullets": []}, {"id": "202509_Q3(iv)", "sitting": "September 2025", "yymmkey": "202509", "ref": "Q3(iv)", "marks": 5, "all_themes": ["Critical Illness", "Investments", "Risk Management & Capital"], "products": ["Critical Illness"], "question_text": "Justify why Company A has updated its investment strategy.  The chief investment officer of Company A has asked for additional resources to carry out the work to implement the updated investment strategy.", "scenario": "Company A is a large health and care insurance company in Country Z. Company A specialises in, and sells large volumes of, individual Critical Illness (CI) business.", "bullets": []}, {"id": "202509_Q3(v)", "sitting": "September 2025", "yymmkey": "202509", "ref": "Q3(v)", "marks": 7, "all_themes": ["Critical Illness", "Investments"], "products": ["Critical Illness"], "question_text": "Outline the tasks Company A will need to undertake as part of implementing the updated investment strategy.", "scenario": "Company A is a large health and care insurance company in Country Z. Company A specialises in, and sells large volumes of, individual Critical Illness (CI) business.", "bullets": []}];

// Collect all unique values
const allProducts = [...new Set(DATA.flatMap(d => d.products))].sort();
const allThemes = [...new Set(DATA.flatMap(d => d.all_themes))].sort();
const allSittings = [...new Set(DATA.map(d => d.sitting))];

// Filter state
let state = {
  products: new Set(),
  themes: new Set(),
  sittings: new Set(),
  minMarks: 1,
  search: '',
};

function buildFilters() {
  // Products
  const pf = document.getElementById('product-filters');
  allProducts.forEach(p => {
    const label = document.createElement('label');
    label.className = 'filter-btn filter-group';
    label.dataset.type = 'product';
    label.dataset.val = p;
    label.innerHTML = `<input type="checkbox" value="${p}"> ${p}`;
    label.querySelector('input').addEventListener('change', e => {
      if (e.target.checked) state.products.add(p); else state.products.delete(p);
      updateFilterActive(label, e.target.checked);
      render();
    });
    pf.appendChild(label);
  });
  
  // Themes
  const tf = document.getElementById('theme-filters');
  const pricingThemes = ['Pricing', 'Pricing & Rating'];
  const coreThemes = allThemes.filter(t => !['Private Medical Insurance (PMI)', 'Critical Illness', 'Income Protection', 'Long-Term Care (LTC)', 'Group Products'].includes(t));
  coreThemes.forEach(t => {
    const label = document.createElement('label');
    label.className = 'filter-btn filter-group';
    label.dataset.type = 'theme';
    label.dataset.val = t;
    const isPricing = pricingThemes.includes(t);
    label.innerHTML = `<input type="checkbox" value="${t}"> ${t}${isPricing ? ' ★' : ''}`;
    label.querySelector('input').addEventListener('change', e => {
      if (e.target.checked) state.themes.add(t); else state.themes.delete(t);
      updateFilterActive(label, e.target.checked);
      render();
    });
    tf.appendChild(label);
  });
  
  // Sittings
  const sf = document.getElementById('sitting-filters');
  allSittings.forEach(s => {
    const label = document.createElement('label');
    label.className = 'filter-btn filter-group';
    label.dataset.type = 'sitting';
    label.dataset.val = s;
    label.innerHTML = `<input type="checkbox" value="${s}"> ${s}`;
    label.querySelector('input').addEventListener('change', e => {
      if (e.target.checked) state.sittings.add(s); else state.sittings.delete(s);
      updateFilterActive(label, e.target.checked);
      render();
    });
    sf.appendChild(label);
  });
  
  // Marks slider
  document.getElementById('marks-slider').addEventListener('input', e => {
    state.minMarks = parseInt(e.target.value);
    document.getElementById('marks-val').textContent = state.minMarks + '+';
    render();
  });
  
  // Search
  document.getElementById('search-box').addEventListener('input', e => {
    state.search = e.target.value.toLowerCase();
    render();
  });
}

function updateFilterActive(label, active) {
  if (active) label.classList.add('active');
  else label.classList.remove('active');
}

function getFiltered() {
  let results = DATA;
  if (state.products.size > 0) {
    results = results.filter(d => d.products.some(p => state.products.has(p)));
  }
  if (state.themes.size > 0) {
    results = results.filter(d => d.all_themes.some(t => state.themes.has(t)));
  }
  if (state.sittings.size > 0) {
    results = results.filter(d => state.sittings.has(d.sitting));
  }
  results = results.filter(d => d.marks >= state.minMarks);
  if (state.search) {
    results = results.filter(d => 
      d.question_text.toLowerCase().includes(state.search) ||
      d.sitting.toLowerCase().includes(state.search) ||
      d.all_themes.some(t => t.toLowerCase().includes(state.search))
    );
  }
  return results;
}

function sortResults(results) {
  const sort = document.getElementById('sort-select').value;
  if (sort === 'marks-desc') return [...results].sort((a,b) => b.marks - a.marks);
  if (sort === 'marks-asc') return [...results].sort((a,b) => a.marks - b.marks);
  return results; // chrono = original order
}

function parseBulletMarks(text) {
  const m = text.match(/\[(\d+(?:\.\d+)?)\]$/);
  return m ? m[1] : null;
}

function stripMarks(text) {
  return text.replace(/\[\d+(?:\.\d+)?\]$/, '').trim();
}

function render() {
  const filtered = sortResults(getFiltered());
  const totalMarks = filtered.reduce((s, d) => s + d.marks, 0);
  const uniqueSittings = new Set(filtered.map(d => d.sitting)).size;
  
  document.getElementById('stat-shown').textContent = filtered.length;
  document.getElementById('stat-marks').textContent = totalMarks;
  document.getElementById('stat-sittings').textContent = uniqueSittings;
  document.getElementById('results-count').textContent = `Showing ${filtered.length} of ${DATA.length} question parts`;
  
  const list = document.getElementById('results-list');
  const noRes = document.getElementById('no-results');
  
  if (filtered.length === 0) {
    list.innerHTML = '';
    noRes.style.display = 'block';
    return;
  }
  noRes.style.display = 'none';
  
  list.innerHTML = filtered.map(d => {
    const productTags = d.products.map(p => `<span class="tag product">${p}</span>`).join('');
    const otherTags = d.all_themes
      .filter(t => !d.products.includes(t))
      .filter(t => ['Pricing', 'Pricing & Rating', 'Underwriting', 'Data', 'Claims Management', 'Reinsurance', 'Models'].includes(t))
      .map(t => `<span class="tag ${['Pricing','Pricing & Rating'].includes(t)?'pricing-tag':''}">${t}</span>`).join('');
    
    const scenarioHtml = d.scenario ? `
      <div class="scenario-box">
        <div class="scenario-label">Scenario Context</div>
        ${d.scenario.length > 300 ? d.scenario.substring(0,300)+'…' : d.scenario}
      </div>` : '';
    
    const bulletsHtml = d.bullets.map(b => {
      const marks = parseBulletMarks(b.text);
      const text = stripMarks(b.text);
      return `<div class="bullet"><span class="bullet-dot">▸</span><span style="flex:1">${text}</span>${marks ? `<span class="bullet-marks">[${marks}]</span>` : ''}</div>`;
    }).join('');
    
    return `<div class="card" id="card-${d.id}">
      <div class="card-header" onclick="toggleCard('${d.id}')">
        <div>
          <span class="card-ref">${d.ref}</span>
          <span class="card-sitting"> ${d.sitting}</span>
          <div class="card-q" id="q-${d.id}">${d.question_text || '(see scenario)'}</div>
          <div class="tags">${productTags}${otherTags}</div>
        </div>
        <span class="card-marks">${d.marks}m</span>
        <span class="expand-icon">▶</span>
      </div>
      <div class="card-body">
        ${scenarioHtml}
        <div class="full-q">${d.question_text}</div>
        <div class="bullets-section">
          <div class="bullets-label">Examiner Solution (${d.bullets.length} points)</div>
          ${bulletsHtml}
        </div>
      </div>
    </div>`;
  }).join('');
}

function toggleCard(id) {
  const card = document.getElementById('card-' + id);
  const wasOpen = card.classList.contains('open');
  card.classList.toggle('open', !wasOpen);
  const q = document.getElementById('q-' + id);
  if (q) q.classList.toggle('expanded', !wasOpen);
}

function resetFilters() {
  state = { products: new Set(), themes: new Set(), sittings: new Set(), minMarks: 1, search: '' };
  document.getElementById('search-box').value = '';
  document.getElementById('marks-slider').value = 1;
  document.getElementById('marks-val').textContent = '1+';
  document.querySelectorAll('.filter-btn').forEach(l => {
    l.classList.remove('active');
    const inp = l.querySelector('input');
    if (inp) inp.checked = false;
  });
  render();
}

buildFilters();
render();
</script>
