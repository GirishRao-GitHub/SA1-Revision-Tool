<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SA1 Knowledge Search</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');

:root {
  --bg: #0d0f14;
  --surface: #151923;
  --surface2: #1c2230;
  --surface3: #242b3d;
  --border: #2a324b;
  --border2: #363f5f;
  --text: #e2e4ed;
  --text2: #949ebf;
  --text3: #565f80;
  --accent: #8b5cf6;
  --accent2: #7c3aed;
  --accentbg: #221a3a;
  --green: #2ecc71;
  --greenbg: #0d2a1a;
  --amber: #f1c40f;
  --amberbg: #2a240a;
  --red: #e74c3c;
  --redbg: #2a0f0f;
  --radius: 6px;
  --radius2: 10px;
  --mono: 'IBM Plex Mono', monospace;
  --sans: 'IBM Plex Sans', sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{min-height:100%;font-family:var(--sans);background:var(--bg);color:var(--text);}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
.logo{font-family:var(--mono);font-weight:600;font-size:15px;color:var(--accent);letter-spacing:.05em;}
.logo span{color:var(--text3);font-weight:400;}
.tagline{font-size:12px;color:var(--text3);font-family:var(--mono);margin-top:2px;}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.api-key-wrap{display:flex;align-items:center;gap:6px;}
.api-key-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;white-space:nowrap;}
.api-key-input{font-family:var(--mono);font-size:11px;padding:5px 10px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface2);color:var(--text);width:200px;transition:border-color .2s;}
.api-key-input:focus{outline:none;border-color:var(--accent);}
.key-status{font-size:11px;font-family:var(--mono);padding:3px 8px;border-radius:4px;white-space:nowrap;}
.key-status.set{background:var(--greenbg);color:var(--green);}
.key-status.unset{background:var(--amberbg);color:var(--amber);}
.back-btn{font-family:var(--mono);font-size:11px;font-weight:600;padding:4px 10px;border-radius:4px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);cursor:pointer;text-decoration:none;transition:all .2s;white-space:nowrap;}
.back-btn:hover{background:var(--surface3);color:var(--text);}
.load-status{font-size:11px;font-family:var(--mono);color:var(--text3);padding:3px 8px;border-radius:4px;background:var(--surface2);border:1px solid var(--border);white-space:nowrap;}
.main{max-width:1280px;margin:0 auto;padding:24px 20px;}
.search-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius2);padding:20px 24px;margin-bottom:16px;}
.search-row{display:flex;gap:10px;align-items:center;}
.search-input{flex:1;padding:10px 14px;font-family:var(--sans);font-size:14px;border:1.5px solid var(--border);border-radius:var(--radius);background:var(--bg);color:var(--text);transition:border-color .2s;}
.search-input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accentbg);}
.search-btn{padding:10px 20px;font-family:var(--sans);font-size:13px;font-weight:600;border-radius:var(--radius);border:none;background:var(--accent);color:#fff;cursor:pointer;transition:background .2s;white-space:nowrap;}
.search-btn:hover{background:var(--accent2);}
.filters{display:flex;gap:6px;flex-wrap:wrap;margin-top:12px;align-items:center;}
.filter-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-right:2px;}
.filter-btn{font-size:11px;font-weight:500;padding:3px 10px;border-radius:20px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);cursor:pointer;transition:all .2s;}
.filter-btn:hover{border-color:var(--accent);color:var(--accent);}
.filter-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.status-bar{font-size:12px;color:var(--text3);font-family:var(--mono);padding:6px 0 14px;}
.status-bar b{color:var(--accent);font-weight:500;}
.content-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;align-items:start;}
@media(max-width:960px){.content-grid{grid-template-columns:1fr;}}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius2);overflow:hidden;}
.panel-header{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--surface2);}
.panel-title{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;}
.panel-count{font-family:var(--mono);font-size:11px;color:var(--text3);}
.panel-body{max-height:620px;overflow-y:auto;}
.result-item{border-bottom:1px solid var(--border);cursor:default;display:flex;flex-direction:column;}
.result-item:last-child{border-bottom:none;}
.result-top{display:flex;gap:10px;align-items:flex-start;padding:12px 16px;cursor:pointer;transition:background .12s;}
.result-top:hover{background:var(--surface2);}
.result-item.selected .result-top{background:var(--accentbg);border-left:3px solid var(--accent);padding-left:13px;}
.result-meta-row{display:flex;align-items:center;gap:6px;margin-bottom:4px;}
.expand-toggle{margin-left:auto;background:none;border:1px solid var(--border);border-radius:3px;color:var(--text3);font-size:9px;font-family:var(--mono);font-weight:600;padding:1px 6px;cursor:pointer;transition:all .15s;white-space:nowrap;flex-shrink:0;}
.expand-toggle:hover{color:var(--accent);border-color:var(--accent);}
.expand-toggle.open{color:var(--accent);border-color:var(--accent);background:var(--accentbg);}
.result-expand{display:none;border-top:1px solid var(--border);background:var(--bg);padding:12px 16px 16px 42px;font-size:12px;}
.result-expand.open{display:block;}
.exp-block{margin-bottom:14px;}
.exp-block:last-child{margin-bottom:0;}
.exp-label{font-family:var(--mono);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--accent);margin-bottom:6px;}
.exp-text{color:var(--text2);font-size:12px;line-height:1.7;}
.exp-sec-title{font-family:var(--mono);font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin:8px 0 4px;}
.exp-bullets{list-style:none;padding:0;display:flex;flex-direction:column;gap:3px;}
.exp-bullets li{padding:2px 0 2px 14px;color:var(--text2);position:relative;line-height:1.6;}
.exp-bullets li::before{content:'·';position:absolute;left:3px;color:var(--text3);}
.exp-qa-item{border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:8px;}
.exp-qa-item:last-child{margin-bottom:0;}
.exp-qa-q{background:var(--surface2);padding:8px 10px;color:var(--text);font-weight:500;font-size:12px;line-height:1.6;}
.exp-qa-a{padding:8px 10px;color:var(--text2);border-top:1px solid var(--border);font-size:12px;line-height:1.7;white-space:pre-wrap;}
.exp-empty{color:var(--text3);font-style:italic;font-size:11px;font-family:var(--mono);}
.result-cb{margin-top:3px;width:14px;height:14px;accent-color:var(--accent);flex-shrink:0;cursor:pointer;}
.result-meta{flex:1;min-width:0;}
.result-source{font-family:var(--mono);font-size:10px;font-weight:600;padding:2px 6px;border-radius:3px;display:inline-block;margin-bottom:4px;border:1px solid transparent;}
.src-ifoa{background:#1a222a;color:#60a5fa;border-color:#60a5fa;}
.src-iai{background:#1a2a22;color:#34d399;border-color:#34d399;}
.src-sp1pq{background:#221a2a;color:#a78bfa;border-color:#a78bfa;}
.src-sa1pq{background:#2a200a;color:#fbbf24;border-color:#fbbf24;}
.src-assignment{background:#2a1a1a;color:#f87171;border-color:#f87171;}
.src-frameworks{background:var(--surface3);color:var(--text2);border-color:var(--border2);}
.src-sp1notes{background:#1e1a2a;color:#c4b5fd;border-color:#c4b5fd;}
.src-sa1notes{background:#2a1a10;color:#fb923c;border-color:#fb923c;}
.result-label{font-size:13px;font-weight:500;color:var(--text);margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.result-sitting{font-size:11px;color:var(--text3);margin-bottom:3px;font-family:var(--mono);}
.result-snippet{font-size:12px;color:var(--text2);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.result-marks{font-family:var(--mono);font-size:10px;color:var(--text3);margin-top:3px;}
.empty-state{padding:48px 24px;text-align:center;color:var(--text3);}
.empty-icon{font-size:28px;margin-bottom:8px;}
.empty-text{font-size:13px;}
.claude-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius2);overflow:hidden;}
.claude-header{padding:12px 16px;border-bottom:1px solid var(--border);background:var(--surface2);display:flex;align-items:center;justify-content:space-between;gap:10px;}
.claude-title{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;}
.selected-count{font-family:var(--mono);font-size:11px;color:var(--text3);}
.claude-body{padding:16px;display:flex;flex-direction:column;gap:10px;}
.claude-question{width:100%;padding:10px 14px;font-family:var(--sans);font-size:13px;border:1.5px solid var(--border);border-radius:var(--radius);background:var(--bg);color:var(--text);resize:vertical;min-height:80px;transition:border-color .2s;}
.claude-question:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accentbg);}
.claude-actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.ask-btn{padding:8px 18px;font-family:var(--sans);font-size:13px;font-weight:600;border-radius:var(--radius);border:none;background:var(--accent);color:#fff;cursor:pointer;transition:background .2s;}
.ask-btn:hover{background:var(--accent2);}
.ask-btn:disabled{opacity:.4;cursor:default;}
.sm-btn{padding:7px 12px;font-size:12px;font-weight:500;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface2);color:var(--text2);cursor:pointer;transition:all .2s;}
.sm-btn:hover{background:var(--surface3);color:var(--text);}
.claude-hint{font-size:11px;color:var(--text3);font-style:italic;font-family:var(--mono);}
.response-wrap{display:none;flex-direction:column;gap:8px;}
.response-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);font-family:var(--mono);}
.claude-response{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:14px;font-size:13px;line-height:1.75;color:var(--text);white-space:pre-wrap;max-height:520px;overflow-y:auto;}
.claude-response.streaming{border-color:var(--accent);}
.response-actions{display:flex;gap:6px;}
.copy-btn{font-size:11px;padding:4px 10px;border-radius:4px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);cursor:pointer;font-family:var(--mono);}
.copy-btn:hover{background:var(--surface3);color:var(--text);}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:10px;}
</style>
</head>
<body>

<div class="topbar">
  <div>
    <div class="logo">SA1 <span>/</span> Knowledge Search</div>
    <div class="tagline">Search across all sources · Ask Claude for deeper answers</div>
  </div>
  <div class="topbar-right">
    <div id="load-status" class="load-status">Loading…</div>
    <div class="api-key-wrap">
      <span class="api-key-label">API Key</span>
      <input type="password" class="api-key-input" id="api-key" placeholder="sk-ant-…" oninput="saveKey(this.value)" autocomplete="off"/>
      <span class="key-status unset" id="key-status">Not set</span>
    </div>
    <a href="SA1ity_Check.html" class="back-btn">← SA1ity Check</a>
  </div>
</div>

<div class="main">
  <div class="search-section">
    <div class="search-row">
      <input type="text" class="search-input" id="search-input" placeholder="Search questions, solutions, notes, frameworks… e.g. anti-selection, LTC, IRDAI, reinsurance"/>
      <button class="search-btn" onclick="doSearch()">Search</button>
    </div>
    <div class="filters">
      <span class="filter-label">Sources:</span>
      <button class="filter-btn active" data-src="ALL" onclick="toggleFilter(this)">All</button>
      <button class="filter-btn" data-src="ifoa" onclick="toggleFilter(this)">IFoA Exams</button>
      <button class="filter-btn" data-src="iai" onclick="toggleFilter(this)">IAI Exams</button>
      <button class="filter-btn" data-src="sp1pq" onclick="toggleFilter(this)">SP1 PQ</button>
      <button class="filter-btn" data-src="sa1pq" onclick="toggleFilter(this)">SA1 PQ</button>
      <button class="filter-btn" data-src="assignment" onclick="toggleFilter(this)">Assignments</button>
      <button class="filter-btn" data-src="frameworks" onclick="toggleFilter(this)">Frameworks</button>
      <button class="filter-btn" data-src="sp1notes" onclick="toggleFilter(this)">SP1 Notes</button>
      <button class="filter-btn" data-src="sa1notes" onclick="toggleFilter(this)">SA1 Notes</button>
    </div>
  </div>

  <div class="status-bar" id="status-bar">Loading data files…</div>

  <div class="content-grid">
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">Results</span>
        <span class="panel-count" id="results-count">—</span>
      </div>
      <div class="panel-body" id="results-body">
        <div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-text">Enter a keyword to begin</div></div>
      </div>
    </div>

    <div class="claude-panel">
      <div class="claude-header">
        <span class="claude-title">Ask Claude</span>
        <span class="selected-count" id="selected-count">0 items selected</span>
      </div>
      <div class="claude-body">
        <textarea class="claude-question" id="claude-question" placeholder="Ask a question about the selected results…&#10;e.g. What are the consistent examiner expectations on this topic? How does IAI examine this differently from IFoA?"></textarea>
        <div class="claude-actions">
          <button class="ask-btn" id="ask-btn" onclick="askClaude()" disabled>Ask Claude</button>
          <button class="sm-btn" onclick="selectAll()">Select all</button>
          <button class="sm-btn" onclick="clearSelection()">Clear</button>
        </div>
        <div class="claude-hint" id="claude-hint">Select results on the left, then ask Claude a question about them.</div>
        <div class="response-wrap" id="response-wrap">
          <div class="response-label">Claude's Answer</div>
          <div class="claude-response" id="claude-response"></div>
          <div class="response-actions">
            <button class="copy-btn" onclick="copyResponse()">Copy</button>
            <button class="copy-btn" onclick="clearResponse()">Clear</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// ─── FILE CONFIG ───────────────────────────────────────────────────────────
const SOURCE_FILES = {
  ifoa:       ['201904','201909','202004','202009','202104','202109','202204','202209','202304','202309','202404','202409','202504','202509'],
  iai:        ['iai_1115','iai_0416','iai_0916','iai_0317','iai_0917','iai_0318','iai_0918','iai_0619','iai_1119','iai_1120','iai_0321','iai_0921','iai_0322','iai_0722','iai_1222','iai_0523','iai_1123','iai_0524','iai_1124','iai_0525','iai_1125'],
  assignment: ['X1','X2','X3','X4','X5','X6'],
  sp1pq:      ['Ch00','Ch01','Ch02','Ch03','Ch04','Ch05'],
  sa1pq:      ['sa1_pq_sample']
};
const NOTE_FILES     = { sp1notes: 'SP1_Revision_Notes', sa1notes: 'SA1_Revision_Notes' };
const FRAMEWORK_FILE = 'Topic_Frameworks';

// ─── STATE ─────────────────────────────────────────────────────────────────
let ALL_DATA      = [];
let lastResults   = [];
let selectedItems = [];
let loadedCount   = 0;
let activeFilters = new Set(['ALL']);

// ─── INIT ──────────────────────────────────────────────────────────────────
window.onload = async function() {
  const saved = localStorage.getItem('sa1_search_apikey') || '';
  if (saved) { document.getElementById('api-key').value = saved; updateKeyStatus(saved); }
  ['api-key','claude-question'].forEach(id =>
    document.getElementById(id).addEventListener('keydown', e => e.stopPropagation())
  );
  document.getElementById('search-input').addEventListener('keydown', e => { if(e.key==='Enter') doSearch(); });

  // Exam sittings — IFoA, IAI, Assignment, SP1 PQ, SA1 PQ
  // Shape: { label, questions: { Qk: { label?, marks, scenario?, question?|parts?, sections?, themes?, synopsis? } } }
  for (const [src, files] of Object.entries(SOURCE_FILES)) {
    for (const f of files) {
      try {
        const res = await fetch(`data/${f}.json?t=${Date.now()}`);
        if (!res.ok) continue;
        ingestSitting(src, f, await res.json());
        loadedCount++;
      } catch(e) { console.warn('Skip:', f); }
    }
  }

  // Revision Notes — SP1 & SA1
  // Shape: { "chKey": { exam, chapter, title, sections: [ { id, title, subsections: [ { id, title, bullets[], key_terms[], exam_qa[] } ] } ] } }
  for (const [src, f] of Object.entries(NOTE_FILES)) {
    try {
      const res = await fetch(`data/${f}.json?t=${Date.now()}`);
      if (!res.ok) continue;
      ingestRevisionNotes(src, f, await res.json());
      loadedCount++;
    } catch(e) { console.warn('Skip notes:', f); }
  }

  // Topic Frameworks
  // Shape: { "TopicName": { _meta: { pillar, ... }, content: [ { type, text, bold? } ] } }
  try {
    const res = await fetch(`data/${FRAMEWORK_FILE}.json?t=${Date.now()}`);
    if (res.ok) { ingestFrameworks(await res.json()); loadedCount++; }
  } catch(e) { console.warn('Skip frameworks'); }

  document.getElementById('load-status').textContent = `${loadedCount} files loaded`;
  document.getElementById('status-bar').innerHTML = `Ready. <b>${ALL_DATA.length}</b> searchable records across <b>${loadedCount}</b> files.`;
};

// ─── INGESTION: SITTING FILES ──────────────────────────────────────────────
function ingestSitting(src, fileKey, data) {
  if (!data || !data.questions) return;
  const sittingLabel = data.label || fileKey;
  for (const [qk, qv] of Object.entries(data.questions)) {
    if (qv.parts) {
      for (const [pk, pv] of Object.entries(qv.parts)) {
        ALL_DATA.push({
          src, fileKey, sittingLabel,
          qk, pk,
          label: `${qv.label || qk} — Part ${pk}`,
          snippet: pv.question || qv.label || '',
          marks: pv.marks || 0,
          themes: pv.themes || qv.themes || [],
          searchText: makeSittingSearch(pv, qv),
          raw: { sitting: sittingLabel, questionKey: qk, partKey: pk, question: qv, partData: pv }
        });
      }
    } else {
      ALL_DATA.push({
        src, fileKey, sittingLabel,
        qk, pk: null,
        label: qv.label || qk,
        snippet: qv.question || qv.label || '',
        marks: qv.marks || 0,
        themes: qv.themes || [],
        searchText: makeSittingSearch(qv, null),
        raw: { sitting: sittingLabel, questionKey: qk, question: qv }
      });
    }
  }
}

function makeSittingSearch(q, parent) {
  return [
    parent?.label || '', parent?.scenario || '', (parent?.themes||[]).join(' '),
    q.question || '', q.synopsis || '', (q.themes||[]).join(' '),
    q.sections ? Object.entries(q.sections).map(([k,v])=> k+' '+(Array.isArray(v)?v.join(' '):'')).join(' ') : ''
  ].join(' ').toLowerCase();
}

// ─── INGESTION: REVISION NOTES ─────────────────────────────────────────────
function ingestRevisionNotes(src, fileKey, data) {
  const srcLabel = src === 'sp1notes' ? 'SP1 Revision Notes' : 'SA1 Revision Notes';
  for (const [chKey, ch] of Object.entries(data)) {
    const chTitle = ch.title || chKey;
    for (const sec of (ch.sections || [])) {
      const secTitle = sec.title || sec.id || '';
      for (const sub of (sec.subsections || [])) {
        const subTitle = sub.title || sub.id || '';
        const bullets  = (sub.bullets   || []).join(' ');
        const terms    = (sub.key_terms  || []).map(t=>`${t.term} ${t.definition}`).join(' ');
        const qa       = (sub.exam_qa    || []).map(q=>`${q.q} ${q.a}`).join(' ');
        ALL_DATA.push({
          src, fileKey, sittingLabel: srcLabel,
          qk: `${chKey}_${sec.id}_${sub.id}`, pk: null,
          label: `${chTitle} › ${secTitle} › ${subTitle}`,
          snippet: sub.bullets?.[0] || subTitle,
          marks: 0, themes: [],
          searchText: `${chTitle} ${secTitle} ${subTitle} ${bullets} ${terms} ${qa}`.toLowerCase(),
          raw: { source: srcLabel, chapter: chTitle, section: secTitle, subsection: subTitle,
                 bullets: sub.bullets||[], key_terms: sub.key_terms||[], exam_qa: sub.exam_qa||[] }
        });
      }
    }
  }
}

// ─── INGESTION: TOPIC FRAMEWORKS ───────────────────────────────────────────
function ingestFrameworks(data) {
  for (const [topic, val] of Object.entries(data)) {
    const contentText = (val.content||[]).map(c=>(c.bold?c.bold+' ':'')+( c.text||'')).join(' ');
    ALL_DATA.push({
      src: 'frameworks', fileKey: FRAMEWORK_FILE, sittingLabel: 'Topic Frameworks',
      qk: topic, pk: null,
      label: topic,
      snippet: contentText.slice(0,120),
      marks: 0, themes: [],
      searchText: `${topic} ${val._meta?.pillar||''} ${contentText}`.toLowerCase(),
      raw: { topic, meta: val._meta||{}, content: val.content||[] }
    });
  }
}

// ─── SEARCH ────────────────────────────────────────────────────────────────
function doSearch() {
  const query = document.getElementById('search-input').value.trim().toLowerCase();
  if (!query) return;
  const terms = query.split(/\s+/).filter(t=>t.length>1);
  if (!terms.length) return;
  const useSrc = !activeFilters.has('ALL');
  lastResults = ALL_DATA.filter(item => {
    if (useSrc && !activeFilters.has(item.src)) return false;
    return terms.every(t => item.searchText.includes(t) || item.label.toLowerCase().includes(t));
  });
  renderResults(lastResults);
  document.getElementById('status-bar').innerHTML = `Found <b>${lastResults.length}</b> results for "<b>${escHtml(query)}</b>"`;
  document.getElementById('results-count').textContent = `${lastResults.length} results`;
}

// ─── RENDER ────────────────────────────────────────────────────────────────
function renderResults(results) {
  const body = document.getElementById('results-body');
  if (!results.length) {
    body.innerHTML = `<div class="empty-state"><div class="empty-icon">🤔</div><div class="empty-text">No results. Try different keywords.</div></div>`;
    return;
  }
  body.innerHTML = '';
  results.forEach((item, idx) => {
    const div = document.createElement('div');
    div.className = 'result-item' + (selectedItems.includes(item) ? ' selected' : '');
    div.dataset.idx = idx;
    const snippet = item.snippet ? (item.snippet.length > 110 ? item.snippet.slice(0,110)+'…' : item.snippet) : '';
    const canExpand = hasExpandContent(item);
    div.innerHTML = `
      <div class="result-top">
        <input type="checkbox" class="result-cb" ${selectedItems.includes(item)?'checked':''}>
        <div class="result-meta">
          <div class="result-meta-row">
            <span class="result-source src-${item.src}">${getSrcLabel(item.src)}</span>
            ${canExpand ? `<button class="expand-toggle" title="View scenario / Q&amp;A">▶ View</button>` : ''}
          </div>
          <div class="result-sitting">${escHtml(item.sittingLabel)}</div>
          <div class="result-label" title="${escHtml(item.label)}">${escHtml(item.label)}</div>
          <div class="result-snippet">${escHtml(snippet)}</div>
          ${item.marks ? `<div class="result-marks">${item.marks} marks</div>` : ''}
        </div>
      </div>
      <div class="result-expand"></div>`;

    const top       = div.querySelector('.result-top');
    const cb        = div.querySelector('.result-cb');
    const toggleBtn = div.querySelector('.expand-toggle');
    const expandDiv = div.querySelector('.result-expand');

    top.addEventListener('click', e => {
      if (e.target === cb || e.target === toggleBtn) return;
      cb.checked = !cb.checked;
      toggleSelect(idx, cb.checked);
    });
    cb.addEventListener('change', e => toggleSelect(idx, e.target.checked));

    if (toggleBtn) {
      toggleBtn.addEventListener('click', e => {
        e.stopPropagation();
        const isOpen = expandDiv.classList.toggle('open');
        toggleBtn.classList.toggle('open', isOpen);
        toggleBtn.textContent = isOpen ? '▼ Hide' : '▶ View';
        if (isOpen && !expandDiv.dataset.built) {
          expandDiv.innerHTML = buildExpandContent(item);
          expandDiv.dataset.built = '1';
        }
      });
    }
    body.appendChild(div);
  });
}

// ─── EXPAND CONTENT ────────────────────────────────────────────────────────
function hasExpandContent(item) {
  const r = item.raw;
  if (r.exam_qa && r.exam_qa.length) return true;
  const q = r.question; const p = r.partData;
  return !!(q?.scenario || p?.scenario || q?.question || p?.question || q?.sections || p?.sections);
}

function buildExpandContent(item) {
  const r = item.raw;
  let html = '';

  // ── REVISION NOTES: show exam Q&A pairs ──
  if (Array.isArray(r.exam_qa)) {
    if (r.exam_qa.length) {
      html += `<div class="exp-block"><div class="exp-label">Exam Q&amp;A (${r.exam_qa.length})</div>`;
      r.exam_qa.forEach(pair => {
        html += `<div class="exp-qa-item">
          <div class="exp-qa-q">Q: ${escHtml(pair.q)}</div>
          <div class="exp-qa-a">${escHtml(pair.a)}</div>
        </div>`;
      });
      html += `</div>`;
    } else {
      html += `<div class="exp-empty">No exam Q&amp;A recorded for this subsection.</div>`;
    }
    return html;
  }

  // ── EXAM SITTINGS: scenario + question text + solution sections ──
  const q = r.question || {};
  const p = r.partData || {};

  const scenario = q.scenario || p.scenario;
  if (scenario) {
    html += `<div class="exp-block"><div class="exp-label">Scenario</div><div class="exp-text">${escHtml(scenario)}</div></div>`;
  }

  const qText = p.question || q.question;
  if (qText) {
    html += `<div class="exp-block"><div class="exp-label">Question</div><div class="exp-text">${escHtml(qText)}</div></div>`;
  }

  const sections = p.sections || q.sections;
  if (sections && typeof sections === 'object') {
    const entries = Object.entries(sections);
    if (entries.length) {
      html += `<div class="exp-block"><div class="exp-label">Solution</div>`;
      entries.forEach(([secKey, secVal]) => {
        const bullets = Array.isArray(secVal) ? secVal : (typeof secVal === 'string' ? [secVal] : []);
        if (bullets.length) {
          html += `<div class="exp-sec-title">${escHtml(secKey)}</div>`;
          html += `<ul class="exp-bullets">${bullets.map(b => `<li>${escHtml(b)}</li>`).join('')}</ul>`;
        }
      });
      html += `</div>`;
    }
  }

  return html || `<div class="exp-empty">No detailed content available for this item.</div>`;
}

function getSrcLabel(src) {
  return {ifoa:'IFoA',iai:'IAI',sp1pq:'SP1 PQ',sa1pq:'SA1 PQ',assignment:'Assignment',
          frameworks:'Frameworks',sp1notes:'SP1 Notes',sa1notes:'SA1 Notes'}[src] || src.toUpperCase();
}

// ─── SELECTION ─────────────────────────────────────────────────────────────
function toggleSelect(idx, checked) {
  const item = lastResults[idx]; if (!item) return;
  if (checked && !selectedItems.includes(item)) selectedItems.push(item);
  else if (!checked) selectedItems = selectedItems.filter(s=>s!==item);
  refreshHighlights(); updateSelectionUI();
}
function selectAll()    { lastResults.forEach(i=>{ if(!selectedItems.includes(i)) selectedItems.push(i); }); refreshHighlights(); updateSelectionUI(); }
function clearSelection(){ selectedItems=[]; refreshHighlights(); updateSelectionUI(); }
function refreshHighlights() {
  document.querySelectorAll('.result-item').forEach(row => {
    const item = lastResults[parseInt(row.dataset.idx)];
    const sel  = item && selectedItems.includes(item);
    row.classList.toggle('selected', sel);
    const cb = row.querySelector('.result-cb'); if(cb) cb.checked = sel;
  });
}
function updateSelectionUI() {
  const n = selectedItems.length;
  document.getElementById('selected-count').textContent = `${n} item${n!==1?'s':''} selected`;
  document.getElementById('ask-btn').disabled = (n===0 || !getApiKey());
  document.getElementById('claude-hint').textContent = n>0
    ? `${n} item${n!==1?'s':''} selected. Ask Claude a question about them.`
    : 'Select results on the left, then ask Claude a question about them.';
}

// ─── SOURCE FILTER ─────────────────────────────────────────────────────────
function toggleFilter(btn) {
  const src = btn.dataset.src;
  if (src==='ALL') {
    activeFilters = new Set(['ALL']);
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.src==='ALL'));
  } else {
    activeFilters.delete('ALL');
    document.querySelector('[data-src="ALL"]').classList.remove('active');
    activeFilters.has(src) ? activeFilters.delete(src) : activeFilters.add(src);
    btn.classList.toggle('active', activeFilters.has(src));
    if (!activeFilters.size) { activeFilters.add('ALL'); document.querySelector('[data-src="ALL"]').classList.add('active'); }
  }
  if (document.getElementById('search-input').value.trim()) doSearch();
}

// ─── API KEY ───────────────────────────────────────────────────────────────
function saveKey(val) { localStorage.setItem('sa1_search_apikey', val); updateKeyStatus(val); updateSelectionUI(); }
function getApiKey()  { return document.getElementById('api-key').value.trim(); }
function updateKeyStatus(val) {
  const el = document.getElementById('key-status');
  if (val && val.length > 10) { el.textContent='● Set'; el.className='key-status set'; }
  else { el.textContent='○ Not set'; el.className='key-status unset'; }
}

// ─── ASK CLAUDE ────────────────────────────────────────────────────────────
async function askClaude() {
  const question = document.getElementById('claude-question').value.trim();
  const apiKey   = getApiKey();
  if (!question)            { alert('Please enter a question.'); return; }
  if (!apiKey)              { alert('Please enter your Anthropic API key.'); return; }
  if (!selectedItems.length){ alert('Please select at least one result.'); return; }

  const payload = selectedItems.map((item, i) =>
    `--- SOURCE ${i+1}: [${getSrcLabel(item.src)}] ${item.sittingLabel} — ${item.label} ---\n${JSON.stringify(item.raw, null, 2)}`
  ).join('\n\n');

  const system = `You are an expert actuarial study assistant specialising in SA1 (Health & Care) and SP1 examinations for IFoA and IAI.

Answer ONLY using the knowledge material provided below. Do not supplement from general training knowledge. If the answer cannot be found in the provided material, say so explicitly.

When answering:
- Reference each source clearly (e.g. "IFoA April 2019, Q1(ii)" or "SA1 Notes › PMI › Insurer's Perspective")
- Be thorough and well-structured
- When comparing across sources, clearly distinguish between them`;

  const userMsg = `KNOWLEDGE MATERIAL:\n\n${payload}\n\n---\n\nQUESTION: ${question}`;

  const respWrap = document.getElementById('response-wrap');
  const respEl   = document.getElementById('claude-response');
  respWrap.style.display = 'flex';
  respEl.textContent = ''; respEl.className = 'claude-response streaming';

  const btn = document.getElementById('ask-btn');
  btn.disabled = true; btn.textContent = 'Asking…';

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 2000,
        system,
        messages: [{ role: 'user', content: userMsg }],
        stream: true
      })
    });

    if (!res.ok) {
      const err = await res.json();
      respEl.textContent = `Error: ${err.error?.message || res.statusText}`;
      respEl.className = 'claude-response'; return;
    }

    const reader = res.body.getReader();
    const dec    = new TextDecoder();
    let buf = '';
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += dec.decode(value, { stream: true });
      const lines = buf.split('\n'); buf = lines.pop();
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const raw = line.slice(6).trim();
        if (raw === '[DONE]') continue;
        try {
          const p = JSON.parse(raw);
          if (p.type==='content_block_delta' && p.delta?.type==='text_delta') {
            respEl.textContent += p.delta.text;
            respEl.scrollTop = respEl.scrollHeight;
          }
        } catch(e) {}
      }
    }
    respEl.className = 'claude-response';
  } catch(e) {
    respEl.textContent = `Error: ${e.message}`;
    respEl.className = 'claude-response';
  } finally {
    btn.disabled = false; btn.textContent = 'Ask Claude';
    updateSelectionUI();
  }
}

// ─── UTILS ─────────────────────────────────────────────────────────────────
function copyResponse() {
  navigator.clipboard.writeText(document.getElementById('claude-response').textContent).then(() => {
    const b = event.target; b.textContent = 'Copied!';
    setTimeout(() => b.textContent = 'Copy', 1500);
  });
}
function clearResponse() {
  document.getElementById('response-wrap').style.display = 'none';
  document.getElementById('claude-response').textContent = '';
}
function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
