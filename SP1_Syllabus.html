rovides a pure play on the desired product line, is a cleaner option for policyholders with multiple products, avoids exposure to additional capital requirements, and may allow the acquirer to realise scale benefits by absorbing the book into existing operations. Disadvantage: the vendor may be unwilling to sell only part of the portfolio. [src:IFoA_0425]"}, {"type": "text", "text": "⬡ - Key considerations in the acquisition vs book-purchase decision: cross-subsidies between product lines in the target company (which unwind on a book-only purchase), brand sentiment (negative sentiment about the company favours book-only), and whether IP is sold as a cross-sell on another product line (breaking that linkage on book purchase). [src:IFoA_0425]"}, {"type": "h4", "text": "Joint Venture Due Diligence"}, {"type": "text", "text": "⬡ - Before entering a joint venture in a new country, a multinational insurer should assess: the JV partner's reputation, financial strength, management quality, regulatory track record, and cultural fit; the target market's size, consumer affordability, financial sophistication, and demand for the specific products; the regulatory and tax environment including reserving requirements and profit repatriation rules; data availability for pricing; reinsurance availability; and the expected profit/loss profile over the JV term given development costs and payback period. [src:IFoA_0423]"}, {"type": "text", "text": "⬡ - On exit from a joint venture (e.g. after a fixed 10-year term), the buyout payment for liabilities transferred to the domestic partner should reflect: best estimate liabilities plus a risk margin for uncertainty; prudential reserves if required by local regulation; any unresolved tax/regulatory liabilities; the value of goodwill and expertise contributed by the exiting party; and practical considerations such as payment timing, currency, and whether instalments are needed. [src:IFoA_0423]"}]}};

// Helper: find best topic key for a given section title
function findTopicKey(sectionTitle) {
  if (!sectionTitle) return null;
  // Direct match
  if (SECTION_TOPIC_MAP[sectionTitle]) return SECTION_TOPIC_MAP[sectionTitle];
  // Partial match (case-insensitive)
  const lower = sectionTitle.toLowerCase();
  for (const [mapKey, topicKey] of Object.entries(SECTION_TOPIC_MAP)) {
    if (lower.includes(mapKey.toLowerCase()) || mapKey.toLowerCase().includes(lower)) {
      return topicKey;
    }
  }
  // Direct match in TOPIC_FRAMEWORKS keys
  for (const key of Object.keys(TOPIC_FRAMEWORKS)) {
    if (key.toLowerCase().includes(lower) || lower.includes(key.toLowerCase().replace(/ \(.*?\)/g, '').toLowerCase())) {
      return key;
    }
  }
  return null;
}


// ── CHAPTER DATA ─────────────────────────────────────────
// Each uploaded chapter JSON is registered here.
// Key = chapter number (as string). Value = the chapter data object.
// To add a chapter: CHAPTER_DATA["1"] = { ...json... };
// Ch3 is pre-loaded as the example chapter.

const CHAPTER_DATA = {};

// ── DATA LOADING ─────────────────────────────────────────
// Chapter data is loaded from data/SP1_Revision_Notes.json
// on page load. The UI is initialised after the fetch
// resolves so all chapters are available immediately.

function loadChapterData() {
  const loadingEl = document.getElementById('content-area');
  loadingEl.innerHTML = `
    <div class="content-empty">
      <div class="icon">⏳</div>
      <h2>Loading notes…</h2>
      <p>Fetching chapter data from data/SP1_Revision_Notes.json</p>
    </div>`;

  fetch('data/SP1_Revision_Notes.json')
    .then(r => {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    })
    .then(data => {
      // data is an object keyed by chapter number string
      Object.assign(CHAPTER_DATA, data);
      // Re-render nav and welcome now that data is available
      renderNav();
      showWelcome();
    })
    .catch(err => {
      loadingEl.innerHTML = `
        <div class="content-empty">
          <div class="icon">⚠️</div>
          <h2>Could not load chapter data</h2>
          <p style="max-width:360px;">Failed to fetch <code style="font-family:var(--mono);color:var(--accent);">data/SP1_Revision_Notes.json</code>.<br><br>
          Error: ${err.message}<br><br>
          Make sure the file exists in the <code style="font-family:var(--mono);color:var(--accent);">data/</code> subfolder relative to this HTML file.</p>
        </div>`;
    });
}


// ── STATE ────────────────────────────────────────────────
let activeView      = 'notes';
let activeChapterNum = null;  // number
let activeSectionId  = null;
let activeSubId      = null;
let searchQuery      = '';
const openSections   = new Set(); // "chNum_secId" keys for expanded section rows

// ── INIT ─────────────────────────────────────────────────
renderNav();       // Render nav skeleton immediately (no chapter data yet)
loadChapterData(); // Async: fetch chapter data, then re-render

// ── NAV RENDERING ────────────────────────────────────────
function renderNav() {
  const tree = document.getElementById('nav-tree');
  const q = searchQuery.toLowerCase();
  let html = '';
  let lastPart = 'NONE';

  CHAPTERS.forEach(ch => {
    const data = CHAPTER_DATA[String(ch.num)];
    const chLabel = ch.num === 0 ? 'Ch 0' : `Ch ${ch.num}`;

    // Part separator
    const partKey = ch.part === null ? (ch.num === 26 ? 'GLOSS' : 'INTRO') : ch.part;
    if (partKey !== lastPart) {
      if (ch.part !== null) {
        html += `<div class="nav-part-label">${PART_LABELS[ch.part]}</div>`;
      } else if (ch.num === 26) {
        html += `<div class="nav-part-label">Reference</div>`;
      }
      lastPart = partKey;
    }

    // Filter by search
    if (q) {
      const titleMatch = ch.title.toLowerCase().includes(q);
      const sectionMatch = data && data.sections && data.sections.some(s =>
        s.title.toLowerCase().includes(q) ||
        (s.subsections && s.subsections.some(sub => sub.title.toLowerCase().includes(q)))
      );
      if (!titleMatch && !sectionMatch) return;
    }

    const isOpen   = activeChapterNum === ch.num || (q && data);
    const isActive = activeChapterNum === ch.num;
    const hasData  = !!data;

    html += `<div class="nav-chapter ${isOpen ? 'open' : ''}" id="nav-ch-${ch.num}">
      <div class="nav-chapter-header ${isActive ? 'active' : ''}" onclick="toggleChapter(${ch.num})">
        <span class="nav-ch-num ${!hasData ? 'no-data' : ''}">${chLabel}</span>
        <span class="nav-ch-title">${ch.title}</span>
        ${hasData ? `<svg class="nav-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>` : ''}
      </div>
      <div class="nav-subsections">`;

    if (hasData) {
      data.sections.forEach(sec => {
        const secKey    = `${ch.num}_${sec.id}`;
        const secMatch  = !q || sec.title.toLowerCase().includes(q);
        const matchSubs = sec.subsections.filter(sub =>
          !q || secMatch || sub.title.toLowerCase().includes(q)
        );
        if (q && !secMatch && matchSubs.length === 0) return;

        const hasActiveSub = activeChapterNum === ch.num &&
                             sec.subsections.some(sub => sub.id === activeSubId);
        const isSecOpen    = openSections.has(secKey) || hasActiveSub ||
                             (q && matchSubs.length > 0);

        html += `<div class="nav-section ${isSecOpen ? 'open' : ''}">
          <div class="nav-section-header ${hasActiveSub ? 'has-active' : ''}"
               onclick="toggleSection('${secKey}')">
            <span class="nav-sec-id">${sec.id}</span>
            <span class="nav-sec-title">${sec.title}</span>
            <svg class="nav-sec-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
          </div>
          <div class="nav-section-subs">`;

        matchSubs.forEach(sub => {
          const isSubActive = activeChapterNum === ch.num && activeSubId === sub.id;
          html += `<div class="nav-sub ${isSubActive ? 'active' : ''}"
            onclick="selectSub(${ch.num}, '${sec.id}', '${sub.id}')">${sub.id} · ${sub.title}</div>`;
        });

        html += `</div></div>`;
      });
    } else {
      html += `<div class="nav-upload-hint">Notes not yet uploaded</div>`;
    }

    html += `</div></div>`;
  });

  tree.innerHTML = html;
}

function toggleChapter(num) {
  if (activeChapterNum === num) {
    activeChapterNum = null;
    activeSectionId  = null;
    activeSubId      = null;
    renderNav();
    showWelcome();
    document.getElementById('header-chapter-title').textContent = 'SP1 · All Chapters';
    return;
  }
  activeChapterNum = num;
  activeSectionId  = null;
  activeSubId      = null;
  // Auto-open all sections for the newly selected chapter
  const _autoData = CHAPTER_DATA[String(num)];
  if (_autoData && _autoData.sections) {
    _autoData.sections.forEach(sec => openSections.add(`${num}_${sec.id}`));
  }
  renderNav();

  const data = CHAPTER_DATA[String(num)];
  const ch   = CHAPTERS.find(c => c.num === num);
  if (data) {
    document.getElementById('header-chapter-title').textContent = `Ch ${num} · ${data.title}`;
    renderChapterOverview(num);
  } else {
    document.getElementById('header-chapter-title').textContent = `Ch ${num} · ${ch.title}`;
    showNoData(ch);
  }
}

function toggleSection(secKey) {
  if (openSections.has(secKey)) {
    openSections.delete(secKey);
  } else {
    openSections.add(secKey);
  }
  renderNav();
}

function selectSub(chNum, secId, subId) {
  activeChapterNum = chNum;
  activeSectionId  = secId;
  activeSubId      = subId;
  openSections.add(`${chNum}_${secId}`); // keep parent section open in nav
  renderNav();
  const data = CHAPTER_DATA[String(chNum)];
  if (data) renderSection(data, secId, subId);
}

function handleSearch() {
  searchQuery = document.getElementById('search-input').value;
  renderNav();
}

function handleScroll() {
  const canvas = document.getElementById('canvas');
  const fill   = document.getElementById('progress-fill');
  const total  = canvas.scrollHeight - canvas.clientHeight;
  fill.style.width = total > 0 ? (canvas.scrollTop / total * 100) + '%' : '0%';
}

// ── VIEW SWITCHING ────────────────────────────────────────
function setView(v) {
  activeView = v;
  ['notes','flashcards','glossary','framework','summary'].forEach(id => {
    document.getElementById('tab-' + id).classList.toggle('active', id === v);
  });
  if (activeChapterNum !== null) {
    const data = CHAPTER_DATA[String(activeChapterNum)];
    if (data) {
      if (activeSectionId) {
        renderSection(data, activeSectionId, activeSubId);
      } else {
        if (v === 'notes') renderChapterOverview(activeChapterNum);
        else if (v === 'framework') renderFrameworkForChapter(activeChapterNum);
        else if (v === 'summary') renderSummary(activeChapterNum);
        else renderGlobalView(v, data);
      }
    }
  } else {
    showWelcome();
  }
}

      <span style="font-family:var(--mono);font-size:20px;font-weight:700;color:var(--accent);">${CHAPTERS.length}</span>
      <span style="font-size:11px;color:var(--text-dim);">Chapters</span>
    </div>

      <span style="font-family:var(--mono);font-size:20px;font-weight:700;color:var(--green);">${loadedNums.length}</span>
      <span style="font-size:11px;color:var(--text-dim);">Loaded</span>
    </div>
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px 16px;display:flex;align-items:center;gap:10px;">
      <span style="font-family:var(--mono);font-size:20px;font-weight:700;color:var(--blue);">${totalPages}</span>
      <span style="font-size:11px;color:var(--text-dim);">Total pages</span>
    </div>
  </div>`;

  // Chapter grid by part
  let lastPart = 'NONE';
  html += `<div class="welcome-grid">`;

  CHAPTERS.forEach(ch => {

    const chLabel = ch.num === 0 ? 'Ch 0' : `Ch ${ch.num}`;

}

function showNoData(ch) {

// ── CHAPTER OVERVIEW (notes view, no sub selected) ────────
function renderChapterOverview(chNum) {
  const data = CHAPTER_DATA[String(chNum)];
  if (!data) return;
  const ch = CHAPTERS.find(c => c.num === chNum);

  if (activeView === 'flashcards') { renderGlobalView('flashcards', data); return; }
  if (activeView === 'glossary')   { renderGlobalView('glossary', data);   return; }
  if (activeView === 'framework')  { renderFrameworkForChapter(chNum);     return; }
  if (activeView === 'summary')    { renderSummary(chNum);                  return; }

  let html = `<div class="section-hero">
    <div class="section-eyebrow">SP1 · Chapter ${chNum}${ch && ch.part ? ` · Part ${ch.part}` : ''}</div>
    <div class="section-name">${data.title}</div>
    <div class="syllabus-tags">
      ${(data.syllabus_refs || []).map(r => `<span class="tag tag-syllabus">${r}</span>`).join('')}
      ${ch ? `<span class="tag tag-pages">${ch.pages} pages</span>` : ''}
      ${(data.products_covered || []).map(p => `<span class="tag tag-product">${p}</span>`).join('')}
    </div>
  </div>`;

  // Section overview cards
  html += `<div style="display:flex;flex-direction:column;gap:8px;">`;
  data.sections.forEach(sec => {
    html += `<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 18px;cursor:pointer;transition:border-color .15s;" onmouseover="this.style.borderColor='var(--border-hi)'" onmouseout="this.style.borderColor='var(--border)'" onclick="selectSub(${chNum}, '${sec.id}', '${sec.subsections[0].id}')">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px;">
        <span style="font-family:var(--mono);font-size:10px;color:var(--accent);background:var(--accent-lo);padding:1px 6px;border-radius:3px;">${sec.id}</span>
        <span style="font-family:var(--serif);font-size:16px;color:var(--text-hi);">${sec.title}</span>
      </div>
      <div style="display:flex;gap:12px;font-size:11px;color:var(--text-dim);">
        <span>${sec.subsections.length} subsections</span>
        <span>·</span>
        <span>${sec.subsections.reduce((s,sub) => s + sub.bullets.length, 0)} key points</span>
        <span>·</span>
        <span>${sec.subsections.reduce((s,sub) => s + (sub.key_terms||[]).length, 0)} terms</span>
      </div>
    </div>`;
  });

  document.getElementById('content-area').innerHTML = html;

// ── RENDER SECTION ────────────────────────────────────────
function renderSection(data, secId, scrollToSubId) {
  const sec = data.sections.find(s => s.id === secId);
  if (!sec) return;

  if (activeView === 'flashcards') { renderFlashcards(sec, data.chapter); return; }
  if (activeView === 'glossary')   { renderGlossary(sec, data.chapter);   return; }
  if (activeView === 'framework')  { renderFramework(sec, data);          return; }
  if (activeView === 'summary')    { renderSummary(activeChapterNum);      return; }

  let html = `<div class="section-hero">
    <div class="section-eyebrow">${data.chapter} · Section ${sec.id}</div>
    <div class="section-name">${sec.title}</div>
    <div class="syllabus-tags">
      ${(data.syllabus_refs || []).map(r => `<span class="tag tag-syllabus">${r}</span>`).join('')}
      <span class="tag tag-product">${sec.title}</span>
    </div>
  </div>`;

  sec.subsections.forEach(sub => {
    const allTerms = sub.key_terms || [];
    const allQA    = sub.exam_qa   || [];

    html += `<div class="subsection-block" id="sub-${sub.id}">
      <div class="subsection-header">
        <span class="sub-id">${sub.id}</span>
        <span class="sub-title">${sub.title}</span>
      </div>`;

    html += `<div class="row-label">Key Points</div>
      <div class="bullets-list">
        ${sub.bullets.map(b => `
          <div class="bullet-item">
            <div class="bullet-dot"></div>
            <span>${b}</span>
          </div>`).join('')}
      </div>`;

    if (allTerms.length) {
      html += `<div class="row-label">Key Terms</div>
        <div class="terms-grid">
          ${allTerms.map(t => `
            <div class="term-card">
              <div class="term-name">${t.term}</div>
              <div class="term-def">${t.definition}</div>
            </div>`).join('')}
        </div>`;
    }

    if (allQA.length) {
      html += `<div class="row-label">Exam Q&amp;A</div>
        ${allQA.map((qa, i) => `
          <div class="qa-block" id="qa-${sub.id}-${i}" onclick="toggleQA('qa-${sub.id}-${i}')">
            <div class="qa-question">
              <span>${qa.q}</span>
              <span class="qa-toggle"></span>
            </div>
            <div class="qa-answer">${qa.a}</div>
          </div>`).join('')}`;
    }

    html += `</div>`;
  });

  document.getElementById('content-area').innerHTML = html;
  document.getElementById('canvas').scrollTop = 0;

  if (scrollToSubId) {
    setTimeout(() => {
      const el = document.getElementById('sub-' + scrollToSubId);
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 50);
  }
}

function toggleQA(id) {
  document.getElementById(id).classList.toggle('open');
}

// ── FLASHCARDS ────────────────────────────────────────────
function renderFlashcards(sec, chapterLabel) {
  const cards = [];
  sec.subsections.forEach(sub => {
    (sub.key_terms || []).forEach(t => {
      cards.push({ src: sub.id + ' · ' + sub.title, q: t.term, a: t.definition });
    });
    (sub.exam_qa || []).forEach(qa => {
      cards.push({ src: sub.id + ' · ' + sub.title, q: qa.q, a: qa.a });
    });
    sub.bullets.filter((_, i) => i % 3 === 0).forEach(b => {
      const parts = b.split('—');
      if (parts.length > 1) {
        cards.push({ src: sub.id + ' · ' + sub.title, q: parts[0].trim() + ' — ?', a: parts[1].trim() });
      }
    });
  });

  if (cards.length === 0) {
    document.getElementById('content-area').innerHTML = `<div class="content-empty"><div class="icon">🃏</div><h2>No flashcards yet</h2><p>Add key terms or exam Q&A to this section to generate cards.</p></div>`;
    return;
  }

  document.getElementById('content-area').innerHTML = `
    <div class="section-hero">
      <div class="section-eyebrow">Flashcards · ${sec.title}</div>
      <div class="section-name">${cards.length} cards</div>
    </div>
    <div class="flashcard-grid">
      ${cards.map((c, i) => `
        <div class="flashcard" id="fc-${i}" onclick="flipCard('fc-${i}')">
          <div class="card-front">
            <div>
              <div class="card-src">${c.src}</div>
              <div class="card-q">${c.q}</div>
            </div>
            <div class="card-hint">tap to reveal</div>
          </div>
          <div class="card-back">
            <div class="card-src">${c.src}</div>
            <div class="card-a">${c.a}</div>
          </div>
          <div class="card-flip-icon">↻</div>
        </div>`).join('')}
    </div>`;
}

function flipCard(id) {
  document.getElementById(id).classList.toggle('flipped');
}

// ── GLOSSARY ──────────────────────────────────────────────
function renderGlossary(sec, chapterLabel) {
  const terms = sec.subsections.flatMap(sub => sub.key_terms || []);

  if (!terms.length) {
    document.getElementById('content-area').innerHTML = `<div class="content-empty"><div class="icon">📚</div><h2>No terms defined</h2><p>This section has no key terms yet.</p></div>`;
    return;
  }

  document.getElementById('content-area').innerHTML = `
    <div class="section-hero">
      <div class="section-eyebrow">Glossary · ${sec.title}</div>
      <div class="section-name">${terms.length} terms</div>
    </div>
    <div class="glossary-list">
      ${terms.map(t => `
        <div class="glossary-item">
          <div class="glossary-term">${t.term}</div>
          <div class="glossary-def">${t.definition}</div>
        </div>`).join('')}
    </div>`;
}

function renderSummary(chNum) {
  const data = CHAPTER_DATA[String(chNum)];
  if (!data) return;

  const raw = data.summary;

  let bodyHtml;
  if (!raw || (Array.isArray(raw) && raw.length === 0) || raw === '') {
    bodyHtml = `
      <div class="sum-empty">
        <div class="sum-empty-icon">✏️</div>
        <p class="sum-empty-text">No summary has been added for this chapter yet.</p>
      </div>`;
  } else {
    const text = Array.isArray(raw) ? raw.join('\n') : raw;

    // First pass: join wrapped lines back together.
    // A line is a continuation if it doesn't start with • and doesn't look like
    // a heading or blank, and the previous non-blank line was not a heading.
    const rawLines = text.split('\n');
    const joined = [];
    for (let i = 0; i < rawLines.length; i++) {
      const line = rawLines[i];
      const t = line.trim();
      const isBulletLine = t.startsWith('\u2022');
      const isBlank = t === '';
      const prevJoined = joined[joined.length - 1];
      const prevIsBullet = prevJoined && prevJoined.trim().startsWith('\u2022');
      const prevIsBlank  = !prevJoined || prevJoined.trim() === '';

      // Skip the "Chapter X Summary" / "Chapter X Summary continued" title lines
      if (/^Chapter\s+\d+\s+Summary/i.test(t)) continue;

      if (!isBlank && !isBulletLine && !prevIsBlank && prevJoined !== undefined) {
        // Continuation: append to previous line
        joined[joined.length - 1] = joined[joined.length - 1].trimEnd() + ' ' + t;
      } else {
        joined.push(line);
      }
    }

    // Second pass: render joined lines
    let html = '';
    let inList = false;

    const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

    const isBullet  = t => t.startsWith('\u2022');
    const isBlank   = t => t === '';
    const isHeading = t => {
      if (!t || isBullet(t)) return false;
      return t.length <= 70 && !t.endsWith('.') && !t.endsWith(',') && !/^[a-z]/.test(t);
    };

    for (const line of joined) {
      const t = line.trim();
      if (isBlank(t)) {
        if (inList) { html += '</ul>'; inList = false; }
        continue;
      }
      if (isBullet(t)) {
        if (!inList) { html += '<ul class="sum-list">'; inList = true; }
        html += `<li class="sum-point">${esc(t.replace(/^\u2022\s*/, ''))}</li>`;
      } else if (isHeading(t)) {
        if (inList) { html += '</ul>'; inList = false; }
        html += `<h3 class="sum-section-heading">${esc(t)}</h3>`;
      } else {
        if (inList) { html += '</ul>'; inList = false; }
        html += `<p class="sum-para">${esc(t)}</p>`;
      }
    }
    if (inList) html += '</ul>';
    bodyHtml = html;
  }

  document.getElementById('content-area').innerHTML = `
    <div class="summary-view">
      <div class="sum-header">
        <div class="sum-label">Chapter Summary</div>
        <h1 class="sum-title">${data.title}</h1>
        ${data.syllabus_refs && data.syllabus_refs.length
          ? `<div class="sum-refs">Syllabus refs: ${data.syllabus_refs.join(', ')}</div>`
          : ''}
      </div>
      <div class="sum-body">${bodyHtml}</div>
    </div>`;
}

function renderGlobalView(v, data) {
  const fakeAll = { title: 'All Sections', subsections: data.sections.flatMap(s => s.subsections) };
  if (v === 'flashcards')     renderFlashcards(fakeAll, data.chapter);
  else if (v === 'framework') renderFrameworkForChapter(activeChapterNum);
  else                        renderGlossary(fakeAll, data.chapter);
}

// ── FRAMEWORK VIEW ────────────────────────────────────────

function renderTopicContent(topicKey) {
  const topic = TOPIC_FRAMEWORKS[topicKey];
  if (!topic) return '<div class="fw-no-match"><div class="icon">🔍</div><h3>No framework data</h3><p>No topic framework found for this section.</p></div>';

  const meta = topic._meta || {};
  let html = '';

  // Meta bar
  html += '<div class="fw-meta-bar">';
  if (meta.pillar)           html += `<span class="fw-meta-pill fw-pill-pillar">⬡ Pillar ${meta.pillar}</span>`;
  if (meta.acc_stage)        html += `<span class="fw-meta-pill fw-pill-stage">📐 ${meta.acc_stage}</span>`;
  if (meta.pc_stage)         html += `<span class="fw-meta-pill fw-pill-stage" style="opacity:.7;">PC ${meta.pc_stage}</span>`;
  (meta.risk_categories||[]).forEach(r => {
    html += `<span class="fw-meta-pill fw-pill-risk">${r}</span>`;
  });
  (meta.stakeholders||[]).slice(0,4).forEach(s => {
    html += `<span class="fw-meta-pill fw-pill-stake">${s}</span>`;
  });
  html += '</div>';

  // Content items
  html += '<div class="fw-panel">';
  (topic.content || []).forEach(item => {
    if (item.type === 'h3') {
      html += `<div class="fw-h3">${item.text}</div>`;
    } else if (item.type === 'h4') {
      html += `<div class="fw-h4">${item.text}</div>`;
    } else if (item.type === 'point') {
      const boldPart = item.bold ? `<strong>${item.bold}:</strong> ` : '';
      const textPart = item.text || '';
      html += `<div class="fw-point"><div class="fw-point-dot"></div><span>${boldPart}${textPart}</span></div>`;
    } else if (item.type === 'text') {
      html += `<div class="fw-text">${item.text}</div>`;
    }
  });
  html += '</div>';

  return html;
}

// Render framework for a specific section
function renderFramework(sec, data) {
  const topicKey = findTopicKey(sec.title);

  const heroHtml = `<div class="section-hero">
    <div class="section-eyebrow">${data.chapter} · Framework · ${sec.id}</div>
    <div class="section-name">${sec.title}</div>
    <div class="syllabus-tags">
      <span class="tag" style="border-color:var(--purple);color:var(--purple);background:var(--purple-lo);">📚 Topic Framework</span>
      ${topicKey ? `<span class="tag" style="border-color:var(--border-hi);color:var(--text-dim);background:transparent;">${topicKey}</span>` : ''}
    </div>
  </div>`;

  let contentHtml;
  if (topicKey) {
    contentHtml = renderTopicContent(topicKey);
  } else {
    contentHtml = `<div class="fw-no-match">
      <div class="icon">🗂️</div>
      <h3>No framework linked</h3>
      <p>No topic framework is mapped to "${sec.title}" yet. Add an entry to SECTION_TOPIC_MAP in the script.</p>
    </div>`;
  }

  document.getElementById('content-area').innerHTML = heroHtml + contentHtml;
  document.getElementById('canvas').scrollTop = 0;
}

// Render framework for the chapter overview (all sections)
function renderFrameworkForChapter(chNum) {
  const data = CHAPTER_DATA[String(chNum)];
  if (!data) return;
  const ch = CHAPTERS.find(c => c.num === chNum);

  const heroHtml = `<div class="section-hero">
    <div class="section-eyebrow">SP1 · Chapter ${chNum} · Topic Frameworks</div>
    <div class="section-name">${data.title}</div>
    <div class="syllabus-tags">
      <span class="tag" style="border-color:var(--purple);color:var(--purple);background:var(--purple-lo);">📚 Framework View</span>
      ${ch ? `<span class="tag tag-pages">${ch.pages} pages</span>` : ''}
    </div>
  </div>`;

  let sectionsHtml = '';
  data.sections.forEach(sec => {
    const topicKey = findTopicKey(sec.title);
    sectionsHtml += `<div class="fw-chapter-section">
      <div class="fw-section-title">
        <span class="fw-section-id">${sec.id}</span>
        ${sec.title}
      </div>`;
    if (topicKey) {
      sectionsHtml += renderTopicContent(topicKey);
    } else {
      sectionsHtml += `<div class="fw-no-match" style="height:auto;padding:20px 0;">
        <div class="icon">🗂️</div>
        <p>No framework mapped for "${sec.title}"</p>
      </div>`;
    }
    sectionsHtml += '</div>';
  });

  document.getElementById('content-area').innerHTML = heroHtml + sectionsHtml;
  document.getElementById('canvas').scrollTop = 0;
}
