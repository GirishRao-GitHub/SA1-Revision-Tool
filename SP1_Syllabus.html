<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SP1 · Revision Notes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #0e0f13;
    --surface:   #14161c;
    --border:    #242630;
    --border-hi: #343646;
    --text:      #c8cad4;
    --text-dim:  #686c80;
    --text-hi:   #eceef6;
    --accent:    #e8a030;
    --accent-lo: rgba(232,160,48,.12);
    --accent-md: rgba(232,160,48,.22);
    --green:     #4ec994;
    --green-lo:  rgba(78,201,148,.12);
    --blue:      #5a9cf8;
    --blue-lo:   rgba(90,156,248,.12);
    --red:       #f07070;
    --red-lo:    rgba(240,112,112,.12);
    --radius:    8px;
    --purple:    #a78bfa;
    --purple-lo: rgba(167,139,250,.12);
    --purple-md: rgba(167,139,250,.22);
    --mono:      'IBM Plex Mono', monospace;
    --sans:      'IBM Plex Sans', sans-serif;
    --serif:     'Playfair Display', serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 16px;
    line-height: 1.7;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── SIDEBAR COLLAPSE ── */
  .sidebar {
    transition: width .25s ease, min-width .25s ease;
  }
  .sidebar-collapsed .sidebar {
    width: 0;
    min-width: 0;
    overflow: hidden;
    border-right: none;
  }
  .sidebar-collapsed .progress-bar {
    left: 0;
  }

  /* Header toggle button */
  .sidebar-toggle-btn {
    display: inline-flex;
    align-items: center;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-dim);
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 4px 8px;
    cursor: pointer;
    transition: all .15s;
    flex-shrink: 0;
    line-height: 1;
  }
  .sidebar-toggle-btn:hover {
    color: var(--accent);
    border-color: var(--accent);
    background: var(--accent-lo);
  }

  /* Sidebar edge tab */
  .sidebar-edge-tab {
    position: fixed;
    top: 50%;
    left: 260px;
    transform: translateY(-50%);
    width: 14px;
    height: 52px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: none;
    border-radius: 0 6px 6px 0;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 30;
    transition: left .25s ease, background .15s, border-color .15s, color .15s;
    color: var(--text-dim);
    font-size: 9px;
    font-family: var(--mono);
    user-select: none;
  }
  .sidebar-edge-tab:hover {
    background: var(--accent-lo);
    border-color: var(--accent);
    color: var(--accent);
  }
  .sidebar-collapsed .sidebar-edge-tab {
    left: 0;
    border-left: 1px solid var(--border);
    border-radius: 0 6px 6px 0;
  }
  .sidebar-collapsed .sidebar-edge-tab:hover {
    border-color: var(--accent);
  }

  /* ── TOP BAR ── */
  header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 0 16px;
    height: 52px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
    z-index: 10;
  }

  /* ── BACK BUTTON ── */
  .back-btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    color: var(--text-dim);
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 4px 10px;
    cursor: pointer;
    text-decoration: none;
    transition: all .15s;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .back-btn:hover {
    color: var(--accent);
    border-color: var(--accent);
    background: var(--accent-lo);
  }
  .back-btn svg { width: 12px; height: 12px; }

  .logo {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 500;
    color: var(--accent);
    letter-spacing: .04em;
    white-space: nowrap;
  }
  .logo span { color: var(--text-dim); font-weight: 400; }
  .header-sep { width: 1px; height: 20px; background: var(--border); flex-shrink: 0; }
  .chapter-title {
    font-family: var(--serif);
    font-size: 14px;
    color: var(--text-hi);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
    min-width: 0;
  }
  .view-tabs { display: flex; gap: 4px; margin-left: auto; flex-shrink: 0; }
  .view-tab {
    font-family: var(--mono);
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    transition: all .15s;
    letter-spacing: .03em;
  }
  .view-tab:hover { border-color: var(--border-hi); color: var(--text); }
  .view-tab.active { background: var(--accent-lo); border-color: var(--accent); color: var(--accent); }

  /* ── LAYOUT ── */
  .workspace { display: flex; flex: 1; overflow: hidden; }

  /* ── SIDEBAR ── */
  .sidebar {
    width: 260px;
    min-width: 260px;
    border-right: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .sidebar-search {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-search input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 6px 10px;
    font-family: var(--sans);
    font-size: 14px;
    color: var(--text);
    outline: none;
    transition: border-color .15s;
  }
  .sidebar-search input:focus { border-color: var(--accent); }
  .sidebar-search input::placeholder { color: var(--text-dim); }

  .nav-tree { overflow-y: auto; flex: 1; padding: 6px 0; }
  .nav-tree::-webkit-scrollbar { width: 4px; }
  .nav-tree::-webkit-scrollbar-track { background: transparent; }
  .nav-tree::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 2px; }

  /* Part group label */
  .nav-part-label {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--text-dim);
    padding: 12px 14px 4px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .nav-part-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* Chapter row (top level) */
  .nav-chapter {
    margin-bottom: 1px;
  }
  .nav-chapter-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 12px;
    cursor: pointer;
    color: var(--text);
    font-size: 13px;
    font-weight: 500;
    user-select: none;
    transition: background .12s;
  }
  .nav-chapter-header:hover { background: var(--bg); }
  .nav-chapter-header.active { color: var(--accent); }
  .nav-ch-num {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--accent);
    background: var(--accent-lo);
    padding: 1px 5px;
    border-radius: 3px;
    min-width: 28px;
    text-align: center;
    flex-shrink: 0;
  }
  .nav-ch-num.no-data {
    color: var(--text-dim);
    background: var(--border);
  }
  .nav-ch-title {
    flex: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .nav-chevron {
    margin-left: auto;
    width: 11px;
    height: 11px;
    color: var(--text-dim);
    transition: transform .2s;
    flex-shrink: 0;
  }
  .nav-chapter.open .nav-chevron { transform: rotate(90deg); }
  .nav-subsections { display: none; }
  .nav-chapter.open .nav-subsections { display: block; }

  /* Subsection rows */
  .nav-sub {
    padding: 4px 12px 4px 44px;
    font-size: 13px;
    color: var(--text-dim);
    cursor: pointer;
    transition: all .12s;
    border-left: 2px solid transparent;
    margin-left: 12px;
    line-height: 1.4;
  }
  .nav-sub:hover { color: var(--text); background: var(--bg); }
  .nav-sub.active { color: var(--accent); border-left-color: var(--accent); background: var(--accent-lo); }

  /* Upload hint row */
  .nav-upload-hint {
    padding: 6px 12px 6px 44px;
    font-size: 10.5px;
    color: var(--text-dim);
    font-style: italic;
    margin-left: 12px;
    opacity: .7;
  }

  /* ── SECTION ROWS (intermediate tier: chapter → section → subsection) ── */
  .nav-section { margin-bottom: 1px; }
  .nav-section-header {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 5px 12px 5px 12px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-dim);
    user-select: none;
    transition: background .12s;
    border-left: 2px solid transparent;
    margin-left: 12px;
    line-height: 1.35;
  }
  .nav-section-header:hover { background: var(--bg); color: var(--text); }
  .nav-section-header.has-active {
    color: var(--accent);
    border-left-color: var(--accent);
    background: var(--accent-lo);
  }
  .nav-sec-id {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--text-dim);
    background: var(--border);
    padding: 1px 5px;
    border-radius: 3px;
    flex-shrink: 0;
  }
  .nav-sec-title {
    flex: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .nav-sec-chevron {
    margin-left: auto;
    width: 9px;
    height: 9px;
    color: var(--text-dim);
    transition: transform .2s;
    flex-shrink: 0;
  }
  .nav-section.open .nav-sec-chevron { transform: rotate(90deg); }
  .nav-section-subs { display: none; }
  .nav-section.open .nav-section-subs { display: block; }

  /* ── CANVAS ── */
  .canvas {
    flex: 1;
    overflow-y: auto;
    padding: 32px 40px;
    position: relative;
  }
  .canvas::-webkit-scrollbar { width: 6px; }
  .canvas::-webkit-scrollbar-track { background: transparent; }
  .canvas::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 3px; }

  /* ── PROGRESS BAR ── */
  .progress-bar {
    position: fixed;
    top: 52px;
    left: 260px;
    right: 0;
    height: 2px;
    background: var(--border);
    z-index: 20;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width .1s;
  }

  /* ── CONTENT ── */
  .content-empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 70vh;
    text-align: center;
    gap: 12px;
    color: var(--text-dim);
  }
  .content-empty .icon { font-size: 48px; }
  .content-empty h2 { font-family: var(--serif); font-size: 22px; color: var(--text); }
  .content-empty p { font-size: 15px; max-width: 300px; line-height: 1.6; }

  /* Welcome state — chapter index cards */
  .welcome-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 10px;
    margin-top: 24px;
  }
  .welcome-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    transition: border-color .15s, background .15s;
  }
  .welcome-card:hover { border-color: var(--accent); background: var(--accent-lo); }
  .welcome-card.no-data { opacity: .45; cursor: default; }
  .welcome-card.no-data:hover { border-color: var(--border); background: var(--surface); }
  .wc-num {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--accent);
    background: var(--accent-lo);
    border-radius: 4px;
    padding: 2px 6px;
    min-width: 30px;
    text-align: center;
    flex-shrink: 0;
  }
  .wc-num.no-data { color: var(--text-dim); background: var(--border); }
  .wc-title { font-size: 14px; color: var(--text); line-height: 1.4; }
  .wc-badge {
    margin-left: auto;
    font-family: var(--mono);
    font-size: 9px;
    color: var(--green);
    background: var(--green-lo);
    border-radius: 3px;
    padding: 1px 5px;
    flex-shrink: 0;
  }

  .section-hero {
    margin-bottom: 36px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }
  .section-eyebrow {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 8px;
  }
  .section-name {
    font-family: var(--serif);
    font-size: 26px;
    color: var(--text-hi);
    line-height: 1.25;
    margin-bottom: 10px;
  }
  .syllabus-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .tag {
    font-family: var(--mono);
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 3px;
    border: 1px solid;
    letter-spacing: .04em;
  }
  .tag-syllabus { border-color: var(--blue); color: var(--blue); background: var(--blue-lo); }
  .tag-product  { border-color: var(--accent); color: var(--accent); background: var(--accent-lo); }
  .tag-pages    { border-color: var(--border-hi); color: var(--text-dim); background: transparent; }

  /* subsection block */
  .subsection-block {
    margin-bottom: 32px;
    scroll-margin-top: 20px;
    animation: fadeUp .25s ease both;
  }
  .subsection-block:nth-child(2) { animation-delay: .05s; }
  .subsection-block:nth-child(3) { animation-delay: .1s; }

  .subsection-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
  }
  .sub-id {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    background: var(--border);
    padding: 2px 7px;
    border-radius: 4px;
  }
  .sub-title {
    font-family: var(--serif);
    font-size: 19px;
    color: var(--text-hi);
  }

  /* bullet list */
  .bullets-list { display: flex; flex-direction: column; gap: 5px; margin-bottom: 18px; }
  .bullet-item {
    display: flex;
    gap: 10px;
    padding: 8px 12px;
    border-radius: var(--radius);
    background: var(--surface);
    border: 1px solid var(--border);
    font-size: 15px;
    line-height: 1.6;
    color: var(--text);
    transition: border-color .15s, background .15s;
  }
  .bullet-item:hover { border-color: var(--border-hi); background: #191b22; }
  .bullet-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    flex-shrink: 0;
    margin-top: 7px;
  }

  /* key terms */
  .terms-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 8px;
    margin-bottom: 18px;
  }
  .term-card {
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 12px;
    background: var(--surface);
    transition: border-color .15s;
  }
  .term-card:hover { border-color: var(--green); }
  .term-name {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 500;
    color: var(--green);
    margin-bottom: 4px;
  }
  .term-def { font-size: 14px; color: var(--text-dim); line-height: 1.5; }

  /* Q&A */
  .qa-block {
    border: 1px solid var(--border);
    border-left: 3px solid var(--blue);
    border-radius: var(--radius);
    overflow: hidden;
    margin-bottom: 8px;
    background: var(--surface);
  }
  .qa-question {
    padding: 10px 14px;
    font-size: 15px;
    font-weight: 500;
    color: var(--blue);
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 8px;
    user-select: none;
    transition: background .12s;
  }
  .qa-question:hover { background: var(--blue-lo); }
  .qa-toggle {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
    flex-shrink: 0;
    margin-top: 2px;
  }
  .qa-toggle::after { content: '▼'; }
  .qa-answer {
    display: none;
    padding: 10px 14px 12px;
    border-top: 1px solid var(--border);
    font-size: 15px;
    color: var(--text);
    line-height: 1.65;
    background: var(--blue-lo);
  }
  .qa-block.open .qa-answer { display: block; }
  .qa-block.open .qa-toggle::after { content: '▲'; }

  /* section label rows */
  .row-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 8px;
    margin-top: 20px;
    padding-left: 2px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .row-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* ── FLASH CARD VIEW ── */
  .flashcard-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 12px;
  }
  .flashcard {
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    padding: 16px;
    cursor: pointer;
    min-height: 120px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    transition: border-color .15s, transform .1s;
    position: relative;
    overflow: hidden;
  }
  .flashcard:hover { border-color: var(--accent); transform: translateY(-1px); }
  .flashcard.flipped .card-front { display: none; }
  .flashcard.flipped .card-back { display: flex; }
  .card-back { display: none; flex-direction: column; justify-content: center; height: 100%; }
  .card-front { display: flex; flex-direction: column; justify-content: space-between; height: 100%; }
  .card-src {
    font-family: var(--mono);
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: .1em;
    color: var(--text-dim);
    margin-bottom: 8px;
  }
  .card-q { font-size: 13px; color: var(--text-hi); font-weight: 500; flex: 1; }
  .card-hint { font-size: 11px; color: var(--text-dim); margin-top: 8px; }
  .card-a { font-size: 12.5px; color: var(--text); line-height: 1.6; }
  .card-flip-icon {
    position: absolute;
    bottom: 10px; right: 10px;
    font-size: 10px;
    color: var(--text-dim);
    font-family: var(--mono);
  }

  /* ── GLOSSARY VIEW ── */
  .glossary-list { display: flex; flex-direction: column; gap: 1px; }
  .glossary-item {
    display: grid;
    grid-template-columns: 180px 1fr;
    gap: 16px;
    padding: 10px 14px;
    border-radius: 4px;
    background: var(--surface);
    border: 1px solid var(--border);
    transition: border-color .12s;
  }
  .glossary-item:hover { border-color: var(--green); }
  .glossary-term {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 500;
    color: var(--green);
    align-self: center;
  }
  .glossary-def { font-size: 13px; color: var(--text); line-height: 1.5; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }


  /* ── FRAMEWORK VIEW ── */
  .fw-panel {
    display: flex;
    flex-direction: column;
    gap: 0;
  }
  .fw-meta-bar {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 28px;
    padding: 14px 18px;
    background: var(--surface);
    border: 1px solid var(--purple-lo);
    border-left: 3px solid var(--purple);
    border-radius: var(--radius);
  }
  .fw-meta-pill {
    font-family: var(--mono);
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 3px;
    border: 1px solid;
    letter-spacing: .04em;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .fw-pill-pillar  { border-color: var(--purple); color: var(--purple); background: var(--purple-lo); }
  .fw-pill-stage   { border-color: var(--accent);  color: var(--accent);  background: var(--accent-lo); }
  .fw-pill-risk    { border-color: var(--red);      color: var(--red);     background: var(--red-lo); }
  .fw-pill-stake   { border-color: var(--border-hi); color: var(--text-dim); background: transparent; }

  .fw-h3 {
    font-family: var(--serif);
    font-size: 20px;
    color: var(--purple);
    margin: 28px 0 10px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--purple-lo);

// Loaded from Topic_Frameworks.json
const TOPIC_FRAMEWORKS = {"The Six Pillar Framework (P1-P6)": {"_meta": {"acc_stage": "S1", "pc_stage": null, "syllabus_category": 1, "risk_categories": [], "stakeholders": ["Insurer", "Appointed Actuary", "Regulators (IRDAI)", "Shareholders"], "icon": "🏛️", "pillar": null}, "content": [{"type": "h3", "text": "Strategic Overview: The Pillar Map"}, {"type": "h4", "text": "P1: Product & Distribution (Design)"}, {"type": "point", "bold": "P1: Product & Distribution (Design)", "text": "Focus on New Product features, Target Market, and Benefit Design. [Linked Themes: Product Design, Group Products, CI, IP, LTC, PMI, State Healthcare]."}, {"type": "h4", "text": "P2: Pricing & Underwriting (Sell)"}, {"type": "point", "bold": "P2: Pricing & Underwriting (Sell)", "text": "Focus on Assumptions (Morbidity/Mortality), Rating Factors, and Selective Underwriting. [Linked Themes: Pricing, Underwriting]."}, {"type": "h4", "text": "P3: Claims Management (Pay)"}, {"type": "point", "bold": "P3: Claims Management (Pay)", "text": "Focus on Fraud control, Triage, TPA management, and Cost containment. [Linked Themes: Claims Management]."}, {"type": "h4", "text": "P4: Risk Mgmt & Reinsurance (Protect)"}, {"type": "point", "bold": "P4: Risk Mgmt & Reinsurance (Protect)", "text": "Focus on Risk Taxonomy, Reinsurance structures, and SCR/Capital. [Linked Themes: Risks, Reinsurance, Risk Management & Capital]."}, {"type": "h4", "text": "P5: Valuation & Data (Measure)"}, {"type": "point", "bold": "P5: Valuation & Data (Measure)", "text": "Focus on BEL/Risk Margin, IBNR methods, Data quality, and Investments. [Linked Themes: Reserving & Valuation, Data, Models, Investments]."}, {"type": "h4", "text": "P6: Regulation & Ethics (Comply)"}, {"type": "point", "bold": "P6: Regulation & Ethics (Comply)", "text": "Focus on IRDAI 2024 updates, PPH, and the Appointed Actuary role. [Linked Themes: Regulation, IRDAI Regulations, Professionalism]."}]}, "Pricing": {"_meta": {"acc_stage": "S3", "pc_stage": "S2", "syllabus_category": 3, "risk_categories": ["insurance", "market", "model"], "stakeholders": ["Insurer", "Appointed Actuary", "Policyholders", "Reinsurers", "Shareholders"], "icon": "💰", "pillar": "P2"}, "content": [{"type": "h3", "text": "Pricing Framework (SP1 Chapters 17 & 19)"}, {"type": "h4", "text": "Overview & Approach"}, {"type": "point", "text": "Pricing is one of the most important uses of actuarial models in SP1. [src:IAI_0416]"}, {"type": "point", "text": "Two main pricing methods: (1) Formula/Equation of Value approach, (2) Cashflow projection approach. Cashflow approach generally used in practice for long-term contracts. [src:IAI_1123]"}, {"type": "point", "text": "Focus of pricing: modelling benefit cashflows to derive a risk premium, then building up to the office premium. [src:IAI_0916]"}, {"type": "h4", "text": "Risk Premium — Individual Products"}, {"type": "text", "text": "**IP Insurance — Inception/Annuity Approach**"}, {"type": "point", "text": "Two functions: (1) Claim inception rate (probability that claim becomes payable in a given year, after deferred period), (2) Disabled life annuity (PV at claim inception of expected payments until policy expiry, allowing for escalation, interest, death and recovery)."}, {"type": "point", "text": "Note: Sickness inception rates ≠ Claim inception rates. Claim inception = sickness inception × probability of remaining sick through deferred period."}, {"type": "point", "text": "Expected PV of claims in a year = (survival probability) × (claim inception rate) × (annuity value) × (discount factor) × (annual benefit amount)."}, {"type": "text", "text": "**IP Insurance — Multi-State Modelling**"}, {"type": "point", "text": "More complex methodology; separately tracks policyholders through: healthy, sick within DP, claiming, recovering, dead."}, {"type": "point", "text": "Each subclass has its own transition probabilities: sickness inception, lapse, mortality, recovery, expiry."}, {"type": "point", "text": "Rates may vary by duration within state and number of previous claims."}, {"type": "point", "text": "Data limitations often require combining sub-cohorts or reducing transition intensities."}, {"type": "text", "text": "**CI Insurance**"}, {"type": "point", "text": "Much simpler than IP — benefit is a lump sum."}, {"type": "point", "text": "Overall CI incidence rate = sum of incidence rates by cause (heart disease, stroke, cancer, other). Care needed to avoid double-counting overlapping conditions."}, {"type": "point", "bold": "Accelerated CI", "text": "Claim incidence rate = ix + (1 − kx) × qx, where kx = proportion of deaths due to CI. Double-counting kx overstates it → understates claim cost → inadequate premiums/reserves."}, {"type": "point", "bold": "Standalone CI", "text": "Claim incidence rate = ix × probability of surviving the survival period."}, {"type": "text", "text": "**PMI — Incidence × Average Cost**"}, {"type": "point", "text": "Risk premium (age, gender) = Σk [ik × ACk], where ik = incidence rate for benefit/procedure class k, ACk = average claim cost for class k."}, {"type": "point", "text": "Data split by age bands, gender, location, hospital band, smoker status, occupation (territory and legislation dependent)."}, {"type": "point", "text": "Adjustments for: excesses (reduce incidence and average cost), NCD rating structures, co-insurance."}, {"type": "point", "text": "If gender-neutral pricing required: weight gender-specific rates by expected male:female mix. Risk: if one gender is cheaper, anti-selection worsens the pool."}, {"type": "point", "text": "Multi-state modelling used if premiums guaranteed for longer than one year."}, {"type": "text", "text": "**LTCI**"}, {"type": "point", "text": "Very similar approach to IP — inception/annuity or multi-state modelling."}, {"type": "point", "text": "Multi-state model tracks transitions between dependency levels (healthy → care level 1 → level 2 → level 3 → dead)."}, {"type": "point", "text": "Transition probabilities needed between all states; rates may vary by duration in current state and cause of incapacity."}, {"type": "text", "text": "**Health Cash Plans**"}, {"type": "point", "text": "Expected claims per benefit = inception rate × average benefit paid (adjusted for excesses/coinsurance)."}, {"type": "point", "text": "Flat rate often charged across broad age ranges despite age-varying incidence."}, {"type": "point", "text": "Adjust for 'inertia' — people's propensity not to claim when entitled (small benefit amounts + customer apathy). No adjustment needed if inertia already embedded in experience data."}, {"type": "text", "text": "**Accident & Sickness (ASU)**"}, {"type": "point", "text": "Follows inception/annuity approach similar to IP."}, {"type": "point", "text": "Average rate often agreed per lender/scheme (same premium per £ of loan regardless of age/gender). Large schemes use group techniques."}, {"type": "h4", "text": "Modelling Complexities by Product"}, {"type": "point", "bold": "IP", "text": "Estimate transition intensities (separate second/subsequent inceptions); recovery rates by duration and cause; sales volumes (affected by economic morale, government welfare, tax). Data limitation: published IP tables have limited credibility; industry data is heterogeneous."}, {"type": "point", "bold": "CI", "text": "Up to 40 separate condition distributions to estimate. Medical advances affect new vs existing business differently — conditions can be removed from new policies but not guaranteed in-force ones. Separate disease-based and treatment-based trend modelling advisable. Data limitation: CI not around long enough for credible experience except for cancers and heart attacks."}, {"type": "point", "bold": "LTCI", "text": "Limited experience data on transition rates. Claim amounts dependent on economy, inflation, care cost structures."}, {"type": "text", "text": "⬡ - OP pricing uses a burning cost approach: Burning cost = claim frequency × average claim severity. Risk factors include age, gender, network tier, benefit limits, co-pay level, and presence of dental/optical/maternity cover (which must be priced separately). [src:IAI_0722]"}, {"type": "text", "text": "⬡ - OP pricing must load for high claims administration expenses (high frequency, low value), initial product development and system costs (amortised over projected volume), underwriting loadings for sub-standard lives, and a profitability margin calibrated to capital requirements. [src:IAI_0722]"}, {"type": "h4", "text": "From Risk Premium to Office Premium (Chapter 19)"}, {"type": "point", "text": "Risk premium + expense loadings (initial/renewal/fixed overhead contribution) + profit loading + cost of capital = office premium."}, {"type": "point", "text": "Sensitivity testing must be performed throughout — test different future scenarios to ensure no serious financial difficulty."}, {"type": "h4", "text": "Profit Criteria"}, {"type": "point", "bold": "Profit signature", "text": "Sequence of profits from inception to termination — definitive guide to profitability but unwieldy."}, {"type": "point", "bold": "Net Present Value (NPV)", "text": "Discount profit signature at risk discount rate. Best criterion in theory (maximises company value). Expressed as % of initial sales costs or % of discounted premium income. Limitation: subject to law of diminishing returns; says nothing about competition."}, {"type": "point", "bold": "Internal Rate of Return (IRR)", "text": "Rate at which discounted cashflow = zero. May not be unique (multiple sign changes); cannot be related to sales costs or premium income. Easier to understand but less reliable than NPV."}, {"type": "point", "bold": "Discounted Payback Period (DPP)", "text": "Duration at which profits emerged have PV = zero. Useful for capital-constrained companies. Ignores all cashflows after payback — not reliable on its own."}, {"type": "point", "bold": "Common approach", "text": "NPV as primary criterion + DPP as secondary reference. DPP more useful for product design than pricing."}, {"type": "h4", "text": "Marketability"}, {"type": "point", "text": "Premiums must be tested for marketability. May lead to reconsideration of: product design, distribution channel, profit requirement, or whether to proceed at all."}, {"type": "point", "text": "Expenses (especially acquisition costs and marginal admin costs) must be re-examined."}, {"type": "h4", "text": "Competitiveness"}, {"type": "point", "text": "Monitor competitors' pricing closely. Significant discrepancies should be investigated. [src:IFoA_0425,IFoA_0922]"}, {"type": "point", "text": "If competitor uses more detailed risk differentiation: better lives go to competitor → insurer's average pricing assumptions are called into question (anti-selection)."}, {"type": "point", "text": "Two factors: (1) overall premium level vs competitors, (2) number and accuracy of rating factors used."}, {"type": "point", "text": "Volume matters: fixed expenses spread over volume. Low volume → high per-policy expense loading → uncompetitive premiums."}, {"type": "point", "bold": "Loss leaders", "text": "Products priced below full premium to gain market share, compensated by higher margins on other lines. Risk: adverse business mix (more loss-leader, less high-margin). Over time, bring each product back in line to its fair profit contribution."}, {"type": "point", "bold": "Return on capital", "text": "Each profit centre must meet its target return on capital. Excess return → pricing can be relaxed to promote volume. Insufficient return → grounds for withdrawal."}, {"type": "h4", "text": "Reserving & Solvency Capital in Pricing"}, {"type": "point", "text": "Writing a policy creates a capital requirement (supervisory reserves + solvency capital). Each policy must be charged for the cost of holding this capital."}, {"type": "point", "text": "Cost of capital = difference between internal rate of return and yield on locked-in statutory assets (e.g. 10% IRR − 4% asset yield = 6% per annum charge on SCR)."}, {"type": "point", "text": "Reserving assumptions in pricing model should match those expected to be used in practice (prudent or best estimate depending on regulatory regime)."}, {"type": "point", "text": "Reinsurance can reduce solvency capital requirements — consider pricing net of reinsurance."}, {"type": "h4", "text": "Reinsurance Impact on Pricing"}, {"type": "point", "text": "Reinsurance roles: technical assistance/data for new products; risk sharing; smoothing profitability; financing new business strain; tax and solvency capital arbitrage; enabling larger risks."}, {"type": "point", "text": "Cost: reinsurance premiums generally exceed expected reinsurance benefits (reinsurer covers own expenses and profit) → net cost to insurer, must be included in pricing model."}, {"type": "point", "text": "Benefit: where arbitrage possible (tax, capital), pricing net of reinsurance can improve competitiveness."}, {"type": "point", "text": "Quota share: reinsurer may require right to vary commission if insurer changes premium rates."}, {"type": "h4", "text": "Regulatory Impact on Pricing"}, {"type": "point", "bold": "Pricing freedom", "text": "Basis may be prescribed (e.g. community rating) or certain rating factors restricted (e.g. gender, genetic test results)."}, {"type": "point", "bold": "Cost impact", "text": "Regulatory restrictions on operations (e.g. investment constraints, premium tax collection) impose costs that must be reflected in pricing assumptions. Affects all insurers equally — does not alter competitive position."}, {"type": "h4", "text": "Premium Reviews"}, {"type": "point", "bold": "New business bases", "text": "Keep all assumptions under review. Test impact of any change against existing tariff before deciding whether to reprice. Changing prices is expensive and affects marketability."}, {"type": "point", "bold": "Reviewable premiums", "text": "Smaller margins included (because adverse experience can be corrected at next review). Monitor closely. Risk of selective lapsing on rate increase — healthier lives leave, worsening remaining portfolio. Rate increase must account for this risk. [src:IFoA_0922]"}, {"type": "point", "bold": "Loss-leader reserves", "text": "Where premiums inadequate, reserves must be established. Reserve size depends on speed at which premium can be reviewed and renewal likelihood as rates rise."}, {"type": "text", "text": "⬡ - Under consumer responsibility / TCF frameworks, pricing review should ensure: profitability margins are not excessive, unnecessary risk loadings are removed once experience matures, commission payments are proportionate to distributor effort, and premium/maximum benefit ratios remain consistent with fair value. [src:IFoA_0425]"}, {"type": "text", "text": "⬡ - In a high-inflation environment, short-term and group products (PMI, health cash plans, group IP) have lower inflation risk than long-term guaranteed-premium products (CI, individual IP) because premiums can be reset annually — sales strategy should reflect this differential exposure. [src:IFoA_0924]"}, {"type": "text", "text": "⬡ - The full office premium build-up includes: risk premium + expense loading + profit margin + cost of capital + cost of reserves + reinsurance cost/recoveries + margins + investment return credit + persistency adjustment + tax. In a high-inflation environment, multiple components shift simultaneously — a full review before repricing avoids uncoordinated partial adjustments. [src:IFoA_0924]"}, {"type": "text", "text": "⬡ - Expense loading by sum insured (rather than flat per-policy or by premium) better allocates costs to higher socio-economic segments with larger sum insureds, and enables the insurer to target a higher final office premium where price sensitivity is lower. [src:IFoA_0924]"}, {"type": "text", "text": "⬡ - To test price sensitivity of new business volumes, insurers can use: consumer surveys, focus groups, distributor interviews, phased test pricing by region or channel, comparison website data, internal sales/retention team data, reinsurer or consultant research, and own historic data on volume responses to past rate changes. [src:IFoA_0924]"}, {"type": "text", "text": "⬡ - The full office premium build-up includes: risk premium + expense loading + profit margin + cost of capital + cost of reserves + reinsurance cost/recoveries + margins + investment return credit + persistency adjustment + tax. In a high-inflation environment, multiple components shift simultaneously — a full review before repricing avoids uncoordinated partial adjustments. [src:IAI_0924]"}, {"type": "text", "text": "⬡ - Expense loading by sum insured (rather than flat per-policy or by premium) better allocates costs to higher socio-economic segments with larger sum insureds, and enables the insurer to target a higher final office premium where price sensitivity is lower. [src:IAI_0924]"}, {"type": "point", "bold": "Corrective Actions (Post-Review)", "text": "If profitability is lower than assumed, identify adverse trends and take action: update future assumptions, re-price with higher margins, re-design benefits (e.g. stricter protocols), change investment/sales/reinsurance strategy, or re-organize workforce/IT for efficiency. [src:IAI_1124]"}]}, "Claims Management": {"_meta": {"acc_stage": "S4", "pc_stage": "S6", "syllabus_category": 3, "risk_categories": ["insurance", "operational", "reputational"], "stakeholders": ["Policyholders", "Insurer", "TPAs", "Reinsurers", "Healthcare Providers"], "icon": "📝", "pillar": "P3"}, "content": [{"type": "h3", "text": "Claims Management"}, {"type": "h4", "text": "Claims Management Process"}, {"type": "point", "bold": "Notification & Proof", "text": "Clear definitions, documentation required, verification of pre-existing conditions. [src:IAI_0722,IAI_0918]"}, {"type": "point", "bold": "Assessment / Triage", "text": "Non-disclosure checks, tele-interviews, use of specialized medical officers. [src:IAI_0917]"}, {"type": "point", "bold": "Control & Mitigation", "text": "Home visits (IP), second opinions, independent medical exams. [src:IAI_0722]"}, {"type": "point", "bold": "Rehabilitation (IP)", "text": "Early intervention, proportionate benefits for partial return, funding treatment to reduce claim duration."}, {"type": "point", "bold": "Payment / Settlement", "text": "Annuity vs lump sum, tax implications, currency, avoiding over-insurance. [src:IFoA_0425]"}, {"type": "text", "text": "⬡ - Claim payment speed is a key customer outcome metric; rising settlement times (from days to weeks or months) damage policyholder trust, increase complaints and ombudsman referrals, and may indicate understaffing, process complexity, or governance deterioration. [src:IFoA_0425]"}, {"type": "text", "text": "⬡ - Insurers should minimise disputed CI claims through: clear and precise condition definitions, proactive claimant communication, transparent documentation requirements, and regular review of definitions against medical advances and claim dispute patterns. [src:IFoA_0425]"}, {"type": "text", "text": "⬡ - Declined claims can cause reputational and regulatory risk: policyholders and brokers may complain to the ombudsman, policies may be mis-sold, and regulators may scrutinise the insurer. Monitoring declined-claim rates and reasons is essential. [src:IAI_0722]"}, {"type": "text", "text": "⬡ - Claims experience analysis should be split by: age, policy duration, channel, product variant, and reason for decline. High declined-claim rates early in policy duration may indicate anti-selection or poor underwriting; late-duration spikes may indicate non-disclosure at inception. [src:IAI_0722]"}, {"type": "text", "text": "⬡ - When claim declines increase, the sales process and application forms should be reviewed to ensure clear disclosure requirements. Penalties for misrepresentation should be communicated at point of sale and reiterated in renewal communications. [src:IAI_0722]"}, {"type": "text", "text": "⬡ - Capitation (fixed annual payment per covered member to a provider network) reduces OP fraud, waste and abuse by aligning provider incentives — providers profit from efficiency rather than volume. Challenges include: difficulty agreeing rates for new business, quality-of-care risk, member inconvenience across networks, and potential regulatory barriers. [src:IAI_0722]"}, {"type": "h4", "text": "Declined Claims — Analysis & Management"}, {"type": "text", "text": "⬡ - Reasons for an increase in declined claims include: absolute growth in claim numbers, maturing book (underwriting effects wearing off), improved claims control processes, policyholder misunderstanding of coverage, fraud, and non-disclosure/misrepresentation at inception. [src:IAI_0722]"}, {"type": "text", "text": "⬡ - A key distinction is whether the proportion of declined claims (not just the absolute number) has risen — the proportion is a more meaningful indicator of claims control effectiveness or underwriting deterioration. [src:IAI_0722]"}, {"type": "text", "text": "⬡ - Declined claims generate regulatory, legal, and reputational risk: complainants may escalate to the financial ombudsman, and there is a risk of forced settlement on claims correctly declined. Brokers may withdraw if they face persistent customer complaints. [src:IAI_0722]"}, {"type": "text", "text": "⬡ - Response actions: review sales process and channel performance; update application forms and policy wording; strengthen underwriting evidence requirements; educate customers on covered conditions; monitor and publish declined-claim rates to demonstrate transparency. [src:IAI_0722]"}, {"type": "text", "text": "⬡ - To improve a deteriorating IP loss ratio, insurers can: increase or granularise premium rates; amend product terms (reduce replacement ratio, increase deferred period, introduce partial/rehabilitation benefits); tighten underwriting (limit high-risk occupations, reduce free cover limits, increase health evidence); tighten claims assessment; introduce loyalty benefits to reduce selective lapses; improve fraud detection; review and tighten policy wording; and seek reinsurer advice. [src:IFoA_0924]"}, {"type": "point", "bold": "Notification & Proof", "text": "Clear definitions [src:IAI_1124], documentation required, verification of pre-existing conditions. [src:IAI_0722,IAI_0918,IAI_1124]"}, {"type": "text", "text": "⬡ - Digital tools like EPR/EHR streamline the claims process by enabling real-time pre-authorization and providing immediate data on co-payments/benefit limits, reducing administrative burden for both provider and insurer. [src:IAI_1124]"}]}, "Regulation": {"_meta": {"acc_stage": "S1", "pc_stage": null, "syllabus_category": 2, "risk_categories": ["regulatory"], "stakeholders": ["Regulators (IRDAI)", "Insurer", "Policyholders", "Appointed Actuary", "Government"], "icon": "⚖️", "pillar": "P6"}, "content": [{"type": "h3", "text": "Regulatory / Compliance Framework"}, {"type": "h4", "text": "IRDAI 2024 Updates & Prudential Norms"}, {"type": "point", "bold": "Key 2024 Updates", "text": "60-month moratorium (not 48); PED waiting period max 36 months; 1-hr/3-hr cashless TATs; 30-day claim settlement mandate; Bima Sugam digital marketplace launch."}, {"type": "point", "bold": "Prudential Norms", "text": "Available Solvency Margin (ASM) >= 150% of Required Solvency Margin (RSM); statutory reserves certified by AA; investment restrictions by asset class."}, {"type": "h4", "text": "State Interaction & Conduct of Business"}, {"type": "point", "bold": "State Interaction", "text": "Integration with PMJAY (Ayushman Bharat); public provision defining the floor for private demand; co-payment and top-up structures."}, {"type": "point", "bold": "Conduct of Business", "text": "Treating Customers Fairly (TCF) principles; mandatory 15-day grievance resolution via GRM."}, {"type": "h4", "text": "Capital, Taxation & Grievance"}, {"type": "point", "bold": "Capital Frameworks", "text": "Solvency II Pillar 1/2/3 analogues; transition to Risk-Based Capital (RBC) and IFRS 17/Ind AS 117 on the horizon."}, {"type": "point", "bold": "Taxation", "text": "Section 80D benefits (up to Rs 1L for seniors); 18% GST impact on premiums and affordability."}, {"type": "point", "bold": "Grievance Redressal", "text": "Ombudsman hierarchy (internal -> Ombudsman -> Consumer Forum -> Civil Court)."}, {"type": "h4", "text": "Professional Roles"}, {"type": "point", "bold": "Professional Roles", "text": "Statutory role of Appointed Actuary (AA); whistleblowing; compliance with IAI APS 33/34."}, {"type": "h4", "text": "Regulatory Intervention Powers"}, {"type": "text", "text": "⬡ - Regulators can require an insurer to purchase additional reinsurance to limit exposure to adverse experience — protecting policyholders from insolvency risk; however, reinsurance availability on acceptable terms cannot be guaranteed, and the cost may strain the insurer's finances. [src:IFoA_0922]"}, {"type": "text", "text": "⬡ - Regulators can require the insurer to hold additional capital above minimum solvency requirements to provide a buffer against adverse experience; raising capital may be difficult or expensive depending on market conditions and investor appetite. [src:IFoA_0922]"}, {"type": "text", "text": "⬡ - Regulators can require a merger or acquisition — for example, requiring a poorly diversified insurer to combine with a better-diversified counterpart to improve portfolio risk spread and protect policyholders through a stronger combined entity. [src:IFoA_0922]"}, {"type": "text", "text": "⬡ - Regulators can revoke the fitness and propriety approval of senior management where governance or risk management failings are identified — replacing leadership may alter strategic direction, but creates short-term disruption that could itself harm policyholder service. [src:IFoA_0922]"}, {"type": "text", "text": "⬡ - Other regulatory intervention tools: (a) pricing restrictions to prevent excessive premiums; (b) restrictions on rating factors (e.g. banning genetic test results in underwriting); (c) restrictions on the sales process (mandatory disclosure requirements); (d) restrictions on investment strategy (limiting high-risk assets); (e) requirements to treat customers fairly, particularly in premium reviews on long-term products. [src:IFoA_0922]"}, {"type": "text", "text": "⬡ - Pros/cons of government-provided chronic illness cover: (Insurer) Reduced financial risk but loss of market share; (Government) Improved access and cost containment but budgetary and admin burdens; (Customers) Financial relief and expanded options but limited choice and potential coverage gaps. [src:IAI_1124]"}, {"type": "text", "text": "⬡ - A comprehensive report to the Board on new health products should cover: executive summary, overview of diseases/trends, analysis of existing policies/competitors, detailed data analysis (internal/external), regulatory compliance, financial implications (reserves/capital), customer experience, and risk mitigation strategies. [src:IAI_1124]"}]}, "IRDA Regulations": {"_meta": {"acc_stage": "S1", "pc_stage": null, "syllabus_category": 2, "risk_categories": ["regulatory"], "stakeholders": ["Regulators (IRDAI)", "Insurer", "Policyholders", "Appointed Actuary", "Government"], "icon": "📜", "pillar": "P6"}, "content": [{"type": "h3", "text": "Official IRDAI Regulations (2024)"}, {"type": "h4", "text": "Health Insurance Regulations 2024"}, {"type": "point", "text": "Consolidates and replaces 2016 rules; in force 1 April 2024"}, {"type": "point", "bold": "PED", "text": "defined as condition diagnosed/treated within 36 months prior to policy commencement"}, {"type": "point", "bold": "PED waiting period", "text": "capped at max 36 months continuous coverage; specific disease waiting period also max 36 months"}, {"type": "point", "bold": "Moratorium", "text": "60 continuous months (including portability & migration credits) — after which no policy or claim contestable except on grounds of fraud"}, {"type": "point", "text": "Enhanced sum insured carries a fresh 60-month moratorium clock"}, {"type": "point", "text": "Insurer cannot deny renewal on grounds of prior claims; no fresh medical at renewal unless sum insured is being increased"}, {"type": "point", "bold": "Grace period", "text": "15 days (monthly mode) / 30 days (other modes)"}, {"type": "point", "bold": "Indemnity policies", "text": "policyholder chooses primary insurer who coordinates with others for balance amount"}, {"type": "point", "bold": "Benefit policies", "text": "claims may be made from all insurers simultaneously"}, {"type": "point", "bold": "NCB", "text": "offered as cumulative bonus (SI increase without premium increase) OR discount on renewal premium — policyholder chooses form at renewal"}, {"type": "h4", "text": "Insurance Products Regulations 2024"}, {"type": "point", "text": "Repeals IRDAI (Health Insurance) 2016, IRDAI (ULIP) 2019, IRDAI (Non-Linked) 2019 and others"}, {"type": "point", "text": "Life insurers: benefit basis only (not indemnity); General/health insurers: both indemnity and benefit"}, {"type": "point", "text": "Insurer must offer products for all ages and all medical conditions — PED, chronic, disabilities, HIV/AIDS, mental illness"}, {"type": "point", "bold": "AYUSH", "text": "must be covered at par with allopathy; Board-approved AYUSH policy required; policyholder has choice of treatment system"}, {"type": "point", "text": "Premium must remain unchanged during policy term"}, {"type": "point", "text": "Renewal loadings applied at portfolio level, not individual policy level; discounts permitted for good claims experience"}, {"type": "point", "bold": "File and Use", "text": "prior filing to IRDAI + UIN assignment required before launch"}, {"type": "point", "bold": "Use and File", "text": "insurer may launch after UIN assignment without prior IRDAI filing, but PMC approval still required"}, {"type": "h4", "text": "Protection of Policyholders' Interests 2024"}, {"type": "point", "text": "Proposal form decision within **7 days** of receipt; policy document issued within **15 days** of acceptance"}, {"type": "point", "bold": "Free Look", "text": "30 days from receipt of policy document (policies with term >= 1 year); proportionate premium refund if cancelled with no claim"}, {"type": "point", "text": "Refund processed within 7 days of Free Look cancellation; delay attracts interest at bank rate + 2% from date of request"}, {"type": "point", "bold": "CIS (Customer Information Sheet)", "text": "mandatory with every policy — covers sum insured, coverage, exclusions, sub-limits, deductibles, waiting periods, Free Look, portability, moratorium; available in local language on request"}, {"type": "point", "text": "No claim repudiated without PMC or 3-member Claims Review Committee (CRC) approval; repudiation must cite specific policy terms"}, {"type": "point", "text": "Documents collected by insurer/TPA — policyholder not required to submit"}, {"type": "point", "bold": "Cashless", "text": "authorisation within **1 hour**; final discharge authorisation within **3 hours**"}, {"type": "point", "text": "Delay beyond 3 hours: additional hospital charges borne by insurer from shareholders' funds"}, {"type": "point", "text": "Claims not settled within timelines attract interest at bank rate + 2% paid suo-moto by insurer"}, {"type": "point", "bold": "Grievance hierarchy", "text": "Internal GRM → Insurance Ombudsman → Consumer Forum → Civil Court"}, {"type": "point", "text": "Ombudsman award complied with within 30 days; non-compliance: Rs 5,000/day penalty to complainant + penal interest"}, {"type": "point", "text": "Separate servicing channel required for senior citizen health insurance claims and grievances"}, {"type": "h4", "text": "Expenses of Management (EOM) 2024"}, {"type": "point", "bold": "Objective", "text": "Enable flexibility to manage expenses (including commissions) within IRDAI limits; optimally utilise resources to enhance policyholder benefits and improve insurance penetration"}, {"type": "point", "text": "In force: **1 April 2024**; reviewed once every 3 years; applies to all insurers transacting health insurance business"}, {"type": "point", "bold": "Part II — Board Approved Policies & Business Plan", "text": ""}, {"type": "point", "text": "Board-approved **EOM Policy** (annual) must specify: measures for cost reduction; manner of passing benefits of cost savings to policyholders via premium reduction; basis for allocation and apportionment of EOM across business segments; compliance mechanisms"}, {"type": "point", "text": "Allocation and apportionment of EOM across segments: responsibility of **Appointed Actuary + CFO**; any revision must be disclosed in notes to accounts"}, {"type": "point", "text": "Board-approved **Commission Policy** must specify: commission structure; policyholder interest; insurance penetration objectives; commensurate with policy nature and tenure; intermediary performance; business strategy fit; simplicity and cost-effectiveness; Commission policy may be subsumed into the EOM Policy"}, {"type": "point", "bold": "No commission should be recommended solely to earn higher payout", "text": "intermediaries must act in policyholder's best interest"}, {"type": "point", "bold": "New commission structures do not apply to already-sold policies", "text": ""}, {"type": "point", "text": "Board-approved **Business Plan** (annual, pre-year-start) must specify: projected capital requirements; quarterly solvency margin projections; projected EOM in Rs and as % of GWP; monitored by Board at regular intervals"}, {"type": "point", "bold": "Part III — EOM Limits (Health Insurer Specific)", "text": ""}, {"type": "point", "text": "General insurer: EOM ≤ **30%** of gross premium written in India per FY"}, {"type": "point", "text": "Standalone health insurer: EOM ≤ **35%** of gross premium written in India per FY"}, {"type": "point", "text": "Commission payable for health insurance products (by general or standalone health insurer) shall **not exceed** the overall EOM limit under these regulations"}, {"type": "point", "bold": "Part IV — Additional Allowable Expenses", "text": ""}, {"type": "point", "bold": "Insurtech + Insurance Awareness", "text": "additional allowance of up to **5% of allowable EOM** (under Reg 6) to widen customer reach; depreciation on Insurtech capex also included"}, {"type": "point", "bold": "Head Office expenses", "text": "(if branch outside India / IFSC Insurance Office): additional allowance ≤ **10% of gross premium written outside India** through such branch/IIO (for health/general insurer)"}, {"type": "point", "bold": "Rural sector / PMJAY / PMSBY / PMFBY and other schemes", "text": "additional allowance for health insurer reporting growth in gross direct premium from rural sector, PMJAY, PMFBY; allowance ≤ **15% of incremental premium** over previous FY from these schemes; in no case exceeding actual EOM incurred for these schemes in previous FY"}, {"type": "point", "bold": "Part VI — Returns & Compliance", "text": ""}, {"type": "point", "bold": "Return of EOM", "text": "(Schedule II for health/general insurer): prepared at FY end; signed by CEO, CFO, Chief Compliance Officer, and **Appointed Actuary**; certified by Statutory Auditor"}, {"type": "point", "text": "Return reviewed by Audit Committee → placed before Board → filed with IRDAI along with annual financial statements"}, {"type": "point", "bold": "Commission return", "text": "filed within **45 days** of FY end; reviewed by Audit Committee before Board approval"}, {"type": "point", "text": "Computation based on accrual basis income/expenditure"}, {"type": "point", "bold": "Part VII — Forbearance", "text": ""}, {"type": "point", "text": "IRDAI may grant forbearance (case-by-case) to health/general insurers exceeding EOM limits if **duration of business ≤ 5 years**"}, {"type": "point", "text": "For FY 2023-24 excess: IRDAI may grant forbearance if Board confirms it will bring expenses within limits within **2 years** (by end of FY 2025-26); insurer must submit a business plan"}, {"type": "point", "bold": "Part IX — Compliance & Consequences", "text": ""}, {"type": "point", "text": "Health/general insurer must ensure EOM within allowable limits on **overall basis**; excess charged to **Profit & Loss Account**"}, {"type": "point", "text": "If actual EOM exceeds projected EOM (from Business Plan) by **≥10%**: no variable pay to MD/CEO/WTD/KMPs for that FY (not applicable if duration of business ≤ 5 years)"}, {"type": "point", "text": "Penalties for breach: excess charged to P&L; restriction on new places of business; warning; valuation of financial health; penal action under s.102 of Insurance Act; restriction on MD/CEO/KMP performance incentives; removal of managerial personnel; IRDAI may restrict new underwriting in breached segments"}, {"type": "h4", "text": "Actuarial, Finance & Investment 2024"}, {"type": "point", "bold": "AA Eligibility", "text": "Fellow of IAI; full-time employee; not AA of any other insurer; not over age 70; holds Certificate of Practice"}, {"type": "point", "text": "Experience: ≥9 years in general/health insurance; ≥4 years post-fellowship (reduced by 2 years if SA3/health specialist passed)"}, {"type": "point", "text": "≥2 post-fellowship years in statutory valuation or pricing of Indian general/health insurer; ≥3 years middle/senior management"}, {"type": "point", "text": "No business without AA permitted; AA reports directly to CEO; AA must not simultaneously be CRO"}, {"type": "point", "text": "Health insurer must have at least one additional actuary beyond AA for pricing and valuation"}, {"type": "point", "bold": "AA duties", "text": "certify claims reserves (IBNR, IBNER, PDR); ensure premium rates are fair; ensure adequacy of reinsurance; identify solvency risks and report to Board; inform Competent Authority if insurer fails to rectify solvency; certify assets and liabilities under s.64V"}, {"type": "point", "text": "PDR maintained at insurer level but monitored at segment level"}, {"type": "point", "bold": "Solvency", "text": "ASM >= 150% RSM at all times; RSM subject to minimum of 50% of minimum capital under s.6 of Insurance Act"}, {"type": "point", "text": "Negative IBNR for any year of occurrence treated as zero; mathematical reserves cannot fall below surrender value"}, {"type": "point", "text": "All policies on bonus distribution, ALM, investment, and risk management must be Board-approved"}, {"type": "point", "text": "Transition to Risk-Based Capital (RBC) and IFRS 17 / Ind AS 117 framework underway"}, {"type": "h4", "text": "Re-insurance Regulations 2024"}, {"type": "point", "text": "Simplified Quota Share and Excess of Loss structures"}, {"type": "point", "text": "Defined retention hierarchies for Indian reinsurers, Foreign Reinsurer Branches (FRBs), and Cross-Border Reinsurers (CBRs)"}, {"type": "point", "text": "CBR residency and regulatory compliance rules apply"}, {"type": "point", "text": "PMC must review reinsurance risks before product launch"}, {"type": "point", "text": "Appointed Actuary responsible for ensuring adequacy of reinsurance arrangements"}, {"type": "point", "text": "Reinsurance arrangements must be consistent with product profitability and capital assessments approved by PMC"}, {"type": "h4", "text": "Registration & Capital 2024"}, {"type": "point", "text": "Minimum capital entry: **Rs 100 Cr** under s.6 of Insurance Act"}, {"type": "point", "text": "Structure for amalgamations and transfer of shares; net worth requirements"}, {"type": "point", "text": "Board-level governance of all product, expense, and capital decisions via PMC"}, {"type": "point", "text": "Insurer must at all times maintain ASM >= 150% RSM"}, {"type": "point", "text": "IRDAI approval required before AA appointment takes effect; IRDAI must decide on AA appointment application within 30 days of receipt"}, {"type": "h4", "text": "Appointed Actuary Regulations 2022"}, {"type": "point", "bold": "Eligibility", "text": "Fellow of IAI; full-time employee; holds Certificate of Practice; not AA of any other insurer; not over 70; no professional misconduct; IRDAI approval required"}, {"type": "point", "text": "AA has statutory right to attend and speak at Board, management, shareholder, and policyholder meetings on matters affecting solvency or policyholder interests"}, {"type": "point", "text": "No letter of appointment may restrict AA's statutory duties"}, {"type": "point", "text": "AA must inform Competent Authority within **7 days** of any disciplinary proceedings initiated"}, {"type": "point", "text": "Insurer must not obstruct AA in performing duties; AA may not simultaneously be CRO"}, {"type": "point", "text": "AA must comply with IAI APS 33/34 and other professional standards"}, {"type": "point", "bold": "Dual reporting obligation", "text": "to Board and IRDAI"}]}, "Risks": {"_meta": {"acc_stage": "S2", "pc_stage": "S8", "syllabus_category": 4, "risk_categories": ["insurance", "market", "credit", "operational", "liquidity", "regulatory", "reputational", "catastrophe", "model", "persistency"], "stakeholders": ["Insurer", "Appointed Actuary", "Reinsurers", "Regulators (IRDAI)", "Shareholders"], "icon": "⚠️", "pillar": "P4"}, "content": [{"type": "h4", "text": "🧠 Mnemonic: 17 Risk Categories"}, {"type": "text", "text": "**Sequence**: DCCS · IEP · MV · GCMC · LRF · AN"}, {"type": "text", "text": "**Phrase**: *\"Dogs Chase Cats Sometimes; It Exasperates People. Most Vets Give Chase; Many Cats Lose. Running Fast And Nimble.\"*"}, {"type": "text", "text": "**Key**: Data · Claim rates · Claim amounts · Screening | Investment · Expenses · Persistency | Mix · Volume | Guarantees · Competition · Management · Counterparties | Legal · Reputation · Fraud | Aggregation/Cat · Non-disclosure"}, {"type": "h3", "text": "SP1 Textbook: Nature of Risks (Chapters 23–24)"}, {"type": "h4", "text": "Nature of Risk Components"}, {"type": "point", "bold": "Model Risk", "text": "the underlying model structure is inappropriate or contains errors"}, {"type": "point", "bold": "Parameter Risk", "text": "wrong parameter values used, even if the model structure is correct"}, {"type": "point", "bold": "Random Fluctuations", "text": "sample error and heterogeneity mean actual experience deviates unpredictably from the model"}, {"type": "h4", "text": "Policy & Other Data Risks"}, {"type": "point", "text": "Inaccurate or incomplete policy records → actuarial results and recommendations are unreliable"}, {"type": "point", "bold": "Model point risk", "text": "model points used to represent the portfolio may not capture its actual characteristics accurately"}, {"type": "point", "bold": "External data mismatch", "text": "e.g. using USA data for an Indian market without adequate adjustment"}, {"type": "h4", "text": "Claim Rates (Morbidity / Mortality)"}, {"type": "point", "text": "Future parameters can never be predicted with certainty — new diseases and medical trends can emerge at any time"}, {"type": "point", "bold": "Expanding funnel of doubt", "text": "uncertainty grows the further into the future projections extend"}, {"type": "h4", "text": "Claim Amounts (PMI-specific)"}, {"type": "point", "text": "Short-term variability in procedure costs, even within a single year"}, {"type": "point", "text": "Medical advances can shift costs rapidly — e.g. hip replacement rehab time shortened from weeks to days, significantly reducing per-claim cost"}, {"type": "h4", "text": "Earlier Screening & Diagnosis"}, {"type": "point", "text": "For CI: earlier diagnosis = earlier payment of the sum insured"}, {"type": "point", "text": "Screening campaigns can prompt claims that would otherwise never have been payable (e.g. policy would have lapsed or expired before diagnosis)"}, {"type": "h4", "text": "Investment Performance & Assets"}, {"type": "point", "bold": "Capital values risk", "text": "a company appearing solvent today may become insolvent the next day after an asset value change (snapshot risk)"}, {"type": "point", "text": "Low reserves in CI and PMI mean investment performance is relatively less important compared to long-term products such as LTCI"}, {"type": "h4", "text": "Expenses and Inflation"}, {"type": "point", "text": "Mismatch risk — expense inflation may outpace the loadings built into premiums over time"}, {"type": "point", "bold": "Volume impact", "text": "low business volume means fixed costs are spread over fewer policies, increasing per-policy expense above assumed"}, {"type": "point", "bold": "TPA fees", "text": "third-party administrators (e.g. for IP or PMI claims) add costs that are harder to predict and control"}, {"type": "h4", "text": "Persistency & Selective Withdrawal"}, {"type": "point", "bold": "Selective effect", "text": "healthier lives are more likely to lapse, leaving behind a worse-than-average insured group"}, {"type": "point", "bold": "Amortisation risk", "text": "if early lapses occur, initial acquisition costs are not recouped from future charges"}, {"type": "h4", "text": "Mix & Volume of New Business"}, {"type": "point", "bold": "Mix by nature/size", "text": "smaller-than-expected average policies generate lower premium loadings but fixed per-policy costs remain, reducing contribution to overheads"}, {"type": "point", "bold": "Volume too high", "text": "strains capital resources and administration capacity"}, {"type": "point", "bold": "Volume too low", "text": "fixed development and overhead costs are not recovered"}, {"type": "h4", "text": "Guarantees and Options"}, {"type": "point", "text": "Terms must be offered in advance of the triggering event, making costing inherently uncertain"}, {"type": "point", "text": "Health and care events are harder to predict than life events, demanding more caution in pricing and reserving"}, {"type": "point", "text": "Stochastic models are usually required to properly value the cost of guarantees"}, {"type": "h4", "text": "Competition & Management Actions"}, {"type": "point", "bold": "Competition", "text": "pressure to reduce premiums, increase coverage, or add guarantees beyond what is prudent"}, {"type": "point", "bold": "Management override", "text": "management may set aside the actuary's recommendations to pursue market share or shareholder returns"}, {"type": "h4", "text": "Counterparties (RI / Distributors / TPAs)"}, {"type": "point", "bold": "Reinsurer default", "text": "reinsurer fails to meet claim recovery obligations, leaving full cost with the insurer"}, {"type": "point", "bold": "Distributor risk", "text": "broker holds premiums or claims payments and delays/fails to pass them on"}, {"type": "point", "bold": "TPA risk", "text": "third-party administrators can commit expenditure on behalf of the insurer, reducing claims cost control"}, {"type": "h4", "text": "Legal, Regulatory & Tax"}, {"type": "point", "text": "Retrospective legislative changes can override policy terms for in-force contracts"}, {"type": "point", "text": "Prohibition of certain rating factors — e.g. race, genetics — can affect pricing ability"}, {"type": "h4", "text": "Reputation & Operational Fraud"}, {"type": "point", "bold": "Reputational risk", "text": "media or social media exposure, particularly for claims involving the sick or elderly, can damage brand and new business volumes"}, {"type": "point", "bold": "Internal fraud", "text": "staff in positions of trust may embezzle funds or leak confidential information; requires robust audit and governance"}, {"type": "h4", "text": "Aggregation, Concentration & Catastrophe"}, {"type": "point", "bold": "Aggregation", "text": "localised outbreak of illness affecting a geographically concentrated insured group"}, {"type": "point", "bold": "Concentration", "text": "industry-specific exposure (e.g. mining workforce with a specific occupational disease)"}, {"type": "point", "bold": "Catastrophe", "text": "pandemic, war, or terrorism giving rise to a large number of claims from a single cause"}, {"type": "text", "text": "⬡ - Overseas/expatriate PMI adds accumulation risk: expatriate communities are close-knit and may face higher epidemic/pandemic exposure than the general population. Exchange rate, investment, lapse (currency-driven), operational, and taxation risks also emerge in a new territory. [src:IAI_0523]"}, {"type": "h4", "text": "Non-disclosure & Anti-selection"}, {"type": "point", "bold": "Non-disclosure", "text": "asymmetric information at proposal stage makes accurate premium rating more difficult"}, {"type": "point", "bold": "Moratorium approach", "text": "accepting all lives initially and underwriting at claim stage complicates proof of non-disclosure and increases media risk on claim refusals"}, {"type": "point", "bold": "Genetic testing", "text": "access to genetic test results is subject to ongoing legislative debate and varies by jurisdiction"}, {"type": "text", "text": "⬡ - Poor selling practices are a systemic cause of non-disclosure — sellers failing to explain the materiality of information, or completing forms on behalf of customers. Review of application forms, marketing literature and policy wording can reduce incidence. [src:IAI_0722]"}, {"type": "h4", "text": "Product-specific: IP Insurance"}, {"type": "point", "text": "Sickness transition probabilities (claim inception and termination rates) are the primary risk"}, {"type": "point", "text": "Moral hazard — claimants have less incentive to return to work while receiving benefit"}, {"type": "point", "text": "Leniency of the incapacity definition increases both expected cost and uncertainty of outcome"}, {"type": "h4", "text": "Product-specific: CI Insurance"}, {"type": "point", "text": "Diagnosis rates are the primary risk, driven by medical advances and screening programmes"}, {"type": "point", "text": "Limited historical data in newer markets → high parameter risk"}, {"type": "point", "text": "Heterogeneous industry data (different CIs covered by different insurers) reduces reliability of pooled data"}, {"type": "h4", "text": "Product-specific: LTC Insurance"}, {"type": "point", "text": "High claim inception probabilities and transfer between dependency levels are the main risks"}, {"type": "point", "text": "Significant investment and reserving risk given large reserves that accumulate prior to claims"}, {"type": "point", "bold": "Marketing / reputational risk", "text": "policyholders may expect 100% of care costs to be covered, but most benefit definitions do not guarantee this"}, {"type": "h4", "text": "Product-specific: PMI"}, {"type": "point", "text": "Third parties (consultants, doctors, hospitals) control the triggering and cost of claims — insurer has limited direct control"}, {"type": "point", "text": "Risk of single very large claims (e.g. expensive overseas treatment) or accumulation of claims from one incident"}, {"type": "point", "text": "Capital strain is lower than for long-term products due to short-term nature of the contract"}, {"type": "h4", "text": "Inflation Risk (Macro Environment)"}, {"type": "text", "text": "⬡ - In a high-inflation environment, lapses may be selective: healthier lives may choose to drop cover to save money, leaving behind a worse-than-average insured pool — particularly affecting longer-term guaranteed-premium products. [src:IFoA_0924]"}, {"type": "text", "text": "⬡ - High inflation increases the risk of non-disclosure at underwriting: cost-pressured consumers may be tempted to omit material information to reduce premiums, raising claims investigation costs and fraud risk. [src:IFoA_0924]"}, {"type": "text", "text": "⬡ - Operational risk increases under high inflation: hiring freezes to manage costs increase workload on existing staff, raising the risk of errors, staff turnover, and quality deterioration. [src:IFoA_0924]"}, {"type": "text", "text": "⬡ - Counterparty risk may increase in a high-inflation environment: reinsurers may be downgraded, and outsourced service providers may cease contracts or reduce quality if their own cost base is squeezed. [src:IFoA_0924]"}, {"type": "text", "text": "⬡ - Options and guarantees embedded in policies (e.g. guaranteed premium rates, guaranteed insurability options) are more likely to come into the money in a high-inflation environment, increasing their cost and reducing product profitability. [src:IFoA_0924]"}, {"type": "text", "text": "⬡ - Group business retention may be higher during inflationary periods as employers use benefits-in-kind rather than salary increases to retain staff — partially offsetting the lapse risk on individual business. [src:IFoA_0924]"}, {"type": "h4", "text": "Climate & Catastrophe Risk (PMI-specific)"}, {"type": "text", "text": "⬡ - Climate-related events (e.g. flooding) can increase PMI claim frequency and severity, introduce greater year-on-year variability, and shift the regional mix of claims — with flood-prone areas experiencing large spikes while other regions remain unaffected. Extreme events create tail-risk that standard historical data cannot capture. [src:IFoA_0923]"}, {"type": "text", "text": "⬡ - Flood events impact PMI claims through: increased incidence of injury, infection, and disease; worsening of existing conditions (e.g. respiratory illness); damage to healthcare infrastructure reducing treatment access; supply disruptions for medicines; and delayed claim settlement due to increased complexity. [src:IFoA_0923]"}, {"type": "text", "text": "⬡ - Historic claims data becomes unreliable as a predictor of future experience under climate change — trends are harder to identify, credible data takes years to accumulate, and external sources (university studies, government flood models) must be evaluated for credibility before being incorporated into pricing or capital models. [src:IFoA_0923]"}, {"type": "text", "text": "⬡ - Allowing for increased flood risk in regulatory capital (99.5% VaR) is highly challenging: limited data on tail scenarios, difficulty quantifying how flood risk changes correlations between risks (morbidity, expenses, lapses), need for external expertise, and risk that initial capital estimates are materially imprecise and require revision over time. [src:IFoA_0923]"}]}, "Underwriting": {"_meta": {"acc_stage": "S2", "pc_stage": "S5", "syllabus_category": 3, "risk_categories": ["insurance"], "stakeholders": ["Insurer", "Policyholders", "Distributors", "Reinsurers"], "icon": "🔍", "pillar": "P2"}, "content": [{"type": "h3", "text": "Underwriting Strategy"}, {"type": "point", "bold": "Objective", "text": "Prevent anti-selection, classify risks equitably, maintain competitor parity."}, {"type": "point", "bold": "Methods", "text": "Medical (files, exams) vs. Non-Medical (questionnaires, tele-interviewing)."}, {"type": "point", "bold": "Alternative Approaches", "text": "Moratorium underwriting (often PMI), Free Cover Limits (Group)."}, {"type": "point", "bold": "Outcomes", "text": "Standard rates, rated premiums (+%), exclusions, deferral, decline."}, {"type": "point", "bold": "Operational", "text": "Cost vs. Value of info, speed of onboarding (straight-through processing)."}, {"type": "text", "text": "⬡ - Telephone interview underwriting for IP gives the insurer a wide range of relevant information, allows nuanced risk assessment, reduces anti-selection, and makes subsequent claims management simpler — but is time-consuming, expensive, and prone to human error. From the customer perspective: fair premium and claim certainty are advantages; lengthy process, potential decline, and intrusive disclosure requirements are disadvantages. [src:IFoA_0424]"}, {"type": "text", "text": "⬡ - For OP cover, underwriting emphasises high-frequency/low-severity risk. Controls include: medical declaration and diagnosis testing upfront, simplified underwriting for small sub-limits, co-payment/deductible design, and credibility approaches with high claim counts but low amounts. [src:IAI_0722]"}, {"type": "text", "text": "⬡ - Where a significant proportion of claims are being declined, strengthening initial underwriting (e.g. collecting more medical evidence at inception) can reduce non-disclosure and misrepresentation, improving the declined-claim ratio over time. [src:IAI_0722]"}, {"type": "h4", "text": "Automated / AI Underwriting"}, {"type": "text", "text": "⬡ - IP is more complex to underwrite than other health products because incapacity can arise from a wide range of causes (back pain, stress, mental health) that are not relevant to CI or PMI — an automated system must be explicitly designed to assess these IP-specific factors. [src:IFoA_0424]"}, {"type": "text", "text": "⬡ - Automated underwriting can improve speed, consistency, and cost-efficiency; faster decisions may attract more financial advisors and increase new business volumes. However, human underwriters offer nuanced judgment for complex cases that AI may not replicate, and their expertise is permanently lost if they are made redundant. [src:IFoA_0424]"}, {"type": "text", "text": "⬡ - Key risks of automated underwriting: (a) bias or discrimination if prohibited characteristics (or proxies for them) are embedded in the algorithm, (b) data quality issues leading to incorrect decisions, (c) lack of transparency making it difficult to identify or explain errors, (d) complete operational dependence on a third-party system with no fallback if the vendor ceases trading or the system fails. [src:IFoA_0424]"}, {"type": "text", "text": "⬡ - Before implementing an automated underwriting system, an insurer should obtain from the vendor: details of other countries/companies where the system has been used (especially for IP), the data sources and risk factors used, how prohibited characteristics are excluded, data security and jurisdiction controls, pricing structure, ongoing support and update processes, and regulatory track record. [src:IFoA_0424]"}, {"type": "text", "text": "⬡ - Governance controls for automated underwriting: human oversight with override capability; pre-launch testing and bias checking; regular sample-based monitoring against human decisions; clear feedback channels for advisors and policyholders; phased implementation; written undertaking on data law compliance; contingency processes if the system fails. [src:IFoA_0424]"}, {"type": "text", "text": "⬡ - Implementing automated underwriting increases reserving and capital uncertainty in the short term as existing claims data may no longer be representative of the new business mix — prudence margins in reserves and capital should be increased until sufficient experience under the new system has accumulated. [src:IFoA_0424]"}, {"type": "h4", "text": "Underwriting Policy Review"}, {"type": "text", "text": "⬡ - Failing to regularly review underwriting policy exposes an insurer to: over-insurance and fraud risk, concentration in poor-risk segments, uncompetitive terms (inflation eroding financial limits; outdated medical limits vs market), regulatory non-compliance (e.g. mental health access rules), and loss of broker/IFA support leading to volume and expense risk. [src:IFoA_0923]"}, {"type": "text", "text": "⬡ - When reviewing underwriting policy, investigate: how current policy is being implemented in practice; cost/benefit of current approach; early claims experience (anti-selection indicator); claims by underwriting category (policy effectiveness); exposure data by age/occupation/geography; competitor and market practice; reinsurer/consultant data; lapse experience; and distributor opinions. [src:IFoA_0923]"}, {"type": "text", "text": "⬡ - When a competitor removes initial medical underwriting and moves to moratorium/PEC exclusions: standard lives may get better terms from the insurer retaining full UW; groups with loaded/declined occupations may migrate to the competitor; the insurer's book becomes concentrated in cleaner r
