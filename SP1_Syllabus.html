isks but may lose volume — strategic responses include matching the competitor's approach or tightening UW to offer lower prices to better risks. [src:IFoA_0923]"}, {"type": "text", "text": "⬡ - Non-disclosure risk is higher in online and direct sales channels where no intermediary explains the legal duty of disclosure or the consequences of misrepresentation — policyholders may omit material information without realising it. Mitigant: clear disclosure prompts and prominent consequences notices in the online journey. [src:IFoA_0922]"}, {"type": "text", "text": "⬡ - For online-distributed, lower-sum products (e.g. MME), simplified underwriting (including moratorium or exclusion-only approaches) is appropriate: the premium income is too small to justify full medical underwriting, and fixed benefit amounts reduce the anti-selection incentive compared to indemnity PMI. [src:IFoA_0922]"}, {"type": "h4", "text": "Biometric & AI-Based Underwriting Tools"}, {"type": "text", "text": "⬡ - A photo-based AI underwriting tool (estimating age, gender, smoker status, weight, and healthy/overall life expectancy from a smartphone image) can enable more individualised IP pricing and reduce underwriting costs and margins for uncertainty — but requires higher margins if tool accuracy is uncertain, and past claims data becomes less representative once the underwriting basis changes. [src:IFoA_0422]"}, {"type": "text", "text": "⬡ - Key risks of photo-based underwriting: photo fraud (altered, old, or substitute images); algorithmic bias against protected characteristics with serious reputational and regulatory consequences; data consent and security obligations; business mix distortion (healthy lives self-select to the photo channel); reinsurer reluctance or requirement for higher margins; and vendor dependency risk if the underwriting company ceases trading. [src:IFoA_0422]"}, {"type": "text", "text": "⬡ - Beyond pricing and acceptance, a biometric underwriting tool can be used for: case reserving (individual health data improves reserve accuracy); claims validation (verify claimant identity and health status at claim stage); rewards/wellness programmes (track lifestyle changes over policy life); marketing differentiation; and policyholder identification for administration. [src:IFoA_0422]"}]}, "Risk Management & Capital": {"_meta": {"acc_stage": "S2", "pc_stage": "S8", "syllabus_category": 4, "risk_categories": ["insurance", "market", "credit", "operational", "catastrophe"], "stakeholders": ["Insurer", "Appointed Actuary", "Shareholders", "Regulators (IRDAI)", "Reinsurers"], "icon": "🛡️", "pillar": "P4"}, "content": [{"type": "h3", "text": "Risk Framework"}, {"type": "h4", "text": "Risk Types & Quantification"}, {"type": "point", "bold": "Risk Types", "text": "Market/Investment, Default/Credit, Underwriting (Mortality/Lapse/Expense), Operational."}, {"type": "point", "bold": "Quantification", "text": "Stress and Scenario testing, Internal Models vs. Standard Formula."}, {"type": "h4", "text": "Mitigation & Capital"}, {"type": "point", "bold": "Mitigation", "text": "Reinsurance, Asset-Liability Matching (ALM), product redesign (reviewable premiums), stricter claims controls. [src:IFoA_0922]"}, {"type": "point", "bold": "Capital", "text": "Economic capital vs. Regulatory capital, risk appetite statements, diversification benefits."}, {"type": "text", "text": "⬡ - Expanding the product range (e.g. adding LTC to an insurer writing mainly short-term products for younger lives) can naturally hedge mortality/morbidity concentration risk: LTC generates longevity exposure that partly offsets mortality exposure on ACI. [src:IFoA_0922]"}, {"type": "text", "text": "⬡ - Options and guarantees held by policyholders create adverse experience and capital strain risk: mitigants include restricting the terms under which options can be exercised, requiring additional premium at option exercise, or not offering options where the product is distributed without advice. [src:IFoA_0922]"}, {"type": "text", "text": "⬡ - Surrender/withdrawal penalties on pre-funded LTC products can limit mass-lapse risk if government introduces public LTC provision — ensuring the insurer has time to run off liabilities in an orderly manner. [src:IFoA_0922]"}]}, "Reserving & Valuation": {"_meta": {"acc_stage": "S4", "pc_stage": "S8", "syllabus_category": 4, "risk_categories": ["insurance", "model"], "stakeholders": ["Insurer", "Appointed Actuary", "Regulators (IRDAI)", "Shareholders", "Reinsurers"], "icon": "📈", "pillar": "P5"}, "content": [{"type": "h3", "text": "Reserving & Valuation"}, {"type": "h4", "text": "Reserving Principles"}, {"type": "point", "bold": "Components", "text": "Mathematical reserves (BEL), Risk Margin, Unearned Premium Reserve (UPR), Outstanding Claims (OSLR), IBNR. [src:IFoA_0922]"}, {"type": "point", "bold": "Methods", "text": "Bornhuetter-Ferguson, Chain Ladder / Run-off triangles (short-tailed), Cashflow projection (long-tailed)."}, {"type": "point", "bold": "Differences", "text": "Pricing (realistic + profit margin) vs. Supervisory (prudent/margins) vs. Embedded Value (market consistent)."}, {"type": "point", "bold": "Prudence", "text": "Allowance for adverse deviation, discounting at risk-free rates."}, {"type": "text", "text": "⬡ - For a level-premium protection product, gross reserves typically build during the early years as the increasing cost of cover exceeds the level premium, then run off as the remaining term shortens. [src:IAI_0523]"}, {"type": "text", "text": "⬡ - Best estimate (BE) assumptions are derived first, typically close to pricing assumptions. Margin for Adverse Deviation (MAD) is added, calibrated to regulatory requirements and the appointed actuary's judgment. [src:IAI_0523]"}, {"type": "text", "text": "⬡ - The reinsurance credit equals the discounted value of future expected excess of reinsurance recovery over reinsurance premium. It reduces to zero at policy expiry, typically declining each year as the term shortens. [src:IAI_0523]"}, {"type": "h4", "text": "Reinsurance Credit in Valuation"}, {"type": "text", "text": "⬡ - The reinsurance credit is the discounted present value of expected future net recoveries from the reinsurer (recoveries less premiums payable). It reduces gross reserves to give net reserves. [src:IAI_0523]"}, {"type": "text", "text": "⬡ - For a level-premium CI product, the reinsurance credit typically declines year-on-year as the remaining term shortens, falling to zero at policy maturity. [src:IAI_0523]"}, {"type": "text", "text": "⬡ - Reinsurance reduces reserves but also reduces the prudence margin: if the reinsurance premium rate equals the BE mortality assumption, the gross prudence for 50% of the benefit is lost, which reduces reserves and improves EV under traditional methods. [src:IAI_0523]"}, {"type": "text", "text": "⬡ - Reinsurance premiums are paid in advance while recoveries are received in arrear — this creates a cash-flow timing disadvantage that slightly reduces investment income. [src:IAI_0523]"}]}, "Reinsurance": {"_meta": {"acc_stage": "S3", "pc_stage": "S8", "syllabus_category": 4, "risk_categories": ["credit", "catastrophe"], "stakeholders": ["Reinsurers", "Insurer", "Appointed Actuary", "Regulators (IRDAI)"], "icon": "🔄", "pillar": "P4"}, "content": [{"type": "h3", "text": "1. Reasons for Reinsurance"}, {"type": "point", "bold": "Limitation of Exposure to Risk", "text": "Factors affecting appetite include size of insurer, marketplace experience, available free assets, portfolio size (credibility), and predictability of business outcome. Larger free assets and larger portfolio reduce the need for reinsurance. [src:IAI_0523]"}, {"type": "point", "bold": "Avoidance of Large Single Losses", "text": "Insurer compares potential maximum claim to free assets. Small/medium insurers cede top slice of large payouts to protect solvency. Particularly relevant for PMI where individual claims can reach hundreds of thousands. [src:IAI_0722]"}, {"type": "point", "bold": "Smoothing of Results", "text": "Reinsurance reduces variance of expected experience relative to mean. Helps achieve smooth year-on-year accounts, especially for immature portfolios. Stop loss directly reduces extreme losses. Nearly all reinsurance types smooth profits to some degree. [src:IAI_1120,IAI_0722,IAI_0523]"}, {"type": "point", "bold": "Availability of Expertise", "text": "When entering new risk areas, reinsurer assists with product design, pricing, underwriting and claims management. Often via quota share with low initial retention. As insurer gains experience and confidence, reinsurer involvement reduces. [src:IAI_0523,IFoA_0922]"}, {"type": "point", "bold": "Increasing Capacity to Accept Risk", "text": "Insufficient capital may prevent accepting certain risks by sector or volume. Reinsurance cover reduces solvency capital requirements in line with proportion ceded (subject to upper limit due to reinsurer default risk). [src:IAI_1123,IAI_0523]"}, {"type": "point", "bold": "Financial Assistance", "text": "(i) New business strain: reinsurance commission factors future surplus streams as an effective loan. (ii) Improving free assets: reinsurer pays initial commission, receives share of future surpluses; arrangement is off-balance-sheet if contingent. (iii) Merger/acquisition: reinsurer advances funds against identified profitable block. Quota share is the norm for all three. [src:IAI_1222,IAI_0523]"}, {"type": "point", "bold": "Arbitrage", "text": "Solvency capital arbitrage: reinsurer holds less capital per unit of risk — saving shared with cedant via cheaper premiums. Tax arbitrage: reinsurer subject to lower taxes, enabling favourable premium rates."}, {"type": "text", "text": "⬡ - The terms on which the reinsurer will accept business can provide a check on premium rates, and the arrangement may be a condition imposed by the regulator. [src:IAI_0523]"}, {"type": "text", "text": "⬡ - The reinsurer may provide new software to assist with pricing, underwriting, administration or improving health outcomes for policyholders. [src:IAI_0523]"}, {"type": "h3", "text": "2. Types of Reinsurance Business"}, {"type": "point", "bold": "Facultative", "text": "Individual risk-by-risk negotiation; both parties free to accept/reject. Used for risks outside treaty scope (unusually large or unusual features). Advantages: flexible, best terms sought per risk. Disadvantages: time-consuming, costly, cover uncertain, delays risk acceptance, reduces market standing."}, {"type": "point", "bold": "Treaty (Obligatory/Obligatory)", "text": "Formal arrangement: cedant obliged to cede, reinsurer obliged to accept risks falling within treaty conditions. Efficient (automatic), certain (cover guaranteed within limits), cheaper. Disadvantage: inflexible once set up; treaty terms may restrict freedom. Treaty must precisely define: what is covered, financial arrangements, obligations of both parties."}, {"type": "point", "bold": "Arrangements: Fac/Fac | Fac/Ob | Ob/Ob", "text": "First word = cedant's position; second = reinsurer's position. Ob/Ob is the standard treaty basis. Fac/Ob means the insurer can choose whether to cede; the reinsurer must accept if offered."}, {"type": "h3", "text": "3. Proportional Reinsurance"}, {"type": "point", "bold": "Overview", "text": "Reinsurer covers an agreed proportion of each risk. Long-term health: quota share or surplus, on original terms or risk premium basis. Short-term health: quota share on original terms only. Reinsurance commission paid (or rebate) to cover cedant's initial expenses — only under proportional original terms business."}, {"type": "point", "bold": "Original Terms (Coinsurance)", "text": "Premium and claims split in same fixed proportion. Reinsurer shares all policy risks: morbidity, investment, and lapse. Cedant provides premium rates to reinsurer for adequacy check. Deposits back: reinsurer deposits its reserve share with cedant — cedant retains full investment profit; mitigates reinsurer default risk."}, {"type": "point", "bold": "Risk Premium Reinsurance", "text": "Reinsurer sets its own premium rate independently of cedant's premium — gives cedant freedom to reprice without triggering reinsurance rate changes. Premiums applied to reinsured benefit (full benefit or sum-at-risk). Rates can be: (i) level (net level premium — spread over term), or (ii) yearly increasing (reflect rising age/risk). Either may be guaranteed or reviewable."}, {"type": "point", "bold": "Sum-at-Risk Reinsurance", "text": "Proportions applied to excess of benefit over reserve (not full sum insured). Rarely used in H&C: IP/LTCI pay regular benefits so sum-at-risk is undefined; CI reserves are small relative to benefit so difference from full-benefit approach is negligible. Possible exception: unit-linked CI (sum at risk = benefit minus bid value of units)."}, {"type": "point", "bold": "Quota Share — Key Points", "text": "Constant R% ceded on every risk in treaty. Purposes: spread risk (reduces parameter risk); write larger portfolios; encourage reciprocal business; improve solvency ratio (reduces net written premiums); satisfy statutory capital requirement; finance new business strain. Limitations: same % regardless of risk size (inefficient for large risks); cedes profit to reinsurer."}, {"type": "point", "bold": "Surplus — Key Points", "text": "Long-term only; fixed sum insured required (not PMI). Insurer sets monetary retention per policy; reinsures only the excess above that level. More efficient than quota share at targeting large risks — reduces claims volatility. Advantages: write larger risks; reduce concentration risk. Disadvantages: less control over parameter risk; less suitable for financing."}, {"type": "point", "bold": "Quota Share vs Surplus", "text": "Quota share: same % for all risks — simple, good for financing and solvency improvement but inefficient (cedes profit on small risks). Surplus: % varies by risk size — efficient at targeting large risks, reduces claims volatility, but more complex and less suitable for financing."}, {"type": "h3", "text": "4. Non-Proportional Reinsurance"}, {"type": "point", "bold": "Overview", "text": "Caps large claim costs. Mainly used for short-term contracts and possibly group long-term contracts. Not appropriate for individual long-term policies where benefit is fixed at outset (no variability to cap). Limits may be indexed (stability clause) to preserve real value against inflation. No reinsurance commission (profit commission possible for lower layers only)."}, {"type": "point", "bold": "Risk XL", "text": "Operates on individual claims. Reinsurer pays claims above excess point up to upper limit. Layers stack with no gaps. Expressed as '£X in excess of £Y'. Reinsurer may cover only a proportion within the layer (e.g. 90%) to deter moral hazard in claim settlement. Used mainly for PMI portfolios."}, {"type": "point", "bold": "Aggregate XL / Stop Loss", "text": "Covers total claims across account above excess point for 12-month period. Excess point and upper limit expressed as % of earned premium income (claims ratio) — prevents insurer writing more volume to trigger fixed monetary limits. In H&C context, aggregate XL and stop loss are interchangeable (only one peril: morbidity). Rarely used for long-term insurance. Reinsurers reluctant: limited control over underwriting/claims; historically loss-making."}, {"type": "point", "bold": "Catastrophe XL", "text": "Covers claims from a single event or common cause (e.g. chemical explosion, epidemic). Pandemic cover is generally not available at affordable price due to extreme uncertainty. Event cover (for specific non-pandemic events) is generally available."}, {"type": "point", "bold": "Purposes of Non-Proportional Reinsurance", "text": "Accept risks that could produce very large claims; reduce risk of insolvency; stabilise technical results by reducing claims fluctuations; enable more efficient use of capital (lower reserves needed with lower volatility)."}, {"type": "h3", "text": "5. Financial Reinsurance (Fin Re)"}, {"type": "point", "bold": "Features", "text": "Minimal insurance risk transfer. Primary aim: improve apparent accounting/supervisory solvency of cedant. Only effective where regulatory regime does not already credit future profits and does not require realistic liability for loan repayments. Scope significantly reduced under Solvency II."}, {"type": "point", "bold": "Risk Premium Fin Re (New Business Strain Relief)", "text": "Reinsurer pays large initial commission (= disguised loan). Repayments embedded in higher future reinsurance premiums over the remaining policy term. Lapse experience of the portfolio is factored into repayment schedule."}, {"type": "point", "bold": "Contingent Loan (Surplus Relief / VIF Monetisation)", "text": "Reinsurer provides loan repayable only from future VIF profits — if VIF does not emerge, reinsurer has made a capital gift. Cedant does not reserve for repayments (off balance sheet). Contingent repayments are higher than non-contingent (reinsurer charges for the contingency). Little change to realistic embedded value (loan received ≈ PV of future repayments). Risk reduced: some uncertain VIF profit converted into certain cash."}, {"type": "h3", "text": "6. Determination of Retention Level"}, {"type": "point", "bold": "Stochastic / Ruin Probability Approach", "text": "Model distribution of claims costs at various retention levels. Set retention so ruin probability stays below a specified level (e.g. solvent in 995/1,000 simulations). For fixed-benefit long-term contracts: model claim numbers stochastically. For indemnity short-term: model both claim numbers and amounts stochastically."}, {"type": "point", "bold": "Cost Minimisation Approach", "text": "Balance (a) cost of financing a risk experience fluctuation reserve and (b) cost of reinsurance (expense + profit loading). As retention rises, (a) rises and (b) falls. Adopt retention that minimises total (a) + (b)."}, {"type": "point", "bold": "Factors Driving Lower Retention (More Reinsurance)", "text": "Greater uncertainty about future claims; lower acceptable insolvency probability; greater variance of benefit levels; smaller free assets; higher cost of capital; less strict underwriting; more volatile business mix; high new business volumes / new business strain. Large insurers with sufficient free assets may dispense with XL entirely for normal policies."}, {"type": "h3", "text": "7. Key Examiner Watchpoints"}, {"type": "point", "bold": "Reinsurer Default Risk", "text": "Cedant remains liable to policyholders even if fully reinsured. A minimum capital level must always be held regardless of reinsurance. Deposit back arrangements mitigate (but do not eliminate) this risk."}, {"type": "point", "bold": "When Reinsurer Knowingly Writes Loss-Making Business", "text": "Expects higher future profits; profits from connected business (same cedant/broker); retaining market share at bottom of (re)insurance cycle hoping premiums recover."}, {"type": "point", "bold": "Why Insurer Handles XL Claims Prudently Even If 100% Reinsured Above Excess", "text": "Preserve long-term relationship with reinsurer; potential profit commission at stake; future reinsurance premiums are experience-rated."}, {"type": "point", "bold": "Consequences of Reinsurer Failure", "text": "Cedant liable for reinsurer's share of all future and in-payment claims; may face large claims from non-proportional treaties; solvency position worsens; must seek replacement cover (likely more expensive); premium rate increases likely."}, {"type": "point", "bold": "Treaty Contents (exam list)", "text": "Names of parties; period/territorial limits; classes covered; exclusions; definition of loss; retention; cover granted; premium rates and payment terms; commission/profit commission; claim notification and payment terms; currency clause; access to risk details; termination terms; arbitration clause."}, {"type": "h4", "text": "Portfolio Transfer Methods"}, {"type": "text", "text": "⬡ - Indemnity reinsurance for portfolio transfer: the original insurer reinsures its liabilities with the acquiring insurer (cedant remains legally liable to policyholders). Policyholder notice is generally not required and policyholders do not have the right to object — making this a faster method. Regulatory approval is still required but familiarity with the method often speeds the process. [src:IFoA_0922]"}, {"type": "text", "text": "⬡ - Assumption reinsurance for portfolio transfer: actual policies are novated from the original insurer to the acquiring insurer — the acquiring insurer becomes the new insurer of record. Requires policyholder notification and typically policyholder consent; this is slower, exposes the transfer to policyholder objections, and may also require the transfer of assets (creating further operational complexity if assets are in non-cash form). [src:IFoA_0922]"}, {"type": "text", "text": "⬡ - Choice between indemnity and assumption reinsurance in a time-constrained transfer: indemnity reinsurance is generally preferable where speed is critical — no policyholder communication requirement and no right of objection. The insurer should also consider the regulator's familiarity with each method, as a well-understood approach receives approval more quickly. [src:IFoA_0922]"}]}, "Product Design": {"_meta": {"acc_stage": "S3", "pc_stage": "S1", "syllabus_category": 1, "risk_categories": ["insurance"], "stakeholders": ["Policyholders", "Insurer", "Distributors", "Regulators (IRDAI)", "Reinsurers"], "icon": "✏️", "pillar": "P1"}, "content": [{"type": "h3", "text": "Product Design Framework (SP1 Chapters 1-5)"}, {"type": "h4", "text": "Core Definition & Scope"}, {"type": "point", "bold": "Product Types by Duration", "text": "Long-term (IP, CI, LTCI: typically 5+ years, usually no renewal) vs Short-term (PMI, health cash plans: annual renewable). Long-term products often sold by life insurers; short-term by general insurers or specialists."}, {"type": "point", "bold": "Scope Coverage (Must Precisely Define)", "text": "For PMI—Inpatient (IP), Outpatient (OP), Day care, Domiciliary, AYUSH. Each must be explicitly defined. OP cover has much higher frequency/lower severity than IP; major operational readiness required before launch."}, {"type": "point", "bold": "Benefit Type & Risk Bearer", "text": "Indemnity (insurer bears medical inflation risk; reimburses actual costs) vs Fixed Benefit/Benefit Basis (insurer knows max exposure; policyholder bears cost variation risk). Life insurers in India restricted to benefit basis only; general/health insurers offer both."}, {"type": "h4", "text": "Target Market & Customer Needs"}, {"type": "point", "bold": "Market Segmentation", "text": "By age, income, occupation, health status (including pre-existing conditions). Regulatory mandate (IRDAI 2024): must offer products catering to all ages, medical conditions, PED, chronic illness, disabilities, HIV/AIDS, mental illness, and all treatment systems (allopathy, AYUSH)."}, {"type": "point", "bold": "Gap Analysis vs State Provision", "text": "Products designed to fill gaps left by PMJAY (Ayushman Bharat—covers bottom 40% income). Private PMI adds depth of cover, wider hospital choice, faster access."}, {"type": "point", "bold": "Needs Assessment", "text": "Match benefit design to policyholder protection gaps; distinguish between affordability (what they can pay) vs adequacy (what they actually need)."}, {"type": "h4", "text": "Benefit & Coverage Design"}, {"type": "point", "bold": "Benefit Limits & Sub-limits", "text": "Sum insured (global); sub-limits by service (room, ICU, surgery, consultants, organ transplants, mental illness parity). Room/board limits create incentive toward cost-effective hospitals. Mental illness parity mandated—difficult to diagnose/control, fraud risk."}, {"type": "point", "bold": "Waiting Periods (IRDAI 2024 Limits)", "text": ""}, {"type": "point", "text": "PED waiting period: maximum 36 months continuous coverage (was 48 months)"}, {"type": "point", "text": "Disease-specific waiting period: maximum 36 months"}, {"type": "point", "text": "Moratorium (non-contestability): 60 continuous months; after which no denial except fraud. Moratorium clock includes portability/migration credits, resets on enhanced sum insured."}, {"type": "point", "bold": "No Claim Discount (NCD)", "text": "Offered as cumulative bonus (increase in SI without premium increase) or discount on renewal premium—policyholder chooses form. Healthy lives self-select for NCD; pricing must account for selection benefit."}, {"type": "point", "bold": "Sum Insured Reinstatement", "text": "Applies to new illnesses only (not pre-existing/PED). Annual or per-claim reinstatement; critical design decision affecting benefit adequacy and claims frequency."}, {"type": "point", "bold": "Co-payments, Deductibles, Co-insurance", "text": "Cost-sharing mechanisms (reduce moral hazard; increase policyholder engagement). Regulatory compliance: must be clearly disclosed in Customer Information Sheet (CIS)."}, {"type": "h4", "text": "Product Features & Options"}, {"type": "point", "bold": "Key Features for PMI/IP", "text": "Second opinion provision, home nursing, day-care procedures, domiciliary care, ambulance cover, pre-authorization (mandatory under IRDAI 2024; 1-hour TAT for cashless), cashless facility."}, {"type": "point", "bold": "Guarantees & Options", "text": ""}, {"type": "point", "text": "Guaranteed Issue Options (GIO): No medical underwriting at entry; attracts anti-selection; premium loadings required."}, {"type": "point", "text": "Conversion Options: Rider-to-standalone conversion; benefit enhancement without fresh medical."}, {"type": "point", "text": "Guaranteed Renewability: Premium reviewable at portfolio level (not individual policy) per IRDAI 2024; no denial of renewal on grounds of prior claims."}, {"type": "point", "text": "Premium Guarantee Period: 1 or 3-year guarantee typical; insurer cannot reprice individual policies within guarantee period."}, {"type": "point", "bold": "Surrender/Discontinuance Values", "text": "Usually nil for indemnity PMI/CI (no savings element). Impact model pricing as policyholder can exit without penalty (lapse risk). LTCI may have return-of-premium rider."}, {"type": "h4", "text": "Exclusions & Conditions (Must Be Clearly Defined)"}, {"type": "point", "bold": "Standard Medical Exclusions", "text": "War, terrorism, non-disclosure, criminal acts, cosmetic procedures (except post-accident), fertility treatments, experimental/unproven treatments, sports injuries (depending on policy), alcohol/drug-related claims, self-inflicted injury."}, {"type": "point", "bold": "Occupational/Hazard Exclusions", "text": "High-risk occupations (mining, aviation, hazmat); extreme sports; geographic restrictions (war zones, epidemiology reasons)."}, {"type": "point", "bold": "Territorial Limits", "text": "World-wide, Asia-Pacific, or India-only. Affects premium; claims management capability in overseas locations."}, {"type": "point", "bold": "Pre-existing Disease (PED) Definition (IRDAI 2024)", "text": "Any condition diagnosed/treated within 36 months prior to policy commencement. Clear definition essential to avoid disputes."}, {"type": "point", "bold": "Waiting Periods", "text": "General waiting period (usually 30 days for acute conditions), disease-specific (36 months for chronic disease), maternity (usually 9 months), PED (36 months max). Clearly stated in policy document."}, {"type": "h4", "text": "Operational & Marketability Constraints"}, {"type": "point", "bold": "Platform Capacity", "text": "Product design must match insurer's IT/underwriting/claims processing systems. Complex benefits require robust pre-authorization and adjudication engines. OP cover with high volume demands high-capacity, low-cost processing."}, {"type": "point", "bold": "Distribution Channel Alignment", "text": "Distribution channel (direct, tied agents, brokers, group) influences commission structure, underwriting standards, claims management approach, and product positioning."}, {"type": "point", "bold": "Reinsurance Treaty Scope", "text": "Product design must fit within reinsured limits; excess of policy limits over reinsurance creates unhedged exposure. Quota share, XL layers, and aggregate XL affect product feasibility."}, {"type": "point", "bold": "Market Positioning & Saleability", "text": "Brand positioning (economy, standard, premium); perceived value vs price; comparative advantages vs competitors. 'Saleability' vs 'adequacy' tension: complex, comprehensive cover is hard to sell; simple cover may be inadequate."}, {"type": "point", "bold": "Bundling & Cross-Selling", "text": "CI/IP riders attached to life cover increase attachment rate but complicate experience analysis and claims management."}, {"type": "h4", "text": "Risks & Design Mitigations"}, {"type": "point", "bold": "Moral Hazard (Over-Insurance)", "text": "Risk that policyholder deliberately incurs claims or inflates claims. Mitigation: benefit limits, co-payments, replacement ratio caps, claims review, hospital networks with fixed tariffs."}, {"type": "point", "bold": "Anti-Selection (Adverse Selection)", "text": ""}, {"type": "point", "text": "At Entry: Healthy lives opt for policies; comprehensive cover attracts sicker lives. Mitigation: appropriate medical underwriting, waiting periods, exclusions."}, {"type": "point", "text": "At Renewal: Selective lapsing (healthy lives leave when premiums rise; sicker remain). Mitigation: competitive pricing, strong retention strategy, NCD design to reward persistence."}, {"type": "point", "text": "NCD Selection: Healthier lives self-select for NCD; pricing must account for improved risk pool selecting into NCD."}, {"type": "point", "bold": "Complexity & Mis-Selling Risk", "text": "Complex exclusions, sub-limits, waiting periods lead to policyholder dissatisfaction and complaints. Mitigation: clear wording, mandatory CIS, simplified benefit designs, staff training."}, {"type": "point", "bold": "Medical Inflation Risk", "text": "In indemnity PMI, insurer bears medical inflation (~12-15% p.a. in India historically; varies by treatment type). Failure to trend assumptions forward leads to rapid deterioration. Mitigation: annual repricing, inflation-linked sub-limits, shift toward benefit basis."}, {"type": "h4", "text": "Profitability & Capital Impact (Solvency II Pillar 1)"}, {"type": "point", "bold": "Capital Strain", "text": "New product launches consume capital due to negative asset shares early in policy life (acquisition costs exceed first-year premiums). Affects profit targets and ROI calculations."}, {"type": "point", "bold": "Return Metrics", "text": "Target Return on Capital (RoC) by product; Value of New Business (VNB); Embedded Value (EV). Hurdle rate typically 15-25% depending on product and company risk appetite."}, {"type": "point", "bold": "Solvency Capital Requirement (SCR) Impact", "text": "New products with high claims uncertainty, guarantees, or policyholder options increase SCR. Must be assessed before launch via capital projection models."}, {"type": "point", "bold": "Regulatory Capital (IRDAI 2024)", "text": "Available Solvency Margin >= 150% Required Solvency Margin; affects distribution of free assets and capital-raising capacity."}, {"type": "h4", "text": "India-Specific Regulatory & Market Context (IRDAI 2024)"}, {"type": "point", "bold": "Regulatory Mandates", "text": "IRDAI 2024 requires Board approval of all product, pricing, expense, and capital decisions via Product Management Committee (PMC). File-and-Use or Use-and-File regime for new products; UIN assignment required before launch."}, {"type": "point", "bold": "Portability & Migration", "text": "All credits (SI, NCB, waiting periods, moratorium) transfer to new insurer; existing insurer provides data within 72 hours via Insurance Information Bureau (IIB). Acquiring insurer decides within 5 days. Alters experience significantly as waiting periods do not re-apply."}, {"type": "point", "bold": "PMJAY Integration", "text": "Government's Ayushman Bharat program covers bottom 40% with basic indemnity cover. Private insurers fill gap for middle/upper income; higher sum insured, wider hospital choice, faster claim settlement."}, {"type": "point", "bold": "ABHA (Ayushman Bharat Health Account) & Digital Records", "text": "National health account system improves UW and fraud detection capability. Voluntary participation; uptake still low. Data privacy regulations (DPDP 2023) restrict usage."}, {"type": "point", "bold": "Medical Inflation Risk", "text": "Historical trend ~12-15% p.a. in India (varies: ICU ~20%, routine OP ~8%). Repricing essential annually but risks selective lapsing if competitor pricing lags."}, {"type": "point", "bold": "Regulatory Compliance Costs", "text": "Detailed CIS, 30-day Free Look, mandatory 15-day grievance resolution, Board-governed commission, Treating Customers Fairly (TCF) principles, Ombudsman interface. Increase operational expenses and slow claims settlement."}, {"type": "h4", "text": "Product-Specific Design Considerations"}, {"type": "point", "bold": "IP Insurance", "text": "Key levers—Deferred Period (DP: 4, 8, 13, 26 weeks), Replacement Ratio (capped max 50-75% to maintain work incentive), Definition (Own Occ vs Any Occ vs ADL). Moral hazard higher in economic downturns ('unemployment disguise'). Group IP easier to underwrite (active-at-work condition)."}, {"type": "point", "bold": "CI Insurance", "text": "Fixed lump sum on diagnosis (not on claim payment). Survival period (typically 14-28 days) reduces frequency but increases severity. Standalone vs accelerated (rider). Diagnosis-based (pays on diagnosis) vs cash plan (pays after diagnosis period). High anti-selection risk; medical advances change diagnosis timing."}, {"type": "point", "bold": "LTCI", "text": "Long claims duration (average 3-5 years); high inception; significant reserve build. Benefit-triggered on ADL loss (activities of daily living). Transfer between dependency levels (independent → partial → full). Savings element justifies surrender value design."}, {"type": "point", "bold": "PMI", "text": "Annual renewable; multiple claims per policy. Indemnity or benefit basis. NCD critical for persistency. Pre-authorization reduces moral hazard; cashless settlement (100% target under IRDAI 2024) reduces administration. Provider networks essential for cost control."}, {"type": "point", "bold": "Benefit Type & Risk Bearer", "text": "Indemnity (insurer bears medical inflation risk; reimburses actual costs) [src:IAI_1124] vs Fixed Benefit/Benefit Basis (insurer knows max exposure; policyholder bears cost variation risk). Life insurers in India restricted to benefit basis only; general/health insurers offer both."}, {"type": "text", "text": "⬡ - Chronic illness is a long-term, typically incurable but manageable health condition (e.g. diabetes, heart disease, asthma, mental health) requiring ongoing medical care to maintain quality of life. [src:IAI_1124]"}, {"type": "text", "text": "⬡ - Strategic benefits of analyzing chronic disease impact include: accurate risk assessment/pricing, tailored product development, proactive claims management, improved customer engagement (wellness programs), regulatory compliance, and informed reinsurance/investment/market segmentation strategies. [src:IAI_1124]"}]}, "Data": {"_meta": {"acc_stage": "S2", "pc_stage": "S7", "syllabus_category": 3, "risk_categories": ["operational", "model"], "stakeholders": ["Insurer", "Appointed Actuary", "Regulators (IRDAI)", "TPAs"], "icon": "📊", "pillar": "P5"}, "content": [{"type": "h3", "text": "Data (SP1 Chapter 12 & Chapter 23)"}, {"type": "h4", "text": "1. Data Quality Criteria (RCAR)"}, {"type": "point", "bold": "Relevant", "text": "relates to a similar class of lives and policy conditions to those expected for the product"}, {"type": "point", "bold": "Credible", "text": "sufficiently large volume of data to enable precise estimates (low sampling error)"}, {"type": "point", "bold": "Available", "text": "accessible in a usable format, within reasonable cost"}, {"type": "point", "bold": "Reliable", "text": "fit for the intended purpose"}, {"type": "point", "text": "Also consider: **cost** of obtaining/analysing data and **suitability of format**"}, {"type": "point", "text": "Actuaries use judgement to compile statistics from one or more sources meeting these criteria, then project to estimate future claims experience"}, {"type": "h4", "text": "2. Projecting Rates to Mid-Point of Insurance Usage"}, {"type": "point", "text": "Data is essentially **historic**; must be projected forward to cover the full period rates will be in use"}, {"type": "point", "text": "Rates must remain valid for: **[expected shelf-life of premium rates] + [expected duration of policy to termination or next review]**"}, {"type": "point", "bold": "Claim incidence rates", "text": "vary by age AND calendar year; project forward to mid-point of expected usage period"}, {"type": "point", "bold": "Claim termination rates", "text": "vary by duration from claim commencement; experience improvement/deterioration over time must be allowed for"}, {"type": "point", "bold": "Average claim size (PMI)", "text": "function of inflation, protocols, hospital charges, State provision; typically only need 1-year projection as PMI rates reviewed annually"}, {"type": "point", "text": "Longer projection → greater uncertainty → larger margins required → higher premiums; shorter terms or frequent review dates reduce margins needed"}, {"type": "point", "bold": "CI", "text": "incidence rates should be projected **separately by each cause of claim**, then combined"}, {"type": "point", "bold": "IP / LTCI", "text": "total claim inception and termination rates projected"}, {"type": "h4", "text": "3. Own Data"}, {"type": "text", "text": "**Relevance — HIGH (best source)**"}, {"type": "point", "text": "Reflects insurer's specific: underwriting approach; policy conditions; claims management; distribution method/channels; target market"}, {"type": "point", "text": "Cost, reliability and format present no problems"}, {"type": "text", "text": "**Credibility — OFTEN LOW**"}, {"type": "point", "text": "Volume of business for most insurers is insufficient, especially when broken down into many risk cells"}, {"type": "point", "text": "New insurer or new product line = extreme case; may take many years to build credibility"}, {"type": "point", "text": "Where insufficient, must supplement with external data using appropriate adjustments"}, {"type": "point", "text": "Techniques: state assumption as adjustment to a standard table; use statistical fitting procedures"}, {"type": "h4", "text": "4. Population Data"}, {"type": "text", "text": "**Relevance — LOW to MODERATE**"}, {"type": "point", "text": "Does not relate specifically to insured lives — different class of lives AND different claim definition"}, {"type": "point", "text": "Two conflicting effects on insured vs population: (i) underwriting filters out less healthy lives, (ii) anti-selection means buyers may expect to claim → improvement may be less marked"}, {"type": "point", "text": "Adjustment for socio-economic group and region improves relevance"}, {"type": "point", "text": "CI-specific issue: population double-counts (e.g. heart attack + bypass surgery = one claim but two records in population data) — overlap must be adjusted for"}, {"type": "text", "text": "**Credibility — HIGH**"}, {"type": "point", "text": "Large volumes make population data statistically credible"}, {"type": "text", "text": "**Other drawbacks**"}, {"type": "point", "text": "Accuracy/reliability may be questionable (subjective definitions, double-counting)"}, {"type": "point", "text": "May not be in appropriate format"}, {"type": "point", "text": "May be out-of-date before publication"}, {"type": "h4", "text": "5. Reinsurers' Data"}, {"type": "text", "text": "**Relevance — MODERATE (adjustments needed)**"}, {"type": "point", "text": "Reinsurer wants data to be accurate as profits under treaty reflect premiums calculated"}, {"type": "point", "text": "Must adjust for insurer's specific underwriting and claims management practices"}, {"type": "point", "text": "Typically provided in return for a reinsurance treaty (share of risk/profits); explicit fee less common"}, {"type": "text", "text": "**Credibility — MODERATE TO HIGH**"}, {"type": "point", "text": "Reinsurers draw from multiple companies across the market — excellent for new product launches"}, {"type": "point", "text": "Example: reinsurers drove CI insurance development in the 1980s using data from other markets weighted by local population data"}, {"type": "point", "text": "Credibility increases as the market for the product grows"}, {"type": "h4", "text": "6. Market Data"}, {"type": "text", "text": "**6a. Insured Lives (Industry / CMI) Data**"}, {"type": "point", "text": "Agreement among companies to pool statistics → industry-wide information more credible than individual company data"}, {"type": "point", "text": "UK example: Continuous Mortality Investigation (CMI) — covers IP and CI markets"}, {"type": "point", "text": "Standard morbidity tables produced from this source; useful as base reference for experience monitoring and assumption setting"}, {"type": "point", "text": "Standard tables not published frequently — require significant preparation; new standard considered when simple adjustments to existing table are no longer adequate"}, {"type": "text", "text": "**Advantages**"}, {"type": "point", "text": "Represents insured experience (more relevant than population data)"}, {"type": "point", "text": "Sufficient volume → statistically credible"}, {"type": "point", "text": "Reflects local companies and market practices; compiled by experts (resolves individual company data issues)"}, {"type": "text", "text": "**Disadvantages**"}, {"type": "point", "text": "Only a **market average** → not strictly relevant to any individual company; adjustment needed"}, {"type": "point", "text": "May take years to publish → may be out-of-date"}, {"type": "point", "text": "Adjustments for company-specific underwriting/claims management needed; caution where launching new health product — strict mortality underwriting may not translate directly to morbidity margins"}, {"type": "point", "text": "Limited detailed data available for short-term classes (PMI) compared to long-term classes (CI, IP)"}, {"type": "text", "text": "**6b. Returns to Insurance Supervisor (Regulatory Returns)**"}, {"type": "point", "text": "Produced by all insurers; primary purpose is supervisory solvency assessment, NOT to assist competitors"}, {"type": "point", "text": "Contains: policy numbers, amounts, premiums, benefit breakdowns by policy class; on/off-book movements by cause"}, {"type": "point", "text": "Accuracy not questioned but limited detail for individual risk cell estimation"}, {"type": "point", "text": "Most useful as: **high-level check** on premiums derived from other sources; checking competitiveness on launch"}, {"type": "point", "text": "Key shortcoming: typically no breakdown by age, gender, smoker status etc."}, {"type": "h4", "text": "7. Other Sources"}, {"type": "text", "text": "**Overseas Data**"}, {"type": "point", "text": "Method: estimate home insured lives experience = (home population morbidity) × (overseas insured lives / overseas population) — broad starting point only"}, {"type": "point", "text": "Always likely to be **less relevant** than home territory equivalents"}, {"type": "point", "text": "Adjustments needed for: different cultures; different State healthcare provision; different market practices; different legislation/policy conditions; different underwriting and claims management; different time periods; heterogeneity of overseas industry data"}, {"type": "point", "text": "May be credible in volume"}, {"type": "text", "text": "**Actuarial Consultants**"}, {"type": "point", "text": "Similar to reinsurers — access to national and international data sources"}, {"type": "point", "text": "Key difference: consultants do NOT share in the risk; charge a fee directly"}, {"type": "text", "text": "**Rate Table Software**"}, {"type": "point", "text": "Provides market premium rate comparisons for individual business"}, {"type": "point", "text": "Useful for: gathering initial data; checking reasonableness and competitiveness of office premiums post-calculation"}, {"type": "point", "text": "More detailed than trade magazine equivalents"}, {"type": "text", "text": "**Trade Magazines**"}, {"type": "point", "text": "Provide types/levels of benefits and premium rates charged in the market"}, {"type": "point", "text": "Do NOT normally include claim statistics"}, {"type": "point", "text": "Useful as a broad reasonability check"}, {"type": "text", "text": "⬡ - For overseas PMI: national statistics, local regulator data, hospital expense data from overseas providers, competitor pricing data, and reinsurers' multi-national databases are key external sources. Own domestic data may give some relevant baseline but requires adjustment for local conditions. [src:IAI_0523]"}, {"type": "h4", "text": "8. Data Required by Product Type"}, {"type": "text", "text": "**Income Protection (IP)**"}, {"type": "point", "text": "Dates of: birth, entry, exit, diagnosis, first stopping work, notification, start/end of sickness claim"}, {"type": "point", "text": "Reasons for exit / end of claim payments"}, {"type": "point", "text": "Construct central exposures for healthy (E^H_x) and claiming (E^C_x) policyholders"}, {"type": "point", "text": "Estimate transition intensities: claim inception (σ), recovery (ρ), deaths from healthy (μ), deaths from claiming (ν)"}, {"type": "point", "text": "Note: deferred period requires inclusion/exclusion adjustments at investigation boundaries"}, {"type": "text", "text": "**Critical Illness (CI)**"}, {"type": "point", "text": "Dates of: birth, entry, exit, diagnosis/treatment, notification, claim payment"}, {"type": "point", "text": "Reason for exit; type of disease/procedure"}, {"type": "point", "text": "Construct central exposure for healthy lives (E^H_x)"}, {"type": "point", "text": "Count claims by disease/procedure type (I^j_x)"}, {"type": "point", "text": "Include: IBNR (incurred but not reported) and RBNS (reported but not settled)"}, {"type": "point", "text": "Exclude: claims relating to diagnoses prior to investigation period"}, {"type": "text", "text": "**Long-Term Care Insurance (LTCI)**"}, {"type": "point", "text": "Same as IP but with exposures separately for EACH benefit level (claim state)"}, {"type": "point", "text": "Requires dates of transition between benefit levels"}, {"type": "point", "text": "No return transitions normally occur"}, {"type": "point", "text": "Estimate transition intensities between each pair of benefit levels (e.g. Benefit level 1 → 2)"}, {"type": "text", "text": "**Private Medical Insurance (PMI)**"}, {"type": "point", "text": "Assuming annual renewals: count policies taken out/renewed each year by age (N_x)"}, {"type": "point", "text": "Count claim incidences by age and benefit/procedure class (I^k_x)"}, {"type": "point", "text": "Record total claim amounts by cohort (C^k_x)"}, {"type": "point", "text": "Estimate: claim incidence rate (î^k_x = I^k_x / N_x) and average claim cost (ĉ^k_x = C^k_x / I^k_x)"}, {"type": "point", "text": "Include IBNR and RBNS; exclude prior-period claims"}, {"type": "h4", "text": "9. Policy Data Risk (Chapter 23)"}, {"type": "point", "bold": "Data risk", "text": "Insurer's own data may be inaccurate, inadequate or incomplete → models relying on these data will be similarly affected [src:IFoA_0922]"}, {"type": "point", "bold": "Model risk", "text": "(from model points): Model points used to represent in-force business may not adequately capture portfolio characteristics → invalid results and incorrect business decisions"}, {"type": "point", "text": "Key actuary responsibility: carry out checks on data quality; must at minimum be aware of any data problems"}, {"type": "point", "text": "Extreme consequence: company declaring solvency incorrectly; lesser consequence: incorrect business decisions (e.g. underestimating available capital)"}, {"type": "point", "text": "Internal data may be inadequate due to: missing data; inaccurate data; insufficient volume for credibility"}, {"type": "point", "text": "Even good-quality internal data may be inappropriate if based on an unsuitable class of lives"}, {"type": "point", "text": "External data (industry, population, overseas) may also be inadequate, unreliable, or inappropriate due to population mismatch"}, {"type": "h4", "text": "10. Summary: Relevance vs Credibility by Source"}, {"type": "point", "bold": "Own data", "text": "High relevance, often low credibility"}, {"type": "point", "bold": "Population data", "text": "Low-moderate relevance, high credibility"}, {"type": "point", "bold": "Reinsurers' data", "text": "Moderate relevance (adjustable), moderate-high credibility"}, {"type": "point", "bold": "Insured lives (CMI) data", "text": "More relevant than population, less relevant than own; more credible than own, less than population"}, {"type": "point", "bold": "Supervisory returns", "text": "Limited relevance (market average, low detail), reasonable accuracy"}, {"type": "point", "bold": "Overseas data", "text": "Low relevance, may be credible in volume"}, {"type": "point", "bold": "Actuarial consultants", "text": "Similar to reinsurers; fee-based rather than risk-sharing"}, {"type": "point", "bold": "Rate table software / Trade magazines", "text": "Useful only as high-level reasonability checks"}, {"type": "h4", "text": "Using External Public Data for Reserving"}, {"type": "text", "text": "⬡ - Publicly available geographic data (e.g. drug prescribing rates, statutory sick pay records by region) can be used to improve IP reserve segmentation by mapping policyholder postcodes to regional risk indicators — identifying concentrations of higher/lower morbidity risk not captured in the original underwriting data. [src:IFoA_0922]"}, {"type": "text", "text": "⬡ - Drug prescription data by region can serve as a forward indicator of claim incidence trends: areas with high prescribing of drugs associated with musculoskeletal or chronic conditions are likely to have elevated IP claim inception rates and longer claim durations. [src:IFoA_0922]"}, {"type": "text", "text": "⬡ - Using geographic public data to refine IP reserves can improve: IBNR estimates (estimating sickness incidence in unreported periods), claims-in-deferred-period reserves (predicting which incipient sicknesses will become payable claims), and claims-in-payment reserves (estimating expected claim duration by region). [src:IFoA_0922]"}, {"type": "text", "text": "⬡ - Ethical and regulatory concerns with using public data for reserving/pricing: (a) cross-subsidies between policyholders reduce, potentially making cover unaffordable for higher-risk lives; (b) guaranteed premium policyholders cannot be repriced — inequity arises if only reviewable premium policyholders bear repricing; (c) regulator may require approval; (d) TCF issues if data usage is not clearly disclosed. [src:IFoA_0922]"}, {"type": "text", "text": "⬡ - Customer acceptability of public data usage should be tested: the insurer can announce its approach or use focus groups and customer surveys to gauge acceptance. If the data is publicly available and only used at area level (not individual), acceptability risk is lower — but continued monitoring via focus groups is advisable. [src:IFoA_0922]"}, {"type": "text", "text": "⬡ - Operational challenges when integrating external public data: (a) public data may be incorrect, incomplete, or biased (e.g. geographic areas skewed by care homes or unemployed populations); (b) postcode of long-term policyholders may be out of date; (c) data may have been collected for a different purpose (government funding), requiring a check on permissibility of use; (d) granularity of geographic data may limit precision or, conversely, unintentionally identify individuals when combined with age data. [src:IFoA_0922]"}, {"type": "text", "text": "⬡ - Legacy systems challenges with external data: matching policyholder data to public datasets requires postcode linking across different systems; policy, claims, and lapse data may sit on separate legacy platforms; processing volume may exceed existing system capacity; data security must be ensured for any new external data stored. [src:IFoA_0922]"}, {"type": "text", "text": "⬡ - Staff skill requirements for external data projects: actuarial teams may lack data science capability; hiring data scientists is expensive; an alternative is to pilot the approach using an external consultant before committing to in-house capability. [src:IFoA_0922]"}, {"type": "point", "bold": "Reliable", "text": "fit for the intended purpose [src:IAI_1124]"}, {"type": "point", "text": "Also consider: **cost** of obtaining/analysing data and **suitability of format** [src:IAI_1124]"}, {"type": "text", "text": "⬡ - Post-launch performance monitoring of health products requires tracking: enrollment/market penetration, premium revenue growth, claims experience/loss ratios, customer satisfaction/retention, risk pool composition (adverse selection), and long-term sustainability. [src:IAI_1124]"}, {"type": "text", "text": "⬡ - Electronic Patient Records (EPR/EHR) store a wide array of data including: demographics, insurance coverage, medical/medication/immunization history, lab/diagnostic results, treatment history, encounter information, care plans, and health behavior/lifestyle data. [src:IAI_1124]"}, {"type": "text", "text": "⬡ - Advantages of introducing EPR/EHR: marketing efficiency, more complete data for pricing, timely IBNR estimation, improved clinical outcomes (reduced duplication/error), and faster claims processing. [src:IAI_1124]"}, {"type": "text", "text": "⬡ - Disadvantages/Risks of EPR/EHR: low uptake, legal/regulatory privacy issues, IT security/hacking risk, high development/training costs, and potential reputational damage if systems fail or increase doctor admin burden. [src:IAI_1124]"}]}, "Models": {"_meta": {"acc_stage": "S2", "pc_stage": "S7", "syllabus_category": 3, "risk_categories": ["model"], "stakeholders": ["Insurer", "Appointed Actuary", "Regulators (IRDAI)", "Shareholders"], "icon": "🔢", "pillar": "P5"}, "content": [{"type": "h3", "text": "Modelling Framework (SP1 Chapter 11)"}, {"type": "h4", "text": "1. Uses of Models"}, {"type": "point", "bold": "Core purpose", "text": "Enable the actuary to give appropriate advice so the insurer can be run in a sound financial way. Almost all actuarial work involves a model of some sort."}, {"type": "point", "bold": "Key uses", "text": "Pricing and product design; setting statutory and management account reserves; costing and reserving for options and guarantees; assessing profitability of new and existing business; analysis of surplus; embedded value calculations; determining capital requirements; assessing return on capital; assessing reinsurance needs; setting investment strategy (ALM); ongoing financial projections (revenue account, balance sheet, solvency); expense budgeting; valuing the business for merger/acquisition."}, {"type": "point", "bold": "Modelling investigations", "text": "Usually a variation on a common theme: projection of the company's balance sheet and revenue account (income statement / profit and loss account)."}, {"type": "h4", "text": "2. Types of Model (by business scope)"}, {"type": "point", "bold": "Single policy profit test model", "text": "Projects expected cash and profit flows from a single policy from date of issue. Used for: pricing and product design."}, {"type": "point", "bold": "New business model", "text": "Projects all expected cash and profit flows arising from future sales of new business. Used for: assessing future capital requirements and overall return on capital; calculation of goodwill (appraisal value)."}, {"type": "point", "bold": "Existing business model", "text": "Projects all expected cash and profit flows from existing business at a particular time. Used for: assessing embedded value; testing solvency of existing business; analysing surplus."}, {"type": "point", "bold": "Full model office", "text": "Sum of new business model and existing business model. Used for: assessing impact of future management decisions on financial development; new business projections; embedded values; solvency; takeovers."}, {"type": "h4", "text": "3. Objectives & Basic Features of a Health Insurance Model"}, {"type": "point", "bold": "Model points", "text": "A model point is a data record representing either a single policy or a group of policies, containing data on the most important policy characteristics. The number of model points is influenced by: computing power available; variability and complexity of contracts; age of the company; whether stochastic or deterministic; purpose/importance of investigation; time available; sensitivity of results to more/fewer points."}, {"type": "point", "bold": "Operational requirements", "text": "Model must be: adequately documented; easy to appreciate, communicate and display clearly; capable of independent verification for reasonableness; not overly complex (results must be interpretable and model must be cost-effective to run); capable of development and refinement; supported by a range of implementation methods for testing and parameterisation."}, {"type": "point", "bold": "Health insurance specific: cashflows", "text": "Must allow for all cashflows that may arise — premiums, benefits (including discretionary benefits such as options to convert, extend or increase cover without evidence of health), expenses, commission, tax."}, {"type": "point", "bold": "Health insurance specific: reserves & solvency", "text": "Must also allow for cashflows arising from any supervisory requirement to hold reserves (notional cashflows — no physical exchange of money) and to maintain an adequate margin of solvency capital."}, {"type": "point", "bold": "Health insurance specific: states", "text": "Must project cashflows separately from different states and reflect transitions between them (e.g. under IP: healthy lives paying premiums vs. disabled lives receiving benefit). Further subdivisions may be needed (e.g. different benefit levels under LTCI)."}, {"type": "point", "bold": "Health insurance specific: interactions & dynamic links", "text": "Cashflows must allow for interactions between assets and liabilities. The model should be dynamic — asset and liability parts programmed to interact as they do in reality (e.g. switching to matching assets if solvency deteriorates). Dynamic links are especially vital in stochastic models."}, {"type": "point", "bold": "Health insurance specific: stochastic capability", "text": "Ability to use stochastic models and simulation must be allowed for where appropriate (e.g. to simulate distribution of claims outgo or cost of guarantees). Stochastic modelling may be more important in health and care than pure life insurance, because future incidence experience is far less predictable (benefit amounts may vary with policy-specified inflation, medical inflation, or changes in accepted medical protocols)."}, {"type": "h4", "text": "4. Deterministic vs Stochastic Models"}, {"type": "point", "bold": "Deterministic — key features", "text": "Each parameter has a fixed value. Model produces a point estimate. Sensitivity testing done by re-running with different parameter values. Essentially a 'one-question-one-answer' model."}, {"type": "point", "bold": "Stochastic — key features", "text": "Some parameters are allowed to vary with their own distribution functions. Model must be run many times using random samples. Produces results in the form of a probability distribution. Essentially a 'distribution-in-distribution-out' model."}, {"type": "point", "bold": "When stochastic is invaluable", "text": "(1) Assessing impact of guarantees; (2) When the variable of interest has a reasonably stable and predictable probability distribution (e.g. investment returns in a stable economy); (3) Indicating effect of year-on-year volatility (random fluctuations) on risk; (4) Identifying potentially high-risk future scenarios by tracing events leading to worst simulated outcomes."}, {"type": "point", "bold": "Disadvantages of stochastic", "text": "(1) Time and computing constraints — may require a simplified version of the model; (2) Sensitivity of results to the deterministically-chosen parameter values (e.g. assumed mean and variance if normal distribution used) — can lead to spurious accuracy: rubbish in = rubbish out."}, {"type": "point", "bold": "Calibration — Risk Neutral (Market-Consistent)", "text": "Typically used for valuation purposes, especially where there are options and guarantees. Focus: replicate market prices of actual financial instruments using a risk-neutral probability measure. Parameters chosen so average PV of modelled cashflows closely matches known market prices. If the model can reproduce prices of quoted assets, it should also give market-consistent values for unquoted cashflows."}, {"type": "point", "bold": "Calibration — Real World", "text": "Typically used for projecting into the future (e.g. calculating capital to hold under extreme adverse scenarios at a given confidence level). Focus: assumptions reflect realistic long-term expectations and observable real-world probabilities and outcomes. Parameters determined using expectations of the future; assets and liabilities projected under each stochastic scenario. Key difference: under real-world calibration equities would be expected to outperform bonds on average; under risk-neutral calibration, both have the same average present value."}, {"type": "h4", "text": "5. Sensitivity Analysis"}, {"type": "point", "bold": "Model point sensitivity", "text": "If an adequate set of model points has been chosen, model-point error testing is usually unnecessary. However, where a reduced number of model points is used (e.g. for efficiency), the effect of a different choice of model points should be assessed."}, {"type": "point", "bold": "Parameter sensitivity", "text": "Effect of mis-estimation of parameter values investigated by varying each parameter value and observing the impact on model output. Any correlation between parameters must be allowed for."}, {"type": "point", "bold": "Scenario testing", "text": "Sensitivity testing where several correlated parameters are changed together in a consistent way (e.g. in a low-investment-return scenario, expense inflation assumption would also be reduced)."}, {"type": "point", "bold": "Parameters to sensitivity test (return on capital / profitability)", "text": "Claim inception rates; claim recovery rates; rates of transfer between claim states; mortality rates; lapse and non-renewal rates; average claim size (PMI); future expense levels; future expense inflation; future benefit/claims inflation; investment yield; volumes and mix of new business; taxation basis."}, {"type": "point", "bold": "Sensitivity testing when pricing", "text": "Helps determine what margins need to be incorporated into parameter values. If profitability is overly sensitive to a factor (e.g. withdrawal rates), product redesign or other measures may be needed (e.g. revise commission scales, revise reinsurance programme). Sensitivity tests should be performed at all stages of the pricing process."}, {"type": "point", "bold": "Sensitivity testing — return on capital", "text": "Enables the actuary to quantify the effect of departures from chosen parameter values when reporting to the company. Where a probability distribution can be assigned to a parameter, the variance of profit or return on capital may be derived analytically or via Monte Carlo simulation."}, {"type": "point", "bold": "Stochastic modelling obligations", "text": "Stochastic modelling may be obligatory for supervisory reserve calculations in some territories. Sensitivity analysis can also help determine appropriate risk margins, global reserves or capital requirements."}, {"type": "h4", "text": "6. Equation of Value / Formula Approach"}, {"type": "point", "bold": "Principle", "text": "Based on the equivalence principle: income must equal outgo (or exceed it, with surplus going to capital providers). Premium is derived by equating discounted income (premiums + investment income) against discounted outgo (claims, expenses, commission, tax). An explicit profit allowance may also be included."}, {"type": "point", "bold": "Discount rate", "text": "Equivalent to the return achievable by investing policy proceeds as they arise. May vary between optimistic (higher rate → cheaper premium) and conservative depending on whether result needs to be competitive. Tax and other outgo can be allowed for by adjusting the discount rate."}, {"type": "point", "bold": "Components valued", "text": "Value of claims (discounted future claims outgo, including claims handling expenses and inflation); Value of premiums (discounted income net of initial/renewal commission, allowing for escalation, persistency, premium waiver); Value of expenses (non-premium-related expenses, discounted with inflation); Value of investment income (timing differences between receipts and outgo within the year)."}, {"type": "point", "bold": "Drawbacks of formula approach", "text": "(1) Does not allow for proper timing of events; (2) Reserves are ignored completely; (3) Capital needs cannot be reflected (desired shareholder return cannot be incorporated); (4) Net negative cashflows in any period are implicitly assumed to be borrowable at the discount rate; (5) Cannot separately inspect premium-related or claim-related cashflows by year; (6) Cannot easily vary assumptions over time (one fixed discount rate used); (7) Cannot easily measure sensitivity of profit to changes in assumptions; (8) Cannot handle more complex product structures (e.g. unit-linked)."}, {"type": "point", "bold": "When formula approach is appropriate", "text": "Most drawbacks are only significant for long-term contracts. Formula approach is useful and commonly used for pricing short-term (annually renewable) contracts (e.g. PMI), where investment income is relatively insignificant and reserving issues are minor."}, {"type": "h4", "text": "7. Cashflow Approach"}, {"type": "point", "bold": "Overview", "text": "Developed to overcome the drawbacks of the formula approach. All health and care insurance models include some element of cashflow and profit projection. Can be deterministic or stochastic. For products with complex features (e.g. options), stochastic cashflow modelling may be required. Each significant item of cashflow is projected allowing for interactions."}, {"type": "point", "bold": "Cashflow approach — pricing process", "text": "Model points chosen to represent expected new business. For each model point, cashflows are projected (including reserving and solvency capital requirements) using base parameter values, then discounted at the risk discount rate to calculate net present value of future profits. Premiums/charges are set to meet the company's profit criterion — either for each model point individually, or in aggregate across model points (accepting some cross-subsidy). Once acceptable premiums are determined for model points, rates for all contract variations are derived (e.g. by interpolation)."}, {"type": "point", "bold": "Typical cashflow elements — conventional without-profits", "text": "Premiums; expenses (initial, renewal, claim); commission; claims; contribution to reserves; contribution to capital requirements; interest on cashflows and reserves; tax."}, {"type": "point", "bold": "Additional cashflow elements — unit-linked business", "text": "Cost of unit allocations; bid-offer spread; cost of paying claims in excess of unit fund value; risk charges (morbidity/mortality); unit charges (initial charges, policy fees); fund management charges; unit fund growth; unit funds paid out on claim or surrender."}, {"type": "point", "bold": "Risk discount rate", "text": "Net projected cashflows are discounted at the risk discount rate, which takes into account: the return required by the company; the level of statistical risk attaching to the cashflows. A separate rate should theoretically apply to each cashflow component, but in practice a single rate is used for simplicity. The rate used for existing business assessment is typically lower than for pricing new business (some risks, e.g. new business volume/mix, are reduced)."}, {"type": "point", "bold": "Cashflow approach — assessing profitability of existing business", "text": "Full policy data set or representative model points may be used. Present value of projected cashflows calculated for each policy/model point. Results scaled up and totalled to give expected present value of future profits from existing business (the 'value of in-force business'). Main use: determining the insurer's embedded value. Alternative uses: assessing relative profitability by product/distribution channel; identifying products needing repricing."}, {"type": "point", "bold": "Embedded value", "text": "Defined as the value of the future profit stream from existing business together with the value of any net assets separately attributable to shareholders. Regarded as the best measure of an insurer's real worth. For sale purposes, goodwill (value of future new business) is added to give the appraisal value."}, {"type": "point", "bold": "Cashflow approach — return on capital", "text": "Net cashflows for model points are grossed up for expected new business to assess the capital required to write the product (on regulatory or economic capital basis). One-off development costs can be added. Total capital requirement compared with expected profits to determine expected return on capital."}, {"type": "point", "bold": "Cashflow approach — determining capital requirements", "text": "Full model office used to determine capital required to write new business. Net cashflows from new business model points (scaled up for expected new business) incorporated into a model of the whole company. Actuary assesses timing and amount of capital requirement; may lead to product redesign to reduce financing needs."}, {"type": "point", "bold": "Cashflow approach — when used", "text": "Now the most widely used approach for long-term insurance pricing. Not widely used for PMI (one-year term) as the formula approach is sufficient. For short-term products, cashflow techniques may still be used to: spread high initial expenses over expected renewals; assess adequacy of premiums over a longer time horizon (e.g. 10-year projection with assumptions for renewal rates and premium increases)."}, {"type": "h4", "text": "8. Multi-State Modelling"}, {"type": "point", "bold": "When used", "text": "Used where policyholders can exist in different states, each associated with different cashflows. Particularly relevant for IP insurance and LTCI where a claim does not terminate the policy (at minimum: claiming and not claiming states exist)."}, {"type": "point", "bold": "States for IP contract (full model)", "text": "Healthy; Sick but not yet claiming (within deferred period); Sick and claiming; Lapsed; Dead. In practice, the 'sick but not claiming' state is often omitted and the deferred period handled by explicit adjustments, leaving: Healthy; Sick (claiming); Lapsed; Dead."}, {"type": "point", "bold": "Transition intensities", "text": "Written as μ_x^{ij} = transition intensity at exact age x from state i to state j (i ≠ j). Represent the annual rate at which lives are moving between states. Applied to each status each month to determine numbers in each state for the next period."}, {"type": "point", "bold": "Multi-state modelling — pricing", "text": "Requires determination of the proportion of lives in each status using duration-based transition intensities. Value of claims outgo = number of lives in benefit-receiving sub-cohorts × relevant average sum insured. Balanced against: premiums from premium-paying state + investment income − expenses and other outgoings. Premium calculated by equating EPV of claims and EPV of premiums."}, {"type": "point", "bold": "Multi-state modelling — reserving / reporting", "text": "Similar tools apply for reserving and reporting. Assumptions underpinning transition intensities must be adjusted according to the purpose (e.g. statutory reserving assumptions may differ from those used in a company sale valuation)."}, {"type": "point", "bold": "Complexity vs. accuracy trade-off", "text": "Model accuracy improves with finer sub-cohort divisions (e.g. by gender, sickness duration, claims history). However, this quickly leads to large numbers of sub-cohorts and data requirements that cannot be met reliably — risk of spurious accuracy. In practice: sub-cohorts are combined and fewer but more credible transition intensities are used. The goal is to avoid results being heavily dependent on parameters with very little credibility."}, {"type": "point", "bold": "Data considerations", "text": "Amount of credible data is a key factor in deciding whether to use multi-state modelling. Example: a health and care insurer might use multi-state modelling for individual IP (reasonable data) but the inception/disabled annuity approach for group IP (insufficient data for multi-state). The value of sensitivity testing as a tool should never be underestimated — even without confidence in a single projected outcome, the effect of varying parameter assumptions is extremely illuminating."}, {"type": "h4", "text": "9. Main Components of Common Models (Appendix)"}, {"type": "point", "bold": "Policy liability model", "text": "Takes model points (or full policy data) and parameter values as input. Two key functions: (1) Projects forward the in-force portfolio to end of each future projection year (function of: existing in-force portfolio; projected new business; future state transitions; future mortality, lapse and non-renewal rates; policy expiries) — needed for supervisory reserves and solvency capital calculation; (2) Projects total policy cashflows each year — used with asset model to calculate projected year-end assets and annual profit."}, {"type": "point", "bold": "Expense model", "text": "Full model office: calculates total expected expenses of the insurance company. Single policy/new/existing business models: restricted to expenses related to those parts of the business modelled. Fixed overhead expenses are difficult to model for profit test and new business models; for the full model office they should be modelled globally."}, {"type": "point", "bold": "Asset model", "text": "Complexity varies with model type and purpose. Profit test (simplest): future total annual expected investment return only. Full model office assessing investment strategy (most complex): stochastic asset model producing a distribution of returns for each asset class, projecting income and gains separately, reflecting the changing asset mix. Asset and liability models must interact consistently (e.g. inflation-linked benefits and inflation-linked investment returns must be handled on a consistent basis)."}, {"type": "point", "bold": "Consolidation", "text": "Outputs of the policy liability model, expense model and asset model are consolidated (added up) at a higher level. Allows for factors not in the detailed model (e.g. adjustments for un-modelled business, tax, or separately determined contingency reserves). Results verified by comparison with: supervisory valuation; previous model results; and highly simplified model results."}]}, "Group Products": {"_meta": {"acc_stage": "S2", "pc_stage": "S1", "syllabus_category": 1, "risk_categories": ["insurance", "operational"], "stakeholders": ["Policyholders", "Insurer", "Distributors", "Reinsurers"], "icon": "👥", "pillar": "P1"}, "content": [{"type": "h3", "text": "Group Health & Care Insurance Framework (SP1 Chapter 5)"}, {"type": "h4", "text": "Definition & Structure"}, {"type": "point", "bold": "Group Definition", "text": "Collection of individuals combining to make single proposal for uniform insurance cover."}, {"type": "point", "bold": "Key Requirements", "text": "(1) Eligibility definition, (2) Clearly defined benefits by size/definition/period, (3) Uniform cover terms."}, {"type": "point", "bold": "Common Sponsor", "text": "Employer; often pays part/all premium. Can be affinity group, club membership, credit card linked."}, {"type": "h4", "text": "Purposes of Group Insurance"}, {"type": "point", "bold": "Legal Requirements", "text": "In some territories, IP insurance compulsory for employers."}, {"type": "point", "bold": "Recruitment/Retention", "text": "Positive message to prospective/existing employees; competitive benefit."}, {"type": "point", "bold": "Target Flexibility", "text": "Can appeal to all employees or selected groups (e.g., managers only)."}, {"type": "point", "bold": "Health & Return-to-Work Promotion", "text": "Encourages health management; facilitates speedy return following operation."}, {"type": "point", "bold": "Smooth Early Retirement", "text": "IP insurance mechanism for managing early retirement of unhealthy employees."}, {"type": "point", "bold": "Tax Advantages", "text": "Employer contribution may be tax-deductible; employee benefit may have tax-favourable treatment."}, {"type": "point", "bold": "Perceived Value", "text": "Benefit perceived as worth more to employee than cost to employer (tax efficiency)."}, {"type": "h4", "text": "Flexible Benefit Schemes (Cafeteria Benefits)"}, {"type": "point", "bold": "Structure", "text": "Core benefits + employee choice from menu of alternatives (some requiring staff contribution)."}, {"type": "point", "bold": "Advantages", "text": "Employees select benefits matching personal needs; greater flexibility."}, {"type": "point", "bold": "Insurer Challenges", "text": "Anti-selection risk (members choose benefits they expect to claim); increased administration; difficulty determining basic risk costs."}, {"type": "point", "bold": "Tax Implications", "text": "Depend on benefit type and jurisdiction; some benefits treated as taxable salary."}, {"type": "h4", "text": "Underwriting & Acceptance"}, {"type": "point", "bold": "Use of Average Assumptions", "text": "Underwriter assesses group on average; some poor health lives accepted if balanced by excellent health lives."}, {"type": "point", "bold": "Statistical Credibility", "text": "Group's experience used to derive premiums if sufficient volume credibility; can accept lives without significant portfolio changes."}, {"type": "point", "bold": "Special Considerations", "text": "May assess IP/PMI/CI claims in payment or about to be paid (liability pass to new insurer); critical for scheme takeovers."}, {"type": "point", "bold": "Scheme Takeover", "text": "When employer moves group to new insurer, new insurer may assume current + future liabilities; detailed assessment of current claims needed."}, {"type": "text", "text": "⬡ - For innovative aggregate-trigger group products (where payout depends on scheme-wide morbidity exceeding a threshold): employer benefits include ease of purchase and no individual underwriting; key risks to employer are short-term contract uncertainty, mismatch between payout and actual sick-pay liability, and moral hazard. [src:IAI_0523]"}, {"type": "h4", "text": "Anti-Selection Controls"}, {"type": "point", "bold": "Restrictions", "text": ""}, {"type": "point", "text": "Applying exclusions"}, {"type": "point"
