_category": 1, "risk_categories": ["regulatory"], "stakeholders": ["Government", "Policyholders", "Insurer", "Regulators (IRDAI)", "Healthcare Providers"], "icon": "🏛️", "pillar": "P1"}, "content": [{"type": "h3", "text": "State vs Private Interaction"}, {"type": "point", "bold": "State Role", "text": "Universal coverage (PMJAY / NHS), means-tested social care."}, {"type": "point", "bold": "Private Role", "text": "Que-jumping, luxury facilities, covering non-critical procedures."}, {"type": "point", "bold": "Demographics", "text": "Aging populations increase LTC and medical costs, shrinking taxpayer bases."}, {"type": "point", "bold": "Healthcare Economics", "text": "QALYs (Quality Adjusted Life Years) to decide drug funding via agencies like NICE."}, {"type": "text", "text": "⬡ - A government proposal to replace private PMI with a compulsory social insurance scheme forces insurers to: discontinue existing products (with costly system redesign), diversify into complementary lines (e.g. CI, overseas cover, supplementary benefits), and reassess long-term viability as the addressable market shrinks dramatically. [src:IFoA_0424]"}, {"type": "text", "text": "⬡ - From the government perspective, a mandatory social insurance scheme can equalise access to care, improve economic productivity, and unlock pooled purchasing power — but risks unsustainable fiscal strain if medical inflation exceeds tax revenue growth or if demand surges when previously uninsured populations access services. [src:IFoA_0424]"}, {"type": "text", "text": "⬡ - Citizens currently using private healthcare may face higher tax burdens under a social scheme that could exceed their existing PMI premiums, loss of provider choice (only registered hospitals covered), and quality concerns if private practitioners leave or are overburdened by the influx of new patients. [src:IFoA_0424]"}, {"type": "text", "text": "⬡ - Social insurance schemes can be financed via: general taxation, income-related payroll deductions (employee/employer contributions), sales tax increases, government borrowing, or redirection of existing tax revenue. Payroll deductions are predictable and link contributions to income but exclude the self-employed; sales taxes are broad-based but regressive. [src:IFoA_0424]"}, {"type": "h4", "text": "Low Insurance Take-Up in Developing Markets"}, {"type": "text", "text": "⬡ - Low private health insurance take-up in a developing country typically reflects: low financial literacy and awareness of product benefits, over-reliance on limited state provision, unaffordable premiums relative to incomes, poor distribution access (limited internet, few advisors), industry reputation concerns from past mis-selling, and products that are too complex or not designed for the local market. [src:IFoA_0423]"}, {"type": "text", "text": "⬡ - Government actions to increase private health insurance penetration include: restricting or means-testing state benefits to create a protection gap; offering tax relief on premiums/benefits for individuals and employers; mandating or incentivising employer group schemes; running public education campaigns; strengthening regulation and ombudsman powers to build consumer confidence; introducing premium caps; and allowing overseas insurers to enter the market to stimulate competition and product innovation. [src:IFoA_0423]"}, {"type": "text", "text": "⬡ - Allowing overseas insurers to enter a developing market can bring expertise, product innovation, and competitive pressure that benefits consumers and domestic insurers — but risks foreign insurers dominating the market and extracting profits, undermining domestic players and reducing long-term tax revenues if profits are repatriated. [src:IFoA_0423]"}]}, "Long-Term Care (LTC)": {"_meta": {"acc_stage": "S2", "pc_stage": "S1", "syllabus_category": 1, "risk_categories": ["insurance", "market", "reputational"], "stakeholders": ["Policyholders", "Insurer", "Government", "Healthcare Providers", "Reinsurers"], "icon": "🧓", "pillar": "P1"}, "content": [{"type": "h3", "text": "Long-Term Care Insurance Framework (SP1 Chapter 3)"}, {"type": "h4", "text": "Definition & Scope"}, {"type": "point", "bold": "Core Definition", "text": "All forms of continuing personal or nursing care and associated domestic services for people unable to care for themselves without support. Provided in own homes, day centres, or State-sponsored/private care homes."}, {"type": "point", "bold": "Distinct from Acute Care", "text": "Designed for people NOT expected to recover. Focuses on day-to-day living (getting up/bed, washing, cooking, shopping) rather than curing medical conditions."}, {"type": "point", "bold": "Applies to All Ages", "text": "While SP1 focuses on elderly, LTCI benefits payable for care need at any age (disabled from birth, accident, illness)."}, {"type": "point", "bold": "Informal vs Formal Care", "text": "Informal (family/spouse) has indirect cost (lost economic activity, replacement care cost). Formal provided at home or residential care."}, {"type": "h4", "text": "Cost Components (Must Separate)"}, {"type": "point", "bold": "Living Costs", "text": "Food, clothing, heating, amenities (extra needed for care needs)."}, {"type": "point", "bold": "Housing Costs", "text": "('Hotel' Element): Rent, mortgage, council tax, accommodation adaptations (bath hoist). Higher for care recipients."}, {"type": "point", "bold": "Personal Care Costs", "text": "Additional costs from frailty/disability; narrower 'nursing care' (qualified nurse knowledge/skills) more expensive than other personal care."}, {"type": "point", "bold": "Policy Approach", "text": "Typically cover EXTRA costs (difference from non-care scenario); not full costs."}, {"type": "h4", "text": "Long-Term Care Provision"}, {"type": "point", "bold": "Formal Care Settings", "text": "Majority home-based (preferred by individuals, government policy); private/charity residential homes for others."}, {"type": "point", "bold": "Care Delivery", "text": "Private care providers, nursing homes, care homes run by charities (serve specific communities)."}, {"type": "point", "bold": "Intermediate Care", "text": "Recuperative services post-acute event (heart attack, stroke, accident) to prevent hospital readmission; bridges hospital-home gap."}, {"type": "h4", "text": "Uncertainties in Care Needs Assessment"}, {"type": "point", "bold": "Likelihood of Need", "text": "Medical advances cure previously debilitating illnesses; genetic predisposition variable; published statistics may not apply to individuals."}, {"type": "point", "bold": "Extent of Care Required", "text": "Depends on medical advances, technological advances (equipment enabling independence), speed of deterioration, availability of informal support."}, {"type": "point", "bold": "Duration of Care", "text": "Longevity unknown; life expectancy based on averages, not individual factors; mortality improvements increase uncertainty."}, {"type": "point", "bold": "Risk", "text": "If underestimated, accumulated wealth insufficient to meet care needs."}, {"type": "h4", "text": "Types of LTCI Products"}, {"type": "point", "bold": "Pre-Funded Plans", "text": "Purchased by relatively healthy people to protect against future disability. Secured by single premium at outset or level annual premiums throughout life (or to specified age). Premium waiver during claim."}, {"type": "point", "bold": "Immediate Needs Plans", "text": "Purchased by long-term care claimants (already needing care). Single-premium product; benefit payable from start of care."}, {"type": "point", "bold": "Indemnity-Based", "text": "Ideally reimburses additional costs of day-to-day living when in need of care. May subject to overriding maxima to control claims costs."}, {"type": "point", "bold": "Cash Benefit Products", "text": "Not indemnity; provide fixed cash benefits (insurer knows exposure)."}, {"type": "h4", "text": "Benefit Triggers & Structure"}, {"type": "point", "bold": "Trigger Mechanism", "text": "Benefit payable on entry to care (ADL loss: Activities of Daily Living loss; e.g., unable to bathe, toilet, dress without assistance)."}, {"type": "point", "bold": "Multiple Dependency Levels", "text": "Independent → Partial Dependency → Full Dependency. Transfers between levels tracked; potential for down-grade (improvement) and up-grade (deterioration)."}, {"type": "point", "bold": "Benefit Escalation", "text": "Long-term contracts need inflation-protection. Real assets (equities) for inflation match; investment importance significant (large reserves)."}, {"type": "h4", "text": "Product Design Considerations"}, {"type": "point", "bold": "Deferred Period", "text": "Deferred period reduces risk-premium. Longer DP = lower cost (e.g., 0, 13, 26, 52 weeks). Policyholder pays care costs during DP from own resources."}, {"type": "point", "bold": "Surrender/Discontinuance Values", "text": "Savings element justifies surrender value design (unlike pure protection IP/CI). Return-of-premium rider possible."}, {"type": "point", "bold": "Premium Guarantee", "text": "Long-term contracts offered both guaranteed and reviewable variants."}, {"type": "point", "bold": "Funding Mechanism", "text": "Single premium or level annual premiums (spreads cost; amortization risk if lapse); premium waiver during claim."}, {"type": "h4", "text": "Complementarity with Other Products"}, {"type": "point", "bold": "CI Insurance Overlap", "text": "Many critical illnesses in old age lead to LTCI need. Good overlap but distinct triggers (CI: diagnosis; LTCI: ADL loss)."}, {"type": "point", "bold": "PMI Complement", "text": "LTCI benefits similar to PMI but cover longer-term chronic care; PMI covers acute treatment. Different benefit profiles."}, {"type": "point", "bold": "IP Insurance", "text": "IP + LTCI combination covers earnings loss (IP) + care costs if retirement (LTCI). No link between IP benefit level (earnings-based) and LTCI benefit (care-cost-based); problems in integrated design."}, {"type": "point", "bold": "Life Insurance", "text": "Good overlap (care benefits viewed as 'longevity insurance'). LTCI often added as rider to life cover."}, {"type": "point", "bold": "Bundling Risk", "text": "Adding LTCI (low consumer interest) to CI/life (high consumer interest) increases attachment; complicates experience analysis, claims management, capital assessment."}, {"type": "h4", "text": "Risks & Underwriting"}, {"type": "point", "bold": "High Claim Inception", "text": "LTCI has high per-capita claim rates compared to life insurance."}, {"type": "point", "bold": "Long Duration", "text": "Average claims duration 3-5 years; significant reserve build."}, {"type": "point", "bold": "Moral Hazard", "text": "Reduced (fixed benefit); but monitoring needed for claim verification/duration."}, {"type": "point", "bold": "Anti-Selection", "text": "Perception of '100% care coverage' attracts those expecting to need care. Underwriting at entry critical."}, {"type": "point", "bold": "Medical Advances", "text": "Can prolong life in disability (increasing costs) or hasten recovery (reducing costs); unpredictable."}, {"type": "point", "bold": "Dependency Tracking", "text": "Detailed record-keeping on dependency level transitions (up-grade/down-grade)."}, {"type": "h4", "text": "Key Actuarial Challenges"}, {"type": "point", "bold": "Large Reserves", "text": "Significant financial impact due to high inception/duration; investment importance high (real asset allocation for inflation, fixed-interest for guarantees)."}, {"type": "point", "bold": "Limited Data", "text": "New markets lack historical experience; proxy from reinsurers or population data (adjusted for insured selectivity)."}, {"type": "point", "bold": "Pricing Complexity", "text": "Must model claim inception rates, duration by dependency level, transitions between levels, inflation impact."}, {"type": "point", "bold": "Capital Requirements", "text": "LTCI strains capital at launch (negative asset share early); significant SCR impact due to guarantees/policyholder options."}, {"type": "h4", "text": "Pre-Funded LTC vs Self-Funded Care"}, {"type": "text", "text": "⬡ - Pre-funded LTC insurance (Option A) transfers longevity, care cost inflation, and morbidity risks to the insurer and provides known, budgetable premiums — but includes a profit margin, possible premium tax, and the risk of losing funds if the insured dies before needing care (mitigated by a return-of-premium death benefit). [src:IFoA_0923]"}, {"type": "text", "text": "⬡ - Self-funded care (Option B) preserves liquidity and flexibility, avoids insurer profit margin and expenses, and allows funds to be redirected if care is not needed — but leaves the family fully exposed to care cost inflation, longevity risk, investment underperformance, and the physical and mental burden of caregiving on working-age family members. [src:IFoA_0923]"}, {"type": "text", "text": "⬡ - A key risk of self-funded care is that care needs may exceed the family's capacity to provide them (e.g. complex dementia requiring 24-hour specialist input) — at which point external professional care must be funded privately at full market cost, eroding the apparent cost savings of Option B. [src:IFoA_0923]"}, {"type": "h4", "text": "Government Policy & Tax Incentives for LTC"}, {"type": "text", "text": "⬡ - Governments may provide income tax relief for individuals who self-fund and self-provide care for elderly relatives to: reduce pressure on the state healthcare system (freeing hospital beds occupied by those with unmet care needs), encourage workforce retention (carers stay employed rather than leaving to provide full-time care), stimulate the private care industry, and redistribute wealth by making care affordable for lower-income families. [src:IFoA_0923]"}, {"type": "text", "text": "⬡ - An opposing rationale for tax relief on pre-funded LTC insurance premiums is to: grow the private insurance and care industry (creating jobs and GDP), provide a market-based alternative to unaffordable state provision, offer families a known-cost budgetable solution, and reduce the long-term fiscal burden on the state by shifting care funding to private insurance. [src:IFoA_0923]"}]}, "Legislation & Taxation": {"_meta": {"acc_stage": "S1", "pc_stage": "S2", "syllabus_category": 2, "risk_categories": ["regulatory"], "stakeholders": ["Insurer", "Policyholders", "Appointed Actuary", "Government", "Regulators (IRDAI)"], "icon": "📋", "pillar": "P6"}, "content": [{"type": "h3", "text": "Tax & Law Impacts"}, {"type": "point", "bold": "Premiums/Benefits", "text": "Are premiums tax deductible? Are benefits tax free? Drives product demand."}, {"type": "point", "bold": "Employer Tax", "text": "Incentivizes Group PMI / Group IP if treated favorably as business expense."}, {"type": "point", "bold": "Anti-Discrimination", "text": "Equality acts preventing pricing based on genetics, gender, or disabilities without pure statistical proof."}]}, "Product Design (Protection)": {"_meta": {"acc_stage": "S3", "pc_stage": "S1", "syllabus_category": 1, "risk_categories": ["insurance"], "stakeholders": ["Policyholders", "Insurer", "Distributors", "Reinsurers"], "icon": "✏️", "pillar": "P1"}, "content": [{"type": "h3", "text": "General Protection Framework"}, {"type": "point", "bold": "Standalone vs Riders", "text": "Selling CI or Death cover attached to a savings/mortgage plan."}, {"type": "point", "bold": "Unit-Linked", "text": "Charging mortality/morbidity costs by deducting units from a fund (reviewable by nature)."}, {"type": "point", "bold": "Options", "text": "Conversion options, Guaranteed Insurability Options (GIOs) without medicals."}]}, "Administration": {"_meta": {"acc_stage": "S3", "pc_stage": "S3", "syllabus_category": 1, "risk_categories": ["operational"], "stakeholders": ["Insurer", "Policyholders", "Distributors", "TPAs"], "icon": "🗂️", "pillar": "P1"}, "content": [{"type": "h3", "text": "Admin & IT Systems"}, {"type": "point", "bold": "Setup Constraints", "text": "Can legacy IT handle complex tiered benefits or unit-deductions?"}, {"type": "point", "bold": "Customer Journey", "text": "Quotation portals, premium collection methods (Direct Debit)."}, {"type": "point", "bold": "Outsourcing", "text": "Using Third Party Administrators (TPAs) for claims, call centers. Retaining oversight."}]}, "Monitoring": {"_meta": {"acc_stage": "S4", "pc_stage": "S7", "syllabus_category": 5, "risk_categories": ["model"], "stakeholders": ["Insurer", "Appointed Actuary", "Shareholders", "Regulators (IRDAI)"], "icon": "📡", "pillar": "P5"}, "content": [{"type": "h3", "text": "Monitoring & Feedback into the Control Cycle (P5: Valuation & Data)"}, {"type": "h4", "text": "📌 Why Monitor Experience?"}, {"type": "point", "text": "Update assumptions for future pricing, reserving and financial planning"}, {"type": "point", "text": "Detect adverse trends early (e.g. rising morbidity, medical inflation) and take corrective action"}, {"type": "point", "text": "Compare actual vs expected (A/E) experience and quantify financial impact of divergences"}, {"type": "point", "text": "Provide management information to support business decisions"}, {"type": "point", "text": "Make better-informed decisions on pricing adequacy and reserve sufficiency"}, {"type": "point", "text": "Feed results back into the actuarial control cycle"}, {"type": "h4", "text": "📋 Data Requirements"}, {"type": "point", "text": "Requires a reasonable volume of **stable, consistent data** from which future experience and trends can be deduced"}, {"type": "point", "text": "Data must be in the same form across groups — consistent age definitions, smoker status, etc. Inconsistencies distort comparisons"}, {"type": "point", "text": "Divide data into **sufficiently homogeneous risk groups** (by age, gender, smoker status, occupation, duration, region, etc.), balanced against the need for credible cell sizes"}, {"type": "point", "text": "Investigation period must be long enough for credible data, but short enough to remain relevant — typically **3–5 years** for morbidity; **12 months** for expenses"}, {"type": "point", "text": "Where own data is thin, apply **credibility weighting**: blend actual experience with reinsurer, market or population data (adjusted for relevance)"}, {"type": "h4", "text": "🆕 New Business Analysis"}, {"type": "point", "text": "Monitor volume of sales vs targets to assess **new business strain** and capital adequacy"}, {"type": "point", "text": "Check **business mix** within risk groups against pricing assumptions — cross-subsidy effects (e.g. age mix in PMI) can materially affect profitability"}, {"type": "point", "text": "Verify **staffing levels** (numbers and competence) remain adequate for the volume written"}, {"type": "point", "text": "Compare **commissions paid** against pricing assumptions — deviations may indicate distribution mix changes"}, {"type": "point", "text": "Rapid increase vs market may signal adverse selection, lax claim definitions, or under-pricing"}, {"type": "point", "text": "Falling volumes reduce return on capital and distort per-policy expense assumptions"}, {"type": "h4", "text": "🔁 Renewals & Persistency Experience"}, {"type": "point", "bold": "Key factors for analysis", "text": "(in approximate order of importance):"}, {"type": "point", "text": "Type of contract (long-term vs short-term renewals behave differently)"}, {"type": "point", "text": "Duration since inception (lapses typically highest in early years)"}, {"type": "point", "text": "Sales method and target market (broker sales → highest persistency; direct response → lowest)"}, {"type": "point", "text": "Premium frequency and size (monthly = more lapse opportunities; large annual premium = affordability risk)"}, {"type": "point", "text": "Premium payment method (cash payments → lower persistency vs direct debit)"}, {"type": "point", "text": "Original policy term"}, {"type": "point", "text": "Age and gender (younger policyholders show lower persistency)"}, {"type": "point", "text": "NCD level / claims record (for PMI — those with poor claims record less likely to renew)"}, {"type": "point", "bold": "Process", "text": "First-year persistency = policies surviving to first anniversary ÷ policies issued; repeated for subsequent years; adjust to exclude deaths and maturities"}, {"type": "point", "bold": "Selective lapses", "text": "worsen the remaining risk pool — healthy lives lapse, sick lives stay — increasing morbidity experience"}, {"type": "point", "bold": "Future influences", "text": "(not in past data but must be considered): current economic conditions, competitive environment, perceived product value"}, {"type": "point", "text": "Short-term products (PMI) typically only profitable after 2–3 years of renewals; lapse monitoring is critical to profitability"}, {"type": "h4", "text": "🏥 Mortality & Morbidity / Sickness Experience"}, {"type": "point", "text": "Analyse claim **inception rates** and **termination rates** (recovery, death) separately"}, {"type": "point", "text": "Segment data by: contract type, age, gender, duration, smoker status, underwriting status, occupation, deferred period, geographical location, benefit conditions"}, {"type": "point", "bold": "For PMI", "text": "also segment by: excess amount, NCD level, hospital band; investigate claim frequency and severity separately; monitor medical inflation vs embedded assumption; track provider pricing changes and state healthcare system changes"}, {"type": "point", "bold": "For IP", "text": "investigate: higher inception rates, lower recovery rates, higher claim amounts, changes in business mix, deferred period effects (heavier morbidity at shorter deferred periods), economic conditions (recession → more claims and more lapses), linked-claims periods"}, {"type": "point", "bold": "For CI", "text": "break down by cause of claim (cancer, heart attack, stroke, etc.); monitor socio-economic and lifestyle factors"}, {"type": "point", "bold": "For LTCI", "text": "monitor geographical variation in care costs, claims inflation, evolving business mix profile"}, {"type": "point", "text": "Compare A/E ratios: identify **systematic bias** (model error) vs **random fluctuation**; repeated negative surplus from same source signals assumption error"}, {"type": "point", "text": "Use market data and reinsurer data to supplement own experience and spot trends earlier — but be cautious of heterogeneity and publication delays"}, {"type": "point", "text": "Monitor **competitor activity**: pricing, underwriting methods, risk segmentation — competitors using more rating factors can adversely select against you"}, {"type": "h4", "text": "💷 Claims Amount Experience"}, {"type": "point", "bold": "Indemnity products (PMI, LTCI)", "text": "compare actual vs expected claim amounts by risk cell and by type of procedure; drill down to hospital band, hospital chain, individual surgeons/consultants if needed"}, {"type": "point", "text": "Key focus: the **trend (rate of inflation) of claim escalation** relative to standard indices and market data — long-term inflation driver often matters more than day-to-day volatility"}, {"type": "point", "bold": "Fixed benefit products (IP, CI)", "text": "analyse incidence by broad sum insured bands — reveals anti-selection (higher sums insured having higher claim rates) and underwriting/sales technique issues"}, {"type": "h4", "text": "💼 Expense Experience"}, {"type": "point", "text": "Allocate total costs (salaries, property, computer, investment) to **cells**: initial / renewal / termination / claims / investment expenses"}, {"type": "point", "text": "Further split by **expense driver**: per policy, per unit premium, per unit sum insured"}, {"type": "point", "text": "Exclude commission (known and priced explicitly); exclude one-off exceptional items (allow for via margins)"}, {"type": "point", "text": "Compare actual per-policy and per-premium expenses to pricing assumptions; identify trends over 3–5 years"}, {"type": "point", "text": "Reconcile total allocated expenses back to published accounts as a consistency check"}, {"type": "point", "text": "Expense investigation typically performed **annually**; seasonal distortions require at least a full year of data"}, {"type": "h4", "text": "📈 Investment Experience"}, {"type": "point", "text": "Assess actual return on assets vs expected; analyse by main asset classes, both gross and net of investment expenses"}, {"type": "point", "text": "Investment expenses usually allowed for as a **reduction in yield** by asset class"}, {"type": "h4", "text": "📊 Analysis of Surplus / Profit"}, {"type": "point", "text": "Reconciles actual surplus arising over the period to that expected under the valuation basis; breaks it into component sources [src:IFoA_0922]"}, {"type": "point", "bold": "Sources of surplus identified separately", "text": ""}, {"type": "point", "text": "Mortality/morbidity surplus: actual vs expected claims"}, {"type": "point", "text": "Persistency surplus: actual vs expected lapses"}, {"type": "point", "text": "Expense surplus: actual vs expected (split acquisition, admin, claims management, inflation)"}, {"type": "point", "text": "Investment surplus: actual vs expected return"}, {"type": "point", "text": "New business strain: reserves exceed premiums at outset — requires capital"}, {"type": "point", "text": "Release of prudential margins: margins unwinding as policies run off"}, {"type": "point", "text": "Change of basis: effect of assumption or methodology changes on reserves"}, {"type": "point", "text": "Interest on opening surplus"}, {"type": "point", "bold": "Purposes of the analysis", "text": "[src:IFoA_0922]"}, {"type": "point", "text": "Show the financial effect of divergences between valuation assumptions and actual experience — exposing which assumptions are most financially significant"}, {"type": "point", "text": "Show the financial effect of writing new business"}, {"type": "point", "text": "Provide an independent check on the valuation data and process"}, {"type": "point", "text": "Identify non-recurring surplus components to guide appropriate distribution decisions (dividends to shareholders; distribution to with-profits policyholders; retention as buffer)"}, {"type": "point", "text": "Comply with regulatory requirements"}, {"type": "point", "text": "On a **prudent supervisory basis**: expect surplus to emerge each year — alarm bells ring if any component is negative"}, {"type": "point", "text": "On a **realistic basis**: negative components are normal; concern arises only if large, or repeated year-on-year"}, {"type": "point", "bold": "Without-profits business", "text": "100% of surplus attributable to shareholders [src:IFoA_0922]"}, {"type": "point", "bold": "Key exam sittings", "text": "202209 Q2(iv)/(v)/(vi), 202009 Q3(iii)"}, {"type": "h4", "text": "💎 Analysis of Embedded Value (EV)"}, {"type": "point", "text": "Reconciles opening to closing EV over a period; standard components:"}, {"type": "point", "text": "Opening EV"}, {"type": "point", "text": "Expected return on EV (unwinding of discount at risk discount rate)"}, {"type": "point", "text": "Value of new business (VNB) written in the period"}, {"type": "point", "text": "Experience variances: actual vs assumed mortality, lapses, expenses, investment return"}, {"type": "point", "text": "Assumption changes: effect of updating long-term assumptions on VIF"}, {"type": "point", "text": "Economic variances: changes in risk-free rates, equity returns"}, {"type": "point", "text": "Other operating variances"}, {"type": "point", "text": "Closing EV"}, {"type": "point", "bold": "VNB", "text": "= PV of future after-tax profits on new policies after deducting cost of required capital; VNB margin = VNB ÷ APE or PVNBP"}, {"type": "point", "bold": "Purposes of EV analysis", "text": ""}, {"type": "point", "text": "Validate calculations, assumptions and data used"}, {"type": "point", "text": "Reconcile values for successive years (essential given model complexity)"}, {"type": "point", "text": "Provide management information (value of new business by product; profit/loss by source)"}, {"type": "point", "text": "Provide data for executive remuneration schemes (EV change is a better performance measure than supervisory surplus, which is depressed by new business strain)"}, {"type": "point", "text": "Publish in accounts to give a truer picture of financial position than statutory accounts alone"}, {"type": "point", "bold": "Sensitivity analysis", "text": "typically shows impact of ±1% risk discount rate, ±10% mortality, ±10% lapses"}, {"type": "point", "text": "Used to assess which products, channels and geographies create shareholder value"}, {"type": "point", "text": "Experience variances in EV analysis reconcile to the same drivers investigated in experience analysis (incidence, lapse, expense, investment)"}, {"type": "point", "bold": "Key exam sittings", "text": "202009 Q3(iii), 201909 Q1(vii)/(viii)"}, {"type": "h4", "text": "🔄 Using the Results — Feedback into the Control Cycle"}, {"type": "point", "bold": "Improve the pricing basis", "text": "e.g. deteriorating morbidity → increase premium rates (new business only, unless premiums are reviewable)"}, {"type": "point", "bold": "Revise the reserving basis", "text": "basis normally reflects past experience subject to regulatory constraints; frequent changes complicate year-on-year comparisons"}, {"type": "point", "bold": "Change marketing message", "text": "poor new business volumes in a product → review advertising spend or distribution approach"}, {"type": "point", "bold": "Revise sales procedures", "text": "commission structures, distributor selection, literature format, clawback mechanics"}, {"type": "point", "bold": "Staffing adequacy", "text": "rapid sales growth may require additional or differently skilled staff"}, {"type": "point", "bold": "Revise underwriting processes", "text": "e.g. more stringent underwriting for high benefit amounts if morbidity is elevated"}, {"type": "point", "bold": "Revise claims handling processes", "text": "e.g. more frequent checks on IP claims during economic downturns"}, {"type": "point", "bold": "Alter capital allocation methodology", "text": "over-priced product → review capital loading → lower profit loading → more competitive price"}, {"type": "point", "bold": "Improve systems and data recording", "text": "better data quality feeds directly into more reliable assumptions"}, {"type": "point", "bold": "Revise policy design", "text": "remove options rarely used or adversely selected; improve CI condition definitions"}, {"type": "point", "bold": "Improve policy wording", "text": "especially for CI contracts where conditions covered are ambiguous"}, {"type": "point", "text": "This is an **iterative process** — assumptions gradually home in on reality, but the ever-changing nature of actual experience means monitoring must be continuous and assumptions must retain margins for model error"}, {"type": "h4", "text": "🎯 Key Exam Points"}, {"type": "point", "text": "Always distinguish between **supervisory basis** (expect surplus; negative = alarm) and **realistic basis** (negatives are normal)"}, {"type": "point", "text": "Analysis of surplus → impact on **current year profits** only; Analysis of EV → also captures impact on **future profits** — richer information set"}, {"type": "point", "text": "Selective lapses always **worsen** the remaining risk pool — an important direction of effect to state"}, {"type": "point", "text": "Economic downturns: **increase** claim inceptions (IP), **reduce** recoveries, **increase** lapses (selective), **increase** fraudulent claims"}, {"type": "point", "text": "For A/E analysis: always state that **both claims data and exposed-to-risk data** are needed — a common mark-scoring point"}, {"type": "point", "text": "New business strain arises even on **profitable** business if reserving basis is prudent — state the mechanism clearly"}, {"type": "point", "bold": "Key sittings", "text": "202104 Q3(ii) — experience analysis framework; 202409 Q3(i) — IP monitoring; 202204 Q2(i)/(ii) — PMI claims; 202209 Q2(iv–vi) — surplus analysis; 202009 Q3(iii) — EV reconciliation; 201909 Q1(vii)/(viii) — EV components"}, {"type": "h4", "text": "Consumer Outcomes & TCF Monitoring"}, {"type": "text", "text": "⬡ - Under consumer responsibility / TCF regulations, insurers should produce regular MI (e.g. monthly or quarterly) covering key consumer outcome metrics: (a) proportion of CI/health claims paid out, (b) value of claims paid vs premiums received, (c) average time to settle claims, (d) benefit adequacy vs inflation, (e) margin levels, (f) distributor commission levels, (g) service levels, (h) customer complaints and ombudsman referrals. [src:IFoA_0425]"}, {"type": "text", "text": "⬡ - Senior management should review consumer outcome statistics with defined tolerance limits; breaches should trigger a documented action log with remediation owners and timelines. Key statistics and trends should be reported to the Board. [src:IFoA_0425]"}, {"type": "text", "text": "⬡ - Trend analysis over time (not just point-in-time statistics) is critical for TCF monitoring — a deteriorating trend should trigger review and remediation before formal thresholds are breached. [src:IFoA_0425]"}, {"type": "text", "text": "⬡ - A formal stakeholder feedback process (customers and distributors) and a structured dispute resolution mechanism are important inputs to ongoing consumer outcome monitoring — they surface issues not captured in quantitative MI. [src:IFoA_0425]"}, {"type": "h4", "text": "Surplus Uses — Key Exam Points"}, {"type": "text", "text": "⬡ - Surplus arising from a change in reserving methodology (e.g. improved data segmentation) should be treated with caution: if the new methodology turns out to be less accurate, the surplus may need to be reversed at a later date. Retaining a portion of the surplus as a buffer rather than distributing it immediately is prudent. [src:IFoA_0922]"}, {"type": "text", "text": "⬡ - Additional surplus uses: repay a securitisation or reinsurance loan (where the block of business has been financed via a surplus relief arrangement); offset anticipated losses on another line of business; fund a portfolio acquisition (buying blocks of business from other insurers). [src:IFoA_0922]"}, {"type": "h4", "text": "TCF Obligations on Premium Reviews"}, {"type": "text", "text": "⬡ - Before adjusting premiums following improved risk data: (a) verify that any premium change is within the terms of the reviewable premium contract and communicated consistently with those terms; (b) conduct policyholder research (focus groups) to check that changes are within reasonable expectations; (c) discuss the risk of adverse PR and selective lapsing with the risk board before acting. [src:IFoA_0922]"}, {"type": "text", "text": "⬡ - TCF obligations when increasing reviewable premiums: communicate clearly and concisely to affected policyholders; signpost to independent advice; offer an alternative to premium increase (e.g. reduced benefit — extend deferred period, reduce replacement ratio, or move to less generous occupational definition) so policyholders are not forced to lapse. [src:IFoA_0922]"}, {"type": "text", "text": "⬡ - If the insurer decides to increase premiums for higher-risk (lower socio-economic) segments: consider simultaneously reducing premiums for lower-risk segments to demonstrate symmetric TCF treatment; ensure commission clawback terms are not enforced on policyholders who choose to lapse following a premium increase. [src:IFoA_0922]"}, {"type": "text", "text": "⬡ - The insurer may conclude that no premium action is warranted even where risk differentials are identified: if overall portfolio profitability is adequate and the observed cross-subsidy between risk segments is within reasonable bounds, taking no action avoids the PR, lapse, and regulatory risk of repricing. [src:IFoA_0922]"}]}, "Reporting": {"_meta": {"acc_stage": "S4", "pc_stage": "S8", "syllabus_category": 5, "risk_categories": ["regulatory", "model"], "stakeholders": ["Insurer", "Appointed Actuary", "Regulators (IRDAI)", "Shareholders"], "icon": "📄", "pillar": "P5"}, "content": [{"type": "h3", "text": "Reporting Framework (P5: Valuation & Data)"}, {"type": "h4", "text": "Solvency & Capital Reporting"}, {"type": "point", "bold": "Solvency II", "text": "European prudential framework; three-pillar structure. Pillar 1 (quantitative capital): two capital requirements — SCR (Solvency Capital Requirement) and MCR (Minimum Capital Requirement); Pillar 2: supervisory review; Pillar 3: disclosure."}, {"type": "point", "bold": "Risk Based Capital", "text": "Moves away from fixed factor-based solvency (current Indian regime: ASM ≥ 150% RSM, where RSM is factor-based); RBC links capital requirement directly to insurer's own risk profile."}, {"type": "h4", "text": "Accounting & Value Reporting"}, {"type": "point", "bold": "IFRS 17", "text": "Replaces IFRS 4; effective for annual periods beginning on or after 1 January 2023; Indian equivalent is Ind AS 117. Key measurement models: GMM (General Measurement Model / Building Block Approach), PAA (Premium Allocation Approach), VFA (Variable Fee Approach for participating contracts)."}, {"type": "point", "bold": "Embedded Value", "text": "Measure of consolidated value of shareholders' interests in an in-force life (and long-term health) insurance business; equals adjusted net worth plus value of in-force business (VIF); used in M&A and management reporting."}]}, "Model Office": {"_meta": {"acc_stage": "S3", "pc_stage": "S7", "syllabus_category": 3, "risk_categories": ["model"], "stakeholders": ["Insurer", "Appointed Actuary", "Shareholders"], "icon": "🏗️", "pillar": "P5"}, "content": [{"type": "h3", "text": "Model Office Framework"}, {"type": "h4", "text": "Definition & Model Types"}, {"type": "point", "bold": "Definition", "text": "A full model office is a projection model of the entire company — the sum of the new business model and the in-force business model — used to project future financial conditions."}, {"type": "point", "bold": "Four Model Types", "text": "(1) Single policy profit test — cash/profit flows from one policy from issue; (2) New business model — projects a cohort of new policies; (3) In-force model — projects existing portfolio; (4) Full model office — combines (2) and (3) plus asset and expense models."}, {"type": "h4", "text": "Uses & Comparison"}, {"type": "point", "bold": "Uses", "text": "New business projections; embedded value calculation and projection; solvency testing; takeovers/mergers; capital management; investment strategy assessment."}, {"type": "point", "bold": "vs. Profit Test", "text": "Full model office focuses on projections of the supervisory balance sheet and distributions of profit, where the profit test focuses on profitability of a single policy or product."}, {"type": "h4", "text": "Components"}, {"type": "point", "bold": "Component — Policy Liability Model", "text": "Takes model points (or full policy data) and parameter values as input; projects policy liabilities and cashflows."}, {"type": "point", "bold": "Component — Expense Model", "text": "Calculates total expected expenses of the company; fixed overhead expenses modelled globally; per-policy expenses derived from expense investigation."}, {"type": "point", "bold": "Component — Asset Model", "text": "Complexity varies by purpose — simple (profit test): single expected annual investment return; complex (ALM/stochastic): full asset cashflow projection with reinvestment."}, {"type": "point", "bold": "Consolidation", "text": "Outputs of sub-models aggregated at a higher level; allows for factors outside the detailed model such as reinsurance, tax, and shareholder transfers."}, {"type": "h4", "text": "Investment Strategy & Capital Management"}, {"type": "point", "bold": "Investment Strategy — Steps", "text": "(1) Allocate a proportion of free assets to support reserves; (2) Run asset-liability matching; (3) Derive an investment strategy for the remaining free assets."}, {"type": "point", "bold": "Investment Strategy — Stochastic Extension", "text": "Hundreds or thousands of sample paths of future solvency positions generated; output is a distribution of outcomes, enabling risk quantification."}, {"type": "point", "bold": "Capital Management", "text": "Full model office used to determine capital required to write new business; model point cashflows projected under different scenarios to assess capital adequacy over time."}, {"type": "h4", "text": "Limitations & Cross-References"}, {"type": "point", "bold": "Limitations", "text": "Model points may not represent the in-force business accurately enough; grouping is a simplification; future experience assumptions are uncertain; model error and parameter error both present."}, {"type": "point", "bold": "Pricing Process Role", "text": "After completing a profit test and setting premiums — run model office with the expected tranche of new business to check overall company profitability and solvency impact."}, {"type": "point", "bold": "Cross-References", "text": "Embedded value and appraisal value (Ch.13); costing/reserving for options (Ch.20); reserves — statutory and realistic (Ch.18); expense investigation (Ch.16)."}]}, "Assumptions": {"_meta": {"acc_stage": "S3", "pc_stage": "S2", "syllabus_category": 3, "risk_categories": ["insurance", "model"], "stakeholders": ["Insurer", "Appointed Actuary", "Regulators (IRDAI)", "Shareholders"], "icon": "🎯", "pillar": "P5"}, "content": [{"type": "h3", "text": "Assumptions Framework (SP1 Chapters 13–16)"}, {"type": "h4", "text": "General Principles & Process (Ch.13)"}, {"type": "point", "bold": "General Principles (Ch.13)", "text": "When setting assumptions, consider: (1) the purpose for which assumptions will be used (pricing, reserving, EV); (2) extra care over assumptions with the greatest financial significance; (3) consistency between all assumptions; (4) legislative/regulatory constraints; (5) the client's needs; (6) accuracy and relevance of data to the insured lives; (7) flexibility of bases to reflect changing risk circumstances."}, {"type": "point", "bold": "Process for Setting Assumptions", "text": "Four-step framework: (1) Investigate historical experience and form best estimates; (2) Consider future conditions (commercial/economic environment); (3) Determine best estimate assumptions for the expected future period; (4) Adjust best estimates to include a margin for prudence, sized according to the purpose of the model and degree of risk for each parameter."}, {"type": "point", "bold": "Consistency Principle", "text": "Assumptions must be considered in totality, not in isolation. Key correlated pairs include: morbidity & lapse rates; morbidity & claims expenses; morbidity & investment return; new business volume & fixed expenses; lapse/non-renewal rates & investment return; investment return & inflation."}, {"type": "h4", "text": "Pricing, Reserving & EV Assumptions"}, {"type": "point", "bold": "Pricing Assumptions – Basis & Margins", "text": "Starting point is best estimates of future experience. Margins must be added to guard against adverse experience. Under a cashflow model, risk can be allowed for via: (a) margins applied to expected parameter values; (b) a stochastic approach; or (c) a risk element in the risk discount rate."}, {"type": "point", "bold": "Pricing vs Reserving vs EV Assumptions", "text": "Pricing uses best estimates + margins (or a higher RDR). Supervisory reserving may use prudent assumptions or best estimate + explicit risk margin / SCR. EV/profitability bases are broadly realistic, with risk allowed for via a risk discount rate."}, {"type": "h4", "text": "Demographic Assumptions (Ch.14)"}, {"type": "point", "bold": "Demographic Assumptions – General Process (Ch.14)", "text": "(1) Collect data for an appropriate period (typically 3–4 years); (2) Group data into homogeneous risk cells by age, gender, smoker status, occupation, benefit size, distribution channel, class of product, region; (3) Calculate rates as an adjustment to a standard table; (4) Adjust rates if the target class of lives differs from the data."}, {"type": "point", "bold": "Claim Incidence Rates", "text": "Required for all product lines – IP, CI (per illness separately), LTCI, PMI (per benefit category). Key influences: State welfare policy; economic outlook/unemployment; inflation. Industry, reinsurer and population data supplement own data."}, {"type": "point", "bold": "Claim Recovery Rates (IP)", "text": "Rates decrease with duration since onset of sickness. Key influences: motivation to return to work; economic environment; policy conditions; insurer rehabilitation and claims management."}, {"type": "point", "bold": "Mortality Assumptions", "text": "Separate rates needed for healthy (non-claiming) lives and lives in claim. CI survivorship captured as an adjustment to the CI claim incidence rate."}, {"type": "point", "bold": "Lapse Rates", "text": "Own company experience is the primary source. Key influences: economic affordability; State benefits; competitive alternatives; after-sales service. Lapse and re-entry risk arises when premiums are falling."}, {"type": "h4", "text": "Financial Assumptions (Ch.15)"}, {"type": "point", "bold": "Benefit Amount & Benefit Inflation (Ch.15)", "text": "PMI: indemnity-based so both claim incidence and average claim amount must be estimated. Benefit inflation for long-term contracts must be explicitly modelled as it affects per-unit pricing."}, {"type": "point", "bold": "Expense Assumptions", "text": "Categories: initial acquisition; initial medical underwriting; initial administration; renewal administration; renewal commission; investment; withdrawal; claim administration; termination."}, {"type": "point", "bold": "Expense Inflation", "text": "Expenses largely reflect staff/salary costs, hence linked to a mix of price and earnings inflation."}, {"type": "point", "bold": "Commission & Clawback", "text": "Higher initial vs renewal commission reflects extra sales effort. Clawback of initial commission on early lapse must account for intermediary credit risk."}, {"type": "point", "bold": "Investment Return", "text": "Must be consistent with all inflation assumptions. Assets backing the contract are typically fixed interest or index-linked bonds. PMI: investment return of minimal importance."}, {"type": "point", "bold": "Taxation", "text": "Three main types: (1) Taxes on profits; (2) Taxes on investment income less expenses (I–E basis); (3) Taxes on premiums."}, {"type": "h4", "text": "New Business & Risk Discount Rate (Ch.16)"}, {"type": "point", "bold": "New Business Volume & Mix (Ch.16)", "text": "New business volume affects expense loadings and capital requirements at product launch. Incorrect mix assumptions expose the insurer to anti-selection."}, {"type": "point", "bold": "Risk Discount Rate (Ch.16)", "text": "Reflects: (a) shareholders' required return – risk-free rate plus a risk premium quantified using CAPM; and (b) product-specific statistical risk. Features increasing statistical risk: lack of historical data; high guarantees; policyholder options; overhead costs; complex design; untested market."}]}, "Health Cash Plan": {"_meta": {"acc_stage": "S2", "pc_stage": "S1", "syllabus_category": 1, "risk_categories": ["insurance"], "stakeholders": ["Policyholders", "Insurer", "Distributors"], "icon": "💊", "pillar": "P1"}, "content": [{"type": "h3", "text": "Health Cash Plan Framework (SP1 Chapter 4)"}, {"type": "h4", "text": "Definition & Nature"}, {"type": "point", "bold": "Product Type", "text": "Defined-benefit, defined-premium insurance product. Very low premium (~$2/week)."}, {"type": "point", "bold": "Benefit Approach", "text": "Provides specific cash payouts for healthcare events (not indemnity); insurer knows maximum exposure."}, {"type": "point", "bold": "Schedule of Benefits", "text": "Purchased in 'units'; equivalent benefit levels with contribution increase per unit."}, {"type": "h4", "text": "Coverage & Benefit Types"}, {"type": "point", "bold": "Typical Benefits Include", "text": "Dental (treatment/cleaning), optical (spectacles, contact lenses, tests), physiotherapy, maternity, hospitalisation, recuperation, hearing aids, consultation."}, {"type": "point", "bold": "Limit Examples", "text": "May reimburse 50% of physio costs up to max £200/year; defined caps on each benefit type."}, {"type": "point", "bold": "Coinsurance", "text": "Limits ensure policyholder claims not more than e.g. 50% of medical bill (cost-sharing between policyholder and insurer)."}, {"type": "h4", "text": "Rating Approach"}, {"type": "point", "bold": "Community Rating", "text": "Typical approach—no individual-level medical underwriting. Uses group/community-level information (area, occupation class)."}, {"type": "point", "bold": "No Individual Rating", "text": "Unlike PMI, no assessment of applicant age, gender, health status at individual level. All members with same values of community factors charged same premium."}, {"type": "point", "bold": "Universal Eligibility", "text": "No individual applicant meeting eligibility conditions will be refused (no individual UW)."}, {"type": "point", "bold": "Annual Premium Review", "text": "Common premium charged may increase year-to-year due to claims cost inflation."}, {"type": "point", "bold": "Same-for-All Variant", "text": "Sometimes even community-level information ignored; identical premium charged to all choosing particular benefit level."}, {"type": "h4", "text": "Waiting Periods & Pre-Existing Conditions"}, {"type": "point", "bold": "Standard Waiting Period", "text": "Typically 6 months before benefit eligibility."}, {"type": "point", "bold": "Accident Exception", "text": "No waiting on accident-related claims (reduces anti-selection risk)."}, {"type": "point", "bold": "Maternity", "text": "Special waiting period, usually at least 9 months."}, {"type": "point", "bold": "Pre-Existing Conditions", "text": "May impact ability to claim in first period."}, {"type": "point", "bold": "Purpose", "text": "Reduce anti-selection risk (define cash benefit < full indemnity cost reduces incentive to take out if expecting claim)."}, {"type": "h4", "text": "Profitability & Sustainability"}, {"type": "point", "bold": "Renewal Persistence", "text": "Product profitability depends on long-term policyholder loyalty; fail to renew = fixed costs unrecovered."}, {"type": "point", "bold": "Cost-Efficient Claims Admission", "text": "Process must be streamlined; manual assessment costly relative to small claim amounts."}, {"type": "point", "bold": "Volume in Force", "text": "Large in-force number spreads fixed costs (product development, marketing) across policies."}, {"type": "point", "bold": "Positive Scenarios", "text": ""}, {"type": "point", "text": "Long renewal chains treat like longer-term contract; amortize initial expenses"}, {"type": "point", "text": "Cost-efficient claims admission reduces impact on profits"}, {"type": "point", "text": "Large policy volume spreads fixed costs; small per-policy expense loading"}, {"type": "point", "bold": "Importance", "text": "Much smaller expense loading in premium than competitors."}, {"type": "h4", "text": "Market & Distribution"}, {"type": "point", "bold": "Scope", "text": "Simple health insurance product (low complexity vs comprehensive PMI)."}, {"type": "point", "bold": "Distribution", "text": "Direct, broker, employer group, credit card linked."}, {"type": "point", "bold": "Simplicity Advantage", "text": "Easier to explain, understand, compare vs complex PMI; lower operating costs."}, {"type": "point", "bold": "Dental & Optical Variants", "text": "Can be part of cash plan or standalone policies; may apply waiting period/PEC exclusions."}, {"type": "h4", "text": "Distinction from Indemnity Products"}, {"type": "point", "bold": "Fixed Payout", "text": "Policyholders not fully reimbursed for medical costs (may be 50% coinsurance); differ from indemnity PMI."}, {"type": "point", "bold": "Known Insurer Exposure", "text": "Unlike PMI (indemnity = open-ended), cash plan cap limits insurer liability per service."}, {"type": "point", "bold": "Anti-Selection Reduction", "text": "Fixed benefit (not full cost) < perception; less incentive to claim if known to incur medical expense soon."}, {"type": "h4", "text": "Non-Traditional Distribution & Free Product Campaigns"}, {"type": "text", "text": "⬡ - A free health cash plan offered via a retail/grocery partnership (requiring minimum customer spend) can build brand awareness and create a lead pool for upselling paid products — but exposes the insurer to claims cost without premium income, requiring the campaign to be funded via marketing budget or partner contribution and capped on volume to manage capital strain. [src:IFoA_0424]"}, {"type": "text", "text": "⬡ - Regulatory concerns with a free health cash product include: financial soundness (no premium income; adequacy of reserves), mis-selling risk (minimum spend condition; product limitations not understood by customers), data usage (access to spending patterns without explicit consent), and whether automatic opt-in is permissible. [src:IFoA_0424]"}, {"type": "text", "text": "⬡ - Design mitigants for a free promotional health cash product: cap total policies written or terminate campaign early based on take-up or emerging claims; pilot in limited stores/regions first; ensure clear product literature and FAQs; position staff in stores to explain limitations; consider accident-only benefit to remove waiting period complexity and mis-selling risk. [src:IFoA_0424]"}, {"type": "text", "text": "⬡ - An advertising campaign (TV, radio, social media, in-store) has greater reach beyond the partner's customer base and a certain, controllable spend — but a free product creates direct product experience, generates testimonials, and produces a trackable lead pool with proxy income data (minimum spend qualifier), making conversion rates easier to measure. [src:IFoA_0424]"}, {"type": "h4", "text": "Microinsurance Products"}, {"type": "text", "text": "⬡ - Microinsurance provides fixed-benefit, low-premium cover to low-income populations with variable/irregular income streams. A typical product pays a fixed cash benefit on hospitalisation (e.g. minimum 3-night stay) with no individual underwriting, covering accident or illness. The social objective — maximising benefit payments to policyholders — is as important as financial sustainability. [src:IFoA_0922]"}, {"type": "text", "text": "⬡ - Premium risks in microinsurance: (a) inconsistent premium collection (customers without bank accounts; stop-start payment patterns) makes it difficult to manage the expense base; (b) low per-policy premium requires large scale to cover fixed costs; (c) agent commission-based remuneration makes revenue volatile; (d) gaps in cover without re-underwriting create anti-selection risk — policyholders can reactivate cover when hospitalisation is anticipated. [src:IFoA_0922]"}, {"type": "text", "text": "⬡ - Claims risks in microinsurance: (a) anti-selection from gaps in cover (policyholders restart premiums in anticipation of a claim); (b) moral hazard — policyholders may pressurise hospitals to keep them admitted for the minimum qualifying period, or leave and re-admit to make multiple claims; (c) fraud risk is higher due to inability to validate claims for low-literacy or remote populations; (d) windfall payments if benefit materially exceeds income loss or cost of hospitalisation. [src:IFoA_0922]"}, {"type": "text", "text": "⬡ - Product design mitigants for microinsurance: (a) impose a waiting period when cover restarts after a gap exceeding a threshold (e.g. 90 days); (b) structure as group product via employer or community group to assist premium collection and reduce acquisition cost per life; (c) introduce cashback or loyalty incentives to drive consistent payment; (d) partner with hospitals to streamline claims validation and reduce fraud; (e) structure benefit as per-night-of-stay (not fixed lump sum) to align benefit with need and reduce windfall risk; (f) limit claims per month; (g) require a statement of good health on restart after gap. [src:IFoA_0922]"}, {"type": "text", "text": "⬡ - Reviewable premium rates and benefit terms are essential in microinsurance: the insurer must be able to react quickly to adverse claims experience given the thin margins and limited capital buffer typical in this market. [src:IFoA_0922]"}, {"type": "text", "text": "⬡ - Main reserves for a microinsurance hospitalisation product: IBNR (incurred but not reported — estimated from recent premium/exposure data if claims data is thin), UPR (unexpired premium reserve for in-force monthly cover), URR (unexpired risk reserve if UPR insufficient for expected claims), and RBNS (reported but not settled — including claims where the patient has not yet completed the minimum qualifying stay). [src:IFoA_0922]"}, {"type": "text", "text": "⬡ - Investigating a low claims ratio in a microinsurance product (social objective not met): examine (a) operational data — declined claims rate, claim turnaround time, percentage of claims with complete documentation, whether customers without active cover are attempting to claim; (b) lapse data — percentage lapsing during waiting period, average duration before first lapse; (c) business mix — age, gender, location, occupation versus pricing assumptions; (d) distributor feedback — consumer interest, understanding, and conversion rates at point of sale. [src:IFoA_0922]"}, {"type": "text", "text": "⬡ - Options to increase claims ratio in a microinsurance product: (a) increase sum assured — raises claim amounts but not incidence; lower uncertainty as incidence rates are already known; risk of windfall/fraud if benefit significantly exceeds need; (b) relax hospitalisation definition (e.g. 2-night minimum) — increases eligible policyholders but introduces pricing uncertainty and potential windfall for short stays; (c) reduce premiums — improves affordability and may attract higher-risk segments, but erodes margin and may make the product commercially unviable; (d) education and claims awareness programme — helps customers understand coverage and submit valid claims; low capital cost but may require investment in process and communication. [src:IFoA_0922]"}, {"type": "text", "text": "⬡ - Adding an outpatient benefit to a microinsurance hospitalisation product: increases comprehensiveness and reduces complaints when hospitalisation threshold is not met — but adds pricing uncertainty (limited data), increases claims administration cost disproportionately relative to the low benefit amounts typical in this market, and may require deductibles/co-insurance that are impractical for the target market. Overall commercial and customer viability is questionable unless the benefit level is material relative to out-of-pocket costs. [src:IFoA_0922]"}]}, "Accident and Sickness Product": {"_meta": {"acc_stage": "S2", "pc_stage": "S1", "syllabus_category": 1, "risk_categories": ["insurance", "operational"], "stakeholders": ["Policyholders", "Insurer", "Distributors", "Reinsurers"], "icon": "🩺", "pillar": "P1"}, "content": [{"type": "h3", "text": "Accident & Sickness Insurance Framework (SP1 Chapter 1)"}, {"type": "h4", "text": "Definition & Nature"}, {"type": "point", "bold": "Product Classification", "text": "Short-term insurance product with similarities to income protection."}, {"type": "point", "bold": "Benefit Structure", "text": "Income for specified period (often one year) following deferred period, payable while claimant remains disabled (usually 'inability to perform any occupation')."}, {"type": "point", "bold": "Additional Benefit", "text": "Fixed lump sum may be paid if policyholder loses a limb through accident (similar to personal accident cover)."}, {"type": "point", "bold": "Also Known As", "text": "ASU insurance (Accident, Sickness, Unemployment); can include creditor insurance or payment protection insurance (PPI)."}, {"type": "h4", "text": "Key Characteristics"}, {"type": "point", "bold": "Short-Term Nature", "text": "Annual renewable; insurer has opportunity to review premium and terms/conditions each year (benefits offered, deferred periods, conditions)."}, {"type": "point", "bold": "Limited Benefit Duration", "text": "Benefits payable for fixed period (often 1 year) vs IP (to retirement age)."}, {"type": "point", "bold": "Shorter Deferred Periods", "text": "Often no deferred period or short DP (e.g., ASU covers IP's waiting period where IP unavailable/expensive)."}, {"type": "point", "bold": "Minimal Underwriting", "text": "Usually not subject to individual underwriting; useful for those unable to access long-term IP except at prohibitive rates."}, {"type": "point", "bold": "Low Premiums", "text": "Relatively low due to short duration and limited underwriting."}, {"type": "h4", "text": "Distribution & Use Cases"}, {"type": "point", "bold": "Employer & Group", "text": "Available through employer-sponsored schemes and affinity groups; may not be individually underwritten at group level."}, {"type": "point", "bold": "Loan Protection", "text": "Often sold alongside life/unemployment benefits to protect loan repayments (creditor insurance/PPI)."}, {"type": "point", "bold": "Coverage Scope", "text": "Can include critical illness or total/permanent disability definitions."}, {"type": "point", "bold": "Parallel to IP", "text": "Sold alongside long-term IP where IP has long DP (e.g., 52 weeks); ASU provides short-term bridge cover."}, {"type": "h4", "text": "Definition of Disability"}, {"type": "point", "bold": "Typical Definition", "text": "Inability to perform any occupation (no occupational distinction as in long-term IP)."}, {"type": "point", "bold": "Functional Tests", "text": "May use ADLs, ADWs, FATs, or PCAs (flexible for non-earners)."}, {"type": "h4", "text": "Benefits & Conditions"}, {"type": "point", "bold": "Income Benefit", "text": "Regular payments during disability within specified period."}, {"type": "point", "bold": "Accident Lump Sum", "text": "Fixed amount on loss of limbs/specified body parts (distinct from personal accident)."}, {"type": "point", "bold": "Annual Renewal", "text": "Underwriting opportunity each year; terms/benefits can change."}, {"type": "point", "bold": "Deferred Period", "text": "Shorter than typical IP (if any); variable by insurer."}, {"type": "h4", "text": "Relationship to Other Products"}, {"type": "point", "bold": "Similarities to IP", "text": "Both provide income during incapacity; both renewed annually."}, {"type": "point", "bold": "Differences from IP", "text": "Shorter benefit duration (often 1 year max), often no/short DP, minimal UW, lower premium."}, {"type": "point", "bold": "Complementary", "text": "Used as bridge when IP unavailable/unaffordable; covers loan repayment risk."}, {"type": "point", "bold": "Market Niche", "text": "Fills gap for people unable to access long-term IP or seeking short-term bridge protection."}]}, "Major Medical Expenses": {"_meta": {"acc_stage": "S2", "pc_stage": "S1", "syllabus_category": 1, "risk_categories": ["insurance"], "stakeholders": ["Policyholders", "Insurer", "Healthcare Providers", "Reinsurers"], "icon": "🏨", "pillar": "P1"}, "content": [{"type": "h3", "text": "Major Medical Expenses (MME) Framework (SP1 Chapter 4)"}, {"type": "h4", "text": "Definition & Nature"}, {"type": "point", "bold": "Benefit Structure", "text": "Lump-sum payment when policyholder undergoes surgery. Benefit size varies by procedure class/severity; estimated to cover in-patient costs + incidentals/recuperation."}, {"type": "point", "bold": "No Guarantee", "text": "Benefit not guaranteed to cover extreme surgical complications within class (unless policy explicitly states + insurer has fixed-price hospital agreement)."}, {"type": "point", "bold": "Product Design", "text": "Fixed benefit schedule limits claims-stage work (admin efficiency vs indemnity complexity)."}, {"type": "h4", "text": "Coverage Scope"}, {"type": "point", "bold": "In-Patient Only", "text": "Covers in-patient surgical procedures; does NOT cover out-patient episodes."}, {"type": "point", "bold": "Marketing Disadvantage", "text": "Limited scope (no OP) but compensated by significantly lower premium. [src:IFoA_0922]"}, {"type": "point", "bold": "Insurer Advantage", "text": "Fixed benefit schedule simplifies claims adjudication; reduces disputes; clear eligibility."}, {"type": "h4", "text": "Product Types"}, {"type": "point", "bold": "Short-Term Variant", "text": "Annually renewable product (like PMI); insurer can review terms/benefits/premiums each year."}, {"type": "point", "bold": "Long-Term Variant", "text": "Reviewable premium product; multi-year terms with premium subject to review."}, {"type": "h4", "text": "Comparison to Other Products"}, {"type": "point", "bold": "vs Critical Illness (CI)", "text": ""}, {"type": "point", "bold": "Qualifying Event", "text": "MME—requirement for one of listed operations. CI—diagnosis of specified serious illness (not necessarily operation)."}, {"type": "point", "bold": "Overlap", "text": "Some CI benefits payable on specific operations (very serious: heart-bypass). Overlap for operation-based CI benefits; no overlap for diagnosis-based CI benefits."}, {"type": "point", "bold": "Scope Difference", "text": "CI includes life-threatening conditions not requiring operations; MME includes relief operations (non-life-threatening: hip replacement)."}, {"type": "point", "bold": "vs Indemnity PMI", "text": "MME provides fixed benefit (known exposure); PMI indemnity reimburses actual costs (open-ended)."}, {"type": "point", "bold": "vs Health Cash Plans", "text": "Cash plan covers multiple small benefits (dental, optical, physio); MME targets single major-cost event (surgery)."}, {"type": "h4", "text": "Surgical Procedure Schedule"}, {"type": "point", "bold": "List of Covered Procedures", "text": "Defined surgical procedures triggering benefit (heart-bypass, organ transplant, hip replacement, etc.)."}, {"type": "point", "bold": "Benefit Level by Procedure", "text": "Different procedures/classes assigned different fixed benefit amounts."}, {"type": "point", "bold": "Severity Considerations", "text": "Benefit scaled to complexity/cost; simple procedures lower benefit, complex procedures higher."}, {"type": "h4", "text": "Geographic Context"}, {"type": "point", "bold": "UK Origin", "text": "Term 'MME' more specific to UK market. In USA, 'major medical expenses' closer to UK 'private medical insurance' (broader coverage)."}, {"type": "point", "bold": "International Variation", "text": "Naming/scope conventions vary by territory."}, {"type": "h4", "text": "Underwriting & Claims"}, {"type": "point", "bold": "Simplified Claims Process", "text": "Fixed benefit schedule pre-determined; minimal assessment needed at claims stage. [src:IFoA_0922]"}, {"type": "point", "bold": "Clear Eligibility", "text": "Procedure either on list or not; reduces disputes."}, {"type": "point", "bold": "Underwriting", "text": "Varies by product variant (short-term may be less rigorous; long-term may require fuller UW)."}, {"type": "text", "text": "⬡ - MME suits individuals who prefer to self-fund routine healthcare costs but want protection against catastrophic surgical costs — a rational choice for affluent or younger policyholders who view day-to-day costs as affordable but cannot absorb major one-off surgical expenses. [src:IFoA_0922]"}, {"type": "text", "text": "⬡ - Customers with pre-existing conditions may prefer MME to PMI because MME's simpler underwriting is less likely to apply condition-specific exclusions — making it accessible where comprehensive PMI would impose onerous terms. [src:IFoA_0922]"}, {"type": "text", "text": "⬡ - MME sold online or direct benefits from a simpler, faster application process than PMI: fewer medical questions, fixed sum assured, and a straightforward benefit schedule reduce the underwriting and advice burden and make online distribution viable. [src:IFoA_0922]"}]}, "Disability Definitions": {"_meta": {"acc_stage": "S2", "pc_stage": "S1", "syllabus_category": 1, "risk_categories": ["insurance", "operational"], "stakeholders": ["Policyholders", "Insurer", "Appointed Actuary", "Reinsurers"], "icon": "♿", "pillar": "P1"}, "content": [{"type": "h3", "text": "Disability Definitions Framework (SP1 Chapters 1 & 2)"}, {"type": "h4", "text": "Overview"}, {"type": "point", "bold": "Three Main Types", "text": "(1) Occupation-based, (2) ADL-based, (3) Functional/Skills-based (ADWs, FATs, PCAs)."}, {"type": "point", "bold": "Gap Filled by Non-Occupational", "text": "Occupational definitions cannot be applied to housepersons, unemployed, or those past retirement age — non-occupational definitions fill this gap."}, {"type": "point", "bold": "Products Using These", "text": "IP (income protection), TPD (within CI products), and LTCI."}, {"type": "h4", "text": "Occupation-Based Definitions"}, {"type": "point", "bold": "Own Occupation", "text": "Unable to perform the specific occupation of the insured. Most generous to policyholder; highest claims cost. Unsuitable where minor disability could trigger claim frequently (e.g. pianist with hand injury — cost would be prohibitive). Not offered to high-risk/manual occupations."}, {"type": "point", "bold": "Any Occupation Suited by Education, Training or Experience", "text": "Middle ground; potential for dispute at claims stage. Common compromise definition. Offers a fair alternative where own occ is unsuitable."}, {"type": "point", "bold": "Own Occupation (initial period) then Any Occupation", "text": "e.g. own occ for first 2 years, then switches to any occ. Balances early claim generosity with long-term cost control."}, {"type": "point", "bold": "Any Occupation", "text": "Most restrictive for policyholder; lowest claims cost for insurer. Standard for high-risk/manual occupations (e.g. building trade) where cost of broader cover is high and difficult to quantify."}, {"type": "point", "bold": "Cost Order", "text": "Own occ (highest cost) → Suited occ → Any occ (lowest cost)."}, {"type": "point", "bold": "Key Risk", "text": "Lenient claims interpretation in practice means claims paid more generously than priced — experience monitoring must feed back into pricing (actuarial control cycle)."}, {"type": "point", "bold": "Flexibility", "text": "Offering multiple definitions extends the range of insurable lives; those ineligible for own occ can be offered an alternative."}, {"type": "h4", "text": "Activities of Daily Living (ADLs)"}, {"type": "point", "bold": "Definition", "text": "Inability to perform (unaided) a specified number of standard everyday tasks — commonly 3 or 4 out of 6."}, {"type": "point", "bold": "Standard ADL List", "text": "Feeding, Dressing, Washing, Toileting, Mobility, Transferring."}, {"type": "point", "bold": "Advantages over Occupational", "text": "Applicable to non-workers (housepersons, unemployed, retired); usable beyond retirement age; single definition throughout policy term; less subjective."}, {"type": "point", "bold": "Limitation", "text": "May be harder to satisfy than an occupational definition."}, {"type": "point", "bold": "TPD Application", "text": "TPD written on ADL basis throughout life = 'loss of independent existence'."}, {"type": "point", "bold": "LTCI Application", "text": "Typically 50% benefit on failure of 2/6 ADLs; 100% on failure of 3+/6 ADLs (or cognitive impairment). More recent plans separate ADL triggers with individual benefit levels per ADL failed."}, {"type": "h4", "text": "Activities of Daily Working (ADWs)"}, {"type": "point", "bold": "Definition", "text": "Skills-based tests relating to workplace and daily work activities — dexterity, mobility, communication."}, {"type": "point", "bold": "Advantage", "text": "More objective than occupational definitions; can be linked to occupational class. Applicable to non-earners as well as employed lives."}, {"type": "h4", "text": "Functional Assessment Tests (FATs)"}, {"type": "point", "bold": "Definition", "text": "Structured physical tests of capability; incapacity triggered by failing a specified number of tests (e.g. 3 out of 7)."}, {"type": "point", "bold": "Typical Tests Include", "text": "Getting up from a chair unaided, standing for 10 minutes, walking 200m on flat ground, lifting a 2kg weight from counter height, walking up/down 12 stairs, bending/kneeling to floor, using hands (turning tap/knob with one hand)."}, {"type": "point", "bold": "Mental Incapacity", "text": "Overriding test of mental incapacity usually applied alongside the physical FAT."}, {"type": "point", "bold": "Advantages over Occupational", "text": "Applicable to unemployed and any age; easily understood by policyholders; precisely defined; easier to apply in practice; no occupation-specific expertise needed."}, {"type": "h4", "text": "Personal Capability Assessments (PCAs)"}, {"type": "point", "bold": "Definition", "text": "Hybrid test — pays if policyholder cannot perform a specified number of defined personal capabilities OR suffers one of a list of serious illnesses."}, {"type": "point", "bold": "Personal Capabilities (example — 9 tests)", "text": "Rising from chair, standing, walking, stairs, bending, lifting & carrying, transport (in/out of car), manual dexterity (keyboard/pen), fits & blackouts (driving licence retention)."}, {"type": "point", "bold": "Serious Illness Triggers (example)", "text": "Blindness (total permanent irreversible loss of sight in both eyes), Terminal illness (life expectancy ≤ 12 months per consultant), Complete dependency (24-hour medical supervision in hospital/nursing home)."}, {"type": "point", "bold": "Trigger", "text": "Must fail 3+ personal capabilities OR meet a serious illness criterion."}, {"type": "h4", "text": "Choosing the Right Definition — Key Considerations"}, {"type": "point", "bold": "Who is the insured?", "text": "Employed → occupational preferred. Non-earner/retired → ADL/FAT/PCA needed."}, {"type": "point", "bold": "Product type", "text": "IP → typically occupational (own/any). TPD within CI → often ADL or any occupation. LTCI → ADL standard."}, {"type": "point", "bold": "Cost vs generosity", "text": "Own occ most expensive; any occ cheapest; ADL/FAT intermediate depending on design."}, {"type": "point", "bold": "Dispute risk", "text": "Suited occupation and own occupation definitions carry higher dispute risk at claims stage."}, {"type": "point", "bold": "Flexibility principle", "text": "Offering all definitions extends range of insurable lives; prefer flexibility in underwriting philosophy."}]}, "Overseas & Expatriate Business": {"_meta": {"acc_stage": null, "pc_stage": null, "pillar": "P3", "icon": "🌍", "auto_generated": true, "source_sittings": ["IAI_0523"]}, "content": [{"type": "h3", "text": "Overseas & Expatriate Business"}, {"type": "h4", "text": "Overseas PMI — Key Risks"}, {"type": "text", "text": "⬡ - Data risk: no own-experience data in a new territory; must rely on external data (national statistics, local regulator, hospital data, reinsurers) that may lack relevance or credibility. [src:IAI_0523]"}, {"type": "text", "text": "⬡ - Exchange rate risk: premiums and claims may be in different currencies; adverse exchange rate movements can create significant loss if not hedged. [src:IAI_0523]"}, {"type": "text", "text": "⬡ - Investment risk: assets may need to be held in unfamiliar markets with higher liquidity and regulatory risk. [src:IAI_0523]"}, {"type": "text", "text": "⬡ - Accumulation/epidemic risk: expatriate communities are geographically concentrated and socially close-knit, increasing pandemic/epidemic exposure. [src:IAI_0523]"}, {"type": "text", "text": "⬡ - Operational, tax, and regulatory risk: managing claims remotely, navigating unfamiliar legal frameworks, and exposure to sudden changes in tax law or regulation. [src:IAI_0523]"}, {"type": "text", "text": "⬡ - Lapse risk: sudden withdrawal if exchange rate movements make premiums unaffordable for local employees covered under the scheme. [src:IAI_0523]"}, {"type": "h4", "text": "Overseas PMI — Risk Mitigants & Data Sources"}, {"type": "text", "text": "⬡ - Data sources: national health statistics, local regulator publications, hospital expense data, competitor pricing data, reinsurer multi-national databases, and own domestic morbidity data (adjusted for local conditions). [src:IAI_0523]"}, {"type": "text", "text": "⬡ - Risk mitigants: compulsory scheme membership (reduces anti-selection); reinsurance/coinsurance (risk transfer and technical assistance); strong pre-existing condition exclusions; full individual underwriting for high-risk member classes; clear terms and conditions; strong claims controls. [src:IAI_0523]"}, {"type": "text", "text": "⬡ - Solvency impact of market entry: short-term deterioration from start-up costs, new business strain and capital requirements; long-term improvement if business is profitable. Capital raising or quota-share reinsurance can manage the transition. [src:IAI_0523]"}, {"type": "h4", "text": "Market Entry Research Framework"}, {"type": "text", "text": "⬡ - Before entering a new territory for group IP: research (a) the employment landscape (industry composition, employer sizes, role of state as employer, labour market dynamics), (b) population demographics, and (c) health indicators / burden of disease in that territory. [src:IFoA_0425]"}, {"type": "text", "text": "⬡ - Research the target IP market: market size and growth, product features typical in the market (deferred periods, waiting periods, disability definitions such as own occupation vs any occupation), consumer preferences, state provision of equivalent benefits, and the competitor landscape. [src:IFoA_0425]"}, {"type": "text", "text": "⬡ - Assess the regulatory environment: licensing requirements, capital and solvency requirements, reserving standards, investment constraints (availability of appropriate assets), tax landscape, profit repatriation rules, and distribution/commission restrictions. [src:IFoA_0425]"}, {"type": "text", "text": "⬡ - Understand the distribution landscape in the target territory: whether independent brokers or tied agents predominate — tied agents require greater ongoing investment and servicing capability and may limit distribution flexibility. [src:IFoA_0425]"}, {"type": "text", "text": "⬡ - Investigate: (a) availability of reinsurance for the target product in the new territory, (b) availability of skilled actuarial and insurance professionals locally, (c) operational norms for premium collection (e.g. payroll deduction by employers). [src:IFoA_0425]"}, {"type": "text", "text": "⬡ - Carry out a comparative analysis of the home vs target territory to assess the extent to which existing pricing data, underwriting experience, systems, and processes can be transferred or adapted — reducing development cost and risk. [src:IFoA_0425]"}, {"type": "text", "text": "⬡ - Assess macroeconomic conditions in the target country (GDP growth, inflation, unemployment trends) as these directly influence IP claim rates and the addressable market size. [src:IFoA_0425]"}, {"type": "h4", "text": "Acquisition vs Portfolio Purchase"}, {"type": "text", "text": "⬡ - Acquiring the whole target company provides: existing staff, systems and operations, insurance licence, regulatory approvals, distributor relationships, and established brand — but also acquires unwanted lines of business with potentially onerous capital, regulatory, and distribution requirements. [src:IFoA_0425]"}, {"type": "text", "text": "⬡ - Purchasing only the target IP book p
