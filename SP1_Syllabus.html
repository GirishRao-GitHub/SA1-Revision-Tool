, "text": "Setting free cover limits (IP/CI only, not PMI)"}, {"type": "point", "text": "Ensuring 'actively at work' qualification"}, {"type": "point", "text": "Setting take-up rates on voluntary schemes"}, {"type": "point", "text": "Laying down take-over terms from previous insurer"}, {"type": "point", "bold": "Lower Anti-Selection Schemes", "text": "Minimum member numbers, compulsory membership, benefit formula linked to salary. Result: more generous free cover limits, smaller premium loadings."}, {"type": "point", "bold": "Extent Varies", "text": "Anti-selection typically lower for groups than individuals; depends on acceptance rules and flexible benefit structure."}, {"type": "text", "text": "⬡ - For aggregate-trigger products, employers have strong incentive to select adversely (buying only when they expect a payout). Controls include: requiring employee name lists (not just counts), restricting eligible industries/geographies, ongoing monitoring with right to revise trigger percentages, and using reinsurance if available. [src:IAI_0523]"}, {"type": "h4", "text": "Free Cover (Non-Selection Limits)"}, {"type": "point", "bold": "Definition", "text": "Amount of cover automatically granted without underwriting to group members. Only those exceeding limit need medical underwriting."}, {"type": "point", "bold": "Applicability", "text": "Group IP and CI only (not PMI, as indemnity-based benefit amount unknown until claim)."}, {"type": "point", "bold": "Purpose", "text": "Reduce UW cost; avoid inconvenience of mass medical screening."}, {"type": "point", "bold": "Eligibility", "text": "Typically for large groups (sufficient risk units that no individual is significant); compulsory membership usual requirement."}, {"type": "point", "bold": "Formula Design", "text": "Aimed to enable most lives in most schemes to be accepted without UW, provided compulsory membership. Higher-paid employees likely exceed limit (need individual UW)."}, {"type": "point", "bold": "Credibility & Scheme Size", "text": "Lower free cover levels on smaller schemes (avoid single member carrying large proportion of total risk); larger schemes support higher limits."}, {"type": "point", "bold": "Actively at Work Requirement", "text": "Vital to success of non-underwritten cover. Employer recruitment process achieves health screening rather than explicit insurer UW."}, {"type": "point", "text": "Example: Employee must have worked continuously preceding 2 months at cover start."}, {"type": "point", "bold": "Admission After Absence", "text": "Special rules for members failing 'actively at work' qualification (off sick); can return to scheme once requirements re-met."}, {"type": "h4", "text": "Group IP Insurance Specifics (Chapter 5)"}, {"type": "point", "bold": "Benefit Level", "text": "Gross salary basis (simpler admin) or net pay basis (up to 90% net pre-disability income)."}, {"type": "point", "bold": "Additional Benefits", "text": "Employee/employer pension contributions, State welfare contributions."}, {"type": "point", "bold": "Benefit Escalation", "text": "While in claim, benefits escalate to maintain claimant's standard of living."}, {"type": "point", "bold": "Continuation Option", "text": "Employees leaving employment can convert to individual cover without health evidence; limited to group benefit levels. Anti-selection risk high."}, {"type": "point", "bold": "Statutory Sick Pay", "text": "Employers insure liability to pay statutory sick pay (e.g., UK: 4 days–28 weeks). Common 28-week DP matches statutory period."}, {"type": "point", "bold": "Discretionary Sick Pay", "text": "Group IP can cover sick pay after statutory period; employer discretionary top-up."}, {"type": "h4", "text": "Group CI Insurance Specifics"}, {"type": "point", "bold": "Free Cover Limit", "text": "Appropriate (members have varying sum insured, usually salary multiple; some over limit need UW)."}, {"type": "point", "bold": "Benefit Levels", "text": "Usually salary-based multiples (e.g., 2-5x salary)."}, {"type": "point", "bold": "Active at Work", "text": "Compulsory for free cover schemes."}, {"type": "h4", "text": "Group PMI Specifics"}, {"type": "point", "bold": "Free Cover", "text": "NOT applicable (indemnity-based; actual benefit unknown until claim). Concept of FCL does not work."}, {"type": "point", "bold": "Alternative Tiering", "text": "Budget vs comprehensive cover; comprehensive underwritten, budget not. Not called 'free cover' in practice."}, {"type": "point", "bold": "Rate-at-Risk vs Pooled Renewal", "text": "Renewal terms can be rate-at-risk (each group renewed at own experience) or pooled (experience spreads across groups)."}, {"type": "point", "bold": "Large Group Advantages", "text": "Groups 1000+ offer scale benefits; better pricing, more flexibility."}, {"type": "h4", "text": "Pricing Methodology (Group Products)"}, {"type": "point", "bold": "Experience Rating", "text": "Based on group's past claims experience; more credible with size."}, {"type": "point", "bold": "Community Rating", "text": "Groups without sufficient experience use community (territory/occupation) rates."}, {"type": "point", "bold": "Rate Guarantees", "text": "1 or 3-year guarantees typical; premium fixed during guarantee period."}, {"type": "point", "bold": "Portfolio-Level Pricing", "text": "IRDAI 2024: renewal loadings applied at portfolio level, not individual policy level."}, {"type": "h4", "text": "Distribution & Administration"}, {"type": "point", "bold": "Employer Role", "text": "Sponsor; may facilitate payroll deduction; communicates to employees."}, {"type": "point", "bold": "Individual Underwriting", "text": "Varies by scheme structure; free cover reduces UW burden."}, {"type": "point", "bold": "Claims Handling", "text": "Can support return-to-work initiatives; employer partnership on rehabilitation."}, {"type": "h4", "text": "Aggregate / Index-Trigger Group Products"}, {"type": "text", "text": "⬡ - An aggregate-trigger (index-trigger) group IP product pays the employer a lump sum when the overall morbidity of the covered pool exceeds a defined threshold (e.g. total sick days across all registered employees). [src:IAI_0523]"}, {"type": "text", "text": "⬡ - Employer benefits: fast and simple to buy (no named employee list), no individual underwriting, scalable (adjustable headcount), and potential windfall payment in bad years. Risks: short-term contract (not guaranteed renewal), payout not linked to actual sick-pay cost, and exposure to pooled experience of other employers. [src:IAI_0523]"}, {"type": "text", "text": "⬡ - Insurer risks: legal uncertainty around novel design, difficulty defining the trigger percentage appropriately, moral hazard (employers manipulating sickness figures), anti-selection (employers buying only when expecting a claim), adverse mix by industry/occupation, and potential inability to obtain reinsurance. [src:IAI_0523]"}, {"type": "text", "text": "⬡ - Insurer controls: require named employee lists (not just counts), define trigger and claim terms robustly, restrict eligible industry sectors/geographies, carry out ongoing verification, monitor experience closely, and review trigger percentage at renewal. [src:IAI_0523]"}, {"type": "text", "text": "⬡ - When expanding from group IP into additional health lines within the same market: group CI and hospital cash plans are relatively easier to launch (simpler products, lower data requirements, similar distribution); PMI is more complex, requiring hospital/provider networks, managed care infrastructure, and cashless processing capability. [src:IFoA_0425]"}, {"type": "h4", "text": "Self-Insured / In-House Employer Schemes"}, {"type": "text", "text": "⬡ - Employers may close in-house (self-insured) medical schemes due to: claims costs higher than budgeted (driven by moral hazard or medical inflation), higher-than-expected administration costs, inability to source or renew reinsurance, or a strategic decision to exit insurance risk entirely. [src:IFoA_0425]"}, {"type": "text", "text": "⬡ - Additional triggers for closing an in-house scheme: increased regulatory compliance burden, adverse change in tax treatment, desire to offer employees greater plan choice, difficulty managing claim declines for own employees (industrial relations sensitivity), or shareholder pressure to reduce non-core costs. [src:IFoA_0425]"}, {"type": "text", "text": "⬡ - A subsidised or fully-funded employer scheme whose cost is not visible to employees may be under-valued by staff, reducing the perceived benefit and motivating the employer to restructure delivery via an insurer. [src:IFoA_0425]"}, {"type": "h4", "text": "Scheme Transitions & Stakeholder Management"}, {"type": "text", "text": "⬡ - Key stakeholders in an employer scheme-to-insurer transition: employees and family members, the incoming insurer (and its reinsurer), the medical schemes regulator, care partners (hospitals, managed care providers, emergency services), actuarial consultants and scheme auditors, the employer's HR department, and staff employed in running the current scheme. [src:IFoA_0425]"}, {"type": "text", "text": "⬡ - Employees may perceive a transition from an employer scheme to insurer as a loss of a previously 'free' benefit; salary restructuring may be required to maintain take-home pay and avoid staff relations issues. [src:IFoA_0425]"}, {"type": "text", "text": "⬡ - Staff with larger families, pre-existing conditions, or chronic illness face the greatest risk from transition: moratorium underwriting now applies, cross-subsidies from the closed employer scheme disappear, and insurer premiums may be higher due to open-market anti-selection exposure. [src:IFoA_0425]"}, {"type": "text", "text": "⬡ - Staff may lose influence over benefit design and pricing under an insurer scheme. Conversely, they gain: a wider plan choice, potential for added benefits (dental, optical), insurer economies of scale, and removal of restrictions on when family members can join. [src:IFoA_0425]"}, {"type": "text", "text": "⬡ - Employer mitigation actions at transition: (a) grandfather existing members on the old scheme while new staff join the insurer plan, (b) increase salaries to offset new medical costs, (c) offer a subsidy for the insured plan, (d) make benefits visible via payroll without reducing net pay, (e) negotiate a plan that matches existing benefits as closely as possible, (f) negotiate bulk acceptance without underwriting for the initial transition cohort. [src:IFoA_0425]"}, {"type": "h4", "text": "Managing Group PMI Costs"}, {"type": "text", "text": "⬡ - When an employer seeks to reduce group PMI costs, the approach depends on whether premiums are effectively employee-funded (cost-to-company basis) or employer-funded; in either case, the employer must balance cost reduction against impact on staff retention and industrial relations. [src:IFoA_0425]"}, {"type": "text", "text": "⬡ - Options for reducing group PMI costs: (a) remove PMI for new entrants only, (b) reduce benefits or increase deductibles, (c) introduce more plan tiers giving employees flexibility to self-select lower cover, (d) renegotiate the contract with the existing insurer, (e) rebroke the arrangement to another insurer (often with specialist benefits consultants), (f) increase employee contributions via payroll deduction. [src:IFoA_0425]"}, {"type": "text", "text": "⬡ - Stopping PMI benefits entirely risks significant staff turnover — particularly the loss of high earners who can obtain PMI cover via a new employer. Offering salary increases in lieu of PMI may not be cost-effective if group purchasing provides material economies of scale. [src:IFoA_0425]"}, {"type": "text", "text": "⬡ - Tax considerations must be assessed when restructuring group PMI: shifting from employer-funded PMI benefits to salary augmentation may create adverse tax consequences for employees in some jurisdictions. [src:IFoA_0425]"}]}, "Investments": {"_meta": {"acc_stage": "S3", "pc_stage": "S8", "syllabus_category": 4, "risk_categories": ["market"], "stakeholders": ["Insurer", "Appointed Actuary", "Shareholders", "Regulators (IRDAI)"], "icon": "💹", "pillar": "P5"}, "content": [{"type": "h3", "text": "Investment & ALM Framework (SP1 Chapter 28)"}, {"type": "h4", "text": "Overview & Importance"}, {"type": "point", "text": "Investment strategy affects commercial success, financial results and security of the insurer."}, {"type": "point", "text": "Most health products are protection products with low reserves — investment returns far less important for these."}, {"type": "point", "bold": "Exception", "text": "Pre-funded LTCI has high reserves — investment returns of considerable importance."}, {"type": "point", "text": "Higher returns benefit shareholders (higher profits) and/or policyholders (lower premiums). Unit-linked policyholders also benefit from good asset performance in the unit fund."}, {"type": "point", "bold": "Core tension", "text": "High return assets are more volatile. Insurer must balance return vs security given the nature of its liabilities."}, {"type": "h4", "text": "Asset Characteristics (Major Types)"}, {"type": "point", "bold": "Conventional Government Bonds", "text": "Nominal return guaranteed if held to redemption. Most secure asset type (after cash). Most marketable; very low dealing costs. Market value fluctuates but redemption value unaffected."}, {"type": "point", "bold": "Index-Linked Government Bonds", "text": "Coupon linked to a price index. Smaller issuance than conventional bonds — slightly less marketable. Best match for index-linked liabilities."}, {"type": "point", "bold": "Corporate Bonds", "text": "Higher expected return than government bonds of equal term (reflects default risk and lower marketability). Security can be a problem for low credit-rated issuers. Marketability often poor; dealing costs high."}, {"type": "point", "bold": "Equities", "text": "Dividend income and capital value both expected to grow in real terms. Income yields low (due to growth expectation). Highly volatile — problem if dividends used to meet liability outgo or market value used for solvency demonstration. Highly marketable in many markets; overseas equities an option where local market is small."}, {"type": "point", "bold": "Property", "text": "High expected return; low income yield but grows in real terms. Secure but rental income can be interrupted; market value varies significantly. Very illiquid; high dealing and maintenance costs. Long-term investment; not practical to buy and sell quickly. Valuation difficult — each property is unique."}, {"type": "point", "bold": "Cash", "text": "Most secure; least variable. Highly liquid; negligible dealing costs. Lowest expected return."}, {"type": "h4", "text": "Principles of Investment"}, {"type": "point", "bold": "Principle 1", "text": "Select investments appropriate to the nature, term and currency of the liabilities."}, {"type": "point", "bold": "Principle 2", "text": "Maximise overall return on assets (income + capital gains)."}, {"type": "point", "bold": "Principle 3", "text": "Extent of departing from Principle 1 to achieve Principle 2 depends on the company's free assets and risk appetite."}, {"type": "point", "bold": "Summary", "text": "Maximise return subject to an acceptable level of risk, given financial resources available."}, {"type": "h4", "text": "Asset-Liability Matching — Nature of Liabilities"}, {"type": "point", "bold": "Four liability types", "text": "each requires a different matching strategy:"}, {"type": "point", "text": "*Guaranteed in monetary terms* (e.g. fixed CI lump sum): Match with government bonds (immunisation); zero-coupon bonds if available. Problem: liability outgo rarely known with certainty; asset terms often shorter than liabilities."}, {"type": "point", "text": "*Guaranteed in terms of an index* (e.g. IP benefit linked to earnings/prices): Ideal match is index-linked bonds on the same index. Alternative: real assets (equities/property) as substitute — not a perfect match due to volatility."}, {"type": "point", "text": "*Indemnity* (e.g. PMI): Short-tail business; low reserves; cash and short-term fixed interest bonds appropriate. Longer-tail provisions (known future treatment costs) matched by real assets expected to give real return."}, {"type": "point", "text": "*Investment-linked* (e.g. unit-linked LTCI): Invest in the same assets underlying the investment link. Normal practice; deliberate mismatch is possible but loss falls on insurer not policyholders."}, {"type": "point", "bold": "Expenses", "text": "Treated as index-linked (move broadly with price/earnings inflation)."}, {"type": "point", "bold": "Premiums", "text": "Treated as negative benefit payments — fixed monetary or index-linked."}, {"type": "point", "bold": "Perfect matching", "text": "Theoretical concept; usually neither achievable nor desirable (eliminates investment profit). Desirable only if free assets are very low and insolvency risk is unacceptably high."}, {"type": "text", "text": "⬡ - For IP liabilities, benefit payments may increase with salary inflation; for CI/death benefits, liabilities are fixed in money terms. The asset strategy should reflect this distinction — index-linked assets for escalating benefits, fixed-income for guaranteed amounts. [src:IAI_0523]"}, {"type": "h4", "text": "ALM — Term and Currency"}, {"type": "point", "bold": "Term", "text": "Match asset proceeds to timing of liability outgo — assets available at the right times."}, {"type": "point", "bold": "Currency", "text": "Liabilities in a given currency should be matched by assets in the same currency. Currency options or hedging can manage any mismatch from overseas asset investment."}, {"type": "h4", "text": "Free Assets and Investment Freedom"}, {"type": "point", "text": "Free assets act as a cushion — allow insurer to depart from a matched position and invest in higher-returning (riskier) assets."}, {"type": "point", "text": "Greater free assets → greater freedom in asset selection → more variability of return can be accepted."}, {"type": "point", "text": "Free assets themselves back capital obligations — typically invested in higher-yielding assets."}, {"type": "point", "text": "Mismatch of investment-linked liabilities is possible using free assets but risky: if chosen assets underperform the linked assets, the loss falls on the insurer not policyholders."}, {"type": "text", "text": "⬡ - When the solvency ratio is marginally above the regulatory minimum, cash and short-dated gilts are preferred to reduce market risk. When the surplus is substantial, more return-seeking assets (equities) may be appropriate for the excess over the regulatory minimum. [src:IAI_0722]"}, {"type": "text", "text": "⬡ - For ULIP-linked business, the RSM moves with the market value of unit fund assets. The shareholder fund backing the ASM should hold matching equity assets so that RSM and ASM move together, preserving the solvency ratio through market cycles. [src:IAI_0722]"}, {"type": "h4", "text": "Regulatory Constraints on Investment"}, {"type": "point", "text": "Restrictions on types of assets (e.g. equities, property, derivatives may be limited or forbidden)."}, {"type": "point", "text": "Restrictions on amounts of asset types counting toward demonstrating solvency (e.g. equities capped at 25% of assets)."}, {"type": "point", "text": "Restrictions on maximum exposure to a single counterparty or country."}, {"type": "point", "text": "Requirement to hold a proportion of assets in a specific class (e.g. government stock)."}, {"type": "point", "text": "Requirement to match assets and liabilities by currency."}, {"type": "point", "text": "Requirement to hold a mismatching reserve (higher mismatch → higher reserve → lower free assets)."}, {"type": "point", "text": "Limits on extent of mismatching allowed."}, {"type": "point", "text": "Restrictions on valuation method used (e.g. book value vs market value)."}, {"type": "point", "text": "Custodianship restrictions on who may hold assets."}, {"type": "h4", "text": "Inflation and Investment Strategy"}, {"type": "text", "text": "⬡ - In a high-inflation environment, market reaction may reduce the attractiveness of existing asset classes and compress real yields; inflation-linked bonds may become expensive or illiquid as demand rises. [src:IFoA_0924]"}, {"type": "text", "text": "⬡ - Inflation swaps can be used to limit extreme inflation exposure risk, but their cost increases in a high-inflation environment — the cost-benefit of hedging must be carefully assessed against the cost of holding matching assets. [src:IFoA_0924]"}, {"type": "text", "text": "⬡ - IP liabilities with unknown benefit amounts and unknown timing and duration are harder to match with assets in a high-inflation environment than fixed CI lump sums — this is a reason to prefer writing more CI or short-term products during prolonged inflationary periods. [src:IFoA_0924]"}, {"type": "h4", "text": "Developing Investment Strategy — Model Office Approach"}, {"type": "point", "bold": "Six-step process", "text": ""}, {"type": "text", "text": "1. Allocate a portion of free assets to support the assets underlying the reserves."}, {"type": "text", "text": "2. Project assets and liabilities forward using ALM model (stochastic investment model for asset paths; inflation model for liabilities). Ensure consistency between inflation, interest rates and market values."}, {"type": "text", "text": "3. Check excess of assets over liabilities exceeds solvency capital requirement throughout projection period for most scenarios (e.g. 99% of model runs)."}, {"type": "text", "text": "4. Calculate aggregate profitability measure (e.g. shareholder distributions for a proprietary company)."}, {"type": "text", "text": "5. Repeat for different investment strategies until target insolvency probability is achieved."}, {"type": "text", "text": "6. Identify strategy with equal insolvency risk that produces the highest profitability."}, {"type": "point", "bold": "Weaknesses", "text": "Model risk (conclusions only as valid as the model/parameterisation); using only a portion of free assets may be limiting; solvency capital requirement may not be constant and should ideally be modelled dynamically."}, {"type": "point", "bold": "Dynamic solvency testing", "text": "Take current strategy + actual free assets → estimate probability of insolvency."}, {"type": "h4", "text": "Other Practical Considerations"}, {"type": "point", "bold": "Liquidity", "text": "If claims fluctuate widely or insurer is in run-off, maintain ready liquid funds. Reinsurance can reduce liquidity requirement but gross claims may need to be paid before reinsurance recoveries — creates tension with matching strategy."}, {"type": "point", "bold": "Fund Manager Assessment", "text": "Assess against (a) targets for overall return, (b) riskiness of strategy undertaken, (c) performance of peers with similar briefs. Assess over several periods to eliminate luck. External managers require even more careful monitoring."}, {"type": "point", "bold": "Effect on Pricing", "text": "Higher investment return → lower premiums or additional product features at the same price. More significant for longer-term contracts."}, {"type": "point", "bold": "Asset Valuation", "text": "Two approaches — (1) Discounted cashflow (consistent with liability valuation basis); (2) Market value (objective; now the norm in many territories). PMI (short-term liabilities): cash valued at market price. Long-term liabilities: either method applicable depending on purpose and prudence required."}, {"type": "point", "bold": "Treating Customers Fairly (TCF)", "text": "Policyholders of reviewable fixed-benefit products (e.g. reviewable CI) do not expect premium increases driven by insurer's investment underperformance — raises TCF concerns. Exception: unit-linked products where benefit/premium explicitly depends on investment performance."}, {"type": "h4", "text": "Liquidity Considerations"}, {"type": "text", "text": "⬡ - A rapidly growing insurer can use incoming premiums to meet claims in the short term (natural liquidity), but must hold liquid reserves for future strain as the book matures. [src:IAI_0523]"}, {"type": "text", "text": "⬡ - Liquidity needs increase with claim volatility. Where OP claims are high-frequency/unpredictable, a larger liquid buffer (short-dated gilts or cash) is required than for low-frequency IP/CI claims. [src:IAI_0523]"}, {"type": "text", "text": "⬡ - Capital requirements (ASM backing) should be held in low-risk liquid assets to minimise exposure to market risk on the regulatory minimum. Excess free surplus may be invested more aggressively. [src:IAI_0523,IAI_0722]"}, {"type": "text", "text": "⬡ - Rising gilt prices (a flight-to-safety during recession) reduce gilt yields, which in turn reduces discount rates and increases the value of long-duration liabilities — individual CI policy liabilities are more sensitive to this than short-term group CI liabilities. If the insurer mismatches assets and liabilities it may be partially insulated, but at the cost of greater basis risk. [src:IFoA_0422]"}, {"type": "text", "text": "⬡ - When large-scale policy lapses reduce premium income, the investment policy must adapt: short-term liquidity becomes critical (forced asset sales at recession prices may be unavoidable); liability duration shortens as longer-duration policies are disproportionately retained; matching assets should be reviewed to reflect the changed liability profile; and appetite for risk should be reassessed given reduced free assets and market volatility. [src:IFoA_0422]"}]}, "Professional Guidance": {"_meta": {"acc_stage": "S5", "pc_stage": null, "syllabus_category": 2, "risk_categories": ["regulatory", "reputational"], "stakeholders": ["Appointed Actuary", "Insurer", "Regulators (IRDAI)"], "icon": "🎓", "pillar": "P6"}, "content": [{"type": "h3", "text": "Professional Actuarial Duties"}, {"type": "point", "bold": "Standards", "text": "Following APS/TAS (e.g. TAS 100), ensuring advice is clear, comprehensive, and unbiased."}, {"type": "point", "bold": "Role", "text": "Statutory duties (Chief Actuary / With-Profits Actuary), Peer review requirements."}, {"type": "point", "bold": "Ethics", "text": "Whistleblowing, managing conflicts of interest, handling data quality issues responsibly."}, {"type": "h4", "text": "Independent Expert in Portfolio Transfer"}, {"type": "text", "text": "⬡ - An independent expert (IE) is required by regulators in many jurisdictions when insurance liabilities are transferred between companies. The IE's role is to provide an independent opinion on whether the interests and reasonable benefit expectations of all affected policyholders are adequately protected by the proposed transfer. [src:IFoA_0922]"}, {"type": "text", "text": "⬡ - The IE must be approved by the relevant regulator and owes their primary duty to the court or regulatory body approving the transfer — not to either of the insurers involved. The IE will consult actuaries at both the transferring and receiving insurers and engage with both home and host country regulators where a cross-border transfer is involved. [src:IFoA_0922]"}, {"type": "text", "text": "⬡ - The IE's report considers the likely impact of the transfer on: (a) transferring policyholders (benefit security, continuity, terms of cover); (b) remaining policyholders in the transferring insurer if only part of the portfolio is moved; (c) existing policyholders of the receiving insurer (dilution of security, management capacity). [src:IFoA_0922]"}, {"type": "text", "text": "⬡ - Key IE concerns: security of policyholder benefits and benefit expectations; solvency and capital adequacy of the receiving entity post-transfer; whether the regulatory framework of the receiving jurisdiction is at least as protective as the current one; and broader TCF considerations including servicing standards and claims handling. [src:IFoA_0922]"}]}, "Capital & Solvency": {"_meta": {"acc_stage": "S3", "pc_stage": "S8", "syllabus_category": 4, "risk_categories": ["regulatory"], "stakeholders": ["Insurer", "Appointed Actuary", "Regulators (IRDAI)", "Shareholders"], "icon": "💎", "pillar": "P4"}, "content": [{"type": "h3", "text": "Capital Assessment"}, {"type": "h4", "text": "Role of Capital & Solvency II"}, {"type": "point", "bold": "Role of Capital", "text": "Provide confidence to policyholders and regulators, buffer against shocks."}, {"type": "point", "bold": "Solvency II", "text": "Pillar 1 (Quantitative: BEL, Risk Margin, SCR), Pillar 2 (Qualitative: ORSA, Governance), Pillar 3 (Disclosure)."}, {"type": "h4", "text": "Capital Management & Solvency Ratio"}, {"type": "point", "bold": "Management", "text": "Optimizing capital via Reinsurance or ALM, Return on Capital (ROC) thresholds."}, {"type": "text", "text": "⬡ - Impact on solvency of new market entry: short-term deterioration from start-up costs, new business strain, and capital requirements; long-term improvement if business is profitable."}, {"type": "text", "text": "⬡ - Solvency Ratio = ASM / RSM. A small change in SR ≈ ΔASM/RSM − SR × ΔRSM/RSM. This formula shows SR is more sensitive to changes in RSM than ASM when SR > 1."}]}, "Private Medical Insurance (PMI)": {"_meta": {"acc_stage": "S2", "pc_stage": "S1", "syllabus_category": 1, "risk_categories": ["insurance", "operational", "reputational"], "stakeholders": ["Policyholders", "Insurer", "Healthcare Providers", "TPAs", "Regulators (IRDAI)"], "icon": "🏥", "pillar": "P1"}, "content": [{"type": "h3", "text": "Private Medical Insurance (PMI) Framework (SP1 Chapter 4)"}, {"type": "h4", "text": "Definition & Nature"}, {"type": "point", "bold": "Core Purpose", "text": "Indemnity-based product reimbursing cost of private medical treatment. Short-term, annual renewable."}, {"type": "point", "bold": "Alternative Basis", "text": "Fixed benefit/cash plan (insurer knows max exposure; policyholder bears cost variation)."}, {"type": "point", "bold": "Related Products", "text": "Health cash plans, dental/optical plans, major medical expenses, waiting-list plans."}, {"type": "h4", "text": "Product Scope & Coverage"}, {"type": "point", "bold": "Coverage Areas", "text": "(must be explicitly defined): Inpatient (IP), Outpatient (OP), Day care, Domiciliary, AYUSH (all systems equal per IRDAI 2024)."}, {"type": "point", "bold": "Operational Complexity", "text": "OP cover has much higher frequency/lower severity than IP. Major operational readiness required before OP launch (high-volume, low-value processing)."}, {"type": "point", "bold": "Indemnity vs Benefit Basis", "text": "Life insurers in India restricted to benefit basis only; general/health insurers offer both."}, {"type": "h4", "text": "Key Product Features"}, {"type": "point", "bold": "No Claim Discount (NCD)", "text": "Offered as cumulative bonus (increased SI without premium increase) or renewal premium discount. Policyholder chooses at renewal. Self-selection by healthy lives; pricing must account for selection benefit."}, {"type": "point", "bold": "Sum Insured Reinstatement", "text": "Applies to new illnesses only (not pre-existing); annual or per-claim basis. Critical design choice affecting benefit adequacy/claim frequency."}, {"type": "point", "bold": "Sub-Limits by Service", "text": "Room/board limits, surgery limits, ICU limits, consultant limits, organ transplant limits. Room limits incentivize cost-effective hospitals."}, {"type": "point", "bold": "Co-Payments, Deductibles, Co-Insurance", "text": "Cost-sharing (reduce moral hazard; increase policyholder engagement). Must be clearly disclosed in CIS."}, {"type": "point", "bold": "Additional Benefits", "text": "Second opinion, home nursing, day-care procedures, domiciliary care, ambulance, pre-authorisation (mandatory 1-hour TAT under IRDAI 2024)."}, {"type": "point", "bold": "Waiting Periods", "text": "(IRDAI 2024 limits):"}, {"type": "point", "text": "PED waiting period: max 36 months continuous coverage"}, {"type": "point", "text": "Disease-specific waiting period: max 36 months"}, {"type": "point", "text": "General waiting period: typically 30 days (acute conditions)"}, {"type": "point", "text": "No waiting on accident-related claims (cash plans)"}, {"type": "point", "bold": "Mental Illness Parity", "text": "IRDAI 2024 mandated; difficult to diagnose/control; higher fraud risk."}, {"type": "h4", "text": "Underwriting & Anti-Selection"}, {"type": "point", "bold": "Full Medical Underwriting (FMU)", "text": "Reduces adverse selection; high admin cost. Balance evidence cost vs experience benefit."}, {"type": "point", "bold": "Moratorium Approach", "text": "Simpler but risks claim disputes post-60-month moratorium (non-contestable except fraud)."}, {"type": "point", "bold": "Community Rating", "text": "Cross-subsidy across ages; requires open enrolment + risk equalisation to prevent adverse selection spiral."}, {"type": "point", "bold": "Age-Banding", "text": "Intermediate approach; balance community spirit with experience-rated reality."}, {"type": "point", "bold": "Relaxed UW for 50+", "text": "Attracts adverse selection; if first-mover without premium adjustment, competitors cherry-pick healthier lives."}, {"type": "point", "bold": "Front-End UW (India Standard)", "text": "Detailed medical assessment at proposal; clearer policy position; explicit exclusions avoid later disputes."}, {"type": "point", "bold": "Anti-Selection Controls", "text": "Waiting periods, PED exclusions, pre-authorisation (controls moral hazard, ensures care pathway). [src:IFoA_0922]"}, {"type": "h4", "text": "Pricing Framework"}, {"type": "point", "bold": "Medical Inflation", "text": "Key risk (~12-15% p.a. in India historically; varies by treatment type). Super-inflation trend observed. Failure to trend forward leads to rapid deterioration."}, {"type": "point", "bold": "Burning Cost Methodology", "text": "Frequency × Severity; split by IP/OP, age, gender, duration, UW method, channel."}, {"type": "point", "bold": "Claims Deterioration Causes", "text": "Adverse mix, anti-selection, moral hazard, medical inflation, new treatments, poor persistency, aggressive initial pricing."}, {"type": "point", "bold": "A/E Analysis at Renewal", "text": "Decompose frequency/severity/mix vs assumptions; sensitivity test; care to avoid adverse selection spiral."}, {"type": "point", "bold": "NCD Pricing", "text": "Healthy lives selecting NCD are better risks; model take-up, selection benefit, behavioural response."}, {"type": "point", "bold": "Repricing Risks", "text": "Annual repricing essential but risks selective lapsing if competitor pricing lags; competitor response analysis critical."}, {"type": "text", "text": "⬡ - When deciding whether to reprice immediately for an emerging risk (e.g. climate/flood): consider whether claims experience will deteriorate immediately or gradually; weigh profitability risk of not repricing against competitive and lapse risk of repricing ahead of the market; assess solvency position; note that PMI's annual renewability reduces urgency vs long-term products since rates can be adjusted at next renewal. [src:IFoA_0923]"}, {"type": "h4", "text": "Claims Management & Cost Control"}, {"type": "point", "bold": "Pre-Authorisation", "text": "Controls moral hazard; ensures care pathway. Mandatory 1-hour TAT (IRDAI 2024)."}, {"type": "point", "bold": "Provider Networks", "text": "Agreed tariffs; cashless settlement. 100% cashless target (IRDAI 2024)."}, {"type": "point", "bold": "Capitation vs Fee-for-Service vs Bundled", "text": "Capitation (fixed per covered life; provider bears utilisation risk) harder to negotiate except OP/dental. Fee-for-service (insurer bears utilisation risk). Bundled payment (procedure bundles)."}, {"type": "point", "bold": "Cost Containment Levers", "text": "Day clinics, second opinion (reduces unnecessary procedures), benefit limits (room, surgery, chronic), chronic disease management, wellness incentives."}, {"type": "point", "bold": "High Complaint Volume", "text": "Characteristic of PMI; strict requirement (no claim repudiated without PMC approval or 3-member CRC; reason must cite specific policy terms)."}, {"type": "point", "bold": "OP Claims Processing", "text": "Robust high-volume, low-value systems essential. Different underwriting/settlement approach vs IP (lump sum vs multiple small claims)."}, {"type": "h4", "text": "Market Dynamics & Distribution"}, {"type": "point", "bold": "New Entrant Risks", "text": "No UW/claims expertise, competitive pricing pressure, high fixed expenses, pricing uncertainty, adverse selection spiral risk."}, {"type": "point", "bold": "Poor Experience Investigations", "text": "Split by channel, age, gender, UW method, duration. A/E on frequency/severity/persistency; expense analysis; check UW standards; review reinsurer recoveries."}, {"type": "point", "bold": "Actions on Poor Experience", "text": "Revise UW, expense control, redesign benefits, reprice, improve claims control, change target market, run-off or sale."}, {"type": "point", "bold": "Digital Distribution", "text": "Attracts younger, healthier lives; different risk profile than traditional broker/agent channels. [src:IFoA_0922]"}, {"type": "point", "bold": "AI-Based UW", "text": "Regulatory concerns; IRDAI compliance required; transparency/fairness challenges."}, {"type": "point", "bold": "Group PMI", "text": "FCL avoids individual UW; rate-at-risk vs pooled renewal; large groups (1000+) offer scale benefits."}, {"type": "h4", "text": "Adverse Claims Experience — Causes & Remediation"}, {"type": "text", "text": "⬡ - PMI claims can deteriorate due to: business mix shifts (older or higher-risk lives, new distribution channels), lapses by healthier lives, higher-than-expected medical inflation, new/more expensive treatment protocols, large individual claims (cancer, medical evacuation), lax claims management, provider price increases, reduction in state healthcare quality driving demand to private sector, or random fluctuation. [src:IFoA_0422]"}, {"type": "text", "text": "⬡ - Actions to reduce PMI A/E deterioration include: add pricing margins for anti-selection; tighten claims management (GP referral requirements); review benefit utilisation and introduce or increase deductibles/co-payments; tighten underwriting; diversify business mix toward healthier segments; incentivise healthy behaviours; negotiate fixed-fee schedules with providers; introduce managed care for chronic/high-risk patients; review policy wording to limit unexpected claims; and consider reinsurance. [src:IFoA_0422]"}, {"type": "h4", "text": "Capitation vs Fee-for-Service"}, {"type": "text", "text": "⬡ - Under capitation, the insurer pays a fixed annual amount per covered life to a provider network, transferring utilisation risk to the provider — this provides cost certainty for the insurer and predictable income for the provider, but incentivises the provider to reduce care quality to maximise profit and creates counterparty risk if the provider cannot meet demand. [src:IFoA_0422]"}, {"type": "text", "text": "⬡ - Risks of a capitation arrangement for the insurer include: provider reputation damage reflecting on insurer; policyholders losing choice of hospital; poor-quality data from the provider impairing future pricing; regulatory/competition concerns; provider capacity constraints; and the arrangement costing more than fee-for-service if the provider over-estimates the capitation fee. Mitigants: due diligence, regular reviews, carve-outs for high-cost/complex procedures, co-payment options for alternative hospitals, and monthly rather than annual fee payments to reduce counterparty risk. [src:IFoA_0422]"}, {"type": "h4", "text": "Government Subsidy Schemes"}, {"type": "text", "text": "⬡ - A means-tested government subsidy paid directly to healthcare providers for low-income patients can expand healthcare access without requiring those patients to buy insurance — but risks reducing demand for HCP and lower-tier PMI products, causing selective lapses among subsidised segments and adverse volume/expense impacts for insurers targeting that market. [src:IFoA_0423]"}, {"type": "text", "text": "⬡ - Limiting a government healthcare subsidy to inpatient-only treatment allows the government to: target the highest-cost needs, limit fiscal exposure, contract with a manageable number of hospital providers, standardise fees for set procedures, and rely on more readily available cost data — outpatient subsidies are harder to administer, more prone to fraud, and have a much broader and less predictable cost base. [src:IFoA_0423]"}, {"type": "h4", "text": "India-Specific Context (IRDAI 2024)"}, {"type": "point", "bold": "Portability & Crediting", "text": "All credits (SI, NCB, waiting periods, moratorium) transfer to new insurer; 72-hour data transfer via IIB. Acquiring insurer decides within 5 days. Alters experience significantly (waiting periods do not re-apply)."}, {"type": "point", "bold": "SAHIs (Standalone Health Insurers)", "text": "Can offer both indemnity and benefit products (life insurers: benefit basis only)."}, {"type": "point", "bold": "Mental Illness Parity", "text": "Mandated at par with physical illness; difficult to diagnose, fraud risk, higher frequency."}, {"type": "point", "bold": "PMJAY Integration", "text": "Ayushman Bharat covers bottom 40% with basic indemnity. Private PMI fills gap for middle/upper income: higher sum, wider choice, faster settlement."}, {"type": "point", "bold": "ABHA (Electronic Health Records)", "text": "Improves UW and fraud detection; voluntary; uptake low; data privacy risk (DPDP 2023)."}, {"type": "point", "bold": "Medical Inflation & Repricing", "text": "Repricing risks selective lapsing but essential; climate risks affecting healthcare costs."}, {"type": "point", "bold": "Regulatory Costs", "text": "Detailed CIS, 30-day Free Look, mandatory 15-day grievance resolution, Board-governed commission, TCF principles, Ombudsman interface, 1-hr/3-hr TAT, no claim denial without CRC approval."}, {"type": "h4", "text": "Related Products"}, {"type": "point", "bold": "Waiting-List Plans", "text": "Cover only when public healthcare cannot provide treatment within specified period (e.g., 6 weeks). Meets customer need to avoid waiting."}, {"type": "point", "bold": "Health Cash Plans", "text": "Defined-benefit, defined-premium; low premium (~$2/week); specific payouts for dental, optical, physio, maternity, hospitalisation, recuperation, hearing aids, consultation."}, {"type": "point", "bold": "Major Medical Expenses (MME)", "text": "Lump-sum benefit on surgery (fixed schedule by procedure class/severity); less than indemnity premium. UK example: covers in-patient costs + incidentals. Does not cover out-patient."}, {"type": "h4", "text": "Outpatient (OP) Cover — Design & Pricing"}, {"type": "text", "text": "⬡ - OP cover is characterised by high claim frequency and low claim severity, the opposite of IP. This creates different risks: greater scope for fraud/waste/abuse, higher claims administration costs, and more complex seasonality (e.g. dental/optical in Q4, health screens in Q1). [src:IAI_0722]"}, {"type": "text", "text": "⬡ - OP product design principles: start with minimal benefits and significant co-pay/deductible; restrict to GP-referred specialist consultations to control abuse; exclude cosmetic treatments; define OP explicitly to avoid overlap with day-surgery IP claims. [src:IAI_0722]"}, {"type": "text", "text": "⬡ - Consider no-claim bonuses (premium reduction at renewal) as a differentiator and fraud deterrent. Health check-up packages can enhance appeal and reduce long-term morbidity. [src:IAI_0722]"}, {"type": "text", "text": "⬡ - Dental, optical and maternity costs must be priced separately — they have distinct frequency/severity profiles and require sub-limits or separate benefit schedules. [src:IAI_0722]"}, {"type": "text", "text": "⬡ - OP reserving requires care over: seasonality in claim patterns, shorter and different reporting lag (most OP claims have no pre-authorisation), IBNER which differs from IP (initial pre-auth estimates exist for IP but not OP), and system capacity for large claim volumes. [src:IAI_0722]"}, {"type": "text", "text": "⬡ - OP reinsurance: catastrophe XL is less relevant (claims are high-frequency/low-severity). Quota share is more appropriate — it transfers volatility and volume risk and may give underwriting capacity/expertise from the reinsurer. [src:IAI_0722]"}, {"type": "text", "text": "⬡ - Financial advisor distribution introduces churning risk: advisors may move policyholders to competing insurers to earn fresh commission, causing selective lapses and reducing portfolio persistency. Commission clawback terms are the primary mitigant. [src:IFoA_0922]"}, {"type": "text", "text": "⬡ - IFA-distributed business competes on both price and policy terms/conditions — not on price alone. A new entrant could disrupt existing business by offering more comprehensive terms or a broader conditions list, even at a similar premium. [src:IFoA_0922]"}, {"type": "text", "text": "⬡ - If the government introduces free public healthcare provision, the market for short-term products (MME, PMI) may contract sharply; insurers concentrated in these products face mass lapse risk and loss of new business. Mitigation: product diversification and monitoring of policy developments. [src:IFoA_0922]"}, {"type": "point", "bold": "Core Purpose", "text": "Indemnity-based product reimbursing cost of private medical treatment. Short-term, annual renewable. [src:IAI_1124]"}, {"type": "point", "bold": "Alternative Basis", "text": "Fixed benefit/cash plan (insurer knows max exposure; policyholder bears cost variation). [src:IAI_1124]"}, {"type": "point", "bold": "Repricing Risks", "text": "Annual repricing essential but risks selective lapsing if competitor pricing lags; competitor response analysis critical. [src:IAI_1124]"}, {"type": "text", "text": "⬡ - Uncertainty in estimating PMI claims for new territories arises from: lifestyle/morbidity prevalence differences, idiosyncratic demographics (e.g. aging), medical innovation/technology costs, policyholder/provider behavior, claims control/fraud effectiveness, and macro-economic factors like currency fluctuation. [src:IAI_1124]"}]}, "Critical Illness": {"_meta": {"acc_stage": "S2", "pc_stage": "S1", "syllabus_category": 1, "risk_categories": ["insurance"], "stakeholders": ["Policyholders", "Insurer", "Distributors", "Reinsurers"], "icon": "❤️", "pillar": "P1"}, "content": [{"type": "h3", "text": "Critical Illness (CI) Insurance Framework (SP1 Chapter 2)"}, {"type": "h4", "text": "Definition & Nature"}, {"type": "point", "bold": "Product Name Variants", "text": "Dread disease insurance, serious illness insurance, crisis cash, living assurance. All refer to critical illness insurance (CI)."}, {"type": "point", "bold": "Core Benefit Structure", "text": "Lump sum payment typically payable on diagnosis of defined conditions. Payment can be in instalments (reduces fraud risk) or used to purchase impaired-life annuity for regular income. [src:IFoA_0425]"}, {"type": "point", "bold": "Not Indemnity", "text": "Sum insured chosen by policyholder independently—not designed to return policyholder to pre-condition position. Unlike IP (addresses income loss) or PMI (reimburses medical costs)."}, {"type": "point", "bold": "Pure Protection Product", "text": "No guarantee sum insured will be paid (not certain that insured events occur). No surrender value, no maturity benefit. Policy ends on first claim or at term end."}, {"type": "h4", "text": "Product Variations & Structures"}, {"type": "point", "bold": "Standalone CI", "text": "Sum insured paid only on diagnosis of insured condition; no payment on death."}, {"type": "point", "bold": "Accelerated CI (Rider on Term Life)", "text": "Sum insured paid on diagnosis of insured CI or death, whichever occurs first. Death benefit reduced by any CI payment made."}, {"type": "point", "bold": "Benefit Payment Methods", "text": "(1) Lump sum (event-based, independent of severity), (2) Degree of Impairment (e.g., loss of ability to walk unaided), (3) Surgical Procedure (e.g., major organ transplant, heart bypass)."}, {"type": "point", "bold": "Hybrid Products", "text": "Installment option with outstanding amount payable on death; can help claimant manage finances; reduces fraud potential."}, {"type": "h4", "text": "Characteristics of Insurable CI Conditions"}, {"type": "point", "bold": "Three Core Requirements", "text": ""}, {"type": "text", "text": "1. **Perceived Serious & Occurs Frequently**: Public perception drives coverage (sometimes disproportionate to actual incidence). 'Lifestyle-threatening' if not life-threatening. Must not be so rare as to be negligible. [src:IFoA_0425]"}, {"type": "text", "text": "2. **Clearly Defined**: Avoid ambiguity at claim time. Use precise medical terminology (e.g., cancers restricted to malignant tumours invading adjacent tissue; heart attacks require enzyme changes in blood). Prevents windfall payments for minor conditions. [src:IFoA_0425]"}, {"type": "text", "text": "3. **Sufficient Pricing Data**: Must predict future incidence accurately; difficult due to medical advances (vaccines, diet changes, treatments). New conditions take time for sufficient claims data to build up."}, {"type": "point", "bold": "Anti-Selection Risk", "text": "Asymmetry of information (e.g., occupational exposure to cancer not picked up by UW). Mitigated by waiting periods (e.g., 6 months for cancer-related claims)."}, {"type": "h4", "text": "Major CI Conditions (Core List—~90% of Claims)"}, {"type": "point", "bold": "Typically Include", "text": "Cancer, coronary artery bypass surgery, heart attack, kidney failure, major organ transplant, multiple sclerosis, stroke."}, {"type": "point", "bold": "Definition Precision Example (Heart Attack)", "text": "Death of heart muscle due to inadequate blood supply requiring: typical symptoms (chest pain), characteristic EKG changes, specific enzyme/Troponin levels. Excludes other acute coronary syndromes and angina."}, {"type": "h4", "text": "Additional CI Conditions"}, {"type": "point", "bold": "Non-Major Conditions", "text": "(variable by market): Alzheimer's disease, AIDS/HIV (via transfusion or occupation), aorta graft surgery, benign brain tumour, blindness, coma, deafness, heart valve replacement/repair, loss of limbs, loss of speech, motor neurone disease, paralysis/paraplegia, severe burns, severe head injury."}, {"type": "point", "bold": "Core vs Additional Model", "text": "Some markets split conditions into 'Core' and 'Additional'; others use limited Core conditions (cancer, heart attack, stroke) with insurer-added options. Some markets standardise wording across insurers for consistency and faster settlement."}, {"type": "h4", "text": "Risks & Claims Issues"}, {"type": "point", "bold": "Definition Disputes", "text": "Complex medical terminology increases dispute risk. Precise wording essential to avoid litigation."}, {"type": "point", "bold": "Earlier Diagnosis Trend", "text": "Medical advances enable earlier diagnosis (sometimes before severe deterioration). Shifts claim timing; impacts frequency/severity balance."}, {"type": "point", "bold": "Screening Effect", "text": "Screening programmes may prompt claims that might have otherwise lapsed."}, {"type": "point", "bold": "Limited Historical Data", "text": "New markets lack sufficient experience data; proxy from reinsurers or population data (adjusted for insured population selectivity)."}, {"type": "point", "bold": "Moral Hazard", "text": "Reduced compared to IP due to lump-sum nature; monitoring of recoveries still important."}, {"type": "h4", "text": "Rider vs Standalone Capital Considerations"}, {"type": "point", "bold": "Standalone CI", "text": "Separate pricing/reserving; own capital assessment; distinct profitability analysis."}, {"type": "point", "bold": "Accelerated CI", "text": "Rider on life cover; interacts with term life capital requirements; reduced sum at risk if CI paid before death."}, {"type": "h4", "text": "Market Standardisation Benefits"}, {"type": "point", "bold": "Industry-Wide Wording", "text": "Insurers/reinsurers cooperate on condition definitions; reduces ambiguity; faster claims settlement; fewer disputes."}, {"type": "point", "bold": "Easier Comparisons", "text": "Customers understand products; sales staff explain clearly; better industry-wide data collection."}, {"type": "point", "bold": "Lower Risk Loading", "text": "Better information allows lower premiums, increasing market size and profitability."}, {"type": "h4", "text": "Additional Cover Extensions"}, {"type": "text", "text": "**🔹 Terminal Illness**"}, {"type": "point", "bold": "Definition", "text": "Illness expected to result in death within 12 months (in opinion of a hospital consultant). Triggered by severity and effect on life expectancy — NOT by diagnosis of a specified CI condition."}, {"type": "point", "bold": "Purpose", "text": "Fills gaps where a severe illness significantly reduces life expectancy but does not qualify as a listed CI condition; perceived as equitable benefit."}, {"type": "point", "bold": "Accelerated CI Product", "text": "Main effect is to bring forward (accelerate) the death benefit — additional cost is very small (approximately 12 months' investment return on sum insured). Cost tip: benefit often ceases 12–24 months before policy end to avoid additional claims near term end."}, {"type": "point", "bold": "Standalone CI Product", "text": "Terminal illness IS a genuine extra cost — no death benefit exists to accelerate; incidence by cause of terminal illness must be priced and reserved separately."}, {"type": "text", "text": "**🔹 Total and Permanent Disability (TPD)**"}, {"type": "point", "bold": "Definition", "text": "'Permanent' = beyond hope of recovery in policyholder's lifetime. 'Total' = major and substantial part of role or function failed (not every single element). Permanency distinguishes TPD from IP (which also covers temporary disability)."}, {"type": "point", "bold": "Waiting Period", "text": "Often used before claim accepted as permanent; IBNS (incurred but not settled) category maintained while outcome remains unclear. Benefit paid immediately if diagnosis is unequivocal."}, {"type": "point", "bold": "Overlap with CI", "text": "Many CI conditions (paralysis, dementia) can also qualify as TPD claims — significant overlap means TPD can be added to extensive CI products for relatively little additional cost."}, {"type": "point", "bold": "Disability Definitions — Three Types", "text": ""}, {"type": "point", "text": "*Occupation-based*: Inability to perform own occupation / all occupations suited by education, training or experience / any occupation. Caution: lenient interpretation in practice means claims often paid more generously than priced — experience monitoring must feed back into pricing."}, {"type": "point", "text": "*ADL-based*: Inability to perform (unaided) a required number of Activities of Daily Living — feeding, dressing, washing, toileting, mobility, transferring. Can be applied beyond retirement; less subjective than occupation-based. TPD written on this basis throughout life often called 'loss of independent existence'."}, {"type": "point", "text": "*ADW/FAT/PCA-based*: Skills-based definitions (dexterity, mobility, communication); can be more objective, particularly if skills relate to occupational class."}, {"type": "point", "bold": "High-Risk Occupations", "text": "Physically strenuous occupations (e.g. building trade) typically only offered TPD on 'any occupation' definition — cost of more comprehensive cover is high and difficult to quantify."}, {"type": "text", "text": "**🔹 Children's Benefit**"}, {"type": "point", "bold": "Structure", "text": "Cover for each child of the policyholder, typically until age 18. Child claims do NOT terminate the policy — cover continues for subsequent child claims and the policyholder's own claim. Only the policyholder's own claim terminates cover."}, {"type": "point", "bold": "Moral Hazard History", "text": "Early product designs excluded conditions that could be caused intentionally (e.g. third-degree burns, paralysis) due to concern that parents might take less care. These fears proved unfounded."}, {"type": "point", "bold": "Current Exclusions", "text": "Typically only pre-existing congenital defects excluded."}, {"type": "point", "bold": "Cost vs Perceived Value", "text": "Actual cost is minimal — childhood CI incidence is low (e.g. 1 in 10,000 children diagnosed with cancer per year in Britain; most other serious childhood diseases also rare). However, perceived value to parents is very high, making it a strong marketing and sales feature."}, {"type": "h4", "text": "CI Customer Needs & Use of Benefit"}, {"type": "text", "text": "⬡ - The CI lump sum can fund immediate and ongoing medical costs including treatment, surgery, and hospital stays — the primary motivator for many policyholders. [src:IFoA_0425]"}, {"type": "text", "text": "⬡ - Benefit can be used to repay a mortgage or other loan on diagnosis of a critical illness, protecting the policyholder's key financial commitments. [src:IFoA_0425]"}, {"type": "text", "text": "⬡ - Benefit can fund other insurance premiums or continuing retirement savings when the policyholder cannot work — preserving long-term financial planning. [src:IFoA_0425]"}, {"type": "text", "text": "⬡ - Provides financial support when a dependant requires care as a result of the policyholder's illness (e.g. parent unable to care for children). [src:IFoA_0425]"}, {"type": "text", "text": "⬡ - Funds day-to-day living costs (rent, food, utilities) during a period of recovery or reduced income. [src:IFoA_0425]"}, {"type": "text", "text": "⬡ - Funds adaptations to the home environment (e.g. wheelchair access), domestic help, lifestyle changes, and recuperation or rehabilitation treatment. [src:IFoA_0425]"}, {"type": "text", "text": "⬡ - Ensures the policyholder is not reliant on state benefits or family financial support following a critical illness — an important product positioning point alongside IP. [src:IFoA_0425]"}, {"type": "h4", "text": "Consumer Value & Product Governance"}, {"type": "text", "text": "⬡ - A low CI claims payout ratio (e.g. 55–60%) is a key indicator of product inadequacy: it may reflect overly restrictive condition definitions, unreasonably harsh claims management, or widespread policyholder misunderstanding of coverage. Regulators treat persistently low payout ratios as evidence of poor consumer outcomes. [src:IFoA_0425]"}, {"type": "text", "text": "⬡ - Increasing the number of CI conditions does not automatically improve consumer value: if added conditions are rare or have low incidence, the payout ratio barely improves while the product appears more comprehensive — creating perceived but not real value, which regulators may classify as deceptive design. [src:IFoA_0425]"}, {"type": "text", "text": "⬡ - CI conditions should only be included if the policyholder has a realistic chance of contracting them; conditions that are rare, clinically ambiguous, or costly to administer add premium burden without delivering meaningful protection. [src:IFoA_0425]"}, {"type": "text", "text": "⬡ - Rising claim settlement times are a significant consumer detriment — policyholders typically need the CI benefit quickly to fund medical treatment; delays generate complaints, ombudsman referrals, and regulatory scrutiny. [src:IFoA_0425]"}, {"type": "text", "text": "⬡ - If expected lifetime premiums materially exceed the maximum benefit payable on the policy, the product fails the fair value test; regulators and consumer advocates treat this ratio as prima facie evidence of over-pricing. [src:IFoA_0425]"}, {"type": "text", "text": "⬡ - Rising distributor commission without corresponding policyholder value is a regulatory concern; high commission incentivises churning and mis-selling and will be scrutinised as a driver of poor value. [src:IFoA_0425]"}, {"type": "text", "text": "⬡ - Consumer-outcome regulation (e.g. Consumer Responsibility / TCF) requires insurers to define 'good outcomes' and 'fair value' for their own CI products, review them periodically, and demonstrate compliance via monitoring and Board reporting. [src:IFoA_0425]"}, {"type": "text", "text": "⬡ - CI product review under consumer responsibility requires: (a) target market review with assessment of changing customer needs (longevity, earlier diagnosis, lifestyle changes), (b) product design review — conditions, benefit levels, introduction of severity-based partial payments, (c) clear product literature and definitions, (d) appropriate distribution strategy and commission governance, (e) fair pricing benchmarked against competitors. [src:IFoA_0425]"}, {"type": "text", "text": "⬡ - Severity-based partial payments (as an alternative to the standard binary all-or-nothing lump sum) can better match benefit design to degree of illness and reduce the proportion of legitimate claims that fail the standard threshold. [src:IFoA_0425]"}, {"type": "text", "text": "⬡ - CI benefit levels should be reviewed regularly to ensure they keep pace with inflation; a benefit that does not increase in real terms provides progressively less financial protection over the life of a long-term policy. [src:IFoA_0425]"}, {"type": "h4", "text": "Return of Premium (ROP) Options on CI"}, {"type": "text", "text": "⬡ - Return of Premium (ROP) options on CI policies can be triggered by: surrender/lapse, end of term or age expiry, death (outside a CI claim), conversion to another policy, claim decline, claim within a moratorium/survival period, or partial claim — each trigger has different anti-selection implications and pricing complexity. [src:IFoA_0423]"}, {"type": "text", "text": "⬡ - Pricing ROP options requires assessing: the probability and timing of each trigger event; expected policyholder behaviour (e.g. selective lapse by healthier lives for surrender ROP); investment return on pre-funded reserves; amount of premium returned (full vs partial, net of charges); and whether terms are fair between policyholders with and without the option. [src:IFoA_0423]"}, {"type": "text", "text": "⬡ - ROP options increase CI premiums, reducing affordability and potentially widening the protection gap — regulators may intervene if prevalent ROP usage makes standard CI unaffordable for lower-income policyholders or raises commission-driven mis-selling concerns. [src:IFoA_0423]"}, {"type": "text", "text": "⬡ - From an IFA perspective, recommending ROP requires balancing: client need and affordability; the option's value as a quasi-savings vehicle or tax-deferral tool; commission implications (higher premium = higher commission if commission-linked); and TCF/regulatory risk if the added complexity leads to policyholder misunderstanding. [src:IFoA_0423]"}, {"type": "h4", "text": "Lapse Risk & Recession Management"}, {"type": "text", "text": "⬡ - In a recession, selective lapsing of individual CI is driven by affordability pressure — healthier lives (who feel they are less likely to claim) are more willing to lapse, leaving a worse risk pool, higher expected claims, and potential anti-selection spirals if premiums are then increased to compensate. [src:IFoA_0422]"}, {"type": "text", "text": "⬡ - Adverse lapse consequences extend beyond direct claim cost: unrecovered initial expenses and commission; fixed costs spread over fewer policies; forced asset disinvestment at unfavourable recession prices; reinsurance premiums becoming relatively more expensive per remaining policy; and potential regulatory scrutiny if large-scale lapsing is processed slowly. [src:IFoA_0422]"}, {"type": "text", "text": "⬡ - To minimise lapses on existing CI policies in a recession: proactively communicate policy value; offer flexible options (reduce sum assured, convert escalating to level premiums, pay-up options); introduce premium holidays or payment deferrals; target retention efforts at shorter-duration policies where unrecovered expenses are greatest; and approach distributors to discourage churning. [src:IFoA_0422]"}, {"type": "text", "text": "⬡ - Premium holiday (Option A: no catch-up) retains the customer relationship and avoids immediate selective lapse effects but permanently reduces premium income and expected profitability; premium deferral (Option B: catch-up later) recovers missed income but relies on the policyholder's ability and willingness to pay at a future point. [src:IFoA_0422]"}, {"type": "h4", "text": "Mental Health Conditions in CI"}, {"type": "text", "text": "⬡ - Mental health conditions can be suitable for inclusion in a CI product if they: (a) have a severe and debilitating impact comparable to traditional CIs, (b) occur with sufficient frequency, (c) can be clearly and precisely defined to avoid claim ambiguity, and (d) have sufficient data to support pricing. [src:IFoA_0924]"}, {"type": "text", "text": "⬡ - Adding mental health conditions to CI applies only to new business — existing policyholders will not be covered, which is likely to cause dissatisfaction among those who requested the addition. [src:IFoA_0924]"}, {"type": "text", "text": "⬡ - Mental health conditions that are temporary or curable are unsuitable for CI inclusion as payment would constitute a windfall rather than a protection benefit — only persistent, seriously debilitating conditions with objective measurable triggers (e.g. inability to work for 12 months, hospitalisation for specified period) should be considered. [src:IFoA_0924]"}, {"type": "text", "text": "⬡ - Adding mental health conditions requires new underwriting questions that are clear, relevant, proportionate, and sensitive; specialist medical advice is needed to develop both the definitions and the underwriting criteria; questions must comply with local regulation and anti-discrimination law. [src:IFoA_0924]"}, {"type": "text", "text": "⬡ - Reinsurers are a key resource when adding mental health to CI: they can assist with condition definitions, underwriting criteria, pricing data from other markets, and confirmation of reinsurance availability and cost. [src:IFoA_0924]"}, {"type": "text", "text": "⬡ - Replacing a defined list of CI conditions with a catch-all term (e.g. 'serious infectious diseases') increases consumer certainty and product simplicity but creates extreme pricing uncertainty, makes past data unusable, raises reserves and capital requirements, and generates legal/dispute risk around what constitutes a qualifying condition. [src:IFoA_0924]"}, {"type": "text", "text": "⬡ - If a catch-all CI definition leads to materially higher-than-expected sales, the insurer may face capital strain; over-prudent pricing makes the product unaffordable; under-prudent pricing risks insolvency — the pricing tension is structurally unresolvable without a specific condition list. [src:IFoA_0924]"}]}, "Income Protection": {"_meta": {"acc_stage": "S2", "pc_stage": "S1", "syllabus_category": 1, "risk_categories": ["insurance", "persistency"], "stakeholders": ["Policyholders", "Insurer", "Distributors", "Reinsurers", "Government"], "icon": "🛡️", "pillar": "P1"}, "content": [{"type": "h3", "text": "Income Protection (IP) Insurance Framework (SP1 Chapter 1)"}, {"type": "h4", "text": "Definition & Nature"}, {"type": "point", "bold": "Core Purpose", "text": "Long-term insurance contract providing regular (short- or long-term) payments during periods of incapacity due to illness or accident. Returns regular premiums; multiple claims possible during policy term."}, {"type": "point", "bold": "Complexity", "text": "Seen as complex product; general policy conditions must be clear."}, {"type": "point", "bold": "Key Distinction", "text": "Unlike CI (fixed lump sum) or PMI (reimburse medical costs), IP replaces lost earnings. Benefit amount tied to pre-disability income."}, {"type": "h4", "text": "Premium Structure & Guarantees"}, {"type": "point", "bold": "Premium Waiver", "text": "Waived during periods when benefits payable."}, {"type": "point", "bold": "Premium Escalation", "text": "Subject to increases in line with regular benefit increases (e.g., earnings-linked benefit escalation)."}, {"type": "point", "bold": "No Claims Discounts (NCD)", "text": "Reduced/waived premiums if no IP claims made during period."}, {"type": "point", "bold": "Guaranteed Premiums", "text": "Fixed throughout policy term (no changes)."}, {"type": "point", "bold": "Reviewable Premiums", "text": "Changed on review dates only as result of portfolio experience (not individual experience); must be specified in policy."}, {"type": "h4", "text": "Benefit Design & Restrictions"}, {"type": "point", "bold": "Replacement Ratio", "text": "Benefit divided by pre-disability income (net of tax on both). Usually capped max 50-75% to maintain work incentive; over-insurance prevented via maximum benefit formula."}, {"type": "point", "bold": "Benefit Duration", "text": "Fixed term or up to specified age (usually retirement, e.g., age 65). Varying duration structures available."}, {"type": "point", "bold": "Benefit Escalation at Outset", "text": "Fixed percentage or published price/earnings index from start; often with corresponding premium increases."}, {"type": "point", "bold": "Escalation During Claim", "text": "Specified rate applied while benefits payable (maintains claimant's standard of living)."}, {"type": "point", "bold": "Partial/Proportionate Benefits", "text": "Reduced-rate benefit if policyholder returns to part-time work or lower-paid job."}, {"type": "h4", "text": "Definition of Incapacity"}, {"type": "point", "bold": "Core Definition", "text": "Unable to earn income as result of illness or accident. Does NOT cover unemployment, redundancy, early retirement, reluctance to return to work."}, {"type": "point", "bold": "Occupational Definitions", "text": ""}, {"type": "point", "text": "Inability to perform own occupation"}, {"type": "point", "text": "Inability to perform own occupation + any other suited occupation (by education, status, training)"}, {"type": "point", "text": "Own occupation for initial period (e.g., 2 years), then any occupation thereafter"}, {"type": "point", "text": "Inability to perform any occupation"}, {"type": "point", "bold": "Functional/Non-Occupational Definitions", "text": "Regardless of occupation—"}, {"type": "point", "text": "Activities of Daily Living (ADLs)"}, {"type": "point", "text": "Activities of Daily Working (ADWs)"}, {"type": "point", "text": "Functional Assessment Tests (FATs)"}, {"type": "point", "text": "Personal Capability Assessments (PCAs)"}, {"type": "point", "bold": "Use for Non-Earners", "text": "Functional tests used for housepersons, students, temporarily unemployed."}, {"type": "h4", "text": "Deferred Period & Linked-Claim Period"}, {"type": "point", "bold": "Deferred Period (DP)", "text": "Chosen by policyholder; no benefits payable during this period (e.g., 4, 8, 13, 26 weeks). Longer DP = lower premium."}, {"type": "point", "bold": "Linked-Claim Period", "text": "Imposed by insurer (e.g., 4 weeks). Periods of incapacity separated by less than linked period treated as one continuous claim."}, {"type": "h4", "text": "Options & Riders"}, {"type": "point", "bold": "Guaranteed Increase Options (GIOs)", "text": "Increase benefit amount without further health evidence if 'life event' occurs (e.g., marriage, children, home purchase), provided opted at outset with extra premium."}, {"type": "point", "bold": "Increase Options (General)", "text": "Regular benefit increases guaranteed or reviewable."}, {"type": "h4", "text": "Risk & Rating Factors"}, {"type": "point", "bold": "Typical Rating Factors", "text": "Age, gender (if permitted), occupation (risk classes), deferred period, smoking status, medical history."}, {"type": "point", "bold": "Location", "text": "Typically not used as rating factor (despite evidence of effect); residency restrictions may apply for full cover."}, {"type": "point", "bold": "Change of Occupation/Residence", "text": "Policyholder must inform insurer of changes; may trigger premium adjustment or cover modification."}, {"type": "h4", "text": "Product Variations"}, {"type": "point", "bold": "With-Profits IP", "text": "Annual bonus declared, builds to maturity benefit on death/expiry."}, {"type": "point", "bold": "Unit-Linked IP", "text": "Morbidity charge deductions made from unit fund."}, {"type": "point", "bold": "Short-Term Accident & Sickness (ASU) Policies", "text": "Annual renewable; benefit payments limited to specified period (e.g., 1 year); often used for loan protection ('creditor insurance', 'payment protection insurance')."}, {"type": "h4", "text": "Group IP Specifics"}, {"type": "point", "bold": "Benefit Level", "text": "Based on gross salary (2/3 to 3/4 typical) or net pay schemes (up to 90% net pre-disability income)."}, {"type": "point", "bold": "Additional Benefits", "text": "Pension contributions (employee/employer), State welfare contributions."}, {"type": "point", "bold": "Escalation in Claim", "text": "While benefits paid, escalate to maintain claimant living standards."}, {"type": "point", "bold": "Continuation Option", "text": "Employees can convert group cover to individual without health evidence on leaving employment; anti-selection risk high (left due to health); benefits capped to group level."}, {"type": "point", "bold": "Statutory Sick Pay", "text": "In jurisdictions with statutory sick pay (e.g., UK 4 days–28 weeks), employers insure liability; deferred period often matches statutory period (e.g., 28 weeks DP in UK)."}, {"type": "h4", "text": "Key Risks for Underwriting/Pricing"}, {"type": "point", "bold": "Moral Hazard", "text": "Incentive to remain disabled if replacement ratio too high; return-to-work incentives essential."}, {"type": "point", "bold": "Economic/Unemployment Disguise", "text": "Claim rates surge during economic downturns; unemployment masquerades as incapacity."}, {"type": "point", "bold": "Definition Risk", "text": "Own-occ vs any-occ disputes; occupational changes may shift claim likelihood."}, {"type": "point", "bold": "Lapse Risk", "text": "Policyholder may terminate if income improves or family circumstances change."}, {"type": "point", "bold": "Claims Management Importance", "text": "Early intervention, proportionate benefits for partial return to work, rehabilitation funding."}, {"type": "h4", "text": "Expanding to Individual IP Business"}, {"type": "text", "text": "⬡ - Expanding from group to individual IP requires a distinct distribution strategy (retail/independent brokers rather than group brokers), individual underwriting (age rating, medical evidence at inception), and carefully considered differential pricing — cross-subsidies between group and individual books must be explicitly assessed. [src:IFoA_0425]"}, {"type": "text", "text": "⬡ - Reinsurers can provide valuable product development support, pricing data, and claims management expertise when an insurer enters the individual IP market for the first time. [src:IFoA_0425]"}, {"type": "text", "text": "⬡ - Existing group IP data can be used as a starting point for individual pricing with adjustments for: greater adverse selection at individual level, higher lapse sensitivity to premium changes, and likely different deferred period mix compared to group schemes. [src:IFoA_0425]"}, {"type": "h4", "text": "IP Loss Ratio Investigation"}, {"type": "text", "text": "⬡ - When the IP loss ratio is higher than competitors, investigate: higher claim inception rates, lower recovery rates, higher claim amounts, lower premium income, and changes in business mix (age, gender, smoker, occupation, scheme size, free cover limits). [src:IFoA_0924]"}, {"type": "text", "text": "⬡ - Business mix changes that can drive a deteriorating loss ratio include: loss of large group schemes with favourable experience, marketing campaigns attracting poorer risks, declining new business causing the average age of the book to rise, and cross-subsidies in the pricing basis being exposed. [src:IFoA_0924]"}, {"type": "text", "text": "⬡ - Product terms and conditions changes to investigate: incapacity definition, deferred period, benefit limits, replacement ratios, inclusion of partial/rehabilitation benefits, underwriting criteria — any of which may have shifted relative to market norms. [src:IFoA_0924]"}, {"type": "text", "text": "⬡ - Also investigate: early claims or claims by notification date (anti-selection), cause of claim mix (mental health/stress claims have lower recovery rates), outlier/abnormal claims, ex-gratia settlements, and any large group schemes with disproportionate influence on the overall ratio. [src:IFoA_0924]"}, {"type": "h4", "text": "Active IP Claims Management"}, {"type": "text", "text": "⬡ - Setting up a dedicated active claims management team for IP requires estimating: current and future claim volumes, proportion where intervention could improve outcomes, cause and duration of claims (to determine skill mix required), staff salaries and inflation, treatment costs, system development costs, and external specialist costs. [src:IFoA_0924]"}, {"type": "text", "text": "⬡ - Benefits of an active IP claims management team include: one-off reduction in reserves for existing long-duration claims with return-to-work potential, long-term arrest of the deteriorating loss ratio trend, and potential brand/new business uplift from positioning treatment management as a value-added service. [src:IFoA_0924]"}, {"type": "text", "text": "⬡ - Risks of setting up an active IP claims management team: costs exceeding estimates, benefits failing to materialise, difficulty recruiting specialist medical staff, reputational risk from actively directing treatment, and regulatory non-compliance if treatment management is not within permitted insurer activities. [src:IFoA_0924]"}, {"type": "text", "text": "⬡ - Mitigants for active claims management risks: pilot or outsource first to test cost/benefit assumptions; retrain existing claims staff; negotiate network agreements with doctor or hospital groups; introduce conservatively (clear return-to-work cases only); update terms and conditions and sales processes so policyholders understand the insurer may direct treatment. [src:IFoA_0924]"}, {"type": "text", "text": "⬡ - IP is well-suited to families with dependants and mortgage obligations where state disability benefits are limited — it replaces lost earned income during incapacity, complementing CI (lump sum) and any state support. IP is not appropriate for non-earners (retired grandparents, children) or those already covered by adequate employer sick pay. [src:IFoA_0923]"}]}, "Pricing & Rating": {"_meta": {"acc_stage": "S3", "pc_stage": "S2", "syllabus_category": 3, "risk_categories": ["insurance", "market"], "stakeholders": ["Insurer", "Appointed Actuary", "Policyholders", "Distributors"], "icon": "💰", "pillar": "P2"}, "content": [{"type": "h3", "text": "Rating Strategies"}, {"type": "h4", "text": "Rating Variables"}, {"type": "point", "bold": "Age/Gender", "text": "Classic variables (though gender restricted in EU)."}, {"type": "point", "bold": "Experience Rating", "text": "Adjusting renewal premiums based on past group claims."}, {"type": "h4", "text": "Premium Structures"}, {"type": "point", "bold": "NCD", "text": "No Claims Discounts (common in PMI) to prevent trivial claims but hurts retention if lost."}, {"type": "point", "bold": "Reviewability", "text": "Guaranteed (fixed) vs Reviewable (can hike rates if experience worsens over the block)."}]}, "State Healthcare & Demographics": {"_meta": {"acc_stage": "S1", "pc_stage": "S1", "syllabus
